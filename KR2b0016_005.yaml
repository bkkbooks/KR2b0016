  text: 資治通鑑釋文卷第五
  hash: sha256:1042cffd49b8835db683829fa233469c52c977a3cf6b5d3268251af630641593
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_005-1a}
body:
  text: 右宣義郎監成都府糧料院史照漢紀三十一通鑑卷三十九起昭陽協洽盡閼逢涒灘即癸未至甲申凡二年淮陽王光武族兄字聖公王莽末漢兵起無所統諸將共議立聖公為帝其後兵敗降於赤眉建武元年光武詔封為淮陽王更始元年音庚王莽有更始將軍之號漢兵起亦號聖公為更始將軍聖公即位遂以更始紀元甄阜側鄰切姓也又音甄陶之甄宛於元切南陽邑縯音衍淯陽音育南陽邑在淯水之陽舂陵書容切南陽邑懦弱乃卧切又乃亂切或作愞怯弱也張卬魚央切續漢書卬作卬鮪榮美切諶時壬切前隊音遂王莽置六隊劋子六切截也郾於建切頴川邑馳傳張戀切傳以木為之長尺五書符其上以為信馳傳者將之而疾行也出蘇鶚演莪輜重上側其切下直用切輜車名輜厠也謂軍糧什物雜厠載之以其纍重故稱輜重章懷説并力卑正切並也兼也執古勢字李軼弋質切幾巨依切近也説音稅誘也亟進紀力切急也奔古奔字翟義姓譜音徒歷切方進之子蹀血音牒謂履涉之也鉦諸盈切鐃也衝輣步耕切樓車撞城丈降切繫也或作䡴衝城車怖普故切惶懼也棘陽紀力切南陽邑在棘水之陽岑彭助簮鋤針二切姓也風俗通云古岑子國之後而陳直刃切列也通作陳級居立切秦法斬首一賜爵一級故因謂斬首為級怯乞業切多畏也中堅並平聲凡軍事中軍將最尊居中以堅鋭自輔故曰中堅也易之弋䜴切輕易之也行陳上户庚切下讀曰陳謂巡行軍陳乘鋭弋稅切利也鼓譟先到切羣呼也潰胡對切亂也滍直理切水名出南陽東北入汝或作泜音祗乃在常山非此滍水溢弋質切滿也燔符袁切爇也鴆殺直禁切鴆鳥以羽毛歷飲食即殺人金縢徒登切廣雅云緘縢皆弋也詳具孝平元始五年徇辭俊切行示也掾俞絹切官屬橫胡孟切恣也玉玦古穴切半璧也玦者義取決斷司中大贅之芮切王莽官名劫居怯切強取也詰責去吉切問也格殺古陌切擊也銼千卧切折傷也醯馨奚切酸也邯下安切欣與欣同悶音滿又音悶煩也啖鰒魚啖徒濫切鰒音雹海魚也郭璞注鰒似蛤偏著石馮几馮讀曰憑隗崔五罪切姓也下同上邽音圭漢陽邑前書屬隴西囂五髙切移檄州秋切以木簡為書長尺二寸以證召也燉煌音屯皇郡名應劭曰敦大煌盛也無辜辜罪也音孤綬是酉切韍維也析先歷切南陽邑曄域輒切厭之一葉切當也飱粥飱古餐字小飰也內其內讀曰納為質職利切結信也稱是尺孕切等也鹵掠上籠五切獲也字與虜同下離灼切奪取也豨許豈切東海人名豬曰豨掘其勿切又其月切搰也辟雍於容切學名天子曰辟雍或作雍䠠惲上當蓋切姓也下於粉切邸丁禮切倉頡篇曰邸舍也趨歡許元切通作喧並和乎卧切相應和也闥土曷切慱雅闥謂之門呼火故切叫也或作呼紺袀上古暗切下弋旬切又音均偏裻謂之袀戎衣也紺青赤色以為袀衣章懷注袀純也純為紺服也其説非是匕首卑履切風俗通曰匕首劒屬其頭類匕短而便按式漢書字作栻木局也有大地所以推隂陽占吉凶以楓子棗心木為之漸臺將廉切臺居水池取漸漬之意罷極罷音疲間關如字猶言﨑嶇展轉也叱之尺栗切呵也餔時必胡切申時食一曰啜也或作哺公賔就公賔姓也就其名臠分力轉切塊切肉屬焉珠玉切係屬也下屬心同提擊徒計切擲也以要伊消切行違胡孟切行者言之迹也恣睢上資四切下呼貴切恣睢言放情恣縱也為虛讀曰墟貉莫白切蠻貉囂然五髙切嚻然衆口愁貌冠幘側革切説文髮有巾曰幘耿况古幸切姓也晉大夫趙夙滅耿因封焉其後遂以為氏脅迄業切以威力相恐也下同連率所類切與帥同睢陽音雖梁國邑狐疑狐音胡獸名其性多疑每渡河氷且聽且渡故言疑者為狐疑黜陟上丑律切貶也下竹力切升也苛政音何細也鄴魚怯切魏郡之邑屈起渠物切如山之崛起邯鄲音寒丹趙國邑有邯鄲山在東城下趙奢冢在此山西謂之馬服山繆王子林音謬東觀記子林作臨灌古玩切澆也任俠上汝鴆切下胡頰切任謂任使其氣力俠之言挾也以權力挾輔人也謳者一侯切齊歌曰謳任身如鴆切或作妊二年薊吉詣切字本作􅠥即漁陽郡黠下八切桀黠屬縣之欲切附也言附縣而屯聚怍在各切怍顔色變也俯首俯與俯同低頭也刮席古剎切摩切也歙許及切沘陽音比南陽邑穰人羊切南陽邑驃騎毗召切徑疾貌亦作票宗佻他雕切説文遷廟也膳夫時戰切庖人淑神六切弇古南切耿况之子轔良刃切轢也腐奉甫切爛也募莫故切廣求也邪揄音耶俞説文邪揄者以手相弄邪或作歋弋支切揄或作愈容朱切此音邪揄語輕重不同爾章懷釋慙懅巨魚切心急也控弦口弄切引也趣駕趣讀曰促蕪蔞力于切在涿郡饒陽縣傳舍知戀切客館也椎鼓傳追切擊也通作槌紿音怡江南呼欺曰紿亦作詒呼沱上音呼沱一作池音駝在涿郡之饒陽澌音斯流氷詭古委切詐也比至必寐切近也爇火儒劣切燒也燎衣力小切炙也努力暖五切方告勉也邳肜上貧悲切下余中切傳相音轉即輾轉之轉貰縣式制切巨鹿邑下貰之同音爰曽兩元切姓也名曽字子路防子防通作房常山邑鄗火各切光武即位於此更名髙邑屬常山法古法字祭遵祭側界切周邑其先受封於祭因以為姓繕時戰切繕修也扞侯旰切衛也蓋延古合切食之食讀曰飼齎祖稽切持也涿竹角切郡名倪宏五兮切姓也南􅒋力全切巨鹿邑鄧滿續漢書滿作蒲從容七恭切從容休燕也鐡脛形定切胻也大槍七羊切矟也五幡孚袁切幟也更始𥘉諸賊並起各以軍容強盛為號故鐵脛大槍五幡三者皆賊之自號也鄡堅堯切巨鹿邑隆慮慮音盧避殤帝諱改曰林慮歸德侯颯鄧展颯音立王莽天鳯元年展德侯颯者亦音立其姓王昭君弟此歸德侯乃姓劉也單于音蟬胸奴天子之號漢書音義曰單于者廣大之稱言其象天單于然中亂中或音竹仲切牚距牚謂支撑丑庚切距作拒陸渾胡昆切春秋遷陸渾之戎於此洪農邑釁許覲切瑕釁也或作舋陳僑巨嬌切東觀記僑作矯孟津或作盟津武王伐紂與諸侯同盟于此調徒釣切謂計發之也糇音侯食也字或作餱器械胡介切械者器之總名佼強古巧切佼姓也或作姣周大夫原伯佼之後邔音忌南郡邑􅗛紀三十二通鑑卷四十起旃蒙作噩盡柔兆閹茂即乙酉至丙戌凡二年丗祖光武皇帝上之上建武元年嬰於盈切宣帝曽孫之子王莽立為平帝之嗣號曰孺子嬰即安定公也臨涇堅靈切安定邑蓩鄉莫老切字林云蓩毒草也地以所産得名恢口回切越嶲先蘂切郡名古卭都國有嶲水言其郡越此水也僅渠遴切才也殄徒典切絶也盡也機軸直六切機弩牙也軸車軸也皆在物之要故取諭焉要領伊消切要者衣要領者衣領凡持衣則執要與領故以要領為喻警居影切戒也綴陟衛切連綴也大呼火故切陳動讀曰陳一匝子合切周也馳騖亡遇切直騁曰馳亂馳曰騖浚靡靡音麻或音縻縣名莽改為俊麻鈔切教切略取也捐與專切棄也強華上其兩切姓也解南解音蟹解縣之南軍掫子侯切續漢志曰新豐有鴻門亭掫城即此貙膢上丑于切獸名説文似狸下龍珠切説文臘祭也前書音義云貙以立秋日祭獸王者亦以此日出獵用祭宗廟又云兾州北郡以八月朝作飲食俗謂之膢臘札側八切簡札笥中先嗣切盛衣竹器徒跣息典切足親地也赭音者赤色齧折上倪結切噬也下之列切斷也鄼音贊即蕭何所封屬南陽讖文楚讃切釋名曰讖纎也其義纎微汾隂扶云切河東邑公乘歙公乘秦官名音承言其得乘公家之申歙許及切名也馮翊音弋本秦內史髙帝更名河上郡武帝太𥘉改今名衙音牙春秋秦晉戰于彭衙即此屬左馮翊厭新一葉切王莽號新室言劉茂欲厭勝之祜侯古切祉敕里切遺者弋季切贈也下並同囑之之欲切託辭也蚩赤之切輕侮也嫌戶兼切疑也者逺于願切離也沸方味切涫也下索蘇各切繩索靣縛符攫切縛手於後唯見其靣也棨戟上遣禮切有衣之戟也下訖逆切矛屬漢制假棨戟以代斧鉞崔豹古今注曰棨戟前驅之器也以木為之肉袒徒旱切袒裼而露肉也刎武粉切斷也剽奪匹妙切強取也勞來上力報切下力代切謂慰勉而招延之也稚直利切幼稚也與稚同栒邑栒音旬右扶風邑犨葉上昌牛切下式涉切二縣並屬南陽睢陽音雖梁國邑縊一䜴切説文經也喜許吏切亦音熙祼郎果切袒也逡千旬切朴匹角切與璞通殖常職切興生財利曰殖賑章刃切贍也張掖羊益切郡名前書音義云故胸奴昆邪王地武帝開之應劭曰張國臂掖故曰張掖輯與集同爾雅曰集和也庫鈞前書音義曰庫姓即倉庫吏後也今羌中有姓庫音舍云承鈞之後章懷説竺曽張六切姓也本作竹孤竹君之後至竺晏竹下加二勠力力竹切併力也烽燧前書音義曰邊方備警急作髙上臺臺上作桔臯桔臯頭有兜零以薪草置其中常低之有冦即燃火舉之以相告曰烽又多積薪冦至即蟠之望其煙曰燧晝則燔燧夜乃舉烽渾邪上夏昆切下音耶胸奴王號誑居況切欺也馮愔伊淫切忤五故切逆也儲大伯上直魚切下他蓋切齊大夫諸子之後詗問耻慶切伺也又火逈切贛榆上音紺下音俞東海邑跪巨委切䠆跪也二年噓唏上音虛下訏既切歎息也字或從欠檀鄉徒干切鄉名在山陽瑕丘縣東北反城音幡覆也銚期餘招切姓也漳水諸良切水經曰漳水源出上黨長子縣綝丑林切癭於郢切頸瘤也綿曼音萬真定邑不內讀曰納幅巾方六切不加冠幘但以一幅飾首而已挑徒了切又田聊它雕二切橈挑宛轉也取其取讀曰娶檻車胡黤切車而為檻形以板四周之無所通見伺相吏切伺候也耽丁含切樂也怏怏於兩切情不足也貿莫候切交易也很胡懇切很戾也泄先列切漏也脅虛業切以威相恐也扞關侯旰切在巴郡史記曰楚肅王為扞關以拒蜀暴汜暴姓也汜孚梵切潘蹇上普官切下居偃切歙許及切淄川側持切淄川國在齊國般陽縣夲古齊長城藺相如藺良刃切姓也相如趙良將醪魯刀切説文兼汁滓酒饌雛綰切具食也或作饌羛陽許冝切聚名其地在魏郡雍奴如字與潞並屬漁陽沛博蓋切本秦泗水郡髙帝更名昱音育堵鄉音者即南陽堵陽縣堅鐔徒南切又徐心切合從子容切前書音義曰以利合為從以威勢相脅為橫烏氏氏音支安定邑畨須音盤在右扶風汧縣坑客庚切爾雅曰虛也郭璞云坑塹也殮力驗切殯殮郁夷於六切右扶風邑小雅四牡之詩曰四牡騑騑周道倭遲韓詩作周道郁夷言使臣乘馬行於此道谷口余蜀切水注溪曰谷左馮翊邑倨慢上居御切下莫晏切倨傲而慢易也堡博抱切或作堢堡障小城也繹思羊益切謂紬繹而思之折箠止蘂切馬檛也笞丑之切捶擊之漢紀三十三通鑑卷四十一起強圉大淵獻盡屠維赤奮若即丁亥至巳丑凡三年丗祖光武皇帝上之下建武三年徼伊消切遮也難卒卒音猝澠池莫踐切又莫忍切洪農邑潰胡對切散也左氏民逃其上曰潰回溪阪甫逺切坡者曰阪一曰澤障也回溪溪名在洪農澠池俗名回坑雒陽本作洛魚豢云漢火行忌水故去水加佳自光武後改為雒字日昊札色切日過中也崤砥何交切崤山名砥阪也一名嶔岑山在洪農澠也垂翅施智切翼也桑榆容朱切皆木名前書谷永曰太白出西方六十日法當參天今巳過期尚在桑榆之間桑榆謂晚也錚錚𥘉耕切金聲佼佼古巧切好貌均輸舂朱切均輸官名屬司農􅐭鐡論云郡國諸侯各以其方物貢輸往來多苦惡不償其費置輸官以相紹運故曰均輸猶與上音由又余救切下音預説文玃屬居山中聞人聲豫登木無人乃下山謂不決曰猶豫一説隴西俗謂犬子為猶犬隨人行忽先忽後故云猶豫又一説猶豫者友也友為人行好先行郟住以候其人百步之間如此者數四先者豫也遂曰猶豫見蘇鶚演義間使居莧切從間道而遣使也軹音只河內邑跋扈上蒲檢切下侯古切猶強梁也或説扈竹籬也氷居者於水未至時作竹籬以候魚之入水退小魚獨留大者跳跋籬扈而出故言跋扈賂遺弋季切贈也堵陽音者南陽邑暴古暴字下邽音圭京兆邑秦武公伐邽戎置有上邽取邽戎之人來為此縣故加下云芳丹姓也續漢書作茅蔣震蔣即兩切姓也邯丁甘切角閎上訖嶽切姓也汧苦堅切水出扶風西北入渭右扶風邑駱延歷各切姓也盩厔上張流切下陟栗切山曲曰盩水曲曰厔右扶風邑鄠侯古切古扈國右扶風邑槐里户恢切右扶風邑菀於阮切關中上林菀也委輸委輸謂輸委積者也委音迂偽切輸音式喻切縑音兼絹也墯徒果切落也膝息七切脛頭卩也或作膝創𥘉莊切傷也椎直追切擊也或作槌睢陽音雖梁國邑穰如羊切南陽邑妻之七計切以女嫁人曰妻鄼在河切本作䣜沛郡之邑紆雍俱切從容從七恭切從容休燕也慰藉慈夜切慰安也藉薦也言安慰而薦之四年沿江余專切緣水而下也泝沔上桑故切逆流而上也下彌兖切應劭曰沔水出武都東南入江顔師古曰漢上曰沔坼丑客切裂也鬲音革平原邑荒耗火到却損也肘陟栁切臂節也賁休章懷音奔前書賁赫賁音肥郯音談東海邑搗覩老切推擊也里閈侯旰切説文曰閭也汝南平輿里門曰閈旄騎莫袍切旄頭之騎也徐援釋疑曰乘與黃麾內羽仗斑弓前左罼右罕執罼者冠熊皮冠謂之旄頭警蹕壁吉切所警者戒肅也蹕止行人也或作蹕磬折之列切磬折者屈身如磬之曲折也莊子漁父篇夫子曲要磬折井砥蛙烏瓜切水蟲形似蝦蟇莊子曰塪井之蛙擅一􅊤之水而跨跱塪井之樂廡罔甫切堂下周屋幘側革切髮有巾曰幘駑馬農都切駑駘也馬之最下者鉛刀余專切青金也似錫而色青賈誼云鉛刀為銛言不可強扶持而用也躑躅上直炙切下直録切躑躅猶踟蹰也挫祖卧切賈逵注國語曰折其鋒曰挫五年不懌音亦不恱也襲席入切春秋釋例掩其不備曰襲挑戰徒釣切謂擲嬈敵以求戰也倡樂上音昌下音嶽倡亦樂也中霸竹仲切當也樽祖昆切本又作尊周禮有司尊彛以缶從木後人所加下邳符悲切東海邑本在薛其後徙此有上邳故曰下邳永平十五年更為下邳國卜筮時制切筮決也龜曰卜蓍曰筮捽昨沒切説文持頭髮頰古協切面旁也趣讀曰促裝側羊切裹束也戕在良切殺也伋居立切蝗胡光切螽也掎之居蟻切偏持其足又舉綺切偏引也讀曰諷洎其兾切及也契讀曰卨本作偰屈起其勿切特起也捷疾葉切獲也勝也饉渠遴切𬞞不熟為饉流隸郎計切附著也鑊胡郭切鼎大而無足曰鑊伏質如字質針也伏於針上而斬之么麼上一堯切下莫可切么麼皆微小之稱姦音干揮洗先典切謂揮去跣足也酈音歷姓也酈食其覬覦上音兾下音踰覬幸也覦欲也謂幸得其所欲瞽説公户切説文目但有朕不察其事而言之如無目之人尉他徒何切趙他也本為龍川令行南海尉事故曰尉他合從子容切前書音義曰以利合為從以威勢相脅為橫亢父音抗甫屬東平國搏戰伯各切索持也昌慮音盧東海邑至蕃蕃音皮魯國邑保朐其于切東海邑懼呼勇切恐懼聲畫中胡夾切齊郡有畫水蓐食儒欲切前書音義未起而牀蓐中食蓐冝作褥藉也深塹七艷切深坑也髙壘力軌切軍壁也壞臺胡怪切敗也臨災本齊國所都齊王宫中有壞臺也東觀記壞作環截昨結切斷也釃酒所冝切釃濾酒也詩曰釃酒有藇巨昧如字水名一名巨洋洋水在樂安國僵音薑仆也勍敵渠京切強力也辟之必益切除也投劾胡得切案罪曰劾自投其劾狀而去也投猶下也田颯音立鐫羌侯子全切鐫謂琢鑿之故以為名餌仍吏切食也喁喁魚容切衆口向上也羇旅居冝切羈寄旅客也函谷關函音咸本在洪農縣衡山嶺武帝元鼎三年遷於新安乃於故關置洪農郡蚯蚓上音丘下以忍切蟲名説文側行者交趾音止郡名杜佑通典云南方夷其足大指開拆若兩足並指則相交故云交趾也悍侯肝切猛也莎車素何切西域國名漢紀三十四通鑑卷四十二起上章攝提格盡旃蒙協洽即庚寅至乙未凡六年丗祖光武皇帝中之上建武六年復徭役復方目切髙祖十二年過沛復其民并復豐顔師古曰復謂不徭賦也騰書徒登切説文曰傳也三思蘇暫切參之也瓦解音蟹散也攜二賢圭切説文離也二疑也烏合如字鄒陽云周用烏集而王亟紀力切急也固爭側併切固上之也荆棘上音京下紀力切荆棘榛梗之謂射鈎食亦切乾時之役管仲射齊威公中帶鈎棧閣士限切謂棧木為閣道尤豫尤音淫説文曰冘冘行貌東觀記曰狐疑不決也亦音由不定也質責職日切質正也謂正責之隴坻丁計切又音底隴抵謂隴阪即隴山也在隴西郡省所景切簡也并之卑政切兼也並也糧儲陳如切亦糧也或作䊰忸忲上足丑切下他蓋切忸猶貫也謂慣習前事而復為之忲習也或音逝奧鞬上於六切下居言切奧本作薁胸奴日逐王號肝膽覩敢切肝之府也忿悁上父吻切怒也下縈元切忿也魯仲連曰棄忿悁之節局迫渠玉切説文促也易強以䜴切輕也丘墟去魚切説文大丘也溝􅊤上古侯切爾雅云水注谷曰溝下里各切爾雅云坑虛也痾於何切病也瘳丑鳩切病愈砥厲軫視切柔石也先零音憐西羌名並河蒲蕩切依也伺候相吏切奄窺也亦候也譎古穴切詐也表的上卑遙切表猶標也言為標凖下都歷切的謂射的也言為指射跳梁上徒聊切跳梁走也字皆從􅟦陸陸力竹切陸陸猶碌碌也槽櫪上才勞切果木葉實相半也下郎擊切説文㯕椑也博雅云木下支謂之椑㯕併肩字林併音果正切並也切瑳倉何切治骨曰切象曰瑳言朋友之道如切瑳以成器萎腇上於罪切下乃罪切萎腇耎弱也咋舌側革切大聲又疾各切叉手𥘉加切手指相錯也象叉之形七年謬眉救切謬誤徼訐上吉了切邀也徐廣謂徼一時權下居列切言發人私也隂槃薄官切安定邑拓他各切拓猶開也八年雞頭雞或作笄山名一名􅻊洞山車紖以忍切又丈忍切引軸也小月氏音支西域國名上邽音圭史記故邽戎邑也屬隴西黥布渠京切狂狡古巧切猾也詿誤音挂説文詿亦誤也執鋭弋稅切執鋭謂利兵也節檛陟瓜切箠也髙勾麗音釣梨或作驪在遼東之東南與濊貊相接武帝時開其地屬元莬郡九年愍眉殞切悲也憐也糗糒上去久切熬米麥下步拜切乾餱也恚憤上於避切怒恨也下房吻切悶也攢柱徂刓切叢木以為柱緱氏工侯切河南邑轘轅胡關切通作環轘轅關名險道也在河南緱氏縣東南鈔𥘉教切略取也涿竹角切郡名繁畤音止鴈肘邑左衽忍甚切祍謂衣襟衣襟向左謂之左祍黠下八切桀黠譯音亦傳四夷之語者欣與欣同觖望窺睡切望也前書音義觖猶兾也眄睨上彌殄切下研計切斜視也夸奢苦瓜切夸亦奢也降挹乙力切安也其義與抑同駱驛上盧各切下夷益切言不絶也抅彌續漢書寧彌國王夲名抅彌前書作杇彌杇音烏十年第一地名也在安定髙平縣續漢書髙平有第一城十一年艘蘇刀切船之總名棹卒上直教切東觀記棹作棹募莫故切召也飛炬其吕切束葦燒也迎勞郎到切慰勞也墊江徒協切巴郡之邑露橈人遙切短楫也爾雅楫謂之橈露橈者謂露其楫在外人在船中臨洮吐髙切洮水出西域北至枹罕東入河誡居拜切敕也骨鯁古杏切骨鯁喻正直也説文曰鯁魚骨也食骨留咽中為鯁縞古老切素也詰責喫吉切問責之也涪水音浮應劭曰涪水出廣漢南入漢邑繞而沼切纏繞沅水音元水經注沅本作沈在廣漢入涪或作沉非是旗幟昌志切又式志切幟幡也追北北讀為南北之北史記樂書北者敗也故軍敗者皆謂之北或音背非是章懷釋浩亹上音誥下音門金城邑亹者水流峽山間兩岸深若門焉俗呼閣門河隘烏懈切狹也湟牛胡光切水名出金城臨羌縣東至允吾入河一名樂都水塢候於古切字林塢小障也或作塢溝洫忽域切溝洫者通水之道也漢紀三十五通鑑卷四十三起柔兆涒灘盡柔兆敦牂即丙申至丙午凡十一年丗祖光武皇帝中之下建武十二年魚涪津涪音浮在犍為南安縣北臨大江其廣數百步綴陟衛切聮也又陟劣切秣馬音末食馬穀也幡孚袁切旗幟銜枚上户監切下木回也周官有銜枚氏枚狀如箸橫銜之繣潔於項以止言語歡嚻至晡奔謨切日加申時譴責去戰切謫問也繁郫上符袁切下蒲縻切蜀郡二邑朝請才性切挑戰徒弔切放麑五稽切説文狻麑獸也一曰麑鹿子韓子曰孟孫獵得麑使秦巴西持之其母隨而呼秦巴西不忍而與其母啜羮昌恱切嘗也樂羊為魏將攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一柸而攻拔中山鴻臚音廬官名􅉠贈上符遇切下昨亘切錢財曰贈布帛曰􅉠皆所以贈終翬許歸切瑛於驚切為癩落蓋切惡疾也或作癘青盲眉耕切目無眸子參狼所今切武都西夷種也拘恭于切止也執也逗留逗古注字音豆説文逗留止也漢書音義謂曲行避敵漢法軍行逗留畏懦者斬亭障漢紀作亭候亭候望敵之所障者謂塞上要險之處別築為城因置吏士而為障蔽以扞冦也鄣之向切顔師古説轂古祿切輻所湊也十三年郅惲上之日切下委隕切宛於元切南陽邑閨音圭閨門闔户臘切閉也瞽師音古無目之人也為樂師取其無所見於音聲審也葆車音保車上建羽葆也合聚五采羽名為葆輿輦力展切輿者車之總名輦者駕人以行請間居莧切間隙也十四年鄯善鄯時戰切西域國名蠲音涓除也饋求位切餉也或作餽贓則郎切納賄曰贓浸子鴆切漬也漸也十五年不厭一葉切伏也瞑眩上莫遍切下奚遍切陸德明釋加瞑眩困極也孛步內切又蒲沒切妖星右翊公翊與職切右馮翊也諡神至切行之迹也墾康很切闢也核小革切實也牘音讀木簡趣讀曰促首服式救切謂自陳其非而服其罪髠剔上苦昆切下他歷切切去髮也或作􅚎穗徐醉切苗美好也岐翹移切旁出也麊泠上莫支切下郎丁切交趾邑忿敷粉切又敷問切怒也蠻俚俚兩耳切南夷種名十六年糾擲它狄切擲猶發也愞奴亂切愞弱殿最上丁見切後也謂課居後也下祖外切凡要之首也謂課居先十七年喜許冝切貰式夜切貸也晥城下板切廬江邑怨懟直類切怨也酣胡甘切酒樂也鮮卑山名本東胡之支屬別依此山因以號焉赤山在遼東西北屬烏曰襄賁賁音肥東海邑十八年宕渠宕徒浪切巴郡之邑蒲坂甫逺切河東邑乘桴芳無切馬融釋云編竹木大者曰筏小者曰桴昭穆上音韶本音招昭穆者昭以照下穆以順上為義後避司馬昭諱昭作韶讀十九年挺緩待鼎切釋文持也章懷注云解也徹直列切去也嶠南渠廟切嶺嶠也爾雅曰山鋭而髙曰嶠駱越音洛駱者越之別名裒薄侯切聚也汜音似又音泛箠止蘂切䇿也棟𧖟上多貢切與弄棟同音下徂含切西南夷渠帥二十年器械胡介切內盛曰器外盛曰械辦嚴並如字嚴即裝也避明帝諱故改之斤斤音靳爾雅曰明明斤斤察也李巡曰斤斤精詳之察也二十一年穹廬去弓切旃帳也其形穹隆故曰穹廬祼身郎果切露體也焉耆音祁西域國名二十二年烏逹鞮侯鞮都梨切胸奴單于號幕南莫各切沙土曰幕郎沙磧也龜兹前書音丘慈今龜音丘勿切兹音阻惟切蓋急言耳章懷説兼從子容切以利合曰從玳瑁上待戴切下莫代切二字並或從甲珠崖冝佳切通作崖郡名蒟醬音矩枸子如赤揕椽木而生味辛牂柯上兹郎切下古何切牂柯者係船􅍻也楚伐夜郎椓船於且蘭岸因以名其地榷酒古嶽切謂禁民酤釀官自開置如設木渡水獨取利也管古滿切與管同旃罽居例切與􅖯通説文西胡毳布也白雉直几切昔周公相成王越裳氏重九譯而獻白雉漢紀三十六通鑑卷四十四起強圉協洽盡上章涒灘即丁未至庚申凡十四年世祖光武皇帝下建武二十三年玊況玊音肅名況字文伯京兆人章懷注谷蠡上音鹿下盧奚切胸奴王號龍祠並如字前書胸奴法五月大會龍城祭其先及天地龍神二十四年𣢾苦緩切叩也臨沅音元武陵邑應劭曰沅水出牂柯入于江矍鑠上厥縛切下書藥切勇貌東觀記作矆哉是翁矆許縛切大視也五溪苦奚切酈元注水經云武陵有五溪謂雄溪樠溪武溪潕溪辰溪悉是蠻夷所居故謂五溪皆槃瓠之子孫也愔伊淫切日索昔各切盡也瞑目莫定切閉目長者家兒長上聲長者家兒謂權要子弟二十五年徼外吉弔切塞也境也貊音陌穢貊國人也祭肜上側介切下余中切姓也法古法字樂音洛鵠胡沃切鳥名説文鴻鵠也鶩亡遇切鴨也下雋字兖切長沙邑壷頭音胡壷頭山名在武陵沅陵東武陵記曰此山頭與東海方壷山相似神仙多所遊集因名壷頭山也充昌容切武陵邑扼於革切特也握也咽喉上烏前切下戶鉤切字或從肉好畤音止右扶風邑怫符勿切欎也賈胡音古商胡薏苡上於既切下羊巳切神農本草經曰薏苡味甘微寒主風溼痺下氣久服輕身益氣轉規知戀切規圎也孫子曰戰如轉圎石於萬仞之山者執也貫脛形定切説文胻也僵音薑仆也以間居莧切諜也􅈺雅何間切􅈺雅猶沈靜也矯制調徒弔切試也言矯制選試偵候丑正切覘也謂窺同之二十六年陂池上普何切下徒何切裁與才同郴丑林切糒步拜切乾餱也閼氏上於連切下音支胸奴皇后號邏郎佐切巡也二十八年鍾虡音巨爾雅曰木謂之虡所以挂鍾磬也説文曰虡飾為猛獸邸丁禮切舍也輜車音災衣車也乘馬石證切四馬曰乘郅支職曰切胸奴單于別國也繒慈陵切帛也鞬韥上居言切所以戢弓矢下徒谷切弓衣或作韣竽瑟上雲俱切説文管三十六簧也下所櫛切庖犧所作弦樂空侯上枯公切下胡溝切字或從竹樂器也師延作蓋空國之侯所好故謂之箜篌三十年封禪封聚工禪除地時戰切本作墠林放分兩切鄭康成曰林放魯人潰胡對切散也亂也創𥘉莊切傷也中元元年篣蒲庚切笞擊也通作榜燎力召切燔柴而祭也更衣工行切改也騶騎災尤切廄御也水崖冝佳切通作崖或從水地祗翹移切説文地祗提出萬物也古字作示辟雍上必益切下於容切辟明也雍和也所以和明天下雍或作雍天子學也伎渠綺切説文巧也逺之于願切離也僅渠遴切才也二年日仄古則字與􅉴同日向西曰􅉴入臨力鴆切滇良多年切益州西夷盱雲俱切又胸于切通作䏏允街允音鉛金城邑允吾上音鉛下音牙金城邑顯宗孝明皇帝上永平元年猥烏賄切猶濫也供養上居用切下弋亮切栩況羽切震讋質涉切失氣言也元菟同都切郡名古真番地八佾弋質切佾列也謂舞者行列也春秋左氏傳曰天子八佾二年三老五更工衡切鄧展曰漢直以三公為三老大夫為五更按孝經援神契曰尊事三老父象也宋均注曰老人知天地之事者五更老人知五行更代者劉攽東漢刋誤云天也之事之字當作人言知天地人三才故謂之三老李竒曰王者父事三老兄事五更鄭康成云三老五更謂老人更知三德五事者蔡雍以為更當為叟叟老人之稱也都紵無它音續漢志作絺紵阼階存故切主階也袒徒旱切褐也祝鯁祝饐祝之六切鯁古杏切饐一結切字或作哽噎謂老人食多哽噎故置人於前後祝之令其不咽噎也搢紳搢音晉插也紳音申大帶也謂搢笏於紳牀茵於真切褥也酈如淳音蹢躅之蹢南陽邑三年炟丁逹切宫闈音韋爾雅曰宫中之門謂之闈劉昌宗音暉加緣俞絹切衣純也綺縠上去倚切説文繒也下胡谷切細縳也苞苴上班交切説文草也以為粗履從包取其可藏物下子余切履中草亦包也澍雨音注説文云雨所以澍生萬物故曰澍全椒即消切九江邑𥚹輔典切性狹詆毀丁禮切訾毀也提曵羊列切拖也撞丈降切撞擊也諌爭側迸切與諍同諌諍謂直言以悟入也黼黻上音甫下音弗黼象斧形白與黑相次文或作黻兩巳相背黑與青相次文或作襜帷昌艷切披衣也或從巾于填徒賢切又徒見切與闐同西域國名中竹仲切當也妻之七計切以女嫁人也漢紀三十七通鑑卷四十五起重光作噩盡旃蒙大淵獻即辛酉至乙亥凡十五年顯宗孝明皇帝下永平四年魴符芳切誹誹音非又音沸謗也儲直魚切儲副綬承呪切韍維也五年驃騎上毗召切下渠異切鄴音業魏郡之邑盱雲俱切通作䏏又胸于切六年王雒山雒或作雄在廬江郡湖邪尸逐侯鞮邪以遮切鞮丁奚切胸奴單于號七年督郵音尤古官號釋名曰督郵主諸縣罰負郵殿糾攝之又馮鑑續事始後漢有郡主簿亦曰督郵隋以録事參軍代之掌勾祕旨文簿舉彈善惡檻穽上胡黤切下才性切檻為機以捕獸穽謂穿地陷之謾毋官切欺也八年度遼徒故切遼水在幽則之域謂出師當度遼水也曼柏上音萬五原邑浮屠同都切袁宏漢紀浮屠佛也佛者漢言覺也將以覺悟群生也潔齊齊讀曰齋伊蒲塞悉則切即優婆塞也中華翻為近住言受戒行堪近舊住也章懷注桑門桑門即沙門也袁宏曰沙門漢言息也蓋息意去欲而歸于無為也天竺張六切即身毒國所謂浮國胡也狐疑音胡獸名其性多疑故謂不決者為狐疑駮北角切乖舛也析先擊切分也字從木斤破木也九年計偕古諧切偕俱也所召之人令與計吏俱上重熹上音沖下音熙祝詛上職救切本作呪下莊助切或作謯倏式竹切十年塤許元切樂器也以土為之六孔釋名曰塤喧也聲濁喧然丗本曰暴辛公所作箎陳知切管樂也以竹為之長尺四寸小者尺二寸七孔丗本曰蘇成公所作綝丑林切衰絰上倉回切或作縗下徒結切喪首戴也吳札側八切延陵季子也十一年伏軾賞職切車前橫木板也伏憑也采菽式竹切大豆也要腹要讀為腰膂之腰十二年哀牢南夷種也居于牢山顯宗永平中以其內屬因置哀牢縣屬永昌郡汴音卞水受陳留浚儀隂溝至蒙為汴水東入于泗樂浪音洛郎郡名古朝鮮國洄户恢切説文泝洄也稔如甚切爾雅曰稔秋穀熟也十三年太行胡郎切山名在河內山陽西北涇古靈切丹陽邑湯沭莫卜切湯沐者取其賦稅以供湯沐之具十四年邢穆户經切姓也鮪榮美切恪克各切謹也斷蔥音假濩澤胡陌切河東邑錯愕上倉各切或作䇎竦也下逆各切相遇驚也或作愕捶之止蘂切擊也汚染汪胡切又烏故切亦作汙長跪渠委切亦作䠆跪也牾五故切逆也或作忤乘間居莧切間隙之間倣徨上步光切下胡光切徘徊也分別彼列切異也解也杅水音于説文飲器也方言碗謂之盂脯糒上匪父切乾肉也下步拜切乾餱也十五年下邳符悲切東海邑應劭曰邳在薛其後徙此臣瓉曰有上邳故曰下邳昞音丙廖音僚春秋傳召伯廖以廖為名者舋許僅切鏬拆也伊吾如字胸奴中也名在敦煌北大磧之外明帝開置冝禾都尉以屯田呼衍胸奴王號并兵卑正切兼也並也十六年敦煌音屯皇郡名應劭曰敦大煌盛也甲卒臧沒切兵百人曰卒蒲類無他音海水之在胸奴者以蒲類號將軍者與祁連將軍同義祁連山在胸奴中章懷曰蒲類海今名婆悉海在敦煌北絶幕莫各切直度曰絶沙土曰幕涿邪上音卓下以奢切胸奴中山名逗留上音豆下力救切􅼱也顔師古曰豆讀與住同歐血一口切吐也悉簿上步户切皆為文簿而上之豺狼上牀皆切狼屬狗聲或作豺下魯當切似犬鋭頭而白頰髙前廣後大呼荒故切或作呼格殺古柏切或作格擊也騧馬姑華切黃馬黑喙弇古南切猾户八切狡獪爇如劣切燒也蓐食儒欲切謂床褥中食轔藉上良刃切轢也下慈夜切踐也轔或從足十七年奩中離鹽切俗作奩進趣逡須切嚮也汶山音問本冉駹國自武帝開置汶山郡白狼如字西南夷逺國槃木音盤西南夷逺國唐菆將侯切白狼王也龜兹解見光武二十二年槃橐他各切疏勒國城名昆侖盧昆切山名在酒泉郡西南山有昆侖之體故名之符傳符者契也兩相合也傳以木為之長尺五書符於上又以一板偕封所以為信並見唐蘇梟演義十八年傳矢音付附著也至笮側賣切壓笮也字本作挽籠上無逺切引也下力董切竹器也滋殖常職切生也多也鎧口代切甲也幡孚袁切幡幟漢紀三十八通鑑卷四十六起柔兆困敦盡閼逢涒灘即丙子至甲申凡九年肅宗孝章皇帝上建𥘉元年昱余六切苛音何苛細也慝他德切惡也晏晏烏間切晏晏溫和也尚書考靈耀曰堯聰明文塞晏晏篣格上蒲庚切笞也通作榜下音鬲其字從手擊也逞丑郢切快也滌徒歷切洗也箠楚止蘂切謂鞭箠而苦楚之也衣屨九遇切履屬稿苦浩切枯稿尉頭並如字西域國名居尉頭谷因以為號南與疏勒接衣服類烏孫郛芳無切郭也祖禰乃禮切禰父廟也陸德明釋咨問音咨咨詢也魴符方切臯林溫禺犢禺魚容切又元俱切犢徒谷切北胸奴王號二年昆明如字西夷國名在越嶲郡之西北四塞悉則切説文窒也澍雨上朱戍切時雨也鮮先典切少也蘧伯玉巨居切蘧瑗為衛大夫緑褠居侯切臂衣即臂韝也譴去戰切責也怒也拳拳巨貟切拳拳猶勒勒也含飴盈之切説文采糵煎方言謂之餳屬託之欲切委託也屬籍上殊玉切附也謂所附宗籍説文籍簿書也織室之翼切前書有東織西織屬少府平帝改置織室章懷説浣衣胡管切濯也通作浣創瘢上𥘉良切瘠也與瘡同下蒲官切痍也髙結讀曰髻束髮也卑湳乃感切羌種名勒姐下音紫或音子野切羌種名滇吾上音顚燒當羌名郝崇呵各切姓也傅育方遇切姓也封養如字西羌別種臨洮吐髙切隴西邑沘陽上音比南陽邑冠軍古玩切南陽邑峭直上七肖切三年忤五故切逆也呼沱上音呼下徒何切在涿郡之饒陽都慮音廬隱栝古活切隱審量栝之也孫卿子曰拘木必待隱栝蒸揉然後直也康居音渠西域國名抅彌續漢書寧彌國王夲名抅彌前書作扜彌扜音烏漊中郎侯切水名在武陵蠻中羡陽善切四年伉音抗惕厲上他歷切愓懼也厲危也瞑目上莫定切閉目也與焉與讀曰預五年悶悶音滿又音悶鄯善上時戰切西域國名斷音假截也厄於革切隘也更相工衡切互也僵仆上居良切僨也下方遇切頓也畨辰畨音潘姓也六年彪必幽切儲水陳如切停水也安作協韻音則護切𥜗汝朱切短衣也袴苦故切説文脛衣也貂丁聊切説文鼠屬大而黃黑出丁零國七年鞠躬居六切本作躹鞠躬者恭謹之至也厭勝一涉切伏也飲酎丈救切三重釀醇酒也訣古穴切訣別卷津上丘權切即河南卷縣穫胡郭切刈也刺探上音次下湯勘切候伺也瓢飲毗霄切瓢匏也鄼音贊南陽邑八年三木樓訾子斯切三木樓胸奴中山名因以為號欵苦緩切説文意有所欲也輕狡古巧切狂也健也思愆與愆同過也解酲上佳買切散也下直征切酒病也詖彼義切蒼頡篇曰詖侫諂也沁水千浸切河內邑隂喝上於禁切下一介切猶噎塞也孤雛仕于切鳥生子而啄者曰雛紆雍俱切局蹐上渠六切促也謂踡局不伸下資昔切小步也如踧踷然詈力智切罵也貰出市夜切赦也疚居祐切病也嶠道渠廟切嶺也山鋭而髙者帑藏上他莽切又音奴下才浪切帑藏金帛之所元和元年煆練上丁貫切下郎甸切蒼頡篇曰煆椎也煆練猶成熟也閥閲上房越切下欲雪切史記曰明其等曰閥積功曰閲木訥奴骨切木質也訥遲鈍也丙箠主蘂切䇿也所以箠擊定箠令者謂令甲令乙令丙為篇之次鉆鑽上其淹切鐡鋷也肘以劫束也下祖官切又作喚切刺也所以穿鑽臏刑謂鑽去其臏骨也怵然食聿切怵愓也儲跱上陳如切積也下直里切具也支柱竹主切牚也駮議此角切駮猶校也靁古雷字駰伊真切受訊息晉切閣也悛此緣切改也捧夫奉切兩手承也坐臧則即切納賄曰臧大且渠且子余切胸奴王號也漢紀三十九通鑑卷四十七起旃蒙作噩盡重光單閼即乙酉至辛卯凡七年肅宗孝章皇帝下元和二年􅗖如鴆切説文孕也矯舉夭切妄也饜於艷切通作厭悃愊上苦本切下孚逼切説文悃愊至誠也車利涿兵涿竹角切胸奴大人名入塞先代切丁零音憐西羌名編欣音欣同李𣑽作四分曆𣑽清河人見蔡雍議惟欣無所考𣑽扶泛切綜校上子宋切下古孝切錯綜而校正之也酺薄胡蒲故二切掾俞絹切官屬沾張廉切或作霑濡也漬也岱宗待戴切泰山也為四嶽之所宗故曰岱宗汶上文運切水名出琅邪朱虛東泰山東入濰有三山王帝祠驃騎上毗召切亦作票栩火羽切三正諸盈切三正謂天地人之正所以有三焉周為天正商為地正夏為人正抄掠上𥘉教切下離灼切奪取也誾魚斤切中正貌衎衎苦汗切和樂貌默莫北切靜也通作默倍雇上蒲昧切加也下古暮切賃也三年騑芳微切夾轅者為服馬服馬升為騑馬泄先列切漏泄晷居洧切日影也俸符奉切秩祿也慤克角切損中東觀記作頓中續漢書及華嶠書作損中或作植章懷説沿無正字難隨字音拘攣閭緣切係也拘執也章和元年隗五罪切晃户廣切酋豪自秋切長也大小榆谷上羊朱切下俞玉切榆溪名水注溪曰谷西羌中有大小兩谷也敞昌兩切莎車素和切西域胡國徼吉弔切邊酤二年倉帑上千剛切倉庚也下它莾切藏金帛之所也膳時戰切具食也藏才浪切物所畜也賚洛代切賜也苑委逺切所以養禽獸也囿尤救切苑有烜也賑恤上忍切贍也法古法字羡以淺切址音止説文基也幹古滿切主當也與管同瓌姑回切慠魚到切倨也挹一入切酌也睚眥上五懈切怒視下仕懈切恨視裁哀昨代切制也公羊辨而裁之裁數矣所角切不一也貪婪婪盧含切亦作婪左傳貪婪無厭扜侯旴切衛也稜盧登切莫適音的謂無指的也五校胡教切五校即五營也謂長水步兵射聲胡騎車騎等五校尉也內之讀曰納湟中胡光切水名出金城臨羌塞外月氏胡所居之地寫谷西羌地名東觀記寫作鴈孝和皇希上永元元年箄步佳切木筏也東號並平聲西芽別瑳稽顙上康禮切下蘇黨切額至地也欵苦管切至也塢壁安古切庫城也警蹕上居影切下卑吉切警戒肅也蹕止行人也舛尺兖切舛錯調度上徒弔切調賦也下徒故切用度也樂恢上五用切姓也下苦回切其名忿撫吻切悁忿偎烏賄切濫也郅壽職日切姓也誡居拜切敕也瞽言公户切瞽非無目者目但有聯不察事而言之如無目之人孔子曰未見顔色而言謂之瞽牢獄牢間也所以固有罪惲於粉切稒陽上音固五原邑私渠比鞮海鞮丁奚切胸奴中海名禆賔移切副助也燕然上因肩切山名在胸奴速邪烏地中汜音似又音泛中竹仲切當也緹騎緹田黎他禮二切説文緹帛丹黃邑也漢官儀執金吾緹騎二百人今奴客及緹騎言並縱橫也逼筆力切爾雅曰迫也或作逼訩訩許拱切衆言也牾五故切逆也或作忤二年淑神六切閻礱上余廉切下廬紅切震懾質涉切懼也要之於堯切遮也􅉠符遇切賻贈郾於建切頴川邑谷蠡上音鹿下音黎胸奴王號創𥘉莊切傷也閼氏上於連切下音支胸奴皇后號三年璜胡光切賂遺上音路遺也下弋季切贈也纂祖管切纂承風厲風讀曰諷脅迄業切迫脅噫嗚上音醫又乙戒切下一故切歎傷之貌黷徒谷切褻也於除鞬鞬居言切胸奴王名朔漠上所角切下莫各切北方之沙漠也即胸奴中訐居謁切訐謂發揚人之惡漢紀四十通鑑卷四十八起元􅘬執徐盡旃蒙大荒落即壬辰至乙巳凡十四年孝和皇帝下永元四年綬是酉切又承呪切説文韍維也齮魚綺切悍士侯旰切勇猛之士也卒遇倉沒切忽也怖普故切惶懼也蝗胡光切説文螽也穰如羊切南陽邑磊魯猥切閹衣廉切又衣檢切宫中主門者鈎盾音順中官所隸其處在少府監內之內讀曰納酺薄胡切宥于救切寬也种兢直弓切姓也兢其名華嶠上胡化切下渠廟切詭過委切詐也穢烏外切惡也亹亹武斐切勉也謂勉勉乎不倦也郃音合又音閣椒房兹消切漢官儀曰皇后稱椒房取其蕃實之義也翹足祁堯切企足也充牣而振切滿也彪輔休切録尚書事録力竹切謂總領之也澧中里第切水名出武陵郡傿於建切聶尚尼輒切姓也譯使上羊益切下疏吏切傳夷語之人盟詛莊助切大事曰盟小事曰詛鄭康成説五年伉口浪切魴符兮切卞忌皮變切姓也單父音善甫山陽邑橫貸上胡孟切下吐戴切謂誤辱貰貸其罪也汙於胡切又烏故切亦作汙睢陽音雖梁國邑技巨綺切巧也鼓吹尺偽切説文吹者音律管塤之樂也廏馬居又切馬舍釋名曰廏聚也生馬之所聚也貫友古玩切姓也塢烏古切小障也一曰􅋻城也航寒剛切方舟也賜支賜支西戎也禹貢所謂析支者也王肅云析支在河關西鄭元以為山名黠下八切桀黠六年警居影切戒也并力卑政切兼力也曼柏音萬五原邑格殺古陌切擊也鈔𥘉教切略取也納質陟利切結信也薁鞮上於六切下丁奚切胸奴王號郵亭音尤境上行書舍也度幕上徒故切濟也過也下末各切應劭曰幕沙幕胸奴之南界也要擊要讀曰腰穴官人勇切散也七年鄡差堯切巨鹿邑八年烏居戰並如字南胸奴右溫禺犢王名涿鞮上竹角切下丁奚切車師後部王名祉敕里切九年祭參上側介切姓也沮材汝切止壞也禪古禪字嫕一計切枹罕枹讀曰膚本枹鼓字其字從木金城邑旴况于切臨洮吐髙切隴西邑療力劭切治也蓋暹上古盍切下思廉切甘英續漢書作甘菟大秦西域胡國也一名黎鞬以在海西亦云海西國條支並如字西域胡國其地臨西海海水曲環其南及東北三面路絶唯西北隅通陸道珍怪上知鄰切寶也下古壞切異也十年畏懦乃卧切又乃亂切弱也或作愞愷苦亥切十一年芻蕘上窗俞切下如招切芻蕘採薪者詩詢于芻蕘十二年秭歸上音姊南郡之邑窘渠殞切急迫也糴亭歷切市穀也十三年鮪羽軌切允川允音鉛水出金城允街瓦解音蟹散也判也十四年隃麋上音踰右扶風邑拳勇拳本作權見燒當滇良傳狂狡古巧切猾也亦狂也委輸上迂偽切下式喻切謂輸委積者也繕修時戰切輔葺也巫蠱公吐切左傳注曰蠱惑也巫師惑人故曰巫蠱軼音逸比景比毗志切日南郡之邑名如淳曰日中於頭上景巳在下故以名之頸居郢切説文頭莖也丐居太切乞也或作丐蕩佚前書音義曰佚音鐡蕩音讜佚蕩緩也僂身隴主切背曲也逡巡上七倫切下松倫切逡巡行不進也愴然𥘉亮切悲傷也鄛鄉上士交切在南陽郡十五年顧復蓼莪詩顧我復我復芳目切箋云顧旋視也復反覆也弱冠古亂切蓼莪上音六下五何切義草名蒿之屬蓼者言其長大貌詩小雅之章宿留上音秀下力救切猶停留也宿留本作須留見清河孝王傳十六年緱氏古侯切河南邑百岯山爾雅山一成曰岯平眉切即百岯山也東觀記作坯音同俗作伾誤也章懷釋元興元年痼古慕切久疾篋詰計切箱篋首服上式救切自陳其罪而服也實核下革切説文實事也核考也敦煌音屯皇郡名發擲他歷切挑也凡隱伏者謂動發之資治通鑑釋文卷第五
