body:
  text: 右宣義郎監成都府糧料院史照唐紀六十一通鑑卷二百四十五起閼逢攝提格盡強圉大荒落即甲寅至丁巳凡四年文宗元聖昭獻孝皇帝中太和八年瘳丑鳩切疾愈也紓商居切郯徒甘切即東海郡倜儻上他歷切下坦黨切卓異貌涯魚羇切又五佳切佽音次封駮北角切唐門下省給事中主卦駮詔敕有可否者即封駮之懷仵阮古切承嘏舉下切璩其於切驅一口切擊也庭湊倉奏切醯馨奚切酸味也蚋而鋭切蚊蚋藝王分切除苗間穢也璠孚袁切九年絿音求漳王止良切傳母保傳女師也母或作姆哂之矢忍切笑不壞顔趣之趣讀曰促餗蘇谷切𥚹俾𬗟切遍急逋博孤切欠負錢益橫胡孟切恣橫揣知𥘉委切度也烜赫火逺切明也盛也訛言五禾切謬也或作訛沈􅔲上式任切姓也下魚羇切又冝寄切知雜御史之職有四知其雜事者謂之知雜鞠居六切窮治罪人汾符分切州名浣胡管切猥烏賄切猥猶濫也與訖嶽切忷忷許容切喧擾之意悰徂宗切懾之涉切懼也慰勞郎到切慰勉也沙汰他蓋切擇也鴆直蔭切以鴆鳥羽毛歷酒食則殺人狡古巧切狡獪也軋乙黠切邠悲巾切州名白棓部項切説文梲也謂木杖滻水所間切水出京兆藍田谷入灞罘罳上房尤切下新兹切罘罳闕前飾罘復罳思也臣將入請事於此復重思之邏郎佐切巡也迤邐上移爾切下力𥿄切徐行也郗志榮郗丑飢切姓也狼狽博蓋切狼屬生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽狼藉秦昔切狼之藉草而卧其草必亂故物之縱橫敗亂者皆謂之狼藉桎梏上之日切下古沃切在足曰桎在手曰梏紿音殆欺也誑也俯首俯或讀如俯證諸盈切渾鐬渾户本切姓也出自渾沌氏之後鐬火外切瑊古讒切剽掠上匹妙切下力灼切劫略也鄣靣之亮切隔也本作障剃他計切􅚎髮也盩厔上張流切下陟栗切山曲曰盩水曲曰厔縣名屬京兆府徇徐閏切行示也梟堅堯切斷首置木上榷茶音角水上橫一木以渡人者喻官自取利如設木為榷也詬詈上呼漏切怒也下力智切罵也礫狼狄切小石也剭烏谷切又音握按周制誅大臣適甸師謂之剭英誗直嚴切娖隊測角切娖隊謂謹嚴搢紳上即刃切插也下失仁切大帶也搢笏垂紳儋都甘切州名稱是昌孕切等也冽力業切寒也譟先到切群呼也襪勿發切晡奔謨切日加申詿誤上古賣切下五故切誤謬恐愒上起拱切下許曷切相恐怯也詰去吉切問也覘癡廉切又敕艷切窺也跽巨凡切長跪開成元年僵紀良切仆也恫疑音通又音洞恐懼也吐谷渾谷音欲渾户昆切本遼東鮮卑徒河涉歸之庶長也名曰吐谷渾其後子孫建國因以為號焉從容七恭切從容猶休燕也一襲席入切重也上下皆具曰襲猶一副也湔洗則前切滌洗也球渠幽切謨蒙晡切莊宅唐置莊宅六宅使以諸王所屬為名或總云十六宅後置六宅撤直列切髫齓上徒聊切小兒髮也下𥘉覲切毀齒也又𥘉忍切鄜芳無切州名縝章忍切閩中眉貧切南越地孱鉏山切弱也又鋤連切泫然胡大切毬鞠上巨鳩切下渠竹切踏鞠也以皮為之今通謂之毬還徒合切説文䢔也眺望他弔切視也漬汚上疾四切下烏故切浸也不撓女巧切亂也溆詞與切州名二年彗星徐醉切又音歲妖星也膳音善熟食曰饔貝食曰膳膳之言善也浣户管切濯也詩服浣濯之衣澧力邸切州名黨項多曩切漢西羌別種其地古析攴也蔣王即兩切唐紀六十二通鑑卷二百四十六起著雍敦牂盡元􅘬閹茂即戊午至壬戌凡五年文宗元聖昭獻孝皇帝下開成三年詆斥丁禮切毀斥也訐居謁切靣相斥罪也喧許元切喧譁鋒起敷容切如鋒鋭而起牂柯上兹郎切下古何切牂柯者係船筏也楚伐夜郎至且蘭椓船於岸因以牂柯名其地見于胡甸切顯也騶虞災尤切騶虞仁獸也售承呪切警居影切寤也戒也昵尼質切近也亦作昵旻眉賔切吐蕃本西羌屬散處河湟江岷間有羌發唐旄等居析攴水西祖曰鶻提勃悉野健武多智稍并諸羌據其地蕃發聲相近故其子孫曰吐蕃而姓勃窣野四年旁午一從一橫為旁午鄲多寒切郾於建切溶餘封切橦徒紅切木名少間上始紹切下居莧切小愈也報乃板切回鶻胡骨切本曰回紇其先胸奴也居薛延陀北至德宗時請易回紇曰回鶻言捷鷙猶鶻故稱回鶻可汗河干切戎酋稱沙陀唐何切西突厥別部處月種也居蒲類海之東有大磧名沙陀故號沙陀廅馺上克盍切下悉合切回鶻可汗之號五年瀍澄延切疚居又切病也大斂力驗切殯斂珙音恭又音拱龍輴順允切車轉者畫龍其輴也昕音欣郴丑林切州名藤蘿上徒登切藟也下良何切莪也譴去戰切謫問也伊吾伊吾本戎狄之地曰伊吾盧在敦煌之北大磧之外焉耆音煙攴西域國黠戞斯下八切戞訖黠切黠戞斯部落名即右之堅昆唐𥘉結骨也在伊吾西焉耆之北閡牛代切外閉也橐駝徒何切駱駝也應邵云背肉似橐故曰橐駝嗢沒斯嗢鳥沒切回鶻王子之名那頡啜頡奚結切啜妹恱切回鶻相名貿莫候切易也恚於避切怒恨也婺亡遇切州名以婺女星之分因以為名武宗至道昭肅孝皇帝上會昌元年邸丁禮切蒼頡篇曰邸舍也曖昧於代切暗曖冥也呼韓邪余遮切漢胸奴單于號即稽候稱也鴻臚凌如切胡廣曰鴻聲也臚傳也所以傳聲贊導九賔葛邏祿邏即佐切本突厥諸族在北廷西北金山之西鈔掠上楚交切又楚教切下力灼切略取也噉徒濫切亦作啖傔詰念切侍從也媯俱為切州名縝止忍切磧七迹切沙土曰幕即今磧也頡干伽斯伽求伽切點戞斯之相名二年拭設職切鄘音容徹直列切釋迦泊迦居伽切泊白各切地名羇旅居冝切羇寄旅客也禆將頻彌切將之偏副也喧譁上許元切下呼瓜切室韋契丹別種東胡之比邊蓋丁零苗裔也糴亭歷切市穀也嵐盧含切州名紇吃斯紇下沒切吃居乙切亦作扢即黠戞斯也本曰結骨後丗得其地者訛結骨稍號為紇骨亦曰紇扢斯云睥睨上匹計切下研計切袤視也驁魚到切桀驁郅攴之日切漢呼韓邪單于之兄呼屠吾斯也詗火逈切又翾正切知處吉言契苾上音乞下蒲結切其先鐡勒之部落與薛延陀等凡十五種散處磧北逹靼當割切靺鞨之遺種居奚契丹之東北後為契丹所攻散居隂山者自號逹靼涇陽堅靈切屬涇州即漢安定郡大柵測革切寨柵也編立木為之嵯才何切綝氏癡林切姓也𠢐陵之切剝也輜重上壯持切下直用切輜載衣車也重載物車也唐紀六十三通鑑卷二百四十七起昭陽大淵獻盡閼逢困敦七月即乙亥至甲子凡一年有竒武宗至道昭肅孝皇帝中會昌三年拓跋上他各切下蒲撥切拓跋部本代北復姓諜徒協切軍中反間者瘡𥘉莊切傷也勃海渤海本粟末靺鞨附髙麗者姓大氏髙麗滅有乞乞仲象者度遼水保太白山之東武后封為震國公至其子祚榮乃建國自號震國王盡得扶餘沃沮辨韓朝鮮海北諸國先夭中拜為勃海郡王自是始去靺鞨號專稱勃海猶豫餘救切玃屬居深山中聞人足音即登木至無人乃下故稱不決者曰猶豫簪珥上緇岑切下忍止切簮首笄也珥耳璫也呼沱音駝一作沱在饒陽怛丁割切旰食居案切日晚而食震懾之涉切震懼也竹畚輔衮切竹器誚才笑切誚責槍槊上千羊切亦作下色角切亦作矟陵轢狼狄切如車之所踐也鄆玉問切州名崟魚金切緘古咸切跋扈上蒲撥切下侯古切猶強梁也輔車昌遮切牙車也通作賮徐刃切會禮亦作贐懦怯上乃卧切又乃亂切弱也下去劫切畏也相搏伯各切索持也腴容朱切郳五兮切城名在東海堡輔抱切堡墇也亦作堢窒陟栗切塞也榆社容朱切邑名屬遼州臨洺彌賔切邑名屬洺州鉉胡犬切慤克角切謹也螻蟻上郎侯切下語綺切蚍蜉也犒口到切餉也髀音陛股也逗遛上音豆下力救切逗遛不進也櫜鞬上居勞切下居言切所以藏弓矢磁音慈州名趣逡須切嚮也漳水諸良切山海經曰漳水出荆山南注于沮水器械胡介切有盛曰器無盛曰械日􅉴音側日昳也太行胡郎切山名侵軼徒結切又音逸突也磬折折之列切磬折者屈身如磬之曲折愠懟上於問切怒也下直類切怨也靣縛符攫切縛手於後唯見其靣碣巨列切辨皮變切四年頡利胡結切突厥之王也處羅可汗之弟名咄苾號曰頡利可汗朏敷尾切又滂佩切綴陟衛切連綴肘腋上陟栁切臂節也下羊益切胳也在肘後良佺且緣切濛音蒙糗糧丘救切乾餱輻湊上方六切車輪轑也下子候切本作輳輻共轂也謂衆輻之所輳仲郢以井切蝗胡光切螽也泌兵媚切唐紀六十四通鑑卷二百四十八起閼逢困敦閏月盡屠維大荒落即甲子至已巳凡五年有竒武宗至道昭肅孝皇帝下會昌四年挼穗上奴禾切兩手相切摩也下徐醉切禾成秀者春書容切搗也沁七鳩切州名釗之遙切梟堅堯切挂首置木上襁褓上舉兩切下輔抱切負兒衣函胡讒切匱也騃語駭切癡也謡餘招切徒歌也銼丁卧切斫也驍勇工堯切健也在陳直刃切與陳同邯胡甘切祔廟符遇切後死者合食於先祖瞿然厥縛切遽也鄠後五切縣名屬京兆府五年秋稔如甚切廣雅曰稔秋穀熟也陜􅉑上失再切下郭獲切並州名古􅉑國王季之子所封地蘭若薩波多論云西天度地以四肘為一弓去村店五百弓不逺不近以間靜處為蘭若今若以唐尺計之度二里許也招提釋典記云𣑽語招鬪提奢猶華人言四方僧物也從省故云十方常住有常住之寺為招持也祅僧馨煙切胡神也胡謂神為祅故唐官有祅正撤直列切去也葺七入切整葺廨居隘切公舍餞才線切送去也貯展吕切積也餌仍吏切服餌傳檄胡狄切符檄也六年王氣于放切太元曰五行用事者王錡魚倚切又渠冝切怡盈之切忱時壬切灑淅上所賣切下先的切鄆王問切州名渼音美雍去聲京兆古雍州也涇堅靈切縊於賜切自經也郴丑林切州名抗衡口浪切爭衡也隤徒回切下墜也捶楚主蘂切以杖擊也禠丑豸切奪衣也禘祭火計切諦祭也周禮五歲一禘宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上大中元年鷹隼聳尹切鳥名營繕時戰切營修也邢乎經切周公子所封也僥幸堅堯切亦作徼琮藏宗切風痺毗至切濕病也綯徒刀切二年濮博木切澳乙六切怏怏倚兩切志不滿也厭代於琰切厭魅也謂惡夢顙蘇黨切額也皓下老切絪伊真切顗魚豈切諗式荏切三年耽都含切玭蒲蠲切又蒲賔切墾音墾耕也陲是為切邊陲綝癡林切唐紀六十五通鑑卷二百四十九起上章敦牂盡屠維單閼即庚午至巳卯凡十年宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝下大中四年元贄脂利切戣渠龜切藺真藺良刀切犛牛崍陵之切又音茅地名劓刖上魚器切刑鼻也下魚厥切斷足也槊色角切矛屬或作矟瑑相兖切五年譟先到切羣呼也中傷竹仲切柳函上之城切木名也下胡嵒切櫝也以河栁木為函櫝也甄奬之人切又稽延切甄陶而獎拔也撙節祖本切恭謹撙節六年稽顙上康禮切下寫曩切額至地也鄠侯古切京兆邑從容七恭切猶休燕也諴胡讒切燎魯皓切西南夷謂之獠棣特計切州名七年下邽音圭邑名屬華州八年搜擲上踈鳩切下他歷切求也挑也汭而鋭切汶亡運切九年厮役音斯祈薪養馬者或作廝處分上昌慮切制也定也下符問切所當然也訥奴骨切殿最丁練切下功曰殿上功曰最十年殢我大計切極也廑竒靳切邏郎佐切巡也鄴魚怯切十一年孜音兹玭蒲眼切盥手古玩切澡手也球音求澭紆用切又音雍滑稽古忽切滑亂也稽同也以言辨捷之人言非若是説是若非言能亂異也詼諧上枯回切下雄皆切謂譏戲也琵琶樂器胡中馬上所鼓推手曰琵却手曰琶因以為名睚眥上牛懈切下士懈切怒視貌沈湎彌兖切沈於酒也承勛許云切疊宕徒浪切二州名十二年艻木都聊切又音調譯羊益切傳四夷之言者邊徹吉弔切邊塞也虔晃胡廣切燧音遂倣甫兩切南詔南蠻國名本哀牢夷後烏蠻別種也夷語王為詔其先渠帥有六自號六詔蒙舍詔在諸部南故稱南詔居永昌之東姚州之西擐甲胡貫切貫也春秋傳環甲執兵歙失涉切州名悸年禆輔賔彌切接益也怖普故切惶懼也三年瘼暮各切病也宗祧吐雕切逺祖廟也勝殘詩證切論語解云勝殘暴之人使不為惡也荒陬將侯切阪隅也伺隙相吏切伺候也廡音武堂下周屋勞來上郎到切下洛代切慰勉之也喧譁上許元切亦作喧下乎瓜切淄側持切淄州因水以為名孽魚列切寇孽弭母愧切止也苛慘上音何細也下七感切毒也炮烙上蒲交切炙也下歷各切燒也商紂之刑佾弋質切蘄渠之切嬰城於盈切繞城以自守也繟齒善切又音亶嗢末烏沒切吐蕃奴號四年思縉音晉蛻舒芮切沂桑故切水逆流而上也澪渠郎丁切水名灕水力攴切水名磻石蒲官切滈下老切五年蠙毗賔切又蒲眠切彗星徐醉切妖星紿徒亥切欺也誑也夜縋馳偽切以繩有所垂也左氏傳夜縋而出駢蒲眠切六年閩中眉貧切南越中地璩求於切貪獪古外切狡獪又戶八切與猾同兩林蠻兩林部落東蠻國也去鄧勿國七十里地錐狹而諸部推為長號都大鬼主七年捽昨沒切持頭髮也毆之一口切擊也努力奴五切方言勉也主祔音附後死者合食於先祖胒些上董衝云未詳下四箇切刖魚厥切斷足也暗古暗字鄉導許亮切趍鄉而引導之也霸滻所簡切水出京兆藍田谷入霸八年尉遲璋尉紆勿切復姓璋其名瘳丑鳩切疾愈唐紀六十七通鑑卷二百五十一起著雍困敦盡屠維赤奮若即戊子至巳丑凡二年懿宗昭聖恭惠孝皇帝中咸通九年戡口含切軍帑坦黨切金幣所藏也潯音尋耽丁含切幟式志切昌志切旗屬髙郵音尤邑名屬兖州荻亭歷切葦屬慆他刀切戮力音六并力也稽康音遼翹足渠遙切舉也詿誤上古賣切下五故切誤謬忷懼許容切又許拱切擾恐也亦作凶春秋傳曹人凶懼符離芳無切邑名屬泗州虹古巷切邑名屬宿州間道居莧切微路也濉水宣佳切水名在梁郡璐魯故切艘蘇刀切船之總名縑堅嫌切并絲繒也檥舟魚倚切南方人謂整船向岸曰檥荷涫音官又古玩切鼓譟先到切羣呼也刳空胡切剖破銼祖卧切䂨也戟几劇切有枝兵也琯古緩切繕時戰切修也治也輻湊上方六切車輪轑也下于候切本作輳輻共轂也謂衆輻之所輳闐亭年切闐溢也郛芳無切郛郭也渦口古禾切渦水受淮陽扶溝浪渠東入淮訣古穴切訣别棹直教切行舟也亦作棹朱邪余遮切本西突厥之別部其後號為沙陀以朱邪為氏逹靼當割切靺鞨之遺種居奚契丹之東北其後別部散居隂山者自號逹靼契苾上欺訖切下蒲結切其先鐡勤之部落與薛延陀等凡十五種散處磧北瞋目稱人切張目也逗留上音豆下力救切逗留不進也髻古詣切束髮也晡奔謨切日加申時翟行約翟音宅又音狄姓也沭陽食聿切邑名屬海州滁陳如切州名衄女六切敗衄蝗胡光切螽也十年掘其月切搰也符讖楚譛切符命之書淑妃神六切後宫女官金縷隴主切以金為線也帆符咸切丹上幔所以㲹風艦户黤切戰船檛陟瓜切箠也披靡普彼切黎明黎猶比也謂比至天明言旦意也郢以井切州名比屋頻寐切言屋相近也盱眙上胸于切下盈之切邑名在泗州縛符攫切束也棚皮耕切説文棧也傳檄胡狄切古者以木簡為書長尺二寸遲明音值待也謂待天明亦徐緩之意秣馬音末食馬榖也比至必寐切僵居良切仆也布𥜗汝朱切説文短衣也下邳貧悲切邑名屬徐州鎰弋質切蕘如招切挑戰徒弔切擲堯敵以求戰也塹七豔切阮也迥户頂切小睢宣佳切水名抄掠上徒交切又楚教切下力灼切劫人財物也蘄音其邑名屬宿州禆將頻彌切將之偏副玫謨杯切悶母本切又音滿煩悶也肉袒徒旱切脫衣袖而袒露也忞眉巾切筏房越切船㭖儲偫上直如切下文里切猶蓄積也唐紀六十八通鑑卷二百五十二起上章攝提格盡柔兆涒難即庚寅至丙申凡七年懿宗昭聖恭惠孝皇帝下咸通十一年摩訶池上莫婆切下虎何切按成都記云摩訶池在張儀子城內周昔蜀王秀取土築廣子城因而為池有西域僧至見之曰摩訶宫毗羅蓋天竺以摩訶為大宫毗羅為龍言此池廣大有龍也汁之入切液也澄直陵切清也炮檑上披教切下力堆切機石之架也警邏郎佐切警察巡邏也逗橈上音豆下如巧切猶逗遛也紓商居切緩也解也趣之趣讀曰促鉤繯胡慣切絡也又下兖切維也一曰旗紐一曰捶耳驤思將切重沓逹合切合也斸珠玉切斫也苴那子余切東蠻部落名白棓步項切梲也瞳徒紅切膠居肴切宗劭實照切診止忍切視也差跌徒結切踢也忿敷吻切怒也簹都郎切畋亭年切瑝胡光切十二年汰其他蓋切沙汰也橐駝徒何切韋昭曰背肉似橐故云橐駝飼相吏切亦作飼體夫盆本切朴也悽惋烏貫切驚歎絁商支切繒屬瓦礫狼狄切小石也十三年獻銛思廉切沆胡郎切又下黨切渢方中切禓他計切孰神六切㻆古兖切瓌公回切十四年浮圗圗或作屠袁宏漢記浮屠佛也佛者漢言覺也將以覺悟羣生也輿羊諸切又羊茹切幢直江切幢童也其狀童童然膜拜莫胡切胡禮拜也臆乙力切胸臆黔南音琴即黔中郡也擯必仞切棄也涪音浮州名僖宗惠聖恭定孝皇帝上之上乾符元年培溉上薄回切下居代切磑五對切説文靡也古者公輸班作磑捶撻上止蘂切下他逹切皆擊也撤桑椹食荏切桑實也儋都甘切州名剔他歷切刳剔也鴆直蔭切毒鳥以羽毛歷酒食即殺人􅙳衣楚懈切博雅䘯祮祍謂之樓祕襪履筒箭徒紅切竹名諝新於切又私吕切虢古伯切州名湓江蒲奔切在潯陽畋亭年切忿撫吻切怒也滻川所簡切水出京兆藍田間道居莧切微路也侃空旱切俶擾上尺六切下而小切俶始擾亂也衄女六切敗衄狼藉秦昔切狼藉而卧故言縱橫亂者謂之狼藉鞫之居六切窮理罪人也五年擐甲胡慣切貫也春秋傳擐甲執兵冎而音寡割也稱愜詰計切快也葉矢涉切邑名屬汝州轘轅胡關切關名險道也在河南緱氏縣東南瑾渠吝切郾於建切蝗胡光切螽也佽七四切助也呫囁上昌涉切下人涉切漢灌夫傳云乃效女兒曹呫囁耳語罥古泫切挂也沆胡郎切又胡莽切貯丈吕切積也襤䄛上力甘切亦作藍下力主切亦作縷春秋傳篳路藍縷杜預注云敝衣也岢嵐上音可下盧含切山名近太原娖隊測角切娖隊謂謹嚴也舁與居切井舉公鍔逆各切崞音郭邑名屬代州有石門關歡譟上許官切下先到切歡譁群呼也薩葛桑葛切餘杭胡剛切邑名屬杭州鏐力求切六年風痺必至切濕病也鍇口駭切昢敷尾切潯徐林切禓先擊切全晸知領切晟丞政切玫莫杯切璆渠尤切迢徒聊切琮藏京切市舶傍陌切海中大船筏房越切船筏嬰城於盈切繞城以自守也球音求比至必寐切廣明元年蒱博薄胡切摴蒲戲也博物志曰老子入胡作摴蒲駮放北角切瑄荀緣切傳檄胡狄切符檄詗火逈切又翾正切知處告言侵軼同結切又夷質切逹靼當割切靺鞨下莫葛切下何葛切岌逆及切唐紀七十通鑑卷二百五十四起上章困敦十一月盡元􅘬攝提格四月即庚子至壬寅凡一年有竒僖宗惠聖恭定孝皇帝中之上廣明元年無厭於廉切不足也懌羊益切恱也珂丘何切寨柵上豺夬切下測革切趣諸趣讀曰促菁中咨盈切林菁喧譟上許元切下先到切喧譁羣呼也倉猝蒼沒切忽遽也灌木古玩切聚生之木夀藤徒登切藟也織質力切輜囊上莊持切下奴當切輜重囊橐也鑊户郭切鼎大而無足掘其月切搰也鄉導許亮切趨鄉而引導也鈴其淹切徹直列切晡時奔謨切日加申時輜重上側持切下直用切輜載衣車重載物車行者之所資總名輜重絡繹上盧各切下羊益切絡繹謂不絶也蓋洪轄臘切姓也駱谷上盧各切下音欲在盩厔澀色入切不滑也櫟陽漢書音藥董衝音郎狄切邑名屬華州碭山音唐又音岩邑名屬宋州説之音稅誘也昱余六切從容七恭切猶休燕也仆地方遇切又蒲北切倒也甃側救切井甃繕時戰切修也器械胡介切有盛曰器無盛曰械諗式荏切復壁方六切重復糗糧許九切乾飯屑也馱徒何切又唐佐切畜負物也儲偫上陳如切下文里切
