body:
  text: 右宣義郎監成都府糧料院史炤後唐紀五通鑑卷二百七十六起強圉大淵獻七月盡屠維赤奮若即丁亥至已丑凡二年有竒明宗聖德和武欽孝皇帝中之上天成二年濮博木切磁音慈更其工衡切改也拓跋上他各切下蒲撥切複姓𥘉黄帝子昌意少子受封北土黄帝以土德王北俗謂土爲拓謂后爲跋故以拓跋爲氏晟承正切不撓女巧切亂也縋城馳僞切繩有所垂也乘輿上石證切下羊諸切天子之車輿故曰乘輿玠居拜切筠爲賔切鄱陽蒲禾切縣名屬饒州澈直列切三年璉力展切璆渠尤切赭𫀆止也切赤色詾詾許容切又許拱切喧擾之意窺覘癡廉切又敕豔切視也強愎弼力切很也三思蘇暫切參之也論語三思而後行詮此縁切洑房六切伏流也艘蘇刀切船之緫名港中古項切水分流鍼藥諸深切亦作針絙居登切大索贇於倫切遲明丈二切待也亦徐緩之意道人磯居希切地名博雅磧也虔釗止遥切皁棧上在早切下助諫切馬閑也挑戰徒弔切擿嬈敵以求戰也廖力弔切姓也拉殺落合切折也贛古禫切又音紺縣名屬虔州鼔譟先到切羣呼也惕隱他歷切契丹酋長名白梃他鼎切白杖也堞間逹恊切城上女垣也傳璹神六切傳璙連條切傳璟居永切穽疾郢切又疾正切塪穽延琬於阮切毫釐字或作豪釐豪兔豪也十豪爲一氂俳優上蒲皆切戯也下於求切倡也驕狠胡墾切狠戾從容七㳟切從容猶休燕也四年彦珣音荀採石一名牛渚山在丹陽縣北大江中唐改縣爲當塗屬宣州濠乎刀切濠水出鍾離因以名州猘子居例切狂犬咋人實窄切齧也一說咬咋犬多聲井陘音刑縣名屬鎮州井陘山在縣南蹶居月切僵也聶夷中聶尼輒切姓也他弔切岀糓也本作糶剜烏官切削也瑑柱兖切玫謨杯切審按集韻作峹音同都切器皿眉永切飯食器柯厚柯古俄切姓也跽獻巨几切長跪也詼諧上呼回切下雄皆切譏戯也合飲葛闔切兩龠爲合詗火迥切又翾正切知處告言城隍胡光切城池也有水曰池無水曰隍易云城復于隍後唐紀六通鑑卷二百七十七起上章攝提格盡元黓執徐即庚寅至壬辰凡二年有竒明宗聖德和武欽孝皇帝中之下長興元年鴻臚凌如切官名胡廣曰鴻聲也臚傳也所以傳聲賛導九賔鑄當丁浪切厎也詰之去吉切問也圎丘禮祭天於圜丘爾雅云土之髙者曰丘圜者所以象天躰圜通作圎從曮魚檢切從珂丘何切敺一口判擊也索自通索昔各切姓也藥彦稠藥以灼切姓也稠直由切朝請才姓切琦音竒黥靣渠京切黒刑在靣也離間居莧切迭也傳拯拯音蒸之上聲漣水音連縣名屬泗州斜谷上余遮切下余玉切梁州谷名南口曰襃北口曰斜調發徒弔切計發也愿魚怨切檄胡狄切符檄㗖徒濫切食也懦弱乃卧切又乃亂切亦作愞行間胡郎切行列臠炙上力兖切下之夜切切肉爲臠燔肉爲炙鑊胡郭切鼎大而無足刲傾畦切刺也嬰城於盈切繞城以自守鏐力幽切閩王武巾切閩越也渝羊朱切偓於角切黔涪上音琴下音浮並州名謝鍠胡盲切沙延祚沙姓也矛矟色角切或作槊矛丈二長曰槊斃踣上皮祭切死也下蒲墨切僵也二年梟堅堯切掛首於木上古字作籛則前切曏日許亮切往日也請降胡江切服也舁羊諸切共舉彦琛丑林切翟光鄴翟直格切姓也鄴音業檛陟瓜切馬檛也或作簻鷹隼聳尹切鷙鳥也洋音祥膳時戰切具食也雞臛黒各切肉羹也蒸豚徒渾切小豕也受籙龍玉切符籙三年侵軼夷秩切突也又同結切鑰以灼切鎻鑰殿最丁練切下功曰殿上功曰最告訐居謁切發人之私也萴刺萴阻力切又楚力切刺盧逹切契丹之驍將也吮之粗兖切嗽也抉目於决切挑也小衂女六切敗衂曝薄報切晞也馬箠止蘂切馬策也大呼火故切呌也元璝古回切演音衍元瓌公回切雒歷各切縣名屬漢州鈔盗𥘉交切又楚教切略奪也瘳丑鳩切病愈也犒口到切餉勞也後唐紀七通鑑卷二百七十八起元黓執徐七月盡閼逢敦牂閠正月即壬辰至甲午凡一年有竒明宗聖德和武欽孝皇帝下長興三年潞音路縣名屬幽州薊音計緫轄下瞎切管轄也幕府莫各切古者將帥軍行所在張幕故號幕府撩刺泊乃曷切刺盧逹切泊傍各切地名近幽州袄祥於喬切通作妖蟊賊莫侯切食穀蟲說文蟊也靡忒他得切差也輕佻吐彫切彌雅曰佻偷也襁褓上舉兩切下愽抱切負兒衣也趣議趣讀曰促次下同要害於妙切在我爲要在彼爲害故曰要害蔚紓勿切帑藏上他曩切下才浪切金幣所藏也杲古老切暐羽鬼切四年鄆王問切瓉藏旱切從容七㳟切從容猶休燕也阿羅魯何切李彛超之兄涇堅靈切州名􅋻陋賔彌切下陋也忷懼計容切又許拱切優恐也亦作兇春秋左傳曹人兇懼斸鑿珠玉切斫也徜徉上辰羊切下余羊切博雅徜徉戯蕩也蕞爾徂外切小皃元璙蓮條切搒捶上音彭下主蘂切搒掠小捶擊也熨之於胃切持火以尉之也玉輅洛故切車輅釋名曰天子乘玉輅以玉飾車也謂之輅者言行於道路也俸芳用切䘵秩也挫則卧切摧也忿敷粉切又敷問切怒也餞才箭切送去也洮吐髙切鄯音善州名黎明黎猶比也謂比至天明也擐之胡慣切貫也狼伉口浪切謂狼戾也嗚咽於結切詡况羽切澣胡管切晙子峻切釘釘上當經切鐡鈛也下丁定切釘篸也金椎直追切亦作蔣延徽上子兩切姓也元珦許亮切仰仁詮仰姓也慷慨上古莽切下口漑切竭誠也希旺于放切譴責去戰切說文謫問也憤父吻切說文懑也潞王上清泰元年崞音郭縣名屬代州伺相吏切探伺驃騎毗召切馬勁疾皃檻車户黤切載囚車瓦礫音歷小石也鐡鋩無方切刃端汭儒稅切後唐紀八通鑑卷二百七十九起閼逢敦䍧二月盡旃蒙恊洽即甲午至乙未凡一年有竒潞王下清㤗元年鑷昵輙切箝之也滳河縣名屬棣州哂矢忍切笑不壞顔曰哂郝詡郝呵各切姓也詡况羽切餌仍吏切飤之切相里金相里複姓有兩音一息良切一息亮切並通用徧禆頻彌切將之徧副行陳上胡郎切下直刃切行伍軍陣也徼幸堅堯切亦作僥倖虔釗之遥切塹七豔切阬也金創𥘉莊切亦作瘡目睹當古切視也𥚹急𥙷典切性狹邠寧悲巾切並州名鄩徐林切榛梗上側詵切下古杏切榜捶上音彭下止蘂切掠也擊也閺郷無分切縣名屬虢州刎武粉切斷也澠池莫踐切縣名屬河南府玫謨杯切僦即就切賃也廨古隘切公廨也酖直䕃切毒酒縊於計切又一賜切簮珥上緇岑切首笄也下忍止切耳璫也帑藏上他黨切下才浪切金幣所藏也涸曷各切水竭曰涸駝徒何切櫜駝無厭於簾切不足也衰絰上倉回切喪衣也下徒結切首戴也以苴麻爲之暠古老切更之工行切改也顗語豈切蕘如招切覬覦上音兾下音踰覬幸也覦欲也謂幸得其所欲昶丑兩切偵丑正切問也邸丁禮切蒼頡篇曰邸舎也昵尼質切近也亦作暱二年嬖博計切賤而得幸曰嬖狂狷吉掾切又音畎詆丁禮切毀辱也衣笥相吏切篋也圎曰簞方曰笥菽式竹切豆也糴亭歴切市糓也貿易莫候切易財也邊陲是爲切逺邊也倣甫兩切番禺上音潘下音愚董衝音顒縣名屬廣州僣忲他蓋切奢也鸖氅齒兩切鸖羽歙失渉切州名葉翹葉與涉切姓也後晉紀一通鑑卷二百八十柔兆涒灘即丙申凡一年髙祖聖文章武明德孝皇帝上之上帝姓石氏諱欽瑭其先本岀西夷後唐明宗之壻清泰元年鎮太原徒鎮天平不受命因求援於契丹遂即帝位改元天福國號晉天福元年從容七㳟切從容猶休燕也捃拾俱運切亦拾也戎昱余六切沙漠莫名切沙土曰漠浹背即恊切洽也詬責許候切責罵也巵章持切酒器古者以角爲之受三升字亦作觝希杲古老切灑掃所下切汛也掖廷羊益切韋昭云以爲在掖門内故謂之掖廷猶豫餘救切玃屬居深山中聞人足音即登木至無人乃下故謂不决爲猶豫諺魚戰切傳言也豁呼括切開也趣音促華隂户化切縣名屬華州趙瑩縈定切又維瓊切首謝舒救切有咎自陳翹足祁遥切舉也沂魚衣切彦珣湏倫切間使居莧切從間道遣使也潦魯皓切雨水大皃嬰城於盈切繞城以自守脅迄業切迫也洺州彌并切汾扶云切水出太原方沮將豫切沮䘮也鈴索上郎丁切似鍾而小下昔各切繩也吠犬扶廢切犬鳴也跬歩大蘂切半歩曰跬榆次容朱切縣名屬太原府糺合吉酉切說文繩三合也倐來式竹切疾也太行胡剛切酣飮胡甘切洽飲也鎧仗可亥切又口漑切鎧田器仗也鈔其𥘉交切又楚教切略奪也易羊益切逗留上音豆下力敕切逗留謂退縮不進也橈之女巧切撓亂薊音計州名涿竹角切州名嬀俱爲切州名輜重上側持切載衣車下直用切載物車暝莫定切夕也瓦解胡買切判也散也栅測革切編木爲之跪巨委切䠆跪也鄜芳無切柹鉏里切赤實果也淘徒刀切淘洗飼馬相吏切秣馬也尾鬛力涉切毛鬛憤惋上父吻切怒也下烏貫切驚歎也肉顫之膳切肉動也幾欲巨依切近也時賽時姓也賽先代切以衣於旣切服也繼旻眉巾切阪甫逺切坡者曰阪猥烏賄切猶濫也詭隨古委切詐也餞才箭切送去也祕瓊祕兵媚切姓也後晉紀二通鑑卷二百八十一起強圉作噩盡著雍閹茂即丁酉至戊戌凡二年髙祖聖文章武明德孝皇帝上之下天福二年臍前西切肶臍也繕兵時戰切治兵商賈音古行賣曰滴坐販曰賈璉力展切黟於夷切縣名屬歙州璪子皓切元珦許亮切奚霫音習東北夷名董衝又音息入切去諸契丹王名拽刺上羊列切下郎逹切西奚王名磑五對切說文䃺也古者公輸班作颺余章切風所飛揚也笞超之切擊也鏐力幽切元㺷思聿切髀并弭切又部禮切股也僔兹損切水晶子盈切澶時連切汜水關音祀縣名屬孟州按唐書志汜氷縣有虎牢關成臯關旋門關忷懼許容切又許拱切亦作兇春秋左傳曹人兇懼螺峯落戈切地名泄私列切漏也諜人逹恊切反間者擐甲胡慣切貫也春秋傳擐甲執兵諠譟上許元切譁也下先到切羣呼也一幞逢玉切帕也瓖思將切朏敷尾切又滂佩切賄呼罪切財也𪷟莫紅切扉匪微切户扇也屬籍上殊玉切下秦昔切所附之宗籍也辟糓必益切除也漢張良道引不食糓孟康曰服辟糓藥而靜居行氣也珙居竦切愠懟上於問切怒也下直類切怨也璟居永切緯于貴切三年駮北角切乖外也弭災母愧切止也讜言音黨善言也優伶郎丁切優人伶官也墾田口很切耕也撤直列切去也䥫劵去願切說文契也與之契約穹廬陵如切匈奴旃帳也郷導許亮切謂趍郷而引導也挑戰徒了切擿嬈敵求戰如古之致師也剽掠匹妙切刧奪人也後晉紀三通鑑卷二百八十二起屠維大淵獻盡重光赤奮若即已亥至辛丑凡三年髙祖聖文章武明德孝皇帝中天福四年拓跋彦超上他各切下蒲撥切複姓斬衰倉回切喪服也或作縗昪皮變切不祧他彫切不遷廟也恪克各切禕呼韋切朝露陟遥切朝露見日則晞以人命短促亦如之可汗音寒戎酋稱衎空旱切幡孚元切幟也憤憤父吻切說文懑也鈆錫上余專切青金也下先的切銀鈆之間也燼徐刃切火餘也郯徒甘切曦虚冝切間道居莧切㣲道也澧音禮劉勍渠京切郇國湏倫切地名在河東解縣帆符咸切舟上幔所以汎風倧作冬切俶昌六切偡直減切偓於角切梯棧鋤諌切梯木階也棧棚也剏楚亮切造也紓傷魚切五年鈇鑕上匪父切下職日切謂鈇鉞與椹鑕也伏波漢馬援封伏波將軍業翹業魚怯切姓也字當作鄴沁七鳩切州名德珫昌中切雲夢夢讀如本字又莫風切二澤名在楚地胾側吏切說文大臠也羡餘延面切亦餘也掊民蒲侯切詩曰曾是掊克擠于牋西切又子計切澣侯晘切禇仁規禇丑吕切姓也六年涇堅靈切州名漕輓音晚引之也或從手箕踞居御切謂伸兩脚而坐其形如箕舋端許慎切隙端鄴魚怯切相州吞噬上他根切下時制切器械胡介切械器之緫名輯睦音集又七入切爾雅曰輯和也瘡痍延知切瘡痍謂傷也懑音滿又莫困切煩也舁櫬上羊諸切共舉也下𥘉櫬切棺也憂悸其季切心動也跋扈蒲撥切猶强梁也贅壻上朱芮切下思計切贅壻者猶人身體之有耽贅唁之魚戰切賙之由切振贍也酖殺直䕃切以毒酒殺之惲委粉切侑尤救切嵐石盧含切並州名逹靼當割切葉式涉切縣名屬汝州盥頮上古玩切下呼内切澡手洒面也盎於浪切盆也狼狽愽蓋切狼屬生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽龑讀曰儼後晉紀四通鑑卷二百八十三起元黓攝提格盡閼逢執徐正月即壬寅至甲辰凡二年有竒髙祖聖文章武明德孝皇帝下天福七年水碾女箭切又尼展切守陴頻彌切城上女垣俾倪也函胡䜛切匱也剛愎弼力切很也同鄜芳無切二州名湔洗將仙切洒也王翷力珍切刳剔上空胡切下他歴切判也解也玢悲巾切悒乙及切不安也鳥喙吁穢切說文口也句踐古侯切越王名忤五故切逆也榻託盍切牀也捽昨没切持頭髪也甲胄直祐切甲鎧也胄兠鍪也齊王上天福八年景逷他歷切种氏持中切姓也誚才笑切亦作譙餌之仍吏切服餌也晟承正切詼諧上枯回切下雄皆切譏戯也疽千余切癰疽厮役相攴切析薪養馬者鐔徒含切又音㝷剥皮北角切刻割也忿懟上撫吻切怒也下直類切怨也查文徽查鉏加切姓也更相工衡切互也擯必仞切奔也倮郎果切肉袒也番禺上音潘下音愚又音顒縣名屬廣州手搏伯各切索持也譚令禋於真切拉殺落合切折也嬖之博計切愛也郛芳無切郛郭羇旅居冝切羇寄也旅客也詾詾許拱切衆言倓徒甘徒敢徒濫三切闞璠上苦濫切姓也下孚哀切剽掠匹妙切劫奪也崇斌悲巾切縶之陟立切繫也醊而株衛切祭酹雖恚於避切恨也邊鎬下老切鄆王問切水蝗胡光切說文螽也海壖而縁切海邊之田也隴坻丁計切又音底按顔師古云隴坻謂隴阪即今之隴山也幽薊音計並州名長槍千羊切矟也通俗文云剡大傷盗曰槍大槊所角切矛屬通俗文云矛長丈八者謂之矟告訐居謁切面相斥罪相告訐也鼔鼙部迷切騎上鼔釋名曰鼙禆也禆助鼓節也區一音豈俱切一音烏侯切皆姓也箠楚止蘂切楚或作檚開運元年珂丘何切譯者夷益切傳四夷之言者衎空旱切又墟旰切後晉紀五通鑑卷二百八十四起閼逢執徐二月盡旃蒙大荒落七月即甲辰至乙巳凡一年有竒齊王中開運元年贇於倫切艘蘇刀切船之緫名燔炙上符袁切爇也下之赦切又音隻炮也詩曰或燔或炙戮力力竹切說文并力也嵇康音力幽切琶琶上頻脂切下蒲巴切釋名琵琶樂名胡中馬上所鼓推手前曰琵却手後曰琶因以爲名晡奔謨切日加申時連重遇連姓也讀如本字稹止忍切陳偓乙角切堞逹恊切城上女垣也私藏才浪切物所蓄曰藏一囷區倫切廩之圎者單時戰切州名汶文運切汶水岀兖州萊蕪西南入泲折從逺之列切姓也後改名從阮輻湊上方六切車輪轑也下子候切本作輳輻共轂也謂衆輻之所輳睚眦上五懈切怒視下仕懈切恨視佺逡縁切紿徒亥切欺也誑也白梃待鼎切杖也鉦鼔諸成切似鐃也艦户黤切戰船四方施板以禦矢其狀如牢爲質職利切結信也覘其癡廉切又敕豔切窺也間道居莧切㣲路也忷懼許拱切又許容切擾恐也二年洺磁上音名下音慈二州名邯鄲上河干切下多寒切縣名屬惠州鼔譟先到切群呼也下邳貧悲切縣名屬徐州嬖幸愽計切賤而得幸曰嬖澄汰他蓋切沙汰也柵測革切編立木爲之交睫即渉切目睫釋名曰睫挿也謂挿於目厓也重瞳徒東切目瞳子也衲衣諾荅切補衲紩也酋長自秋切亦長也没刺郎逹切契丹酋長名掘其月切搰也絞古巧切縊也鐵鷂代笑切䥫鷂者取其鷙猛之主詭道古委切詐也曵隊上羊列切又以制切亦作拽拕也下徒對切部隊也廻鞚苦貢切馬勒也橐駞上音託下徒何切韋昭曰背肉似橐也噀水蘇囷切噴水也莆田方矩切縣名屬泉州從容七㳟切從容猶休燕也名姝春朱切美女畏懦乃卧切亦作愞又乃亂切瞋目昌眞切張目也疆埸上紀良切界也下羊益切畔也屬籍上殊玉切附也下秦昔切簿也謂附於宗籍鎧仗可亥切甲仗皆仰魚向切廣雅云持也蹉跌上倉何切下徒結切蹉跌失時也以紓商居切說文緩也通作舒脯方矩切乾肉後晉紀六通鑑卷二百八十五起旃蒙大荒落八月盡柔兆敦䍧即乙巳至丙午凡一年有竒齊王下開運二年觖望古穴切又窺睡切怨望也賂遺上郎故切下弋季切糴徒歷切市穀襪囉魯何切釋氏𣑽音郎加切胡僧各闞璠闞苦濫切姓也璠孚袁切狡侒古巧切狂狡謟佞也鍜錬上都玩切下郎甸切鑠治金也戇陟降切愚也栲掠上苦浩切下力向切榜也思瑾渠遴切三年朝請才性切蘄渠之切左右上臧箇切下於救切按羣經音辨云左左助之曰左右右助之曰右㓂鈔𥘉交切又楚教切略取之也留從效留力求切姓岀衛大夫留封人之後歸𣢾苦管切誠欵蠭起古蜂字蠭起如蠭之起言其衆也啖徒濫切又杜覧切噍啖嵐石盧含切嵐州石州慕容彦超慕容復姓按姓譜觧卑莫護跂入居遼西時燕代多冠歩揺冠莫護跋好之乃歛髪襲冠諸部因謂之歩摇後音訛爲慕容耳至其孫渉歸因以爲氏巴傅音附糗粮去乆切又丘救切乾飯屑也憨獠上呼談切癡也下魯皓切夷獠醢呼改切肉醬也勞之郎到切慰勞慊慊苦簟切不滿也黠虜下八切桀黠盪徒沆切滌盪仔倡上津之切又祖似切商賈公土切行賣曰啇坐貶日賈鐺釡楚耕切亦火鎗鏵犂胡瓜切鏵謂兩刃臿也犂耕也無厭於廉切貪惏也罾浦谷登切在福州倔強渠勿切梗戾也滹沱上荒烏切下徒何切水名黥渠京切黒刑在靣也懔懔力錦切懼皃扼吭寒剛切咽也靣縛符攫切縛手於後唯見其面也幟昌志切又式志切旗屬烏氏音支縣名帝訣古穴切別也詬詈上許候切博雅罵也噉飯杜覧切又徒濫切食也亦作㗖燼徐刃切火餘也輿櫬𥘉覲切空棺也資治通鑑釋文卷第二十九
