  text: 資治通鑑釋文卷第二十三
  hash: sha256:2da17229fcf6729d3bfdac580eb74b66740011716e9b14e909130219967a8bfb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_023-1a}
body:
  text: 右宣義郎監成都府糧料院史照唐紀三十一通鑑卷二百一十五起元點敦牂盡強圉大淵獻十一月即壬午至丁亥凡五年有竒元宗至道大聖大明孝皇帝中之下天寶元年平盧龍都切平盧軍隸營州𥘉置節度使羈縻忙皮切繫也自太宗乎突厥蠻夷稍稍內屬即其部落列置州縣大者為都督府號為羈縻凡府州八百五十六也龜兹音丘慈西域國焉耆音煙支西域國于闐堂練切又徒賢切西域國瀚海侯旰切瀚海軍隸北庭天山軍在西州伊吾軍在伊州北庭節度使兼統之下倣此也斷隔徒管切絶也張掖夷益切郡名守捉竹角切唐戍邊者曰守捉掎角舉綺切偏引也左氏傳曰晉人角之諸戎掎之岢嵐口我切下盧含切軍在嵐州幽薊吉詣切並州名媯檀俱為切並州名靺鞨莫曷切下何葛切北狄寧塞先代切廓州軍後曰寧邊嶲柘悉委切並州名經略力灼切桂容雍交廣五州有經略軍夷獠魯皓切西南夷長樂歷各切福州郡名有經略軍東萊郎才切萊州有東萊守捉亦曰團結營東牟莫侯切登州東牟守捉亦曰乎海軍尹喜庾凖切崔浩云尹喜為散關令也蓋老子嘗過尹喜故田同秀託言藏靈符在尹喜宅耳函谷胡南切古關名明皇既獲寶符改元天寶又更桃林縣曰靈寶屬陜州函谷關在縣西南十里倕是為切鉷胡公切啖以徒濫切絢翾縣切賔詹之廉切謂太子賔客詹事官歎吒陟駕切怒也浣胡管切可汗河干切戎酋稱昕許斤切大纛大到切又音毒葉護失涉切酋長自秋切頡跌徒結切臘哆丁可切又尺氏昌者二切西殺突厥官分掌東西兵者號左右殺護密西域國元魏所謂鉢和者直京師九千里二年奭施隻切孝韞委粉切朏敷尾切滻水所簡切水出京兆藍田谷入灞百艘蘇曹切船總名扁榜輔與切從户從册户册者立門户之文也缺胯苦化切股間也裼之先的切袒裼之紅袙普駕切通俗文曰帛三幅曰袙連檣慈良切埤蒼曰檣帆柱也帆音符咸切又符泛切本亦作帆帆舟上幔所以泛風者以貯丁吕切積也三載音宰載年也法堯舜時名年曰載台明湯材切並州名黜陟竹力切書三載考績三考黜陟幽明黜退也陟升也夫蒙元和姓纂云本西羌人後秦建威將軍夫蒙羌今蒲同二州多此姓或改姓馬氏通鑑考異云會要作馬靈察從實録作夫蒙也靈察𥘉戞切黑姓迄得切突騎二部種人自謂娑葛後者為黃姓蘇祿部為黑姓犍山居盲切烏德犍山唐曆云即欎督軍山虜語兩音也又渠焉切遁甲杜本切又去聲睢陽音雖即宋州更為上音庚下于偽切潛內內讀曰納上厭於豔切四載回紇下沒切可敦突厥妻號可敦橐中撻各切囊也伺其相吏切仁亶多旱切逗留上大透切下力求切稽留不進垍巨至切號呼上胡刀切下火故切嶷鄂力切談謔迄却切戲也白額虎鄂格切晉周處不修細行為人所惡父老歎三害未除處曰何也答曰南山白額猛獸長僑下蛟并子為三矣處乃入山射殺猛獸投水搏蛟殺之勵志好學也煆錬都玩切小冶羅鉗其廉切時人謂羅希奭為鐡鉗銛思廉切錡渠冝切又魚倚切釗之搖切鮮于相然切復姓中女如字又音仲郫音皮縣名屬成都府樗蒲抽居切博戲劉毅與劉𥙿樗蒱一擲至數百萬皎吉了切誗直嚴切五載金礦古猛切金墣也王氣于况切縉雲即刃切縣名屬處州控制苦貢切墨離莫北切瓜州西北千里有墨離軍霅直甲切荔枝郎計切荔支果名魏文帝詔曰南方有龍眼荔枝妬悍都故切妬忌下侯旰切悍急不懌夷益切恱也儲偫丈里切猶積蓄也斌悲巾切㻆胡畎切良娣待禮切又上聲漢書注云良娣官也太子有妃有良娣有孺子凡三等鄴郡魚列切六載語之牛據切莫邪余遮切干將莫邪二劒名干將吳人也闔廬使造劒二枚一曰干將一曰莫邪莫邪者干將之妻名干將作劒金鐡之精未肯流干將夫妻乃斷髮翦指拔之爐中金鐡乃濡遂以成劒琯古緩切裸露魯果切袒也愚聵五怪切聾也俚言音里鄙也詼諧枯回切譏戲也哥舒居何切元和姓纂云突騎施本號西陵突厥首領有哥舒部氏焉大斗涼州有亦氷軍大斗軍因大斗拔谷為各倨慢居遇切不恭檛殺陟瓜切箠也石堡博抱切吐蕃石堡城秣馬莫葛切食馬穀充牣而振切滿也黔中音黔即黔州禳之如羊切輒裸與祼同鉉胡大切瑄荀緣切戲水許冝切漢書莊云水名也在新豐東南三十里其水本出藍田北界橫領至此而北流入渭若解下懈切曉也溫湯它郎切在照應詬而許候切禁闥他逹切博雅闥謂之門擠陷箋西切擠排也馮翊逸織切邑名屬同川華隂户化切邑名屬華州為空于偽切岫似救切騶從側鳩切廏御者下才用切復壁方六切重也甃地側救切炮櫑披教切機石下盧對切埤蒼曰推石自髙而下也峻阪音反坡坂迎勞盧到切慰也唐紀三十二通鑑卷二百一十六起強圉大淵獻十二月盡昭陽大荒落即丁亥至癸巳凡六年有竒元宗至道大聖大明孝皇帝下之上天寶六載畢思琛畢壁言切姓也琛丑林切又捽昨沒切持頭髮也倚氏於冝切邑名屬河中府纇目盧對切節纇傔苦念切侍從德詮且緣切仆地芳遇切頓也惕息他歷切契苾上音乞下蒲結切虜復姓七載驃騎毗召切徑疾兒為翁烏紅切老稱也之爺以遮切俗作爺字父也一杵敞吕切疾惡烏故切三吝克各切欽也春秋傳周封胡公於陳以備三恪杜預注云周得天下封夏商二王後又封舜後謂之恪其禮轉隆示欽而已故曰三恪明皇𥘉以魏周隨十載暐羽鬼切幄帟夷益切周禮注云四合象宫室曰幄帟平帳也幄中坐主承塵也幄帟皆以繒為之皿眉永切器皿飯罌於耕切缶也淘盆徒刀切以犍米笊籬上阻教切下音離漉器明皇為安祿山以銀絲織之校獵户教切周禮校人掌王田獵之馬校獵者大為闌校以遮禽獸而獵取之也絡繹夷益切絡繹言不絶也襁褓上舉兩切下音保負兒衣舁之羊諸切共舉也休珉眉巾切揣知初委切度也弛施氏切解也廷玠居拜切能元皓奴代切何氏姓苑云能姓長廣人爪牙側絞切猶鳥獸之有爪牙以為衛也雍奴於用切雍州縣名天寶元年更曰武清箋奏則前切説文表識書也小校戶教切西洱而止切又仍吏切河名京觀工亂切積尸封土其上謂之京觀癘力制切疾癘也調兵徒釣切調謂計發之也振野之刃切動也葛羅盧佐切隘烏懈切俱斃毗祭切汧陽輕煙切邑名屬瀧州詬曰詐侯切鄉導許亮切趨鄉而引導也筯膠舉欣切中鞍竹仲切冠簮緇參切首笄也十一載囂然虛驕切喧也鉷户公切繇餘招切挾彈徒案切刀匕畢履切銲侯旴切邢縡邢奚經切姓也縡子亥切稱蚩陵切所綰烏版切隰州習入切憂悶莫旱切又莫困切煩悶以張豬亮切杜預云張自侈大也側足札色切傾側立不安巳任汝鴆切扼腕乙革切把也下烏貫切手腕震懾質涉切懼也彖吐玩切控馬苦貢切引也信宿如字左氏一宿為信再信為次窟苦骨切窟穴嘷乎刀切説文咆也左氏豺狼所嘷棣王大計切琰以冉切祝詛祝音呪詛莊助切亦祝也鷹狗坊於陵切唐制間廏使押五坊以供時狩一曰雕坊二曰鶻坊三曰鷂坊四曰鷹坊五曰狗坊朝請才姓切憂憤房吻切悶也十二載差繆𥘉加切舛也靡幼切戾也抉一決切挑也含珠胡紺切説文送死口中珠玉也褫金丑豸切奪也蔑如莫結切無也閭閻余廉切里中門磧西七迹切家隊杜罪切羣也迅疾思晉切迅亦疾也餉遺式亮切饋也菩薩薄胡切下蘇葛切昱余六切乃曩亥切載采此宰切書傳云載行采事也稱其人必言其人所行集事某事以為驗觀行胡孟切庾勇主切唐紀三十三通鑑卷二百一十七起閼逢敦牂盡柔兆涒灘四月即甲午至內申凡二年有竒元宗至道大聖大明孝皇帝下之下十三載琪渠之切翰林侯旰切明皇始置翰林院書畫胡卦切俗作畫間廏居又切唐制六間亦號六廏聖曆中置間廄使羣牧莫六切唐制諸牧監掌羣牧孳課每歲孟秋羣牧使以諸監之籍合為一以仲秋上於太僕寺隴右羣牧使隴魯勇切使所吏切自京師西屬隴右有七馬坊麟德中置隴古三使領之總監上作孔切下居陷切麟德中置八使分總監坊秦蘭原渭四州及河曲之地凡監四十有八南使有監十五西使有監十六北使有監七鹽州使有監八嵐州使有監二及隴右七坊三使也飼之祥吏切亦作飼告身選舉志親品及流外則判輔皆紿以符謂之告身沿河余專切緣水而下也長樂坡樂音洛坡普禾切説文阪也琡昌六切火拔州火拔州系羈縻州開元中置隸北庭都護府後不復見燕山於焉切燕山州隸靈州都督府如璆渠尤切皋蘭姑勞切以渾部置臯蘭都督府諲伊真切曲環曲丘六切姓也宓羊畢切洮陽音叨後周武帝逐吐谷渾置洮陽郡兼置洮州新史地里志洮州有洮陽城澆河堅堯切地里志云廓州本澆河郡吐蕃傳云置澆河郡於積石西廓州逹化西有積石軍蓋因積石山為名神䇿軍兵志云哥舒翰破吐審臨洮西之磨環川即其地置神䇿軍後魚朝恩以神䇿軍屯苑中分為左右廂居北軍右遂為天子禁軍峴胡典切災沴郎計切説文水不利也引五行傳若其汵作禕吁韋切斌悲巾切澧陽里第切即澧州十四載悉諾邏郎佐切悉諾邏者蘇毗王沒陵贊子也逡巡七倫切行不進貌光翽呼外切輔璆琳扶雨切輔姓也璆琳其名也華原胡化切邑名屬耀州逹奚胡雞切後魏復姓撲殺弼角切踞牀居御切反企也秣馬莫曷切食馬穀也愕然逆各切驚也詰朝喫吉切下如字翌旦也薊城吉詣切薊州之城鐡輿羊茹切舁車也鼓譟先到切鼓且譟也瓦解户懈切自解散也射生神夜切唐制擇便騎射者置衙前射生手千人憚賊徒案切挑馬徒了切弄也博陵定州土門鎮州有土門關常山鎮州杲卿古老切質其陟利切欽湊千候切井陘口奚經切井陘口亦曰土門著此陟略切謂者祿山所賜金紫也防禦使偶許切百官志云武后以夏州都督領鹽州防禦使安祿山反諸郡當賊衝者皆置防禦守捉之使也靈昌滑州以絙居登切大索也浮梁龍張切橋梁也散漫謨官切又莫半切忷懼虛容切又許拱切説文擾恐也其忿撫吻切悁怒平原德州浚濠須問切下音豪浚深也豪城下也易之以䜴切輕也滎陽惠扄切鄭州無詖佊義切蹂之女九切踐也憕直陵切潼關徒紅切在􅉑州䦩縣豕突施氏切豕性觸突人故取以為喻睢陽音雖宋州單父時戰切下音甫縣名屬宋州璘離珍切源洧羽軌切有名也璬吉了切橫發户孟切不順理也銜土乎巖切含也蒲身薄胡切縛蒲草為其身也訾嗣賢即移切何氏姓苑云公齊人本姓祭氏漢有訾順狂悖蒲昧切又蒲沒切亂也籧篨上求於切下陳如切説文籧篨粗竹席也藉其才夜切依藉也火拔虜復姓元和姓纂云突騎施首領火拔石失畢即歸仁父也僕固復姓本敕勒諸部名也亦曰僕骨金微金微府以僕固部置考異云舊書作金徽今從實録唐曆臯蘭臯蘭府以渾部置犒口到切餉也勞之郎到切要膂上伊消切下兩舉切郟城訖洽切縣名屬汝州屏語必郢切肅宗文明武德大聖大宣孝皇帝上之上至德元載栖曜先齊切數之色主切瞋目稱人切張目也羯奴蹙子六切迫也逗留上火透切下力救切稽留不進也槍槊色角切長矛射之食亦切瞬息輸問切瞬謂開闔目也息謂喘也三塹七豔切坑塹縻其忙皮切繫也儲偫上陳如切下文里切猶蓄積也惶懅其據切懼也管鑰弋灼切搏鍵也整比毗志切又如字比謂校次之也黎明如字黎猶比也謂比至天明也愀然七小切色變也重困儲用切甫也三衛唐制大子居曰衙衙凡朝會之仗三衛畨上分為五仗號衙內五衛皆帶刀捉仗列坐于東西廊下擾攘汝兩切優也撲滅晉卜切擊滅也糲飯郎葛切脫粟手掬居六切在手曰掬逞其丑郢切快也播越輔火切又輔過切璟居永切嚴邃雖遂切深逺也暏董五切見也馬嵬五回切在咸陽西憤房吻切怒也中鞍竹仲切揭其丘傑切舉也所檛陟瓜切捶之也喧譁上許元切亦作歡下胡瓜切處之敞吕切諤逆各切晷刻居洧切日景縊殺一賜切絞也河龍魯勇切河西隴右夕離力智切去也跋馬蒲撥切回也倓音談執鞚苦貢切馬勒興復房六切棧道助諫切棧閣即閣道也溫凊七正切禮記冬溫而夏清俶昌六切偵之丑正切問也飛龍廏居又切通天元年置仗內六閉一曰飛龍二曰祥麟三曰鳯苑四曰鵷鸞五曰吉良六曰六羣亦號六廏衰耄莫報切老也茇涉蒲撥切草舍一曰草术根本亦作跋草行曰跋𥚹小禆𬗟切訣别苦穴切絶也玨訖嶽切烏氏漢安定縣名烏水出西北入河氏音支肅宗是年改曰保定屬涇州監牧居陷切謂州有馬監扈從侯古切下才用切扈衛侍從也璬古了切瑁莫報切豐稔忍甚切熟也瑀王矩切泌兵媚切又薄必切璡即刃切垍巨至切汧隴輕煙切汧水在安定粗猛倉胡切賄呼隗切俌方矩切漪於冝切涵胡南切且籍秦昔切謂為之簿籍暹思廉切葺七入切又音集杜預云葺覆也謂以草覆之也次舍式夜切謂葺所當次舍之處也左氏一宿為舍再宿為信過信為次庀匹婢切皆倣甫兩切撤之敕列切去也琯古緩切怏怏倚兩切志不滿也﨑嶇上去竒切下音區山路也欷歔香衣切又許既切下休居切歎息貌彚于貴切珙居悚切餘杭户郎切縣名屬杭州刳其空胡切剖也鐡掊蒲侯切説文杷也渙呼玩切蘄春渠之切即蘄州瓌姑回切諲伊真切綰烏版切雍丘於用切縣名屬汴州縛藁古老切禾稈夜縋馳偽切垂繩而下也春秋傳夜縋而出使諜逹協切軍中反間者焉知於虔切白沙渦烏戈切地名咽喉因肩切字或從肉承玼雌氏切左脅迄業切説丈兩膀也坐部立部明皇分樂為二部堂下立奏謂之立部伎堂上坐秦謂之坐部伎鼓吹尺偽切北狄馬上之聲自漢以後以為鼓吹亦軍中樂馬上奏之故唐以隸鼓吹部散樂蘇旱切明皇為平王有散樂一部定韋后之難頗有預謀者及即位命寧王主藩邸樂以亢太常分兩朋以角優劣置內教坊於蓬萊宫側居新聲散樂倡優之伎霓裳羽衣研奚切明皇時河西節度使楊欽忠獻霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩為麗郎計切美也為樂力各切娛也茅茨疾兹切茅茨以草覆屋也茅茨不翦土階三等謂堯舜也菲食敷尾切薄也惡衣服菲飲食謂禹也殫耳多寒切極也窺窬容朱切私視鑾輿盧官切鑾鈴也崔豹古今注云五路衡上金雀者朱鳥也口銜鈴鈴謂之鑾也睨之研計切脾睨邪視擲樂直炙切投也支解佳買切支分也大索色百切求也為空于偽切京畿渠希切天子千里地以逺近言之則言畿也鄜坊芳無切並州名冡嗣知隴切大也衣黃於既切著也從容千容切猶休燕也鑰契弋灼切鑰關牡也契謂魚契玢悲巾切承寀此宰切敦煌徒門切即沙州庸調徒弔切定省息井切昏定晨省也慷慨上苦莾切下丘蓋切竭誠也惡烏故切不懌夷益切不恱也驃國毗召切南蠻國名古朱波也自號突羅朱闍婆國人曰徒里拙在永昌南二千里唐紀三十五通鑑二百一十九起柔兆涒灘十月盡強圉作噩閏月即丙申至丁酉不滿一年肅宗文明武德大聖大宣孝皇帝中之上至德元載泝江蘇故切逆流而上曰斥洋川音祥洋州漢戚夫人生於洋川髙帝寵之名其川曰洋以表誔生之休祥也榷鹽訖嶽切榷謂總利入官漢書音較板蕩板音版板蕩詩大雅二篇名上帝板板下民卒疸板板反也言反先王與天之道也蕩蕩上帝下民之辟蕩蕩法度廢壞之貌也禆將頻彌切將之偏副也陳濤斜咸陽地名鼓譟先到切擾也宥之爰救切敦煌徒渾切年亦作燉縣名屬沙州承寀此宰切回紇下沒切可汗河干切戒酋稱妻之七計切毗伽求迦切奐干玩切暐羽鬼切系胡計切于幕末各切左氏猶燕之巢于幕上言至危也鋸殺居御切説文槍唐也通作鐻詈不力智切罵也所掠力灼切奪也負擔都濫切又都甘切説文荷也刀槊色角切矛屬葛邏支郎佐切回紇臣也入援于卷切助也榆林容朱切榆林之何勝川榆林縣有榆溪塞即蒙恬為秦闢地纍石為城植榆為塞是也洛交歷各切鄜州鞠養居六切詩小雅父兮生我母兮鞠我鞠養也瑒丑亮切鏐力求切金陵楚威王理金以鎮王氣故曰金陵晉武帝平吳曰秣陵元帝渡江都焉唐曰升州峴胡典切瑱他甸切願虞怨切繞城爾紹切縶其陟立切繫也遏路阿葛切遏絶其路也並塞步浪切近也下先代切掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之沿江余專刀詰其契吉切問也廣琛丑林切于闐堂練切又徒賢切西域國雍丘於用切縣名屬汴州睢陽音雖宋州空名苦貢切石堡博抱切石堡城在鄯山百谷如字又音浴百谷城在廓州雕窠丁聊切下苦禾切雕窠城在河州林邑乙及切林邑國漢日南象林之地直交州南侮行三十里其南大浦有五銅柱山形若倚蓋兩重巗東涯海漢馬援所植也摩訶虎何切漫多莫半切環王林邑更號環王也二載暏物董五切見也病疽千余切癰瘡捫枕謨奔切摸也疾亟訖力切疾也昏懦奴卧切又奴亂切詆訐典禮切毀訾也下居謁切告訐太行胡郎切太行山名在河內鑿壕胡刀切城下也作墼吉歷切説文瓴甋也一曰未燒者也增壘魯水切軍壁潛趣讀曰趨警邏郎佐切巡邏也少懈居隘切怠也榰之音支爾雅榰拄也葦筏房越切大曰筏小曰桴乘之渡水也旻眉巾切盡殪一計切散關寶雞有大散關駱驛歷各切駱驛言不絶也憩息去例切息也搗其都皓切耐寒乃代切忍也戒嚴如字警備也媯川俱為切媯州驕橫户孟切驕縱而暴橫也旗幟昌志切漢書音式志切幟幖也旗旗之屬即總稱焉鋒鏑丁歷切矢鋒也炬火臼許切束葦燒也挈家詰結切侃空旱切鄱陽蒲禾切饒州侁疏臻切傳舍張戀切韶光時昭切為之于偽切捐軀余專切激勵力制切勉也椎牛傳追切擊也邀之伊消切遮也渾户昆切白渠求於切地理志古白渠在京兆潏西古穴切水名在京兆長蛇陳陳讀曰陳液夷益切才易牆來切猶僅也衣金於既切之濫盧瞰切溢也鎬下老切弭亂綿婢切止也令珣力正切下須倫切沮之在吕切止也警備居影切戒也瞰城苦濫切視也霽雲子計切欲射食亦切又神夜切剡蒿以冉切鋭利也下呼髙切中者竹仲切殊死慵朱切焉有於虔切悖於蒲昧切亂也又蒲沒切道屈曲勿切琅邪余遮切即沂州千仞而振切濮陽博木切濮州廩米力錦切稟食一合葛合切兩􅕛為合饋救求位切餉也消耗虛到切損也半虹胡公切虹霓拄之冡庾切牚也鐡籠盧紅切盛火時征切棚閣蒲庚切棧也陊徒可切落也大鐶胡關切拓其託合切冒也金汁質入切液也銷鑠式灼切銷也磴道丁鄧切木柵測革切編立木為之披靡普彼切齧落魚列切考異云韓愈書張中丞傳云因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下按栁宗元霽雲碑云自噬其指曰噉此足矣今從舊傳廉坦他但切勞饗郎到切駱谷歷各切鳯翔盩厔有駱谷關唐紀三十六通鑑卷二百二十起強圉作噩九月盡著雍閹茂即丁酉至戊戌凡一年有竒肅宗文明武德大聖大宣孝皇帝中之下至德二載挑戰徒弔切擲嬈敵以求戰如古之致師回紇下沒切其先胸奴也元魏時亦號髙車部姓藥羅葛氏居薛延陀北娑陵水上距京師七千里可汗河干切戎酋稱葉護失涉切葉護回紇太子之號也又按突厥傳亦以為大臣之官俶昌六切灃水敷馮切水夕在咸陽輜重上莊持切載衣車也下直用切載物車也行者之所資總曰輜重餌仍吏切飼之也禆將頻彌切將之偏副胏附方廢切如旰肺之相附著擯必刃切斥也􅕖粉􅕖箋西切凡醯醬所和細切為􅕖粉謂粉碎也警蹕卑吉切警者戒肅也蹕止行人也澧音禮州名乾元元年鴻臚凌如切鴻聲也臚傳也所以傳聲贊導九賔淑妃神六切後宫女官名冎古瓦切剔人肉置其骨也歃血色合切啜也沁水七鴆切縣名屬澤州黜陟上丑律切貶也下竹力切升也狡猾上古巧切下户八切從容七恭切猶休燕也揆巨癸切璵音余俚兩耳切下俚也祟雖遂切神禍也怏快倚兩切志不滿也祑除失切鐡劵去願切説文契也釋名曰劵綣也相約束繾綣為限也以鐡鐫之故云鐵劵裝囊上側羊切下奴當切橐也有底曰囊裝者褁束之也搒殺音彭擊殺之也函胡讒切匱也捶止蘂切擊也第五琦第五姓也琦渠冝切瑀王矩切訣古穴切別也赭止也切赤色嚮者許亮切猶疇昔也骨啜姝恱切回紇臣名泚千禮切􅉑古獲切州名黨項多曩切漢西羌别種居古析支地拓拔戎德拓他名切拔蒲橃切其本代比元魏復姓愎弼力切很也琛丑林切大食西域國本波斯地鼓譟先到切羣呼也滏陽扶雨切縣名屬磁州邢洺上奚經切下彌并切二州名洹水于元切縣名屬魏州浙江之列切江水東至會稽山隂為浙江處崟魚音切覬覦上音兾下音踰覬幸也覦欲也謂幸得其所欲眄普莧切顧也惴之瑞切憂懼也斧質上匪父切斫也下讀曰鑕職日切鍖也古者斬人加於鍖上而斫之唐紀三十七通鑑卷二百二十一起屠維大淵獻盡上章困敦即己亥至庚子凡二年肅宗文明武德大聖大宣孝皇帝下之上乾元二年摯脂利切藉田秦昔切藉借也帝藉千畝古者使民如借故謂之藉所中竹仲切傷也荔非元禮荔郎計切荔非虜姓漳水諸良切山海經曰漳水出荆山南注于沮水灌古玩切澆也棧仕諌切棚也淘徒刀切浙也牆䴰逸織切麥也用以圬墻故云牆䴰抄掠上初交切又楚教切下力灼切劫奪人財也飢饉上居依切下渠吝切穀不熟曰飢𬞞不熟曰饉邏郎佐切巡也剽掠匹妙切劫掠也窘蹙上渠殞切下子六切迫也促也唁魚變切弔唁擐甲胡慣切貫也春秋傳云擐甲執兵稽首音啔首至地也諲伊真切旻眉巾切鞠獄居六切窮理罪人也守捉側角切毗伽求迦切殉松閠切以人從死也𠢐靣陵之切剝也飛龍廏居又切馬舍名鎣余傾切烏定切詰責去吉切問責也曄筠輒切餞才箭切送行飲酒也銜枚音咸若馬之銜勒所以止言語歡囂令人不知周官有銜枚氏枚狀如箸橫銜之汜水音凡縣名屬孟州閽者音昏守門人也潞沁七鴆切二州名屬河東道盩厔上張流切下陟栗切縣名屬鳯翔府山曲曰盩水曲曰厔光晟時正切沔莫踐切州名為質職利切物相劕也崿嶺五各切殿丁練切軍後曰殿炬臼許切束葦燒也掎舉綺切牽其後曰掎瞋目昌真切張目也彘直例切豕也搏伯各切索持也縶陟立切繫也絆馬也亦作􅎗艘蘇刀切船總名貯展吕切義𥘉加切炮石披教切機石希皓下老切柵測革切寨柵繕時戰切修也中灘大亶切江東人呼水中沙堆為灘河南縣有中灘城塹七艷切坑也郝庭玉郝黑各切姓也颭旗職琰切風動物也鞾許茄切鞮屬剄古挺切斷首也㻛丑亮切又杖梗切璜玉胡光切駐株遇切馬立重輪錢按食貨志曰第五琦為相命絳州諸爐鑄重輪乾元錢徑寸二分其文亦曰乾元重寶背之外郭為重輪故稱重輪錢踊尹竦切殍𬒳表切餓死曰殍賀蘭進明賀蘭本虜號後以為姓溱側詵切州名礓子坂礓居良切坂甫逺切山坡曰坂在陜州莎柵素何切地名上元元年于闐徒賢切又徒見切西域國鄜芳無切州名維瑾渠遴切玠音介翽呼外切武成王開元十九年始置太公尚父廟至上元元年尊太公為武成王祭典與文宣王比以歷代良將為十哲亞聖十哲唐尊齊太公為武成王以歷代良將為十哲象坐侍秦武安君白起漢淮隂韓信蜀相諸葛亮唐衛國公李靖英國公李績列于左漢太子少傅張良齊大司馬田穰苴吳將軍孫武魏西河太守吳起燕昌國君樂毅列于右以良為配羌渾胡昆切羌謂西羌黨項之屬渾謂吐谷渾皆近吐蕃故連言之順天得一錢按食貨志曰史思明據東都鑄得一元寶徑寸四分以一當開元通寶之百既而惡得一非長祚之兆改其文曰順天元寶仙媛于眷切垣墉上于元切下餘封切城墻也射生神夜切善射者湫隘上子了切下烏懈切馬鞚若貢切馬勒也尫烏光切弱也灑掃沙下切汛灑而掃除也茹葷上人恕切食之也下許云切臭菜也辟穀賔亦切除也漢張良道引不食穀孟康曰服辟穀藥而靜居行氣也猶豫餘救切玃屬居山中聞人豫發木無人乃下謂不決也一説𢤱西以犬子為猶每隨人行忽先忽後亦曰猶豫臨洮他刀切即洮州如璆巨鳩切涇原音經二州名屬關內道銑蘇典切倔強其勿切倔強梗戾也儇呼緣切屈突孝摽屈曲勿切虜姓摽卑搖切徇徐閠切略也濠胡刀切州名暅古鄧切伯瑛於京切愔揖淫切郁墅承與切嶧羊益切晃胡廣切滁音除州名唐紀三十八通鑑卷二百二十二起重光赤奮若盡昭陽單閼六月即辛丑至癸卯凡二年有竒肅宗文明武德大聖大宣孝皇帝下之下上元二年蒜蘇貫切山名在丹徒仆方遇切僵也滑户八切州名常熟如字縣名屬蘇州縣有常熟山罹鄰知切遭也荼毒同都切郴丑林切州名黔中渠金切即黔州涪房尤切州名奴刺盧逹切渾奴刺也吐谷渾自稱曰渾主故以渾奴刺言之大散關如字又蘇旱切在鳯翔寶雞􅞥以制切金嶷鄂力切新羅王名久戍春遇切守邊也愎弼力切很也邙山莫郎切在河南洛陽薄之伯各切迫也泄思列切漏也監泥古銜切臨督之也駱恱駱歷各切姓也俯首美辨切俯也鞴馬平袐切駕鞍也傔人詰念切侍從者縊殺於計切經也橐駝撻各切駱駝其背肉以橐故云槖駝丘墟丘於切大丘羈縻忙皮切羈馬絡頭也縻牛紖也言牽制之故取喻也如玢悲巾切尚衡時亮切姓也能元能音奈姓也泫然熒絹切岌逆及切好畤音止縣名屬鳯翔府皆見形甸切可斷徒玩切􅎒也菩蕯上蒲逋切下桑葛切釋典云菩之言了薩之言見謂智慧了見也金剛佛氏有金剛之號取金有百煉不壞之謂也膜拜莫胡切胡人拜曰膜建子月建子月以十一月為歲首時肅宗改制度故不以數紀月以斗所建辰為名至明年建已月復稱四月殿最丁練切上功曰最下功曰殿無準主尹切簿責裴古切謂為文簿一一責之也正旦諸成切正月朔旦也澠池彌兖切河南縣寶應元年琮徂宗切什取實入切白著直略切民有資産無因而強取之故曰白重足直容切又直用切纍也耗散虛到切損也陳腐陳久也下音扶雨切爛也抵罪典禮切漢書注云扺至也當也畚鍤音本草器也下測洽切鍬也合從子容切以利合曰從瞑莫定切閉目也瑱他甸切茙而中切侁疏臻切恍惚上火廣切下音忽𠢐靣陵之切剝也難乃旦切疾亟訖力切僩下赧切嘔血於口切吐也適古活切益橫户孟切縱橫不以理也尚父如字周號太公為師尚父劉向別録曰師之尚之父之故曰師尚父父亦音甫男子之美稱也岑助簪切麴丘六切麴糵屑食先結切碎也傪七感切又倉含切行伍胡剛切逈户頂切憤咽房吻切滿也下一結切塞也沿漢余專切緣水而下也可汗河干切戎酉稱子昂五剛切欣喜斤切州名太行胡剛切在懷州踞斤於切左殺虜分掌兵者謂之左右殺同軌居洧切地名並南步浪切依也璘離珍切披靡普彼切胄直又切衣𥿄於寄切恪克各切睢陽音雖宋州嵩息中切成德成德藩鎮自李寶臣始更二姓傳五丗至承元入朝明年王庭湊反傳六丗有州四曰常兾深趙撤敕列切去也代宗睿文孝武皇帝上之上廣德元年藩鎮孚袁切自安祿山史思明之亂肅宗幸安分河北之地付授叛將後遂效戰國肱髀相依以土地傳子孫謂之藩鎮祚燕上存故切下音煙詭古委切詐也一䬸陸德明音七丹切吞食也又音孫熟食曰䬸餉式亮切饋也蹙子六切貝磁牆之切州名魏博魏博藩鎮自田承嗣始傳五丗至田洪正入朝十年復亂更四姓傳十丗有州七曰貝魏傳相磁洛衛盧龍盧龍藩鎮自孕懷仙始更三姓傳五丗至劉總入朝六月朱克融反傳十二丗有州九曰幽涿營瀛莫平薊媯檀燧徐醉切母暴微夫切止之也遺之以醉切而輕牽正切疾也春秋傳戎輕而不整聽事湯丁切治官處也後加廣綰烏版切煬餘亮切加帖託協切永隆二年以劉思立建言乃詔明經試帖粗十得六以上進士試雜文二篇通文律者然後試䇿帖栝古活切謂為機括而誧之以求僥幸省所景切聲病並如字謂以聲律求疵病也僑渠嬌切寄也保桑梓祖似切詩云維桑與梓者言父之所植也保桑梓謂居其鄉土者唐紀三十九通鑑卷二百二十三起昭陽單閼七月盡􅏧蒙大荒落十月即癸卯至乙巳凡二年有竒代宗睿文孝武皇帝上之下廣德元年頡咄上奚結切下當沒切伽求迦切娑桑何切祭酒胡廣云凡官名祭酒皆一位之兀長古者賔客得主人饌則老者一人舉酒以祭地故以祭酒為稱大震關如字隴州汧源有大震關後改曰安戎鄯音善州名拓撻各切開也糗糧去九切書傳云糗糒之糧也監牧居陷切唐自正觀至麟德馬數番息於𡵨幽涇寧間置八坊為八十四監以牧之監牧之名始於此邏郎佐切巡也𧖟食徂含切謂稍侵暴如𧖟之食葉也左衽忍甚切衣襟也左衽謂皆為夷狄矣犒口到切餉也塞先代切邊塞榆次容朱切縣名屬太原府靺鞨莫葛切下何葛切北狄也睿宗時拜太祚榮為渤海郡王自是稱渤海也姓茹如倨切酒酣胡甘切洽飲也纒頭呈延切纏頭綵組織總古切共相組織言交口誣奏如紕繡織成也玢悲巾切比周毗志切阿黨也嫉昨悉切妬也詆典禮切訾也利行下孟切漢書忠言逆耳利於行翊逸織切部曲如字漢書注云大將軍營五部部有曲也司竹司竹園在鳯翔盩厔縣盩厔上張流切下陟栗切縣名屬鳯翔府令公力正切郭子儀時為中書令故稱令公武關在商洛縣東趣七俱切嚮也寶應軍於證切代宗以射生軍入禁中清難皆賜名寶應功臣故射生軍又號寶應軍伉口浪切三輔京兆馮翊扶風療力照切治也飲藥於禁切飲之也繇古由字悛且緣切止也王甫按考異載實録有武將王甫誘長安惡少大鼓於朱雀街吐蕃遂夜遁又汾陽家傳有射生將王撫領騎卒輔官屬以謀作亂市舶薄陌切海船曰陌持滿謂注矢於弓弩引滿而不發矢鄠侯古切縣名屬京兆倩倉甸切二年子午子北方午南方言通南北道相當故謂之子午谷其地從京兆杜陵直絶南山徑漢中也縉即刃切鳴鏑丁歷切骹箭也語牛據切間居莧切乘傳張戀切乘傳者依承符傳而行若使者持節尓傳以木為之長尺五書符其上以為信堙伊真切塞也挼穗奴回切又奴禾切手縈摩也下徐醉切禾成秀也五紀曆代宗以至德曆不與天合詔司天臺官屬郭獻之等復用麟德元紀寫大衍舊術帝為製序題曰五紀曆青苗眉鑣切唐租庸調之法壞代宗始以畒定稅而斂以夏秋時又以國用急不及秋苗方青即征之號青苗錢俸房用切秩祿也蝗胡光切食苗蟲戒嚴如字警備也乾陵渠焉切在奉天涉涇堅丁切水名在涇州徒行厲水曰涉朱耶余遮切朱耶夲西突厥以後改曰沙陀而以朱耶為姓躄必益切跛不能行也若屬並如字若汝也火伍並如字兵志十人為火五火為團伍行伍也擊柝他各切兩木相擊以行夜也于闐唐練切又徒賢切西域國名永泰元年都試如字謂總閲試習武備也霍光傳出都隸郎孟康注都試也鉗口其廉切鐡有所結束曰鉗忠鯁古杏切亦作鯁骨強四支喻君有忠臣謂之骨鯁杼柚直吕切謂賦斂之多杼柚為空也詩小東大東杼柚其空椎剽傳追切下匹妙切謂相擊而剽掠也詰喫吉切問也刺郎葛切洎巨至切及也畨禺上音潘下音愚縣名屬廣州屝屨父沸切草履也諝思吕切榷酤音角設一木以渡水曰榷謂官自酤賣酒獨收其利也菽式竹切豆也曖於代切沈式荏切姓也鹵簿郎古切炙轂子云與駕行幸羽儀導從謂之鹵簿按字書鹵大楯也甲楯皆著之簿籍儀衛具五兵獨以甲楯為名者行道之時甲循在外餘兵在內故言鹵簿索色百切求也扞侯旰切衛也餌仍吏切食之也陳直刃切胄直祐切兜鍪也酋自秋切長也可敦可敦者可汗妻號猶單于言閼氏也酹地盧對切餟祭也監古銜切之右右猶上也唐紀四十通鑑卷二百四十四起􅏧蒙大荒落閠月盡昭陽赤奮若即乙巳至癸丑凡八年有竒代宗睿文孝武皇帝中之上永泰元年旰古旦切寶輿羊茹切舁車也以七寶飾之巙渠龜切昕許斤切大曆元年常參官倉含切謂朝會也唐制文官五品以上及兩省供奉官監察御史貟外郎太常博士日參號常參官也武官三品以上三日一朝號九參官五品以上及折衝當番者五日一朝號六參官洪文崇文館國子監學生四時參凡諸王入朝及以恩追至者日參其文武官職事九品以上及二王後則朝朔望而已無門籍秦昔切謂未得通籍出入禁門者仗家直亮切謂為儀衛者喑嗚於金切語喑啞不明中傷竹仲切四鎮龜兹于闐焉耆疏勒覆餗送鹿切易鼎卦覆公餗釋文云餗八珍之其也成均如字周禮大司樂掌成均之法董仲舒云成均五帝之學也垂拱元年改國子監曰成均監後復舊長也展兩切斌悲巾切臠食力兖切臠切其肉而食也余元仙余羊諸切姓也同華户化切同華二州名歷數所矩切數責以過失也差𥘉加切差次也宣歙失涉切二州名二年恚於避切恨也鄙諺魚戰切俚俗所傳之言也翁烏紅切閨涓畦切閨説文云特立之户上圜下方有似於圭萬億乙力切十千曰萬十萬曰億郢以井切禳如羊切除也闥上曷切宫中小門也確至克角切堅也無恙餘亮切憂也一曰蟲入腹食人心古者草居多𬒳此毒故相問無恙乎獠魯皓切又竹狡切戎夷別名譴詰戰切謫也三年倓徒感切又音談泌兵媚切躡屨昵輒切屨説文履也一曰鞮屬給舍式夜切謂給事中中書舍人皆唐制正五品官也泚此禮切盂蘭盆上雲俱切盂蘭盆經云目連以母生餓鬼中佛令作盂蘭盆至七月十五日以百味五果著盆中供養十方大德而後母得食也一説盂蘭盆者天竺國語也猶中華言散倒懸也今人遂設盆以為供誤矣尚贊摩吐蕃酋長岵侯古切奭施隻切掌漏郎豆切刻漏也刻漏法以銅為渴烏狀如鈞曲注水以浮刻漏之箭掌漏者謂守漏人也更古衡切杲古老切駐株遇切四年衷甲音忠左氏傳楚人衷甲注云衣在甲中家僮徒紅切奴也涪房尤切州名涵胡南切逗遛上音豆下力救切謂稽留不進悍戾侯旰切仆地芳遇切僵也五年暹思廉切地牢郎刀切於地為牢獄訊掠思晉切問也下力漾切笞也懌夷益切悅也衣緑於既切忿爭撫吻切強巨兩切勉也稱昌孕切冝也不軌居洧切不修法制也郿虢旻悲切漢書音媚郿虢並扶風縣名禁旅兩舉切衆也説文軍五百人為旅度逹各切鉥食律切束裝側羊切説文裏也屬之欲切託也六年綿亘古鄧切綿聮亘極也汧隴輕煙切汧謂汧水隴謂隴坻皆在隴州隴坻典禮切隴坻謂隴陂即隴山也翃乎萌切璀取猥切五嶺大庾嶺在虔州永明嶺白芒嶺在道州臘嶺在郴州臨源嶺在桂州駮北角切絀敕律切亦作詘説文貶下也滉户廣切七年歐於口切擊也伺間相吏切下居莧切八年崿五各切跋扈蒲撥切跋扈猶強梁也封籍秦昔切籍謂疏録之也按堵音覩言不遷動如堵牆也侯莫陳三字姓也怤芳無切縑吉嫌切駑瘠農都切駑駘也下秦昔切瘦也晃户廣切賁彼義切邭須倫切辮髮婢典切説文交也黃萯原萯蒲昧切新史作黃菩原音步後切黃菩乃草名或通作萯掎其舉綺切牽其後曰掎資治通鑑釋文卷之二十三
