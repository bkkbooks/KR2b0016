  text: 資治通鑑釋文卷第二十三
  hash: sha256:2da17229fcf6729d3bfdac580eb74b66740011716e9b14e909130219967a8bfb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_023-1a}
body:
  text: 右宣義郎監成都府糧料院史炤唐紀三十一通鑑卷二百一十五起元點敦䍧盡強圉大淵獻十一月即壬午至丁亥凡五年有竒元宗至道大聖大明孝皇帝中之下天寳元年平盧龍都切平盧軍隷營州𥘉置節度使羈縻忙皮切繫也自太宗乎突厥蠻夷稍稍内屬即其部落列置州縣大者爲都督府號爲羈縻凡府州八百五十六也龜兹音丘慈西域國焉耆音煙支西域國于闐堂練切又徒賢切西域國瀚海侯旰切瀚海軍隷北庭天山軍在西州伊吾軍在伊州北庭節度使兼統之下倣此也斷隔徒管切絶也張掖夷益切郡名守捉竹角切唐戍邊者曰守捉掎角舉綺切偏引也左氏傳曰晉人角之諸戎掎之岢嵐口我切下盧含切軍在嵐州幽薊吉詣切並州名嬀檀俱爲切並州名靺鞨莫曷切下何葛切北狄寧塞先代切廓州軍後曰寧邊嶲柘悉委切並州名經略力灼切桂容邕交廣五州有經略軍夷獠魯皓切西南夷長樂歷各切福州郡名有經略軍東萊郞才切萊州有東萊守捉亦曰團結營東牟莫侯切登州東牟守捉亦曰乎海軍尹喜庾凖切崔浩云尹喜爲散關令也蓋老子甞過尹喜故田同秀託言藏靈符在尹喜宅耳函谷胡南切古關名明皇旣獲寳符改元天寳又更桃林縣曰靈寳屬陜州函谷關在縣西南十里倕是爲切鉷胡公切㗖以徒濫切絢翾縣切賔詹之廉切謂太子賔客詹事官歎吒陟駕切怒也澣胡管切可汗河干切戎酋稱昕許斤切大纛大到切又音毒葉護失涉切酋長自秋切頡跌徒結切臘哆丁可切又尺氏昌者二切西殺突厥官分掌東西兵者號左右殺護宻西域國元魏所謂鉢和者直京師九千里二年奭施隻切孝韞委粉切朏敷尾切滻水所簡切水出京兆藍田谷入㶚百艘蘇曹切船緫名扁榜𥙷與切从户从冊户冊者立門户之文也缺胯苦化切股間也裼之先的切袒裼之紅袙普駕切通俗文曰帛三幅曰袙連檣慈良切埤蒼曰檣颿柱也颿音符咸切又符泛切本亦作䑺㠶舟上幔所以汎風者以貯丁吕切積也三載音宰載年也法堯舜時名年曰載台明湯材切並州名黜陟竹力切書三載考績三考黜陟幽明黜退也陟升也夫蒙元和姓纂云本西羌人後秦建威將軍夫蒙羌今蒲同二州多此姓或改姓馬氏通鑑考異云㑹要作馬靈察從實録作夫蒙也靈察𥘉戞切黒姓迄得切突騎二部種人自謂娑葛後者爲黄姓蘇禄部爲黒姓犍山居盲切烏德犍山唐曆云即欎督軍山虜語兩音也又渠焉切遯甲杜本切又去聲睢陽音雖即宋州更爲上音庚下于僞切潜内内讀曰納上厭於豔切四載回紇下没切可敦突厥妻號可敦橐中撻各切囊也伺其相吏切仁亶多旱切逗留上大透切下力求切稽留不進垍巨至切號呼上胡刀切下火故切嶷鄂力切談謔迄却切戯也白額虎鄂格切晉周處不脩細行爲人所惡父老歎三害未除處曰何也荅曰南山白頟猛獸長僑下蛟并子爲三矣處乃入山射殺猛獸投水搏蛟殺之勵志好學也鍜錬都玩切小冶羅鉗其廉切時人謂羅希奭爲鐡鉗銛思廉切錡渠冝切又魚倚切釗之摇切鮮于相然切複姓中女如字又音仲郫音皮縣名屬成都府樗蒲抽居切博戯劉毅與劉𥙿樗蒱一擲至數百萬皎吉了切誗直嚴切五載金礦古猛切金墣也王氣于况切縉雲即刃切縣名屬處州控制苦貢切墨離莫北切瓜州西北千里有墨離軍霅直甲切荔枝郞計切荔支果名魏文帝詔曰南方有龍眼荔枝妬悍都故切妬忌下侯旰切悍急不懌夷益切恱也儲偫丈里切猶積蓄也斌悲巾切㻆胡畎切良娣待禮切又上聲漢書注云良娣官也太子有妃有良娣有孺子凢三等鄴郡魚列切六載語之牛據切莫邪余遮切干將莫邪二劒名干將吴人也闔廬使造劒二枚一曰干將一曰莫邪莫邪者干將之妻名干將作劒金鐡之精未肯流干將夫妻乃斷髪翦指拔之鑪中金鐡乃濡遂以成劒琯古緩切裸露魯果切袒也愚聵五怪切聾也俚言音里鄙也詼諧枯回切譏戯也哥舒居何切元和姓纂云突騎施本號西陵突厥首領有哥舒部氏焉大斗涼州有亦氷軍大斗軍因大斗抜谷爲各倨慢居遇切不恭檛殺陟瓜切箠也石堡愽抱切吐蕃石堡城秣馬莫葛切食馬糓充牣而振切滿也黔中音黔即黔州禳之如羊切輙躶與祼同鉉胡大切瑄荀縁切戯水許冝切漢書庄云水名也在新豐東南三十里其水本岀藍田北界横領至此而北流入渭若解下懈切曉也温湯它郎切在照應詬而許候切禁闥他逹切博雅闥謂之門擠䧟牋西切擠排也馮翊逸織切邑名屬同川華隂户化切邑名屬華州爲空于僞切岫似救切騶從側鳩切廏御者下才用切複壁方六切重也甃地側救切礮櫑披教切機石下盧對切埤蒼曰推石自髙而下也峻阪音反坡坂迎勞盧到切慰也唐紀三十二通鑑卷二百一十六起強圉大淵獻十二月盡昭陽大荒落即丁亥至癸巳凡六年有竒元宗至道大聖大明孝皇帝下之上天寳六載畢思琛畢壁言切姓也琛丑林切又捽昨没切持頭髪也倚氏於冝切邑名屬河中府纇目盧對切節纇傔苦念切侍從德詮且縁切仆地芳遇切頓也惕息他歷切契苾上音乞下蒲結切虜複姓七載驃騎毗召切勁疾兒爲翁烏紅切老稱也之爺以遮切俗作爺字父也一杵敞吕切疾惡烏故切三悋克各切欽也春秋傳周封胡公於陳以備三恪杜預注云周得天下封夏商二王後又封舜後謂之恪其禮轉隆示欽而已故曰三恪明皇𥘉以魏周隨十載暐羽鬼切幄帟夷益切周禮注云四合象宫室曰幄帟平帳也幄中坐主承塵也幄帟皆以繒爲之皿眉永切器皿飯甖於耕切缶也淘盆徒刀切以㸫米笊篱上阻教切下音離漉器明皇爲安禄山以銀絲織之校獵户教切周禮校人掌王田獵之馬校獵者大爲䦨校以遮禽獸而獵取之也絡繹夷益切絡繹言不絶也襁褓上舉兩切下音保負兒衣舁之羊諸切共舉也休珉眉巾切揣知初委切度也弛施氏切解也廷玠居拜切能元皓奴代切何氏姓苑云能姓長廣人爪牙側絞切猶鳥獸之有爪牙以爲衛也雍奴於用切雍州縣名天寳元年更曰武清牋奏則前切說文表識書也小校戸教切西洱而止切又仍吏切河名京觀工亂切積尸封土其上謂之京觀癘力制切疾癘也調兵徒釣切調謂計發之也振野之刃切動也葛羅盧佐切隘烏懈切俱斃毗祭切汧陽輕煙切邑名屬瀧州詬曰詐侯切郷導許亮切趨郷而引導也筯膠舉欣切中鞍竹仲切冠簮緇参切首笄也十一載囂然虛驕切喧也鉷户公切繇餘招切挾彈徒案切刀匕畢履切銲侯旴切邢縡邢奚經切姓也縡子亥切偁蚩陵切所綰烏版切隰州習入切憂懣莫旱切又莫困切煩懣以張豬亮切杜預云張自侈大也側足札色切傾側立不安巳任汝䲴切扼腕乙革切把也下烏貫切手腕震慴質涉切懼也彖吐玩切控馬苦貢切引也信宿如字左氏一宿爲信再信爲次窟苦骨切窟穴嘷乎刀切說文咆也左氏犲狼所嘷棣王大計切琰以冉切祝詛祝音呪詛莊助切亦祝也鷹狗坊於陵切唐制閑廏使押五坊以供時狩一曰鵰坊二曰鶻坊三曰鷂坊四曰鷹坊五曰狗坊朝請才姓切憂憤房吻切懣也十二載差繆𥘉加切舛也靡㓜切戾也抉一決切挑也含珠胡紺切說文送死口中珠玉也褫金丑豸切奪也蔑如莫結切無也閭閻余廉切里中門磧西七迹切家隊杜罪切羣也迅疾思晉切迅亦疾也餉遺式亮切饋也菩薩薄胡切下蘇葛切昱余六切廼曩亥切載采此宰切書傳云載行采事也稱其人必言其人所行集事某事以爲驗觀行胡孟切庾勇主切唐紀三十三通鑑卷二百一十七起閼逢敦䍧盡柔兆涒灘四月即甲午至内申凡二年有竒元宗至道大聖大明孝皇帝下之下十三載琪渠之切翰林侯旰切明皇始置翰林院書畫胡卦切俗作畫閑廏居又切唐制六閑亦號六廏聖曆中置閑廐使羣牧莫六切唐制諸牧監掌羣牧孳課毎歳孟秋羣牧使以諸監之籍合爲一以仲秋上於太僕寺隴右羣牧使隴魯勇切使所吏切自京師西屬隴右有七馬坊麟德中置隴古三使領之緫監上作孔切下居䧟切麟德中置八使分緫監坊秦蘭原渭四州及河曲之地凡監四十有八南使有監十五西使有監十六北使有監七鹽州使有監八嵐州使有監二及隴右七坊三使也飼之祥吏切亦作飤告身選舉志親品及流外則判𥙷皆紿以符謂之告身㳂河余專切縁水而下也長樂坡樂音洛坡普禾切說文阪也琡昌六切火拔州火拔州系覊縻州開元中置隷北庭都護府後不復見燕山於焉切燕山州隷靈州都督府如璆渠尤切皐蘭姑勞切以渾部置臯蘭都督府諲伊眞切曲環曲丘六切姓也宓羊畢切洮陽音叨後周武帝逐吐谷渾置洮陽郡兼置洮州新史地里志洮州有洮陽城澆河堅堯切地里志云廓州本澆河郡吐蕃傳云置澆河郡於積石西廓州逹化西有積石軍蓋因積石山爲名神䇿軍兵志云哥舒翰破吐審臨洮西之磨環川即其地置神䇿軍後魚朝恩以神䇿軍屯苑中分爲左右廂居北軍右遂爲天子禁軍峴胡典切災沴郎計切說文水不利也引五行傳若其汵作禕吁韋切斌悲巾切澧陽里第切即澧州十四載悉諾邏郎佐切悉諾邏者蘇毗王没陵賛子也逡廵七倫切行不進皃光翽呼外切輔璆琳扶雨切輔姓也璆琳其名也華原胡化切邑名屬耀州逹奚胡鷄切後魏複姓撲殺弼角切踞牀居御切反企也秣馬莫曷切食馬糓也愕然逆各切驚也詰朝喫吉切下如字翌旦也薊城吉詣切薊州之城鐡轝羊茹切舁車也鼔譟先到切鼔且譟也瓦解户懈切自解散也射生神夜切唐制擇便騎射者置衙前射生手千人憚賊徒案切挑馬徒了切弄也愽陵定州土門鎮州有土門關常山鎭州杲卿古老切質其陟利切欽湊千候切井陘口奚經切井陘口亦曰土門著此陟略切謂者禄山所賜金紫也防禦使偶許切百官志云武后以夏州都督領鹽州防禦使安禄山反諸郡當賊衝者皆置防禦守捉之使也靈昌滑州以絙居登切大索也浮梁龍張切橋梁也散漫謨官切又莫半切忷懼虚容切又許拱切說文擾恐也其忿撫吻切悁怒平原德州浚濠須問切下音豪浚深也豪城下也易之以䜴切輕也滎陽惠扄切鄭州無詖佊義切蹂之女九切踐也憕直陵切潼關徒紅切在􅉑州䦩縣豕突施氏切豕性觸突人故取以爲喻睢陽音雖宋州單父時戰切下音甫縣名屬宋州璘離珍切源洧羽軌切有名也璬吉了切横發户孟切不順理也銜土乎巖切含也蒲身薄胡切縛蒲草爲其身也訾嗣賢即移切何氏姓苑云公齊人本姓祭氏漢有訾順狂悖蒲昧切又蒲没切亂也籧篨上求於切下陳如切說文籧篨粗竹席也藉其才夜切依藉也火拔虜複姓元和姓纂云突騎施首領火拔石失畢即歸仁父也僕固複姓本敕勒諸部名也亦曰僕骨金微金微府以僕固部置考異云舊書作金徽今從實録唐曆臯蘭臯蘭府以渾部置犒口到切餉也勞之郎到切要膂上伊消切下兩舉切郟城訖洽切縣名屬汝州屏語必郢切肅宗文明武德大聖大宣孝皇帝上之上至德元載栖曜先齊切數之色主切瞋目稱人切張目也羯奴蹙子六切迫也逗留上火透切下力救切稽留不進也槍槊色角切長矛射之食亦切瞬息輸問切瞬謂開闔目也息謂喘也三塹七豔切阬塹縻其忙皮切繫也儲偫上陳如切下文里切猶蓄積也惶懅其據切懼也管鑰弋灼切搏鍵也整比毗志切又如字比謂校次之也黎明如字黎猶比也謂比至天明也愀然七小切色變也重困儲用切甫也三衛唐制大子居曰衙衙凡朝㑹之仗三衛畨上分爲五仗號衙内五衛皆帶刀捉仗列坐于東西廊下擾攘汝兩切優也撲滅晋卜切擊滅也糲飯郎葛切脫粟手匊居六切在手曰匊逞其丑郢切快也播越𥙷火切又𥙷過切璟居永切嚴䆳雖遂切深逺也暏董五切見也馬嵬五回切在咸陽西憤房吻切怒也中鞍竹仲切揭其丘傑切舉也所檛陟瓜切捶之也諠譁上許元切亦作讙下胡瓜切處之敞吕切諤逆各切晷刻居洧切日景縊殺壹賜切絞也河龍魯勇切河西隴右夕離力智切去也跋馬蒲撥切回也倓音談執鞚苦貢切馬勒興復房六切棧道助諫切棧閣即閣道也温凊七正切禮記冬温而夏清俶昌六切偵之丑正切問也飛龍廏居又切通天元年置仗内六閉一曰飛龍二曰祥麟三曰鳯苑四曰鵷鸞五曰吉良六曰六羣亦號六廏衰耄莫報切老也茇渉蒲撥切草舎一曰草术根本亦作跋草行曰跋𥚹小禆𬗟切訣别苦穴切絶也㲄訖岳切烏氏漢安定縣名烏水岀西北入河氏音支肅宗是年改曰保定屬涇州監牧居䧟切謂州有馬監扈從侯古切下才用切扈衞侍從也璬古了切瑁莫報切豐稔忍甚切熟也瑀王矩切泌兵媚切又薄必切璡即刃切垍巨至切汧隴輕煙切汧水在安定麤猛倉胡切賄呼隗切俌方矩切漪於冝切涵胡南切且籍秦昔切謂爲之簿籍暹思廉切葺七入切又音集杜預云葺覆也謂以草覆之也次舎式夜切謂葺所當次舎之處也左氏一宿爲舎再宿爲信過信爲次庀匹婢切皆倣甫兩切撤之敕列切去也琯古緩切怏怏倚兩切志不滿也﨑嶇上去竒切下音區山路也欷歔香衣切又許旣切下休居切歎息皃彚于貴切珙居悚切餘杭户郎切縣名屬杭州刳其空胡切剖也鐡掊蒲侯切說文杷也渙呼玩切蘄春渠之切即蘄州瓌姑回切諲伊眞切綰烏版切雍丘於用切縣名屬汴州縛藁古老切禾稈夜縋馳僞切垂繩而下也春秋傳夜縋而岀使諜逹恊切軍中反閒者焉知於䖍切白沙渦烏戈切地名咽喉因肩切字或從肉承玼雌氏切左脅迄業切說丈兩膀也坐部立部明皇分樂爲二部堂下立奏謂之立部伎堂上坐秦謂之坐部伎鼔吹尺僞切北狄馬上之聲自漢以後以爲鼔吹亦軍中樂馬上奏之故唐以隷鼔吹部散樂蘇旱切明皇爲平王有散樂一部定韋后之難頗有預謀者及即位命寧王主藩邸樂以亢太常分兩朋以角優劣置内教坊於蓬萊宫側居新聲散樂倡優之伎霓裳羽衣研奚切明皇時河西節度使楊欽忠獻霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩爲麗郞計切羙也爲樂力各切娱也茅茨疾兹切茅茨以草覆屋也茅茨不翦土階三等謂堯舜也菲食敷尾切薄也惡衣服菲飲食謂禹也殫耳多寒切極也窺窬容朱切私視鑾輿盧官切鑾鈴也崔豹古今注云五路衡上金雀者朱鳥也口銜鈴鈴謂之鑾也睨之研計切脾睨衺視擲樂直炙切投也支解佳買切支分也大索色百切求也爲空于僞切京畿渠希切天子千里地以逺近言之則言畿也鄜坊芳無切並州名冡嗣知隴切大也衣黄於旣切著也從容千容切猶休燕也鑰契弋灼切鑰關牡也契謂魚契玢悲巾切承寀此宰切敦煌徒門切即沙州庸調徒弔切定省息井切昏定晨省也慷慨上苦莾切下丘蓋切竭誠也惡烏故切不懌夷益切不恱也驃國毗召切南蠻國名古朱波也自號突羅朱闍婆國人曰徒里拙在永昌南二千里唐紀三十五通鑑二百一十九起柔兆涒灘十月盡強圉作噩閏月即丙申至丁酉不滿一年肅宗文明武德大聖大宣孝皇帝中之上至德元載泝江蘇故切逆流而上曰斥洋川音祥洋州漢戚夫人生於洋川髙帝寵之名其川曰洋以表誔生之休祥也搉鹽訖岳切搉謂緫利入官漢書音較板蕩板音版板蕩詩大雅二篇名上帝板板下民卒癉板板反也言反先王與天之道也蕩蕩上帝下民之辟蕩蕩法度廢壞之貌也禆將頻彌切將之偏副也陳濤斜咸陽地名鼔譟先到切擾也宥之爰救切敦煌徒渾切年亦作燉縣名屬沙州承寀此宰切回紇下没切可汗河干切戒酋稱妻之七計切毗伽求迦切奐干玩切暐羽鬼切系胡計切于幕末各切左氏猶燕之巢于幕上言至危也鋸殺居御切說文槍唐也通作鐻詈不力智切罵也所掠力灼切奪也負擔都濫切又都甘切說文荷也刀槊色角切矛屬葛邏支郎佐切回紇臣也入援于卷切助也榆林容朱切榆林之何勝川榆林縣有榆溪塞即蒙恬爲秦闢地累石爲城植榆爲塞是也洛交歷各切鄜州鞠養居六切詩小雅父兮生我母兮鞠我鞠養也瑒丑亮切鏐力求切金陵楚威王理金以鎭王氣故曰金陵晉武帝平吴曰秣陵元帝渡江都焉唐曰昇州峴胡典切瑱他甸切愿虞怨切繞城爾紹切縶其陟立切繫也遏路阿葛切遏絶其路也並塞歩浪切近也下先代切掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之㳂江余專刀詰其契吉切問也廣琛丑林切于闐堂練切又徒賢切西域國雍丘於用切縣名屬汴州睢陽音雖宋州空名苦貢切石堡博抱切石堡城在鄯山百谷如字又音浴百谷城在廓州雕窠丁聊切下苦禾切雕窠城在河州林邑乙及切林邑國漢日南象林之地直交州南侮行三十里其南大浦有五銅柱山形若倚蓋两重巗東涯海漢馬援所植也摩訶虎何切漫多莫半切環王林邑更號環王也二載暏物董五切見也病疽千余切癰瘡捫枕謨奔切摸也疾亟訖力切疾也昬懦奴卧切又奴亂切詆訐典禮切毀訾也下居謁切告訐太行胡郎切太行山名在河内鑿壕胡刀切城下也作墼吉歷切說文瓴甋也一曰未燒者也増壘魯水切軍壁潜趣讀曰趨警邏郎佐切廵邏也少懈居隘切怠也榰之音支爾雅榰拄也葦筏房越切大曰筏小曰桴乘之渡水也旻眉巾切盡殪壹計切散關寳雞有大散關駱驛歷各切駱驛言不絶也憇息去例切息也擣其都皓切耐寒乃代切忍也戒嚴如字警備也嬀川俱爲切嬀州驕横户孟切驕縱而暴横也旗幟昌志切漢書音式志切幟幖也旗旂之屬即緫稱焉鋒鏑丁歷切矢鋒也炬火臼許切束葦燒也挈家詰結切侃空旱切鄱陽蒲禾切饒州侁䟽臻切傳舎張戀切韶光時昭切爲之于僞切捐軀余專切激勵力制切勉也椎牛傳追切撃也邀之伊消切遮也渾户昆切白渠求於切地理志古白渠在京兆潏西古穴切水名在京兆長蛇陳陳讀曰陣液夷益切纔易牆來切猶僅也衣金於旣切之濫盧瞰切溢也鎬下老切弭亂緜婢切止也令珣力正切下須倫切沮之在吕切止也儆備居影切戒也瞰城苦濫切視也霽雲子計切欲射食亦切又神夜切剡蒿以冉切銳利也下呼髙切中者竹仲切殊死慵朱切焉有於䖍切悖於蒲昧切亂也又蒲没切道屈曲勿切琅邪余遮切即沂州千仞而振切濮陽博木切濮州廩米力錦切禀食一合葛合切兩􅕛爲合饋救求位切餉也消耗虚到切損也半虹胡公切虹蜺拄之冡庾切牚也鐡籠盧紅切盛火時征切棚閣蒲庚切棧也陊徒可切落也大鐶胡關切搨其託合切冐也金汁質入切液也銷鑠式灼切銷也磴道丁鄧切木柵測革切編立木爲之披靡普彼切齧落魚列切考異云韓愈書張中丞傳云因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激爲雲泣下按栁宗元霽雲碑云自噬其指曰噉此足矣今從舊傳廉坦他但切勞饗郞到切駱谷歴各切鳯翔盩厔有駱谷關唐紀三十六通鑑卷二百二十起強圉作噩九月盡著雍閹茂即丁酉至戊戌凡一年有竒肅宗文明武德大聖大宣孝皇帝中之下至德二載挑戰徒弔切擿嬈敵以求戰如古之致師回紇下没切其先匈奴也元魏時亦號髙車部姓藥羅葛氏居薛延陀北娑陵水上距京師七千里可汗河干切戎酋稱葉護失涉切葉護回紇太子之號也又按突厥傳亦以爲大臣之官俶昌六切灃水敷馮切水夕在咸陽輜重上莊持切載衣車也下直用切載物車也行者之所資緫曰輜重餌仍吏切飤之也禆將頻彌切將之偏副胏附方廢切如旰肺之相附着擯必刃切斥也􅕖粉􅕖牋西切凡䤈醬所和細切爲􅕖粉謂粉碎也警蹕卑吉切警者戒肅也蹕止行人也澧音禮州名乾元元年鴻臚凌如切鴻聲也臚傳也所以傳聲賛導九賔淑妃神六切後宫女官名冎古瓦切剔人肉置其骨也㰱血色合切歠也沁水七鴆切縣名屬澤州黜陟上丑律切貶也下竹力切升也狡猾上古巧切下户八切從容七㳟切猶休燕也揆巨癸切璵音余俚兩耳切下俚也祟雖遂切神禍也怏快倚兩切志不滿也祑除失切鐡劵去願切說文契也釋名曰劵綣也相約束繾綣爲限也以鐡䥴之故云鐵劵裝囊上側羊切下奴當切橐也有底曰囊裝者褁束之也搒殺音彭擊殺之也函胡讒切匱也捶止蘂切擊也第五琦第五姓也琦渠冝切瑀王矩切訣古穴切別也赭止也切赤色曏者許亮切猶疇昔也骨啜姝恱切回紇臣名泚千禮切􅉑古獲切州名党項多曩切漢西羗别種居古析支地拓拔戎德拓他名切拔蒲橃切其本代比元魏複姓愎弼力切很也琛丑林切大食西域國本波斯地鼓譟先到切羣呼也滏陽扶雨切縣名屬磁州邢洺上奚經切下彌并切二州名洹水于元切縣名屬魏州浙江之列切江水東至㑹稽山隂爲浙江處崟魚音切覬覦上音兾下音踰覬幸也覦欲也謂幸得其所欲眄普莧切顧也惴之瑞切憂懼也斧質上匪父切斫也下讀曰鑕職日切鍖也古者斬人加於鍖上而斫之唐紀三十七通鑑卷二百二十一起屠維大淵獻盡上章困敦即己亥至庚子凡二年肅宗文明武德大聖大宣孝皇帝下之上乾元二年摯脂利切藉田秦昔切耤借也帝藉千畮古者使民如借故謂之耤所中竹仲切傷也荔非元禮荔郎計切荔非虜姓漳水諸良切山海經曰漳水岀荆山南注于沮水灌古玩切澆也棧仕諌切棚也淘徒刀切浙也牆䴰逸織切麥也用以圬墻故云牆䴰抄掠上初交切又楚教切下力灼切劫奪人財也饑饉上居依切下渠吝切糓不熟曰饑𬞞不熟曰饉邏郎佐切廵也剽掠匹妙切刼掠也窘蹙上渠殞切下子六切迫也促也唁魚變切弔唁擐甲胡慣切貫也春秋傳云擐甲執兵稽首音啔首至地也諲伊眞切旻眉巾切鞠獄居六切窮理罪人也守捉側角切毗伽求迦切殉松閠切以人從死也𠢐靣陵之切剥也飛龍廏居又切馬舎名鎣余傾切烏定切詰責去吉切問責也曄筠輙切餞才箭切送行飲酒也銜枚音咸若馬之銜勒所以止言語讙囂令人不知周官有銜枚氏枚狀如箸横銜之汜水音凡縣名屬孟州閽者音昬守門人也潞沁七鴆切二州名屬河東道盩厔上張流切下陟栗切縣名屬鳯翔府山曲曰盩水曲曰厔光晟時正切沔莫踐切州名爲質職利切物相劕也崿嶺五各切殿丁練切軍後曰殿炬臼許切束葦燒也掎舉綺切牽其後曰掎瞋目昌眞切張目也彘直例切豕也搏伯各切索持也縶陟立切繫也絆馬也亦作􅎗艘蘇刀切船緫名貯展吕切义𥘉加切礮石披教切機石希顥下老切柵測革切砦栅繕時戰切修也中潬大亶切江東人呼水中沙堆爲潬河南縣有中潬城壍七艶切坑也郝庭玉郝黒各切姓也颭旗職琰切風動物也鞾許茄切鞮屬剄古挺切斷首也㻛丑亮切又杖梗切璜玉胡光切駐株遇切馬立重輪錢按食貨志曰第五琦爲相命絳州諸爐鑄重輪乾元錢徑寸二分其文亦曰乾元重寳背之外郭爲重輪故稱重輪錢踊尹竦切殍𬒳表切餓死曰殍賀蘭進明賀蘭本虜號後以爲姓溱側詵切州名礓子坂礓居良切坂甫逺切山坡曰坂在陜州莎柵素何切地名上元元年于闐徒賢切又徒見切西域國鄜芳無切州名維瑾渠遴切玠音介翽呼外切武成王開元十九年始置太公尚父廟至上元元年尊太公爲武成王祭典與文宣王比以歷代良將爲十哲亞聖十哲唐尊齊太公爲武成王以歴代良將爲十哲象坐侍秦武安君白起漢淮隂韓信蜀相諸葛亮唐衛國公李靖英國公李勣列于左漢太子少傅張良齊大司馬田穰苴呉將軍孫武魏西河太守呉起燕昌國君樂毅列于右以良爲配羌渾胡昆切羌謂西羌党項之屬渾謂吐谷渾皆近吐蕃故連言之順天得一錢按食貨志曰史思明據東都鑄得一元寳徑寸四分以一當開元通寳之百旣而惡得一非長祚之兆改其文曰順天元寳仙媛于眷切垣墉上于元切下餘封切城墻也射生神夜切善射者湫隘上子了切下烏懈切馬鞚若貢切馬勒也尫烏光切弱也灑掃沙下切汛灑而掃除也茹葷上人恕切食之也下許云切臭菜也辟糓賔亦切除也漢張良道引不食糓孟康曰服辟糓藥而静居行氣也猶䂊餘救切玃屬居山中聞人豫發木無人乃下謂不决也一說𢤱西以犬子爲猶毎隨人行忽先忽後亦曰猶豫臨洮他刀切即洮州如璆巨鳩切涇原音經二州名屬關内道銑蘇典切倔彊其勿切倔彊梗戾也儇呼縁切屈突孝摽屈曲勿切虜姓摽卑揺切徇徐閠切略也濠胡刀切州名暅古鄧切伯瑛於京切愔揖淫切郁墅承與切嶧羊益切晃胡廣切滁音除州名唐紀三十八通鑑卷二百二十二起重光赤奮若盡昭陽單閼六月即辛丑至癸卯凡二年有竒肅宗文明武德大聖大宣孝皇帝下之下上元二年蒜蘇貫切山名在丹徒仆方遇切僵也滑户八切州名常熟如字縣名屬蘇州縣有常熟山罹鄰知切遭也荼毒同都切郴丑林切州名黔中渠金切即黔州涪房尤切州名奴刺盧逹切渾奴刺也吐谷渾自稱曰渾主故以渾奴刺言之大散關如字又蘇旱切在鳯翔寳雞􅞥以制切金嶷鄂力切新羅王名乆戍春遇切守邊也愎弼力切很也邙山莫郎切在河南洛陽薄之伯各切迫也泄思列切漏也監泥古銜切臨督之也駱恱駱歷各切姓也俛首羙辨切俯也鞴馬平袐切駕鞍也傔人詰念切侍從者縊殺於計切經也橐駝撻各切駱駝其背肉以橐故云槖駝丘墟丘於切大丘羈縻忙皮切羈馬絡頭也縻牛紖也言牽制之故取喻也如玢悲巾切尚衡時亮切姓也能元能音奈姓也泫然熒絹切岌逆及切好畤音止縣名屬鳯翔府皆見形甸切可斷徒玩切􅎒也菩蕯上蒲逋切下桑葛切釋典云菩之言了薩之言見謂智慧了見也金剛佛氏有金剛之號取金有百煉不壞之謂也膜拜莫胡切胡人拜曰膜建子月建子月以十一月爲歳首時肅宗改制度故不以數紀月以斗所建辰爲名至明年建已月復稱四月殿最丁練切上功曰最下功曰殿無準主尹切簿責裴古切謂爲文簿一一責之也正旦諸成切正月朔旦也澠池彌兖切河南縣寳應元年琮徂宗切什取寔入切白著直略切民有貲産無因而強取之故曰白重足直容切又直用切累也耗散虚到切損也陳腐陳乆也下音扶雨切爛也抵罪典禮切漢書注云扺至也當也畚鍤音本草器也下測洽切鍫也合從子容切以利合曰從瞑莫定切閉目也瑱他甸切茙而中切侁䟽臻切恍惚上火廣切下音忽𠢐靣陵之切剥也難乃旦切疾亟訖力切僩下赧切嘔血於口切吐也适古活切益横户孟切縱横不以理也尚父如字周號太公爲師尚父劉向別録曰師之尚之父之故曰師尚父父亦音甫男子之羙稱也岑助簪切麴丘六切麴糵屑食先結切碎也傪七感切又倉含切行伍胡剛切逈户頂切憤咽房吻切滿也下一結切塞也㳂漢余專切縁水而下也可汗河干切戎酉稱子昂五剛切忻喜斤切州名太行胡剛切在懷州踞斤於切左殺虜分掌兵者謂之左右殺同軌居洧切地名並南歩浪切依也璘離珍切披靡普彼切伷直又切衣𥿄於寄切恪克各切睢陽音雖宋州嵩息中切成德成德藩鎭自李寳臣始更二姓傳五丗至承元入朝明年王庭湊反傳六丗有州四曰常兾深趙撤敕列切去也代宗睿文孝武皇帝上之上廣德元年藩鎭孚袁切自安禄山史思明之亂肅宗幸安分河北之地付授叛將後遂效戰國肱髀相依以土地傳子孫謂之藩鎭祚燕上存故切下音煙詭古委切詐也一䬸陸德明音七丹切吞食也又音孫熟食曰䬸餉式亮切饋也蹙子六切貝磁牆之切州名魏博魏博藩鎮自田承嗣始傳五丗至田洪正入朝十年復亂更四姓傳十丗有州七曰貝魏傳相磁洛衛盧龍盧龍藩鎮自孕懷仙始更三姓傳五丗至劉緫入朝六月朱克融反傳十二丗有州九曰幽涿營瀛莫平薊嬀檀燧徐醉切母暴微夫切止之也遺之以醉切而輕牽正切疾也春秋傳戎輕而不整聽事湯丁切治官處也後加广綰烏版切煬餘亮切加帖託恊切永隆二年以劉思立建言乃詔明經試帖麤十得六以上進士試雜文二篇通文律者然後試䇿帖栝古活切謂爲機括而誧之以求僥幸省所景切聲病並如字謂以聲律求疵病也僑渠嬌切寄也保桑梓祖似切詩云維桑與梓者言父之所植也保桑梓謂居其郷土者唐紀三十九通鑑卷二百二十三起昭陽單閼七月盡􅏧蒙大荒落十月即癸卯至乙巳凡二年有竒代宗睿文孝武皇帝上之下廣德元年頡咄上奚結切下當没切伽求迦切娑桑何切祭酒胡廣云凡官名祭酒皆一位之兀長古者賔客得主人饌則老者一人舉酒以祭地故以祭酒爲稱大震關如字隴州汧源有大震關後改曰安戎鄯音善州名拓撻各切開也糗糧去九切書傳云糗糒之糧也監牧居䧟切唐自正觀至麟德馬數番息於𡵨幽涇寕間置八坊爲八十四監以牧之監牧之名始於此邏郎佐切廵也𧖟食徂含切謂稍侵暴如𧖟之食葉也左衽忍甚切衣襟也左衽謂皆爲夷狄矣犒口到切餉也塞先代切邊塞榆次容朱切縣名屬太原府靺鞨莫葛切下何葛切北狄也睿宗時拜太祚榮爲渤海郡王自是稱渤海也姓茹如倨切酒酣胡甘切洽飲也纒頭呈延切纏頭綵組織緫古切共相組織言交口誣奏如紕繡織成也玢悲巾切比周毗志切阿黨也嫉昨悉切妬也詆典禮切訾也利行下孟切漢書忠言逆耳利於行翊逸織切部曲如字漢書注云大將軍營五部部有曲也司竹司竹園在鳯翔盩厔縣盩厔上張流切下陟栗切縣名屬鳯翔府令公力正切郭子儀時爲中書令故稱令公武關在商洛縣東趣七俱切嚮也寳應軍於證切代宗以射生軍入禁中清難皆賜名寳應功臣故射生軍又號寳應軍伉口浪切三輔京兆馮翊扶風療力照切治也飲藥於禁切飲之也繇古由字悛且縁切止也王甫按考異載實録有武將王甫誘長安惡少大鼓於朱雀街吐蕃遂夜遁又汾陽家傳有射生將王撫領騎卒𥙷官屬以謀作亂市舶薄陌切海船曰陌持滿謂注矢於弓弩引滿而不發矢鄠侯古切縣名屬京兆倩倉甸切二年子午子北方午南方言通南北道相當故謂之子午谷其地從京兆杜陵直絶南山徑漢中也縉即刃切鳴鏑丁歴切骹箭也語牛據切閒居莧切乘傳張戀切乘傳者依承符傳而行若使者持節尓傳以木爲之長尺五書符其上以爲信堙伊眞切塞也挼穗奴回切又奴禾切手縈摩也下徐醉切禾成秀也五紀曆代宗以至德曆不與天合詔司天臺官屬郭獻之等復用麟德元紀冩大衍舊術帝爲製序題曰五紀曆青苗眉鑣切唐租庸調之法壞代宗始以畒定稅而歛以夏秋時又以國用急不及秋苗方青即征之號青苗錢俸房用切秩禄也蝗胡光切食苗虫戒嚴如字警備也乾陵渠焉切在奉天渉涇堅丁切水名在涇州徒行厲水曰涉朱耶余遮切朱耶夲西突厥以後改曰沙陀而以朱耶爲姓躄必益切跛不能行也若屬並如字若汝也火伍並如字兵志十人爲火五火爲團伍行伍也擊柝他各切兩木相擊以行夜也于闐唐練切又徒賢切西域國名永泰元年都試如字謂緫閱試習武備也霍光傳岀都隷郎孟康注都試也鉗口其廉切鐡有所結束曰鉗忠鯁古杏切亦作骾骨彊四支喻君有忠臣謂之骨鯁杼柚直吕切謂賦歛之多杼柚爲空也詩小東大東杼柚其空椎剽傳追切下匹妙切謂相擊而剽掠也詰喫吉切問也刺郞葛切洎巨至切及也畨禺上音潘下音愚縣名屬廣州屝屨父沸切草履也諝思吕切榷酤音角設一木以渡水曰榷謂官自酤賣酒獨收其利也菽式竹切豆也曖於代切沈式荏切姓也鹵簿郎古切炙轂子云與駕行幸羽儀導從謂之鹵簿按字書鹵大楯也甲楯皆著之簿籍儀衛具五兵獨以甲楯爲名者行道之時甲循在外餘兵在内故言鹵簿索色百切求也扞侯旰切衛也餌仍吏切食之也陳直刃切胄直祐切兠鍪也酋自秋切長也可敦可敦者可汗妻號猶單于言閼氏也酹地盧對切餟祭也監古銜切之右右猶上也唐紀四十通鑑卷二百四十四起􅏧蒙大荒落閠月盡昭陽赤奮若即乙巳至癸丑凡八年有竒代宗睿文孝武皇帝中之上永泰元年旰古旦切寳轝羊茹切舁車也以七寳飾之巙渠龜切昕許斤切大曆元年常參官倉含切謂朝㑹也唐制文官五品以上及兩省供奉官監察御史貟外郎太常博士日叅號常參官也武官三品以上三日一朝號九參官五品以上及折衝當番者五日一朝號六參官洪文崇文館國子監學生四時參凡諸王入朝及以恩追至者日參其文武官職事九品以上及二王後則朝朔望而已無門籍秦昔切謂未得通籍岀入禁門者仗家直亮切謂爲儀衞者喑嗚於金切語喑啞不明中傷竹仲切四鎮龜兹于闐焉耆䟽勒覆餗送鹿切易鼎卦覆公餗釋文云餗八珎之其也成均如字周禮大司樂掌成均之法董仲舒云成均五帝之學也垂拱元年改國子監曰成均監後復舊長也展兩切斌悲巾切臠食力兖切臠切其肉而食也余元仙余羊諸切姓也同華户化切同華二州名歷數所矩切數責以過失也差𥘉加切差次也宣歙失渉切二州名二年恚於避切恨也鄙諺魚戰切俚俗所傳之言也翁烏紅切閨㳙畦切閨說文云特立之户上圜下方有似於圭萬億乙力切十千曰萬十萬曰億郢以井切禳如羊切除也闥上曷切宫中小門也確至克角切堅也無恙餘亮切憂也一曰蟲入腹食人心古者草居多𬒳此毒故相問無恙乎獠魯皓切又竹狡切戎夷別名譴詰戰切謫也三年倓徒感切又音談泌兵媚切躡屨昵輙切屨說文履也一曰鞮屬給舎式夜切謂給事中中書舎人皆唐制正五品官也泚此禮切盂蘭盆上雲俱切盂蘭盆經云目連以母生餓鬼中佛令作盂蘭盆至七月十五日以百味五果著盆中供養十方大德而後母得食也一說盂蘭盆者天竺國語也猶中華言散倒懸也今人遂設盆以爲供誤矣尚賛摩吐蕃酋長岵侯古切奭施隻切掌漏郞豆切刻漏也刻漏法以銅爲渴烏狀如鈞曲注水以浮刻漏之箭掌漏者謂守漏人也更古衡切杲古老切駐株遇切四年衷甲音忠左氏傳楚人衷甲注云衣在甲中家僮徒紅切奴也涪房尤切州名涵胡南切逗遛上音豆下力救切謂稽留不進悍戾侯旰切仆地芳遇切僵也五年暹思廉切地牢郎刀切於地爲牢獄訊掠思晉切問也下力漾切笞也懌夷益切悅也衣緑於旣切忿爭撫吻切強巨兩切勉也稱昌孕切冝也不軌居洧切不修法制也郿虢旻悲切漢書音媚郿虢並扶風縣名禁旅兩舉切衆也說文軍五百人爲旅度逹各切鉥食律切束裝側羊切說文裏也屬之欲切託也六年綿亘古鄧切綿聮亘極也汧隴輕煙切汧謂汧水隴謂隴坻皆在隴州隴坻典禮切隴坻謂隴陂即隴山也翃乎萌切璀取猥切五嶺大庾嶺在䖍州永明嶺白芒嶺在道州臘嶺在郴州臨源嶺在桂州駮北角切絀敕律切亦作詘說文貶下也滉户廣切七年歐於口切擊也伺閒相吏切下居莧切八年㟧五各切跋扈蒲撥切跋扈猶強梁也封籍秦昔切籍謂疏録之也按堵音覩言不遷動如堵牆也侯莫陳三字姓也怤芳無切縑吉嫌切駑瘠農都切駑駘也下秦昔切瘦也晃户廣切賁彼義切邭須倫切辮髮婢典切說文交也黄萯原萯蒲昧切新史作黄菩原音歩後切黄菩乃草名或通作萯掎其舉綺切牽其後曰掎資治通鑑釋文卷之二十三
