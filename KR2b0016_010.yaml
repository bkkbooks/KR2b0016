  text: 資治通鑑釋文卷第十
  hash: sha256:edd29a7d6d15b8f216070e1648e93de3cf6aae40209c80d096ca0b324c460f49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_010-1a}
body:
  text: 右宣義郎監成都府糧料院史照晉紀十一通鑑卷八十九起閼逢閹茂盡柔兆困敦即甲戍至丙子凡三年孝愍皇帝下建興二年日隕于敏切從髙而下也嬖寵博計切説文便嬖愛也顗魚豈切襄國思將切廣平郡之邑屬司州麈尾之庾切麋屬取其尾以為拂薊音計燕國之邑屬幽州户調徒弔切賦也復除芳六切除其賦稅沖直弓切朱提音銖時郡名屬益州審照審式荏切姓也㸑疆㸑七亂切本西夷之姓後為建寧大姓猶豫餘救切獸名其性多疑故稱不決曰猶豫送質職利切質子猗盧於冝切逋羯上博孤切逃亡也下居謁切羯胡也易水羊益切水出涿郡安閻山即范陽國詭過委切許也叱昌栗切呵也聽事他丁切古者治官處謂之聽事後語省直曰聽故加廣堂皇堂無四壁曰皇見漢胡建傳注饋賂上求位切下魯故切餉遺也綽昌約切其分扶問切分定也帙直一切書帙亦謂之書衣僅渠遴切憤父吻切悶也匹磾下都黎切令支上來定切下巨移切遼西之地在幽州左車昌遮切廆五罪切厭次一琰切樂陵邑屬兾州韜吐刀切灄中音攝水名在江夏安陸屬荆州渭汭而鋭切水相入渭詩云涇濁渭汭拉盧合切愎弼力切很也糴徒歷切市穀也蒲阪甫逺切河東邑屬司州協音協三年莚以然切華隂胡化切洪農邑屬司州華山在其西雨血王遇切自上而下曰雨輕佻吐周切偷薄也監守古銜切監察主守也挑戰徒了切擲嬈敵以求戰也驕橫户孟切驕恣不順理也狷急古縣字第五猗第五復姓猗其名於冝切按元和姓纂云出自齊諸田之後田氏漢書𥘉徙園陵者多故以次第為氏突陀骨切觸也陳直刃切與陳同宛於元切南陽邑屬荆州廙羊至切又逸織切溳口于敏切溳水出江夏安陸名曰溳口屬荆州掘其月切榾也百甓蒲歷切鴻臚凌如切官名鴻聲也臚傳也所以傳聲贊導九賔轉冦陟兖切轉相為寇也蝮虴芳六切爾雅謂之蝝螫施隻切蟲毒斷腕上都管切斷截也下烏貫切手腕也稆力舉切稻自生也本作穞四年屬心之欲切猶傾心也歸首舒救切自狀其過也歔欷上朽居切下香衣切歎息也俯首音免或讀為俯閹衣撿切宫中守門者綦母逹綦渠之切綦母復姓逹其名左傳晉有綦母張膏盲上音髙下音荒心上鬲下鑊胡郭切鼎大而無足者諌爭側迸切與諍同瑾渠遴切反間居莧切反其本而間諜也紿蕩亥切亦作詒欺也磻石簿官切谷名在北地竺恢竺張六切姓也紊音問亂也殍平表切餓死憔悴上慈消切下秦醉切憂愁也輯七入切又音集肉袒徒旰切祖禓而露肉也黃鉞王伐切大斧也以黃金飾之日􅉴札色切日昳也多僻匹亦切邪也核讀如核實之核坫城都念切或作沾城名在樂平外抄𥘉交切又楚教切略取也鎧可亥切甲總名擐胡慣切貫也甲胄直佑切甲鎧也胄兜鍪也拭柱賞職切謂拭刷於柱上訐居謁切面斥人以言也晉紀十二通鑑卷九十起強圉赤奮若盡著雍攝提格即丁丑至戊寅凡二年中宗元皇帝上建武元年奔古奔字淑神六切大臨力鴆切哭也帥朔律切遺以醉切鼓譟先到切羣呼也腕烏貫切楊雄曰握也亦作羕餘亮切裒蒲侯切氶辰陵切通作承顗魚豈切邃雖遂切隗五罪切匹磾都梨切歃血所洽切啜也嶠渠廟切詡况羽切衷甲陟弓切藏甲於衣也酋長上自秋切下知文切戎酋之帥長也坑丘庚切塹也嶷魚其又魚力二切毖兵媚切廄居又切馬舍含胡南切鋭卒以芮切利也瑝胡光切説文螽也薈烏外切廙羊至切又逸織切部分扶問切部曲分伍也沈行持林切沒也甑山子孕切縣名創𥘉莊切傷也徑造七到切徑言直至也沌陽持兖切江夏安陸有沌水其地曰沌陽屬荆州左甄居延切察也軍號珉眉巾切更衣工衡切改也殿最上功曰最下功曰殿佃作堂練切營佃也就耕謂之作吐谷渾谷音谷渾胡昆切遼東鮮卑徒何涉歸之庶長名吐谷渾即慕容廆之庶兄也父步歸分户一千七百以隸之其後子係昌盛遂以為號始於此有別筆列刀異也乙郍婁馮乙郍婁三字姓馮上名西傳讀曰附洮水吐髙切洮水出西羌中北至枹罕東入河大興元年斬縗倉回切喪衣下不緶直割之者為斬燔符袁切爇也徹直列切去也朝請才性切法古法字拯舊無切語音蒸之上聲并取卑正切兼也覘丑廉切又丑艷刀窺視也器械胡介切械者器之總名勱莫敗切上邽音圭天水邑古邽戎之地屬秦州詵所臻切恂相倫切稱神昌孕切愜也椒房兹消切按漢官儀曰皇后稱椒房取其蕃賔之義也何預音預及也瞋目昌冥切張目也梟鏡上堅堯切鳥名食母破鏡獸名食父黃帝欲絶其類使百物祠皆用之趙公劉矅字永明元海之族子僣即帝位干赤壁國號趙改元光𥘉始於此邏騎郎佐切逰兵也辟閭嵩元和姓纂衛文公支孫以居楚丘辟閭里因以為氏嵩其名縊一腸切經也屠各直如切即胸奴休屠之類羯居列切虜號調戲徒弔切弄也從容七恭切猶休燕也頵居筠切失分扶問切分守嬰城於盈切繞城以自守殺禮所介切削也節省所景切減也巳罷蒲縻切通作疲勞乏也龕枯含切涪音浮縣名屬梁州晉紀十三通鑑卷九十一起屠維單閼盡重光大荒落即已卯至辛巳凡三年中宗元皇帝中太興二年汜符咸切又祥里切孚𣑽切警車影切戒肅也蹕壁吉切止行人也地秖翹移切地柢提出萬物者也敞昌兩切巾櫛巾者佩巾櫛者梳比之總名側瑟切上邽音圭天水邑屬秦州應詹應於陵切姓也詹其名應本自周武王後左傳曰邘晉應韓武之穆也匹磾都黎切相論盧昆切論薦廙羊至切又羊織切説敦舒芮切誘也陽翟屬司州河南邑音宅亟議紀力切趙分劉曜字永明元海族子也𥘉鎮長安聞靳凖之亂趣平陽定亂遂嗣粲位還都長安以其始王中山中山趙分也遂改號趙始於此分扶問切冒頓劉伯莊音墨特胸奴頭曼之子濟岱上子禮切下徒耐切濟河海岱之地即兖州及青徐之間也東莞音官郡名屬徐州左衛率所類切與帥同郗鑒郗丑之切姓也鑒其名趙國石勒字丗龍本胸奴别部羌渠之胄劉曜封為趙王其地南至盟津西逹龍門東至河北至于塞垣尋僣號趙國改正朔始見於此從容七恭切猶休燕也毖兵媚切廆五罪切髙勾麗勾侯切麗鄰知切東夷本扶餘别種其國在平州遼東之東挫祖卧切槯也犒口到切餉也悉獨官宇文氏大人之名號伺相吏切伺候也其間居莧切間隙也并兵卑政切兼兵也卒起倉沒切忽也掎舉綺切牽其後曰椅皓胡廣切俘芳無切軍所獲也三紐女九切系也首服式救切自服其罪也案堵上烏旰切下當古切應劭曰案按次第堵如墻堵不遷動也琮藏宗切丗難乃旦切鞠羡鞠居六切東萊望姓羡其名延面似面二切比至必寐切乙弗利逆乙弗虜復姓利逆其名即髙勾麗王也屠各陳如切即胸奴休屠之類也三年薊音計燕國之邑屬幽州厭次一琰切樂陵國之邑屬兾州努力奴古切嬰城於盈切繞城以自守抱罕應劭曰故罕羌侯邑也顔師古曰抱抱鼓字也其字從木晉興郡之邑屬涼州下邳符悲切國名屬徐州有嶧陽山在其西劾胡得切法有罪也轘音患車裂也阿房上烏禾切下白郎切按漢書注阿房者言殿之四阿皆為房也大荔音戾西戎國名平趙巴氏叛趙主劉矅乃推勾渠知為大秦王改年曰平趙梟之古堯切挂首於木上蓐食儒欲切謂牀褥中食也𠢐面力之切剝也鄷明敷中切觀名滈池胡老切地名錮音固掘其月切搰也平輿音預汝南邑古沈于國有沈亭屬豫州馳使踈吏切將命者務施施智切專務施與也任子汝鴆切即質子也抄之𥘉交切又楚教切略取也之惡烏路切為質職利切結信也置支義切置也翥章庶切從弟才用切下羣從同隗五罪切沈充沈式荏切姓也充其名周文壬之子冉季食采於沈子孫以國為氏鎧曹可亥切甲也官職名氶辰陵切鉛刀與専切錫類四年錯繆靡幼切乖錯繆戾也欲數色角切頻數也槊所角切矛長丈八者為槊洎巨至切又其既切冠軍古玩切冠者加於首上冠軍言在諸軍之上也戮力力竹切説文戮力併力也嵆康力幽切字韻與飂同字林音遼否也部鄙切塞也卦名怏怏於兩切志不悶也漚麻於候切久漬也歐一口切復之芳六切除其租稅也釀汝亮切説文醖也醴酒音禮酒一宿而熟者耽都含切泓烏宏切東撗户盲切學舍也與黌同猗色上於冝切下唐何切賀傉內沃切猗色之子也什翼犍渠焉切拓跋代王名也襁褓上舉兩切下輔枹切負兒衣晉紀十四通鑑卷九十二起元黓敦牂盡昭陽協洽即壬午至癸未凡二年中宗元皇帝下永昌元年掾俞絹切焉知於虔切羈録居冝切羈縻收録也鯤公渾切三思蘇暫切語三思而後行顗魚豈切脅虛怯切迫脅狼抗上魯當切下口浪切如豺狠抗扞也狐疑狐性多疑每渡冰河且聽且渡故言疑者稱狐疑説音悅誘也氶辰陵切檄刑狄切古者以木簡為書長尺二寸悝苦回切又良止切猥烏賄切鄙也易雄易羊益切姓也雄其名囂五髙切跋扈上蒲撥切下侯古切猶強梁也遡流蘇故切或作溯説文逆流而上曰溯拉盧合切拆也摧也昱余六切仇池仇池山名在武都郡其上方百頃四面壁立峭絶險固自然有樓櫓却敵之狀髙七里餘蟠道三十六曲上有岡阜泉源皆為氏羌所據勛許云切獷古猛切黃鉞王伐切大斧也以黃金為飾輜重上側待切載衣車也下直用切載物車也行者之資總曰輜重上邽音圭天水邑屬秦州汧城苦堅切扶風郡汧縣之城屬雍州休屠直魚切休屠胸奴王號入見胡甸切朝見也廙羊吏切又羊織切跣先典切足露親地也鞚苦貢切馬勒鞅倚兩切説文曰頸靼也東除東階也嗚咽一結切聲塞也幾至巨依切近也所量吕張切度也無恙餘亮切憂也病也郝嘏郝黑各切姓也嘏其名舉下切猗於冝切怍色音昨慙色忤五故切逆也釁鼓許慎切以血塗鼓祭也容慘七感切悽慘謇愕上九輦切下五各切皆直言也愕冝作諤惋烏貫切驚歎慷慨上苦莾切下口溉切慷慨竭誠也卬五剛切騶虞幡騶側鳩切幡孚袁切騶虞仁獸也白虎黑文尾長於身繪干幡上羕餘亮切申𣢾苦管切伸誠意也﨑去竒切間出居莧切迭出也邏者郎佐切巡也檻車户黤切亦作轞檻車者車而為檻形謂以板四周之無所通見解楊解胡買切姓也楊其名春秋晉國人剽掠上匹笑切下離灼切劫略也飢饉上居依切下渠遴切無榖曰飢無菜曰饉蟄燕直立切燕雀之藏者湛持林切又直減切龍編音邊交址郡之邑屬交州濮陽音卜古昆吾之國屬兖州皓胡廣切令支應劭曰令音鈴孟康曰支音秪顔師古曰令又音郎定切漢遼西之邑晉屬幽州肅宗明皇帝上大寧元年玫莫杯切越嶲先蘂切郡名屬益州古卭都國謂越過雋水因以為名釗之遙切盱眙上况于切下與之切臨淮邑屬徐州壼苦本切班劒如字文選注云以木為劒而彩晝之故曰旺螳蜋上音唐下音郎朱提邑屬益州瀘水龍都切木名在越嶲卭都屬益州此水出曲羅東下三百里始曰瀘水趣逡須切嚮也蛇矛上食遮切下莫浮切矛如鋋而三廉殪一計切殺也搏也募莫故切召也應詹應於陵切姓也詹其名職廉切從駕疾用切隨行也壼苦本切長姦知文切凶宄矩鮪切姦也外為盜內為宄煽逆式戰切熾盛也不調徒弔切賦調恟懼許容切擾恐也左傳曹人恟懼又許拱切朱雀桁胡郎切方舟也謂駕方舟以為橋下南桁音同豕突陀沒切豬性觸突人故取以為喻遺含以醉切贈也嗟跌上倉何切蹉跎也下徒結切差跌也投𬒮彌蔽切左傳楚子投𬒮而起幣厚毗祭切帛也春秋左傳幣重而言甘誘我也兵趣逡須切揚以兩切又餘章切柵塘上測革切下徒郎切編木立柵以為陂塘也藉初慈夜切假也勞之郎到切勦絶子小切絶也沈含直深切沈溺也內重壁內讀曰納重直龍切謂置之重壁中也瘞於計切幽埋也跽竒几切長跪也剛愎符逼切剛躁很愎也羕餘亮切枹罕抱音膚古罕羌之地屬涼州賀傉奴篤切三年大臨良鴆切衆哭曰臨龍見胡甸切索頭索蘇合也姓也澆水堅堯切水名假末柸布回切鮮卑之種瞋目稱人切張目也叱之昌栗切呵也檀斌檀徒干切姓也太公為灌檀宰後氏焉斌悲巾切名也脊古慎字分隂方文切分寸之分蒲博上薄胡切樗蒱戲也下伯各切博塞也老子入胡作蓬頭薄紅切髮亂如蓬草也跣足蘇典切足親地也作丁與釘同孟津孟者河北地名春秋所謂向監也於其地置津謂之孟津崤澠上河交切下莫踐切崤山澠池也在洪農金墉餘封切城名在洛陽西北魏明帝所築屬司州襄國息良切廣平邑屬司州胡羯居謁切虜别號鮮卑相然切山名東胡別種因保此山遂以為號氐羌上都黎切下墟羊切二種夷名風俗通云氐本西南夷種羌乃三苗萎姓之裔管鑰弋灼切關下牡也闥他逹切博雅闥謂之門曄筠輒切更入工衡切㸑量㸑七亂切姓也珉眉巾切控弦苦貢切滿引也逖他歷切徼外古弔切邊徼紇那下沒切代王之名顯宗成皇帝上之上咸和元年昶丑兩切皚魚開切愠於問切怒也仰食魚向切恃也相屬朱欲切連也演音衍闡齒善切鄼音贊順陽邑屬荆州逡遒子由切淮南邑屬揚州塗塘上同都切下徒郎切偃瀦也濟岷上子禮切下眉巾切郡名屬青州即濟南郡也或云魏平蜀徙其豪將家於濟河北故改為濟岷郡闓丘衰切暗至烏紺切謂暗合也二年朱提上音銖下音匙郡名屬益州輯音集又七入切沃千烏酷切山名蠚黑各切螫毒也狡兔古巧切猾也不內讀曰納禇翜禇丑吕切姓也翜其名所甲切又山立切禆惠禆符支切姓也惠其名蕪湖音無丹陽邑屬揚州句注音章句之旬服虔音鈎山名在鴈門屬并州大寧乃定切地名屬代北鬱律紆勿切代國王名翳槐一計切鬱律之子晉紀十六通鑑卷九十四起著雍困敦盡重光單閼即戊子至辛卯凡四年顯宗成皇帝上之下咸和元年懦怯上乃卧切又乃亂切弱也下乞業切畏也食炙之夜切燔肉為炙牛渚掌與切在丹楊蕪湖一名採石屬楊州大桁胡郎切通作􅟘方舟也癰於容切背癤也創𥘉莊切通作瘡眕章忍切盱况于切陳于直刃切與陳同榱所追切屋橑説文曰秦名為屋椽周謂之榱齊魯謂之桷柂工徒可切正舟木者本作柁捶撻上止蘂切下他逹切皆擊也負簷都濫切皆荷也蔣山郎兩切祼剝郎果切祼袒剝裂也苫草失廉切自鄣之亮切鄣隔稱是尺孕切等也浙江之列切江水東至會稽山隂為浙江蘧蒢上求於切下陳如切説文竹席也鼓枻以制切楫謂之枻一曰施也邏即佐切巡也宛於元切南陽邑屬荆州縱橫上子用切下户孟切放縱恣橫也疆埸上居良切界也下羊益切畔也屢説音稅誘也龔登龔九容切姓也戎行胡剛切列也綢繆上直由切下莫彪切綢繆猶緾綿也翹企邦堯切舉也飢饉上居依切下渠遴切無榖曰飢無𬞞曰饉間行居莧切迭出也鉦鼓諸盈切鐃也泥濘乃定切説文滎濘也慷慨上口黨切下口溉切嘆息也繾綣上去戰切下去願切繾綣厚志也查浦莊加切地名節傳張戀切符傳涇堅靈切宣城邑屬楊州焉能於虔切不也俯九切與否同庱亭上閭承切又丑升丑拯二切壘名在揚州京口湓口蒲奔切湓水名在尋陽皖胡管切廬江邑屬楊州髀部禮切股也徹鞍上丑列切下於寒切通徹馬鞍也踏徒盍切踐也鞾許茄切履也軹關音𥿄在河內軹縣屬司州蒲阪甫逺切河東邑屬司州有歷山舜所耕也氐羌上都黎切下驅羊切按風俗通云氐本西南夷種羌乃三苗萎姓之别千金堨阿葛切壅水作堰千金其名也狡黠上古巧切狂狡也下胡八切桀黠也貸他代切借也挑之徒了切擲嬈敵以求戰也韜吐刀切以餉式亮切饋也亦作餉報塞蘇則切窒也先薄伯各切迫也方勞郎到切犒師也躓陟利切跲也臠力兖切肉臠閎音宏見衆胡甸切懅今所有之衆銜枚音咸枝狀如著撗銜之結於項止言語歡囂欲令敵人不知其來也詭道過委切詐也嬖臣卑義切幸臣也羯居謁切胡羯局頓渠玉切踡踡頓仆也玝阮古切四年上邽音圭天水邑屬秦州右邽戎地并力卑政切關中東函谷南嶢武西散關北蕭關在四關之中也隘烏懈切狹也蹈藉慈夜切蹈踐而躪藉也燼徐刃切火餘也樂土音洛稽顙上康禮切下寫曩切額至地也哽噎上古杏切下一結切哽塞而悲噎也之難乃旦切檻車户黤切載囚車紘音宏弛頓施是切弛廢忲侈他蓋切奢也秦雍於用切二州名屠各陳如切本休屠之類因曰屠各胡且羌子余切羌種名羌酋自秋切長也傉奴沃切倮郎果切袒也亦作祼僑人渠嬌切博雅云客也蓋肫蓋古盍切姓也肫其名徒魂切紇扢埿上下沒切中户骨切下音泥又奴計切五年梟堅堯切挂首於木上艦户黤切戰船四方施板其狀如牢詡况羽切斌悲巾切丁零並平聲夷狄小國翟斌翟音宅姓也句町顔師古音劬挺西南夷國名愔愔挹淫切勝殘詩證切論語曰亦可以勝殘去殺矣王肅注云勝殘暴之人使不為惡耳幟昌志切又式志切旌旗之屬偵丑政切覘也六年辟雍上必益切下於容切辟明也雍和是也所以和明天下雍或作癰天子學歸胙存故切祭福肉也導不俯九切與否同晉紀十七通鑑卷九十五起元􅘬執徐盡強圉作噩即壬辰至丁酉凡六年顯宗成皇帝中之上咸和七年礌礌魯猥切亦作磊酈食其酈音歷如也食音異其音基承間居莧切隙也藉慈夜切馮藉怏怏於兩切志不滿也涅水乃結切水出上黨涅縣耒盧對切耒耕曲木也軺軒餘招切使車也藝音云除苗間穢也穫黃郭切刈穫也越嶲先蘂切郡名屬益州古卬都國越過嶲水因以為名朱提音銖匙郡名屬益州彪輔休也八年廆五罪切皓胡廣切詡况羽切元莵同都切郡名屬平州陽鶩陽姓也騖其名音亡遇切又莫卜也蝗胡光切蚊也邃雖遂切球渠尤切榆隂羊朱切城名牂柯上則郎切下古俄切郡名屬益州牂柯係船杙也楚滅夜郎軍至且蘭椓船於岸因以名其處築刖魚厥切斷足也涉璝公回切蒲阪甫逺切河東邑屬司州有歷山舜所耕也潼關本名衝關在華隂左傳所謂桃林塞也澠池莫踐切亦作黽洪農邑屬司州汧隴口堅切汧水隴山在扶風枋頭音方在汲郡曹操於淇水口下大木枋以成堰因號其地為枋頭伺相吏切候也趣讀曰促佟壽佟都宗切姓也上邽音圭古邽戎地隴西邑屬秦州敦煌音屯皇郡名屬涼州應劭曰敦大煌盛也九年冠軍占玩切功在諸軍之上故曰冠軍齎祖稽切持遺也翟楷翟亭歷切姓也又音宅輿埿奴低切又奴計切并力卑正切蒙楯食尹切所以捍身蔽目也驍果堅堯切驍健而果敢也整陳直刃切與陳同挫祖卧切摧也㸑深㸑七亂切姓也深其名華隂户化切洪農邑屬司州羡以面切又延面切貂蟬丁聊切惠文冠也以貂尾為飾附蟬為文蟬取其清髙飲露而不食貂紫蔚采潤而毛不彰也印傳張戀切符傳棨戟遣禮切棨者有衣之戟也管鑰弋灼切關下牡也婆娑上蒲何切下桑何切猶徘徊也鯤公渾切瘍與章切説文云瘍頭瘡也金創𥘉良切亦作瘡吮膿粗兖切嗽也禇哀禇昌與切姓也衰其名薄侯切䂮力灼切曄筠輒切葭萌音家蜀劉備改為漢壽晉文改為晉壽梓橦邑屬梁州闓丘哀切又苦蓋切岌魚及切輯音集爾雅曰輯和也又七入切咸康元年鸛雀臺古玩切亦作雚臺名從容七恭切猶休燕也咨諏咨通作咨謀事曰咨諏將侯切咨事為諏熒惑上音螢下胡國切星名南方主夏視禮虧失則罰出以厭一涉切廣雅曰厭鎮也昶丑兩切惔徒甘切又徒濫切蜂起如蜂之起言其衆也耽丁含切鄴魚劫切魏郡之邑糅忍九切亦作粗雜色淡徒酣切又徒敢切趣逡須切嚮也龜兹音丘慈西域胡國焉耆於虔切西域胡國子填徒賢切又徒見切與闐同西域胡國彗星徐醉切妖星見胡甸切顯見也奎婁音睽樓二十八宿星名輜重上側特切下直用切輜載衣車也重載物車也行者之資總曰輜重狼狽博蓋切髙麗音離髙勾麗也其國在遼東之東詿誤音挂説文詿亦誤也雋才子峻切智過千人曰雋甃側胄切井甃也鹵簿裴古切車駕次第為鹵簿鞾許茄切亦作靴鼓吹尺偽切音律管塤之樂也嗷然牛刀切衆口愁也鍾虡音巨爾雅曰木謂之虡所以挂鍾磬也輞文紡切車輞竹絙古登力竹索也鹿櫨龍都切井上汲水具橡似兩切栩實也商賈音古行賣曰商坐販曰賈林邑南蠻國名本曰南郡象林椰酒以遮切椰子本名出交州其葉背面相似杠末古雙切旌旗竿也三年理不俯九切與否同恚於避切怒恨也誚責才算切亦作譙笞捶上昌之切下止蘂切皆擊也冒頓音墨特胸奴頭曼之子名瞋目昌真切張目也詰問去吉切責問也燕王皓胡廣切慕容皓字元真廆之第三子子也自立為燕王史以前燕别之始於此泓烏宏切奭施隻力為質職利切所以結信也晉紀十八通鑑卷九十六起著雍閹茂盡重光赤奮若即戊戍至辛丑凡四年顯宗成皇帝中之下咸康四年槃蒲官切漂渝上紕招切下容朱切津名在遼西令支令支漢時為縣屬遼西即古伯夷國有孤竹城應劭曰令音鈴顔師古又音郎定切孟康曰支音祇見衆胡甸切據所有之衆薊音計燕國之邑屬幽州諶氏林切才行下孟切言之迹也龔壯龔音恭姓也解思明解胡買切姓也漢王壽李夀字武考驤之子也𥘉為李雄大將軍尋襲其國據成都僣即偽位國號漢改元漢興始於此鴆殺直禁切贈遺弋季切賂贈也縊一賜切自經也詡况羽切鮮于屈鮮于復姓風俗通曰武王封箕子于朝鮮其子食采於于因氏焉樂浪音洛郎郡名屬平州古朝鮮國間出居莧切乘間而出也恟懼許容切擾恐也亦作凶又許拱切左傳曹人恟瞿披靡披普彼切釁許慎切隙鏬也蟻附語豈切蚍蜉也慕輿根慕輿代北復姓本鮮卑慕容氏音訛又為慕輿也恪苦各切訣古穴切别也海島都皓切海中有山曰島艘蘇刀切船之總名蝗胡光切蟲也讜言音黨直言也郗鑒郗昌之切姓也鑒其各古銜切黔首巨淹切秦謂民為黔首黔黑色也汚烏故切穢也掾俞絹切官屬學針職深切針規也祛丘於切歃血所洽切啜也蓍式之切蒿屬筮者以為䇿什翼犍渠焉切代王之名載記什作步繁畤音止鴈門邑屬并州猗盧乙竒切代北王名拓跋氏拓他各切跋蒲撥切代比復姓自云拓天而生拔地而長遂以氏焉濊貊上烏外切又呼會切下莫客切胡各在東北方一説貌即濊也破落那西域大宛國之後也亟殺紀力切敏疾也毖兵媚切五年彪輔休切懌羊益切邾城陟輸切屬江夏郡更以工衡切改也嚻生刀切閎户萌切稿苦浩切木枯百中竹仲切當也疆埸上紀良切下羊益切炬火臼許切東葦燒慕輿埿音泥又蒲鑑切灅源川力軌切灅水出鴈門掬居六切在手曰掬羯虜居列切虜别號也榼盧城克盍切城名演音衍應璩應於證切姓也璩求於切其名釗指遙切又古堯切六年酣飲胡甘切洽也跪去委切拜跪也又渠委切嘏古馬切艦户黤切戰船四方施板以禦矢其狀如牢繕兵時戰切治也鼓譟先到切羣呼也蠮螉塞上於結切下於公切細腰蜂也以為塞名懦弱乃卧切又乃亂切扁紕蓮切又蒲殄切昵尼質切近也亦作昵溺中奴弔切睕睕烏官切睕睕深目貌耐奴代切忍也斌悲巾切詵所臻切挹婁國挹一入切夷狄國名楛矢侯古切木名堪為矢幹石砮奴古切石可為矢鏃七年嫠婦力之切無夫也阽危余廉切臨危也靡鬲靡夏之遺臣事后羿者羿死奔於有鬲有鬲今平原鬲縣彧於六切鴻臚凌如切鴻聲也臚傳也所以傳聲贊導九賔悕香衣切句踐古侯切越王名土斷都玩切決也皆以土著為決斷耳白籍秦昔切簿籍也白籍者謂古白丁之籍耳嶷魚其魚力二切晉紀十九通鑑卷九十七起元􅘬攝提格盡強圉協洽即壬寅至丁未凡六年顯宗成皇帝下咸康八年懌羊益切飲鴆直禁切毒鳥以羽毛歷酒飲人即死泝流桑故切逆流而上也窺𨵦上缺維切下容朱切私視也檿弧上烏簟切下音胡史記周紀云童女謡曰檿弧箕服實亡周國韋昭曰山桑曰檿孤弓也褒姒周幽王之后襁褓上紀兩切下輔枹切負兒衣所間居莧切迭也昱余一切皓胡廣切蹉跌上倉何切蹉跎也下徒結切跌踼也潰胡對切逃散也釗之遙切陳所直刃切與陳同鳩集居尤切猶烏合也燼餘刃切火餘也禇裒禇昌與切姓也衰其名蒲侯切鄴魚劫切魏郡之邑屬謏蘇后切蹊弦雞切徑也調徒弔切調賦也康皇帝建元元年為質職利切結信也慷慨上口莾切下口溉切幾將巨依切近也濛謨蓬切鯤公渾切惛謬止呼昆切惛怓也下靡幼切謬戾也橫陷胡孟切桂也趣逡須切嚮也評蒲兵切二年詡况羽切南羅夷狄國名其先本辰韓種地在髙麗東南居漢樂浪地彪輔休切中流矢竹仲切傷也飛矢曰流矢比至必寐切瓘古玩切漳水諸良切山海經曰漳水出荆山南注于沮水楛矢侯古切木名堪為矢幹愍眉殞切憐也譴去戰切責也嘏古馬切聃都甘切綜子宋切總也覿亭歷切爾雅見也孝宗穆皇帝上之上永和元年冠纓伊盈切冠系也逯明逯龍玉切姓也拉落合切摧也輻湊音福車輻也湊本作輳千候切共轂也猥烏賄切猶濫也澄汰他蓋切英俊子峻切智過千人曰雋芻蕘上窗俞切下如招切芻蕘採薪者也忤五故切逆也劾胡得切法有罪也骨鯁古杏切骨疆四支故君有忠臣謂之骨鯁與鯁同蹇蹇九輦切蹇難也易曰王臣蹇蹇匪躬之故惔徒甘切又徒濫切掾俞絹切官屬卓犖力角切超見也愔挹淫切疽千餘切癰也瓉藏旱切冠軍古玩切在諸軍之上故曰冠軍虨布蠻切又甫巾切涪城音浮梓潼郡之邑屬益州脅虛業切以威力相恐也二年夫餘馮無切夫餘地名在長城之北稿離國王子東明都其地因號夫餘去或作扶衰絰上倉回切亦作縗喪衣也下徙結切以苴麻為之挹退挹與抑同謗訕上輔曠切下所晏切誹毀也霽子計切雨止也耽都含切獠魯皓切西南夷别族飢饉穀不熟曰飢𬞞不熟曰饉侵軼徒結切又夷質切壞姑回切三年咱堅咱子感切姓也鴛鴦崎渠羈切曲岸曰崎噍類如淳曰噍音祚笑切無復有活而唯食者釡甑上扶兩切鍑屬下子孕切甗也按古史考云釡甑皆黃帝始造輜重上側持切下直用切輜載衣車重載物車行者所資總曰輜重笮橋音昨在蜀郡萬里橋之西按成都記云笮竹索也以竹簀為橋面以笮維之葭萌音家邑名至晉改為晉壽屬梁州梓撞郡輿櫬𥘉覲切空棺也面縛符攫切縛手於後唯見其面也枹罕枹音膚本枹鼓字其字從木古罕羌侯邑也璩強魚切塹上艷切坑也軺車餘招切説文小車也白幍乞洽切埤蒼云帽也以厭一涉切廣雅曰鎮也廣袤莫候切東西曰廣南北曰袤羽葆博抱切華蓋之類迸北諍切散走也晉紀二十通鑑卷九十八起著雍涒灘盡上章閹茂即戊申至庚戍几三年孝宗穆皇帝上之下永和四年忤五故切逆也柸脯枚切傲愎上五到切慢也下符逼切很也獼猴梯音彌侯梯名危惙陟雪切憂也詰之去吉切問也頷户感切舐神紙切以古取物也彗星徐醉切又音歲又囚芮切妖星標卑遙切木杪也鹿盧如字或作樚轤井上汲水水郝稚郝黑各切姓也汙其音烏説文穢也蕤如追切昱余六切參綜子宋切錯綜也羡延面切又似箭切皓胡廣切屬之之欲切委也斌悲巾切上邽音圭天水邑屬秦州豺士諙切嬖之博計切愛也鶩音務又音目所哂式忍切笑也五年推他回切踊抃余壟切踊跳而拊手也大呼火故切大聲也下辦步莧切武都邑屬秦州冠軍古玩切冠諸軍故曰冠軍狷直吉椽切狷介也鎧可亥切甲之總名畯子峻切瘳丑鳩切病愈也惛眩上音昏下音縣趣鄴逡須切檄胡狄切符檄也古者以木簡為書尺二寸也羯士居謁切羯虜也禍難乃旦切弭之母愧切止也怖普故切惶懼也唯唯愈水切話也黃鉞王伐切大斧以金飾之擐甲古患切春秋傳擐甲執兵又胡貫切劈踊上房益切下與竦切琨古渾切雹弼角切兩水也薊音計燕國之邑暹思廉切枋頭分房切曹操於淇水口下大朸木以成堰遏淇水東入白溝以通漕運因號其處曰枋頭燼徐刃切瓦解胡買切散也令支上音鈴又郎定切下音祗邑名古伯夷國在遼西奕音亦瞋目昌真切説文張目也泓烏宏切慕輿根慕輿復姓根其各按姓纂云解卑慕客氏音訛又為慕容也恪苦各切禇裒上丑吕切本商後宋恭公子石食采於禇因以為氏下薄侯切麋嶷上武悲切姓也下魚其切又魚力切下邳符悲切國名屬徐州龕口含切索振索蘇各切姓也振其名重餌仍吏切食之也囹圄上郎丁切下語舉切獄名駱谷音落努力奴古切努言勉也驍勇堅堯切健也彈碁彈徒寒切碁或作綦丗説云始自魏內宫粧奩之戲此説誤也按西京雜記漢武帝好蹙鞠言事者為勞體非至尊所冝帝曰擇以而不可勞者奏之家君作彈碁貢帝大恱見續事始闓音開諶是壬切呼延盛呼延復姓釗指遙切六年滏口奉甫切水名在鄴灄頭日涉切水名在西陽楞魯登切馮翊弋職切郡名屬雍州互酋自秋切􅝡螉塞上於結切下於公切細腰蜂也以為塞名埿奴低切又奴計切槎山鉏加切衮斫木也春秋傳云山不槎又仕雅切曄筠輒切撲滅普木切擊滅也俟釐俟牀史切姓也鹿勃早勃蒲沒切鹿勃復姓邯鄲音寒丹廣平邑屬司州榼苦閣切琚九魚切盟津晉書音義盟音孟地名菁倉經切軹關諸氏切侮嫚謨晏切侮易也磋七何切好畤諸市切邑名俘芳無切軍所獲也評音平謏先鳥切江虨布蠻切又悲巾切資治通鑑釋文卷第十
