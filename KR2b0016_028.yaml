body:
  text: 右宣義郎監成都府糧料院史炤後梁紀一通鑑卷二百六十六起強圉單閼盡著雍執徐即丁卯至戊辰凡二年太祖神武元聖孝皇帝上帝姓朱氏𥘉名温本從黃巢爲巢行營先鋒使背巢歸唐僖宗賜名全忠拜宣武軍節度使昭宗光化三年進封梁王哀帝天祐四年受唐禪國號梁建元開平開平元年楊渥渥字承天廬州合淝人其父行宻唐乾符中江淮羣盗起行密遂據廬州盡有淮南之地昭宗封爲吴王渥嗣立亦自稱吴綦章綦渠之切姓也酣飮胡甘切洽飲也作樂音洛左右牙牙者旗名執牙者因以名之分左右隊故稱左右牙顥下老切驕横户孟切牙城古者軍行有牙尊者所在後人因以所治爲衙曰牙城者即衙城也思勍渠巾切璠孚袁切戍舂遇切說文守邊也閒道居莧切徑途也數所矩切計其一二而數之也下因數同鐡撾陟瓜切箠䇿也魏博唐之藩鎮也節度貝博魏相磁洛衛凡七州治魏州勞王郎到切慰也長子縣名讀如長短之長屬潞州同華户化切二州名帥百官所律切與率同它皆傚此錢鏐鏐字具美杭州臨安人唐昭宗時拜鎮海軍節度使治錢唐㝷封越王至梁封爲尚父呉越王傳璙力弔切吴越王錢鏐之子也傅瓘古玩切傳璙之弟敦煌音屯皇郡名應劭曰敦大煌盛也盧龍唐之藩鎮也節度幽涿營瀛莫平薊嬀檀凡九州治幽州劉仁㳟劉仁恭深州人唐昭宗乾寧𥘉爲幽州盧龍節度至梁𥘉其子守光囚之遂有盧龍因號犬燕瘞於罽切幽薶也堇泥渠巾切黏士也幾至巨依切近也銀胡䩮盧谷切胡䩮者箭室也以銀飾之因爲營屯之號山後八軍山後八軍謂涿營瀛莫平薊嬀檀皆隷盧龍節度盧龍乃幽州范陽郡也青澳於到切水名處州昌與切更名晃更工衡切晃胡廣切鹵簿郎古切炙轂子雜録云輿駕行幸羽儀導從謂之鹵簿自秦漢始有其名按字書鹵大楯也字亦作櫓以甲爲之所以扞敵也甲楯部伍之次皆著之簿籍凡儀衛皆具五兵獨以甲楯爲名者行道之時甲楯居外餘兵在内故但言鹵簿也其事見馮鑑所纂續事始又唐蘇鴞演義云鹵者鼓也簿者部也謂鼓駕成於部伍也其說非張禕許歸切投瓊投或作骰愽戯也以玉爲之故云投瓊所以擲采而行棊者列子謂之明瓊睨五計切邪視也碭山徒浪切又音唐秦之碭郡右唐爲宋州栫之在甸切以棘圍之栫之以棘見左氏傳楚王馬覇圗許州鄢陵人唐乾寧中拜武安軍節度使鎮潭州盡有湖南之地至梁封爲楚王宣武節鎮本治宋州梁徙于汴州沈深持林切蜀王王建字光圗許州舞陽人唐僖宗𥘉陳欽瑄節制西川田令孜爲監軍召建欲致麾下欽瑄疑止之建怒以兵攻成都殺欽瑄令孜昭宗授以西川節度使至梁受禪遂稱帝於成都國號大蜀歧王李茂正深州博野人本姓宋名文通爲博野軍戍卒黃巢犯京師茂正以攻𥙷扈蹕都頭僖宗賜姓名拜鳯翔隴右節度使昭宗時封爲歧王說吴舒銳切誘也鄴王音業縣名屬相州契丹契音乞北狄之國號在秦漢爲匈奴在隋唐爲突厥居黄水之南黄龍之北得鮮卑之故地或以爲鮮卑之遺種𫀆笏梅老契丹之臣髙頎渠希切習爾契丹王唐書本傳作習爾之在咸通末其國土宇始大部落䆮疆欽德契丹王習爾之族人繼嗣習爾位阿保機阿於何切契丹有八部阿保機不知其何部人爲人多智勇別自爲一部居古漢城稍以兵擊滅七部遂併爲一國奚奚本匈奴之別種唐末居隂涼川在幽州之西南分爲五部一曰阿薈部二曰啜米部三曰粤質部四曰奴皆部五曰墨訖支部其王曰去諸以別部徙嬀州始分爲東西奚去諸自爲西奚而東奚居琵琶川室韋契丹別種東胡之北邊蓋丁零苗裔也地據黄龍北傍峱越河共有七姓逹靼當割切又之列切逹靼者靺鞨之遺種居奚契丹之東北後爲契丹所攻而部族分散其別部散居隂山者自號逹靼邪律氏余遮切阿保機複姓突厥古匈奴北部房金山之陽臣于蠕蠕種裔䌓衍至吐門遂彊大焉繒慈陵切帛也劉隱劉隱其祖安仁上蔡人也後徙閩中商賈南海因家焉梁封爲南海王卒其弟陟襲位盡有嶺表之地僣號於廣州改元乾亨國號漢王審知王審知字信通光州固始人唐末黄巢宼亂因有閩嶺五州之地昭宗就封閩王至其子延鈞乃即帝位改爲龍啓國號閩髙季昌髙季昌字賂孫陜州陜石人梁𥘉鎮荆南節度十州後爲諸道所侵季昌所有江陵一城而巳至唐莊宗時封南平王郢王以井切楚地名也䲭梟上稱脂切下堅堯切鷙猛之鳥也戰艦户黤切戰船四方施板以禦矢其狀如牢瀏陽力求切又音栁縣名屬潭州唐景龍二年析長沙置而陳直刃切與陣同他倣此鼔譟先到切羣呼也禆將頻彌切徧副也百艘蘇刀切船之緫名彭玕居寒切蚰蜒塹上以周切中以然切下七豔切塹名建瑭徒郎切宗奭施隻切抄之𥘉交切又楚教切略取也甬道尹竦切應劭曰築垣墻如街巷屬於朱欲切說文連也涔陽鋤簮切地名在郢中泠業泠郎丁切姓梟鏡上堅堯切烏名食母鏡獸名食父黄帝欲絶其類使百物祠皆用之爲質職利切結信也仔倡仔津之切又祖似切二年疽千余切癰疽也珙居竦切諠譁上况袁切亦作讙下呼瓜切囂皃恟恟許容切諠擾之意怏怏於两切意不滿也數誚才笑切責也亦作譙酖直䕃切毒鳥以毛羽歷酒飲之即殺之余吾寨余音餘又音徐水名也在朔方即其地以爲寨兵趣逡湏切嚮也懾服之涉切亦作讋失氣也撲殺蒲角切或作􅡼汶川眉頻切屬茂州緘古咸切瀺港上仕緘切下古項切地名黄碾尼展切地名去上黨四十五里詰旦去吉切平旦也器械胡介切有盛爲械無盛爲器瑾渠遴切剛愎弼力切狠也翟虔直格切姓也又音狄轘胡貫切以車裂人也剽奪匹妙切刧略也皆稱昌孕切渾特户昆切姓也沙陀唐何切西突厥別部處月種也居金娑山之陽蒲類海之東有大磧名沙陀故號沙沱沅江愚袁切縣名說文氷岀䍧牱故且蘭東北入江澧州里弟切唐武德四年平蕭銑置向瓌上式亮切姓也下姑回切繒纊苦謗切說文絮也後梁紀二通鑑卷二百六十七起著雍執徐八月盡重光恊洽二月即戊辰至辛未凡四年有竒太祖神武元聖孝皇帝中開平二年長矟色角切亦作槊通俗文曰矛丈八者謂之矟郪七稽切縣名屬梓州雍於用切州名東崤西漢南商北居庸四山之所擁翳也因以爲名滁直魚切三年俸房用切禄秩也翟州直格切本坊州鄜城縣唐未置翟州梁改爲禧州鄜城芳無切縣名嬰城於盈切繞城以自守也閩王眉巾切閩越之地也琰以用切垂絙居登切大索也礮披教切機石也或從包鏢匹燒切鈴郎丁切似鍾而小爲殿丁練切軍後曰殿旗幟式志切又昌志切菰蔣上攻乎切下資良切草名也駱知祥駱盧各切姓也邠悲巾切吐谷渾谷余玉切渾胡昆切乞伏乾歸之苗裔自後魏以來名見中國居於青海之上焉薊音計栫在見切以棘圍之也藂徂紅切聚也夲作叢鄩徐林切藺如海藺良刃切姓也其先韓獻子元孫曰康食邑於藺因氏焉聶賞聶尼輒切姓也楚大夫食采於聶因以爲氏並南歩浪切近也苑玫苑於阮切姓也玫謨柸切強起其两切勉之也玘墟里切柵測革切編立木爲之蹂藉蹂人九切踐也藉或以足歙失渉切郴丑林切骨言骨古怱切姓也瘳丑鳩切病愈也鍇口駭切澧音禮紿徒亥切欺也誑也索山客切求也風痺必至切濕病也涇古靈切鐡槍千羊切或作飼祥吏切食也四年琦渠冝切嬖臣必計切說文便嬖愛也謔迄却切戯也𥚹急𥙷典切性狹也潘炕潘普官切姓也炕苦浪切華温琪華胡化切姓也沁七鴆切州名自首式救切自服其過也沂魚衣切歐傷一口切擊也驕撗胡孟切不順理也衣以於旣切服之也遺弋季切賨藏宗切敖駢敖五勞切姓也駢蒲眠切瑊古咸切磧中七迹切水渚有石者沈行思沈音審姓也周文王之子聃季食采於沈子孫因以爲氏鍜鎚上都切下傳追切婺州亡遇切取天文婺女之分爲名勍渠京切鐬呼外切淶水郎才切縣名屬易州井陘音刑縣名屬常山郡井陘山在南邢洺上音刑下音名二州名廖爽力救切姓也贑如淳音感縣名屬虔州新淦音紺又古含切縣名屬吉州芻蕘上䆫俞切下如招切芻蕘採薪者也挑戰徒丁切擿嬈敵以求戰也詬之許候切博雅罵也鎧冑上可亥切甲也下直又直兠鍪鏤郎豆切刻鏤薄我白名切迫也褰帳丘䖍切說文絝也蠻酋自秋切長也溆象吕切儲偫上直如切下文里切猶蓄積也乾化元年刈音乂芟也剉寸卧切斬芻也援槍于元切引也糗糧去乆切又丘救切日昳徒結切日側也至晡奔謨切日加申時澶時連切州名行琮徂宗切鄢陵音偃縣名屬許州淇門渠之切地名阪甫遠切坡者曰阪鐡刷數滑切愽雅篇謂之刷磁相上墻之切下悉亮切二州名漳水諸良切山海經曰漳水出荆山後梁紀三通鑑卷二百六十八起重光恊洽三月盡昭陽作噩十二月即辛未至癸酉凡二年有竒太祖神武元聖孝皇帝下乾化元年亟訖力切說文敏疾也又去吏切宗侃空旱切募莫故切召也赭𫀆止也切赤色内難乃旦切伺相吏切伺候也瞳徒紅切趣讀曰促侵軼弋質切捧巵章持切古字作觝飲酒禮器也古以角作受三升斷袊上徒玩切截也下居吟切衣系斧質上匪父切斫也下職日切亦作鑕椹也古者斬人加於椹上而斫之冎而古瓦切剔肉置骨也噉之徒濫切食也亦作㗖窒陟栗切塞也彦琛丑林切猝至蒼没切怱也閒行居莧切從閒道而行斜谷上余遮切下余玉切在長安西南南曰襃北曰斜通漢中洹水于元切縣名𥘉隷相州後屬魏州昔蘇秦合諸侯盟於此忷懼許容切又許拱切擾恐也左傳曹人懼躁忿上則到切下撫吻切易羊益切州名因易水以名之簡顒魚容切球渠幽切府藏才浪切物所蓄也峭七笑切二年大呼火故切呌也勞之郎到切慰也玭蒲眠切儁祖峻切蓨縣音條漢書作脩同音屬信都國唐屬兾州董衝音他彫切觀津工喚切又音館地名邏郎佐切廵也裂眥疾智切又才諸切目眥也或書作眦夜縋馳僞切繩垂也左傳夜縋而岀荷擔上下可切博雅儋也下都泔切說文荷也踣地蒲墨切頓也僵也忻許斤切暝莫定切夕也斬馘古獲切軍戰斷耳也奮梃待鼎切木片覘之癡廉切又敕豔切窺也繼岌逆及切徒跣先典切足親地也玠音介朝請才性切戩子踐切契苾上音乞下蒲結切其先鐵勒之部落與薛延陀等凡十五種散處磧北後至是與處月諸部皆微弱矣奮檛莊華切馬箠也蕘如招切以徇徐峻切行示也縱横上從容切或作從下胡盲切或作衡東西曰縱南北曰横翃乎萌切悰徂宗切漣水陵延切縣名屬泗州哽咽上古杏切下一結切聲塞也撻之他各切打也更相工衡切互也訥奴骨切解胡買切縣名屬河中府猗氏乙竒切縣名屬河中府撤直列切去也鼾息侯旰切卧息也宗汾符分切均王上上乾化三年嚴犨蚩周切剄吉定切斷也珽他鼎切鍠胡盲切渦信渦古禾切姓也豭喙上居牙切牡豕也下許穢切口喙也又昌芮切齙齒步交切露齒狷急古泫切又吉掾切狷介也錮之音固幾死巨依切近也潘嶠渠廟切中流矢竹仲切傷也飛矢曰流矢宗黯乙減切匄食居大切乞也或作丐比至必寤切姚洎巨至切傳瑛於京切潘葑方容切又芳用切地名浙人之列切江水東至㑹稽山隂而浙故呉㑹之地因以稱浙罷倦罷讀曰疲文扆隱豈切㓜懦乃卧切又乃亂切弱也或作愞俛首音免低頭也漢書與俯同音後梁紀四通鑑卷二百六十九起昭陽作噩十二月盡強圉赤奮若六月即癸酉至丁丑凡三年有竒均王上下乾化三年拊其方武切拍也騎殿丁練切軍後曰殿京觀古亂切積户封土其上謂之京觀滄州七岡切足腫之隴切釋名曰腫鍾也寒熱氣鍾聚也趣逡湏切嚮也四年械胡介切枷械練糸斥昌者切凱歌苦亥切樂也瞋目昌真切張目涪音浮州名鐡絙居登切索也洙音殊黔渠金切南詔南蠻國名本哀牢夷後烏蠻別種也夷語王爲詔其先渠帥有六自號六詔曰蒙嶲詔越析詔浪穹詔邆睒詔施浪詔䝉舎詔兵埓不能相君蜀諸葛亮討定之蒙舎詔在諸部南故稱南詔居永昌之東姚州之西潘倉嶂之亮切地名山之髙險曰嶂嵯政才何切宗鐸徒各切正明元年郝黒各切姓也㚋金堡㚋都聊切大也多也堡博抱切堤也墇也詗導虚政切又火逈切知處告言之也邵賛邵實照切姓也彈疽千余切癰也張筠于倫切脅之虚業切脅迫也磐結蒲官切磐錯也澶時連切擐甲胡慣切貫也左傳擐甲執兵建瑭徒郎切訛言五禾切謬也亦作譌詩云民之譌言梟首堅堯切斷首掛於木上磔尸陟格切裂也睚眦上牛懈切下士懈切怒視皃鄆音運壘魯水切軍壁閒使居莧切反閒者披靡普披切嗤赤之切笑也堞逹恊切城上垣堇泥居隱切草也又音芹援蕂上于元切引也下詩證切苣蕂胡麻也斥候按許慎淮南子云斥度也候視也斷腕上徒玩切截也下烏貫切手腕也詰朝上去吉切下陟遥切平旦也翌日與職切明日也甬道尹竦切應劭曰築垣墻如街巷饋餉上求位切通作餽下式亮切或作饟挑戰徒了切擿嬈敵以求戰也擣其都皓切築也勍敵渠京切强也春秋傳勍之人宗綰烏板切依勢隱豈切日紊文運切亂也煨燼上烏回切下徐刃切火餘也二年方陳直刃切與陣同靳紹居焮切姓也遲明文三切待也或作邌亦徐緩之意音黎棣大計切蔚州紆勿切珏訖岳切綮遣禰切瓘古玩切傳珦許亮切述律複姓党項音黨西羌之遺種其國在禹貢析支之地東至松州西接葉護南界舂桑北隣吐渾有地三千餘里黄頭臭黄頭本室韋之種也室韋分部凡二十餘曰嶺西部山北部黄頭部彊部也悉處柳城東北近者三千遠者六千里墾音懇耕也曏許亮切通作嚮三年宫彦璋宫如字姓也捐余專切棄也傳舎張戀切驛遽也渝關容朱切以渝水得名在遼西樓櫓郎古切城上守禦望樓哂之矢忍切笑不壞顔曰哂毳幕充芮切以細毛爲幕頡利胡結切突厥之王也處羅可汗之弟名咄苾頡利其號輜重上側持切下直用切輜載衣車重載物車行者所資緫曰輜重後梁紀五通鑑卷二百七十起強圉赤奮若十月盡屠維單閼即丁丑至己卯凡二年有竒均王中正明三年番禺上蒲官切下魚容切又音愚縣名屬廣州疆埸上居良切界也下羊益切畔也鎧仗可亥切甲仗也郷導許亮切趨郷而引導也蒱博薄胡切老子入胡作摴蒱戯伶人郎丁切樂工敺一口切擊也忤五故切逆也乘間居莧切隙也縁河俞絹切柵測革切編木爲之也葭葦上音家下羽鬼切蘆屬葭者葦之未秀者汜水汜舊讀作凡顔師古音祀本漢成皐縣隋改爲汜水唐因之屬孟州四年濮音卜州名贑如淳音感吉州有贑石山遂興水與䖍州相近瀰民卑切瀰漫水皃鄜延芳無切並州名昬瞀亡遇切又莫候切目不明也偵察丑正切博雅問也排闥土曷切宫中小門也炕虚郎切又苦浪切淑妃神六切後宫女官宗昱余六切蒼鶻胡骨切其義猶蒼頭之類刀彦能刀丁聊切姓也瑾巨靳切冬貯展吕切積也於幬直由切禪帳也廡下罔甫切堂下周屋也鄣面之亮切隔也本作障翟䖍翟直格切姓也又音狄僅渠遴切材能也玢悲巾切顧承郾於建切臨洮吐髙切兆州納賄呼罪切財賄桑柘之夜切亦桑也雩都雲俱切邑名屬虔州繕甲時戰切治也晃胡廣切周輅魯故切光葆博抱切上游游即流也謂居水之上流逗遛上大透切下力救切謂稽留不進也蹉跌上倉何切蹉跎也下徒結切跌踢也殿後丁練切軍後曰殿晡奔謨切日加申時拉朽落合切折也嵐州盧含切撓敗火髙切攪也其字從手撒刺阿撥撒桑葛切刺郎逹切阿於葛切契州主之弟名五年内宫中内讀曰納倜儻上他歷切下他曩切卓異皃艦户黤切戰船四方施板其狀如牢艘蘇刀切船緫名迢田聊切船舷胡千切船邊也僵仆上居良切僨也下芳遇切頓也禀其力錦切賜榖也竹笮疾各切竹索也艨艟上莫紅切戰船所以突敵睥睨上匹計切下研計切衺視也氏延賞氏姓也延賞其名木甖於耕切缶也瀏陽力求切又音栁縣名屬潭州香灣烏還切地名涸曷各切竭也盡也鈴郎丁切似鍾而小澈直列切鄱陽蒲禾切饒州髙麗音離本扶餘之別種也其地東跨海距新羅南亦跨海距百濟西北度遼水與營州接瓉才賛切又在旱切後梁紀六通璼卷二百七十一起屠維單閼十月盡元黓敦䍧即已卯至壬午凡三年有竒均王下正明五年河壖而縁切河之邊地也鄩徐林切六年受賕渠尢切以財物枉法相謝也簿責歩户切以文簿而責銓選上且縁切下息絹切琪渠之切珽他鼎切隂伺相吏切伺候也顥下老切鼔吹尺僞切音律管堹之樂便佞毗連切便僻邪佞也壞其古聵切毀也搏伯各切索持也下邽音圭縣名屬華州汧陽輕煙切縣名屬隴州箭筈嶺筈苦活切山嶺名朝請才性切畫舸嘉我切大船也仰成魚向切廣雅恃也符籙龍玉切符書法籙也櫛風側瑟切梳也㑹計上右外切緫合而計度也傳琇以九切又息救切龍德元年婕妤上即涉切下羊諸切婕言接幸於上也好羙稱也爇儒劣切焼也蠟炬臼許切火炬也九錫九錫一曰車馬二曰衣服三曰樂則四曰朱戸五曰納陛六曰虎賁七曰斧鉞八曰弓矢九曰秬鬯捃俱運切說文拾也汛掃思進切灑也驕愎弼力切狠也忿敷粉切怒也又敷問切鎰弋質切肘腋上陟栁切臂節也下夷益切胳也在肘後酖之直䕃切毒酒無恙餘亮切憂也病也舋許愼切隙也疽七余切癰疽也鋋時連切滹沱上荒烏切下唐何切水名中流矢竹仲切傷飛矢也孽子魚列切庶子也猶木之有孽生也妻之七計切以女嫁人曰妻嬰城於盈切繞城以自守也遺之弋季切贈也溆象吕切二年噬時制切噬嚙𬒮彌蔽切䄂也猶豫余救切猶獸名其性多不决故稱猶豫心沮在吕切喪也氣索昔各切盡也奚酋慈秋切長也秃餧弩罪切奚酋名布藁古老切稈也縶之陟立切繫也嬀居爲切州名複壘上方六切重也下魯水切軍壁也箙房六切盛弓矢器掊歛蒲侯切詩曰曽是掊克謂聚也狼狽博蓋切狼屬生子欠一足二足相附而行離則蹎故猝遽謂之狼狽翥章庶切磔陟格切裂也後唐紀一通鑑卷二百七十二起昭陽恊洽即癸末凡一年莊宗光聖神閔孝皇帝上按帝晉王李克用之子也其先夲號朱邪蓋出於西突厥至其後丗別自號曰沙陀而以朱邪爲姓懿宗賜其祖赤心姓名曰李國昌因以氏焉帝襲王于太原㝷即帝位改元同光國號唐同光元年豆盧革豆盧複姓鏐力幽切琢竹角切閒之涺莧切間迭也爲質職利切結信切忸怩上女六切下女夷切漸恧也歔欷上林居切下許旣切歎息皃繼岌魚及切鈔掠上𥘉交切又楚教切下離灼切刧人財物也燕顒上因肩切姓也下魚容切鄆音運從珂丘何切簹都郎切内靴内讀曰納靴許茄切履也唐突陀骨切觸也其字或从手鞴炭歩拜切韋囊所以炊火者更衣工衡切改也鏁蘇果切銀鐺也撤直列切去也栰房越切舟栰詗知火逈切又虚政切知處告言之樓櫓郎古切城上守禦望樓也斷紲上徒玩切下私列切系也檥舟魚倚切南方人謂整船向岸曰檥暍死許葛切熱死也鍋古禾切􅟋温器沮橈上材汝切下女教切沮壞而攬撓之也蟲豸丈爾切蟲無足曰豸紹斌悲巾切詾詾許容切喧擾之意行五胡郎切列也在珣湏倫切詼嘲上枯回切下陟交切譏戯謔浪迄却切戯也詩曰謔浪笑傲鄙俚音里鍇古諧切汶水文運切水出兖州萊蕪縣遞坊鎭遞特計切地名矟色角切矛屬或作槊馬躓陟利切說文跲也禆將賔彌切副助也曏許亮切舁羊諸切共舉懟直類切怨也紓商居切解也縊於賜切經也晏球音求齕下没切齧也抉一决切桃也顗語豈切封翹祁堯切笴上古旱嘉我二切箭簳也伶官郎丁切樂工鏟楚限切說文鏶也彗星徐醉切又音歳妖星批普迷切擊也頰古恊切靣旁也搢紳音晉搢笏而垂紳也甚倨居御切傲也紹琛丑林切相埒力輟切諳烏含切說文悉也從容七從切猶休燕也稱是尺證切等是詆訶上丁禮切下虎何切詆訾而訶責也㦸門几劇切棨㦸也立於門外剄吉定切斷也嗇財所力切愛惜也無厭於廉切不足也勍渠京切後唐紀二通鑑卷二百七十三起閼逢涒灘盡旃蒙作噩十月即甲申至乙酉凡一年有竒莊宗光聖神閔孝皇帝中同光二年叶與恊同繼魚檢切昬懦乃卧切又乃亂切弱也饋遺上求位切餉也下弋季切贈也儲積直如切儲偫也榷訖岳切水上横木以度者官自榷賣如設一木獨取利也解縣胡買切縣名屬河中府怏怏於兩切志不滿也弭母愧切止也嬖博計切便嬖愛也扼腕上乙革切握也下烏貫切手腕也華隂户化切縣名屬華州枝派普卦切水分流曰沠譜諜上博古切下逹恊切藉録也蛟龍居肴切說文龍之屬也螻蟻上落侯切下魚倚切蚍蜉也薪蘇息鄰切薪謂樵也蘇謂草也茹人恕切菜茹也販鬻上方願切下余六切浚私閏切亦作濬索水昔各切索水在滎陽酒酣胡甘切應劭回洽也露髻吉詣切束髮也喧譁上許元切亦作讙下戸瓜切沈湎上持林切下彌兖切沈於酒也邢乎經切搏伯各切索持也僅仆芳遇切又敷救切頓也昭穆時饒切父爲招面南子爲穆面北考覈下革切覈實號哭胡刀切大呼也糗糧去乆切又丘救切暴骨薄報切又歩木切譟先到切羣呼也貸他代切借貸之貸檄胡狄切符檄繭絲吉典切𧖟衣也閩眉貧切東南越也周匝作荅切羡餘延面切延也餘也童騃五駭切癡也昵比上尼質切下必寐切親也近也紊亂音問亦亂也瓦解胡介切判也散也隍胡光切城池也有水曰池無水曰隍鏃作木切矢末也吐蕃本西羌屬蓋百有五十種散處河湟江岷間有發羌唐旄等居析支水西祖曰鶻提勃悉野徤武多智稍并諸羌據其地蕃發聲相近故其子孫曰吐蕃而姓勃窣野或曰南凉秃髮利鹿孤之後間使居莧切間諜者暝莫定切夕也磔陟格切裂也婁繼英婁洛侯切姓也掎其舉綺切牽其後曰掎宗鍔逆各切洋音祥恍惚上虎晃切下呼骨切蹂踐人九切蹂踐亦蹈躤也翟虔翟直格切姓也又音狄鐡劵去願切劵約也釋名曰劵綣也相約速繾綣爲限也勝衣書蒸切任也窘之渠殞切迫也嵐盧含切豳王悲巾切與邠同三年遥隄丁奚切亦作堤細鎧可亥切甲也涿竹角切覘丑廉切又敕豔切窺也䆳息遂切深也逺也嬪御毗賔切婦也周禮有九嬪九御溽暑儒欲切溼暑也營繕時戰切修也治也髙伉苦浪切髙極也泥濘乃定切筠于倫切霽子計切止也榜掠上音彭下力灼切又音亮煬帝餘亮切烽火敷容切燧候表也邊有警則舉火薊音計彦禋伊真切奉璉力展切橋棧助諫切棚也架木爲之桔柏津桔音結餞才線切送去也宗汭儒稅切舟絓古賣切罥也白芀都聊切地名後唐紀三通鑑卷二百七十四起旃蒙作噩十一月盡柔兆閹茂三月即乙酉至丙戌不滿一年莊宗光聖神閔孝皇帝下同光三年回鶻胡骨切本曰回紇其先匈奴也俗多乗髙輪車元魏時亦號髙車部姓藥羅葛氏居薛延陀北至唐德宗時請易回紇曰回鶻言捷鷙猶鶻故稱回鶻渝羊朱切州名璽綬是酉切印組也承㳙音蠲燔符袁切爇也旬浹即叶切王鍇口駭切函首胡䜛切匱也以匱盛首梟堅堯切斷首掛木上衰絰上倉回切䘮衣也或作縗下徒結切首戴也徒跣先典切足親地也輿襯𥘉觀切空棺也衡麓盧谷切山足曰麓衡謂衡山也莵裘兎都切魯隱公謂公子暈曰使營菟裘吾將老焉見春秋隠公十一年樸􅈪上博木切下蘇谷切小木也呫囁上尺涉切下質渉切多言也一曰私罵塵柄音主麋屬以其尾爲拂也專横胡孟切不順理也犒軍口到切餉也皆數所矩切計其一二而數之也孟知祥孟知祥字保裔邢州龍岡人唐莊宗伐蜀壬衍降以知祥爲西川節度鎮成都明宗未請封蜀王㝷即帝位建元明德國號蜀昬耄莫報切老耄塗潦音老雨水大皃澀色入切艱澀龕澗苦含切地名僵仆上居良切僨也下芳遇切頓也龔九容切驃信皮照切南詔也旻武巾切瘠秦昔切瘦也紐女九切騬馬食陵切犗馬犗音戒俗呼扇馬爲改馬即犗馬也跋扈蒲撥切跋扈猶强梁也石壕胡刀切地名輻湊音福輪轑也湊本作輳千候切共轂也鈆鐡余專切青金也機杼丈吕切機之持緯者沈瑫土刀切明宗聖德和武欽孝皇帝上之上天成元年倔強渠勿切挭戾撾莊華切馬杖滏陽扶雨切縣名屬惠州勃海本號靺鞨髙麗之別種也髙麗滅率衆保挹婁之東牟山地直營州東二千里駭惋烏貫切驚歎謡言餘昭切爾雅云徒歌謂之謡仁晸知領切澶時連切南趣逡須切嚮也剽掠匹妙切刧掠人也撲討普木切掌也掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之守陴頻彌切城上垣噍類才笑切青州俗呼無孑遺爲無噍類挑戰徒了切擿嬈敵以求戰也景戡口含切紿之徒亥切欺也誑也行陳上胡剛切下直刃切行五軍陳也詭說上過委切下音稅詭詐而說誘之也檻車户黤切載囚車大巵章移切飲器也亦作觝古者以角爲之受三升更始工衡切改也虔釗之遥切蔚紆勿切朘刻荀縁切漢書日削月朘繼璟居永切爲殿丁練切軍後曰殿殍死平表切餓死鷂店餘招切又弋笑切地名汜水音祀在成皐傳瓘古玩切玘墟里切胙城存故切縣名屬滑州周公諸子所封左傳富辰曰凡蔣邢茅胙祭周公之嗣也杜預注東郡燕縣西南有胙亭今胙城即漢南燕縣也閹衣檢切宫中守門者後唐紀四通鑑卷二百七十五起柔兆閹茂四月盡強圉大淵献六月即丙戌至丁亥凡一年有竒明宗聖德和武欽孝皇帝上之下天成元年憩去例切息也北邙謨郎切又武方切洛陽北山名全斌悲巾切所中竹仲切傷也廡文甫切堂下周屋渴懑母本切又音滿煩也酪盧各切乳漿也内於内讀曰納殯必刃切殯殮也廵徼吉弔切循也淑妃神六切後宫女官汾符分切諳烏含切悉也繼嵩息中切繼嶤倪幺切戰艦户黤切戰船瞋目昌眞切張目也姧古姦字苛歛音何細也籛則錢切縊一賜切說文經也斬衰倉回切䘮衣不緶直斬割之縞素古老切鮮白色也劾奏胡得切按有罪也洺武并切以洺水爲名萇從簡萇直良切姓也東丹國契丹主阿保機攻勃海國拔其夫餘城命曰東丹國以其長子突欲爲東丹王沸騰芳味切涫也傪倉含切溆象吕切酋長慈秋切亦長也蓨音條漢書作脩亦音條縣名屬兾州董衝音他彫切邧苦岡切愠於問切怒也邏郎佐切廵也間使居莧切間諜者二年亶多旱切咭蜣上去吉切下丘良切蛣蜣即蜣蜋也邠悲巾切瘞壹計切幽薶也桀黠下八切炕呼郎切又苦莽切涪音浮珙居悚切晊之日切幟昌志切又式志切旗屬溝塍神陵切稻中畦也窰餘招切燒瓦竈也資治通鑑釋文卷第二十八
