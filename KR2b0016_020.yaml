body:
  text: 右宣義郎監成都府糧料院史照唐紀一通鑑卷一百八十五起著雍攝提格即戊寅正月盡七月不滿一年髙祖神堯大聖光孝皇帝上之上帝諱淵字叔德姓李氏隴西成紀人也其祖虎與李弼等八人佐周伐魏有功皆為柱國號八柱國家封唐國公帝襲封唐公事隋以功進封唐王義寧二年尋授隋禪改元武德國號唐武德元年隋恭帝諱侑煬帝長子元德太子昭之子封代王煬帝南征侑鎮京師義兵入長安遙尊煬帝為太上皇奉侑即帝位改大業為義寧元年渠帥色類切書殱厥渠魁渠大也魁帥也氐羌丁奚切西夷出自三苗羌姓之别酋長慈秋切長也入見音現請降胡江切服也東都周之洛邑即河南也隋唐皆都長安故以河南為東都時隋越王侗為留守虎賁官名賁讀與奔同言如猛獸之奔柵測革切編木為之北趣七俱切嚮也侗徒紅切煬帝孫元德太子昭之子封越王金墉城餘封切在洛陽故城西北魏明帝所築門堞徒協切城上垣鉦鼓諸成切鐃也陳於直覲切凡言軍陳皆倣此元帥左傳晉作三軍謀元帥元帥之名始見此後周乃有行軍元帥隋因之至唐亦以河間王為行軍元帥武德元年又以建成及秦王為左右元帥元璹神六切總管後周武帝以王謙為益州總管總管之名始見此隋唐因之或加大總管雍丘於用切縣名屬汴州射鉤食亦切魯納公子紏及齊師戰于乾時管仲射齊侯巾帶鉤羈縻上居冝切馬絆也下忙皮切繫也言牽制之林慮下音廬山名在河內本曰隆慮漢避殤帝名改曰林慮抄掠上𥘉交楚教二切下離灼切劫人財物也供張上居用切設也下竹亮切漢書注云若今言張設也酒巵音支飲酒圎器也受四升古以角為之字或作抵顧景於領切日景也趙孟視蔭謂顧視日景也圖儂奴冬切我也吳語沈后直金切言為沈湎之后丹陽在唐為升州屬江南東道煬帝作丹陽宫即此從駕從去聲驍果堅堯切武健也帥所部朔律切領也與率通凡言率者並同此符璽斯氏切符謂諸所合符以為契者璽王者印所以為信也武后惡璽字音近死改曰寶愷可亥切備身府千牛備身官名也掌執御刀以宿衛府者府寺之稱鴆直禁切説文毒鳥也以其毛歷飲食則殺人風霾莫皆切爾雅曰風而兩土曰霾晡後博孤切申時廄居佑切馬間下鍵巨偃切門壯也周禮運管鍵陳楚謂鑰曰鍵喧囂上許元切或作喧下虛驕切或作衢巷其居切四逹謂之衢倓徒甘切煬帝兄房陵王勇之子猝倉沒切倉猝暴疾也永巷胡降切列女傳周宣薑后脫簪珥待罪永巷永長也謂宮中之長巷也後改為掖庭令狐離呈切姓也畢萬之後國語晉大夫令狐文子梟堅堯切與通説文倒首也或者乃云梟倒縣有於木上非也豈以字從倒首故誤歟赧然乃板切而慙赤也杲煬帝有三子杲其季子也封趙王濺子賤切練巾郎甸切繒也罌烏莖切缶也瓶之大腹小口者貯丁吕切積也撤敕列切􅌔音簡煬帝第二子封齊王皛胡了切厮役音斯析薪養馬者綜子宋切機縷也戒嚴警備也沈光式甚切姓也麥莫獲切姓也糾合吉酉切繩三合曰糾糾合猶締交也比至毗至切稽胡堅奚切一曰步落稽胸奴别種劉元海五部之苗裔或去山戎赤狄之後追躡昵輒切蹈也級紇立切秦法斬首一賜爵一級故因謂斬首為級盛承正切姓也後漢有盛苞其先姓奭避元帝諱改姓盛櫟陽以灼切縣名屬京兆突厥上陀沒切下允勿切夏曰獯鬻商曰鬼方周曰獫狁漢曰胸奴魏曰突厥突厥者姓阿史那氏蓋右胸奴北部也髙祖起太原遣劉文靜與連和特勒突厥謂子弟曰特勒可汗河干切戎主稱猶曰單于也咄苾上當沒切下蒲結切咄設突厥謂别部典兵曰設咄其别部者名也説音稅凡請説字皆同下牙牙旗名也軍中所建下牙言其視事晚也千兩力尚切乘也井陘音刑縣名有陘山屬鎮州輜重上莊持切下直用切輜軿車也謂軍糧什物雜厠載之以其纍重故稱輜重盎烏浪切珠崖冝佳切郡名在大海中崖岸之邊出真珠畨禺上鋪官切下魚容切縣名在南海漢書禺音魚交趾音止郡名杜佑云南方夷人其足大指開廣者並足而立其趾交故名交趾勱莫敗切勉也臨良鴆也哭臨尉他徒何切漢髙祖時為南海尉名他因謂之尉他姓趙治南方漢立為南粵王冠軍古亂切縣名屬鄧州霍去病征胸奴功冠諸軍漢武封於穰縣之盧陽鄉故曰冠軍後省入穰縣屬鄧州邸都禮切郡國朝宿之舍在京師者率名邸邸至也言所歸至也置州髙祖初定天下改郡為州權置州郡頗多至太宗正觀十三年始定簿凡州府三百五十八良娣娣音弟太子有妃有良娣有孺子凡三等皇泰主即隋越王侗即位東都改元為皇泰遂號皇泰主骨咄祿咄當沒切咄苾之族咄苾郎頡利可汗契丹上音乞本東胡種其先為胸奴所破遂微至元魏自號契丹室韋室或為失契丹别種丁零之苗裔吐谷渾胡昆切西域國其先本遼東鮮卑徒河涉歸之長子曰吐谷渾其孫葉延遂以其字為吐谷渾氐髙昌西域小國都支河城其王麴伯雅隋妻以宇文氏女華陽公主控弦上苦貢切引也餉遺于偽切贈也納言即侍中也漢谷求云昔龍管納言而帝命惟允誠勑左右之臣戴金貂之飾執常伯之職帥古曰常伯侍中也內令史即中書令也中書令置自魏文帝隋改為內史令又曰內令至武德𥘉復曰內史令三年始改為中書令黃門郎門下省也晉志曰給事黃門侍郎與侍中俱管門下衆事因謂之門下省至唐凡三改其名曰東臺曰鸞臺曰黃門省開元中復曰門下省璡即刃切又音津屈突上曲勿切虜復姓感生帝正觀禮正月辛日祀感生帝于南郊春秋元命苞云天之五帝迭王王者之興必感其一故祀其所感生者如周為木德以青帝為感生義初加切􅈶户圭切東海之邑蓋古盍切姓也字書作􅥇離間間去聲齎祖稽切持也伏伽求迦切鷂雛弋照切騺鳥下崇芻切鳥子裙襦上渠云切下裳也下人朱切短衣也漸染子廉切以掎居綺切偏引也皂隸昨早切左氏傳人有十等王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺破野頭野亦作也按新史丗系表費也頭氏臣屬鮮卑後從其上稱宇文氏左掖夷益切宫門之兩旁者若人之臂掖也斛斯政斛斯虜復姓也導從才用切鐃吹上尼交切小鉦也下尺偽切鼓次也拷掠拷苦浩切掠也掠力樣切搒也排􅗋作管切廣雅鋌也拔闕西突厥曷薩那之弟遣使內附賜號吐烏過拔闕可汗達斗拔谷谷音育西突厥地名髙墌之石切城名挑戰徒弔切擲燒敵求戰也古謂之致師慕容慕容氏其先鮮卑種莫護跋歸魏襲冠燕代步搖冠諸部因呼為步搖其後音訛為慕容或云慕二儀之德繼三光之容遂以慕容為氏羅睺音侯京觀古亂切積尸封土其上謂之京觀京髙丘也觀謂如闕形也庸懦奴卧切弱也跋野蒲末也虜復姓闍市遮切丗惲於粉切唐紀二通鑑卷一百八十六起著雍攝提格即戊寅八月盡十二月不滿一年髙祖神堯大聖光孝皇帝上之中武德元年騷動蘇遭切憂動曰騷薜舉起金城武德元年卒其子仁杲追諡舉曰武帝折墌城名之石切鴻臚力居切漢書典客秦宫武帝更名太􅟾臚郊廟行禮讃道九賔鴻聲臚傅之也巖州本林慮縣武德二年置五年州廢屬相州太宗征髙麗又以白崖城置巖州非此州也臨洮土刀切郡名古諸羌之地輦輅上力展切説文挽車也從㚘在車前引之下洛故切亦車也以王飾謂之玉輅王者所乘列瘞於罽切幽霾也虞州本安邑縣武德元年置正觀十七年州廢屬河中數不色角切典當典主也當平聲文劵去頴切契也躪踐上良刃切轢也下才線切履也甕盎上烏項切麗也下烏浪切盆也襁負居兩切論語注負者以器曰襁屑越光潔切荀子貨財粟米者𬒳將日月棲避薛越之中野言輕棄之也繕治時戰切輔也器械下介切何休注公羊云攻守之器曰械一曰有盛為械無盛為器一曰幡之總名難之如字邴兵永切姓也簡練良甸切擇也字或從手旗幡孚袁切字或作幡旌旐之總名傍河步浪切單時戰切姓也不啻施智切通作翅披靡披上聲重騎上直容切下渠冝切刺槊上七賜切直傷也又千迹切穿也下色角切矛長丈八曰槊捩折上力計切拗捩也下之列切斷也重創上直隴切下𥘉莊切蓐食儒欲切未起而牀蓐中食遲明漢書注天未明之頃明遲於事故曰遲明變為去聲音丈二切薄密伯各切迫也剽勇匹妙切輕也譟蘇到切羣呼也幕府末各切漢書注謂將軍軍旅無常居止故以帳幕言之虎牢昔周穆王獵於鄭圃獲虎命畜之因名其地為虎牢在孟州汜水縣所噉徒敢切噉食髙墌人城名也舊史脫人字為殿都甸切軍在前曰啓在後曰殿語城牛倨切告也大呼火故切叫也嬰城伊盈切繞城以自守始畢突厥可汗之號名咄吉髙祖起太原遣劉文靜往聘與連和者戊寅曆唐以戊寅歲甲子日登極曆元戊寅日起甲子如漢太𥘉一也唐曆凡八改曰戊寅曰大衍曰五紀曰正元曰觀象曰宣明曰崇元終始二百八十九年也仵阮古切姓伺隙伺相吏切窺伺也鬪鬩許歷切詩兄弟鬩于牆鬩狠也秦王浩隋煬帝弟秦孝王俊之子也迎勞郎到切比於輔履切並也台司台宿鼎司三公之位也蓋三公者上應三台三司者司分鼎足求賄呼浼切財也翊衛唐有十六衛各有左右其左右衛及左右金吾謂之四衛餘謂之雜衛倨見居御切傲也武陟縣名李育德以武陟來降置陟州舊史作李厚德非也武德四年州廢遂屬懷州綦公順綦渠之切據青萊𥘉從李密武德元年密敗來降蘭成舊書作劉蘭革命記為劉蘭成見兵音現據今所有兵數走郡音奏趣嚮也離間古莧切諜也芟草所銜切刈也安堵音覩墻堵也言不遷動如故以賑止忍切移檄胡歷切檄者以木簡為書長尺二寸移行也浙州先歷切木漢之析縣武德二年置其後州廢為內鄉縣屬鄧州李軌居洧切起武威號涼王僣帝號改元仁杲薛舉子武德元年八月嗣舉位居折墌城十一月秦王敗之十二月斬於長安市沮喪上在吕切止也壞也下去聲渾幹户衮切姓也出自渾沌氏之後直造七到切至也禇亮張吕切又音楮謨莫胡切乘傳張戀切乘傳者依承符傳而行若使者持節爾傳者以木為之長尺五書符其上以為信陽翟直格切縣名屬潁昌以邀於霄切邀遮堯君素堯姓也出自陶唐氏之後蒲反府逺切唐𥘉為蒲州後為河中府漢書注本名蒲秦始皇東巡見長坂故加反云撲殺蒲角切投擲而殺之怏怏倚兩切志不滿也慿藉上皮氷切下秦夜切狡猾上古卯切狡獪下户八切猾亂暹思簾切須拔起鎮定自號漫天王革命記云須拔衆散奔突厥突厥以為南面可汗今言掠幽州中流矢死從唐書也怖普故切惶懼章醮子肖切醮祭也奏章以逹其誠衰絰上倉回切喪服下徒結切首戴也曷娑那桑何切西突厥可汗娑新舊史並作薩薩音桑葛切射之按實録云妻號慟而去今言應弦而倒從隋書也命中曰射食亦切歔欷休居切下許既切歎息貌倉儲陳如切儲偫橫生去聲解人解胡懈切縣名即春秋解梁城指其地故云解人皓古老切營州即桞城郡屬河北道後為方鎮即盧龍節度雍奴於用切漢縣名唐屬幽州旁企地羌豪名周氏陂班縻切地名故墅承與切田廬始州本普安郡武德元年曰始州先天二年改曰劒州稠桑直由切地名在滎陽之西熊州本冝陽縣武德元年置正觀元年州廢為福昌縣屬河南穀州本新安縣武德元年置正觀元年州廢屬河南嚮云許亮切讖文楚禁切讖符命之書詒蕩亥切欺也羃㒿上莫狄切覆也下力支切羃㒿婦人所戴也伊州李密置正觀八年更名汝州刀楯食尹切楯所以捍身蔽目洛州開元元年更名為河南府李密起鞏據洛口建號魏公武德元年為王丗充所敗九月來降以密為光祿卿十二月密反伏誅縞素古老切白素也曇晟上徒含切下承正切大乘音承釋典有大小二乘邪輸上音耶下舂朱切按釋典載釋迦佛為太子時所授室號耶輸夫人曳組則古切説文綬屬其小者以為冕纓鴆音鴆本亦作鴆毒鳥名以其羽歷酒飲之則死乃詬許候切罵也以飼祥吏切與飼通唐紀三通鑑卷一百八十七起屠維單閼即巳卯正月盡十月不滿一年髙祖神堯大聖光孝皇帝上之下武德二年閴然苦鬩切寂靜也厮養音斯厮析薪者也養養馬者也恩施去聲景附景讀曰影間使古莧切下疏吏切夜造七到切東走走讀曰奏剽掠匹妙切強取瓉才贊切菊潭徒含切鄧州縣名荆州記曰菊水出穰縣芳菊𬒳涯水極甘香谷中人飲此水者皆壽顯州本淮安郡武德四年置九年州廢屬泌州即唐州也靳居焮切姓也租庸調徒弔切此唐賦役之法有田則有租有家則有調有身則有庸租出穀庸出絹調出繒纊布麻察𥘉戞切黨項多曩切漢西羌别種其地古析支也質子陟利切吐谷渾伏允之子名順始質於隋至是遣歸其國趣聊讀曰趨攀堞逹協切城上垣鹵簿郎古切炙轂子云輿駕行幸羽儀導從謂之鹵簿字書鹵大楯也以甲為之所以扞敵甲楯部五之次皆著之簿籍儀衛皆具五兵獨以甲楯為名者行道之時甲楯居外餘兵在內故言鹵簿也化及始從煬帝江都其後僣號武德二年竇建德敗之聊城轞車送襄國斬之紇下沒切忠欵苦管切誠也殿內少監居陷切隋曰殿內監武德元年曰殿中省少副二也尚輦奉御力展切尚主也主天子輿輦也奉御即尚輦局官名尚輦等六局並屬殿中省昭儀唐制昭儀以下為九嬪昭儀者謂昭顯其儀示隆重也誚責才笑切説文作譙引周書亦未敢譙公內史舍人即中書舍人黔安巨金切郡名後更名黔中孝珉眉巾切汜氷音凡左傳注鄭地也漢書注云此水舊讀音凡今彼人呼之曰祀穀州本新安縣武德元年置正觀元年州廢屬河南時有兩穀州其一在廢州龍丘縣非此也呪誓職救切呪詛巫嫗威遇切女巫之老者君羡似面切罔罟公土切網總名也蹂忍九切踐也陟州見上卷武陟注𣏌州墟里切本雍丘縣李公逸以雍丘來降即以縣置祀州正觀二年州廢屬汴州時又有𣏌州在青州北海縣非此也蔥嶺倉紅切西河舊事云蔥嶺其山髙大上悉生蔥故以為名句注句音章句之句山名也在鴈門隂館鉢苾上北末切下簿必切又蒲結切始畢可汗之子俟利俟渠之切突厥謂大臣曰俟利發尼步設突厥謂别部典兵者曰設尼部即別部者出塞先代切邊塞致􅉠符遇切助也所以贈終布帛曰賵角亢苦浪居郎二切星名王氣于放切詭辭古委切詐也虎牢周穆王獵鄭圃獲虎命畜之因名其地曰虎牢在鄭州汜水縣任公任去聲黃鉞王伐切以黃金飾斧義州唐𥘉義州凡有五一在懷州武德縣一在衛州汲縣一在易州容城縣一在光州商城縣一在眉州洪雅縣武德之義州乃丗充境內非所寇者榆次羊朱切太原縣名遂屠同都切謂破取城邑誅殺其人如屠六畜然祖禰祖祖廟也禰乃禮切父廟也二廟所以尊祖而奉親葦火古有葦茭桃梗所以禳惡氣桃水葦火取此禮也祓除敷勿切除惡祭郎楚郎姓也徹直列切通也蹕壁吉切止行者􅌔音簡古眼切鄖公政道齊王􅌔之子鄖于分切國名義成隋宗女號義成公主嫁突厥處羅可汗飲博伯各切局戲批其普迷切擊也重復方六切西濟州本濟源縣王丗充將丁伯德以縣降置西濟州四年州廢屬孟州肘腋上陟栁切臂節下夷益切胳也乘間去聲間隙之時也函秦胡甘切秦地有函谷關秦人恃之以為險固衣繡於既切項羽之語嬰城伊盈切嬰繞也言繞城以自守李軌起武威號梁王武德二年安興貴執之至長安伏誅河西悉平戚倉歷切憂也離石胡即石州也昔左賢王去卑之孫劉淵嘗據此嵐盧含切州名辭訣古穴切絶也家資即移切貨財介州武德元年以介休縣置浩州又更名介州正觀元年州廢屬汾州佛幡符勿切幡音翻幟也佛者漢言覺也將以覺悟羣生袁宏説縋之馳偽切垂繩而下也雀鼠谷音浴在汾州其處險固也十二軍初析關中為十二道又更為軍萬年道為參旗軍長安道為鼓旗軍冨平道為元戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍𡵨州道為平道軍函州道為招搖軍西麟道為苑遊軍涇州道為天紀軍冝州道為天節軍种持中切西突厥厥音九勿切西突厥其先士門伊利可汗之弟室點密也其子逹頭始分國於西與東突厥抗葉護葉失涉切突厥謂大臣曰葉護統葉護嗣其兄射匱可汗位乃號統葉護可汗髙昌西域國都交河城漢車師之地麴伯雅其君長名射匱求位切射匱西突厥逹頭之孫龜兹上祛尤切下牆之切西域國一曰丘兹一曰屈茲其國名三彌山民卑切在龜兹北統葉護建庭於此鐡勒歷德切胸奴苗裔種類最多自西海之北總號鐡勤其俗大抵與突厥同烏孫其國在西域於西域諸戎其形最異青眼赤須狀類彌猴石國西域國名其先康居國也其枝庶分王之千泉其地名吐屯徒渾切突厥號大臣曰吐屯浩州本介休縣又有江州彭澤縣置浩州非此浹旬即協切十日為旬于為日十日則一周浹也􅈶奚圭切伺相吏切奄窺也旗幟式志切幟幖也旗旗之屬總稱焉厭勝益涉切伏也屬吏之欲切委也觖望古穴切怨望也送質陟利切物相贄伏威起淮南又據歷陽與陳稜季子通俱有窺江表之心後為子通所敗來降紿蕩亥切欺也鄜芳無切州名獠魯皓切又音瓜西南夷之屬駱驛上歷各切下夷益切或作絡繹虞泰二州名虞州夲安邑縣武德元年置正觀十年州廢泰州本汾隂縣武德元年置尋廢開元十年汾隂獲鼎更名寶鼎並屬河中偵丑正切窺伺也馬槊色角切長矛用於馬上故曰馬槊澶淵市連切春秋澶淵之地譙州即譙郡正觀八年更名亳州屬河南道䝁豆郎刀切野豆節髦莫褒切髮也以飾節顔師古云上下相重取象竹節凡為使者持之唐紀四通鑑卷一百八十八起屠維單閼盡重光大荒落即己卯十一月至辛巳二月髙祖神堯大聖光孝皇帝中之上武德二年浩州時浩州有二武周所寇乃介休之浩州偏禆頻眉切將之副也覘敵敕豔切窺也射神夜切發矢也又神亦切指的命中也二音皆通殪一計切殺也其父李丗績之父名蓋狡獪上古巧切狂狡也下古外切猾亂也尉遲紆勿切復姓尋相尋姓也相其名澮州本翼城縣武德元年置二年昆薄州四年州廢屬絳州汾隰上符分切下席入切二州名曹戴二州名曹州乃濟隂郡戴州夲成武縣武德四年置正觀十七年州廢屬曹州三年行本行去聲𥘉據蒲州武德三年秦武通攻行本出降髙祖幸蒲州斬之孟津孟州河陽縣即古孟津也中灘音但水中沙堆曰渾亦在河陽霍氏李商胡之母革命記姓張氏號女將軍河洛記為霍氏自稱霍總管長子長讀曰長短之長路州縣名其城乃二丗所築誚讓才笑切責也屬吏之欲切委也處羅突厥始畢可汗卒其子什鉢苾幼不得立以為泥步設使居東偏立其弟俟利弗設是為處羅可汗處羅一作叱羅政道隋煬帝之孫齊王􅌔之子竇建德嘗立為鄖公定襄郡名欣州也屬河東道給事郎是年更名給事中闍提闍辰遮切姓也蕭銑將顯州本泚陽縣武德四年置九年州廢屬泚州吕州本霍邑縣隋為霍山郡武德元年置正觀十七年州廢屬晉州兵趣音趨背城蒲昧切違也堡傳抱切堡障小城也喜譟蘇到切群呼也屈突上九勿切下陀骨切後魏官氏志有屈突氏走突厥走音奏下同縣軍縣平聲武周起馬邑據并州武德三年秦王敗宋金剛武周懼走入􅊳厥久之復謀歸為突厥所殺并州平郁射設突厥之臣其國謂别部典兵者曰設西濟州本濟源縣武德二年王丗充將丁伯德以縣來降置四年州廢屬孟州熊州本冝陽縣武德元年置正觀元年州廢屬河南所籍秦昔切籍記也揭多突厥之臣姓阿史那揭多其名互市胡故切更相貿易也公祏常隻切田瓉才贊切步利設處羅可汗之弟倫特勒突厥謂子弟為特勒倫其子弟也可朱渾户昆切虜三字姓名定逺龍驤左右龍驤左右遊擊分騎兵步兵各有府皆隋制王丗充因之稽胡堅奚切一名步落稽胸奴别種劉元海五部之苗裔或云山戊赤狄之後洧州羽軌切本尉氏縣王丗充始置尉州武德四年廢之以尉氏扶溝􅋣陵置洧州正觀元年州廢以尉氏屬汴州西㸑取亂切南蠻兩㸑一曰西㸑白蠻二曰東㸑烏蠻西㸑其先晉南寧太守中國亂主蠻中故曰南寧西㸑昆州本馬平縣隋為昆州武德四年更名南昆州又以其地當栁星更名栁州共州本共城縣武德二年置四年州廢屬衛州轘轅胡關切關名在緱氏東南尉州本尉氏縣王丗充置武德三年時德睿以州來降秦王改為南汴州四年復改為洧州正觀元年廢屬汴州宣武陵後魏宣武帝陵也單時戰切姓也引槊色角切長矛字亦作矟見下單音丹數之所矩切計其一二而責之蔚州紆勿切本鴈門郡又隋上谷郡飛狐縣地唐𥘉沒突厥武德六年置矢鏃作木切箭鋒在頰吉協切面旁置楔先結切也填塹七豔切坑也巾櫛側瑟切梳箆之總名郇國須倫切滎州即滎陽縣屬鄭州按本志不載廢置嵩州本陽城縣武德四年置正觀三年州廢屬河南要漢據汴州從王丗充為汴州刺史武德三年來降郳國五奚切國大安國姓也鄭有國僑大安其名詗火逈切又翾正切知處告言舋隙許愼切與釁同隙鏬也鄉導許亮切為之趨嚮而引導之莫賀咄處羅可汗之弟咄苾也突利始畢可汗子什鉢苾也號突利可汗奚霫奚胡雞切東胡種其先為胸奴所破保烏元山元魏時號庫真奚居鮮卑故地魏書有逵奚薄奚統奚吐奚四氏皆其部族至隋始去庫真但曰奚霫音息即白霫蠻也其後契丹強奚舉部役屬於習有東西奚契丹上音乞夲東胡種其先為胸奴所破保鮮卑山元魏時自號契丹靺鞨上音末下音曷居肅愼地凡數十部噍黑水部獨強奧射設處羅可汗妻隋義成公主奧射設即公主之子也頡利即莫賀咄處羅卒莫賀咄嗣其位號頡利可汗日蹙子六切迫也除忿撫吻切悁忿醢彭越呼改切刑法志𦵔其骨肉為醢潰圍胡對切逃散也麾下吁為切麾下謂大將旌麾之下皓古老切庱亭丑升切又上聲在吳興孫權射虎處闞稜闞音勘姓也溧水力質切升州縣名殊死如字殊絶也謂決意必死狃於女九切會稽古外切郡名禹會諸侯江南而計其功因名焉會稽者會計也聞人姓也後漢有聞人襲法興據丹陽都毗陵自稱涼王武德三年李子通襲之吳郡法興棄城走卒赴江溺死子通盡收其地盎於浪切肉袒徒旱切脫袖而露肉四年充斥昌石切猶從橫也仚成虛延切舟艦户黤切禦敵船四方施板以禦矢其狀如牢器械下拜切器謂禮樂之器械謂兵戈一曰有盛為械無盛為器義各有所主垣塹干元切垣墉徼幸堅堯切亦作撓披靡披上聲開也靡偃也距躍音巨超越也其髻吉誼切束髮也斥候昌石切許愼言淮南子云斥度也候望也右掖掖音夷益切中門之兩旁門如左右之腋腋肘後也通作掖愕眙丑吏切直視也寫口地名纍足魯水切重纍其足言懼甚也僧服蘇增切僧釋典謂之浮屠其服袈裟壞色狼藉慈夜切蘇諤演義云狼所卧藉之草皆穢亂狼藉者物雜亂之貌瑀王矩切雜鞫居六切窮也謂窮核其罪􅳋翾正切又翾縣切大炮匹孝切俗作炮𣢾服苦管切誠意所欲羈屬居宜切言羈縻而統屬之非心服也唐紀五通鑑卷一百八十九起重光大荒落三月盡十二月即辛巳不滿一年髙祖神堯大聖光孝皇帝中之中武德四年突地稽突陀骨切黑水靺鞨渠帥名燕州於焉切本靈壽縣隋置在唐廢焉屬鎮州稽胡堅奚切胸奴别種仚成虛延切湩多貢切説文乳汁又覩勇切頡利莫賀咄也一曰咄苾處羅可汗之弟處羅妻義成公主頡利又妻之隋之宗女也啔民隋書作啓人突厥沙鉢略可汗之子名染干𥘉號突利可汗先與其兄都藍有隙奔隋𥘉妻義安公主卒又妻義成公主後都藍為麾下所殺染干遂并有其衆隋拜為啔人可汗即始畢可汗之父也政道隋煬帝之孫齊王􅌔之子竇建德嘗立為鄖公粳核漢書陳平傳注核音紇京師謂粗屑為紇頭又云核即麥粳中不破者管州本管城縣武德四年置正觀元年州廢屬鄭州時河東道亦有管州乃嵐州之靜樂非此也陽翟直格切邑名屬許州泝河蘇故切逆流而上為泝成臯姑勞切河南縣地板渚輔綰切地名在成臯汜水之間潼關徒東切在華隂本名衝關河水南流衝激華山之東故以為名潼又音通會也武牢郎刀切即虎牢也合從豫容切相約為縱親猶六國合從也扼其於革切提也言提其要害如提其咽喉狐疑狐獸也性多疑渡河氷且聽且度故謂不決者為狐疑為殿丁練切軍後為殿逡巡七倫切退却不進貌仰哺上魚向切下蒲故切前茅莫交切左傳前茅慮無注云如今軍行前有斥候踏伏皆持以絳及白為幡見騎賊舉絳幡見步賊舉白幡備慮有無也茅明也或曰時楚以茅為旌幟也郊勞郎到切禮賔至逆勞於郊平州本當陽縣王丗充置武德六年更名玉州八年州廢屬江陵郡處羅即突厥俟利弗設可汗也元璹神六切長孫丁丈切復姓青特竇建德之將玉啖徒濫切以金玉啖之猶啖以食滏口扶雨切水名在鄴郡諜者逹協切軍中反間者軍芻窗俞切禾秸所以供軍馬西薄蒲各切迫也汜水音凡又音祀縣名屬孟州南屬之欲切連也鎧仗可亥切甲也甚鮮平聲猝倉沒切突陳上陀沒切如犬突出於穴下去聲蝟毛于貴切蟲似豪豬者中槊中去聲南走音奏朱粲起南陽武德四年秦王討王丗充朱粲萆雄信十餘人丗充之黨也丗充敗秦王並斬之於洛陽粲尤殘忍士民疾之投瓦礫擊其尸須臾如冡礫狼狄切誄之魯水切誄猶壘也誄𫐠其事迹也閶闔上齒良切下轄葛切閶闔天門也天子之闕以象天門故曰閶闔門數之所主切計其一二而責之撤直列切去也周法明法尚弟始據永安武德四年以蘄春安陸沔陽及所據永安四郡來降以法明為黃州總管蘄春渠之切在淮之南沔陽莫踐切漢水别名漢之上曰沔剽掠匹妙切劫也於士澄於如字姓也黃帝臣有於側訶虎何切亦作呵呵叱也任瓌公回切王丗辨以王丗充三十八州詣壞請降馮士羡復推淮安王神通慰撫山東徇下三十餘州於是王丗充竇建德地悉平臧君相臧子郎切相息亮切本海賊據海州武德四年以五州降噉鬼徒敢切孟海公之從兄豆盧龍都切復姓本姓慕容燕主廆之族其後有名勝者降於後魏為樂郡守賜豆盧氏或云北人以歸義為豆盧因氏焉見比史豆盧寧傳狡獵户教切周禮校人掌王田獵之馬漢書注云校謂以木自相貫穿為闌校以遮禽獸而獵取也矯舉夭切揉曲為矯鼓吹敕類切凡鼓吹總八音言之俘芳無切説文軍所獲引春秋傳以為俘聝軍戰斷耳曰聝飲至於錦切左傳歸而飲至以數軍實注飲於廟以數車徒器械及所獲也髙句麗句音鉤麗鄰知切東夷之國其先夫餘王也居遼東之東句麗地名也以髙為氏因號髙句麗麗或作驪丗充舉東都篡越王個而自立國號鄭武德四年秦王討之竇建德越境來援秦王先擒建德丗充懼詣軍門降秦王先許之以不死至長安赦為庶人將行為獨孤修德所殺建德起河間連河北國號頁武德四年秦王討王丗充建德越境來援為秦王所俘斬之長安市給復方目切漢髙祖過沛復其民顔師古注曰復謂不徭賦也鼎函二州名鼎州在京兆府美原縣函州在河南永寧縣虞芮虞州在河中安邑縣武德元年置正觀十七年州廢芮州在陜州芮城縣武德二年置正觀元年州廢伏伽求迦切通寶錢文曰開元通寶歐陽詢撰并書其文回環可讀或讀曰開元通寶或誤曰開通元寶皆可按薜璫聖運圗云𥘉進蠟樣文德皇后搯一甲故錢上有甲痕焉又凌璠政要録為竇皇后時竇后巳亡文德未立其有甲痕不知何謂重足重平聲屏息屏上聲漳南邑名屬貝州劉黑闥始據此黑闥他逹切竇建德故漢東公武德四年反于貝州褒州本西縣武德三年置八年州廢屬興元都州如灼切本樂鄉縣𥘉屬蕭銑正觀八年州廢屬襄州海公據曹州武德四年為竇建德所執未幾建德敗海公同其黨伏誅戴州本成武縣武德四年以成武及宋州之單父楚丘置正觀十七年州廢仍以成武屬曹州鄃音輸縣名屬德州崞音郭縣名屬代州鄢陵音偃縣名屬許州質子音贄物相劕也以通交質之情梟堅堯切斷首置於木上鄱陽蒲禾切縣名屬饒州淳于殊倫切復姓登州春秋牟子國北齊置文登縣武德四年置登州先是武德元年析嶲州臺登置登州非此州也黟歙上於夷切下失涉切黟或作黝縣名屬歙州今言黟歙五州夲志不載黟州廢置饒陽如招切縣名屬深州藁城古老切縣名屬鎮州褚田吕切姓也典籖千廉切説文驗也齊置典籖之官按唐六典親王府典籖二人掌宣傳教令事蓋古盍切姓也瀛洲餘輕切渤海中有三神山曰蓬萊曰方丈曰瀛洲登瀛州言如登仙也瀛州河間郡屬河北道觀州去聲本九門縣武德元年置五年州廢屬鎮州荆門山名在冝都上合下開有門象焉故曰荆門毛州本館陶縣武德五年置正觀元年州廢屬魏州剽鋭匹妙切勇利也蕭銑後梁宣帝曽孫也起羅川據荆州號梁王隋義寧二年僣帝號建元徙都江陵武德四年趙郡王孝恭下江陵克之孝恭送京師詔斬都市自起至滅凡五年布幘側革切髮巾也古有冠無幘幘者卑賤執事不冠者所服其後貴賤皆服之稍稍作顔題有赤幘青幘素幘若素幘乃喪服蕭銑來降故以布幘如喪制也昌州本蒲縣武德二年置正觀元年州廢隸隰州稷州本武功縣武德三年置正觀元年州廢隸京兆墅承與切田廬也好畤音止邑名武德二年析醴泉置屬京兆畤者封土積髙所以祭天地五帝之基址秦有西畤鄜畤武畤密畤與好畤為五畤九嵕子公切山名按漢書九嵕山在馮翊谷口而其地常隂故西京賦去九嵕甘泉涸隂沍寒子通起武陵號楚王武德四年杜伏威遣將擊之子通窮蹙請降未幾又反伏誅汪華起新安據黟歙國號吳稱王凡十餘年武德四年杜伏威遣將擊之九月請降聞人姓也後漢有聞人襲林州本華池縣武德四年置正觀元年廢屬慶州度嶺度去聲過也山扳曰嶺謂大庾始安臨賀桂陽揭陽五嶺也見裴潛廣州記黎州夲黎陽縣武德二年置尋沒於竇建德四年平建德復析魏州等諸縣置黎州正觀十七年州廢仍以黎陽屬衛州俟斤渠之切突厥謂大臣曰俟斤其後因以為姓昆彌民卑切㸑蠻西有昆明蠻一曰昆彌蠻漢書西南夷自相師以東北至葉榆名為嶲昆明是也嶲息委切越嶲郡也屬劒南道莘州夲莘縣武德五年置正觀元年州廢屬魏州唐紀六通鑑卷一百九十起元􅘬敦牂盡昭陽協洽五月即壬午至癸未凡二年有竒髙祖神堯大聖光孝皇帝中之下武德五年斌悲旻切東鹽州本滄州鹽山縣武德四年置正觀元年州廢仍屬滄州時五原郡鹽川亦置鹽州此乃東鹽州也俚帥音里南夷之酋楊丗略也定欒二州名定即中山郡欒州夲廣河郡隋為欒州唐為趙州屬河北道廉趙二州名廉州本隋藁城縣武德元年置廉州正觀元年州廢屬鎮州趙即趙州也郯勇公音談春秋郯子之國郯勇公羅士信之封號𣏌州本北海縣始因營丘人拒賊權置𣏌州時汴州雍丘亦置𣏌州非此苑君璋委阮切姓也本作菀而陳音陳蹂女九切獸迹亦作厹寧越郡名在隋為寧越郡武德四年改曰欽州交愛交州漢交趾郡武德五年曰交州愛州漢九真郡武德五年曰愛州並屬嶺南道飢饉上音機穀不熟也下音饉𬞞不熟也睃祖峻切闞苦濫切姓也遷州按志闕此州髙武德六年析廣州之電白連江置舒州望江縣又置髙州非此羅本石城郡武德五年以髙涼郡之石龍置春本陽春郡武德四年以髙涼郡之陽春置白本南州武德四年以合浦郡之合浦置林本冨林縣武德四年析銅陵置其後州廢仍屬勤州振即廷德郡本臨振郡天寶元年更名且洛生且子魚切姓也字當作苴漢有平陵苴氏元璹殊六切賀拔蒲八切虜復姓北方謂土為拔賀其有地土因為賀拔氏欣許斤切州名洮他刀切州名崖儋都甘切崖即朱崖郡儋即儋耳儋耳者其種大耳渠帥自謂工者耳尤緩下肩二寸因以為名負荷下可切左氏傳其父析薪其子弗克負荷云顗語豈切跋涉蒲末切左氏傳跋涉山林草行曰跋水行曰涉三觀工亂切山名蠡州落戈切武德五年以蒲州博野縣置八年州廢九年復置正觀元年又廢後以縣屬深州觀州本九門縣隋置九門郡武德元年曰觀州五年州廢屬鎮州時觀州有二其一在景州弓髙縣非此南昌州本建昌縣武德五年置八年州廢以縣屬洪州若干則若人者切若干虜復姓妃嬪毗賔切唐制貴妃淑妃德妃賢妃為夫人昭儀以下為九嬪婕妤上即涉切下羊諸切婦官唐制婕妤為丗婦之首歐之於口切捶擊也屬之之欲切愴然楚亮切􅷐愴傷感也拉朽落合切折也頍大蘂切冝州即京兆華原縣隋冝君郡武德元年曰冝州正觀十七年州廢天授二年復置大足元年又廢按志又有冝州在嶺南道非此苑竹林苑當作菀姓也竹林其名係虜胡計切係猶結縳也六年黑闥他葛切𥘉從竇建德為漢東公武德四年建德敗黑闥反于具州五年亡入突厥與突厥寇于山東六年其將葛德威執之伏誅憩止去例切息也嶲先蘂切州名驪山力支切在新豐南故驪戎國也班劒以木為劒而采畫之故曰班武賁音奔武本作虎如虎之奔獸故曰虎賁徐圎明初據兖州武德二年降後再反六年棄城走為人所殺其地悉平參旗武德三年以萬年道為參旗軍其詳見上卷十二軍注芳州即疊州常芬縣武德元年以縣置芳州神龍元年州廢孫州本南昌縣武德五年以縣置孫州八年州廢屬洪州南州屬劎南道羈縻州武德二年開南蠻置三年更名𤏡州四年復故名南越州即廉州也𥘉曰合州武德四年曰越州正觀八年更名廉按越州有二其一在江南道即會稽郡也今越州乃在嶺南道故加南以别之薑州本封山縣武德五年置正觀十年州廢縣屬廉州合州即廉州也屬嶺南道又劒南道有合州非此𡵨州翹移切元魏所置至德二載肅宗以𡵨州置鳯翔府屬關內道奚騎奚東胡別種奚騎者奚國騎兵也中頓頓置也言頓兵之地崞城音郭代州崞縣之城貯展吕切積也吐屯徒渾切突厥子弟曰吐屯胡琵琶琵頻脂切琶蒲巴切胡中馬上所鼓推手曰琵却手曰琶岡州本新會縣武德四年置以地有金岡故以名州正觀十三年州廢是年復置開元二十三年復廢屬廣州士翽呼外切真州按志真州有三武德五年析愛州日南縣置積州及前真州正觀元年改積州為後真州屬嶺南道後皆廢劒南道復有真州今突厥所寇乃河東道然河東無此州志又不載疑字誤辟穀必益切除也辟穀謂道引不食靜居行氣以學道也鎧仗可亥切甲仗也趣江千俞切嚮也般陀上音撥下徒何切突厥臣名屯田徒昆切言屯守而又營田故曰屯田漁艓待協切漁漁獵也艓舟名猷州本經縣武德三年置南徐州尋更名猷州八年州廢屬宣州白簡白狗羌白簡白狗非此南尹州本南定州武德四年曰南尹州正觀八年改曰貴州屬嶺南道愠曰於問切怒也長林時有左右長林門可逹枯我切虜復姓突騎徒沒切言其驍鋭可以衝突敵人尓朱兒氏切復姓居於尓朱因以為氏謨莫胡切擲直炙切投也飼以祥吏切亦作飼脆此芮切小耎易斷隊徒內切部隊也鹿盧谷切姓漢有鹿旗漠北末各切沙土曰漠沙漠之北胸奴之南界也即突厥中磧耳角勝訖嶽切漢書角抵謂兩兩相當角力角技藝射御以爭勝也喜蹶許紀切好也下居月切僵也馬足失據餞之才線切以酒食送人為餞南寧州屬羈縻州本漢夜郎地武德元年因同樂縣置天寶末沒于蠻州廢唐未復置州于清溪隸戎州都督西洱河刃止切南詔永名德宗時異牟尋沉載書於西洱水鄯常演切州名漢破羌縣地綏州本雕隂郡地武德三年於延州僑置正觀三年歸洽上縣頓弊頓讀為鈍利之鈍霖雨力沈切雨三日以往為霖彌時亡卑切久也解下懈切散也犀利先稽切兵利曰犀冒雨莫報切蒙犯也谷俞陸切豀谷爾雅水注溪曰谷日南嶺南郡言其在日之南鄠侯古切縣名屬京兆樓觀工亂切在鳳翔秦始皇立老子祠於觀南八年酒肴胡茅切非穀食曰肴箕踞居之切箕踞謂申兩足踞坐如箕形也葉護失涉切睦伽陀去迦切瑾渠吝切婪盧含切貪也無厭於鹽切不足也藺謨良刃切本韓獻子後食邑於藺因氏焉大谷上音泰下音俗太原大谷縣有大谷山潞沁千浸切並州名且渠川子餘切地名權量力漾切斗斛也權稱也藺州按突厥寇鄯岷等州并寇蘭州皆隴右道而隴右無閵州藺字疑作蘭彭州屬羈縻州本洪州正觀三年置七年更名屬隴右道按寧州彭原及劒南道復有兩彭州皆非此鳴犢泉徒谷切地名九年里閈侯旰切里門曰閈昆明池古渾切越嶲昆明國有滇池方三百里漢武帝欲伐之穿池象焉以習水戰在長安西南周回四十里掩襲習入切春秋釋例掩其不備曰襲牙帳牛加切突厥虜帳立纛為牙門故曰牙帳佛法法古法字漢譯夷益切説文傳譯四方之言者此言翻譯佛書也恐愒許葛切相恐怯也追懴楚鑒切自陳悔也胡神胡神謂佛也傅毅曰西域之神其名曰佛桑門蘇郎切桑門即沙門也髠髮枯昆切􅚎髮苻石防無切苻堅也本姓蒲氏因堅背文有草苻之祥改姓苻也石謂石勒皆僣號晉丗堅氐種勒羌渠種也厭魅上烏點切下明祕切章仇子他仇渠尤切復姓他徒何切讟徒谷切怨也縶陟立切馬絆也嫡丁歷切正也戒律劣戍切釋典有戒行律儀門里邸直延切市門里邸舍也溷雜胡困切亂也屠沽音姑賣也沙汰他蓋切擇也練行郎甸切行下孟切謂精練其行業占候之廉切視兆也言占候天象以知以吉凶西會州本會寧鎮武德二年置正觀八年更名會州甕牖烏貢切以瓦甕為窗牖也訊思晉切問也塞先代切邊徼也率更古行切東宫官率更寺有令丞晊職日切拉殺郎葛切折也浚井音峻深通塗廩力錦切倉廪也塗謂以泥杇槾之也經天堅丁切太白隂星也出東當伏東西當伏西過午為經天謂晝見午上也見賢遍切秦分扶問切秦之分野上應二十八宿井鬼二星跋馬蒲撥切回也絓古賣切罥也嘻徒結切吮粗兖切嗽也巨鹿臼許切巨鹿縣名屬邢州鹿林之大者也屬籍殊王切附也謂所附宗籍説文籍簿書也其右云九切右猶上也蹀血大頰切殺人流血履蹀之也瑗于願切懦怯奴卧切弱也又乳兖奴亂二切罔罟罔與網通稱罟公土切亦網也赴薊吉誼切縣名屬幽州閟兵媚切閉也愍眉隕切悲也酋慈由切長也仚虛延切牝雞婢忍切母雞喻婦人知外事雌代雄鳴索息各切盡也言牝雞無晨鳴之道鳴則家盡俟斤渠之切突厥號大臣為俟斤沒啜姝恱切執失質入切執失虜姓便橋皮面切漢武帝初作便門橋長安城北面西頭門即平門也古者平便字同於此道作橋跨渡渭水以趨茂陵此便橋是也唐紀八通鑑卷一百九十二起柔兆閹茂九月盡著雍困敦七月凡二年髙祖神堯大聖光孝皇帝下之下武德九年卑碎蘇對切雜也卑賤衆多之貌韓州武德元年析潞州之襄垣等縣置正觀十七年州廢仍屬潞州又同州韓城縣置西韓州非此吞他根切咽也餘燼徐刃切火餘也曰刺來葛切李姬諡法暴戾無親曰刺雷同力回切雷之發聲物無不同時應者故曰雷同哂之矢刃切微笑貌粘尼占切相著也軀幹古旦切左氏傳晉文公駢脅注云合幹也幹謂臂腋并點并與併同逋負奔謨切亡也受貸不償曰負給復方目切除其賦役也景州夲滄州弓髙等縣正元三年折置景州長慶大和中屢廢還滄州景福元年復屬河械上敕九切下下拜切手足桎梏也平反反音幡幡奏使從輕警蹕壁吉切天子出稱警戒肅也入言蹕止行人也射的丁歷切謂所射隼臬也觀城工喚切縣名屬開德府銓且緣切銓衡敕勒畜力切其先胸奴也俗多乘髙車元魏時亦號髙車部或曰敕勒訛為鐡勒薛延陀以下十五部總謂鐡勒也薛延陀私列切鐡勒諸部姓一號嘻氏回紇下沒切胸奴居娑陵水上都播補過切亦曰都波骨利幹處浣海北多覽葛亦曰多濫在薛延陀東同羅在多覽葛東僕固亦曰僕骨在多覽葛東拔野古一曰拔野固或為拔曳固直僕骨東思結在薛延陀故牙渾戶昆切在延陀諸部之南建中功臣渾瑊即其後也斛薜胡谷切在多覽葛北奚結在同羅北阿跌徒結切亦曰訶嘻或為􅎤跌其後光顔光進有戰功賜姓李氏契苾蒲結切亦曰契苾羽在焉耆西北苾北史作弊白霫息入切敕勒部磧北七迹切猶漠北也可汗河干切戎酋稱哥楞盧登切貪于北史作貪汙音同也嘻丁結切也或作野燕末於焉切山名射匱求位切射匱西突厥逹頭之孫鬱督軍山並如字後或作烏德犍山唐曆云即鬱督軍山虜語兩音也統葉護失涉切射匱之弟代為可汗菩薩薄胡切回紇酋長也馬鬣力涉切山名種落之勇切種族部落二年異羊吏切廖立力弔切姓也暴骨蒲卜切暴露收瘞於罽切幽薶垂能是為切或作倕黃帝時巧人中竹仲切又如字比鄰𬒳知切居相次也韶夏市招切舜禹樂名護武胡故切又户郭切湯武樂名拳石其貟切石小如拳也掇取都括切拾取也三思息暫切又如字觖望古穴切怨望唐紀九通鑑卷一百九十三起著維困敦九月盡重光單閼即戊子至辛卯凡三年有竒太宗文武大聖大廣孝皇帝上之中正觀二年掖庭夷益切掖庭宮人之官有令丞宦者為之灑掃上所賣切又沙下切汛也下息報切伉儷口浪切敵也下力計切耦也洹水于元切在相州堡鄣之亮切小城也愷可亥切霽威子計切漢書魏相為霽戚嚴汪霽止也又音限齊之齊嚴裝側霜切裹也佳鷂弋笑切鷙鳥圜丘于涓切非人力所為謂之丘自然天體圎也故於郊作壇象圜丘之形以祀昊天即泰壇是也稱旨尺證切稱愜常疏所據切條陳以據之屏風蒲丁切三禮圗扆從廣八尺畫斧今之屏風則遺象也利俟渠之切突厥種弩失畢壁吉切突厥部嘻力丁結切康居居音渠西域國名間道居莧切間空也投隙而行不公顯也齎䇿津夷切持也鼓纛大到切又音徒刀切虜人牙門必建纛故賜之鼓及纛也靺鞨上莫葛切北狄别種俱倫恭于切水名在大漠之北三年耕籍秦昔切古者天子耕藉田千畒為天下先藉謂蹈藉也數之色主切縷數以責其罪也紊亂文運切亂也信行思晉切信姓也其先出於魏信陵君暇給訖立切言事繁多日日為之猶不能足故無暇也屬左之欲切委也格物捍格於物而無所容授也稽顙息曩切額也稽顙觸地以求哀也茌平仕疑切傳州縣名在茌山之平地者武德四年析聊城置太宗復省入聊成昵姦尼質切近也糇糧胡鉤切乾肉嘯聚蘇弔切吹聲也嘯咏相聚猶言響應耳肅州武德二年析甘州瓜州地置胡瓶蒲丁切汲水器單于市連切胸奴天子之號漢書音義單于廣大之稱言其象天單于然可雪蘇絶切除也應州羈縻正觀三年以東謝酋領謝元深地置屬江南道莊州羈縻本南壽州正觀三年以南謝酋領謝疆地置四年更名莊州屬江南道隸郎計切附著也詭異古委切詐也王會周武王時天下太平逺國歸欵周史乃集其事為王會篇令萬國來朝牂柯上兹郎切下古何切漢書音義曰牂柯係船杙也華陽國志云楚頃襄王時遣莊蹻夜伐郎軍至且蘭椓船於岸而步戰即滅夜郎以且蘭有椓船牂柯處乃改其名為牂柯充州羈縻州也武德三年以牂柯蠻别部置牂州羈縻武德三年以牂柯酋領謝龍羽地置四年更名柯州後復故名屬江南道黨項多曩切西羌别種軌州羈縻正觀二年以黨項部置軌州都督府屬隴右道拓跋氏上他各切下蒲未切虜復姓崌巾於切羈縻正觀云年以降户置奉本西仁州正觀元年置西仁州八年更名巖正觀五年置西金州八年更名巖州逺正觀四年置西懷州八年更名逺州並屬羈縻州濮博木切州名四年猝至蒼沒切忽至也遣諜逹協切軍中反間者瓘古玩切驪山溫湯歷支切辛氏三秦記云驪山湯舊説以三牲祭乃得入俗云始皇與神女遊而忤其旨神女唾之則生瘡始皇怖謝神女為出溫泉而洗除後人因以為驗漢武故事驪山湯始皇砌石起宇至漢武又加修飾焉隂山於金切北戎之地東西千餘里草茂盛多禽獸胸奴依阻其中漢武克胸奴置隂山縣執失如字虜姓露布後魏每戰尅欲天下聞知乃書帛於漆竿上名為露布蹂我女九切踐也掠我力灼切奪也便橋突厥入寇武德九年至渭水既而請和太宗與盟於便橋之上白登漢髙祖擊胸奴至平城上白登胸奴圍之也白登平城旁之地若丘陵也抗衡口浪切爭衡也首丘手又切禮記狐死正丘首注丘首正首丘也蕃息符袁切草茂天覆敷救切蓋也林邑乙及切南蠻國名漢日南象林之地在交州南千餘里北寧州羈縻正觀四年平突厥置北寧北撫北安等州後廢隸順州並屬河北道北撫州見北寧州注北安州見北寧州注朝錯馳遙切戞摩古黠切轢也為轂古祿切車輻所湊營繕時戰切輔治也日􅉴惻色切日景昳仄也傳飱蘇昆切又千安切阿從於何切老子唯之與阿言阿曲順從也怏怏倚兩切志不滿也伊吾於夷切在大磧外南至玉門關八百里漢冝禾都尉所治供億上居容切下於力切左氏不能供億供給億安也恂恂音荀恂恂誠謹貌也伊西州二州名伊州本西伊州正觀六年更名西州本髙昌地正觀十四年置並屬隴右道和糴亭敵切市穀也費州正觀四年析思州之涪川扶陽置屬江南道夷州武德中本以義寧縣置正觀元年復以黔州之都上縣置屬江南道針灸諸深切灸居佑切灼也五藏才浪切臟腑也之系胡計切聮屬也厭怛紇干怛當割切紇下沒切髙昌國之臣確論克角切言其論堅不可破澆訛上堅堯切薄也下五禾切謬也璟居永切五年封禪時戰切積上為封除地為禪當冠古亂切冠長褒􅃮髻屣履而舞後更號九功舞破陳舞直刃切太宗為秦王破劉武周軍中相與作秦王破陳樂曲及即位宴會必奏之以百二十八人𬒳銀甲執戟而舞凡三變每變為四陳象擊刺往來後更名七德舞尉遲紆勿切復姓拳歐巨圓切下烏口切擊也幾眇迷小切不懌益夷切恱也𦵔醢臻魚切下呼在切周禮注切之四寸為𦵔莝肉為醢非分扶問切數得色角切畜力切切也戢側立切自斂藏也羸憊上力追切下步拜切病也麋鹿旻悲切鹿屬契苾上欺訖切下蒲結切虜姓酋長上慈由切下展兩切讜言多曩切善言也忤旨五故切逆也造次七到切造次急遽貌七年俯首美辨切或讀曰俯諦觀丁計切審也泄私列切漏也禁中居蔭切天子所居靈臺候儀作儀以推候天地也浮圖一行曰靈臺鐵儀後魏斛蘭所作規制朴略度刻不均赤道不動乃如膠柱以考月行遲速多差渾天胡本切古有渾天之説曰天如雞子地如雞中黃天包地外周旋無端其形渾渾然故曰渾天也黃道儀李淳風作黃道儀以王衡旋規表裏三重一曰六合儀三曰三辰儀三曰四遊儀皆用銅內省所景切禁省也而訣古穴切絶也龔居容切州名假綸徒玩切姓也傀儡上苦猥切下魯猥切木偶戲刋江府户安切左氏傳吳城刋溝通江淮杜預云今廣陵韓江是廣陵武德七年曰刋州以刋溝為名九年曰陽州大都督府有府四刋江府是其也怫符勿切八年楷口駭切悛心且緣切止也小瘳丑鳩切疾愈𧖟食徂含切言漸吞滅之如𧖟之食葉且末子餘切故西域國名充華胡瓜切婦官髙髻吉詣切束髮後漢城中好髙髻四方髙一尺訕所諌切謗也強巨兩切勉強豁如呼活切豁然開太之貌昭穆市招切父為昭子為穆昭明也穆欽也娥牛何切鉢北未切嘻丁結切九年洮吐刀切州名饞人鉏咸切叨也而斃毗祭切頓仆攜離奚圭切攜二也邏郎佐切齕冰下沒切齧也中槍上竹仲切下千羊切于闐堂練切又徒千切西域國蹙子六切迫也趉故渠詘切又九勿切雖錮古慕切鑄塞之也有隙迄逆切隙鏬三仞而振切八尺曰仞逗遛上音豆又音住下力救切謂留止不行也羸瘠秦昔切瘦也處月突厥别部十年西陲時為切邊陲嗚咽一結切塞也裨益瀰彌切也宫壼苦本切宫中道蠧國都故切木中蟲言其蠧害於國如此蟲也葭莩上居牙切下音孚葭蘆也莩者其筒中白皮之至薄者喻附著也九嵕作工切山名在馮翊谷口器皿眉永切飯食器層觀上才登切重屋下工亂切昏眊莫報切目少精也頓躓陟利切跲也縱橫上足用切下胡孟切放縱而恣橫也俟我牀史切私藏才浪切物所蓄也十一年為墟丘於切丘墟蔭於禁切庇蔭愜詰叶切釋奠堂練切禮上丁釋菜奠幣所以禮先聖先師也配饗滂佩切從祀鉗鎖其廉切鐵有所結也儲偫文禮切意猶蓄積也聊生蓮條切賴也言無所聊賴以為生僦舍即就切賃也笄堅奚切簪也盥饋古玩切左氏傳奉匜沃盥下巨愧切易家人在中饋言婦人職乎中饋巽順而巳挹損一入切亦作抑樽節子本切禮記君子恭謹樽節樽猶趨也資治通鑑釋文卷第二十
