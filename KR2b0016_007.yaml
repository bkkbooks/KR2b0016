  text: 資治通鑑釋文卷第七
  hash: sha256:f49a45d5ba9baf76bd87d2ddee6069865756a79f7017e0298018889bcff5fec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_007-1a}
body:
  text: 右宣義郎監成都府糧料院史漢紀五十一通鑑卷五十九起著維執徐盡上章敦䍧即戊辰至庚午凡三年孝靈皇帝下中平五年屠各胡屠音儲即休屠地也各胡乃其名號交阯音止阯與趾同古字通應劭漢官儀曰始開北方遂交於南爲子孫基阯也琬於阮切韙羽鬼切䤈落火兮切即南匈奴呼韓邪之系冒頓後也襄楷上息良切下苦駭切魯莊公子襄仲之後子孫以謚爲氏徼劫於堯切要也華歆户卦切姓也馬日磾磾丁奚切蹇碩九輦切姓也票騎上毗召切勁疾貌通作驃厭之一涉切厭勝也爲陳直刃切與陣同擐甲胡慣切貫也三帀子合切周也黷武徒谷切黷猶慢也數也嬖倖博計切以賤而得倖也鈔𥘉教切畧取也六年鮮卑鮮卑山名東胡之支依此山因號鮮卑譯羊益切傳四夷之言者即周禮象胥之官子眇弭沼切一目小爲眇輕佻田聊切字書曰佻輕也猶豫猶音由亦音右解巳見上又一說猶豫者友也音跋玃屬友爲人行先行却住以候其人百歩之間如此數四先者豫也故曰猶豫又云如猴縁木上下無定故謂之猶豫唐蘇鶚演義載顔氏家訓云屬之欲切委也儳道仕鑒切廣雅曰儳疾也光熹許冝切隗五罪切忿恚上撫吻切悁也下於避切恨也詈力智切罵也輈張上彰留切車轅也張㢮弓弦二字皆有動意章懷釋云張猶強梁怖普故切恐懼也泄先列切漏也琳力尋切義從並如字胡名大月氏之别種牢直如字前書音義曰牢價直也憋膓狗態憋芳烈切態吐戴切言羌胡心膓憋惡情態如狗也方言曰憋惡也郭璞曰憋怤急性也怤音芳于切酈音歷躊躇上陳留切下陳如切廣雅躊躇猶豫也瑁莫報切癰音雍也澠池莫踐切本作黽洪農邑种邵直弓切姓也皆披普靡切開也義同辟易非若披靡質責職日切質正也謂正責之欻許勿切如疾風有所吹起闥吐曷切愽雅曰門謂之闥憒憒胡對切亂也擲直炙切投也複道芳目切重道也义手𥘉加切手指相錯也北芒音忙本作邙洛陽北山名阪甫逺切說文坡者曰阪一曰山脅也卒至音猝訕所晏切謗也癡丑之切不慧也闇與暗同沮材汝切止壞也鯁涕古杏切哽咽而流涕也踧迫子六切踧行平易也迫逼也猶言行平易而逼之酖殺直禁切以毒酒殺之也襄賁音肥東海邑節傳張戀切解見漢紀四十九郿音媚右扶風邑挫則卧切摧折也周毖東觀記曰周珌豫州刺史慎之子也續漢書魏志珌並作毖音祕章懷註矯舉夭切揉曲爲矯汰他蓋切沙汰馥方六切伷直又切擾龍宗擾音繞又音饒古擾龍氏之後撾張瓜切擊之也邟郷音凢即潁川邟縣孝獻皇帝甲𥘉平元年板授𥙷綰切通作版以版籍授官鄴逆怯切魏郡之邑闚去隨切小視也棊峙交里切上也虎兕序姊切虎兕皆猛獸也說文虎山獸之君兕如野牛而青象形一說雌犀也糜沸忙皮切糝也如糝之沸陶竈徒刀切陶窰也說文燒瓦竈從容七㳟切休燕也駮議北角切駮雜也以所議雜而駮之蓋勲工曷切姓也箴章金切誡也驅蹙子六切迫也更相工衡切互也蹈藉慈夜切踐也或作躤葺七入切𥙷也刮金古刹切削也蒯良苦怪切姓也襁負居两切襁褓也負兒衣元菟同都切郡名古真畨國被創初莊切傷也析先歷切洪農邑賦調徒弔切賦謂賦歛調謂調發委輸委猶委積之委輸猶轉輸之輸委於僞切胡母班音無風俗通云胡母姓本陳胡公之後也公子元奔齊遂有齊國齊宣王母弟别封母郷逺本胡公近取母邑故曰胡母氏鍾虡音具說文鍾鼓之跗以猛獸爲飾前書音義曰虡鹿頭龍身神獸也飛廉如字前書音義曰飛廉神禽身似鹿頭如爵有角虵尾豹文藉田秦昔切藉借也說文曰帝耤千畒也古者使民如借故謂之藉也通作耤鸞輅路與輅同輅亦車也天子之車以鸞爲飾謂之輅者言行於道路也旄頭莫𫀆切徐援釋疑曰乗輿黄麾内羽仗班弓前左罼右䍐者冠熊皮冠謂之旄頭漢紀五十二通鑑卷六十起重光恊洽盡昭陽作噩即辛未至癸酉凢三年孝獻皇帝乙𥘉平二年灌古玩切灌嬰慺慺落侯切勤也又龍珠切樂浪音洛狼郡名古朝鮮國戮力音六說文曰戮力并力也嵇康音力幽切吕静字韻與飂同字林音遼垢汙上古厚切下烏故切濁穢也軫止忍切梟其古堯切斷首掛於木上嫌賢兼切疑也或作慊踧踖上子六切下子昔切釋云㳟謹貌調徒弔切謂計發也傕訖岳切瞑目莫定切閉目甄官稽延切甄陶也官官舎也如學官鹽官之官戇陟降切愚也先零音憐羌種名煨壹回切華隂户化切洪農邑前書屬京兆逞丑郢切快也塞悉則切窒也囂五豪切逄紀音龐姓也密要伊消切評蒲兵切諶氏任切并力卑政切兼也並也怯迄業切畏也哺奔謨切歠也艘蘇遭切說文船緫名也瓦解下懈切散也沮授側余切風俗通曰黄帝時史官沮誦之後槌直追切擊也或作桘索去色窄切求也溷胡困切厠也眭固息隨切姓也涿竹角切郡名劉備無它音三國鼎分始見於此䣛音悉脛節也或作膝稠直由切多也訩訩詡拱切衆言也峴山胡典切在南郡襄陽縣斜谷斜余遮切褒斜谷也谷音浴在長安西南南曰褒北曰斜通漢中乘輿天子所乘車輿不敢斥言尊者故稱乗輿荒思相吏切慮也爼豆側吕切爼豆禮器也格物古伯切廢格之格以清議廢人又音閣不見形甸切顯也名聞文運切聲所至也古作䎹三年汜音似又音泛淑神六切彧乙六切楯殊閏切所以扞身蔽目者讙呼許元切驚呼也塢一古切服䖍通俗文曰營居曰塢一曰庳城也郿音媚右扶風邑儲陳如切糧也字通作儲蹉跌上倉何切下徒結切義同差跌褊𥙷典切狹也本作惼㦸凢劇切說文有枝兵也釋名曰㦸格謂傍有枝格擲直炙切搔也投也與擿也拳捷逵貟切詩無拳無勇職爲亂階注拳力也扞衞侯旰切扜蔽也衷甲陟隆切言施鎧於衣中墯徒果切落也趣讀曰促炷音注燈炷也臍前西切毗臍也綺去倚切說文繒也黥首巨京切說文墨刑在面也古作䵞刖足魚厥切斷也鈔楚教切略取也承間居莧切謂乗其間隙之時剛稜盧登切說文柧木柧作觚闕角謂之斛稜取孤髙義詡况羽切馗渠龜切通作逵頎渠希切詬丘候切又許候切戩子淺切筦古緩切通作管饑饉上居希切下渠吝切榖不熟爲饑𬞞不熟爲饉鍾繇古由字下邳貧悲切前書屬東海邑永平中更爲下邳國瑀王矩切四年鄄城工掾切濟隂邑陽翟直格切頴川邑薄落津信都西有漳水津名薄落津史記趙武靈王曰吾國東有河薄落之水昱余六切溧陽音栗丹陽邑鼔箏甾耕切說文鼔弦竹聲樂也郯徒甘切東海邑取慮上音趨又音秋下音閭下邳國邑前書屬臨淮睢陵音雖下邳國邑前書屬臨淮易羊益切豕郡之邑易水岀縣南瑾渠遴切尾敦尾姓敦名傍北歩浪切依也平敞齒兩切平治髙土也饋遺上求位切餉也下以醉切贈也漢紀五十三通鑑卷六十一起閼逢閹茂盡旃蒙大淵獻即甲戍至乙亥凢二年孝獻皇帝丙興平元年小沛博蓋切長平觀工喚切前書音義曰長平阪名也上有觀在池陽宫南壽張無它音東平國之邑前書志作壽良屬東郡應劭曰丗祖叔父名良改曰壽張邈莫角切游俠胡頰切俠之言挾也以權力挾輔人顧眄普莧切馬融曰眄動目也翊與職切濮陽音卜東郡之邑汎嶷上符咸切皇甫謐云本姓几氏遭秦亂避地於汜水因改焉靳允居焮切姓也麤中倉胡切心不精也棗祗上子晧切潁川文士傳曰棗氏本姓棘避難改焉亢父音抗甫東平國邑要我於堯切忿憤上敷粉切怒也下房吻切懣也邯鄲上音寒趙國邑汶音問搏戰伯各切說文索持也昳徒結切日昊也募莫故切召募也典韋多殄切姓也大呼火故切亦作嘑突陁没切觸也疽千余切癰也韙于鬼切璋諸良切瑁莫報切沈彌上式任切古作周文王第六子聃季食采於沈子孫因以爲氏婁發郎侯切姓也朐䏰上音蠢下如尹切昫師古音劬本作忍巴郡之邑麋竺上武悲切下音竹姓也𡵨巨支切橈女巧切曲也嘔於口切吐也造焉七到切就也分好上扶問切下虚到切謂推結交分愛好也昕許斤切紘户萌切徑吉定切直也涇古靈切丹陽邑惠衢胡桂切惠姓岀浪邪周惠王之後二年數矣所角切屢也索山客切求也叱昌栗切阿叱也截昨結切斷也或作􅎒擿直炙切搔也投也與擲同絞古巧切暹息廉切宣璠甫袁切又音煩郃音合又音閤爲質音致結信也懣音滿又音悶北塢安古切服䖍通俗文曰營居曰塢一曰痺城也山陽公載記曰時獻帝在南塢李㴶在北塢晡奔謨切日加申時詰責契吉切問也誚責之也琦渠羈切悖蒲昧切又蒲没切逆也睚眥上五懈切下仕懈切瞋目貌不解音蟹曉也巫覡刑狄切說文能齊肅事神明也在男曰覡在女曰巫厭勝於渉切伏也酈音歷郭多即郭汜也一名多劫質訖業切恊也通作刦強取也莊子有刦請之賊左右章懷曰左右助也音佐又虎賁音奔勇士稱也若虎賁獸言其猛也東緍音旻山陽邑挑戰徒弔切謂擿嬈敵以求戰也飲食飲於禁切食讀曰飤㦸几劇切有枝兵也票騎毗妙切通作驃輯秦入切和也資儲陳如切糧也督郵音尢即後漢郡主簿也隋始改爲録事叅軍主勾稽文簿舉彈善惡見馮鑑續事始稟贍上力錦切沮雋側余切風俗通曰沮姓也黃帝時史官沮誦之後𬒳創音槍又作瘡𥘉良切傷也墜直類切落也譎古穴切詐也綴陟衛切連綴也砥柱上之履切或作厎下直注切又知女切山名在河水中斫之若切刀斫濺子賤切又音賛沾也匍匐上蓬逋切手行也下鼻墨切伏地也幘側革切說文髮有巾曰幘掬居六切在手曰掬幔莫半切幕也餉式亮切饟也壘魯水切軍壁錐朱惟切說文銳也比至必寐切近也諧户皆切說文詥也魂魄上胡昆切陽氣也下匹陌切隂神也茹人恕切菜茹牛渚章與切小洲曰渚通作陼在丹陽蕪湖亦名採石笮融側格切姓也秣陵莫撥切丹陽邑偵丑正切窺也擥魯敢切撮持也或作㰖兠鍪上當侯下莫侯切首鎧也褠古侯切單衣也袴褶似入切騎服也授傳張戀切節傳睦莫六切和也委輸前書音義曰委輸謂輸委積者也委音迂僞切輸音式喻切泝江蘇故切逆流而上曰泝華歆户化切姓也戹乙革切難厄也徼利於堯切要也掘其月切搰地䈥舉欣切說文肉之力也从竹竹物之多筯者饘粥上諸延切說文糜也周謂之饘瞋目稱人切張目也蹈之大到切行貌鮮于鮮相然切風俗通曰武王封箕子于朝鮮其子食采於于因氏鮮于潞魯故切漁陽邑峭王七笑切烏亘之屬礪力制切砥石也塹七艶切坑也樓樐樐即櫓字城上守禦望樓說文釋名曰櫓露也上無覆屋呼厨泉並如字南單于名其後爲前趙劉元海之叔祖漢紀五十四通鑑卷六十二起柔兆困敦盡著雍攝提格即丙子至戊寅凢三年孝獻皇帝丁建安元年更相工衡切互也犇古奔字塢郷一户切即太原塢縣繕時戰切治也承說音稅誘也盱眙上許于切下音怡下邳國邑前書屬臨淮耽丁含切潰胡對切散也踧子六切迫也并勢卑政切並也郝萌上呵各切下莫耕切袒衣徒旱切脫衣䄂而肉袓也比明必寐切近也扞侯旰切衛也荆棘上舉卿切楚木也下訖力切小棗叢生者採稆音吕自生禾也通作櫓拘㳟于切執也弈羊益切盛也徼福於堯切要也脅虚業切以威力相恐也旦奭周公旦召公奭圖緯于鬼切圖緯之書也駮議北角切雜也議不同也沮將預切沮喪也恣睢上資二切下呼季切索隠云恣睢放縱謂肆情恣縱也卒制卒音猝忽也彧於六切縞古老切繒之精白者鸞駕盧官切說文人君乗車四馬鑣八鑾鈴象鸞鳥聲和則謹也通作鸞榛蕪上側詵切木叢生曰榛下微夫切荒蕪也施軫章忍切鄭康成注周禮曰軫輿後横木也猾夏户八切滑亂也夏華夏王軌居有切車轍也猶曰車同軌之類契闊上苦結切本亦作挈下苦活切契闊勤苦也韓詩云約束也費亭音祕屬沛國鄼縣恣資四切縱也跋望遣爾切舉踵而望也轘轅胡關切關名險道也在河南緱氏縣東南浙江之列切說文江水東至㑹稽山隂爲浙江翻孚袁切查瀆莊加切地名在㑹稽昕許斤切豫且上羊洳切姓下子余切名張磔陟格切張也開也造次七到切急遽也剽輕匹妙切亦輕也桑椹式荏切桑實也蒲蠃盧戈切蚌屬鈴郎丁切似鍾而小中者竹仲切當也穰城人羊切即南陽邑穰縣宛於元切南陽邑綬是酉切又承呪切說文韍維也從容七㳟切從容猶休燕也禰衡乃禮切姓也二年淯水音育水出洪農盧氏驍將堅堯切徤也創𥘉莊切傷也搏之伯各切索持也瞋目昌眞切張目也狼狽博蓋切獸名解見安帝陽嘉二年屬以之欲切委也球巨鳩切合從將容切以利合曰從械户戒切說文桎梏也梟首堅堯切斷首加木上噬時制切㗖也颺風所飛颺也去聲㽔如追切趣逡湏切嚮也墯徒果切落也大咍呼來切笑也䧟陳直刃切與陣同誤五故切謬也誧奔謨切瑀音禹駱俊盧各切姓也陽夏音賈淮陽國邑忿恚於避切恨也蘄陽音祈水經曰蘄水岀江夏蘄春縣北山酈元注云即蘄山也西南流經蘄山又南對蘄陽注于大江亦謂之蘄陽口餒奴罪切餓也禇昌與切誣武夫切罔也劾胡得切法有罪也訊息晉切問也脚攣力全切拘曲也杼秋食汝切沛國之邑前書屬梁國慨然苦蓋切嘆也三年閿郷無分切本亦作闅屬洪農湖縣埤溼部靡切不濕也春秋國語曰松栢不生埤溼古濕字遏烏葛切遮也遼落蕭切驍猛堅堯切徤猛也狶虚豈切蹙子六切迫也蹉跌上倉何切下徒結切說文蹉跌失時也捐與專切棄也明上猶明府也眭固宣爲切姓也沂泗魚衣切沂水出東海費東西入泗灌古玩切澆也自首式救切自陳其罪醖於運切釀也釀汝亮切醖也頷之户感切杜預曰揺頭也叵普大切不可也縊於賜切經也昌慮音廬東海邑羡以戰切又似面切屈強上其勿切下巨兩切梗戾也取音娶齎則兮切持也捉側角切搤也餞才線切送也縱横上子用切下胡孟切放縱而恣横也僮芝音童姓也番陽上音婆豫章邑亦作鄱易京易羊益切水名岀涿郡公孫瓉臨易河築京以自固故號易京爾雅曰絶髙謂之京漢紀五十五通鑑卷六十三起屠維單閼盡上章執徐即巳卯至庚辰凢二年孝獻皇帝戊建安四年趣讀曰促下復趣同屠各上音儲解見上烏桓東胡别種漢𥘉冒頓滅其國餘類保烏桓山因以爲號蹋徒臘切烏桓王丘力居之從子大人烏梪以勇健能理决鬪訟者推爲大人种直弓切侈尺氏切奢泰也媵御羊禁切妾媵也灊山音潜廬江灊縣之山也其地有天柱山懣音滿又音悶煩也簀牀側革切牀棧也歐血一口切吐也通作嘔皖城胡管切即廬江皖縣璆渠幽切妖妄於喬切怪妄也繕時戰切善也器械下介切器之緫名内盛曰器外盛曰械抄𥘉教切略取也知幾居希切幾微也瓊渠營切琰以冉切詡况羽切取讀曰娶覬音兾膏腴上古勞下羊朱切澤肥之地也殖承職切多也蒯越苦怪切姓也越其名狐疑音胡獸名其性多疑不决也釁許僅切暇釁也俗作舋委質職日切形也曄筠輒切讋服之渉切失氣也艘蘇刀切船之緫名沙羡音夷江夏邑檄胡歷切檄者以木簡爲書長尺二寸韜土刀切藏也橈女教切曲也其字從木迕五故切逆也本仵忤下忤紹同鄒佗上側鳩切下託何切又徒何切撲討普木切擊也舎之音捨又音赦釋也餘杭杭音行伍之行㑹稽邑從士疾容切相就之士也匕箸上卑履切匙也下遲據切或作筯迅雷迅音信疾也种輯上直弓切下音集車胄尺遮切姓也胄其名豨虚豈切五年洩音薛漏也卒解上七没切忽也下佳買切判也官渡河南滎陽縣有鴻溝水官渡即其處沮材汝切止壞也忲他蓋切奢也嬴音盈秦姓鄄城工掾切濟隂邑賁育上博昆切下余六切孟賁夏育古勇士俠侯夾切隘也南阪音反坡阪亦作坂壘力軌切軍壁輜重上音甾下直用切輜軿車也軿作或爲竹筥或爲蒲器所載觕重餌仍吏切食也中頰上陟仲切下吉恊切傷面旁也叱之尺栗切訶也沙塠都囬切或作垖聚土也髙櫓音魯詳見本卷興平二年樓樐注蒙楯食尹切本作盾所以扞身蔽目故云蒙楯霹靂車音匹歷象雷之急激者車昌遮切輿輪之緫名霹靂車者飛石車也所以發礮其字並從石作礔礰壍七艶切坑也畫地乎麦切分也搤乙革切捉也喉胡溝切說文咽也或从肉扼音榏杷也或作㧖晃胡廣切跣先典切足親地燔附袁切熱也幟昌志切旌旗之屬銜枚音梅所以止讙囂周官有銜枚氏枚狀如箸横銜之恟許容切又許拱切心所恐懼阬丘庚切或作坑圯部鄙切毀也拊膺上方武切下於陵切拍胷也愎弻力切很也陂堨陂池也堨遮擁也音鳥葛切紘户萌切志趣七句切趣嚮榻吐盍切牀也勦子六切絶也儲偫上陳如切下直里切儲㣥猶蓄積也燥先到切乾也詭過委切詐也闇懦闇與暗同懦乃卧切又乃亂切闇昧而懦弱也閬中郎宕切巴郡之邑賨民徂宗切南蠻以輸賦者爲賨民韙于鬼切漢紀五十六通鑑卷六十四起重光大荒落盡旃蒙作噩即辛巳至乙酉凢五年孝獻皇帝巳建安六年間居莧切迭也燼徐刃切火餘也髀音陛股也下同屬目否欲切視也猶豫上音由亦音右下音預玃屬居山中聞人聲豫登木無人乃下故謂不决者爲猶豫其它說已見上挑徒了切弄也戯誘之江州巴郡之邑杜預曰巴國也畿渠希切索山客切求也說之音稅誘也啜姝恱切與歠同自首式救切自狀其罪之七年浚儀私閨切陳留邑睢陽音雖梁國邑窖居効切說文地藏也或作窌析械先擊切其字從木斤破木也剛愎弼力切很也春秋左傳云剛愎不仁汾扶云切水名出大原晉陽山西南入河鞬中居言切盛弓矢器也葉式渉切南陽邑禆將賔彌切副將也窄側格切狹也任子如鴆切保任也子以父任爲即送質陟利切送質所以結信也焉能於䖍切公瑾渠遴切八年鎧可亥切甲之别名漯隂它合切平原邑嬰城伊盈切繞也嬰繞其城以固守之毗頻脂切峭七肖切峻也或作陗誚才笑切責也戮力力竹切并力也字林音遼克不俯九切與否同讒䦧許歷切詩兄弟䦧于墻䦧很也鄭氏箋蟣舉豈切虱之子也虱所櫛切齧人蟲瓦解胡介切判也散也仲虺許鬼切奚仲之後爲湯左相鄱陽音婆豫章邑盪徒沆切盪滌也九年淇水渠之切在河内郡其水岀北山有奥水流入淇水詩所謂淇奥者洹水于元切出河内隆慮蘇秦合諸侯盟于此邯鄲音寒丹趙國邑平上幘側革切巾幘鼔譟先到切羣呼也滏水扶雨切在魏郡鄴之西北其水熱故名滏水顗朱豈切幾中上音機下竹仲切謂近乎中傷也橈辭女教切曲也號乎刀切呼也慰勞郎到切慰勉之也繒慈陵切帛也稟食之上力錦切下讀曰飲以禀食養之也輯音集和也牽招苦堅切姓也并力卑政切兼也並也琰以冉切扶餘夫餘地名在長城之北槀離國王子東明因都其地故號扶餘濊貊濊與髙句麗同種朝鮮以東盡其地皆以濊爲氏頑嚚魚巾切心不則德義之經爲頑口不道忠信之言爲嚚怖普故切惶懼也跪渠委切䠆跪也嬀覽俱爲切說文曰虞舜居嬀汭因以爲姓貟音云翊音翼紿之徒在切欺之悽愴上千西切下𥘉亮切痛傷也覘丑艶切視也縗絰上七雷切䘮衣也亦作衰下徒結切以苴麻爲之十年桴鼔風無切說文擊鼔杖掾屬掾俞絹切官名也屬音孰醜詆丁禮切毀訾也瑀王矩切㰱所洽切歠也珩音行獷平服䖍音鞏師古音九永切又音穬漁陽邑晟時正切殽澠上河交切下莫踐切並屬洪農郡殽即殽函函乃函谷關澠即澠池殽或作崤澠或作黽郖津田候切也名在洪農東垣音袁即陳留長垣侯國也濩澤上烏虢切河東邑諦思丁計切審也最祖外切極也上功曰最桎梏上之實下古篤切械在足曰桎在手曰梏撲普木切說文擊也漢紀五十七通鑑卷六十五起柔兆閹茂盡著雍困敦即丙戍至戊子凡三年孝獻皇帝庚建安十一年稽顙上康禮切下冩襄切額至地也伉口浪切匹敵也羈首居冝切馬絡頭也衘紲私列切馬韁也言如馬以衘紲之熬五勞切煎也哺蒲故切說文哺咀也酋豪自秋切長也蹋頓上徒臘切遼西烏亘别種名十二年卒然音猝覬覦上音兾幸也下羊朱切欲也幸得其所欲邢顒上音刑下牛凶切邢姓本周之裔邢侯爲衛所㓕後遂爲氏其先侍中邢辟謫爲河間鄚令因家焉忿敷粉切又敷問切怒也趣治趣讀曰促蓨他彫切前書作脩音同勃海邑洿烏故切穢也亦作于濘乃定切又乃挺切淖濘也蹊要賢雞切經也懈㢮賞是切懈怠而放㢮也嘿莫北切與黙同郷導郷讀曰嚮堙谷於眞切塞也梟堅堯切斬首加木上徼倖古堯切幸也通作僥鶉尾殊倫切星名其次在巳楚之分野贇紆倫切易水羊益切易水岀涿郡安閻山雛崇芻切鳥子曰雛猖獗紀劣切說文僵也失脚貌漢沔彌兖切前書志沔水岀武都東南入江或謂漢水爲沔水章懷注漢水出漢陽嶓冡沮沔二水出武都東狼谷也闇與暗同結好虚到切撲匹角切素也鈍徒困切不利也十三年肄羊至切說文習也凌操閭承切姓也操其名邾追輸切說文江夏縣耄莫報切老耄蒙衝上謨蓬切下昌容切字本作艨艟戰船也所以突敵栟閭上音并下凌如切字本作栟櫚博雅曰栟橺㯶也大紲私列切系也謂以大綆系之矴丁定切錘舟名鎧可亥切甲之别名舸賈我切大船也方言南楚江湖謂之舸傳其符遇切著也函胡䜛切匱也更生工衡切更猶再也毓余六切垢面古厚切塵垢也羸衣倫爲切羸弊之衣也風痺毗至切濕病也中陳直刃切列也與陣通陽翟直格切頴川邑儲峙上陳如切下文里切猶蓄積也郗慮綺㦸切姓也慮其名偏宕大浪切偏邪跌宕不拘正理謗訕下所諌切訕謂謗毁也倉頡篇云訕非也跌蕩徒結切跌蕩無儀撿也放縱也琦渠覊切琮藏宗切瑁莫到切譴去戰切說文謫問也婁圭洛侯切姓也圭其名宛於元切南陽邑千兩力仗切車乘數也艘蘇刀切船之緫名偪筆力切迫也徼於堯切長坂甫逺切說文坡曰坂一曰山脅也通作阪瞋目昌眞切張目也㦸擿上訖逆切有枝兵也下直炙切說文搔也通作擲禪時戰切鴻臚下音閭歔欷上音虚欷也下許氣切歔也二字互相用也投傳知戀切傳以木爲之長尺五書符於上以爲信解詳見上廙羊吏切范蠡盧啓切戰國時人事越王勾踐以滅吴孱陵孱應劭音踐顔師古音仕連切武陵邑菅音姦濟南邑梟雄古堯切梟徤也勇也若六博之梟鄂五各切江夏邑芟夷師銜切刈也魯縞古老切魯之細繒也鬪艦户黤切戰船四方施板以禦矢狀如牢番陽番音婆豫章邑字或作鄱爭衡側莖切抗衡也懾質涉切懼也助畫胡麥切計畫也邏郎佐切廵也疫營集切疾疫也燥荻上先到切下徒歷切乾萑也帆符咸切舟上幔所以汎風或作䑺煙炎以贍切火光或作䧟輕銳弋稅切利兵也蹈藉上大到切下慈夜切履踐也徇辭峻切畧也調徒鈎切調發也狷介吉掾切𥚹急揣知𥘉委切度量刎武粉切斷也邴原補永切姓也原其名黝音伊丹陽邑字或作黟音同歙音攝丹陽邑拓撻各切開拓漢紀五十八通鑑卷六十六起屠維赤奮若盡昭陽大荒落即已丑至癸巳凡五年孝獻皇帝辛建安十四年搴丘䖍切說文抜取也南楚謂之攓一作攓雩婁上許于切下力于切廬江邑渦古禾切按前書志渦水受淮陽扶溝浪傷渠東入淮又音瓜芍陂芍音酌又音鵲楚相孫叔敖所造徑百里灌田百頃在廬江郡灊音潜廬江邑沙羡下音夷江夏邑間居莧切諜也格物古百切禮記格物而后知至壷飱上户吴切酒器也下千安切盤飱也一槪古代切平斗斛之木瘁秦醉切病也詭過委切詐也十五年仄古側字忖度上倉本切思也下徒落切量也肝鬲古核切胷也字本作膈陽夏工雅切東國邑猥烏賄切多也䠞子六切迫也行裝側羊切裹束也旰古案切日晚也晏也公瑾渠吝切醪魯刀切濁酒刮目古刹切摩切也耒陽盧對切桂陽邑交阯音止郡名屬交州䵋于鄙切又虎偎切青黃色璜胡光切歩騭上蒲故切姓也下職日切入質陟利切交質也十六年傳檄胡狄切以木簡爲書長尺二寸爲召命蒲阪甫逺切其地在魏爲垣入秦爲蒲阪見劉伯莊說在漢屬河東郡斐敷尾切餌賊仍吏切食也甬道音踊謂築垣墻如街巷挑戰徒弔切擿嬈敵以求戰也拊手方武切拍手重沓徒合切重足著地也柵測革切編立木也堅壘力軌切軍壁也一仰牛向切恃也僑客臼嬌切寄也邑邑乙及切說文不安也本作悒佯音陽驍名堅堯切徤也譎古穴切詐也墊江上音疊巴郡之邑涪音浮廣漢邑葭萌上音家廣漢邑前書志作葭明音萌十七年螟忙經切蟲名食榖葉者鄜城音敷前書屬左馮翊邑脅虚業切以威力相恐秣陵音昧丹陽邑濡湏上人朱切濡湏水岀九江歷陽縣塢於古切庳城也洗足先典切濯足也鈍徒困切不利也彘直例切豕也卒至上音猝十八年徹軍直列切去也通作徹鈔𥘉教切略取也蘄春音祈江夏邑𤾂城上胡管切廬江邑大輅音路金輅赤舄思積切履也鈇鉞上匪父切與斧同下王伐切亦斧屬彤弓徒弓切赤弓玈弓音廬黒弓也秬鬯上音巨黒黍下勑亮切香酒所以降神卣音酉中尊也珪瓉藏旱切宗廟祼噐周禮祼圭有瓉以肆先王髙壘力軌切軍壁深溝古侯切說文水瀆廣四尺深四尺璝古回切泠苞郎丁切姓也苞其名左傳有周大夫冷州鳩參所今切地名大呼火故切亦作嘑氐王丁奚切夷種名咄當没切呵也爲質執利切結信也五創𥘉良切傷也焉能於䖍切覬音兾儲陳如切積也笞超之切以箠擊之也刖魚厥切斷其足也相貿莫候切交易也漢紀五十九通鑑卷六十七起閼逢敦牂盡柔兆涒灘即甲午至丙申凡三年孝獻皇帝壬建安十九年郃音合又音閤罷敝罷讀曰疲屠各音儲屠各胡也枹鼔風無切擊鼔杖也踊余隴切跳也流矢飛矢曰流矢所中竹仲切傷也於邑上汪胡切下遏合切短氣貌字通亦作嗚唈督郵音尤古官名釋名曰督郵主諸縣罰負郵殿糾攝之詳解見漢紀五十三震怖普故切惶懼也禆將頻彌切副助也糜竺上音武悲切下音竹羕餘亮切擯必刃切斥也伺相吏切奄闚也亦候也飱蘇昆切餔也睚眦上五懈切下仕懈切瞋目貌縱横上子用切下胡孟切不順理也下放横同肘陟栁切臂節也腋羊益切胳也在肘後亦作掖政苛音何羈縻上居冥切下忙皮切羈馬絡頭也縻牛紖也言牽制之故取喻也沈醉持林切溺也俗作沉非是屈橈女巧切又女教切曲也枹罕上音膚隴西邑前書屬金城朝見上馳遥切下胡甸切朝請才性切􅗖如甚切孕也或作妊徒跣蘇典切徒者歩行跣足親地訣古穴切訣别酖殺直禁切以酖毒殺之二十年河池如字武都邑一名仇池演音衍秭歸上音姨南郡之邑荆州記曰縣北一百里有屈平故宅方七頃累石爲屋基行間胡郎切行伍間愍眉殞切憐也杜濩孫盛云濩音户後爲巴西太守朴胡孫盛云朴音浮姓也胡其名後爲巴東太守委質職日切正也形也瓦解音蟹散也椎牛直追切擊也與垖同犒饗口到切餉也號呼乎刀切亦呼也披靡普彼切裂也覘癡廉切又敕占切窺也扞敵侯旰切衛禦也被創𥘉莊切傷也緩控苦貢切引也巴賨徂宗切巴蟲名賨賦名稱巴賨者本此戢側立切藏兵也宕渠徒浪切巴郡邑斜谷音耶育在武都西南人谷百里而至慷慨上苦莾切卜苦蓋切二十一年琰以冉切譴去戰切貴也虬須虬渠幽切須作鬚虬須如蚪龍之須也瞋昌眞切怒也觖望古穴切怨望也考覈下革切覈實焉能於䖍切放横胡孟切恣也讋服之渉切失氣也去卑去卑單于右賢王名呼厨泉朝魏因留鄴遣去卑歸平陽監其國其後大夏赫連氏即其裔漢紀六十通鑑卷六十八起強圉作噩盡屠維大淵獻即丁酉至己亥凡三年孝獻皇帝癸建安二十二年鼔吹尺僞切音律管壎之樂也本作籥警蹕上音景戒肅也下壁吉切止行人也穰人羊切南陽邑女妻七計切以女嫁人也眇亡沼切一目小也廙羊至切彪𥙷休切函胡讒切函書也詡况羽切砥礪上只禮切下力制切嘿然密北切静也通作黙屬目石欲切視也悵然丑亮切失志也歔欷上休居切下許旣切歎息也府藏才浪切物所畜也賜遺弋季切喜不俯九切與否通衣繡於旣切偪筆力切迫也釁許愼切隙鏬通作舋下辦歩見切武都邑畯子峻切棧助諫切又仕諫切椲吁韋切晃胡光切二十三年狐疑音胡獸名其性多不决故曰孤疑弛賞是切懈弛鄢陵上音偃頴川邑咽喉上因蓮切下胡溝切或作胭􅵛搏戰伯各切索時也鎧上可亥切又口漑切廣雅曰䤴中介鎧也桑乾音干代郡之邑繇役繇通作徭宛於元切南陽邑迸北諍切走也二十四年沔水莫踐切應劭曰沔水岀武都東南入江如淳曰沔陽人謂漢水爲沔水顔師古曰漢上曰沔沔陽屬漢中郡鼔譟先到切羣呼也按陳直刃切與陣同遮要地名在褒斜之南與陽平相近蹂踐上仁栁切下慈翦切踐踏也傲悖上魚到切下蒲没切倨慢而強很也蒯祺苦怪切姓也祺名耽都含切水潦魯皓切雨水大貌跪去委切䠆跪也恟懼許容切又詡㤨切擾恐也春秋左傳曹人兇懼滿寵上莫旱切風俗通云荆蠻有瞞氏音舛變爲滿郟音夾前云頴川邑掎其居綺切從後牽曰掎袤音茂簏盧谷切竹髙篋也泄先列切漏泄䣛息七切脛耑也通作膝闡齒善切開也明也鼷䑕胡雞切小䑕也一曰有螫毒者或謂之甘䑕莛撞上唐丁切下文江切莛草莖也輯與集同爾雅曰集和也兼并卑政切亦兼也僵仆上音薑下音赴頓踣也撤敕列切抽也檄胡狄切以木簡爲書長尺二寸陵轢上音凌下郎擊切謂蹈踐之也韜隠他刀切藏也諜徒恊切間也亟紀力切急也􅖻􅑳上古侯切人力本切􅖻或作䑦䑦􅑳船名揺櫓郎古切擢屬摇櫓所以進船也商賈音古行賣曰商坐敗曰賈翻孚袁切譎古穴切詐也笠力入切說文簦無柄也覆敷救切蓋也哽古杏切哽咽伷直由切吻此粉切口邊也饌雛戀切具食也侏儒音朱侏儒短小也春秋左傳曰我君小子侏儒是使婁洛侯切會稽邑旛字袁切旌旐緫名琮藏宗切鍼州職深切亦作斗慘慼上七感切愁不申下倉歷切憂懼咄唶上當没切下子夜切歎聲也瘳丑鳩切疾瘉也駮言北角切雜也言不同也輕脆此芮切小䎡易斷也票騎頻妙切勁疾貌通作驃踞居御切蹲也謂踑踞大坐著陟略切置也糜沸才未切涫也涫音灌若煑糝之沸遹以聿切𫐠也搢紳搢即刀切挿也紳大帶也搢紳謂挿笏於帶也嬖倖博計切賤而得愛曰嬖賄賂呼罪切財也贈送也廷爭爭與諍同彊伉口浪切徤也資治通鑑釋文卷第七
