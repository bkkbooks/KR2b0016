body:
  text: 右宣義郎監成都府糧料院史照晉紀二十一通鑑卷九十九起重光大淵獻盡閼逢攝提格即辛亥至甲寅凡四年孝宗穆皇帝中之上永和七年苻健渠建切強氏姓也其兩切又其良切兩音通用下同大秦苻健字建業苻洪第三子也據長安稱天王大單于建元皇始國號秦始於此史以前秦別之靚疾政切又疾郢切長樂音洛魏郡之邑屬司州廋踈鳩切雍州於用切楞盧登切與稜同墮徒果切氐酋上丁奚切羌也下自秋切長也龕音堪俊與俊同恱綰恱姓也鮮卑人迸北諍切散也薊音計燕國之邑屬幽州行陳上胡郎切下與陳同降胡下江切謏先鳥切灄頭上所涉切水名也在西陽恚於避切恨怒也逄約逄薄江切姓也鄄城上音絹僕陽國之邑屬兖州李邽音圭庫傉官偉庫傉官代北三字姓也傉內沃切至唐止姓庫一字樂陵上音洛郡名漢所置至晉為樂陵國屬兾州吐谷渾葉延谷音浴渾音魂吐谷渾虜國號即鮮卑之後義見上羈縻羈馬絡頭也縻牛紖也言牽制之故取喻爾彪輔休切會稽上古外切山名禹會諸侯而計㓛命曰會稽猶會計也秦為郡昱音育噂􅊱上兹損切下徒合切相對談語也徼幸工堯切通作僥丁零翟鼠丁零在康居比去胸奴庭接習水七千里事見魏略八年愈音于碻磝上口勞切下五勞切城名後魏為濟州治所瓉藏侃切圭瑣也為質陟利切結信也鮮卑上音先東胡别種依鮮卑山因以為號之陳與陳同下方陳同被創𥘉莊切傷也繆嵩本史音謬姓也劉猗於冝切為祟雖遂切伸也紿之徒蓋切欺誑也菁子情切芍陂上七削切在安豐郡孫叔敖所造以灌田也晞音希鶩亡遇切馳也縋馳偽切垂繩而下也涪城音浮梓潼邑屬梁州遺以醉切贈也不解胡買切曉也三思蘇暫切語三思而後行王俠音協張悕音希元菟古真番之地漢武元封三年置此郡九年上邽涓畦切邑名屬秦州之天水郡晃胡廣切鄠音户古京兆縣名晉為始平郡屬雍州譙昨焦切郡名屬豫州蠡臺音禮地名在梁國屬豫州輔車尺奢切頰骨牙車也丁嬈奴了切又音擾盱眙上况于切下與之切臨淮邑屬徐州十年岌魚及切琪音其宛於袁切地名在南陽國鮪渚為鬼切地名掾以絹切曹官也郗丑之切姓也咄咄當沒切呵也空函音咸淅川上音錫嶢栁上音堯也名也在武關藍田之間突陳與陳同女媧堡媧音瓜堡音保地名樂浪郡名也上音洛下音郎古朝鮮地漢武所置晉屬平州僂力主切又音樓皓胡廣切讖楚譛切讖纎也其義纎微倜儻上他歷切下它黨切不羈也厭次一琰切縣名屬兾州之樂陵國又一涉切次如字又音恣斌悲巾切與彬同晉紀二十二通鑑卷一百起旃蒙單閼盡屠維協洽即乙卯至已未凡五年孝宗穆皇帝中之下永和十一年噉徒敢切食也與啖同濟北子禮切郡國名屬兖州瓫與盆同瞎許夾切一目盲也強后其兩切又其良切皆姓通稱也讖楚譛切讖書也釋名曰讖纎也其義纎微之謂菁子情切墮徒果切楞來登切冠軍上音觀在諸軍之上故曰冠軍數而所主切計其過也諡神至切行之迹也瓘音貫強遣其兩切下強人酒同索孚蘇各切姓也易揣上音亦姓也下𥘉委切名也張玲郎丁切訞言於喬切躡之尼輒切踵蹈也拉落合切折也坑丘更切比有毗至切近也星孛音佩又音勃皆彗星也秦分扶問切分野也綝尺林切善也髙句麗句音鈎麗音離在遼東之東漢武元封時開屬中國釗指遙切納質陟利切結信也鴦於良切又烏郎切錘傳追切金鎚也鉗巨淹切以鐵有所劫束也鋸居御切孟莊子始作鋸脛下頂切又形徑切腳脛也比比薄必切次也驍堅堯切健也十二年淄水側持切在齊地辟閭蔚辟閭復姓也並如字衛文公支孫以居楚丘榮辟閭里因為辟閭氏蔚紆物切其名也每朝見朝直遙切見胡電切閼頭音遏什翼犍渠焉切代王拓跋氏之名也晉載記什作涉書説音稅誘也崤函上户茅切下音咸山名在洪農秦雍於用切二州名也軹關上音𥿄在河內比肩上如字並也禳汝羊切羸牸上力為切瘦也下音字牝牛也使人上踈吏切結陳與陳同病創𥘉良切傷也帥衆上音率領也將也龕音堪鄄城上音絹僕陽國之邑屬兖州診章忍切候脈又視也驗也塹七艷切坑也繞城水也嬰城於盈切繞城以自守也嶷魚力切又魚其切載􅨕與遁同音鈍緦臨力禁切哭臨也廙羊吏切升平元年悛此緣切改也強很胡懇切戻也恚於避切恨怒也黧眉騧馬名上音黎黑而黃也下音瓜黃馬黑喙也敕勒敕勒即鐵勒國也其音訛轉耳謡田餘招切徒歌謂之謡轅軛於革切車軛也不省息井切視也眇亡沼切一目小也燖徐鹽切湯中瀹肉也撲殺蒲角切舉而擊殺之也嗷嗷牛刀切衆口愁也趫丘妖切捷也譟先到切群呼也睿以芮切與睿同輻湊音福車輻也湊本作輳千候切共轂也歐血烏后切吐也與嘔同彪之輔求切二年蚝七吏切五畤音山神靈之所止也秦有西畤好畤鄜時武畤密畤凡五畤也郗曇上丑之切姓也下音談氐豪上音低羌也屏息上必郢切屏藏其息濮陽音卜古昆吾國屬兖州山茌仕疑切太山郡之邑屬兖州趣去上音促疾也背本步內切棄也憤惋烏貫切驚歎也可足渾乎昆切代北三字姓也前燕後燕之望姓涅皓上奴結切姓也皓其名巫蠱音古巫者執左道以亂政而惑人蠱惑也撓辭及教切又女巧切又呼髙切擾也一疾貌三年泓烏宏切潸山産二音流涕觀下音貫好施二字並去聲暐于鬼切齧倪結切噬也莵途兔二音怖普故切惶懼也郇音荀驃騎毗召切徑疾貌亦作票豪撗户孟切非理也屏氣上必郢切屏藏其氣徑卒子沒切渦潁上音戈水名受淮陽扶溝浪蕩渠東入淮潁水出潁川陽城亦東入淮沛音貝故秦泗水郡㻱音津與璡同勝殘上詩證切論語解云勝殘暴之人使不為惡也晉紀二十三通鑑卷一百一起上章涒灘盡著雍執徐即庚申至戊辰凡九年孝宗穆皇帝下升平四年鶩亡遇切可足渾代北三字姓也木強顔師古注周勃傳云木謂質朴強其兩切徑也之悖蒲昧切又蒲末切皆亂也孤婺矛牙里之切無夫也安重直隴切多難奴旦切蠡臺音禮地名在梁國屬豫州贇於倫切美好也帥騎上音率什翼犍晉載記什作涉犍渠焉切拓拔代王名也妻之七計切以女嫁人也會稽上工外切山名後為郡屬陽州晉灼曰本名茅山吳越春秋云禹巡天下登茅山大會群臣會計因更名曰會稽昱音育劉惔徒甘切鮮卑上音仙東胡別種依鮮卑山因以為號五年郤曇上丑之切姓也下音談名也説恪上音稅誘也豁呼枯切沔中莫踐切水名出武都東南入江驃騎毗召切徑疾也靚疾郢疾政二切櫓楯上音魯大循也下食尹切所以扞身蔽目者單男單音丹虜姓也又音善亦姓也自喪蘇浪切屏息上必郢切懼而屏藏氣息也哀皇帝隆和元年介守介猶獨也下邳符悲切國名屬徐州宛於元切地名在南陽庾以主切姓也畫而胡麥切分畫也長孫知上切大也成行户郎切列也緬弭兖切逺也賖音奢逺也踧子六切踧踖行恭謹貌慨若蓋切慷慨也氛符文切祅祥之氣也處分上昌汝切至也定也下符問切所當然也鍾虡橫曰簨縱曰虡音巨木謂之虡所以挂鍾磬也虡師為猛獸中流矢上竹仲切傷也飛矢曰流矢興寧元年江虨布蠻切又甫巾切厭屈上於葉切厭伏也珣音荀掾以絹切曹屬也未易以䜴切星孛步內切彗祅也角亢音岡星名也綸騫上音倫姓也騫其名髙車古赤狄種或曰胸奴甥也二年土斷都玩切決也皆以上著為決斷耳斷榖徒管切絶食也禇太后丑吕切姓出河南赭圻上音者下音祈地名沈充式荏切姓出吳興禁錮錮音固銓衡銓即衡也乂量也度也次也衡橫也平也所以量度人物而為之平也三年臠力兖切切大切也洌洲上音列地名崤澠上户交切山名下弭兖切水名澠也縣也皆在洪農築音竹辟閭蔚辟閭復姓義見上苛令苛音何煩也下力政切犍為上渠焉切下如字郡名屬益州鞬居言切雍端上於用切姓也文王子雍伯之後司馬隗司馬姓也隗五罪切母丘暐上音無母丘復姓出河東其先食菜母丘因氏焉西海公上太和元年淡徒敢徒濫二切水搖動貌二年遹音聿述也枹罕上音孚下音漢古罕羌侯邑賀肫賀姓也肫音純覘敕艷切窺也穄田子例切糜也似黍而不黏吕氏春秋曰飯之美者有山陽之穄埿奴奚切與泥同又浦鑒切郗愔上丑之切姓也下挹淫切廋所鳩切姚眺它弔切蒲坂甫逺切河東邑屬司州有歷山舜所耕者葦絙上于鬼切蘆也下古登切大索也澌音斯流水也三年張蚝七吏切華隂户化切縣名在洪農以華山在其南也甬東之悔越王句踐既破吳遷吳王夫差於甬東吳王曰侮不用子胥之言自令陷此甬東者東鄙甬江東也翟傉上音狄下奴沃切名也榆眉上羊朱切地名挑戰徒了切擲嬈敵以求戰也恱綰恱姓也綰其名鼎跱持里切三分其勢而立如鼎之三足也恣撗户孟切非理也委輸謂輸送委積者上遷偽切下式喻切見前漢鮑宣傳貸音忒從人求物也紏擲上音﨣督也下他歷切發動其私也釐校上里之切理也下音教撿也考也晉紀二十四通鑑卷一百二起屠維太荒落盡上章敦牂即己巳至庚午凡二年海西公下太和四年乃遺于偽切可足渾乎昆切代北三字姓前燕後燕之望巨野上音巨髙平國之邑名屬兖州魯獲麟之所汶水音問水出狼邪朱虛東泰山東入濰舳艫上音逐下音盧船之万長者也一曰舟尾也見衆上形甸切見在之衆遼碣上音僚水名在潦陽下音傑東海有碣石山易水音亦水出涿郡隋為易州因水得名也河濟子禮切水名出王屋山賖音奢澀色入切樂安上音洛鄱陽郡之邑名屬楊州燕之諸王遙領也鄉導上許亮切所向也導引也悉羅騰悉羅復姓也騰其名染干津染而琰切姓也譙梁昨焦切地名在豫州李邽音圭宙直又切輕剽匹妙切輕也與僄同義設餌仍吏切粉餅也戰數音朔不一也下數往數以並同輜重上測持切下直用切鎧仗上可亥切甲也仗刃戟總名躡娖輒切蹈其後也冠軍上音貰下冠丗同郝晷上音霍姓也君焉音煙乘輿乘輿者天子所乘之車也故群臣託乘輿以言之猖狂心不能審得失之地也要結於宵切約也好援上呼報切東朝直遙切稱職上尺證切相當也邸舍都禮切漢謂屬國舍為邸近丗為逆旅之稱間問古莧切乘間而問之大鴻臚音閭漢武帝更秦典客之官為此名鴻大也臚傳也謂以禮大陳序賔客陷陳直刃切與陳同丗子令力政切比者必利切近也肥如遼西郡之邑名屬幽州邯鄲上音寒下音丹趙地也舍此與捨同傍步浪切緣也從者才用切閺鄉亡云切地名在洪農郡之湖縣岱宗岱泰山也泰山為四嶽之宗故曰岱宗屬目上音燭與矚同視之甚也藉藉秦昔切險易以䜴切平也伍貟音云即伍子胥侵橈奴巧切又音蒿皆亂也無厭於炎切飽足也行伍上户剛切列户不更下音耕賦調徒弔切亦賦也厮役上音斯厮養也役使也必當丁浪切相當也索頭先各切什翼犍渠焉切塗中音除又音途水名在臨準郡之堂邑於晉為下邳國號泣上音豪五年斌與彬同盟津上音孟河北地名屬河內於其也置津故曰孟津周武盟諸侯於此故曰盟津軹關音止在河內軹縣屬司州行造七到切從容上七恭切下如字猶休宴也躊躇上音躊下音除勞之力到切慰也反間古莧切反其言而為之間隙也笁瑶笁音竹姓也謫陟革切罰也媯俱推切石頭城名在吳丹陽郡秣陵即其地也隗五罪切涪城上音浮梓潼邑屬梁州虓許交切虎聲也蚝七吏切大呼火故切呌也覘敕艷切窺也郡將子亮切間道古莧切微道也榷賣上音角且趨音促餘蔚紂物切又音尉姓也名蔚髙句麗句古侯切麗音離東夷國名居遼東之東質子上音至質子所以結言也覆簣求位切取士籠也斂葬力驗切殯殮也嶷魚力切謀畫音獲計䇿也見幾音機微也令長上力政切下之兩切觀省上息井切察也審也晉紀二十五通鑑卷一百三起重光協洽盡旃蒙大淵獻即辛未至乙亥凡五年太宗簡文皇帝咸安元年帥步上音率翟斌上音狄下音彬同澠池弭兖切縣名在洪農郡朱􅊮下余中切什翼犍渠焉切代王拓跋氏也什或作涉脅迄業切兩膀也鷲峽上音就地名在仇池枹罕上音孚下亦音漢古罕羌侯驃騎毗召切徑疾也吐谷渾谷余蜀切渾胡昆切其先鮮卑徒可涉歸之庶長名曰吐谷渾其後因以為號漒川其良切水名在河南幾亡音祈近也詰朝去吉切平旦也恍惚上虎朝切下呼骨切上邽音圭九錫九錫一車馬二衣服三樂四朱户五納陛六虎賁七斧鉞八弓矢九秬鬯郗丑之切姓也愜結叶切床笫阻史切又側里切牀簀也痿儒佳切痺濕病也禇太后禇丑吕切姓也昱余六切數行户剛切王彪之輔休切倚傍步浪切笁瑶音竹白帢苦合切土服也辨缺四隅謂之帢一説魏文帝倣古皮辨裁縑帛以為帢歔欷上休居切下休既切歎息也邸丁禮切舍也幘側革切髮有巾曰㥽詔乘輿食陵切車輿切晞音希輕剽匹妙切劫奪也㻱子仁切與璡同晃胡廣切掾俞絹切官屬惋烏貫切驚歎也怛當割切飲鴆直禁切毒酒灞上必駕切自説自為之説也讜音黨屏之必郢切屏斥也熒惑户坰切春狄緯文耀鉤云赤帝嘌怒之神為熒惑急省息并切審也察也日旰居案切日晚也乞伏司繁乞伏復姓司繁其名二年協音協刀音雕姓也下耽丁含切壼苦本切相者悉亮切媵以證切妾媵處分上昌汝切區處曰處下扶問切分别曰分長樂音洛魏郡之邑屬司州核真户革切讀如核實之核淑妃神六切後宫女官悚荀勇切因叱昌栗切訶也烈宗孝武皇帝上之上寧康元年恟恟詩容切喧擾之意戰懾之涉切懼也從容七恭切猶休燕也撤直列切去也趣音促襁褓上舉兩切下輔抱切負兒衣沮水子余切水名出漢中巴獠魯皓切蠻獠周虓虛交切趣江陵上逡須切卭莋疾各切卭莋二國皆西南夷墊江墊音重疊之疊巴郡之邑屬梁州箕踞音據箕踞謂伸其兩足一曰箕踞其形似箕彗星徐醉切妖星欀袂彌蔽切奮袖也鮮卑相然切山名東胡別種因保此山遂以為號二年期功期言周期功言大功慘七感切三年正朔諸盈切正者歲之首月也朔者説文月一日始蘇也臨哭力禁切衆哭曰臨濛莫紅切東莞音官郡名屬徐州圗讖楚僣切符命之書讖驗也掖庭音亦韋昭云以為在掖門內故謂之掖庭閹人衣檢切宫中守門者挫則卧切摧挫晉紀二十六通鑑卷一百四起柔兆困敦盡元􅘬敦牂即丙子至壬午凡七年烈宗孝武皇帝上之中太元元年郗愔郗處脂切姓也愔揖淫切浙江之列切江水東至會稽山隂為浙江輿櫬𥘉覲切棺也苟萇直良切假鏗口莖切席仂盧則切為質職利切結信也球音求縛之符攫切射之神亦切命中曰射不中竹仲切當也傷也蕞爾徂外切小貌抗衡口浪切羊衡也敦煌音屯皇郡名屬涼州應劭曰敦大煌盛也行陳上户剛切下直刃切稽首音啓首至地也按堵音覩按次第如墻堵不遷動也索泮索蘇各切姓也泮音半切沔漢莫踐切漢上曰沔橈女巧切弱也其字從木鄉導許亮切索虜虜以索辨髮故曰索虜髙車古赤狄餘種𥘉號狄歷或曰其先胸奴甥也故北方以其言語與胸奴同冦鈔楚交楚教二切略取也閼婆閼烏葛切又音焉紇根胡骨切窟咄上苦骨切下當沒切伺便相吏切伺候也訥奴骨切狡猾上古巧切狂狡也下户八切亦作徻也穢貊上烏廢切下亡格切其國在東北方與髙句麗同種控弦口弄切控引也黠虜户八切傑黠也重譯羊益切譯者傳譯四夷之言也重譯謂重重而譯之殣渠遴切理也忿撫吻切又敷問切怒也拓跋圭拓他各切跋蒲撥切亦作拔代北復姓自云拓天而生拔地而長遂以氏焉幢麾宅江切旙幢桑乾川乾音干地名在代北二年新羅新羅者其先本辰韓種也地在髙麗東南艦户黤切戰船四方施板以禦矢其狀如牢法古法字菲薄妃尾切微也屐竭戟切屩也哀惋烏貫切驚歎也三年邸丁禮切蒼頡篇曰邸舍也楫即涉切舟棹也或作楫艘蘇刀切船之總名􅨕丑絹切盱眙音吁怡臨淮邑屬徐州挹乙及切大宛於袁切西域國名汗血馬大宛國有髙山其上有馬不可得因取五色母馬置其下與交生駒汗血因號曰天馬子檻車户黤切載囚車也劾胡得切法有罪也四年并力卑政切兼也並也枹鼓風無切擊鼓杖也間使居莧切間道之使也輜重上側其切下直用切璪之子皓切下邳貧悲切國名屬徐州五年薊音計燕國之邑屬幽州馴致詳遵切順也善也泝蘇故切逆流而上曰泝擯必仞切棄也黷武徒谷切黷猶慢也數也元莵同都切郡名琳犂沈切休忍夷狄國名蟻聚語豈切蜉蟻之聚也𥚹厄俾緬切㣣也潼關音童在華隂本名衝關河自龍門南流衝激華山東故以為名馳傳張戀切車傳狃女救切習也徼幸堅堯切詐也汧雍氐汧輕煙切雍於用切謂汧雍之間氐羌也垣敞垣于元切姓也敞其名昌兩切巨鹿臼許切國名屬兾州應劭曰鹿林之大者也六年交址音止或作趾郡名屬交州瑗于願切晞音希七年鄯善鄯時戰切西域國名蝗胡光切蚊也廣袤音茂東西曰廣南北曰袤彌填堂見切車師前部王名休密馱徒何切鄯善國王名晃胡廣切沖直弓切岱宗待戴切泰山也為四嶽之所宗輯睦音集又七入切爾雅曰輯和也默然密北切靜也通作默暗劣暗古暗字時掖上陟柳切臂節也下夷益切胳也在肘後不解音邂曉也挫祖卧切摧也櫛風側瑟切如梳櫛之櫛沴氣乃結切又郎計切殖丞職切種也帥音率嘷音豪廏居又切馬舍也詵所臻切晉紀二十七通鑑卷一百五起昭陽協洽盡閼逢涒灘即癸未至甲申凡二年烈宗孝武皇帝上之下太元八年銓此緣切築陽音竹又音逐順陽邑屬荆州炬臼許切束葦燒斜谷上以遮切下于蜀切漢中谷名琰以冉切墅上與切田廬左祍如甚切衣襟也夷狄之俗左其衣祍論語微管仲吾其𬒳髮左祍矣鄖城音云古漢南之國柵測革切編立木為之趣逡須切嚮也器械胡介切械者器之總名勍敵渠京切強也春秋傳勍敵之人憮然音武失意貌蹙子大切迫也中流矢中竹仲切傷也飛矢曰流矢壷飱千安切壷漿飱飯也豚髀上徒渾切小豕也下音陛服也飼音嗣或作飼暐羽鬼切屐竭戟切屩也澠池音沔洪農邑屬司州飊卑遙切扶搖風也絛籠上他刀切説文云扁緒也戓作縚下蘆東切所以蓄鳥也草笩房􅚼切結草為舟也衣巳於既切昵尼歷切近也通作焉耆於虔切西域國名龜兹音丘慈西域國名嬰城於盈切繞也繞城以自守迫脅虛業切以威力相恐也翟斌翟直格切姓也斌悲巾切傳翼傅讀曰附藉虎慈夜切下藉彼音同蛟居肴切龍之屬也鎧仗可亥切鎧者甲之總名仗謂器仗也趣使趣讀曰促擐甲胡貫切貫也春秋傳楚人擐甲執兵九年餘蔚餘姓也蔚紆勿切後燕慕容垂字道明皓之第五子雋封吳王王後奔秦符堅敗埀起兵至榮陽自稱燕王建元曰燕元史以後燕別之始於此饌雛綰切具食也亟出紀力切􅔂也急也桑榆容朱切木名襜裳蚩占切蔽膝之衣也屠各屠音儲屠各者皆休屠之屬庫傉官偉傉奴沃切庫傉官三字姓綦母綦渠之切母音無復姓滕其名鼓譟先到切群呼也披靡普彼切豁呼括切可足渾談可足渾三字姓談其名誚才笑切亦作譙暗古暗字佺期逡緣切送任如鴆切質子也華隂户化切洪農邑屬司州強永強其兩切姓也永其名樂浪音洛狼郡名屬平州愍公眉殞切鼷鼠音兮小鼠也一曰有螫毒者或謂之甘鼠噬時制切嚙也龐演音衍後秦姚萇字景茂弋仲第二十四子兄襄既戰死萇率諸弟降秦及符堅敗萇遂起兵于北地稱大將軍大單于萬年秦王年號白雀史以後秦別之始於此掾屬俞絹切官屬漳水音章山海經曰漳水出荆山南注于沮水灌之古玩切澆也恟懼恟音凶又許拱切亦作春秋傳曹人懼苛峻上音何虬渠幽切琳音林壘襲壘力軌切姓也襲其名無厭於鹽切不足也驃騎毗召切徑疾貌焉能上於虔切獪胡古邁切呐龍侯女劣切又女鬱切將馗下渠追切節傳節與卪通傳張戀切拓他各切亦開也雄健始有部衆自號柔然魏太武以其無知狀類於蟲故改其號蠕蠕亢埿上音岡下又徒計切什翼犍渠焉切載記什作涉鏘七羊切昶丑兩切玉門酒泉郡之邑屬涼州漢罷玉門關屯徙其人於此因以為號允吾音鉛牙本金城郡之邑入晉廢之乞伏國仁乞伏復姓國仁其名按姓纂云乞伏本鮮卑乞伏部酋帥號其後因以為氏焉西秦乞伏國仁鮮卑人也符堅敗自稱大單于秦河二州牧建元曰建義史以西秦別之始於此乙旃童埿旃之然切乙旃復姓後魏官氏志云獻帝命叔父之後為乙旃氏童埿其名繹幕音亦清河國之邑屬兾州梟之堅堯切梟其首也繕修時戰切治也十一年斌悲巾切枹罕音膚其字從木古罕戎也秃髮思復鞬秃髮姓也思復鞬名蓋其先壽閴之在孕母胡掖氏因寢而産於𬒳中朝鮮謂被為秃髮因而氏焉鞬居言切傳檄下胡狄切符檄也古者以木簡為書長尺二寸謐覔畢切帝嚳枯沃切髙辛氏顗語豈切刀雲刀丁聊切姓也雲其名馬嵬五回切地名上邽音圭天水邑屬秦州魏代王拓跋圭什翼犍之孫太子實之子即代王位大會於牛川改元登國又改代稱魏始於此酒酣胡甘切應劭曰洽也纂作管切啖青徒濫切氐羌名剽掠上匹妙切下力灼切剽劫掠取也趣乞逡須切嚮也窟咄上苦骨切下當沒切幢將宅江切幢主也縞素古老切爾雅繒之精白者曰縞寺人時吏切閹官也中之上竹仲切創重上𥘉莊切傷也下直用切窺覦上去隨切下羊朱切或作窬皆私視也臨洮吐髙切隴西邑屬秦州兆水出西羌中輜軿上側持切衣車也下薄經切輕車也説文軿車前衣車後字林載衣物車前後皆蔽若今庫車鉾鎧上音牟劒端也下可亥切甲也矟色角切長矛也或作槊晉紀二十九通鑑卷一百七起強圉大淵獻盡重光單閼即丁亥至辛卯凡五年烈宗孝武皇帝中之下太元十二年奔古奔字奕羊益切沾襟居吟切交祍也釗指遙切甕口烏貢切與甕同驍勇堅堯切健也冬鸞冬姓也鸞其名盧宫切涇陽堅靈切漢屬安定郡至晉發之長子持良切上黨邑屬并州井陘音刑常山邑屬兾州鼓譟先到切羣呼也􅨕徒困切與遁同櫝音獨旻武巾切數之所矩切一二計之也掘其月切榾也倮即果切袒也亦作祼後涼按載記吕光字丗明父婆樓佐命符堅本氏人也堅死自定涼州稱涼州牧建元太安史以後涼別之始於此張掖音亦郡名屬涼州應劭曰張國臂掖故曰張掖伺釁上相吏切下許愼切謂伺探其釁隙也瑀王矩切索嘏索昔各切姓也嘏其名古馬切餉之式亮切饋也亦作餉騂馬思營切馬赤黃色十三年朝那直遙切安定邑屬雍州辟閭渾辟必益切辟閭復姓其先衛文公支孫居楚丘榮辟閭里因以為氏渾胡昆切蔚紆物切來降胡江切景行下孟切詩曰高山仰止景行行止鄭氏箋云景明也古人有高德者則慕仰之有明行者則而行之司雍於用切司雍二州苑川於阮切西秦王所都之地庫莫奚庫莫奚者夷狄國名一曰奚其先東部胡宇文之別種為燕王皓所破竄匿松模之間俗善射獵好為冦抄焉契丹音乞夷狄國名與庫奚異種同類居於和龍之北皓胡廣切邊芮而鋭切翟勍翟徒歷切姓也勍渠京切辨皮變切詰之去吉切問也十四年薊城音計燕國薊縣之城屬幽州忱是壬切邢奴音刑浮屠同都切袁宏漢記浮屠佛也佛者漢言覺也將以覺悟羣生昵尼質切近也亦作昵姏姆上音甘老女稱也下音茂母也五誡音戒釋家有五誡奔湊奔古奔字湊猶輻湊也千候切黃鉞王伐切斧以黃金飾車尺遮切姓也本齊田氏之後至漢田千秋以年老得乘小車入省中時人謂之車丞相因為氏焉淑媛上神六切下于眷切後宫女官之稱邊烽敷容切燧候表也邊有警則舉火厝火倉故切置也土斷都玩切決也謂以土著而決斷之長殤尸羊切説文不成人也年十九至十六死為長殤十五年細行胡孟切揭飛揭音朅又渠列切紇突鄰紇下沒切紇突鄰部落之號也直力鞮丁奚切劉衛辰之子也鄄城工掾切燕國之邑屬幽州脅虛業切迫脅也珣音荀十六年妻之七計切以女嫁人曰妻鄉導許亮切鄉先而引導也郿音媚扶風邑屬雍州強金槌強其兩切姓也金槌名直追切𣢾附苦管切誠𣢾也佺期此緣切觚攻乎切求好呼到切愛好也為質職利切結信也大兜當侯切中目竹仲切傷也琰以冉切餘杭胡剛切邑名在吳郡郁久閭地粟袁郁久閭柔然國三字姓也地粟袁其酋長名大磧七迹切沙土曰漠即今磧也涿邪山上音卓下以奢切或作塗山名在代北英雋子峻切智過千人曰雋晉紀三十通鑑卷一百八起元黓執徐盡柔兆涒灘即壬辰至丙申凡五年烈宗孝武皇帝下之上太元十七年鮑遵鮑簿巧切姓也遵其名炬音巨束葦燒也艘蘇刀切船之總名暍許葛切熱貌郝晷郝黑各切姓也崔蔭於禁切樂浪音洛狼郡名屬平州秣馬音末食馬榖也枹罕音膚枹鼓之枹其字從本古罕羌侯之地郗恢郗丑飢切姓也曇徒含切華隂户化切洪農邑屬司州金墉餘封切城名在河南洛陽西北角三國魏明帝所築豪橫胡孟切豪強恣橫也怏怏於兩切志不滿也倒戈丁老切平頭戟也倒者謂以戈自攻也賖詩車切逺也十八年單于音蟬虜之尊號猶中國稱天子也傉官偉傉奴駑切庫傉官三字姓偉其名熾磐上尺志切下蒲官切井陘音刑常山邑屬益州旻武巾切晃胡廣切十九年紛陀徒何切冠軍古玩切功在諸軍之上故曰冠軍屠各音除屠各猶休屠之稱滏口扶雨切水名在鄴山海經云神囷之山滏水出焉標榜上卑遙切褾榜猶相表襮挫之祖卧切槯折也太行胡剛切山名在河內山陽西北詭道過委切詐也軹關音𥿄軹縣之關在河內郡陳于直刃切切瓉藏旱切伉儷上苦浪切敵也下力計切耦也東莞音宜郡名屬徐州嚴禰乃禮切親廟也涇陽堅靈切邑名在安定湟中胡光切在金城破蕪縣地汧川苦堅切地名在扶風一紐女九切系也庾楷庾勇主切姓也秀容秀容本漢汾陽縣地後省之至元魏始置肆州秀容縣內燕內讀曰納胡母亮母音無胡母復姓軻彈軻音柯姓也翟瑥翟徒歷切姓也瑥音溫衄女六切敗衄吳頡胡結切二十年嬖人博計云賤而得幸曰嬖茹千秋茹人諸切奭施隻切從容七恭切猶休燕也媟私列切嬻也慢也貸吐戴切寬貸上邽音圭天水邑屬秦州間以居莧切迭也厠也拓跋涉圭拓他各切跋蒲撥切代北復姓涉圭其名莫者羖羝莫者復姓羖羝其名羖公土切羝丁奚切狃女九切狎也驕也穄田子例切星見胡甸切漂紕招切漂移也斥候按許慎淮南子云斥度候視也參合陂班糜切在代郡屬幽州即漢參合縣地沙漠莫各切沙土曰漠索虜昔各切戎虜以索瓣髮詗火逈切知處告言也銜枚音咸所以止言語歡囂狀如箸撗銜之迸去北諍切散走也倭奴烏禾切薊音計燕國之邑屬平州二十一年兵趣逡須切嚮也嘔血一口切吐也沮陽七余切孟康音爼上谷邑屬幽州強愎上渠良切下弼力切剛強愎戾也眭邃睦音雖姓也邃其名雖遂切揚言余章切如風之所飛楊也曖昧於代切暗曖暗昧也鼓吹尺偽切説文吹者音律管塤之樂也出警居影切警者戒肅也入蹕畢吉切蹕所以清道止行人也儲㣥上陳如切下丈里切猶蓄積也濮陽音卜國名屬兖州古昆吾國也蠢弱陟降切蠢謂騃昏也愠懟上於問切怒也下直類切怨也長孫肥長知丈切長孫復姓創𥘉莊切傷也勍敵渠京切強也春秋傳云勍敵之人醒桑經切又先定切醉解也魘於琰切驚夢暗弱暗古暗字禇粲禇丑吕切姓也擲之直炙切投也搔也輯和七入切與集同集和也于栗磾丁奚切晡博孤切日加申時也韓􅒲竹角切城隍胡光切城池也蒲阪甫逺切河東邑屬司州有歷山舜所耕也資治通鑑釋文卷第十一
