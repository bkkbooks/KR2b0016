  text: 資治通鑑釋文卷第四
  hash: sha256:17dec8bcb8e2dad1c7ed0564c65a8972fdcb05c8ec4432991241ce9f7e020c45
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_004-1a}
body:
  text: 右宣義郎監成都府糧料院史炤漢紀二十一通鑑卷二十九起上章執徐盡著雍困敦即庚辰至戊子凡九年孝元皇帝下永光三年更爲工衡切改也復除方目切除其賦役也四年雍於用切扶風邑五畤音止解見孝景帝中六年筦古緩切與管同瘖於今切不能言也五年射熊上食亦切下回弓切館名秦昭王所起在扶風盩厔復復下扶目切返也而強其兩切勉也湛靜時林切俗作沉適長適讀曰嫡下同阼存故切主階也屯氏徒渾切河名在魏郡館陶隋誤以爲毛氏河乃置毛州失之鳴犢徒谷切河名在清河靈縣建昭元年圈求逺切養獸之所倢伃上音接幸也下音余美貌字或從女挌殺古栢切擊也二年灋古法字郷之郷讀曰嚮五鹿充宗鹿盧谷切五鹿姓也風俗通云衛邑晋公子重耳封舅犯於此其後因氏焉螟亡丁切蟲食榖葉者疫營隻切民皆疾也誰與與讀曰歟語辭諄諄之純切禆蒼云告曉之熟也藐藐美角切不入也通藉秦音切通朝注之籍乘傳張戀切車傳遯徒巽切卦名涌水余隴切水滕出不中竹仲切當也趣之趣讀曰促詿誤上古賣切下五故切誤謬纍纍力追切重積貌屬任上之欲切下如鴆切委付也姨妬上昨悉切下都故切害也忌也稱快尺孕切愜意也勞勉來到切慰也賂遺上洛故切下弋季切遺贈也訾與貲同訕所晏切謗也核夏革切讀如覈實之覈下同三年郅支之日切匈奴單于號即呼屠吾斯也支解佳買切謂􅎒其四支也都頼落蓋切水名在郅支闔蘇胡臘切胡廣云康居北有國名奄蔡一名闔蘇然則闔蘇即奄蔡也剽悍上匹妙切輕剽也下胡幹切勇悍也敺音區沮林汝切上壞也行陳上戸郎切下直刃切温宿息六切西域國名顔師古曰雍州醴泉縣北有山名温宿嶺者本因漢時得温宿國人令居此地田牧因以爲名按醴泉即漢左馮翊谷口縣闐池徒賢切在康居國卑闐城間乎居莧切間謂宻呼也罷極罷讀曰疲勞也傅陳傳讀曰敷敷布也幡幟式志切旌旗之屬魚鱗陳直刃切言其相接次形若魚鱗􅢾七豔切阬也鹵楯上郎古切字或从木下食尹切字通作盾鹵大盾也盾所以扞身蔽目閼氏上於連切下音支匈奴皇后號薄城伯各切迫也乘城呼乘神陵切呼火故切登城而大叫也環城音患繞也應和胡卧切言聲相應也犇古奔字鉦諸盛切鐃也創𥘉良切傷也以卑必寐切予也四年當混胡夲切同也槀街工早切街名蠻夷邸在此街晉灼曰黄圗在長安城門内邸丁禮切屬國舎也骼工客切枯骨曰骼胔才賜切有肉曰胔竟寧元年王嬙所力切又音墻字昭君本後宫良家子元帝時遣娉呼韓邪單于其國號爲寧胡閼氏冒頓並如字或音墨特頭曼之子也攘人羊切郤也徼吉弔切塞徼亭隧音遂隧謂深開小道而行避敵鈔寇也㷭火敷容切或作烽燧候表也邊有警則舉火覬音兾覬覦嫚易上莫晏切下弋䜴切黠下八切桀黠繇讀曰傜役之傜卒復卒讀曰猝左伊秩訾子移切匈奴王號逡千旬切鴻臚凌如切徼幸工堯切倖也通作僥搴音騫抜也歙侯歙即翕字西域有五歙侯國慴之渉切恐也獫狁上虚檢切本作玁下庾凖切匈奴別號周稱曰玁狁嘽嘽吐丹切衆也焞焞吐雷切又他屯切盛也或作啍鎬下老切地名非豊鎬之鎬時獫狁侵鎬及方至于涇陽則此鎬與方皆在周之北也顔師古說挫祖卧切析也覆過敷救切蓋也靡音縻散也莎車素和切西域國名鼙皷歩西切騎上之皷也隤徒回切隤下擿持益切又丁歷切磓也磓丁回切青蒲並如字應劭曰以青規地曰青蒲自非皇后不得至此也自還音旋嘘唏上音虚下許旣切歎息貌字或從欠自度曲𬒳歌聲度大各切𬒳皮義切應劭曰自隱度作新曲因持曲以爲歌詩聲也荀恱曰𬒳歌聲能播樂也分刌千本切刌切也謂能分切句絶爲之節制也㓜眇音要妙精微也迭大結切互也焭焭葵營切憂也疚居又切乆病分扶問切別也悖布内切乖也嚴恪嚴讀曰儼恪克各切恭謹貌漢紀二十二通鑑卷三十起屠維赤奮若盡著雍閹茂即己丑至戊戌凡十年孝成皇帝上之上建始元年懣音滿又音悶煩也元莵同都切郡名本真蕃國阿䛕容朱切謟也孛歩内切又蒲北切妖星四塞悉則切滿也過譴詰戦切謫問也勞來上郎到切下郎代切勸勉之意否隔否皮鄙切閉也乾餱胡溝切乾食也汾隂扶云切河東邑鸞路魯故切本作輅路車之施鸞者騂駒上思營切赤色下㳟于切馬二歳曰駒二年耐罪人之切罪不至髠全其耐鬢淑神六切善也異態伐代切態度間適間代也居莧切適讀曰嫡下同小卞音盤小雅刺幽王廢后黜嫡之詩禆正禆賔彌切接益也嬖卑義切愛幸也且莫車且子余切呼韓邪顓渠閼氏之長子且麋胥且子余切胥先於切呼韓邪大閼氏之次子創艾上𥘉亮切下讀曰又創文懲也復株累若鞮復音服累力追切鞮丁奚切匈奴單于號谷蠡上音鹿下音黎匈奴王號三年蹂躪上人九切踐也下音藺轢也訛言吾禾切謬也或作譌越嶲先蘂切郡名古卭都國謂越過嶲水因以爲名四年隕石羽敏切從髙下也肥累力追切古肥子國眞定邑薰粥弋六切匈奴别名堯時曰薫粥盤互胡故切盤結而交互也互字或作牙洞洞音動驚肅也屬屬之欲切專謹也舎始夜切猶留也晻與暗同又一感切瞽說上果五切下失爇切謂言不中道若無目之人也倚於綺切依也偏駮北角切謂不周普也更進工衡切互也開右讀曰佑助也愠於問切怒也蕃扶元切多也金隄丁奚切隄名在東郡白馬界輕脆此芮切小䎡易斷泄先列切漏也霽子計切又才詣切雨止也浚音峻深也非調顔師古曰大司農名調徒釣切謂計發也㮴先勞切其字从木一船爲一㮴也傰宗傰音倍姓也仄古側字井陘音刑常山邑井陘山在南郅都之日切姓也沙幕末各切沙土曰幕在匈奴南界郢都以井切楚文王自丹陽徙都之地在漢南郡江陵北十里杜郵音九地名秦白起死於此去咸陽十里至漢更咸陽爲渭城屬右扶風喋血大頰切本字當作蹀謂履渉之也燉煌燉音屯郡名應劭曰敦大也煌盛也鈍徒困切不利也河平元年矯枉上舉夭切下嫗往切正曲也竒請竒居冝切謂常文之外主者别有所請以定罪也它比毗至切謂引它類以比附之鉤摭上古侯切曲也下之石切拾也伊邪莫演音衍匈奴右皐林王名二年反間居莧切反其本而間諜之詐諼許元切詐辭也雨雹弼角切雨冰曰雹釡奉甫切鍑屬蚡扶問切傅致傳讀曰附謂益其事而引致於罪狀也砥節砥音指底厲也首公式救切向也詆欺丁禮切毀訾也猾户八切猾亂也三期期年也音基字本作朞殛居力切誅也鉤町上鉅于切下大鼎切西夷國名漏卧郎豆切西夷邑名古漏卧侯國後爲縣屬䍧柯䍧柯上兹郎切下居何切武帝元鼎六年臨䍧柯江置郡因以爲名選耎上息兖切下人兖切選耎畏怯不前之意賁育上音奔下余六切孟賁夏育皆古之勇士賁生拔牛角育力舉千鈞要害並去聲要害者在我爲要於敵爲害墮壊火規切毀也且同子余切亭名在夜郎國數責所矩切計也計其目而責之壘魯水切軍壁也饟道式亮切糧道也戲下許冝切字本作麾漢書以戲爲麾三年嚻音敖撮千括切緫取也平賈音價害直也爲著陟慮切謂著於簿籍比繇戍六月也四年肜以中切歐血一口切吐也蓮勺音輦酌左馮翊邑罽賔居例切西域國名治循鮮城剽殺匹妙切劫也琅當琅音郎長瑣也若今之禁繫人鎻矣顔師古說㥦苦頰切快也郷慕郷讀曰嚮行賈音古賈市也刁斗丁聊切蘇林云形如鋗鈐以銅作之無縁受一斗故云刁斗禀食上力稔切給也下讀曰飤乞匄上音氣下工大切亦乞也崢嶸上仕耕切下音宏深嶮之皃靡碎音縻散也如縻爛之義罷敝罷讀曰疲勞也陽朔元年穰侯人羊切秦魏冉受封之邑屬南陽共王共讀曰㳟瘳丑鳩切疾瘉也猥烏賄切猥猶曲也逺于萬切離也閨古㰎切爾雅曰闈小者謂之閨愍美隕切痛也内之内讀曰納任身汝鴆切與妊同盪膓徒浪切洗滌也辟讀曰闢風讀曰諷三年操千髙切執也貂蟬貂都聊切惠文冠也以貂尾爲飾附蟬爲文蝉取其清髙飲露而不食貂紫蔚采潤而毛不彰也排擯必刃切斥也仆栁芳遇切僵也頓也梓柱上祖似切楸也木名下直注切楹謂之柱臿地臿測洽切刺地也援近音爰引也漢紀二十三通鑑卷三十一起屠維大淵獻盡彊圉恊洽即己亥至丁未凡九年孝成皇帝上之下陽朔三年謹敇上居隠切下耻力切謂謹愼而整備也倨音據倨慢四年敞昌兩切拊離拊音撫烏孫小昆彌種名康居音渠西域國名翕然許及切聚也盛也鴻嘉元年戲郷許冝切戲水之郷在京兆新豊東成帝改爲昌陵縣長楊仲良切楊木名因以名宫秦昭王所起在扶風盩厔五柞材各切或作莋以宫中有五柞木因以名之在扶風盩厔復株累力追切匈奴單于號捜諧若鞮搜踈鳩切諧雄皆切鞮丁奚切匈奴單于號名且麋胥昫留斯侯昫許于切搜諧之子二年飛雉丈几切鳥名爾雅曰雉絶有力奮睢睢呼惟切盱視貌宿留上先就切下力就切謂有所湏待也鼂閎鼂古朝字姓也閎音宏讇古謟字而足子喻切益也灋古法字誰屬之欲切委也解萬年解胡買切姓也自唐叔虞食邑於解三年引内讀曰納澧敷馮切水名在京兆長安大陂彼爲切澤障曰陂楫棹上音接下直教切漢書作輯櫂音同楫謂棹之短者皆所以行船也漸臺子廉切浸也解見武帝太𥘉元年黥渠京切墨刑在面也劓魚器切去鼻也或作㓷藉槀上慈夜切下工老切自薦槀稈所以請罪也負斧質職日切椹也伏斧於椹上嘖嘖測革切鳴也淖方成淖竹角切姓也祝詛上職救切或作洲下莊助切或作謯共養上居用切下弋向切四年湓溢上蒲悶切又普頓切湧滿也灌古玩切澆也杜鄴逆怯切說音稅誘也陜式冉切洪農邑感胡闇切與憾同永始元年凌室里孕切藏氷之室虖古乎字窈窕上於兆切下徒了切幽閑也腐扶雨切腐爛縛伏約切束也卓詭古委切髙逺異衆也諌爭側迸切木作諍共工共讀與龔同少府之屬官亦有詔獄鬼薪音辛刑也取薪於山以給宗廟爲鬼薪佚與逸同樂也更推工衡切互也激工歷切急動也恧女六切愧恧髹􅃮髹許求切又許昭切􅃮多黒少之色今関東俗器物一再著􅃮者謂之梢漆捎即髹聲之轉重耳顔師古說切七計切門限也沓它合切冒也壁帶必歴切壁之横木露出如帶黃金釭音工流俗讀之音江非也釭若車釭之形孽嬖上魚列切庶也下必計切愛也錮者固謂鑄塞也防扶方切春秋魯邑名可隱於靳切隱見也弟弟上徒計切弟弟者言弟能順理也機械胡介切言作機發木人之屬燔扶元切燒也臧椁自浪切冡臧棺椁増埤音婢下也迫卒音猝惽焉音昏一曰古閔字憂病也不說音恱同賈讀曰價虚耗火到切損也怛然當割切非慘也鄼音賛河南邑南􅒋良全切鉅鹿邑俚音里二年繹繹夷益切光采皃翟方進翟徒歷切姓也芻蕘上䆫俞切下音饒芻蕘謂取芻薪之賤者沈湎上持林切下彌逺切嗜酒也從横上子用切下胡孟㓜放從恣横也阱材性切抗阱榜箠上晡横切下止蘂切榜擊箠楚也㿊千感切痛也炮格上白包切下音革紂所作刑也膏塗銅柱加之火上令罪人行其上墯炭中笑以爲樂復怨扶福切復猶報也反除反讀曰幡罪之明白者反而除之僄輕頻妙切又匹妙切疾也挺身大鼎切引也媟嫚上私列切下謨晏切謂狎侮也溷殽上胡困切下胡茅切雜也和也靡敝武皮切散也畜讀曰蓄儲陳如切儲偫擿它歷切謂發動之噱其略切笑聲踞音據踑踞妲已當割切有蘇氏女紂之正妃謼火故切號謼亦作呼讜言音黨善言也懌音亦恱也其比必寐切類也以風讀曰諷趨辦趨速也讀曰促懾服之渉切懼也三年神祗巨支切地祗也古作示洋洋音羊又音祥美盛之皃盪盪音蕩空曠之皃景映永切又如字或作影鬻余六切賣也和從胡卧切應也蹈藉上大到切行皃下慈夜切踐履也字或從􅟦爭衡何庚切猶抗衡也九九九九筭術若今九章五曹之軰顔師古說繆公莫六切秦穆公憤懣音滿又音悶煩也雋桀上子峻切智過千人曰雋下渠列切特立曰桀字夲作傑無幾居豈切言不多也砥石音指尚書傳云砥細於礪皆磨石也誹府尾切謗也鳶音縁鴟也惡惡上烏故切下烏各切憎不善也比數上卑履切下所矩切比校而計數也漢紀二十四通鑑卷三十二起著雍涒灘盡昭陽赤奮若即戊申至癸丑凡六年孝成皇帝中永始四年外屏必郢切屏蔽也汙衊音秣又莫結切謂塗染也妖麗上於喬切下郎計切妖艶美麗也躡尼輙切蹈也刷所劣切拭刷除之元延元年燿燿弋笑切照也晡博孤切日加申時著郵郵與尤同明著其過尤也饑饉上居希切榖不熟爲饑下渠吝切𬞞不熟爲饉中季中讀曰仲標季必遥切末季也阸乙革切災也危也雜焉並如字雜謂相參也一音先合切緫萃貌悍侯旴切猛悍悖蒲没切亂也卒起音猝幽間讀曰閑分界扶問切别也所易弋豉切輕忽媟黷上私列切媟狎也下徒谷切黷汙也婉於阮切美也繆靡㓜切誤也敖讀曰傲傲戲也稠陳留切多也奸音干犯也墾口狠切耕也驃騎驃頻妙切勁疾貌或作票素餐千安切素空也素餐者謂德不稱官空當食禄訕所諌切又音删謗也呼火故切叫也龍逄皮江切関龍逄夏桀臣也以諌而死輯之輯與集同謂𥙷合之也旌子盈切表也車牙若鞮丁奚切匈奴單于號名且莫車二年并卑政切兼也下同畨丘歩安切小昆彌末振將之子墊婁上都念切下音樓烏孫地也飲食上於禁切下讀曰飤卑爰疐竹二切末振將之弟質子職利切候司相吏切察也飲㗖上於禁切下徒濫切㗖謂以食餧人所省所景切視也賈市賈音古賣也羈縻上居冝切下羙爲切羈馬絡頭也縻牛紖也言牽制之故以取喻三年𡵨山翹移切周文王所封邑在扶風美陽參踈簮切星名褒斜余遮切漢中谷口名南口曰褒北口曰斜其水皆發扶風武功衙領山置咨邪切兔罔也罘芳無切本又作罦罬謂之罦覆車罔也郭璞云今飜車也周阹丘於切圈也搏之伯各切索持也四年傅相並去聲韈武伐切足衣綏和元年汜郷音凡在琅邪不其箭竿工旱切箭莖也鷲羽疾就切漢書作就就大鵰也黄頭赤目五色皆備其羽可爲箭温偶駼駼音塗匈奴王號下同皆仰牛向切廣雅云恃也孊音靡龍額鄂格切通作額平原邑函谷上音咸関名在洪農新安辟雍上必益切下於容切學名王制天子曰辟雍鄭注辟明也雍和也所以和明天下漸漬上子廉切流入也下前智也浸潤也貪饕吐髙切貪甚曰饕險詖彼義切行險曰詖漢紀二十五通鑑卷三十三起閼逢攝提格盡旃蒙單閼即甲寅至乙卯凡二年孝成皇帝下綏和二年闔胡臘切閉也賁麗賁音肥姓也麗其名供張上居用切下竹亮切供具張設也慆他刁切慢也郷晨郷讀曰嚮傅絝韈傳讀曰附著也絝苦故切古袴字脛衣也韈武伐切通作襪足衣也讙譁上許元切又音歡下胡瓜切驚呼貌湛乎湛讀曰耽樂也於邑並如字於或音烏邑又烏合切短氣皃他類此襁褓上舉兩切下博抱切負兒衣與政與讀曰預複道芳目切重也輯略輯與集同猶言緫要也蠭出蠭與鋒同折中竹仲切更索山客切求也商鞅倚兩切姓公孫名鞅衛之諸庶孽公子也事秦孝公封於商阡陌上倉先切下莫白切路南北曰阡東西曰陌錐朱惟切說文銳也女紅紅亦工也漢書以紅爲工任子汝鴆切任者保也徹直列切去也聘取讀曰娶下博取同晻昧晻與暗同又烏感切不明也間者居莧切珥蜺上忍止切下研奚切說文屈虹青或白色隂氣也或作霓落脉莫獲切落謂經絡脉謂理之分漂紕招切浮也沸方未切涫也窴音塡塞也之分扶問切度水大各切計也陂障上彼爲切下之亮切書傳云澤障曰陂汙澤一胡切水停曰汙遽止其庶切速也使道讀曰導通引也雍讀曰壅壅堨也瀕山頻音頻又音賔瀕山猶言以山爲邊界也塡淤依據切滓泥陿侯夾切隘狹激水工歷切礙袤疾波也辟讀曰闢開也析先的切分也墮火規切毀也漑居代切灌注也淇口渠之切淇水出河内共縣北山東入河倍薄倍與培同益也卒暴卒讀曰猝溷胡頓切溷濁也肺附上方廢切下符遇切肺附如肝肺之相附著也趣讀曰促妒都故切嫉也通作妬塊然口内切獨處之意如土塊也援人音爰引也梟俊上古堯切梟謂斬其首而掛之俊謂敵之魁率也春秋左傳得俊曰克筯舉欣切肉之力也孝哀皇帝上建平元年胞音苞胎之衣也泄先列切漏泄頟與額同紿音殆誑也懟直類切怨怒也擣都皓切築也負女讀曰汝盛是征切受也葦篋上于非切下苦恊切以葦草爲箧也簾音廉户簾也篋緘居咸切緘束篋之繩墯徒果切落也訢與欣同廢適讀曰嫡耆欲耆讀曰嗜金櫃求位切箧也漢書作匱字通用耳金匱言長乆之法可藏於金匱石室也書云周公乃納冊於金縢之匱中即其義演弋善切廣也斗筲所交切竹器也斗筲喻小而不大也泠褒泠姓也顔師古音廖稱皇尺孕切副稱也斬衰七回切字又作縗䘮衣也斬者不緝也浸子鴆切漸也炔欽炔姓也蘇林音桂不厭一瞻切服也懷諼虚爰切詐也黄耉古厚切黄耉老人之稱黄謂白髮落更生黄者耉謂面色不淨如垢朝請才性切眚病所領切災眚之眚謂妖病也解音懈簿責步户切以文簿一一責問也怯去劫切畏也擿抉上它歷切下音决謂挑發之也漢紀二十六通鑑卷三十四起柔兆執徐盡著雍敦䍧即丙辰至戊午凡三年孝哀皇帝中建平二年燕見伊甸切息也本作宴守相息亮切守謂郡守相謂諸侯相也中竹仲切當也未更工衡切更歷放命放甫往切書堯典作方命馬融云方放也陸德明云方或音放應劭曰放棄教令圯族皮美切應劭曰毀其族類忤音寤逆也鼔妖於喬切妖怪也彊毅上巨良切下魚旣切強健而果敢也嫗威遇切說文母也衰麤上倉回切與縗同下倉胡切謂服制也暴古暴字下同冤於袁切恚也渤海蒲没切郡名在勃海之濵因以名之譴去戰切謫問也滌盪上亭歷切滌除也下徒莽切盪洗也蠲圭淵切除也卑爰疐竹二切烏孫種名敺音區趨逯音録卑爰㚄之子也三年苛急苛音何細也然與讀曰歟黠下八切桀黠慢易弋䜴切侮慢而輕易也縱横上子用切下胡孟切後横發音同盩厔上張流切下竹乙切右扶風邑汾隂扶云切河東邑瓠山胡悮切晉灼曰漢注作報山顔師古曰報山山名古作瓠字爲其形似瓠耳倍草歩賄切黄倍草也右師譚右師姓也譚其名四年槀工老切禾稈掫音鄒又側九切麻幹也徒跣先典切露足也顓古專字參乘石證切參或作驂解見髙皇帝元年偏藉慈夜切藉謂身卧其上也未覺工効切覺謂寐之寤也珠𥜗汝朱切以珠爲𥜗如鎧狀連縫之以黄金爲縷剛柏博陌切木名堅剛之栢也徼道吉吊切循也小道也罘罳上音浮下音絲解見孝文帝七年頸癰上居郢切頭莖也下於容切疽瘡也讇古謟字搒掠上晡横切下力灼切擊也未解佳買切釋也駑材農都切凡馬之材迕五故切逆也惲於粉切歷詆丁禮切毀訾也仄目古側字傾目而視母將隆母將姓也隆其名繕時戰切補也皆度徒故切蘇林曰用度皆岀大司農共養上居用切下弋向切本藏才浪切庫藏共讀曰供便僻上毗連切僻也下普擊切邪也契國詰結切或作栔缺也謂缺國家威器而反備其家賈讀曰價售直也下同以塡竹刃切濁亂直角切溷亂也彗星徐醉切妖星更工衡切更謂爲更卒也並公歩浪切依也繇役繇讀曰徭毆殺一口切擊也稱賔客衡尺孕切務稱賔客所求也尸鳩居尤切秸鞠鳥也曹國風之篇取其養子均平如一善人君子布德施惠亦當然也藿肉忽郭切豆葉也劉德曰視酒如漿視肉如藿上游游即流也言居水之上流厭一涉切府帑它莾切又音奴府物所聚也帑藏金帛之所也竒譎古穴切詐也石畫音獲石言堅固如石也畫䇿計也雍於用切右扶風邑操千髙切執持也絶大幕幕即沙漠也直度曰絶沙土曰幕窴顔徒賢切匈奴中山名犇古奔字封禪時戰切積土爲封除地爲禪翰海如字北海名在沙漠北喙許穢切口也鮮有先踐切少也扶伏上蓬逋切手行也下蒲北切伏地也不彊其兩切彊勉忿鷙竹二切很也隷郎計切附屬之也詘曲勿切屈服大宛於元切西域胡國蕩姐音紫羌種名艾讀曰刈川絶也犂力之切耕也雲徹直列切如雲徹去也轂擊轂古禄切轂擊言使車交馳其轂相擊也康居音渠西域國名白龍堆都回切龍堆形如土龍身無頭有尾髙大者二三丈埤者丈餘皆東北向相似也在西域中孟康說掎禄居綺切從後引之也謂引躡其言也傳著傳讀曰附著直略切蹇叔紀輦切秦穆公大夫漢紀二十七通鑑卷三十五起屠維恊洽盡元黓閹茂即己未至壬戌凡四年孝哀皇帝下元壽元年灋古法字圏求晚切又具願切養畜閑也耽都含切樂也綈繒綈徒奚切厚繒也郷北郷讀曰嚮下獨郷同共賜共讀曰供百賈音古賈謂販賣之人言百賈者非一之稱也墮壊火規切毀也韓嫣音偃杜鄴逆怯切言與羊諸切語辭也通作歟間也居莧切或將即亮切帥也晻然烏感切藹暗也積猥烏賄切并雜也忿邑上敷粉切忿怒也下於業切於邑也以厭一瞻切滿也沮材汝切止壞也歙然音翕盛也白虹胡公切螮蝀也葭莩上工遐切下音孚葭莩喻輕薄而附著也諺魚變切傳言也横求胡孟切恣横鞠譚居六切姓名后稷生不窟不窟生鞠有文在其手曰鞠攴孫氏焉風俗通云鞠譚或爲麹氏音訛轉謬宿伯鳯宗伯姓也其先因官爲姓括髮關械括古活切結也械下介切梏也言結其髪以貫械也祼躬郎果切露體也掾史俞絹切官屬咀藥材汝切嚼也裝側霜切束也詰問去吉切誚責也歐血一口切吐也俊艾艾讀曰乂髠鉗上枯昆切去髪也下其廉切以鐡束頸從容從千容切餗送鹿切虞翻云八珍之具也馬融云䭈也䭈之然切鄭氏云菜也襃神蚖魚袁切又吾官切按史記周紀昔夏后氏之衰有二神龍止於夏帝庭而言曰余襃之二君也二年伊秩靡音縻烏孫大昆彌名譯長夷益切傳夷語之人大月氏音支本居敦煌祁連間爲匈奴所破乃逺去擊大夏而臣之都嬀水北其餘小衆不能去者保南山號小月支烏弋逸職切烏弋山離也西域胡國東與罽賔相接厭勝一渉切調度上徒弔切調賦也下徒故切用度也未更工衡切歷也診視音軫驗也㡬危巨依切近也相錯倉各切間雜也修飭飭讀與敕同敕整也鴻臚凌如切解見孝武帝征和二年錮音固慤口角切謹也㡬音兾沛博蓋切郡名本秦泗水郡詡况羽切甄邯側鄰切姓也傅致傳讀曰附附益而引致之令入罪也風光風讀曰諷下同擠之子詣切又子奚切墜也忤恨五故切逆也棻扶云切字或作㯣涿竹角切郡名老眊與耄同惛忘也竢窴竢古俟字窴通作溝壑上古侯切水注谷曰溝下呼各切坑也虚也緫音揔聚束曰緫孝平皇帝上元始元年俸扶用切秩禄也耳孫耳音仍昆孫之子爲耳孫媚說讀曰恱親省息井切察也稱否尺孕切是否撓亂呼髙切擾也其字從手召公召讀曰邵雇山古慕切漢書字作顧漢法女子犯罪作如徒六月顧山遣歸說以爲當於山伐木聽使入錢顧功直故謂之顧山二年黄支國南方逺國在日南之南去中國三萬里誖眊布内切惑也言老耄心志惑亂也衎口旱切盱台上許于切下音怡臨淮邑蝗胡光切螽也損膳時戰切其食也損謂减損蓂莢上忙經切下古洽切堯時瑞草生於庭隨月凋榮邴兵永切愍眉殞切憐也姑句音鉤車師後王名股紫陬子侯切姑句之妻也唐兠當侯切西域國也號爲去胡來土謂去胡而來降漢左谷蠡谷音禄蠡音離匈奴左王號也地謂其所居之處函封胡䜛切束篋也媵音孕又繩證切美女也配取讀曰娶下同適子女適讀曰嫡分部扶問切漢紀二十八通鑑卷三十六起昭陽大淵獻盡著雍執徐即癸亥至戊辰凡六年孝平皇帝下元始三年窈窕上烏了切下徒了切幽閑也王肅云善心曰窈善容曰窕皮弁皮變切冠名以鹿皮爲之素積子昔切積素以爲裳也王相並去聲器械胡介切有盛爲械無盛爲器敞昌兩切竦息拱切灑沙下切汛也妻焉焉王字妻名即王莽子婦也甄邯甄側鄰切姓也邯其名磔陟革切裂也固爭側迸切與諍同乘傳張戀切乘傳者謂奉承符傳而行若使者之持節傳巳解見上逄萌皮江切姓也解冠佳買切脫冠也挂古賣切垂也通作掛秺丁故切濟隂邑日磾丁奚切叱昌栗切呵也行胡孟切行跡僵仆上音薑偃也下音赴顚也陽翟直格切頴川邑輕俠胡頰切俠之言挾也以權力挾持人也四年紱分物切綬也韍音弗印之組也誑古况切欺也虞樂虞與娱同怍在各切慚怍虞芮如銳切二國名圗䜟楚譛切符命之書䜟驗也猥烏賄切多也自索先各切盡也所漸如字又音子廉切􅎊也周譜音補丗統譜諜也鮮水音仙山海經云北鮮之山鮮水出焉北經徐吾允谷允音鈆西羌地名繭吉典切蠶衣也五年糾居􅉳切督也禄韍音弗此韍謂蔽膝也或謂韍韠韠音畢瑒琫上音蕩下布孔切瑒玉名也佩刀之飾上曰琫瑒珌音必佩刀之飾下曰珌詩韠琫有珌是也句履句巨俱切履舄頭飾也岀履三寸其形岥頭鸞路鸞路天子之車也路與輅同路車之施鸞者乘馬食證切四馬曰乘下同九旒力求切旌旗之旓諸侯九旒至軫字或作㳺彤弓徒宗切赤色盧斄讀與邰同音台右扶風邑承陽承音烝長沙國邑在承水之陽菑側其切梁國邑也本古戴國𥘉始元年五毒徒沃切害人之草如野葛狼毒之屬濮陽博木切東郡之邑其地濮水所出南入鉅野䲔鯢上其京切古鯨字下五奚切大魚爲害也緦縗上新兹切下千回切環絰徒結切首戴也以苴麻爲之謂之環者言其輕細如環之形中孫中讀曰仲直定徒徑切謂建除之次其曰直定犧牲上許冝切下師庚切徽幟式志切徽幟通謂旌旗之屬誖德布内切乖也卷卷其圎切忠謹之意漢紀二十九通鑑卷三十七起屠維大荒落盡閼逢閹茂即己巳至甲戌凡六年王莽中始建國元年荒忽上呼廣切下呼骨切失意貌或作慌愡新嘉辟音壁辟君也王莽置此名取爲國君之義歔欷上休居切下許旣切歎息也共工共音㳟王莽改少府曰共工齊縗上音咨本作齋下倉回切通作衰喪衣也裳下綆緝者爲齊爲任音壬充也帝嚳苦沃切髙辛氏嬀居危切水名虞舜居嬀妠因以爲氏丗丗復方目切除其賦役也所與音預卯金刀王莽以劉字上有卯下有金旁有刀故禁剛卯及金刀也劉快苦夬切膠東㳟王子也按侯王子表快字從火與此不同疑表誤更賦工衡切改也罷癃上音疲勞也下音隆病也劫假上訖業切下舉夏切劫謂冨人劫奪其稅侵欺之假謂貧人賃冨人之田也菽式竹切豆也糟糠上臧曹切糟粕下丘岡切糠粃不錯千故切置也魑魅上音螭山神也下音媚老物精也齎則兮切持也徼外吉弔切塞也鷩鳥音鼈雉屬即鵔鸃也俗呼山雞非也幢宅江切旛幢元莵同都切郡名古眞番國樂浪上音洛下音狼郡名古朝鮮國也髙句驪驪或作麗音鄰知切在遼東之東南與朝鮮濊貊北與夫餘接孝武帝元封四年滅朝鮮眞畨置元莬郡開髙句驪因屬焉王莽時以其犯法爲冦更其名爲下句驪夫餘音扶東北夷也在長城之北去元菟千里隃與踰同句町上鉅于切下大鼎切西夷別國屬䍧柯郡靁古雷字繞霤上爾紹切下力救切繞霤者言四面寒阸其也屈曲谿谷之水回繞而霤也洪農郡上雒縣界有七盤十二繞是其處肴黽上何交切或作崤下莫善切或作澠肴肴山也黽黽池也即洪農郡澠池縣肴山在其西汧隴汧苦堅切扶風汧縣有呉山汧水之阻隴謂隴阺也汧隴相連二年訕笑所諌切又音删謗也白梃徒鼎切大杖也孟子曰可使制梃以撻秦楚是也斃之毗祭切死也遼陽連條切遼東邑在遼水之陽太行胡剛切山名在河内山陽西北濟子詣切水名在常山房子賛皇山東至癭陶入泜漸于子廉切入也浸也薄白各切迫也淮瀕土乎乖切下音賔又音頻淮水之涯也淮水岀南陽平氐桐栢大復山波漢波彼皮切又彼義切謂隨漢水而往也九嶷音疑山名在零陵營道郭璞山海經注其山九谿相似故曰九疑比境皮義切謂相接次也夸州音跨矯枉上舉夭切本作橋下嫗往切曲也正曲曰矯狂狡上渠王切猖狂下古巧切狡獪睽孤傾携切乖別之意横逆胡孟切恣也殫微音單盡也不售承呪切漢書作不讎字皆通用賖貸上詩遮切貰買也下吐戴切以物與人曰貸下同筦古管字漢書作斡音同邯鄲音寒丹趙國邑有邯鄲山在東城下賈讀曰價殖丞職切種也穴作人勇切散也衣食上於旣切下讀曰飤連錫連或作鏈銅屬也音陵廷切嬪郫民切婦也織之翼切作布帛之緫名紝人禁切機縷曰紝紡績上撫兩切網絲也下則歷切緝麻也賈人音古坐賣曰賈自占之漸切鎧可亥切甲之別名酋豪自秋切長也敺與駈同重遺上柱用切下戈季切厚贈之也舉掖羊益切持臂也幾令巨依切近也椎破傳追切擊也通作槌猶與上餘救切下音豫果悍胡幹切果决也悍勇也亟還居力切急也釁許愼切隙罅也本作舋且渠且子余切匈奴官號蒲呼盧訾子移切匈奴官號刁護刀音貂姓也趣讀曰促下同降奴服于降胡江切王莽欲立威匈奴因更匈奴單于曰降奴服于訢音欣厭難上一渉切下乃旦切王莽以爲將軍號取厭伏禍難之意棽所林切誅貉莫客切貉在東北方王莽欲誅之因以爲將軍號討濊烏廢切與髙句麗同種王莽欲討之因以爲將軍號偏禆頻移切副助也馳傳張戀切謂奉傳而疾行解巳見上僦子就切送也一曰賃也憒胡對切又古對切亂也訛言五禾切謬言也亦作譌將率並去聲率與帥同更始工衡切改也王莽將軍號華山胡化切太華山在京兆華隂之南棻符分切漬種漬前智切浸漬其種也三年藺苞良刃切姓也虚耗呼到切涇陽古靈切安定邑井頭山在西涇水所出蟁蝱上古蚊字下音盲齧人飛蟲也創艾上𥘉向切下讀曰乂延袤音茂長也南北曰袤援音爰引也内調徒釣切計發之也及屬之欲切聮也糒音備糗飯也鹵籠五切鹹地揆求癸切度也釡鍑上扶雨切本作鬴下音冨釡之大口者疫音役民皆疾也病悸葵季切心動曰悸牖與乆切穿壁以木爲交䆫拕紳上土賀切引也卧著朝衣故云加引大帶於體也要說上一遥切下式銳切棺歛上工喚切下力贍切紀逡千旬切郇越郇音荀又音胡頑切荀郇二姓皆周武王之後顔師古說飭行飭謹也讀與敕同衣敝於旣切著敝衣也裞式芮切其字從衣贈䘮衣服曰祱隃糜隃音踰扶風邑蔣詡上即兩切姓也風俗通云出周公之裔下况羽切四年傭餘封切賃也謷謷音敖衆口愁聲和者和胡卧切應也墮壊火規切毀也篹食篹音撰具食也與何與去聲讀如無所于預之預五年烏累若鞮累力追切鞮丁奚切匈奴單于號天鳯元年須闕口决切盡也六隊音遂王莽所置以南陽爲前隊河内爲後隊頴川爲左隊洪農爲右隊河東爲兆隊滎陽爲祈隊歙音翕王昭君兄之子也事王莽爲中部都尉颯音立歙之弟也事王莽爲展德侯械檻上胡介切桎梏也下戸黤切檻車也漢紀三十通鑑卷三十八起旃蒙大淵獻盡元黓敦䍧即乙亥至壬午凡八年王莽下天鳯二年墮徒果切落也恭奴並如字王莽改匈奴爲恭奴善于並如字王莽改單于爲善于遞特計切更易也帑藏上他莽切金幣所藏也下才浪切物所蓄也憒眊上二内切下莫報切不明也不渫息列切散也澈也糴亭歷切市糓仰牛向切恃也三年雨雪雨于具切自上而下曰雨辟翕辟音闢開也翕收歛也本作脅義同十緵子公切孟康曰緵八十縷也賕巨鴆切財賄共給共讀曰供塡讀與鎭同調度上徒釣切調賦也下徒故切用度也僰道蒲北切古僰侯國屬犍爲郡敺音區自詭過委切責也自以爲憂責訾讀與貲同財也貨也連率所類切與帥同禮記王制十國以爲連連有率刳口胡切剖也剥北角切刻割也度徒各切度量也筳音庭竹捉也莎車素和切西域國名龜兹音丘慈西域國名姑墨並如字西域胡種治南城北與烏孫接劋胡子按西域傳作剼胡子鄧展曰剼音衫顔師古曰剼絶也音子小切字本作劋轉冩誤耳四年菁茅菁音精顔師古曰儒者以爲菁菜名也茅三脊茅也莽此言以爲一物則是謂菁茅爲善茅也厭勝一葉切厭伏而勝之也六筦筦與管同漢書字作斡亦通用筦謂主領也王莽設六筦之令命縣官酤酒賣鹽鐵器鑄錢諸采取名山大澤衆物者稅之乘傳張戀切車傳空簿步户切計空籍也旁縁歩浪切依也鳬茈才支切爾雅云芍鳬茈也郭璞注云生下田苗似龍須而細根如指頭黒色可食黠下八切桀黠五年貪饕吐髙切貪財爲饕綜子宋切錯綜舛馳昌兖切相背也詆訾上丁禮切下音紫毀也怪迂音于逺也以撓火髙切攪也其字從手譚徒含切侯芭音葩老聃都甘切姓李名耳字伯陽謚曰聃逄安皮江切姓也安其名刁子都刁都聊切姓也子都其名鈔楚教切略取也醯櫝上呼雞切下音讀匈奴王號六年誑燿上居况切下弋笑切謂欺惑也棟𧖟多貢切西夷渠師名若豆如字西夷種名曅雲輙切豬突陁没切豬性觸突人故取以爲喻豨勇許豈切東方名豕曰豨一曰豨豕走也縑古甜切絹也舟楫音接以刺舟也其字從才翮胡隔切羽本謂之翮著陟略切置也紐女乆切結也厩居又切馬舎不間間諜也居莧切馳騖亡遇切馳奔也横馳曰騖昭如海瀕昭如海名也瀕涯也音頻又音賔軺車餘招切小車箸遲倨切匙箸也通作筯以風讀曰諷地皇元年趨讙許元切又音懽謂趨走而讙譁也餔奔謨切申時食也新遷王服䖍曰遷音仙莾改汝南新蔡曰新遷顔師古曰遷猶僊耳不勞假借音瘳丑鳩切疾瘉鮮耗上先踐切少也下火到切虚也征營並如字漢書征本作正征營謂惶恐不安之意厮赤息移切厮役賤者皆衣赤王莾以賤漢行也駱驛上音洛下音懌言不絶也馬適求馬適姓也求其名沮材汝切止壞也褏古袖字牝馬牝畜母也音婢忍切柴車鉏佳切棧車籍槀音杲蒲蒻也赭幡音者以赭汗漬巾幡也郅惲上之日切姓也下於粉切其名二年愔㝷切中孫中讀曰仲埋謨皆切瘞也提擊徒計切擲也與議與讀曰預誹敷尾切謗也厭衆一艶切滿也日闋空穴切隨日而盡也責數所具切責而數之也延曼上弋戰切下音萬謂滋蔓也趣讀曰促詰契吉切問也共酒共讀曰供三年輓武逺切引之也亦作挽輀車音而載䘮車償辰羊切還也酪歷各切乳漿也朱鮪羽軌切紲思列切擊也韓盧落胡切韓盧古韓國之大名黒色曰盧稟食上力稔切下讀曰飤廖湛力救切姓也又力弔切周文王子伯廖之後一云岀古賢者廖伯安之後潰亂胡對切散亂也砥厲上諸氏切下力制切平也皆礪石索盧恢索先各切索盧姓也恢其名罷勞罷讀曰疲縯音衍剛毅魚旣切果敢也慷慨上苦莽切下口漑切慷慨竭誠也憤憤房吻切懣也軼弋質切前隊音遂王莽置六隊解見上舂陵書容切舂陵鄉名本屬零陵泠道縣孝元帝時徙南陽蔡陽白水鄉爲舂陵恚於避切怒恨也蔞谿力于切孛歩内切又蒲没切妖星也潢淳潢胡光切酈元注水經曰赭水二湖流注合爲黄水又南經棘陽縣之黄淳聚又謂之黄淳水沘音比水名岀廬江灊縣合從子容切言如六國之合從屈彊上其勿切下其兩切梗戾也資治通鑑释文卷第四
