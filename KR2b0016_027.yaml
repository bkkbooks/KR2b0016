body:
  text: 右宣義郎監成都府糧料院史炤唐紀七十一通鑑卷二百五十五起元黓攝提格五月盡閼逢執徐五月即壬寅至甲辰凡二年有竒僖宗惠聖㳟定孝皇帝中之下中和二年獠盧皓切又竹狡切亦作䝤戎夷別名堡愽抱切堢璋也詬呼漏切罵也僨軍分問切僵仆也裨將頻彌切將之徧副也刮席古刹切羞怍俛首至席也軹道音只本作枳亭名也按漢髙帝紀云秦王子嬰降枳道旁顔師古曰軹道亭在霸城觀西四里綰利烏板切繫也牢盆郎刀切漢書食貨志云因官器作鬻鹽官與牢盆蘇林注曰牢價直也今丗人言顧手牢如淳曰牢廪食也古者名廪爲牢盆凝睇大計切目小視也南楚謂盻曰睇淝水符非切在廬州合淝縣水出九江山入淮毀櫝徒谷切匱也論語曰虎兕出於柙龜玉毁於櫝中是誰之過歟馬融曰押檻也䄣匱也失虎毀玉豈非典守之過邪玫謨杯切燧徐醉切擎渠京切瑄湏縁切仔倡仔音茲又祖似切歙失渉切州名鏐力求切邢洺上奚經切下彌并切並州名逹靼當割切達靼者靺鞨之遺種居隂山之地瞳徒紅切勛許云切嵐盧含切州名嬰城於盈切繞城以自守也淄青莊持切並州名邏者郎佐切廵也諜徒恊切軍中反間者詗火迥切又翾正切知處告言也拯舊說無切語音蒸之上聲救也湔洗將先切如以水洗之也塹栅上七豔切坑塹也下測革切砦栅編立木爲之箐倉甸切呼譟先到切羣呼也狼狽博蓋切狼屬生子欠一足或二足相附而行離則蹎故猝遽謂之狼狽械胡介切桎梏也幟昌志切又式志切旗也炊爨上昌垂切下取亂切梟堅堯切掛首木上釘丁定切冎之古瓦切剔人肉置其骨也蝕箔金蝕寔職切箔白各切逗遛上音豆下力救切稽遲不進也潯徐林切潞音路州名磁音慈州名潏余律切三年北司唐自元和末年閽寺權盛握兵宫闈横制天下當時因分爲南北司䆠官居北司宰相居南司晡奔謨切日加申時璠孚袁切澶市連切州名淯井余六切即漢揵爲郡之漢陽縣地唐置長寧州行愍眉殞切修娖測角切修娖謂整齊而謹肅也挑戰徒弔切擿嬈敵以求戰如古之致師間道居莧切微隙之路也詰去吉切問也紐女九切系也机上舉履切椹杌之上也醢許亥切肉醬也愀然七小切容色變也眇弭沼切一目小也璆巨鳩切犫赤周切昶丑兩切珝况羽切碓磑上都内切眷也下五對切䃺也濮音卜州名榆次容朱切縣名屬太原府慷慨上苦莽切下口漑切竭誠也扈從才用切扈衛侍從也俘馘古獲切軍戰斷耳也春秋傳以爲俘馘曖昧於代切晻曖不明也岌逆及切四年涪城音浮縣名屬梓州婺亡遇切州名當㜈女星分地故以爲名碣其謁切又巨列切閩眉巾切南越之地澞元俱切蠱惑公户切蠱亂而熒惑也頵紆倫切甄城吉椽切亦作鄄縣名屬濮州胙城有故切縣名屬滑州縋城馳僞切繩有所縋也回鶻胡骨切即回紇也謂其鷙猛如鶻鳥壕中胡刀切城下城曰壕唐紀七十二通鑑卷二百五十六起閼逢執徐六月盡強圉恊洽三月即甲子至丁未凡二年有竒僖宗惠聖㳟定孝皇帝下之上中和四年見兵胡甸切見所有之兵努力奴古切方言勉也瑾渠吝切宗祧吐彫切逺祖廟也知慤苦角切嵯峨上昨何切下五何切嵯峨山在京兆雲陽德諲音因鎰夷質切蕘如招切虢古獲切州名晊之日切孑遺居列切孑然遺脫也光啓元年申屠琮申屠複姓琮其名宗切瓌公回切曝薄報切說文晞也解胡買切縣名屬河中府覘敕廉切又丑豔切視也澠池莫踐切縣名屬河南府擯必仞切棄也離間居莧切送也趣其趣讀曰促﨑嶇上丘竒切下虧于切艱險皃捐余專切棄也羈旅居冝切羈寄也旅客也廖彦若廖力救切姓也周文王子伯廖之後訛言五禾切妄言也亦作僞鄜芳無切州名二年戣渠龜切鄠侯古切縣名屬京兆府盩厔上張流切下陟溧切山曲曰盩水曲曰厔縣名屬鳯翔府澈直列切晟時正切鉦諸盈切鐃也糅忍九切鋒鏑音嫡鋒戈㦸刃也鏑箭鏃也煴於云切又於問切郵驛音尤道上舎也馮翊與只切縣名屬同州鋋夷然切棧道仕諫切棚也架木爲之弭耳緜婢切閽寺上呼昆切下時吏切閹官者肘腋上陟柳切臂節也下羊益切胳也在肘後根蔕丁計切根木株也蔕木之根也訾即移切姓也恟懼許容切又許拱切擾恐也亦作春秋傳曹人懼邯鄲上河干切下多寒切縣名屬惠州璩求於切曹娥埭徒耐切堰也艦户黤切戰船四方施板狀如牢忿敷粉切又敷問切怒也節鉞王伐切節以專殺鉞以專斷侑尤救切剛鷙脂利切剛很而鷙猛也勍渠京切鄆王問切州名三年𡵨山翹移切縣名屬鳯翔府徒跣蘇典切徒歩行跣足親地也韲粉上牋西切鄭康成曰凡䤈醬所和細切爲下府吻切粉碎也擲直炙切投也戡枯含切勝也葭萌上音家下音盲縣名屬利州綦母𥙿綦渠之切母音無複姓唐紀七十三通鑑卷二百五十七起强圉恊洽四月盡著雍涒灘即丁未至戊申凡一年有竒僖宗惠聖㳟定孝皇帝下之下光啓三年髙郵音尤縣名屬揚州紿徒亥切欺也誑也冎古瓦切剔人肉置其骨上瀝狼狄切滴也詗騎火逈切又翾正切知處告言之騎也踊尹竦切跳躍披泄先列切漏也憤房吻切滿也鍔逆各切稠除留切内其内讀曰納莫邪上末各切下余遮切劎名因以爲軍號猶豫猶如字又于救切玃屬善登木聞人聲即上無人乃下故以不决者爲猶豫曏者許亮切曩也暴横胡孟切恣横也聾鼓上盧東切下果五切耳無聞曰聾目無見曰瞽煨燼上烏恢切煻火曰煨下徐刃切火餘也供張上居用切下竹亮切供貝張設也抉一决切挑也𣏌墟里切刳空胡切剔也截昨結切斷也亦作􅎒瑭徒郎切說音稅誘也盱眙上匈于切下盈之切縣名屬泗州竹筏音伐箄也㳂江余專切縁水而下也鍠胡肓切敺於口切擊也別墅上與切田廬也樵採樵慈消切薪也戰陳直刃切與陣同蔚然紆勿切茂也繭吉典切𧖟衣也君暀于放切又羽兩切貿莫候切易也通犀先齊切犀牛似豕角生鼻上錦衾去金切被也糠苦岡切糓皮也延袤延長行也袤音荗南北曰袤麰莫浮切來麰麥也啗徒濫切食也亦作啖厭勝一渉切廣雅曰鎭也瘞於罽切幽薶也縞素古老切爾雅曰縞皓也繒之精白曰縞櫜鞬上姑勞切下居言切戢弓矢器也堇泥居隱切又音芹草名爾雅謂之齧苦今堇葵也嚬毗賔切笑皃懑音滿又音悶煩也悄然七小切憂皃殯必仞切賑章忍切贍也輜重上莊持切下直用切輜載衣車重載物車行者之所資緫曰輜重蔣元暉將子兩切姓也余繞山余以諸切姓也風俗通云秦由余之後折簡按魏志王凌傳注云折簡猶言片𥿄也宗鐬呼㑹切郅之日切髠苦昆切去髪也鋋待鼎切說文銅鐡樸也鞫之居六切窮理罪人也縊壹計切經也又於賜切桎梏上職日切下姑沃切在足曰桎在手曰梏泝江蘇故切逆流而上也璠孚袁切蘄渠之切州名文德元年文㺹皮變切無厭於鹽切貪惏也剽掠上匹妙切下力灼切劫奪也黎明力知切黎猶比也謂比至天明也頎渠希切㓂鈔𥘉交切又楚教切略取也洹水于元切水在齊魯間黔音琴州名成汭而銳切倉猝蒼没切暴也忽也抶敕力切擊也跋扈上蒲撥切下侯古切猶强梁也或說扈竹離也水居者於水未至時作竹籬以候魚之入水退小魚獨留大魚跳跋籬扈而出故言跋扈師懃渠斤切糝潭桑感切地名銶渠尤切唐紀七十四通鑑卷二百五十八起屠維作噩盡重光大淵獻即已酉至辛亥凡三年昭宗聖穆景文孝皇帝上之上龍紀元年揆巨癸切檻車户黤切載囚車逖他歷切磁洺上墻之切下彌并切二州名以食音飤朐山權俱切縣名屬海州歙音攝州名本漢丹陽歙縣從容七恭切從容猶閑語也棣大計切州名曄域輙切䙆衫睽桂切衣𥚑分也邸丁禮切蒼頡篇曰邸舎也矍然厥縳切遽皃管鑰弋灼切搏鍵器也大順元年琳犂沈切郫蒲麋切縣名屬成都府壕乎刀切城下也塼職縁切古史考曰烏曹作塼擊柝他洛切馬融云兩木相擊以行夜說文作字林也各切元綽尺約切戡音堪赫連鐸赫連本夏國屈丐複姓言其徽赫與天連也後因以爲氏中流矢中竹仲切傷也飛矢曰流矢碭山徒郎切縣名屬宋州公鉥時橘切𤏡道蒲墨切縣名屬戎州古𤏡侯之國僶俛弭盡切爾雅勉也屬籍上殊玉切附也下奏昔切籍籍也謂所附之宗籍沁水千浸切縣名屬澤州鄜芳無切州名餞之音踐送行飲酒也長子顔師古曰長讀曰長短之長今俗爲長㓜之長非也潞州之縣糸斥其字未詳沈粲沈式任切周文王子聃季食采於沈子孫以國爲氏桎梏上職日切下姑沃切在足曰桎在手曰梏商紂之刑捶楚上止蘂切擊也楚亦作檚汾符分切州名憤恚上房吻切懣也下於避切恨怒也黠戞斯黠下八切戞古黠切古堅昆國也地當伊吾之西焉耆北白山之旁詫丑亞切誇也城隍胡光切說文城池也有水曰池無水曰隍拓跋思㳟拓他各切跋蒲撥切代北複姓阽危丁念切欲墜之意戎羯居謁切說文羊羖犗也以爲戎之別號扆座隱豈切户牖之間謂之扆鈇質上匪父切斫也下讀曰鑕只日切鍖也古者斬人加於鍖上而斫之撤敕列切抽也栰房越切船栰鄄吉掾切地名淇門渠之切在衛州二年溧水音栗縣名屬曻州童騃語駭切癡也鄩徐心切桑梓音子木名小弁詩曰維桑與梓必恭欽止謂父之所植巳不敢不恭欽也彗星徐醉切妖星邏者郎佐切廵也殍𬒳表切餓死曰殍狼籍秦昔切狼之藉早而卧其草必亂故物之縱横敗亂者謂之狼籍斜劈博厄切分也疥㿅上公薤切瘙也下息淺切乾瘍也本作癬鷂以招切又以照切覘敕廉切又丑豔切窺也于放切又羽兩切訕所晏切謗也愠懟上於問切怒也下直類切怨也鎔音容大譟先到切羣呼也砦士邁切籬落也亦作寨唐紀七十五通鑑卷二百五十九起元黓困敦盡閼逢攝堤格即壬子至甲寅凡三年昭宗聖穆景文孝皇帝上之中景福元年安堵音覩安静如墻堵不遷移也蕘如招切倉猝蒼没切忽也暴也穫黄郭切刈穀也華隂户化切縣名屬華州德諲音因涪城音浮縣名屬梓州銅鉾迷浮切地名頵紆倫切比至毗至切礮披教切機石狸陵之切伏獸以貙漚藏上於候切乆漬也下才郎切匿也馬鞦雌由切說文馬紂也汭而銳切沮之材汝切止壞也逗留上音豆下力救切稽緩不進也璲音遂㜈亡遇切以㜈女星分地因以爲州名蔣瓌蔣子兩切姓也瓌公回切宣明曆穆宗時以爲累丗纉緒必更曆紀乃詔曰官改撰曆術名曰宣明至昭宗時以曆數漸差詔太子少詹事邊岡與司天少監胡秀林等改治新曆賜名崇元二年脯方矩切乾肉爲脯㗖徒濫切食也亦作啖井陘音刑縣名屬鎮州捽昨没切把持也渝容朱切州名玭蒲眠切玼纇上才支切玉病也下盧對切絲節也㳙圭淵妙繕時戰切治也衷甲陟隆切藏甲於衣也春秋傳子木衷甲以禍人敺於口切擊也顥下老切稹止忍切扈蹕卑吉切蹕止行人扈者衛扈之也黔中音琴即黔州鋋以然切欒城落官切縣名屬鎮州錙銖上莊持切下慵朱切八兩曰錙十絫爲銖衡纊苦謗切暝昡上莫遍切下絃遍切困極也愔愔揖淫切弭母媿切止也邠𡵨上悲巾切下翹移切在關内道鐬火外切瑾渠吝切掘其月切搰也盩厔上張流切下陟栗切山曲曰盩水曲曰厔縣名屬鳯翔府儋都甘切州名詡况羽切駱全瓘駱逹各切姓也瓘古玩切倪章倪五兮切姓也鐡劵去願切契約也以鐡爲之言其繾綣之意處訥奴骨切乾寧元年綮康禮切詼諧上枯回切下雄皆切譏戯也嘲陟交切亦作謿搔首蘇遭切爬刮也鐇附袁切鎧可亥切甲也髀音陛股也槊色角切亦作矟矛長丈八曰槊檛莊華切馬杖也辟易上頻亦切下夷益切謂開張而易其本處澧陵里弟切楚地勛許云切亦作勲釗之遥切鄘餘封切詆丁禮切毁訾也贓兹郎切納賄曰贓絁巾式支切繒似布詬詈許候切怒罵也榛側詵切木叢生曰榛祤况羽切棣大計切州名禊胡計切禋伊眞切沂魚衣切州名禕吁韋切嬀俱爲切州名閩眉巾切南越地饋遺上求位切餉也下弋季切賂也鋌待鼎切稱是昌孕切等是也䜟楚譛切䜟驗也唐紀七十六通鑑卷二百六十起旃蒙單閼盡柔兆執徐即乙卯至丙辰凡二年昭宗聖穆景文孝皇帝上之下乾寧二年瑄荀縁切珂丘何切㑹稽上古外切下古兮切縣名屬越州晉灼云本名茅山吴越春秋云禹廵天下登茅山羣臣乃大㑹計更名茅山鐐力彫切又力弔切錡冝倚切又渠儀切訛言吾禾切僞也亦作譌鸑鷟上牛角切下仕角切鸞鳯之屬郢以井切巫覡刑狄切在男曰覡在女曰巫珙居容居勇二切單父音善甫縣名屬宋州臺濛臺徒哀切姓也𪷟音蒙忷懼許容切又許拱切擾恐也漣水力延切縣名屬泗州郃陽音合縣名屬同州詩曰在郃之陽紊文運切亂也骨鯁古杏切亦作鯁骨彊四支故君有忠臣謂之骨鯁枝捂五故切斜相抵觸也繼鵬音朋鼔譟先到切羣呼也筠于倫切樓桷訖岳切樓之榱桷也莎城蘇禾切地名暍死許葛切以熱而死也郗延昱郗丑飢切姓也昱余六切趣讀曰促烏墩音敦寨名岌許及切晡奔謨切日加申時楸林音秋寨名揣𥘉委切度也婉辭委逺切婉順之言裨益賔彌切接益也三年洹水干元切水在齊魯間踶齧上田黎切蹋也下魚刧切噬也嬰城於盈切繞城以自守詗火迥切又翾正切知處告言也蹴鞠上子六切䟳也下鉅六切鞠以皮爲之蹴蹋而戯茅垻上莫交切下必駕切平川爲垻躓知利切說文跲也鄜芳無切州名跋扈上蒲撥切下音户猶強梁也下邽音圭縣名屬華州燔附袁切爇也扆隱豈切郁於六切璵以諸切摶度官切琚九魚切玘墟果切親迎魚慶切迓也唐紀七十七通鑑卷二百六十一起强圉大荒落盡屠維協洽即丁巳至已未凡三年昭宗聖穆景文孝皇帝中之上乾寜四年麟趾上吕辛切下音止麟瑞獸也章木䟽云麕身牛尾馬足黄色貟蹄一角角端有肉音中鍾吕行中視矩王者至仁則出故詩人取以爲興毛氏云信而應禮也不軌居洧切不法也玫莫杯切鄆王問切州名浮梁吕張切水橋也鏐力幽切姒祥里切長婦曰姒㓜婦曰娣濮音卜州名驍將堅堯切徤也勇也間道居莧切間隙之道沸騰芳味切涫也猗氏乙竒切縣名屬河中府繼瑭徒浪切聶金聶尼輙切姓也楚大夫食采於聶因以爲氏珣相倫切瞿章瞿權俱切姓也章其名埭徒耐切以土堨水曰埭樊港古項切地名琳音林宗滌徒歷切節鉞王伐切節以專殺斧鉞以專斷砦仕懈切籬落也郜居號切契丹音乞北狄之國居黄水之南黄龍之北得鮮卑之故地或以爲鮮卑之遺種趣之趣讀曰促垣雨元切墻垣偓於角切郴丑林切州名琲部凂切又蒲昧切帥朔律切亦作率輸輓音晩轉輸而輓引也懦乃卧切又乃亂切弱也瞋目昌真切張目也醒先青切醉解也又先挺切力爭側进切止也璉力展切酒酣胡甘切應劭曰洽也宗綰烏板切控兵苦貢切控制也猜倉才切疑也祺音其弈碁上羊益切下渠之切圍碁也博物志曰舜造圍棊丹朱善之壅於用切堨塞也灌古玩切澆也瓉才旱切幟昌志切又式志切旗屬栅測革切編立木爲之渒水普計普賢二切水在丹陽叔妃神六切後宫女官捶撻上止蘂切下他逹切擊也延虹胡公切又古巷切審邽音圭南詔南蠻國名本哀牢夷後烏蠻別種也夷語王爲詔驃信毗召切按南蠻傳云驃信夷語君也郝王呵各切覘癡廉切又丑豔切窺卭郲郎才切卭郲山名在沉黎鄣候之向切塞上築城爲蔽鄣以扞冦日蹙子六切迫也光化元年丗旻眉巾切洺彌并切州名磁音慈州名瓊渠營切珝况羽切犫蚩周切氏叔琮氏姓也琮徂宗切輯睦七入切又音集爾雅曰和也𣢾苦管切饌雛戀切饔具鏃作木切矢末布陳直刃切與陣同柷之六切詰去吉切問也球音求爲質職利也結言也愍眉殞切憐也顥下老切漑居代切沁七䲴切州名瑶餘招切艦户黤切戰船四方施板以禦矢其狀如牢浛胡南切又尸紺切二年下邳貧悲切縣名屬徐州闔轄臘切閉也扉匪微切户扉鄶古外切僵紀良切仆也榆次羊朱切邑名屬太原府洞渦古禾切地名挑戰徒弔切擿嬈敵以求戰如古之致師歙失涉切州名禆將頻眉切將之徧副也刈魚胏切芟草又牛蓋切唐紀七十八通鑑卷二百六十二起上章涒灘盡重光作噩即庚申至辛酉凡二年昭宗聖穆景文孝皇帝中之中光化三年銶渠尤切城塹七豔切坑也一曰遶城水也鐬呼外切從容七恭切猶休燕也鄴魚怯切縣名屬相州漳水諸艮切山海經曰漳水出荆山南注于沮水汭如銳切贄音至滹沱上音呼下音駝亦作池山海經云大戯之山滹沱之水出焉袂彌蔽切袖也繒慈陵切帛也犒口到切餉也亦作勍敵渠京切強也左傳勍敵之人瀛餘輕切州名郷導許亮切趨鄉而引導也濘乃定切泥濘汶文運切易水羊益切岀涿郡安閻山即易州也太行胡剛切山名狼狽博蓋切狼屬生子或欠一足二足離則蹎故猝遽謂之狼狽輕佻他彫切偷也掖音亦嬪御毗賔切周禮有九嬪九御錮音固鑄塞之也號哭胡刀切大呼而哭也縝止忍切榜殺音彭掠也謌居何切詠檄胡狄切古者以竹簡爲書長尺二寸太阿於何切劎名楚有龍泉太阿晟丞政切憤惋上房吻切滿也下烏貫切驚歎皃戩子踐切行間胡郎切行伍之間狐疑狐性多疑每渡河氷且聽且渡故以不决者爲狐疑天復元年梃待鼎切杖也橈權女巧切亂也肘腋上陟柳切臂節也下夷益切胳也在肘後駑材農都切凡馬之材也汰他蓋切太過也汜水音祀縣名屬孟州釗之遥切絪音因間使居莧切間諜之使潼關潼關在華隂縣本名衝關河自龍門南流衝激華山故以爲名流澌音斯流氷也面縳符攫切縛手於後唯見其靣也歔欷上休居切下休旣切歎息也蹇傲上九輦切下魚到切沁七鴆切州名鄂逆各切井陘音刑縣名屬鎮名榷酤音角水上横一木以渡人者喻禁民酤釀官自開置加設木爲榷獨取利也瘧逆約切說文熱寒休作綯徒刀切忷忷許拱切諠擾之意又許容切貯展吕切積也瓌古回切宗黯乙减切訣古穴切訣別諠譟上許元切諠譁也下先到切鼓譟也倔強其勿切不柔服也耐乃代切忍也侑尤救切愀然七小切容色變也昶丑兩切惆悵上丑鳩切下丑亮切望恨也布𥜗汝朱切短衣也翹祁堯切企也舉也鄠音户縣名屬京兆府磑五對切䃺之也盩厔上張流切下陟栗切山曲曰盩水曲曰厔縣名屬鳯翔府商賈音古行賣曰啇坐販曰賈輻湊上方六切車輪轑也下千候切本作輳輻共轂也謂衆輻之所輳危全諷危姓也諷方鳯切搏伯各切索持也唐紀七十九通鑑卷二百六十三起元􅘬閹茂盡昭陽大淵獻正月即壬戌至癸亥凡一年有竒昭宗聖穆景文孝皇帝中之下天復二年汾符分切州名逹靼當割切逹靼者靺鞨之遺種也幕府師出無常處所在張幕居之以將帥得主府故曰幕府珂丘何切麹糵上丘六切酒母也下魚列切牙米也沙陀唐何切西突厥別部處月種也帑藏上佗莽切下才浪切藏金帛之所也窺覦容朱切窺竊也瑾渠遴切回鶻胡骨切即回紇也貪婪盧含切亦作惏洎其兾切虢古獲切縣名屬鳯翔府頵於倫切葭葦上音家下羽鬼切荻屬堙艇待鼎切小船債側賣切逋財也白麻正觀間詔敕用麻𥿄冩之至髙宗謂白麻多有蟲蠧並用黄𥿄元和𥘉凡赦書德音立后建儲行誅討拜免三公宰相命將並用白麻不用印溝洫上居侯切下况域切傋洫以通川源也傳瑛於驚切䑛甚尒切以舌取之也創𥘉莊切亦作瘡膿奴冬切重血也俳優上歩皆切戯也下於求切倡也戯誚才笑切朝誚也繪黄外切繪五采也縊於計切經也譎古穴切詭詐也諜徒恊切軍中反間者秣馬莫葛切食馬糓也硤石胡夾切蚰蜒壕上夷周切中夷然切下乎刀切塹名鈴郎丁切似鍾而小爲質職利切結信也傳璙力弔切閽呼昆切守門人也廨居隘切公舎抄掠上𥘉交切又楚教切下力灼切劫略也延繢胡對切縋馳僞切繩有所垂也詗火迥切翾正切知處告言也鄜坊上芳無切下音方並州名按堵音覩按次第也堵如墻堵不遷動也詬呼漏切冎古瓦切剔人肉置其骨也儲偫上陳如切下丈里切猶蓄積也柹鉏里切飼音飤薙丈几切芟也乘輿天子所乘車輿不敢斥言尊者故稱乘輿傳瓘古玩切紓商居切緩也光稠除留切三年衿居吟切衣系也沂魚衣切州各華户化切州名鄩徐林切離間居莧切間隔也豁呼括切豁然開大之皃侃苦旰切又苦旱切撤直列切去也彌縫上武移切下符容切鬻余六切賣也鎔餘封切樸匹覺切儇呼縁切詩云揖我謂我儇兮儇利也又慧也㥦詰叶切快也愬蘇故切黜陟上丑律切貶也下竹力切升也醇殊倫切說文不澆酒也驕横胡孟切不順理曰横虺許偉切蛇虺悸其季切心動也瑱他甸切絀敕律切渾瑊渾胡奔切按鐡勒諸部傳瑊渾釋之子也承璀七罪切蔕丁計切根蔕膏肓上音髙下音荒膏心下也盲鬲上也春秋左傳曰在盲之上膏之下攻之不可瘖於金切不能言也赧女板切周愼王之子也謚法云無然曰赧謂慙耻之稱也莎城素何切糗糒上去乆切又丘救切下平祕切乾糇也踣蒲墨切僵也頓也寺人時吏切奄官也字或从門按春秋傳寺人披杜預注云夲作侍人披閨闥上音圭下土曷切宫中小門一曰門屏弭母媿切止也獮息淺切說文作􅸦殺也唐紀八十通鑑卷二百六十四起昭陽大淵獻二月盡閼逢困敦閏月即癸亥至甲子凡一年有竒昭宗聖穆景文孝皇帝下之上天復三年魚全禋魚姓也禋音因扆於豈切機數雙遇切下同屬之朱欲切溥音普餞音踐送行飲酒也淄青側持切並州名屬河南道掎舉綺切從後牽曰掎荻亭歷切草名葦屬灄口失涉切灄水在西陽炬臼許切束葦燒杪弭沼切木標末也㳂江余專切縁水而下也劈浪匹歷切破也又博厄切分也剽輕匹妙切劫也憕直陵切契苾上音乞下蒲結切本鐡勒部落之號後以爲姓吐谷渾谷音欲渾胡昆切西域國居甘松山之陽洮水之西狡獪上古巧切下古外切又户八切捍侯旰切屠之同都切屠謂破取城邑誅殺其人如屠六畜然栅測革切寨栅也編立木爲之梟堅堯切掛首於木上臨朐音劬縣名屬青州晡奔謨切日加申時爲殿丁練切軍後曰殿踏逹合切鏐力求切渝容朱切州名楫即渉切舟櫂也亦作檝輜重上莊持切下直用切輜載衣車也重載物車也行者之所資緫曰輜重仆地芳遇切頓也又敷救切燎盧皎切放火也射之神夜切發弓弩矢也泝流蘇故切逆流而上也皖口胡管切古皖國漢屬廬江唐改爲舒州檻車户黤切載囚車棣大計切州名行悰徂宗切𥚹俾緬切狹也挫祖卧切摧也易州羊益切以易水得名黔音琴州名瘴癘上之亮切下力制切疾疫也涪音浮州名歔欷上休妻沈飮持林切沈湎于酒也從容七㳟切猶休燕也氏叔琮氏姓也琮徂宗切椒殿椒即消切亦猶椒房之稱泌陽薄必兵媚二切縣名屬泌縣臺𪷟臺姓也𪷟音蒙駱谷上盧各切下音欲関名在盩厔賨徂宗切瓌公回切說文偉也昭宣光烈孝皇帝天祐二年禆將頻彌切將之徧副球音求濮陽音卜縣名屬濮州昱余六切戇樸上陟降切愚也下匹角切素也棣大計切本州名祤况羽切禊胡計切禋於人切禕呼韋切袐兵媚切祺音其禛之人切文蔚紆勿切璨倉按切輕佻吐彫切爾雅曰佻偷也彗星徐醉切妖星㜈音務州名以㜈女星分地故也鏢匹燒切横議胡孟切不順理也紊文運切亂也扆隱豈切溥滂五切濰夷追切州名搢紳上即刃切挿也下矢人切大帶也搢紳之士搢笏而垂紳也瀧閭江切州名鴟梟上處脂切下堅堯切鷙猛之鳥也夾榆容朱切木名說文榆曰枌捽昨没切持捽樸殺弼角切投而殺之也贄脂利切公佺且縁切剽掠上匹妙切下力灼切劫略人財也司空圗司空姓也郢以井切州名禔時尓切歙音攝州名夲漢歙縣屬丹陽憃直書容切愚也又丑江切丑用切擊毬巨鳩切蹋鞠瞑目莫定切閉目也潦魯皓切雨水大皃楷口駭切溢弋質切滿溢愍眉殞切抄楚交切又𥘉教切略也躁忿上則到切下敷吻切九錫一曰車馬二曰衣服三曰樂則四曰朱户五曰納陛六曰虎賁七曰斧鉞八曰弓矢九曰秬鬯逗遛上音豆下力救切稽留不進也歧蜀翹移切歧謂鳯翔蜀謂西川時李茂正爲歧王王建爲蜀王勍敵渠京切彊也春秋傳勍敵之人宗綰烏板切憤房吻切滿也百揆巨癸切度也揆度百事揭巨訐切擔也彪𥙷休切三年嗢末烏末切吐蕃奴部也虜法出師必發豪室皆以奴從故云奴部一名渾末居甘肅瓜沙河謂岷廓疊宕間橐闥各切說文囊也甲襻普患切系也闔轄臘切閉也殪壹計切說文死也鋸居御切孟莊子作鋸筠爲彬切蓨他彫切漢書作脩縣名屬兾州釗之遥切澶市連切州名蓼洲上盧鳥切下職流切地名之殿丁練切軍前曰啓軍後曰殿饌士戀切具食也啖徒濫切食也亦作啗晟時正切畋亭年切拓撻各切間拓怯去劫切畏也倪可福倪五兮切姓也縞素古老切爾雅曰縞皓也繒之精白者曰縞玕音干酋自秋切長也資治通鑑釋文卷第二十七
