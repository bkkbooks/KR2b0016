body:
  text: 右宣義郎監成都府糧料院史炤梁紀十二通鑑卷一百五十六起昭陽赤奮若盡閼逢攝提格即癸丑至甲寅凡二年髙祖武皇帝十二中大通五年赤谼嶺谼户公切大谷名通款苦管切誠𣢾毗頻脂切驍勇古堯切健也行陳上胡郎切下直覲切行列軍陳也怏怏於兩切情不足也阿至羅阿至羅國爲蠕蠕所役亦統髙車之衆十餘萬落後率所部自立爲王國人號之曰候婁匐勒猶夏言大天子也間行居莧切從間道而行諶是壬切瑩維瓊切又縈定切更造工衡切改作也掩襲似入切春秋釋例掩其不備曰襲下邳符悲切葛嶧山在其西古嶧陽也屬後魏歃血色洽切歠也載牲歃血所以爲盟也控弦苦貢切引也要害顔師古曰在我爲要於敵爲害故曰要害輯氐羌按風俗通云氐本西南夷種魚豢魏略云漢置武都郡排其種人分竄山谷或號青氏或號白氐說文羌西方牧羊人續漢書云羌三苗萎姓之後沙塞先代切邊塞謂沙漠之外万俟受洛干万俟音墨祺虜複姓名洛字受洛干万俟普之子也鐵勒鐡勒本匈奴苗裔種類最多雖姓氏各别緫謂爲鐵勒並無君長分屬東西兩突厥邸珍邸都禮切姓也珍之人切下迮側伯切戍地名在雍州馮翊與職切郡名決録注曰馮馮也翊明也沔陽莫踐切漢中邑應劭曰沔水出武都東南入江如淳曰北方人謂漢水爲沔水顔師古曰漢上曰沔鄼城音賛義陽郡鄼縣之城也翟嵩翟徒歷切姓也嵩息弓切六年企丘弭切藉田秦音切帝藉千畒古者使民如借故謂之藉或作耤怖普故切惶懼也憕持陵切井中蛙烏瓜切水蟲形似蝦蟇莊子曰埳井之蛙擅一壑之水而跨跱埳井之樂漢馬援往觀公孫𫐠歸謂隗囂曰子陽井底蛙耳彌姐元進彌武移切姐音紫關西複姓元進其名瞋目昌真切張目皃閺郷無分切屬洪農湖縣匕首音比劉向云短劎也塩鐡論以爲長尺八寸其頭類匕故云匕首皷噪先到切羣呼通作譟秋毫按毫至秋乃成又王逸注楚詞云銳毛爲毫夏落秋生也趣逡湏切嚮也上邽音圭天水邑應劭曰史記故邽戎邑迸走北諍切散走也豳彼貧切亦作邠古豳國晉爲新平郡西魏置豳州纛徒沃杜皓二切羽葆幢懾服之渉切失氣也怖也吐谷渾谷余蜀切渾户昆切本遼東鮮卑徒河渉歸子也名曰吐谷渾分户七百以給之其後部衆益甚子孫因以爲號蜂起敷容切蜂起如蜂之起言其衆也瓜鄯上姑華切下時戰切瓜本戎狄地出美瓜長者狐入其中食之首尾不出左傳所謂元姓之戎居於瓜州是也漢武帝開置敦煌郡元魏兼立瓜州鄯古西羌所居漢武帝逐之築令居塞漢末置西平郡至元魏置鄯州拔也惡蚝拔也代北複姓其先與解律同祖爲拔也部因氏焉㧞蒲撥切蚝七吏切可朱渾元可朱渾代北三字姓名元字道示爲質職利切結信也蒲反甫逺切河東邑管鑰弋灼切搏鍵器也猥烏賄切猶濫也邙山莫郎切又武方切北山名在河南洛陽黒獺他逹切暹息廉切懦乃卧切又乃亂切弱也或作愞韲粉牋西切韲醢粉碎也鄴音業魏郡之邑糴亭歷切買也止戈止戈謂載戢干戈按春秋楚潘黨曰克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈爲武見宣公十二年問鼎按春秋楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉見宣公三年止簣其貴切土籠也論語孔子曰譬如爲山未成一簣止吾止也觀舋許慎切罅隙也横爲上胡孟切下干僞切枉𬒳也熒惑上户坰切下胡國切星名南方主夏爲禮視禮虧失斌之悲巾切紿徒在切欺也湛直深切又徒減切瀍西直連切瀍水之西在河南獨孤信信本名如願姓劉氏魏𥘉有四十六部其先伏留屯者爲部落大人至庫者爲領人酋長生信信少年脩飾服章軍中號爲獨孤郎故曰獨孤信長騖亡遇切馳也奔也糗漿上許乆切糗飯也下即良切水漿也稠桑直由切地名在滎陽之西叱列延慶叱列代北複姓西部大人丗爲酋帥號叱列因以爲氏延慶其名叱昌栗切廞許金切又詐錦切廨舎古隘切公舎器械胡介切械者器之緫名有盛曰器無盛曰械浙陽㫖熱切郡名浙水所出警蹕上居影切下卑吉切驚者戒肅也蹕止行人也昭穆市昭切父爲昭子爲穆昭南向穆北向東魏元魏孝武帝爲髙歡所逼西入關歡乃奉清河王亶之子爲帝迂都鄴是爲孝閔帝丗號東魏始於此恟懼許容切又許拱切大野拔大野代北複姓㧞其名音蒲撥切瀬郷落蓋切梁國苦縣有瀬郷即老子所生地闔門胡臘切閉也酖直禁切毒酒濮陽博木切古昆吾國也其地屬後魏球音求嘔血嗚后切吐也疥癬上居拜切下息淺切疥癬瘡瘍之小者心腹疾病之大者喻所救有先後緩急本國語伍子胥之言梁紀十三通鑑卷一百五十七起旃蒙單閼盡強圉大荒落即乙卯至丁巳凡三年髙祖武皇帝十三大同元年西魏孝武帝遇禍宇文泰奉南陽王寳炬爲帝都長安丗號西魏始於此乙弗氏乙弗複姓蠡升音禮浟以周切靴許茄切靸也亦履也一作鞾鞫之居六切推窮也縊於賜切自經也黃鉞王伐切大斧以黃金爲飾袒身徒旱切袒裼也髻古詣切束髮也徒跣蘇典切足親地白梃徒頂切杖也悰徂宗切撤直列切去也横被胡孟切枉也跋望遣爾切舉踵而望也罟果五切罔罟詰朝去吉切平旦趣逡須切嚮也城父音甫譙郡之邑越勒肱越勒代北複姓其先爲越勒部因以氏焉肱其名鄱陽蒲何切或作番郡名愍眉殞切骨鯁古杏切骨彊四支故君有忠臣謂之骨鯁與骾同洋似羊切怖橈上普故切下女巧切恐擾也田横島都皓切海中有山曰島按漢書田横與其徒屬五百餘人入海居隖中景叡音睿峙直里切二年縳矟上符攫切束也下色角切矛屬搴丘䖍切朝請才性切蠹都故切蟲食木爲蠹餞之音踐送行飲酒凍餒奴罪切飢也歔欷上休居切下許旣切歎息也輜重輜載衣車側持切重載物車直用切三年掎居綺切從後牽曰掎蹉跌上倉何切下徒結切義同差跌灞上必駕切本滋水秦穆公更其名沮將預切沮喪爲殿丁練切車後曰殿岀竹律切企去智切流矢飛矢曰流矢通中竹仲切傷也藍田盧甘切京兆邑屬西魏汾陽扶云切汾水之陽河東邑屬東魏三川河洛伊爲三川涇渭洛亦爲三川陽休之說昶丑兩切勍敵渠京切彊也昕許斤切覘之癡廉切又敕艶切窺也拊掌方武切拍手檦匹沼切諜說上逹恊切下式芮切反間而誘之也堡博抱切堡障小城一作堢邃雖遂切正朔正本音政秦始皇諱改從平聲鋒鏑鋒戈㦸刃也鏑箭鏃也音嫡刎之亡粉切斷也貉子莫白切說文曰北方象種也愎諫蒲逼切很也忿兵敷問切魏相曰爭恨小故不憤怒者謂之忿兵撻之他逹切擊也置陳直覲切與陣同左拒俱兩切陣名左傳曼伯爲右拒祭仲足爲左拒葦中禹鬼切大葭也晡時博孤切日加申時猘狗居例切狂大噬人時制切囓也濘奴定切泥濘内之内讀曰納橐駝徒何切韋昭曰駱駞背肉似橐故云橐駞鎧仗可亥切鎧甲器仗也欻起許勿切暴也脛形定切脚脛釋名曰脛莖直而長似物莖也倳刃側吏切挿刀也或作剚猗氏乞竒切河東邑古猗頓城金墉音容城名在河南洛陽西北角三國魏所築至後魏孝武帝末分屬東魏蚪渠幽切諏之則侯切淑神六切是云寳是云虜複姓寳其名怡峯怡與之切姓也峯其名按本傳云本姓黙台避難改焉陽翟音宅河南邑賀若統賀若複姓其先居元朔隨魏南遷魏以忠正爲賀若因命以氏焉宛陵於元切宣城邑彭澤聚在西南蓼塢上盧鳥切下安古切蓼即安豊之邑塢謂庳城也乘間居莧切乘其間隙也剽野匹妙切剽劫也梁紀十四通鑑卷一百五十八起著雍敦牂盡閼逢困䍧即戊午至甲子凡七年髙祖武皇帝十四大同四年大隗山五罪切推隗髙也駱越駱盧各切姓也越其名典籖七廉切官名淳于覃享于複姓風俗通曰春秋時小國也一號州淳于公其後因以爲氏覃徒含切翌與職切鹵簿上音魯下裴古切車駕次第爲鹵簿郁乆閭氏郁乆閭蠕蠕國之姓本曰木骨閭木骨閭者首秃也木骨閭與郁乆閭聲相近故後子孫因以氏焉莫多婁貸文莫多婁代北三字姓貸文其名䇿抶丑栗切䇿抶謂以馬捶擊之也闔胡臘切閉也徹丑列切通也氛霧敷文切霧氣氤氲也長矟音朔通俗文曰矛丈八者謂之稍踣蒲北切斃也倒也亦作仆剽掠離灼切刧取也閿郷武分切在洪農湖縣蜂蠆丑邁切蜂蠆毒虫說文飛虫螫人者至崤何交切崤謂崤山洪農陜縣東二崤是也詆訶音底呵謂毀訾譏誚也風調徒弔切謂風度韻調也灋保灋古法字柵楚格切編立木爲之繕脩時戰切繕治也脩葺也間道居莧切謂他道也歸𣢾苦管切誠𣢾諜人音牒軍中反間者崤澠莫踐切一作黽即洪農澠池縣沙汰他蓋切擇也五年纉作管切日旰居案切晚也春秋傳日旰君勞嗤赤如切笑也异音異慤苦角切謹也愿也暕古限切瑒音暢瑗于眷切拓他各切開也䍧柯上茲即切下古何切䍧柯者係船􅍻也楚伐夜郎至且蘭椓船於岸故名其地曰䍧柯俚洞兩耳切南夷種名荒徼吉弔切荒外邊徼也瑾渠遴切六年蠕蠕而兖切北狄名即柔然國後魏太武以其無知狀類於虫改其號爲蠕蠕鷙脂利切七年宕昌徒浪切羌種名蓋三苗之裔漢有先零燒當等丗爲邊患其地東接中華西通西域南北數千里姓别自爲部落酋帥皆有地分不相統攝宕昌即其一也糧餼許旣切糧芻朱也餼饋生肉也撙茲損切傍海蒲浪切依也大稔而甚切熟也孝琬委逺切八年劾胡得切法有罪也合浦音普漢郡名吴改曰珠官郡晉復舊宋兼立越州齊梁陳因之至隋復舊憺徒敢切又徒濫切逗留音豆溜謂不進也漢法軍行逗留畏懦者斬九年艇待鼎切小船長鎻損果切銀鐺也釘釘上當經切集韻曰鐡鈛也下丁定切篸也蓐食儒欲切謂牀褥中食黎明音離黎猶比也謂比至天明也臨洮土刀切隴西邑洮水所出東北入河捽昨没切持頭髮也噤齘上巨飲切下何介切謂切齒怒也若干惠人者切若干虜複姓其先與魏俱起以國爲姓惠其名樓櫓郎古切城上守禦望樓釋名曰櫓露也露上無覆屋也武衛率所類切與帥通林邑南蠻國名本日南郡象林縣漢末縣功曹姓區有子曰連殺令自立爲王子孫遂有其地故曰林邑昶丑兩切土墱丁鄧切地名在肆州俠胡頰切十年弛縱賞是切謂懈怠也挈裾斤於切衣𥚑赤棒部項切說文梲也無厭於廉切不足也春秋傳貪惏無厭觠牸牛犢觠巨貟切牸疾置切牝牛也犢徒谷切牛子也憔悴上慈消切下秦醉切憂愁皃親暱尼質切近也或作昵駮北角切乖舛也愔挹淫切梁紀十五通鑑卷一百五十九起旃蒙赤奮若盡柔兆攝提格即乙丑至丙寅凡二年髙祖武皇帝十五大同十一年容華容華嬪妃美稱也按魏后妃傳有順儀順容順華之號安諾槃陀槃蒲官切陀徒何切酒泉胡名突厥突厥蓋匈奴之別種姓阿史那居西海其𥘉爲隣國所破滅有一兒十歳兵人見小不忍殺乃斷刖其臂足棄草澤中有牝狼以肉餌之及長與狼交合遂有孕焉生十男各爲一姓阿史那即其一最賢者爲君長故牙門建狼頭纛示不忘本也酋長自秋切謂豪帥也勞之郎到切慰勞跪去委切長跪斌悲巾切㬓紕招切詭過委切詐也溷胡困切說文亂也沮衆林汝切止壞也朱鳶與專切交阯邑昺兵永切秃突佳秃他谷切蠕蠕國頭兵可汗之弟也娉匹正切說文問也謂昏禮問名恚於避切怒恨也邙山莫郎切又武方切北山名在河南洛陽桎梏上之日切下古沃切在足曰桎在手曰梏軌居洧切琛丑林切控揔上苦貢切下作弄切控揔困皃裒削蒲侯切裒削猶刻剥也更相工衡切互也黠夏八切桀黠掣肘上昌列切挽也下陟桞切臂節也蠲圭淵切除也綺墟彼切文繒臭腐上尺救切腐乞也下奉甫切朽敗也傅翼傅讀曰附搏噬上伯各切搏擊也下時制切噬囓也悖蒲昧切又蒲没切逆也亂也斗筲所交切斗量名容一斗筲竹器容斗二升論語曰斗筲之人何足算也喻小而不大也帷說文曰在旁曰帷釋名曰帷圍也以自障圍也洧悲切扆戸牖間也禮䟽云如綈素屏風畫斧文也於豈切徼倖徼堅堯切通作僥說文幸也下耿切字或從女邸丁禮切蒼頡篇曰邸舎也屯傳張戀切驛遽也讜言音黨直言也惽惑呼昆切亂也不明也闟茸上吐盍切下人勇切賈誼傳云闟茸尊顯顔師古曰闟茸下材不肖之人横暴胡孟切恣也猾户八切狡也苛苛音何煩細也牲牛師庚切全牛曰牲蟋蟀上音悉下所律切蟋蟀蛬也說文蟀作􅢊唐國風之詩刺晉僖公儉不中禮也日􅉴音側曰昳要腹要讀曰腰皴裂七倫切細皮起也糲飯郎曷切又落蓋切力制切米之不精者謂脫粟飯也嗽蘇奏切盪口也身衣於旣切衾袪音切被也褰袒上去䖍切絝也下徒旱切裼也叢脞上才公切下倉果切書曰元首叢脞哉孔氏傳云叢脞細碎也詰去吉切問也鞠獄居六切窮理罪人也懌羊益切恱懌令狐整令狐複姓整其名縛符攫切束也擊也中大同元年獠魯皓切夷獠遲明丈二切遲待也謂待天明蔑莫結切無也郢以井切州名衆狙七徐切獼猴也莊子齊物篇曰狙公賦芋曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆恱邵陵實照切頴川邑船艦戸黤切戰船四方施板以禦矢狀如牢鼔譟完到切羣呼也潰胡對切亂也散也察楚黠切秕政卑履切其政如穅秕掘其勿切又其月切搰也塹七艶切坑也皮排歩拜切吹火韋囊也本作韛撞城宅江切木柵測革切編立木爲之􅋆匹沼切訛言五戈切謬也通作譌酹酒盧對切餟祭巵章移切飲酒器豕突陁没切豕性觸突故以爲喻跋扈上蒲撥切下侯古切跋扈猶強梁也遒直慈秋切猶勁也戇陟降切愚戇遺汝弋季切瞑目莫定切閉目梁紀十六通鑑卷一百六十強圉單閼即丁卯凡一年髙祖武皇帝十六太清元年繹音亦貪婪盧含切貪也亦作惏屧悉恊切履中薦也厮養相支切析薪養馬者或作㒋邢子才邢奚經切姓也子才其名檄胡狄切符檄古者以竹簡爲書長尺二寸暹息廉切折簡折簡猶言片𥿄也見王陵傳注揣𥘉委切度也湛海珍湛徒減切姓也海珍其名陽翟直格切河南邑昕許斤切螫手施隻切蟲行毒也餌仍吏切食也鄱陽蒲何切或作畨郡名穰城人羊切義迄業切謂以威力相恐而從之者异羊吏切綰烏板切傅𡵨傅方遇切姓也本自傅說岀於傅巖因以爲氏岐翹移切設間居莧切諜也鴆毒直禁切鳥名其身至毒扼於革切握也持也下同穢烏會切汚也秣馬莫撥切食馬榖也或作䬴募莫故切廣求也太行胡郎切太行山在河内山陽西北堞逹恊切女墻也春秋傳環城傳於堞挺待鼎切恚於避切怒恨也鍜工都玩切鍜冶之匠者譒𥙷過切儲陳如切儲副牋將先切說文表識書也哺蒲故切哺咀也翦撲普木切翦㓕也閩越眉貧切閩駱之地即古百越國也旰食居案切日晚而食百賈音古商賈璆渠幽切折箠上蘂切䇿也笞之丑知切擊也檐都甘切擔負釋名曰擔任也任力所勝也繖蘇旱切蓋也采石采石即牛渚磯也在丹陽蕪湖其地險固可守駱盧各切艘蘇刀切船之緫名荻亭歷切葦屬諜徒恊切軍中反間者更相工衡切互也石頭石頭在丹陽秣陵建業中孫權城之禧許其切朱雀桁胡剛切與航同義挫祖卧切摧也舶薄陌切海中大船甘蔗之夜切草名說文云藷蔗也歔欷上休居切下休旣切歎息皃恟懼許容切又許拱切擾恐也通作兇春秋傳曹人兇懼旛旗孚袁切說文幅胡也謂旗幅之下垂者帀作荅切說文周也從反而帀也竅詰弔切竅穴乘黃廏乗黃馬名廏馬舎也乘石證切廏居右切炬臼許切火炬擲直炙切投也鷟仕角切紿徒在切誑也軍費芳味切散財用也杜姥宅姥滿補切地名蹕卑吉切所以止行人清道也鼓譟先到切羣呼免胄直祐切兠鍪也司馬法從革或書作䩜脰徒透切公羊傳曰宋万搏閔公絶其脰脰項也離沮將預切離喪也號哭胡刀切大呼也亦哭也畚鍤上布衮切屬下測洽切鍫屬罽居例切毛布若今毼鎧可亥切甲之緫名恪苦各切剥北角切割削也織之翼切組織說文作布帛緫名停憇去例切息也曅筠輙切縋馳僞切垂䋲而入也銀劵去願切劵約也釋名曰劵綣也相約束繾綣爲限也以銀爲之拊膺方武切拍胷次也拉洛合切摧也衷甲陟弓切藏甲於衣也春秋左傳子木衷甲以禍人剽劫匹妙切劫掠也磪苦角切蝦蟇車蝦音遐蟇音麻以爲車名嶷魚其切又魚力切頠魚毀切柸晡枚切湓城蒲奔切湓水之城也在尋陽舸古我切大船也方言南楚江湖謂之舸戮力音六說文戮力併力也矛楯食尹切矛楯謂不相入也鋒鏑鋒戈㦸刃鏑箭鏃也音丁歷切鼎鑊胡郭切鼎大而無足曰鑊鋸居御切古史考曰孟莊子作鋸挑戰徒了切擿嬈敵以求戰如古之致師之迡音遲又奴許切近也橈女巧切曲也不撓謂不曲也爭側迸切亟紀力切疾也又去吏切梁紀十八通鑑卷一百六十二起屠維大荒落即己巳凡一年髙祖武皇帝十八太清三年截昨結切斷也畏懦乃卧切又乃亂切畏怯而懦弱也箸遲倨切匙箸矟色角切矛屬或作槊通俗文曰矛丈八者謂之矟中肩竹仲切淖奴教切泥淖惠臶在甸切吮子兖切䑛也嗽也新淦古南切又古暗切豫章邑涂水所岀西南入湖漢也系梁𥿄鴟鴟處脂切以𥿄爲之繫以長繩順風而放軍中用以傳信亦曰𥿄鳶厭勝一渉切廣雅云厭鎭也菰首橋菰古胡切在淮地府藏才浪切府庫也蓄物之所撤直列切去也剉祖卧切斫也飼馬祥吏切秣馬也膎户皆切說文曰脯也乾苔堂來切蘚也酸醎上蘇官切說文酢也關東謂酢曰酸下胡䜛切說文銜也北方味也本作鹹器械胡介切械者器緫名有盛曰噐無盛曰械伺相吏切伺候也爲質職利切結信也韶市昭切瑳七何切又七可切㰱血色治切載牲㰱血所以爲盟誓也羈縻上居冝切下忙皮切羈馬絡頭也縻牛紖也言牽制之故以取喻也彧於六切士悊知列切一作哲盱眙上況于切下與之切本臨淮邑晉義熈中置郡入南北系梁地𬞞山於切凡艸菜可食者通名爲𬞞郭璞說茹人恕切菜茹哽咽上古杏切下烏結切哽咽聲塞也慥七到切骨鯁古杏切骨鯁喻正直也說文曰鯁魚骨也食骨留咽中爲鯁睽傾畦切異也別也祅於喬切災祅譴去戰切譴責擯必刃切斥也笮融笮側伯切姓也融其名賄呼罪切財也閹衣撿切閹闇宫中守門者耽丁含切耽樂也或作躭猴音侯獼猴也鬻拳鬻余六切姓也拳其名舉烽敷容切邊火備警急作髙土臺臺上作桔皐桔皐頭有兠零以薪草置其中常低之有寇至即燃火舉之以相告擐甲胡慣切貫也春秋傳云擐甲執兵腫氣之隴切喘昌兖切說文曰疾息也瘞壹計切埋也叱昌栗切呵也詛盟莊助切鄭康成注周禮云大事曰盟小事曰詛蒱飲蒱薄胡切摴蒱與飲酒也勛許云切一作勲曇徒含切排闥上歩皆切推也下土曷切宫中小門一曰門屏稽顙上康禮切下冩曩切額至地也榻吐盍切牀也俛首亡辯切低首也或讀曰俯摛丑知切慴之渉切懼也怯也琳力尋切啜姝恱切泣皃不逞丑郢切猶不法也僧逷也歷切堡𥙷抱切障也小城也或書作堢洧水羽軌切水岀潁川陽城山東南入潁泉涌尹竦切騰也或作湧釡奉甫切鍑屬艦户黤切戰船四方施板以禦矢其狀如牢晦冥莫經切晦冥皆謂闇也察𥘉八切推他回切推墜也委輸委輸謂輸委積者也委音迃偽切輸音式喻切採莒力舉切禾自生亦作穭宛陵於元切宣城邑彭澤聚在西南嵊石證切之遴良刃切璽綬上斯氏切下是酉切印之組也剃他計切說文曰􅚎髮也􅉠符遇切所以贈終布帛曰􅉠攣吕縁切拘攣刎武粉切㫁也黃鉞王伐切大斧也以黃金飾之輕佻他弔切方言疾也目眇亡沼切說文曰一目小也合從即容切以利合曰從左髀傍禮切左股也濡湏人朱切濡湏水岀歷陽三國吴孫權築塢於此苽古胡切說文曰雕苽一名蔣稗旁卦切說文曰禾别也菱閭承切說文芰也楚謂之芰秦謂之薢茩藕語口切說文曰芙蕖根樅陽七容切縣名漢屬廬江石槨音郭寺名袒跣上徒旱切裼也下先典切足親地也嬖博計切愛也愔揖淫切靴許戈切鞮屬革履也紘乎萌切臠力兖切肉臠也崱仕力切岌魚及切龕口含切湕水紀偃切水名岀南郡巚語偃切百濟百濟之國蓋馬韓之屬𥘉以百家而濟因號百濟都於居抜城亦曰固麻城圯部鄙切說文毀也嶚力么切勰音恊浙江旨熱切說文泗水至至㑹稽山隂爲浙江溠城七何切溠水之城在義陽本糸梁地偲息兹切梁紀十九通鑑卷一百六十三起上章敦䍧即庚午凡一年太宗簡文皇帝上大寳元年摩訶上眉波切下虎何切銜枚音咸馬之銜勒所以止讙譁周官有銜枚氏枚狀如箸横銜之漴頭鉏弓切又士巷切水所衝處勔彌兖切暅之况晚切又古鄧切嬰城於盈切繞也謂繞城以固守湕北居偃切湕水之北在南郡質子職利切以子結信也貿莫候切易財也宕昌徒浪切羌戎之別國獠甘魯皓切宕昌種名鞏廉玉鞏居悚切姓也廉玉其名岷眉巾切州名西魏置忿敷粉切又敷問切怒也貰時夜切寛也戢阻立切止也歛也慷慨上古莽切下口漑切歎息也縛符攫切繫也溧陽理吉切丹陽邑溧水所出禊宴胡計切除惡之祭也古人以三月上巳祓褉毅魚旣切瑱吐甸切柵測革切城柵編立木爲之蝗胡光切蟲名說文螽也芡巨險切說文鷄頭也烟因蓮切或作煙碓都隊切機舂也繫辭掘地爲􅍫斷木爲杵刈魚肺切芟也梟堅堯切壓殺乙甲切笮也斃毗祭切死也壘魯水切軍壁糴徒歷切市糓也憤恚上房吻切懣也下於避切怒也疽七余切癰疽昵尼質切近也或作暱勍敵渠京切強力也屈彊上其勿切下其兩切梗戾也大横如字荀恱云大横龜兆横理也百揆求癸切度也揆度百事推挹乙及切退抑也劼立八切范蔚宗蔚紆胃切又紆勿切范曄字蔚宗嬪毗賔切嬪御齊主髙洋襲其父歡位封齊王東魏武定九年受孝静帝禪國號齊始於此浟以周切演音衍淯余六切湛直深切湜常職切馮翊與職切郡名决録注曰馮馮也翊明也東莞音官郡名﨑頭去竒切城名在梁地髙麗音離東夷國在遼東之東酋自秋切長也灨石古送切又古暗切在南康郡賧吐濫切夷人以財贖罪也孝琬於阮切皖城胡板切又胡管切廬江皖縣之城蠡南力兮切又力底切地名灋氍灋古法字氍巨俱切詡况羽切鎧仗可亥切鎧甲器仗也趣逡湏切嚮也棓殺部項切說文梲也以木杖殺之軌矩鮪切賕渠尤切說文以財物枉法相謝也琡昌六切麟趾格趾音止後魏律法名臨陳直覲切與陣同鸚鵡洲鸚於耕切鵡罔甫切洲名在江夏水中有磧曰洲礩職日切彪𥙷休切若邪山邪以遮切在㑹稽叱羅通叱昌栗切叱羅代北複姓通其名法琛丑林切崇顒魚容切大昕許斤切大摯脂利切下邳符悲切漢永平中置下邳國晉因之入南北系北齊蒲坂甫逺切河東邑有歷山舜所耕也貝磯上博蓋切下居希切地名長蘆龍都切地名捶正蘂切擊也昺兵永切憺徒濫切又徒敢切朝請才性切圭淵切從容七㳟切猶休燕也梁紀二十通鑑卷一百六十四起重光恊洽盡元黓涒灘即辛未至壬申凢二年太宗簡文皇帝下大寳二年余孝頃余以諸切姓也風俗通曰秦由余之後因以爲姓孝頃其名珣須倫切藉田秦昔切藉借也帝藉千畒古者使民如借故謂之藉邵陵實照切類川邑文皎古了切支化仁支章移切姓也化仁其名儁子峻切淯余六切舳艫上音軸下音盧舳船後持柂處艫船頭刺櫂處登陴頻彌切說文城上女垣俾倪也踞居御切蹲踞辮婢典切交也髯如占切頰湏也帆符咸切舟上幔所以汎風或作䑺郴癡林切梁桂陽郡隋改爲郴州疫營蒦切民皆疾也邏郎佐切廵也皷譟先到切羣呼曰譟鼔吹大僞切音律管壎之樂也忤旨五故切逆也棹直教切舟檝也或作櫂白塉秦昔切地名芋口羽俱切又王遇切地名撩力條切揺也一曰取物也磕克盍切石敲聲巢湖祖了切廬江居巢縣有二大湖巢湖在縣東南事見廣志艘蘇刀切船之緫名堞徒恊切女墻也舋許慎切舋隙灘他于切水濡而乾曰難鐡勒鐡勒匈奴苗裔種類最多雖姓氏各別緫謂爲鐡勒柔然柔然即蠕蠕國之別號也突厥陁没切突厥匈奴之別種姓阿史那氏一曰突厥之先出於索國在匈奴之北圡門上門突厥酉長也可汗河干切戎酋稱鍜奴都玩切治鐡之匠按突厥傳丗居金山之陽爲柔然鐵工枳棘上諸氏切下訖力切枳木名似橘棘小棗叢生者餼許旣切絞古巧切縊也琵琶上頻脂切下蒲巴切釋文琵琶樂器胡中馬上所鼔推手曰琵却手曰琶因以爲名扉匪微切户扇也子午谷余玉切漢平帝時王莽開之從京兆杜陵直絶南山至漢中言南北道相當故謂之子午璠孚袁切曅筠輙切頵居筠切樛居虯切標逋遥切又必小切噉杜覽切然㗖也徇徐閏切行示也鴆直禁切毒鳥以毛羽瀝酒食即殺人掘其月切榾也漳水清漳濁漳二水皆出上黨東諸良切老嫗威遇切母也汾扶云切水名在太原丗祖孝元皇帝上承聖元年小峴胡甸切山名在壽州諳烏含切說文悉也菴羅辰菴倚廉切柔然頭兵可汗之子白茅灣烏關切水曲曰灣地名七里瀬落蓋切水流沙上曰瀬地名酈通酈音歷姓也通其名裨頻彌切偏副也挑戰徒子切擿嬈敵以求戰鵃䑠上止遥切又陟交切下力鳥切小舟也舣䑰上音义或從差小船也下音歩方言艇短而深謂之䑰海艟尺容切艟艨戰船也縋馳僞切垂繩索也剉碓上寸卧切斫也下都内切舂也鞚苦貢切馬勤也剽掠匹妙切劫掠也裸露郎果切袒裼也挂之音卦垂掛之也或作掛哭踊尹竦切孔子曰擗踊哭泣謂跳而哭也長鯨渠京切海大魚也横死胡孟切枉也騭職日切越嶲先蘂切古卭都國漢武帝開置郡謂越嶲水而至因以爲名商賈音古行賣曰商坐販曰賈殖實職切興生財利曰殖撝吁爲切怦普耕切無恙餘亮切憂也病也憾胡紺切恨也緩頰吉恊切靣旁也舸古我切大船也方言南楚江湖謂之舸推墮上他回切下徒果切推落也鵾公渾切葳蕤上於歸切下汝誰切抉古穴切剔也獼猴上武移切下户鉤切博雅猱狙獼候也俘馘上芳無切下古擭切折馘執俘也春秋傳以爲俘馘重瞳徒東切目中瞳子相重也釘丁定切釘篸剜烏寛切削也潦魯皓切雨水大皃閥房越切閥閱僑人巨嬌切旅寄也虯渠幽切覘察癡廉切又敕艶切窺也旻眉巾切刳空胡切判也渌口力玉切水名在湘東梁紀二十一通鑑卷一百六十五起昭陽作噩盡閼逢閹茂即癸酉至甲戌凡二年丗祖孝元皇帝下承聖二年䜟楚譛切驗也木杆古按切突厥可汗之號厭之一渉切廣雅云厭鎮也尉遲迥尉紆勿切複姓迥其名音户頂切冦抄楚教切略取也壟魯勇切丘壠也蒙楯食尹切所以扞身蔽目崱仕力切戮力音六說文戮力并力也鐡劵去願切劵約也釋名曰劵綣也相約束繾綣爲限也以鐵爲之驃騎毗召切勁疾皃或作票涪水音浮說文水出廣漢剛邑道徼外南入漢翳川於計切蔽也鎻損果切銀鐺也或作鏁棻符分切潰胡對切散也叡俞芮切憂懣莫旱切又音悶煩也篋苦協切笥也罽居例切毛布若今毼繒兹陵切帛也稱是昌孕切等也晃胡廣切擲直炙切投也屬籍上殊玉切下秦昔切屬附也籍簿書也謂所附宗籍饕餮氏上土刀切下他結切貪財曰饕貪食曰餮因以爲氏齧倪結切噬也啖徒敢切食也或作㗖宗懔宗姓也岀周卿宗伯之後懔其名音力稔切各岳切左袒徒旱切偏脫衣䄂而肉露也契丹契音乞其國居和龍之北在庫奚東與庫莫奚異種同類露髻古詣切露綰髪也婺州亡遇切蓋以當天文婺女之分爲名即梁金華郡至隋改此名繕時戰切治也艦户黤切戰船四方施板以禦矢其狀如牢綰烏板切泄先列切漏也察與察同懾服之渉切失氣也涇州古靈切蓋以涇水爲名拓跋上他各切下蒲撥切虜複姓斐敷尾切披靡普彼切披裂偃靡也酖直禁切毒酒洋州似羊切蓋取洋水以爲名系梁入質職利切結信也捍侯旰切衛禦也蹙子六切迫也盱眙上況于切下與之切臨淮邑揣𥘉委切度也顯㑺音俊鄧至白水羌也丗爲羌豪因地名號自稱鄧至土風習俗與宕昌羌同檐上余廉切下胡剛切又何庚切鄧至羌名瑒音暢番禺上普官切下元俱切南海邑漢沔彌兖切應劭曰沔水出武都東南入江如淳曰或謂漢水爲沔水陴堞上頻彌切下徒恊切城上女垣也堊遏各切白涂也或書作埡衰絰上七雷切喪衣也亦作衰下徒結切首戴也以苴麻爲之葦席于非切葦草之席柵測革切編立木爲之枇杷上頻脂切下蒲巴切門名祗洹上翹移切下于元切寺名間道居莧切微道也詭過委切詐也中流矢中竹仲切傷飛矢也顗魚豈切日暝莫定切夕也歐血一口切吐也扼於革切持也烏幔莫半切帳也詰辱去吉切責問也紿徒在切欺也棓部項切說文梲也謂木杖帊普駕切殘帛延袤延長行也袤音茂南北曰袤東西曰廣渾天儀户衮切與混通靈憲序曰昔在先王將歩天路用定靈軌尋緒本元先凖之於渾體是爲正儀折簡猶言片𥿄也見魏志王凌傳注鎧可亥切甲也黜陟上丑律切貶也下竹力切升也綏輯音集爾雅曰輯和也梁紀二十二通鑑卷一百六十六起前䝉大淵獻盡柔兆困敦即乙亥至丙子凡二年欽皇帝犯翼祖廟諱今改作欽紹泰元年龔氏九容切姓也巋區韋切又苦軌切丘媿切正朔正月朔旦也正本音政秦避始皇諱改從平聲縞素爾雅縞皎也繒之精白者曰縞檄胡狄切符檄也古者以竹簡爲書長尺二寸上游游如字游即流也言居水之上流蒞力至切珉武巾切郢以井切州名瑱吐甸切馳傳張戀切車傳舟艫力胡切舟名說文舳艫也并心卑政切兼也並也簉切救切瑾渠遴切孝珩下庚切搢紳即刀切搢笏而垂紳又挿也羇旅居冝切羇寄也旅客也爲質執利切結信也采石在丹陽蕪湖即牛渚磯也檝即葉切舟擢或作楫儼魚檢切乘間居莧切乘其間􅽢之時靴皮許茄切鞮屬革履也愔揖淫切輜重輜載衣車也重載物車也輜測侍切重直用切剃他計切說文􅚎髮也頠魚毀切爭之側迸切止也江旰江姓也顓帝孫伯益之後封於江陵爲楚所㓕其後以國爲姓旰古翰切絞古巧切縊也曇明徒含切艦户黤切戰船四方施板狀如牢控馬苦貢切勒馬也辜辜罪也音孤譎古穴切說文權詐也邸丁禮切蒼頡篇云邸舎也蒨倉甸切幟武吏切又昌志切旌旗之屬闚去隨切小視皃翽呼外切翟子崇翟亭歷切姓也子崇其名胡墅承與切城名永巷水巷列宫名有長巷故名之也拌上歩干切說文承盤也與槃同古從金籕從皿髀部禮切股也豆盧寧豆盧複姓寧其名擠牋西切排也器械胡介切械者器緫名内盛曰器外盛曰械墊江徒恊切巴郡之邑閩中武巾切郡名郡南越也貿易莫候切互易也燼徐刀切火餘也嚈噠上益渉切下音怛西域國名沙漠莫各切沙圡曰漠太平元年若邪山邪以遮切山名在㑹稽縉即刀切州名湓城浦奔切湓浦之城也在尋陽毓余六切一疽千余切癰疽秣陵音抹丹陽邑青墩都昆切平地有堆曰墩砰普耕切舴艋上陟格切下莫梗切搏雅舴艋小舟倪塘五兮切倪塘地名偃潴曰塘槊色角切鬲郎擊切鼎屬㸑取亂切炊㸑霽子計切雨止也婫音昆女字數臠所角切疾也臠謂臠切也蓐食儒欲切謂牀褥中食比曉必寐切近也蹂藉上女九切踐也下慈夜切蹈也或作躤臨沂魚衣切琅邪國之邑荻筏上亭歴切丁房越切以荻葦爲箄筏行陳上胡剛切下直刃切粉黛待戴切畫眉也橐駞徒何切駱駞其背肉似橐故云橐駞儛罔甫切樂也用足相背通作舞匍匐上蓬逋切手行也或作扶下蒲北切伏地也或作伏鳴鏑丁歴切矢鋒也通作鍉鳴鏑謂髇箭也浹子協切合也刀𠢐陵之切剥也轜車音而喪車浟以周切大鑊胡郭切鼎大而無足曰鑊抶之敕栗切打也龍逄皮江切商忠臣憯憯七感切痛怒皃一䬸千安切又音孫餔也猥烏賄切鄙也奫於倫切鉗耳巨淹切羌複姓豁呼括切獠魯皓切蠻獠怖普故切惶懼也番禾白干切禾本作和武威邑努力暖五切方言勉也灋氍巨俱切歧陽翹移切本元魏秦平郡至西魏改爲歧陽贏怡成切說文有餘賈利也跣先典切足親地也挼繩奴和切两手相切摩也破篾莫結切析竹也訥奴骨切言難也資治通鑑釋文卷第十七
