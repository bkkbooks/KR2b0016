  text: 資治通鑑釋文卷第六
  hash: sha256:e2fa9cfadc3309ebcc8822a448dd9a5c3b06d5affee99bd701a4fedc02d38f3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_006-1a}
body:
  text: 右宣義郎監成都府糧料院史炤漢紀四十一通鑑卷四十九起柔兆敦䍧盡旃蒙單閼即丙午至乙卯凡十年孝殤皇帝延平元年襁褓上舉兩切下補抱切負兒衣朝見上馳遥切覲君之揔稱下胡甸切自下而見上曰見鮪榮美切祜侯古切邸丁禮切蒼頡篇曰邸舎也埶古勢字偵視丑正切覘也謂窺視之銳以芮切利也創𥘉莊切傷也陳直刃切與陣同騭職日切悝口回切又音里閶齒良切珍膳上知鄰切下時戰切八珍之饌儲峙上陳如切下直里切猶蓄積也糒歩拜切乾餱也間者居莧切猶言中間之時也穰如陽切豐稔也墾口很切耕也不揣楚委切量也苛音何細也假貸上舉夏切下吐戴切謂假借而寛貸也槀古老切禾稈也猾户八切狡也隕石于敏切落也慬音勤禧許其切譎古穴切詐也雨雹于具切自上而下曰雨下弼角切說文雨氷也曼延以戰切獸名讌㑹伊甸切合語也衎衎空旱切和樂貌謇謇九輦切易曰謇難也諓諓音踐謟言也孝安皇帝上元初元年徼外古弔切塞外也僬僥上音譙又音焦下音堯西南夷也山海經曰周僥國在三首國東爲人短小冠帝一名僬僥國語曰僬僥氏三尺短之至也挌殺古栢切擊也讞魚列切又魚戰切檄胡狄切以木簡爲書長尺二寸勒姐音紫羌種名犇潰上古奔字下胡對切奔走潰亂也先零音憐羌種名滇零丁田切羌種矛迷浮切酋矛也建於兵車長二丈象形楯食尹切所以扞身蔽目者漂紕招切浮也愠於問切怒也忿敷粉切又敷問切怒也譴詰戰切說文謪問也貿莫候切交易也撓擾上火髙切瘼音莫病也螟忙經切說文蟲食榖葉者號咷上胡刀切下徒刀切啼呼也慤克角切謹也檢柙上居奄切下轄甲切章懷曰檢柙猶規模也妖於喬切妖災乘輿乘輿天子所乘車輿也不敢斥言尊者故稱乘輿見蔡邕獨斷痼古慕切乆病也訛言吾禾切謬也或作譌質館職利切築館舎以受降質也二年敦煌音屯皇郡名應劭曰敦大也煌盛也張掖羊益切古匈奴昆邪王地孝武帝開置郡應劭曰張國臂掖故曰張掖籞偶舉切禁苑也若盧音廬前書曰若盧獄屬少府漢舊儀曰主鞠將相大臣也澍雨音注時雨也湟中胡光切在金城破羌縣地月氏胡所居也水潦魯皓切說文雨水大貌搏伯各切索持也織絍如深切杜預注左傳云織絍織繒布也大鴻臚音閭鴻聲也臚傳也所以傳聲賛導九賔胡廣說參狼所令切武都西夷冦鈔楚教切冦掠奪取也三年臨洮吐髙切隴西邑洮水出西域北至枹罕東入河窮核下革切綜核也愍眉殞切琮藏宗切孛蒲昧切又蒲没切妖星天苑於阮切星名侲子音振謂逐疫之人也續漢書曰大儺選中黄門子弟百二十人爲侲子四年徹直列切去也或作撤郃音合又音閣涿竹角切郡名髙皇帝所置种音沖縣奉讀曰俸秩禄也雍於用切右扶風邑詡况羽切拓他各切開拓也或作托劬勞權俱切勤勞也行陳上户郎切下直刃切謂行伍軍陣氐丁奚切夷種名也賁育賁音奔孟賁夏育古勇士函谷胡䜛切關名在洪農新安也疽食千余切瘡也義同𧖟食朝歌陟遥切河内邑周康叔所封之地寗季乃定切姓也大行上音太下胡郎切山名在河内山陽縣西北敖倉五髙切山名在河南滎陽縣秦於此地築太倉故曰敖倉亦曰倉庾斷音矩截也閡與礙同外閉也募莫故切廣求也貰時夜切赦也𥚑九魚切衣袌也曼栢上音萬五原邑徒跣先典切足露親地扞侯旰切扞禦蝗音黄說黄螽也檻車户黤切檻車謂以板四周爲檻無所見朝請才姓切五年塢候安古切說文小障一曰庳城刈魚肺切刈穫也䠞子六切迫也與蹙同夫餘馮無切或作扶地名在長城之北夲豪離國王子名東明者王欲殺之走渡施掩水因都夫餘故號夫餘樂浪音洛郎郡名古朝鮮國濊貊上烏廢切下莫客切濊與髙勾驪同種在朝鮮以東貊三韓之屬北貉國也一說貉即濊也元莵下同都切古郡名古畨眞國地琦渠冝切東觀記琦自稱安漢將軍上邽音圭漢陽邑前書屬隴西樗泉抽居切營名六年彊孰彊去聲孰與熟同掘渠勿切搰也愷可亥切元初元年板楯下音順西南蠻夷也在巴郡閬中其地有喻水多居水左右俗喜歌舞所謂巴喻舞也枹罕音鈇顔師古曰讀曰膚本枹鼔字其字從木金城邑二年令居音零徐廣云里名在金城鴆殺有禁切毒鳥也以毛羽歷飲食即殺人無慮音閭遼東邑馮翊與職切郡名决録注曰馮馮翊明也追尾如字章懷注尾猶㝷也掩截非結切說文斷也崤谷胡交切山名在洪農澠池孫臏婢忍切孫武之後爲齊威王謀師澧中里弟切水名出武陵充縣歷山輓武逺切引之也字或從手漢紀四十二通鑑卷五十起柔兆執徐盡閼逢困敦即丙辰至甲子凡九年孝安皇帝中元初三年逴丁角切越嶲息委切郡名謂越過嶲水四年當闐徒賢切又徒見切西羌羌别種榆鬼羊朱切羌種名敞昌兩切五年髙勾驪音鈎梨驪或作麗在遼東之東南與濊貊相接武帝時開其也屬元莬郡府帑它莽切又音奴府物所聚也帑藏金帛之所虚耗火到切損也瓦解胡買切散也受賕渠尤切以財物枉法相謝也髠苦昆切去髪刑六年邸第丁禮切倉頡篇曰邸舎也說文屬國之舎也前書音義曰第謂之甲乙之次第乘堅驅良並如字堅謂好車良謂善馬墨子曰聖王爲衣服之法堅車良馬不知貴也臧否上兹郎切善也下府九切不也榆上弋渉切下音踰西夷國名揲榆澤因以爲號武帝開置縣屬益州役屬殊玉切附也索班蘇各切姓也鄯善時戰切本樓蘭國昭帝時更名爲鄯善西域胡國月氏音支西域國名莎車素何切西域國名于窴徒賢切又徒見切與闐同西域胡國永寧元年玉門關在敦煌龍勒縣府藏才浪切物所蓄也下同要功於堯切尤還並平聲鄯善王名鐔顯音㝷姓也顯其名綦毋參上渠之切下微夫切姓也難曰乃旦切下同儆居影切戒也軫章忍切駱驛上音洛下音懌不絶也索山客切求也覬覦音兾俞覬幸也覦欲也幸得其所欲并力卑政切兼也並也沈氐丁奚切續漢書曰羌在上郡西河者沈氐也萇直良切撣國唐干切西南夷國名東觀作檀幻人胡辨切化也即吞刀吐火之術其至鞬九言切鮮卑種名詬呼漏切博雅云罵也恚於避切怒恨也允街音鈆皆金城邑首施猶首䑕也建光元年歛力驗切殯也與殮同和熹許其切和帝后也謚法有功安人曰熹戹於革切災也或作厄穰如陽切豐熟也翊丗與職切縑囊上音兼下奴當切絹袋也撲殺上弼角切舉而擊之如格殺也蛆子余切蠅乳肉中也扞侯旰切衛也或作捍守相悉亮切守謂郡守相謂諸侯相也謇諤五各切直言也盎一浪切刎武粉切斷也扑普木切小擊也候伺相吏切奄闚也肉袒徒旱切脫衣而露肉也輿襯𥘉覲切親身棺也訊鞫上思晉切問也下居六切窮也北芒莫郎切山名在河南雒陽鈎盾食尹切按百官志云官者典諸近池苑囿遊觀之處穢於廢切惡也嬖倖博計切得愛也推燥上通回切下先到切謂進於乾處也屬之欲切委也瓌公回切諠譁上許元切下呼瓜切驚嘑也亦作讙翟酺上直格切姓也下薄胡切又蒲故切紱音弗綬也顙蘇黨切說文頟也墯徒果切落也帑藏上他莾切又音奴藏金帛之所也下才浪切物所蓄曰藏脅虚業切以威力相恐也鸞鳥鸞音萑見帝紀永康元年又西夷傳音爵武威邑錮音固禁錮也邠音彬魴符方切祋諷丁外切又丁活切姓也趣七逾切嚮也顧復顧如字復芳目切解見上黠下八切桀點延光元年歐刀一口切刑人之刀緄古本切控弦口弄切滿引也盆溢夷質切滿溢蝗蝝上音皇下余專切說文復陶也一曰蚍蜉子一曰蝗子駢馬部田切駕二馬也亭傳張戀切驛遽也賂遺上落故切遺也下弋季切贈也頓踣蒲墨切僵也猥烏賄切鄙也嫣音偃泄先列切漏也霽子禮切又子計切雨止也眚所景切災也過也詆欺丁禮切毀訾也袁閬本作閎淑神六切倨居御切傲也汍濫氿音軌本作汎濫音檻爾雅曰側出汎泉正出濫泉挹一入切㪺也淆五交切混淆玼吝玼音此當爲疵作玼者古字通也章懷說隤然徒回切柔貌也二年旄牛謨𫀆切西南夷種名璫都郎切臧錮上兹郎切下音固有臧賄禁錮之人也惲於粉切溷胡頓切亂也薁鞬上於六切下居言切匈奴日逐王號纁許云切淺絳色三年調發徒釣切調謂計發也激訐居謁切訐發人私也懟直類切怨也慷慨上苦莾切下苦蓋切悲歎也酖直禁切毒酒歙迄及切邴吉兵永切姓也比景必寐切日南邑如淳曰日中於頭上景在巳下故名之宿留上音秀下力救切行相持也或作倀丑良切怫然符勿切鬰也輾轉上知輦切下陟逺切反側也漢紀四十三通鑑卷五十一起旃蒙赤奮若盡昭陽作噩即乙丑至癸酉凡九年孝安皇帝下延光四年下邳符悲切東海邑有上邳故曰下邳宛於元切南陽邑葉音攝南陽邑親臨力禁切哭也乃風讀曰諷更相工衡切互也林慮音閭河内邑林本作隆避殤帝諱改作林興渠興虚陵切姓也渠其名汎孚𣑽切截昨結切斷也綬是酉切又承呪切韍維也卒被音猝忽也不中竹仲切當也㦸几劇切有枝兵也駰音因瑗于願切惑蠱公户切疑也孽魚列切說文庶子也猶豫猶音由又音右獸名性多疑故謂不决者稱猶豫祗翹移切華隂户化切京兆邑華山在其南掾俞絹切官屬瞽瞍上公土切下蘇后切舜父名按孔頴逹傳云無目曰瞽舜父有目不能分別善惡故時人謂之瞽配字曰瞍瞍無目之稱失行下孟切頴考叔餘頃切姓也春秋鄭莊公時典封疆者覲渠吝切見也孝順皇帝上永建元年劾紇則切法有罪也銜轡上乎監切馬勒也下兵媚切馬轡也臧罪則郎切受賄曰臧誣武夫切誣枉憤房吻切懣也喑嗚上於今切又於甘切啼極無聲拘繫上舉朱切拘執也下吉詣切繫􅮗也叱昌栗切呵也東箱如字箱序也字或作箱顗魚豈切幡孚袁切幟也容容容容猶和同也悖音背又蒲没切逆也東且彌且子余切西域國名下金且同音二年曅筠輙切瘞於計切幽薶也屈橈女巧切又女教切曲也楷苦駭切萬乘石證切萬乘兵車萬乘謂天子也庂古測字褐胡割切短衣閽呼昆切說文常以昏閉門隷也自售承呪切賣去手也瓊渠營切戹與厄同災也隘烏懈切狹也嶢嶢丘交切說文磽也磽确謂之磬石皦皦吉了切明也皎也負笈極入切又極曄切書箱也四年礱力公切沃野烏酷切沃者灌漑也漑古代切灌也選懦仁兖切前書音義曰選懦柔怯也﨑去冝切章懷云﨑字叔峻華隂人也于窴徒賢切又徒見切與闐同西域國名抅彌續漢書寧彌國王本名抅彌前書作扜彌扜音烏六年慠很上五到切下胡墾切謂慠慢而很戾也沈景式荏切姓也箕踞下音據箕踞謂伸其兩脚而坐亦曰箕踞其形似箕峙丈里切立也詰責去吉切問也誚責也膏腴上古勞切下容朱切肥饒之地也頽杜回切下墜也翟酺上徒歷切姓也下薄胡切其名盟詛莊助切鄭元注周禮云大事曰盟小事曰詛探他含切取也𡵨嶷鄂力切詩云克岐克嶷鄭氏箋云岐岐然意有所知也其貌嶷然有所識别也俔天苦見切說文譬喻也詩云文王嘉止俔天之妹從容七㳟切從容休燕也螽斯音終蟲名蚣蝑也陽嘉元年髠鉗上苦昆切􅚎髮也下其廉切以鐡束頸也睚眥上語懈切下仕懈切瞋目貌項背音軰謂前後相頋也疾疢丑忍切又丑刃切病也踴躍上余壟切距踴也下弋灼切距躍也洗滌上先禮切濯也下徒歷切盪也牋則前切說文表識書也駮北角切乖舛也剗戾楚限切剗削也戾乖也矯枉上居夭切下紆往切正曲也剥彼覺切廡音武堂下周屋也顗語豈切二年台階上吐來切下古諧切春秋元命包曰魁下六星兩兩相比曰三台前書音義曰㤗階三台也黄帝㤗階六符經曰㤗階者天之三階也累鐘諸容切六斛四升曰鐘春秋左傳曰四升爲豆四豆爲區四區爲釡四釡爲鐘之奉房用切秩禄也熒惑上户扄切下胡國切熒惑星名南方主夏爲禮視禮虧失不行夏令則熒惑逆行天苑於阮切星名參所今切星名玉井如字天官書曰參星下四小星爲玉井白虹户工切按郎顗上章云凡日傍氣色白而純者名爲白虹貫日㬥龍薄報切晞也咀嚼上在吕切下疾雀切含味而噬囓也怵愓上勑律切下他歴切憂懼也捶撲上主蘂切下普卜切以杖擊也狼狽狽博蓋切獸名狼屬也生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽喁喁魚容切衆口向上也臆於力切胷臆顓與專同顚仆方遇切頓也一跌徒結切踼也下同卒癉上子恤切下當但切蹉跌上倉何切又千个切蹉跌失時也潦盧皓切雨水大貌蹔與暫同猶卒也馳騖亡遇切說文亂馳也魯鈍徒困切謂稚魯而頑鈍也民罷音疲渾天儀户衮切與混通靈憲序曰昔在先王將歩天路用定靈軌㝷緒本元先準之于渾體是爲正儀恬憺上徒兼切下杜覽切靖也安也忤五故切逆也紓難商居切說文緩也通作舒一曰解也漢紀四十四通鑑卷五十二起閼逢閹茂盡旃蒙作噩即甲戌至乙酉凢十二年孝順皇帝下陽嘉三年否塞部鄙切亦塞也膳時戰切具食也逺于願切離也圗䜟楚䕃切符命之書鬼魅明祕切說文老精物也瑕玷上河加切玉小赤也下都念切玉病也﨑丘冝切四年巨覽巨􅍫許切姓也覧其名永和元年象林蠻並如字日南郡象林縣之蠻夷也横爲胡孟切不順理餐蘇昆切說文餔也謂晡時食又音千安切詡况羽切澧中里弟切澧水名岀武陵充縣歷山漊中力主切漊水名在武陵蠻中二年更相工衡切互也交阯音止郡名字夲作趾應邵云漢官儀曰始開北方遂交於南爲子孫基阯也昉分兩切三年并力卑政切兼也並也輯與集同爾雅曰集和也卒𬒳㫖猝忽也瘴之亮切癘也比至必寐切反間居莧切諜也衛鞅倚兩切商鞅也蘧政求於切姓也或作遽妒都故切嫉妬也矯舉夭切歙迄及切四年猥烏賄切濫也鄁殿上蒲對切下多薦切春秋齊國之別都也五年車紐女九切南匈奴勾龍王名後立爲單于狐疑狐獸名毎渡氷河且聽且渡故謂不决者爲狐疑部抑鞮丁奚切匈奴右賢王名且凍子余切西羌種名塢安古切通俗文曰營居曰塢耽都含切鈔楚教切略取也埋根謨皆切瘞也章懷注埋根言不退雜遝逹合切䢔遝也六年射姑音夜山名孛蒲昧切又蒲没切妖星讌伊甸切合飲也䪥露䪥下拜切曲名田横門人悲歌辭也誤中竹仲切當也襁負舉兩切說文負兒衣徼功古堯切徼倖也酋豪才由切長也搏手伯各切拊也更之工衡切猶歷也耗費上火到切下芳未切謂損耗財費也帑藏上他莾切藏金帛之所也下才浪切物所蓄也飯含户暗切口實也舊作唅白虎通曰大夫飯以玉含以具士飯以珠含以貝也珠貝博蓋切說文海介蟲也居陸名焱在水名蜬象形古者貸貝而寳龜銀鏤郎豆切彫刻也闇與暗同頑嚚上五鰥切下魚巾切左傳心不則德義之經爲頑口不道忠信之言爲嚚悖逆蒲昧切又蒲没切亂也勞問來到切慰也釁許慎切罪釁歸首式救切首猶服也臧穢上子郎切受賕曰臧下烏外切惡也移檄刑狄切以木簡爲書長尺二寸弭緜備切止也漢安元年薁鞬上於六切下居言切匈奴王號栩况羽切羨延面切又似面切豺狼上牀皆切狼屬狗聲下盧當切說文似犬銳頭白頰髙前廣後狐狸上洪孤切說文䄏獸也下陵之切說文伏獸似貙阿衡阿烏何反伊尹號也謂保其國如阿平其國如衡貪叨他刀切與饕同貪財爲饕大辟婢亦切死刑也种暠上持中切下古老切壘魯水切軍壁下同釡秦甫切鍑屬喘息尺兖切疾息也參􅒋力全切安定邑下邳貧悲切東海邑應劭曰邳在薛其後徙此二年兠樓儲兠當侯切儲陳如切南匈奴守義王名後立爲單于建康元年琚斤於切鸇隂鸇諸延切武威邑因水以爲名前書屬安定郡鸇作鶉盤互胡故切盤結而交互也緄古本切幾巨依切近也翕然許及切盛也衆也操檝上千髙切持也下即渉切舟櫂也忿敷粉切又敷問切怒也孝沖皇帝永嘉元年蒜蘇貫切纉作管切伉音抗行邪似嗟切不正也搔頭蘇曹切西京雜記曰武帝遇李夫人就取玉簪搔頭自此宮人搔頭皆用玉從容七㳟切從容休燕也慘怛上七感切慼也下當割切􅉃也牢稟力錦切與廩通前書音義曰牢廪食也古者名廩牢離湳乃感切羌種名涿竹角切涿郡之邑盱台音吁怡臨淮邑畏懦乃亂切又徒卧切弱也馳傳張戀切傳以木爲之長尺五書符於上又以一板偕封以御史印章所以爲信馳傳謂奉之而疾行也出蘇鴞演義應承於陵切姓也沮材汝切止壞也漢紀四十五通鑑卷五十三起柔兆閹茂盡柔兆涒灘即丙戌至丙申凡十一年孝質皇帝夲𥘉元年掾俞絹切官屬溢弋質切滿也漂紕招切浮也跋扈上蒲撥切下侯古切猶強梁也或說扈竹籬也水居者於水未至作竹籬以候魚之入水退小魚獨留大者跳跋籬扈而出故言跋扈號哭胡刀切大哭也泄先列切漏也大鴻臚凌如切韋昭曰鴻大也臚其陳序也欲以大禮陳序於賔客其說與應劭異蠡吾音禮涿郡之邑縱横上子用切下胡孟切放縱而不順理也懾之渉切懼也匽氏音偃史記匽姓咎繇之後孝恒皇帝上之上建和元年遒亭子由切章懷曰本傳作親紀傳不同蓋有誤回橈女教切曲也韜書他刀切藏也屬心之欲切委也孽魚列切何休曰孽賤子也猶木之有孽生紱音弗蒼頡篇紱綬也資斧如字前書音義曰資利也汜宮符咸切姓也臧罪子郎切受賄曰臧忤五故切逆也左悺上音臧可切章懐曰說文悹憂也音工奐切今作心旁悺亦悹字也今相傳音綰即左回天鮪羽軌切劾胡得切法有罪也械胡介切杻械也亦要要讀曰腰鈇鑕上方矩切或作斧下音質鐡椹也提章鉞王伐切提章謂所上章鉞斧也章懷說腐生扶雨切腐生者猶言腐懦也赤幘側革切髪有巾者一說古賤服二年板楯食尹切蠻夷國名解見上三年淑神六切緄音昆專本或作敷菀康於阮切姓也瑾渠遴切妻之七計切以女嫁人和平元年陽翟直格切頴川邑蠱惑上公土切臬桀死之鬼爲蠱惑亂也九阪甫逺切坡者曰阪拓他各切開也饕他刀切貪財爲饕掠栲苦洁切亦掠也遺之弋季切贈也敺於口切捶擊也調徒弔切賦也榜蒲庚切笞擊也無猒於鹽切左傳貪惏無厭箠楚止蘂切以鞭箠而苦楚之也㢮施是切解㢮也元嘉元年呵叱上虎何切下昌栗切發怒聲譴去戰切責也警蹕上居影切下卑吉切警者戒肅也蹕所以清道止行人也愷口改切怢不他没切忽亡也耽都含切樂也箴諸深切誡也括囊上古活切下乃剛切易曰括囊無咎無譽括結也結囊不言持禄而巳垢翫舉后切垢惡也補䘺直莧切禮記曰衣解也裳椗裂紐箴請𥙷綴枝柱陟主切牚也葉公失渉切戰國楚葉縣公也掎奪居蟻切從後牽曰掎闇與暗同妒當故切與妬同擯必刃切棄也熊經鳥申熊胡弓切莊子刻意篇云熊經鳥申按成元英䟽吹冷呼而吐故呴暖吸而納新如熊攀木而自經類鳥飛空而伸脚斯皆導引神氣以養形也呴音况于切馬駘逹來切說文駘馬衘脫拑勒何休公羊傳注曰柑以米銜其口也音巨炎切勒馬轡也鞬輈上居言切下音舟輈車轅鞬猶束也二年癰於容切疽類著創上執略切置也俗作著非是創音瘡覈下革切實也輸僰蒲北切于窴國將也永興元年蝗音皇螽也噬食時制切㗖也恚於避切怒也謗讟上𥙷曠切誹也下徒俗切怨也共鯀上九容切下古本切共工伯鯀也桀跖之日切夏桀盗跖也黥首渠京切墨刑在面也或作剠質子職利切以子結信也二年朐山音劬在東海郡永壽元年檀車徒丹切兵車也詩檀車嘽嘽芟刈上師衘切芟夷也下魚胏切斬刈也窟苦骨切窟穴麑場研奚切鹿子一曰狻麑窀穸上朱倫切厚也下祥亦切夜也厚夜猶長夜也縯音衍且渠子余切匈奴王號龜兹音丘慈上郡之邑顔師古曰龜兹國人來降附者處之於此故以名云金鐻郭璞山海經注鐻音渠金石器名未詳形制酹郎外切以酒沃地廏居又切馬舎二年歠仇水歠昌恱切鮮卑中水名去代郡髙栁縣北三百餘里嬴音盈泰山邑漢紀四十六通鑑卷五十四起強圉作噩盡昭陽單閼即丁酉至癸卯凡七年孝桓皇帝上之下永壽三年兒式五奚切姓也蝗螟忙經切蟲食榖葉者杼軸上直吕切下逐六切機具也軸本作秞沙礫狼狄切小石也蕭牆並如字鄭康成曰蕭之爲言肅也牆謂屏也君臣相見之禮至屏而加肅恭焉是以謂之蕭牆愍眉殞切憐也鍥薄口列切刻也謡餘招切爾雅徒歌謂之謡瞰苦濫切視也鳥鈔楚交切又𥘉教切略取也卒有蒼没切忽也逺呼大故切亦作嘑延熹元年熹音禧璜胡光切大雩雲俱切羽舞也一曰吁嗟永雨之際一曰逺爲百榖祈雨度遼徒故切解見明帝永平八年塉埆上秦昔切下苦角切又音覺謂薄土也租更工衡切更謂卒更錢也悍侯旰切猛悍屠各直於切匈奴種名即休屠類也谷蠡上音禄下音邌匈奴王號挑他彫切挑猶取也獨取其名种暠古老切烽燧上敷容切下徐醉切候表也邊有警則舉火夜曰烽晝曰燧二年宛於元切南陽邑比屋頻寐切屋相近也鴆之直禁切鴆毒鳥以其羽歴酒食人即死郝絜呵各切姓也商帝乙時有子期封太原郝郷後因氏焉林慮音廬本隆慮避殤帝諱改林盧河内邑風兾風讀曰諷鉗塞上其廉切鐡有所劫束下悉則切窒也親與音豫單超時戰切姓也具瑗上衢遇切姓也下音援即具獨坐放橫胡孟切恣也齧倪結切噬也惲於粉切廏騶上居祐切馬舎也下側鳩切廄御也彪𥙷休切盱况干切比景於丙切日南郡之邑如淳曰日中於頭上景在巳下故名之攬轡上魯敢切撮持也下兵媚切馬轡也猥烏賄切猶濫也札側八切簡札穉直利切肱古薨切著音注曇徒含切纁許云切淺絳色榻託盍切牀也負笈及入切又巨業切書箱也漬前智切浸也醊酒竹芮切祭酹精廬音閭精蘆即精舎也韜面他刀切藏也眩疾黄練切說女目無常主也縑音兼絹也搤殺於側切捉也諦音帝審也沐茂莫卜切姓也戇陟降切愚也糅女救切雜也抵金音𥿄投也勒姐子野切又音紫羌種名酋豪自秋切長也稸勑六切積也斌悲巾切緯象于貴切纏次媟黷私列切狎慢也三年玹熒絹切複壁芳六切重壁也允街音鈆佳金城邑四年盛允承正切其先姓奭避元帝諱姓盛又音成雍丘於用切陳留邑古杞國也孛蒲昧切又蒲没切彗星也先零音憐西羌種名奉讀曰俸秩禄也貣吐得切從人求物爲貣施人者爲貸緹騎杜奚切又音體古兵服之遺色若邪余遮切在會稽山隂東南湟中音皇水名在金城臨羌塞外營塢安古切說文小障也一曰庳城唐突陁没切說文犬從穴中出本作揬釋云觸也邠岐上悲巾切或作豳下翹移切右扶風羙陽縣即豳也歧在美陽證切柸布回切說文曰㔶也大駔子黨切市㑹也㑹一作儈言㑹合市人蘧瑗上巨居切下于願切字伯玉儁才子峻切智過千人曰儁隗五罪切袂彌蔽切䄂也鷹於陵切鳥名鸇諸延切鷐風也枳棘上掌氏切說文木似橘周禮曰橘踰淮北而爲枳下紀刀切說文小棗叢生者奉扶鳯切禄秩也鄠侯古切右扶風邑慰勞盧到切慰勉也秣馬莫葛切食馬穀也蓐食儒欲切謂牀褥中食批抵上片兮切下之氏切說文側擊也髠剔他歴切抉也大憝徒懟切惡也元惡之人大爲人之所惡也肺石方廢切肺石赤石也周禮秋官云左嘉石平罷人右肺石逹窮人閶闔上蚩良切下胡臘切說文天門也䧟穽才性切穿地以䧟獸爲穽罘置音浮嗟說文兎網也絓古賣切通作罫八年苦音户又如字陳國之邑前書屬淮陽國晉大康地記云城東有頼郷祠老子所生地悝音恢又音里剽匹妙切剽悍也癭陶一井切鉅鹿邑貪婪連含切亦貪也檻車户黤切載囚車邴歜上音丙下昌欲切春秋齊懿公時人參乘參或作驂三馬曰驂乘石證切罕姐罕許旱切姐音紫羌種名溷軒胡困切圊也緄古本切掘其勿切搰也賕上渠尤切以財物枉法相謝也餌仍吏切球音求械胡介切桎梏也堙井伊眞切塞也逺于願切離也愷苦亥切泯絶弭盡切滅也吐茹音汝又如庶切詩烝民曰柔亦不茹剛亦不吐蠢動尺尹切說文蟲動也鑊黄郭切鼎大而無足阤賞是切壞也風裁才代切下清裁同九年􅎒趾昨結切斷也適屨如字適猶從也妃合滂佩切匹也通作配文罽居厲切魚罔釦器音口以金銀飾器也盟詛莊助切鄭康成注周禮云大事曰盟小事曰詛蠡吾音禮中山國邑前書屬郡揣𥘉委切瑨即刃切岑晊音質彪補休切屣履所爾切又所寄切屣不躡跟也宛於元切南陽邑冨賈果五切冨商也汎孚𣑽切雕鏤盧候切說文剛䥫可以刻鏤也瓆職日切翟超亭歷切姓也暠古老切瞑目莫定切閉也悁悁縈年切又吉縁切恚忿也歐刀一口切刑人之刀也嗁訴逹兮切號也禎陟盈切禎祥螽斯音終螽斯蚣蝑也周南之詩凡物有隂陽情慾者無不妬忌性蚣蝑不爾故詩人取以爲興吐妖於喬切妖災也春秋左傳地反物爲妖字或作祅妲已當割切有蘇氏女商紂妃也耆欲耆讀曰嗜自首式救切自服其罪誹訕上敷尾切說文誹謗也下所晏切蒼頡篇曰訕非也寒蟬並如字寒蟬謂寂黙也楚詞曰悲哉秋之爲氣也蟬寂漠而無聲酆敷中切匄施居太切乞也夫餘馮無切或作扶蠻夷國名解見上漢紀四十八通鑑卷五十六起強圉恊洽盡重光大淵獻即丁未至辛亥凡五年孝桓皇帝下永康元年祋祤上丁活切又丁外切下音詡左馮翊邑鸞鳥音雚西羌傳又音爵武威邑夫台音扶夫餘王名諝私吕切譎古穴切詐也喁喁魚容切如魚口上見㝢于矩切下五官朱瑀音同嬀皓矩爲切虞舜居嬀汭其後因以爲氏饕餮上土刀切下他結切貪財曰饕貪食曰餮三木囊頭並如字三木謂項及手足皆有械更以物蒙覆其頭也探湯上他含切喻去疾也桎梏上職日切下姑沃切械也木在足曰桎在手曰梏鉤黨古侯切鉤黨謂相牽引其徒黨也傳舎知戀切驛舎也儵式竹切解瀆徒谷切亭名按志在安平國饒陽縣淑神六切萇直良切孝靈皇帝上之上建寧元年荼蓼上音徒苦荼也下音了辛菜也詩國風曰誰謂茶苦其甘如薺周頌曰未堪家多難子又集干蓼輯音集爾雅曰輯和也躊躇上除留切下重株切躊躇者猶豫也挾脅上徼頰切持也下迄業切或作脇兩膀也從横上子容切或作縱下胡盲切或作衡南北曰縱東西曰衡癰疽上於容切腫也下千余切癕疽皆惡瘡長鏃千木切鏑也努力暖五切方言勉也大呼火故切一作嘑中藏才浪切猶内藏也調徒弔切調謂計發也鄠侯古切右扶風邑轉眄匹莧切顧盼也令鮮音仙水名在張掖觻得縣界一名合黎水一名羌谷水也觻音鹿涇陽古靈切安定邑輭乳逺切柔也軟弱之稱瞽言公户切瞽非無目也不察其事而言之如無目之人折衂女六切傷敗曰衂汙野烏故切穢也剽略匹妙切刼略也邢乎經切說文周公子所封地近河内懷甘澍朱戍切時雨澍生萬物或作䨙上占之廉切說文視兆問也通屬珠玉切連也戢戈阻立切止也獷敵古孟切又俱往切若犬之獷獷不可附惡貌也令居音零徐廣云里名在金城鯁鯁與梗同病也大雅云至今爲梗創毒上楚亮切傷也或從刃虺虚鬼切嬈乃了切椎席上傳追切擊也或作槌匈匈許容切喧擾之意又上聲冘豫上音淫穴穴行貌穴豫不定也亦音由通作猶嚻嚻牛刀切諠也字作囂諠譁呼瓜切驚呼也昕許斤切颯音立耽都含切耽樂也内奏内讀曰納共普共讀曰龔姓也喢血色洽切說文歠也或作㰱棨信上康禮切棨形如㦸有幡書之上所以傳信挌殺古栢切本作格擊也複道芳目切重也讌於甸切合飲也騶甾尤切騎士也蹋踧上逹合切下子六切踐也又逐也稟假不禀力錦切或作廩假音價貸也謂不以禀餘相貸不音否峭玉七笑切烏亘大人蘇僕延自稱峭生二年霹靂音匹歷史記曰霹靂陽氣之動也斷斷都玩切决也餗送鹿切虞翻云八珍之具也馬融云䭈也鄭康成云菜也鍵之然切栅測革切編木立栅艾魚肺切或作刈標榜上卑遥切標榜猶相稱揚也榜與牓同翌與職切檀敷徒丹切姓也蕃嚮上音皮姓也章懷釋睚眦上五懈切廣雅曰睚裂也下才賜切前書音義曰瞋目貌也明廷如字猶明府也戲子然戲許冝切姓也讞語蹇切議罪也又魚列魚戰二切林慮音閭河内邑解見上隗五罪切輻湊上方六切車輪轑也下千候切本作輳輻共轂也謂衆輻之所輳輜軿輜莊持切軿車也軿音駢字林云載衣物車前後皆屏蔽者訐居謁切告訐篲徐醉切埽竹也碭音唐又徒浪切梁國之邑橑蓮條切理也謂嫽戲三年蓐寑儒欲切牀褥也烏滸音虎南方夷號也能以鼻飲水漢紀四十九通鑑卷五十七起元黓困敦盡上章涒灘即壬子至庚申凡九年孝靈皇帝上之下熹平元年明解胡買切曉也慤苦角切謹也愿也祔符遇切說文後死者合食於先祖擣椒兹消切本作茮莍實也似榝音殺榝如茱茰本草味辛有毒蚩充之切笑也與嗤同暠古老切瘞於計切幽薶也廥古外切芻槀藏也藉夜慈夜切薦地句章句音鉤㑹稽邑旻眉巾切三年募莫故切廣求也四年比周頻寐切比近也周密也三互灋古法字三互謂㛰姻之家及兩州人不得交互爲官也章懷說鎧馬可亥切又口漑切甲也閡牛代切與凝同螟忙經切蟲食榖葉者于窴徒賢切又徒見切與闐同西域國名拘彌續漢書寧彌國王本名拘彌西域種也五年顒魚容切雩雲俱切請雨祭名五屬珠玉切謂斬衰齊衰大功小功緦麻也六年趣埶趣七逾切嚮也埶古勢字風喻風讀曰諷奉禄房用切秩禄也泥乃計切滯䧟不通疥搔上音介下新到切博雅曰創也字作瘙瘭疽上卑遥切疽病也下千余切癰也螘語綺切蚍蜉也旰食居案切晚也春秋左傳伍子胥曰楚君大夫其旰食乎厮輿息移切前書音義曰厮微也輿衆也節傳節者操也瑞信也謂持節者必盡人臣之節操長一尺二寸秦漢以下改爲旌幢之形漸長數尺傳者木爲之長尺五書符於上所以爲信傳音轉並見唐蘇鶚演義輜重上側持切下直用切輜載衣車也重載物車也行者之資緫曰輜重􅖢乙六切劫質訖業切協也通作刦強取也本傳劫質又有作劫執者持也鄃音輸清河邑歐血一口切吐也光和元年顥下老切投蜺研奚切又倪結切亦作霓演孔圗曰蜺者斗之亂精也失度則投蜺見投應也媵以證切媵御閹尹衣撿切宮中主門者搢紳即刃切紳帶也搢挿也挿笏於紳也或作縉者淺赤言帶之色畮古畝字弭綿婢切息也郃音合又音閣璜胡光切詰狀去吉切問也戇陟降切愚也髠鉗上苦昆切􅚎髪也下其廉切以鐡束其頸左道並如字禮記曰執左道以亂衆殺無赦鄭康成注云左道若巫蠱也祝詛上職救切詛也亦作呪下莊助切訓也斗筲所交切竹器也斗筲喻小而不大也承睫即渉切目睫也說文目旁毛蟬蛻輸芮切又吐外切說文曰蛻蟬所解皮也滓濁上莊仕切下直角切澱淤不清貌貯展吕切積也居也二年瞋目昌眞切怒目也磔尸陟格切裂也拊髀部禮切股也辜榷訖岳切前書音義曰辜障也榷專也謂障餘人賣買而自取其利莫大羽吐盍切阬客庚切壍也窒陟栗切塞也箠朴上主蘂切下普木切擊也抆淚亡粉切拭也䑛甚爾切說文以舌取物鴟處脂切鴟鳶梟古堯切不孝鳥也扞侯旰切扞格也撞直江切又文降切擊也闥土曷切博雅闥謂之門離間居莧切嗝也馘截古獲切截耳爲馘湯鑊黄郭切鼎大而無足曰鑊以鬻人鬻古煑字轘裂胡慣切車裂人乖刺來曷切戾也項領户講切詩駕彼四牡四牡項領鄭氐箋云項大也四牡者人所駕今但養其領不肯爲用諭大臣自恣主不能使也咀嚼上在呂切含味也下疾雀切噬囓也飛條音迢飛書也惆悵上丑鳩切失意也下丑亮切望恨也儵式竹切翹足祈遥切企也三年孛蒲昧切又蒲没切妖星罼圭壁吉切說文田罔時作東西二罼苑東苑周一千五百歩西苑周三千三百歩皆罼羅之琁徐宣切排囊蒲拜切囊袋也鉦諸盈切鐃也漢紀五十通鑑卷五十八起重光作噩盡強圉單閼即辛酉至丁卯凡七年孝靈皇帝中光和四年騄驥廏騄龍玉切廏居祐切騄驥善馬也廏馬舎也調徒釣切謂計發也販賣方願切說文買賤賣貴者商賈音古行賣曰商坐販曰賈稸勑六切積也通作畜導行徒皓切導引也貢獻外别有所入以爲所獻者之導引也繒慈陵切帛也藏中才浪切物所蓄也姑息並如字姑旦也息安也苟且安也酖殺直禁切以鴆鳥羽毛歷酒飲人立死五年蠹害都故切蟲食木爲蠹愬桑故切說文告也與訴通苑於阮切苑囿騘馬麤叢切馬青白雜毛也六年跪巨委切䠆跪也首過式救切自狀其過誑古况切欺也不解音蟹不曉也滋蔓上音兹下音萬謂滋蕃而蔓延也春秋傳無使滋蔓覘視癡亷切又敕豔切窺也訛言五禾切謬也或作僞中平元年標幟尺志切又音試燔符袁切爇也器械胡介切器之緫名有盛爲器無盛爲械轘轅胡關切關名險道也在河南緱氏縣東南惲於粉切諝冩與切栩音詡徒跣蘇典切足親地也善者不不讀曰否束苣音巨束葦燒之間岀居莧切乘間而出也大呼火故切呌也舉燎盧皎切放火也鼓譟先到切羣呼也曹操七到切魏國之建始於此任俠上汝鴆切下胡頰切任謂任使其氣力俠之言挾也以權力挾輔人也覈論下革切覈考也考實而論之釁許僅切通作舋隙鏬杜郵于求切地名去咸陽十里秦白起賜死於此丕漢改咸陽爲渭城屬右扶風帝識音志記也宛於元切南陽邑頡奚結切琮藏宗切陽翟直格切頴川邑塹七豔切坑也晡奔謨切加申日先零音憐羌種名枹罕上音鈇金城邑湟中義從胡湟胡光切水名在金城臨羌塞外義從胡本大月氏之别種爲匈奴所殺因降漢分散在湟中及令居又數百户在張掖號曰義從胡敦煌音屯皇郡名應劭曰敦大煌盛也紲食上思列切繫也下音飤鷹隼息尹切說文祝鳩也漢書隼作鳶章懷注鳶鴟也鷙脂利切廣雅曰鷙執也凡鳥之勇銳者穰苴上入羊切下子余切戰國齊將司馬穰苴也誚才笑切責也畜官許救切前書音義曰畜牧所在有苑師之屬者置畜官三創音搶又作瘡𥘉良切傷也句就古侯切西羌别種滇吾徒賢切西羌别種之名璆巨鳩切鈍徒困切不利也孫堅無他音三國之呉始見於此西鄂精山五各切西鄂縣名屬南陽郡精山在其南柸布回切㔶也二年蝝余專切字林尹絹切螽子也劉歆云毗蜉子也董仲舒云蝗子僅渠遴切纔也本賈賈讀曰價趣讀曰促賕賂巨鳩切賄也剥北角切削也眭固息隨切姓也苦蝤才由切黄巾賊名九州春秋作章懷注廮陶於郢切鉅鹿邑趫捷丘妖切說文善縁木走之才又音喬捷亟也靳居焮切固惜之也姝邪上昌朱切羙也言反不以此事爲羙乎冒頓音墨特或讀如字匈奴頭曼之子酈商音歷姓也拓吐各切開也斷音短謂割􅎒也左祍如鴆切衣衿向左謂之左祍盪冦徒㾗切滌也取其盪滌冦盗因以爲號豕突上施是切豬也下陁没切言如豬之突出榆中羊朱切金城邑立􅋣續漢書􅋣作堰其義同但體異耳鴟張鴟處脂切鳶也譬䲭之張翅與梟張同義跋扈上蒲撥切丁侯古切強梁也或曰扈竹籬也水居者於水未至大者作竹籬以候魚之入水去小魚獨留大者跳跋籬扈而出故言跋扈鉞王伐切大斧也牣積而振切滿也三年甄舉側鄰切姓也鈎盾音順中官所隷屬少府監天禄並如字章懷注曰天禄獸名漢有天禄閣因獸以取名嵐盧含切四年狄道隴西邑其地有狄種故云狄道瓉才賛切薊中吉詣切字夲作􅠥即漁陽郡牢禀禀筆錦切本作廪力錦切前書音義曰牢廪食也古者名廪牢又云牢價直也綦稠上渠之切姓也下直由切區星虧于切姓也星其名資治通鑑釋文卷第六
