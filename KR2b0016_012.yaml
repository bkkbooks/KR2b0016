  text: 資治通鑑釋文卷第十二
  hash: sha256:d77c15bc1cadb0aaf5b2f1aed968a91b76d5e31821f7308eaf772967314b9828
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_012-1a}
body:
  text: 右宣義郎監成都府糧料院史照晉紀三十一通鑑卷一百九起強圉作噩即丁酉凡一年安皇帝甲隆安元年恟懼上許容切又許拱切射書神夜切謂書其所言而射入城中也風霾謨皆切風雨土也詰終風且霾臨洮吐髙切隴西邑屬秦州紿音殆欺也潰胡對切亂也散也整陳直刃切相屬之欲切聮也南涼秃髮烏孤河西鮮卑人吕光之將也尋自稱大單于西平王建元曰太𥘉史以南涼别之見於此冗從上而勇切下才用切冗從僕射者武賁中郎將羽林郎將之屬滹沱上音呼下音駝一作池水名募莫故切召募也跣走先典切足親地也鞾許茄切履也崔逞丑郢切幢將宅江切幢主也什翼犍音虔載記什作涉噉徒濫切通作啖偵魏丑政切覘也滔天吐刀切漫也沮屈將豫切沮喪而屈辱也觚音孤大忿敷吻切怒也又敷問切櫛風側瑟切猶梳櫛之也內難乃旦切成岌魚及切踊音勇跳踊也鞁皮彼切鞍上被也樂浪音洛狼郡名屬平州􅛪城音牽地名陽璆巨鳩切慷慨上苦莽切下口溉切矜很胡懇切很戾也俗作很恚於避切怒恨也黃榆谷榆羊朱切谷俞玉切地名帥朔律切覬几利切矯相居夭切不正為矯懦奴卧切弱也又奴亂切愷可亥切愈音余伺間上西吏切下居莧切伺候其間隙也張掖音亦郡名屬涼州沮渠羅仇沮子余切沮渠復姓本胸奴沮渠王之後因以為氏羅仇其名耄莫報切年九十曰耄苕藋上徒雕切下徒栗切地名在西平王廞許金切樂涫音洛官酒泉邑屬涼州壘澄壘力軌切姓也澄其名持林切瓦解胡介切散也嗷然牛刀切衆口愁也采稆兩舉切禾自生也餒弩罪切飢也或作餧郛芳無切郭也派水匹拜切派谷名在河東安邑疫營隻切人皆疾也郭黁奴昆切熒惑上户坰切下户沒切星名位在南方凶悍侯肝切勇也演音衍畨禾上音盤下音和武威邑屬涼州休屠城屠音除即漢休屠縣屬武威郡王斐敷尾切駮曰北角切泫氏胡犬切又胡堅切上黨邑屬并州華山户化切山名在洪農華山啖鐡徒濫切武都氐羌名杜瑾渠遴切薑龕口含切成詵所臻切愍王眉殞切銼之麁卧切斫也吐秣音抹鮮卑國所部也鴻臚凌如切官名鴻聲也臚傳也所以傳聲贊導九賔調兵徒弔切調發也晉紀三十二通鑑卷一百十起著雍閹茂即戊戍凡一年安皇帝乙隆安二年南燕慕容德字元明皓少子也寶敗走德稱燕王依燕故事大赦稱元年據廣固史以南燕别之見於此崘盧昆切庫莫奚蠻夷之國號亦曰奚其先東胡宇文部之别種澆洛水澆堅堯切洛歷各切水名乞伏益州乞伏復姓本鮮卑部酋帥號即西秦姓也益州其名鸇武之然切涼地允吾音鉛牙邑名屬金城入晉系涼地長樂音洛魏郡之邑屬司州釁許愼切釁隙也沮材汝切止壞也乙連如字地名長上人名樂浪音洛狼郡名屬平州之説音稅繁畤宫音止繁畤邑名屬鴈門冠軍古玩切摶伯各切索持也酋自秋切長也爾朱羽健爾朱復姓其先契胡部落大人代為酋帥居爾朱川因以為氏羽健其名健渠建切傉檀奴沃切秃髮烏孤之弟蘭汗蘭姓汙其名音寒􅎦遜􅎦祖叢切姓也名犯濮安懿王諱今改作遜呼延鐡呼延復姓按姓纂云劒奴四族有衍氏入中國改為呼延氏鐡其名間道居莧切微道也暗懦暗古暗字懦乃卧乃亂二切多難乃旦切蒯聵上丘怪切下五怪切衛靈公太子詗之火逈切知處告言也龔君賔龔居容切姓也君賔其名西漢末人暴撗胡孟切謂強暴而恣橫也三思蘇暫切論語三思而後行大呼火故切大聲也肺附無它音肺附者如肝肺之相附著也邸丁禮切蒼頡篇曰邸舍也大單于單音蟬虜之天子號言其象天單于然也敦煌音屯皇郡名屬涼州應劭曰敦大煌盛也𥚹急俾緬切挾意仇尼慕仇尼復姓慕其名令支上音鈴又即定切下音祗縣名漢屬遼西郡翕然許及切分至敷聞切分謂春秋分至謂冬夏至津邏即佐切巡也書內音納藏也簳居案切箭羽也合鏑丁歷切允愜詰叶切慰愜也珣音荀孜津之切粗獷古孟切又俱往切若犬之獷獷不可附惡貌也湓口蒲奔切水名在潯陽閭丘羡閭丘復姓羡其名音似面切又延面切標卑遙切記也度量上大故切度者分寸尺丈引也所以度長短也下音亮量者􅕛合升斗斛也所以量多少也黜陟上丑律切貶也下竹力切升也琰以冉切何淡之徒濫切東莞音官郡名屬徐州髀音陛股也倒戈丁老切戈平頭戟也倒戈謂自攻也郗恢郗丑之切姓也恢其名抄掠上𥘉交切又楚教切下離灼切抄掠劫人財物也海音未詳渾屯渾胡昆切姓也屯其名音徒昆切又陟綸切為質職利切以質子結信也裯直由切翟瑥翟音狄姓也瑥其名音溫怒趣音促劾胡得切法有罪戮力音六説文曰并力也嵇康音力幽切入沔彌兖切妻之七計切以女嫁人黃謐彌卑切謝輶以周切又易受移受二切蟬蛻音稅蟬所解皮也晉紀三十三通鑑卷一百十一起屠維大淵獻盡上章囷敦即巳亥至庚子凡二年安皇帝丙隆安三年留忠留力求切姓也本自衛大夫留封人之後拷掠苦若切亦掠也澆河堅堯切城名在西平吐谷渾主阿豺所築浩舋孟康曰浩舋音合門顔師古曰浩音誥浩水名也舋者水流峽山岸深若門邑名屬涼州交址音止亦作趾郡名屬交州杜瑗于眷切大索山客切求也帥衆所律切領也將地鄴魚劫切魏郡之邑屬司州俘芳無切軍所獲也沃野烏酷切上腴田曺嶷魚其切又魚力切辟閭渾辟必益切辟閭復姓渾其名彗星徐醉切又音歲妖星也奎婁上苦圭切下洛侯切二十八宿星名北徇私閏切巡行也庫狄宥音佑庫狄復姓本鮮卑假匹磾之後避難改今姓侯莫陳侯莫陳本後魏别部之號居庫斛真水後以為氏疊掘其月切鮮卑種名窺窬上去隨切小視也下羊朱切私視也法古法切出連都出連復姓都其名嬰城於盈切繞城以自守佺期此緣切詰問去吉切責問也桑椹食荏切桑實也飛梟于嬌切烏名鴟梟也賾士革切封沓干沓徒合切闔門胡臘切脅虛業切胸脅梁父音甫泰山邑屬兖州張訟呼各切張瑛於驚切蒯通苦怪切姓也西漢時人送任如甚切送任猶為質也苛刻音何細也嚻然詐嬌切喧也又五刀切跪呪上去委切下職救切䠆跪而詛呪也奕音亦謝針職深切陸瓌公回切又音回丘尫烏光切張琨音昆醢許亥切肉醬以食音飲堙井音因塞也蜂起古蜂字蜂起如蜂之起言其衆也浙江之列切江水至會稽山隂為浙江翹祈堯切僑居渠嬌切客寄也樗蒲抽居切樗蒲戲也老子入胡作覘癡廉切又敕豔切窺也斫職略切擊也海島覩老切海中有山曰島沈穆大沈式任切姓也周文王第十子𣆀季食采於沈子孫以國為氏填湊倉奏切填塞也奏聚也百揆求癸切度也揆度百事跋扈蒲撥切跋扈猶強梁也遹音聿賑章忍切贍也郭銓音痊齎側兮切持也紿之音殆欺也誑也餉式亮切古作餉幾獲巨依切近也鄼城音贊順陽郡鄼縣之城屬荆州柞溪音昨地名診脈張忍切候脈又視也驗也蕭墻鄭康成曰蕭之言肅也墻謂屏也君臣相見之禮至屏而加肅恭焉是以謂之蕭墻猥居烏賄切猶濫也姦之音干四年苑川於阮切邑名即陳倉縣後魏改今名棠棣大計切字林大內切木名也歔欷上休居切下休既切歎息也拉盧合切折也黁奴昆切騧馬假華切黃馬黑喙索仙索昔各切姓也皓音皓馮翊與職切郡名屬雍州猝能蒼沒切忽也如大之暴出啖徒濫切食也烏紇堤紇下沒切慕璝古回切涿鹿竹角切服虔曰涿鹿山名在涿郡張晏曰涿鹿在上谷灅源魯水切水名出鴈門浹口子協切地名邢浦音刑地名澄直陵切枹罕音膚其字緃木邑名古罕羌侯地允吾音鉛牙邑名漢屬金城郡捫天嶺音門地名彥瑋于鬼切星孛蒲沒切又蒲昧切妖星曰車尺庶切姓也厭塞一涉切廣雅日厭鎮也晉紀三十四通鑑卷一百十二起重光赤奮若盡元􅘬攝提格即辛丑至壬寅凡二年苟子鄯時戰切鄯善復姓其先西域人以國為姓苟子其名鞠仲鞠居六切姓也禕許歸切沮漳蠻沮千余切章諸良切楚地蠻夷國也昶昶丑兩切艦户黤切戰船四方施板以禦矢狀如牢元興元年那頡那諾何切姓也頡胡結切黜弗素後秦姚興之屬國也古延亦後秦之屬國朝鮮朝音潮直驕切鮮音仙以有汕水故名也汕一音訕即周封箕子之地羈屬居冝切讀如羈縻之羈豆代可汗音寒戎酋之稱社崙自號也麩橡上房尤切饘也下似兩切栩實也分迸北諍切散定也泓烏宏切面縛符攫切縛手於後唯見其面塗中同都切地名溧洲音栗地名溧水出溧陽縣射鈎上神夜切下古侯切魯送公子紏歸齊使管仲别將兵遮莒道射中小白帶鉤斬袪起魚切衣𬒮也晉侯使寺人披伐蒲重耳踰垣而走披斬其祛南桁寒剛切與航通方舟也駕方舟為嬌在國之南故名南桁舫甫往切兩船曰舫覬音兾彥璋止良切縊於計切經也殯必刃切殯殮也諶是壬切鞬居言切晃胡廣切上邽音圭天水邑屬秦州覘癡廉敕豔二切窺也餽求位切䬲也汾東扶云切汾水之東水出太原蹊徑胡雞切亦徑也浮梁吕張切水橋也蒲阪甫逺切河東邑屬司州有雷首山夷齊居其陽所謂首陽山舉烽敷容切燧候袁也邊有警則舉火鼂崇􅏯馳遙切古朝字竺謙之竺張六切姓也娀娥上息弓切下五何切貴嬪音頻周禮有九嬪九御鴆直蔭切毒烏絞古巧切縛也公孫瓉公孫復姓出自黃帝之後贊藏旱切洸古黃切又烏光切愔揖淫切晉紀三十五通鑑卷一百一十三起昭陽單閼盡閼逢執徐即癸卯至甲辰凡二年安皇帝戊元興二年舸賈我切大船也方言南楚江湖謂之舸皇璆皇胡光切姓也璆其名染幽切韓􅒲竹角切隱核下革切實也訣古穴切土瘠秦昔切薄土也傉檀奴篤切隆藉慈夜切猶賴也窘巨殞切迫也姚詰去吉切郭黁如昆切奔古奔字張掖羊益切郡名屬涼州羈縻上居冝切下糜為切羈馬絡頭也縻牛紖也言牽制之故取諭也之説音稅誘也九錫九錫一曰車馬二曰衣服三曰樂則四曰朱户五曰納陛六曰虎賁七曰斧鉞八曰弓矢九曰秬鬯王謐音密庾庂庾以主切姓也本堯時為掌庾大夫因以為氏庂名音側雍州於用切以其四山之地故以雍名焉瓦解胡介切散也璽綬是酉切印組也珍之音真孔撲匹角切恤之辛律切憂也三年左昭右穆昭音韶父昭子穆孝經疏云昭明也穆恭也故昭南向穆北句歡譁上許元切亦作喧下呼瓜切謬眉救切妄言擲它歷切發擲也春菟同都切又音兔更繕時戰切治也毛璩強魚切甄季之甄側鄰切姓也或音堅刀逵刀丁聊切姓也東莞音官郡名屬徐州愴然楚亮切悲也傷也顗魚豈切紿之音殆誑也厭勝一涉切廣雅曰厭鎮也橙丁鄧切牀屬詰旦去吉切平旦也以徇辭峻切行示也梟堅堯切挂首於木上大航胡剛切方舟也歡噪先到切呌也噉徒濫切亦作啖泄私列切漏也亟紀力切疾也蹉跌上倉何切下徒結切猶差池也簷石都濫切應劭曰齊人名小罌為擔晉灼曰石斗石也儲陳如切儲偫也一擲直炙切投也勍冦渠京切強也嘔血一口切吐也驍將堅堯切健也大呼火故切大聲曰呼披靡披普彼切挺戰徒鼎切挺出戟几劇切有枝兵也瞋目昌真切張目也叱之尺栗切呵也辟易上頻亦切下夷益切謂開張而易其本處踣蒲北切僵也何淡之徒濫切偵候丑正切覘也謂窺伺之庾賾士革切熛天卑遙切火飛也馬鞚苦貢切馬勒也咽伊旬切吞也臧熹虛其切處分上昌汝切區處也下扶問切分别曰分允愜詰叶切快也寬弛施氏切放弛也違舛尺兖切舛錯檻車户黯切載囚車無行胡孟切褻之私列切侮也酬市流切報也徑兵堅正切徑健也鎧可亥切甲之總名暍死許葛切熱死也峥嶸洲崢鋤耕切嶸乎萌切地名毛璠孚袁切沮中七余切地名蔚紆勿切涪陵音浮郡名屬梁州療之力照切治也縱橫上子用切下胡孟切放縱而恣橫也迅思晉切疾也番禺上音潘下音愚南海邑屬廣州髑髏上徒谷切下郎侯切説文體髏頂也阮腆之阮五逺切姓也腆他典切襁負舉兩切孟子曰襁負其子而至晉紀三十六通鑑卷一百一十四起旃蒙大荒落盡著雍涒灘即乙巳至戊申凡四年安皇帝己義熙元年溫楷苦駭切溳川于濆切水出蔡陽瑾渠遴切瑗于願切剗楚限切平也翦也鳩摩羅什鳩居求切鳩摩復姓羅什其名西域天竺人為僧入中國翻譯上孚袁切下羊益切翻覆而尋譯也沙漒渠良切地名皓音皓間行居莧切從間道而行縛符攫切繫也鄖城于分切古漢南之國臨陳直刃切與陳同不解胡介切曉也調度上徒釣切下徒故切惋烏貫切驚歎也蓋智粽作弄切通作糭華子魚華户化切姓也名歆字子魚三國時人方娠左傳邑薑方娠杜預注曰懷胎為娠音之刃切一音身掾俞絹切官屬瓌偉公坰切瓌竒斛斯蘭斛胡谷切斛斯復姓其先代北大人號斛斯部因以氏焉瞑莫定切開目也頷之户感切低首也瘞一計切樂涫音洛官酒泉邑屬涼州無纇盧對切無節纇也二年陘北音刑地名契丹契音乞夷狄國名在庫莫奚東與庫莫奚異種同類曇徒南切申屠英屠同都切申屠復姓其先周幽王申氏兄侯之後及孫居安定屠原因以為氏一説申屠楚官號也抆血武粉切拭也貿莫候切買也旰食古旱切晚也宗敞宗姓也灅南魯水切壘水出鴈門宕渠徒浪切巴西邑屬梁州卜珍卜姓也慕容昱餘六切轘音患車裂也三年悒悒於汲切不樂也駱氷駱盧各切姓也悶音悶又音滿煩也斬衰七回切亦作縗裳下不綆直斬割之者為斬衰殉徐閠切以人從死也禭徐醉切贈襚鞾許茄切鞮屬亦作靴璆渠幽切府藏才浪切物之所蓄也瑩縈定切濜口徐刃切濜水出襄陽濡源奴官切濡水出涿郡妻之七計切以女嫁人曰妻伺魏相吏切伺候也貪猾户八切狡也并其卑正切兼也大夏赫連勃勃字屈丐本鐵弗劉武之孫當後秦姚興時為安北將軍鎮朔方遂據其地稱天王大單于改姓赫連建元龍升國號大夏始於此力俟提俟牀史切赫連勃勃之兄叱干阿利叱昌栗切叱于伐北復姓阿利其名叱以鞬居言切跣步先典切足親地也繁數所角切頻也赴難乃旦切企遲上遣爾切舉踵也下丈二切待也令支上音鈴又郎定切下音祇古伯夷國有孤竹城評音平參合陂班眉切本漢參合縣地在代郡屬幽州封愷可亥切朝露陟遙切朝露見日則晞以人居丗短以如之暗弱暗古暗字萬斛堆都回切地名聚土曰堆扼乙革切把也咽喉上因連切下胡溝切梁裒蒲侯切四年噬時制切吞噬譎古穴切權詐也坑之丘庚切亦作坑鈔掠上𥘉交切又楚教切下力灼切劫略也挑戰徒弔切擲嬈敵以求戰如古之致師鄒山側鳩切在魯郡墊江音牒巴郡之邑屬梁州嵻㟍山上丘岡切下盧當切山名在西羌折掘氏掘其月切折掘代北復姓澠水彌兖切或作黽通作沔拓跋窟咄柘他各切跋蒲撥切代北復姓窟咄其名窟苦骨切咄都骨切犢徒谷切牛犢銜之乎監切詰朝去吉切平旦也晉紀三十七通鑑卷一百一十五起屠維作噩盡上章閹茂即已酉至庚戍凡二年安皇帝庚義熙五年輻湊上方六切車輪轑也下子候切本作輳輻共轂也衆輻之所共輳堡聚博抱切堢障也上邽音圭天水邑屬秦州臨澧音禮天門邑屬荆州肘腋上陟栁切臂節也下羊蓋切肘腋也譴詰戰切謫問也下邳符悲切國名屬徐州艦户黤切戰船四方施板以禦矢其狀如牢貪婪盧含切或作婪春秋傳貪婪無厭臨朐音劬東莞邑屬徐州沮將豫切沮喪也僑渠嬌切寄也蹂忍九切蹂踐也劉璋諸良切梁父音甫泰山邑屬兖州城隍胡光切城池也有水曰池無水曰隍東莞下音官郡名屬徐州昊札色切日昳也間道居莧切微路也擐甲古患切貫也春秋傳擐甲執兵塹七艷切坑也餌之仍吏切食之也樂浪音洛很郡名屬平州垣尊垣雨元切姓也巧思相吏切慮也念也中饋求位切按易家人卦六二無攸遂在中饋王弼注云居內處中職乎中饋無厭於鹽切不足也扞侯旰切扞禦也北燕馮跋字文起誅班仁衆推為主乃稱天王于昌黎建元太平仍號燕史以北燕别之始於此凶很胡懇切很戾也劫剝上居怯切劫取也下北角切剝削也扉甫微切户扉也愕然逆各切相遇驚也長孫嵩長展兩切長孫復姓嵩其名息弓切恟恟許容切喧耰之意臠食力兖切肉臠也什翼犍音虔載記什作涉匕首音比六年堙厄伊真切塞也亦作堙努力奴故切方言免也董銑蘇典切除蠹都故切蟲食木曰蠧子栗磾丁奚切恱壽恱弋雪切姓也瘁秦醉切病瘁突陀沒切觸也橫騖亡遇切亂馳也滌徒歷切洗也穢於廢切穢惡也番禺音潘愚南海邑屬廣州根蒂都計切舟楫即涉切亦作楫闡齒善切拳捷上逵貟切無撓女巧切曲也湟山胡光切地名為質職利切結信也章綬是酉切瘳丑鳩切病愈也并力卑正切兼也創病𥘉莊切傷也字戓從刃凱還回亥切樂也奏凱而還瓦解胡介切散也張劭實照切侵軾弋質切又同結切突也柵測革切編立木為之查浦莊加切地名查下之浦可汗音寒戎酋稱舸賈我切大船也方言南楚江湖謂之舸蒯恩蒯苦怪切姓也恩其名苑川於阮切亦作宛本扶風陳倉縣元魏改曰苑川撤直列切去也亦作徹涌口尹竦切水名在楚國鄱陽蒲何切郡名屬揚州冠軍古玩切功冠諸軍之上故曰冠軍湓口蒲奔切水名在潯陽舳艫上音軸下音盧舳船後持拖處艫船前刺擢處煙因蓮切通作煙幡孚袁切幡幟晉紀三十八通鑑卷一百一十六起重光大淵獻盡閼逢攝提格即辛亥至甲寅凡四年安皇帝辛義熙七年索稜索蘇各切姓也稜魯登切鴻臚凌如切官名鴻聲也臚傳也所以傳聲贊導九賔鹿奕干鹿姓也奕羊益切俘芳無切軍所獲也拿女加切又女余切傉檀內沃切南涼王名邯川音寒又胡甘切地名番禾白干切武威邑屬涼州苕藋上音條下徒弔切北涼地名孟昶丑兩切交趾音止郡名屬交州杜瑗于眷切石崎渠希切在越地俚獠上兩耳切南夷種名下魯皓切西南夷謂之獠龍編音鞭交址邑屬交州擲直炙切搔也投也雉尾炬其吕切火炬鴆直禁切鴆毒鳥以羽毛歷飲食即殺人函胡讒切櫝也雕耗火到切減也損也疽七余切癰疽樂浪音洛狼郡名屬平州挫祖卧切摧也鋭弋稅切利也王憬俱求切八年剛愎符逼切戾也春秋左傳剛愎好勝埓力輟切怏怏於兩切志不滿也郗僧施郗丑之切姓也搢紳即刃切搢笏而垂紳也曇逹徒南切與國如字諸侯相許與者名曰與國翟勍翟音狄姓也勍渠京切款昵尼質切款密而親昵也淡徒濫切諸葛長民諸葛復姓風俗通云葛嬰為陳涉將有功而誅漢文帝追封子孫為諸縣侯因以為氏叱之昌栗切訶也晡奔謨切日加申時暗中暗與暗同蔚紆勿切法古法字縊於計切自經死也詬之呼漏切詬罵也祁山翹移切山名在武都郡西羌中趙琨公渾切鷲峽上疾僦切下夏夾切汧城輕煙切地名絶亢下郎切亢頸也省調上所景切下徒弔切減省賦調也醢許亥切肉醬也詎宜上其據切字林未知詞也盻普莧切顧盻臧喜許其切下邳符悲切徐州下邳國有葛嶧山涪安皇帝壬義熙十一年黃鉞王伐切大斧也以金飾之劾胡得切法有罪也默然密北切靜也通作默詫丑亞切誇也閫外苦本切門橛也渾濁户兖切渾雜而濁穢也翹祈堯切峭七笑切陵也斂曼嵬斂良冉切姓也嵬五灰切乞伏魋乞伏復姓魋杜回切折斐敷尾切勒姐嶺姐音紫山嶺名辟閭道左辟必益切辟閭復姓奔古奔字羑里以九切文王拘於薑里在蕩隂黃迅思晉切隗仁隗五賄切姓也臨難乃旦切涿鹿竹角切廣寧邑屬幽州疾疫營隻切民皆疾也窺窬羊朱切私視也或作窺𨵦布濩胡郭切地名在代北懾服之涉切失氣也湩酪上都貢切江南人呼乳為湩下歷各切乳汁也藉田秦昔切藉借也古者借民力以耕公田故曰藉田泓烏宏切姚讃則旰切熒惑户埛切星名童謡餘招切爾雅云徒歌謂之謡訛言五禾切謬也或作訛沮洳城沮將預切洳人恕切地名彌姐慈野切字林子冶切羌種名鴆直蔭切以鴆鳥毒人也務銀提務姓也十二年洮陽吐髙切零陵邑屬荆州漒川音強水出河南沓中徒合切地名華隂户化切洪農邑屬司州華山在其南內之內讀曰納愔揖淫切黨容音黨羌戎之酋長也趙氏塢安古切卑城也邢望户經切後秦地名胡儼魚掩切郿城音媚郿縣之城屬雍州扶風郡琥珀上火五切下匹陌切琥珀出罽賔國搗覩老切饌士戀切具食也亦作饌餐千安切脆此芮切小耎易斷也邂逅上夏解切下音后不期而遇也淮淝符非切淝水出九江山入淮塗中度都切地名慰勞郎到切勉也王廞虛今切衣襆博木切爾雅曰裳削幅謂之襆津邏下郎佐切巡也捶止蘂切擊也懿撗懿乙兾切姓也摽卑遙切猶記也庫傉官斌傉奴篤切庫傉官三字姓斌悲巾切洸古黃切金墉餘封切三國時魏明帝所築在河南洛陽屬司州大呼火故切大聲也蹇鑒蹇九輦切姓也京觀古玩切積尸封上其上謂之京觀珣音荀百揆求位切度也揆度百事調食徒弔切調發也袝焉符遇切後死者合食於先祖白𡼏山𡼏居莧切脅虛業切以威力相恐也晉紀四十通鑑卷一百一十八起強圉大荒落盡屠維協治郎戊午至庚申凡三年安皇帝癸義熙十三年澧西敷容切濃水出咸陽潼關本名衝關河自龍門南流衝激華山東故以為名在洪農華隂皓音皓堯杆川杆居案切地名在吐谷渾驃騎毗召切或作票徑疾貌澠池莫踐切或作黽洪農邑屬司州蠡吾城蠡音禮蠡吾縣之城在髙陽國屬兾州并力卑政切兼也並也泝河蘇故切逆流而上也內難乃旦切遏烏葛切遮也止也娥清娥五何切姓也碻磝上口勞切下五勞切城名在代北後魏為濟州治所輜重上側持切載衣車下直切載物車行者之所資總曰輜重沮材汝切止壞也舫府望切並兩船曰舫輕佻吐雕切爾雅曰佻偷也帥朔律切領也白眊仍吏切以毛羽為飾不解音蟹曉也大鎚直追切金鎚一曰權也臨陳直忍切與陳同齊斧音資又如字張晏曰征伐斧也以整齊天下也一説當作齋凡師出必齋戒入廟而受斧也憤恚上房吻切下於避切怒恨也嘔血一口切吐也葺七入切修也蓼泉音了地名梟堅堯切挂首於木上伺相吏切奄窺也徑悍上居正切下侯旰切徑健也悍勇也恪苦各切暐于鬼切殖實職切生也酬市流切報也亦作酬撅居月切又其月切御縹醪縹匹妙切青白色醪郎刀切汁滓酒也觚攻乎切觴受三升者謂之觚嶢栁倪么切地名閺鄉無分切共農湖縣有闅鄉屬司州踊躍丑竦切跳也鼓譟先到切群呼也斬馘古獲切軍戰斷耳也灞上必駕切水名徐猗之猗乙竒切璞匹角切涇上堅靈切涇水出安定涇陽开頭山國璠孚袁切蒙衝昌容切字本作艨艟戰船也所以突敵蹂踐女久切蹂踐猶蹈躤也憮然文甫切失意貌覘敕廉切又丑豔切窺也剔他歷切解也彜器延知切宗廟常器也研研五見切秣馬音抹食馬榖也刀雍刁丁聊切姓也謐彌畢切璲徐醉切哀惋烏貫切驚歎也徐羡之延面切又似面切衛瓘古玩切造次七到切急遽也豐鄗下老切豐或作鄷周文王所都鄗本作鎬武王所都二邑皆在京兆愍然眉殞切悲也憐也傳檄刑狄切符檄也網罟果五切亦網也十四年冠軍古玩切功冠諸軍故號冠軍四塞悉則切充塞也奚觀古玩切蔡廓闊鑊切俊子峻切洮罕吐髙切地名蒯恩蒯苦怪切姓也刎武粉切斷也祼郎果切袒也髑髏臺髑徒谷切髏洛侯切積人頭頂以為臺也間道居莧切微道也揣量𥘉委切度也顒顒魚容切仰也上邽音圭天水邑屬秦州彗星徐醉切又音歲妖星絡音落經絡也舋許愼切隙鏬也廙之羊至切又弋織切袁湛直深切又直減切恭皇帝元熙元年禇氏丑吕切姓也裒薄侯切畋徒年切取禽獸也犢渚上音獨下章與切渚遮也能遮水使旁回也其地在代北統萬夏主赫連勃勃於黑水之南營都號曰統萬即朔方也忤五故切逆也截昨結切斷也沐謙沐莫卜切姓也匕首音比風俗通云其頭類匕故曰匕首短而便用也僑户音橋寄也客也于栗磾丁奚切芒山蘇林音忙遽之忙應劭曰芒屬沛國芒縣之山也灅水魯水切水出鴈門膳持戰切具食也庖人和味必嘉善故從善撤直列切去也亦作徹汜稱汜符咸切皇甫謐云本姓凡氏遭秦亂避地於汜水因改焉敦煌音屯皇郡名屬涼州隕星羽敏切從髙而下也資治通鑑釋文卷第十二
