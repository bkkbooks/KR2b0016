  text: 資治通鑑釋文卷第一
  hash: sha256:6a80beec92561933ef0d032a644168b5a7292d83a833dbb2d50e7a37ea33aab6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_001-1a}
body:
  text: 右宣義郎監成都府糧料院史照御製序多識設職切説文知也又音志按司馬溫公注揚子例云凡書中字如知識好惡長少難易將相使令説樂焉邪之類兩音易辨者惟於始見音之後可以意求不復再出或可疑則更音之今並倣此往行胡孟切畜敕六切説文積也通作蓄鑑格懺切昭也亦作鑒紬司馬遷本傳徐廣音抽猶引絲也顔師古音胄謂綴集之石室金匱圚漢書作匱顔師古曰匱與匱同史記索隱石室金匱皆藏書之處采經采取也倉宰切通作採托傳托拾也之亦切傳直戀切謂傳記罔羅魚罾謂之罔鳥罟謂之羅放失甫妄切按舊聞有遺失放逸者罔羅而考論之也馳騁馳言馬之大驅騁言馬之直馳騁丑郢切麟止離珍切漢武帝元狩元年獲白麟司馬遷作史記自黃帝至武帝獲麟而止故曰麟止猶春秋終於獲麟不能易音亦改也謂一定而不可改不謬眉救切戾也不謬謂不戾也至當丁浪切中也載籍秦昔切説文簿書蓋竹簡也以之載事故云載籍論次盧困切議也謂議其事而次敘之翻孚袁切猶翻十二經之翻謂反覆敷演也札側八切札者櫛也編木如櫛齒即簡札也見唐蘇鶚演義更霸音庚造在早切作也要之伊消切若要膂之要蓋要者衆體之所會也凡會其宗者為要之所繇夷周切與由同古由字從由從弓書曰若顛木之有㽕蘖是也後人省弓字故徐鍇云説文無由字針諸深切誡也通作針凡十六代謂上自周秦漢魏晉宋齊梁陳隋唐至五代牖與久切説文穿壁以木為交窗其要一笑切約也賈魏公羣經音辨云要者總最之稱牘徒谷切説文書版也無間居莧切舊説不能間厠其間竊謂間乃間隙之間言禹之德至盛無間隙可議慘怛匕七感切戚也下丁曷切悼也著陟慮切明也周紀一通鑑卷一起著雍攝提格盡元黓困敦即伐寅至壬子凡三十五年威烈王名午考王子周自武王至平王凡十三丗自平王至威烈王又十八丗自威烈王又五丗至赧王二十三年魏斯相支切史記丗家名都丗本曰斯魏亘子駒之孫也是為文侯斯之父丗家年表無所考趙籍秦昔切趙襄子無恤之孫獻侯浣之子也是為烈侯韓虔渠焉切韓康子虎之孫武子之子也是為景侯於分扶問切名分别之必列切下別族同惓惓逵貟切謹也繁纓上蒲官切馬鬣上飾下伊盈切馬膺前飾萬幾音機微也相屬之欲切連也請隧音遂掘地通路曰隧即延道也姦居寒切犯也復不能按杜預左傳釋音凡復字其義訓又者並扶又切下皆類此雄長展兩切泯彌鄰切又弭盡切滅也縻滅忙皮切説文糝也取縻爛之義瑶餘招切智伯名其先荀知氏荀文伯躒之子也號襄子無恤本作母恤趙簡子之子識之職吏切説文記志繭絲吉典切𧖟衣也繭絲者指稅賦而言保鄣者指藩籬而言尹鐸之意不在稅賦而在藩籬此其所以保晉陽也為少始紹切輕之也重之曰多輕之曰少蚋儒稅切蚊蚋蠆丑邁切毒蟲愎弼力切狠也狃女九切索山客切取也質乎脂和切亦作贄猶貨也臯狼上姑勞切下盧當切春秋蔡地後為趙邑走乎臧候切羣經音辨趨嚮曰走長子長讀為長短之長周史辛甲所封後為趙邑罷力蒲縻切勞也所屬殊玉切附也邯鄲上胡甘切下多寒切山名顔師古音寒丹在趙地蛙烏瓜切説文蝦蟇驂乘乘去聲乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也蓋取三人為名義耳肘陟栁切臂節也跗風無切足之上為跗絺疵抽遲切字當作郗姓也姓譜諸書未有從糸者疑借字難必乃旦切城降平聲遊説舒芮切誘也凡説誘之義皆類此不悛且緣切止也改也請使使音踈吏切將命者襄子使音史説文令也將卒上即亮切帥也下臧沒切兵也説文吏人給事者衣為卒卒衣有題識凡言兵者皆音此矯揉上舉夭切下如久切揉曲為矯揉所以撓之也羽括羽者箭翎括者箭窟受絃處也音聒通作筈砥礪上軫視切柔石也下力制切磨也搏伯各切拊也匕首音比劉向云短劒也鹽鐡論以為長尺八寸其頭類匕故云匕首舍之與舍同釋也癩落蓋切惡疾史記作厲啞倚下切瘖也通作啞委質職日切委其體以事君講古項切解也翟璜直格切姓也下音黃其名不比頻脂切不和也良相悉亮切下同無傳方遇切説文相也鮒符遇切比周毗至切近也穰苴上如羊切下子余切騎乘上竒寄切下石證切贏糧音盈顔師古謂贏者擔也疽千余切癰也吮才軟切説文嗽也湣美隕切安王二年陽翟直格切索隱音狄邑名四年相駟子陽相息亮切鄭國之相也姓駟名子陽鄭穆公之子曰騑者字子駟其孫駟帶遂以駟為氏五年俠纍上音協姓也下力追切按戰國䇿俠纍名傀苦猥切有惡烏故切史記作有郤軹音止地名漢河內郡有軹縣聶政尼輒切姓也百溢弋質切二十四兩為溢通作鎰決眼烏穴切戰國䇿作𬒮眼暴薄報切暴露也嫈烏莖切説文好貌史記作榮絶從音蹤謂自絶其蹤迹或云免其從坐之罪音從六年繻公詢趨切八年取最最祖外切魯地十三年濁澤直角切水名按漢志出齊郡廣縣媯山史記或作涿十五年彭蠡里第切澤名禹貢荆州之域太行胡剛切東鄉讀曰嚮屬之音蜀附也猶言附著明法古法字從橫從或作縱子容切橫或作衡讀曰橫南北曰縱東西曰衡十七年庶長展兩切秦官齊太公十六年𥘉命齊大夫田和為諸侯諡太公威公太公子名午戚之正字胡官切犯宋孝慈淵聖御名二十五年干城户旦切扞城所以禦難見詩箋和者去聲下同長惡上知丈切下烏各切暗與暗同共公音恭烈王四年北藺良刃切地名五年廆五賄切走哀侯走音奏按太史公年表及丗家於韓列侯三年皆書聶政殺相俠纍於哀侯六年又皆書韓嚴弒哀侯以刺客傳考之聶政殺俠纍事在哀侯時以戰國策考之亦然從傳與戰國䇿則是年表丗家於列侯云三年書盜殺俠纍誤矣通鑑於列侯三年載聶政殺俠纍事又於哀侯六年載嚴遂使人殺其君哀侯是從年表丗家所書蓋刺客傳𥘉不言并刺殺哀侯止戰國䇿言之通鑑豈以此疑之歟故載併刺哀侯不書聶政而止曰使人以此求之則通鑑之意不以嚴仲子為嚴遂亦不以俠纍即為韓廆止從年表丗家所書而不信其傳也罃於莖切魏惠王名六年鄄工掾切齊地即漢鄄城縣野辟音闢頎音祈適音嫡周紀二通鑑卷二起昭陽赤奮若盡上章困敦即癸丑至庚子凡四十八年顯王元年觀津工喚切劉伯莊音館魏地齊伐魏惠王請獻觀以和解即觀津也下陵觀同音五年黼黻上音甫下音弗白與黑謂之黼象斧形黑與青謂之黻謂兩巳相背七年少梁失照切魏地魏有大梁故以少梁別之即夏陽也痤族戈切黔中音琴夷翟讀曰狄下戎翟同擯必刃切棄也得與音預下不與音同八年令力政切下同𡵨雍於用切𡵨謂𡵨山雍州名謂東崤西漢南商北居庸四山之所擁翳也致伯讀曰霸躁則到切厲躁簡公及出子四公也櫟陽音藥秦獻公二年徙都于此徐廣云即漢萬年縣分土扶問切別也鞅於兩切嬖卑義切賤而得幸景監景姓也楚之族監居銜切其名也去聲亦通變法古法字下並同更禮更音庚收司句斷司猶管也為什伍之法使之相收相管連坐秦有見知連坐法降敵降平聲以率受率讀曰律僇力音戮古字與戮同説文并力也字林音遼復其身方目切如漢法除其賦役也收孥孥妻子也秦法一人有罪并其室家漢文帝元年除秦收孥相坐律論盧昆切議法也屬籍上殊玉切系屬下秦昔切宗屬之籍黥渠京切墨刑也下同曹沫莫葛切十二年鄗呼各切趙邑後為中山所有趙武靈王伐中山復取之十四年盼普莧切與盻同徐州音舒齊邑集韻徐作俆祭北門燕在齊之北趙在齊之西燕人祭北門趙人祭西門者賈逵曰燕趙之人畏齊侵伐故祭以求福十六年孫臏婢忍切説文膝專也因被刖刑斷兩足遂名臏輜車側其切􅛓車也軍行所載輜重解舉蟹切判也控拳上苦貢切引也下去權切與絭同絭者攘臂繩也言解鬪者當善以手解之不可引絭也或謂拳為拳手之拳非是搏撠音博戟搏索持也撠拘持也言解鬪者當善撝解之無以手相搏撠也批亢上蒲結切下口浪切批與㧙同批擊也㧙捩也亢髙極也言乘其髙而擊捩之搗虛都浩切築也言乘其虛而築之則自解也批亢搗虛所謂刑格勢禁格音閣方虛音墟溺奴弔切大良造在早切秦宫顔師古曰造成也秦制又有大上造十八年嚬笑嚬音頻冝作顰愁蹙之貌笑古笑字十九年內息內如字息止也秦俗父子同室居止商君始更其制禁同室內息者阡陌阡音千陌音貊路南北曰阡東西曰陌劉伯莊云開田界道使不相干桶吐孔切方斛也彤徒冬切地名緤私列切二十八年蹶居月切僵也狹轄夾切隘也剄吉定切以刃自割頸三十一年內之內讀曰納五羖音古牡羊也百里奚自賣五羖皮為人養牛以是而要秦坐乘食證切相杵上息亮切即舂不相之相下敞呂切舂也凌轢上閭承切本作輘車轢也下狼狄切謂車所踐也駢脅上蒲眠切本作骿下迄業切脅者兩膀也春秋左傳晉文公駢脅闟戟吐臘切戟名旁蒲浪切並也三十五年詘曲勿切説文詰詘也又敕律切説文貶下也贏怡成切利有餘也三十六年從親子容切即縱衡之縱傅國音附禍中去聲料度去聲并力音併衡人音橫謂連衡者不與音預恐愒上起拱切下許曷切謂恐脅也愒或音憩非是通質陟利切物相劕以通交質之情撓秦女巧切又火髙切擾也亂也擯秦必仞切棄也史記作賔按周禮金路以賔其字讀作擯義異而音同故史記借用索隱注為賔客之賔誤矣犀首犀首魏官名公孫衍為此官因號犀首猶虎牙將軍之稱從橫之術蘇秦張儀俱事鬼谷子學從橫之術蘇秦於六國主縱張儀於秦主衡輷輷呼宏切羣車聲蒼頭蒼頭謂著青帽項羽傳有異軍蒼頭厮相支切養馬者或作廝解去聲散也倍泰山倍讀若偝言不正嚮前也臨淄與淄同六博伯各切或作簙説文局戲也六箸十二棊烏胃所作楚辭菎蔽象棊有六博王逸注投六箸行六棊故為六博列子擊博樓上注云擊博如今之雙陸棊然其法今皆無傳闒鞠上徒臘切下求六切鞠以皮為之蹙闒而戲劉向別録云蹙鞠或起戰國之時所以練武士因嬉戲而講習之亢父上音抗下音甫亢亦音剛邑名比行上毗義切次也下胡剛切列也恫疑上音通恐懼也虛喝呼葛切髙誘曰虛喝喘息懼貌云秦自疑懼不敢進兵故作恐怯之詞以紿韓魏也從約長章仗切輜重上莊持切載衣車也下直用切載物車也行者之資總曰輜重辟強音必強三十七年皆解舉買切判也散也四十二年義渠本西戎國與趙魏地相接有二十五城其戎王築城郭以自守至秦昭王滅之四十三年肥義肥符非切姓也四十四年胥靡上新於切下母𬒳切漢書音義曰胥相也靡隨也古者相隨坐輕刑之名謂罪不至朴刑者令衣褐帶索相隨以執役四十六年齧桑五結切裴駰云晉地服虔云翟地索隱衛地四十八年通儻他曩切倜儻卓異也謬留莫六切姓也闞止闞苦濫切姓也周紀三通鑑卷三起重光赤奮若盡昭陽大淵獻即辛丑至癸亥凡二十三年愼靚王二年鄢杜預音於建於然二切顔師古音偃語人魚據切卒然七沒切忽也惡乎音烏稿音考本作稿或書作稿説文木枯也四年䱸申差上踈鳩切下初街切韓之二將名洹水音袁説文水在齊魯間卷衍上丘權切下以善切二邑名五年猶豫夷周切又余救切説文玃屬居山中聞人聲豫登木無人乃下丗謂不決曰猶豫一説隴西俗謂大子為猶大隨人行忽先忽後故云猶豫又一説猶豫者友也友為人行好先行却住以候其人百步之間如此者數四先者豫也遂曰猶豫見唐蘇鶚演義司馬錯七故切噲苦夬切又苦外切鹿毛壽劉伯莊云鹿毛壽三字蓋人姓名又作潘壽春秋後語作唐毛壽徐廣曰一作厝毛屬國之欲切委也猶付也赧王上元年要黨平聲要猶邀也恫他東切痛也令人平聲使令之令令之去聲命令之冷醢呼改切肉醬簞食上音丹竹器圓曰簞方曰笥下音飲係纍力追切縛結也猶旄倪旄讀曰耄老也倪讀曰齯幼也重器直隴切寶器監古咸切更也平聲湣音愍二年右更音庚秦官母復音無禁止之也詳音陽折節之列切廣袤上如字下莫候切東西曰廣南北曰袤屈丐上九勿切姓也丐其名三年郭傀五罪切趣燕趣劉伯莊音逡喻切四年嬖卑義切賤而得幸者靳尚居焮切不格各額切其字冝從手説文擊也不格猶不敵也劉伯莊説扞關寒巨切楚之西界見卒見音現據今所有之兵裼先的切袒也左挈詰結切持也塞悉則切窒也從人音縱合縱者懾處質涉切失氣也澠池彌逺切趙邑畨吾音婆地名斷徒亂切五年其間去聲借使上資昔切假也下疏吏切言假使人於楚罷音疲儀秦行去聲鷙翰上陟利切説文擊殺鳥也下音韓説而音稅任人音壬六年樗里疾音樞木名樗里子名疾秦惠王之弟髙誘注云疾居謂南之隂鄉其里有大樗故號曰樗里子紀年又謂之褚里疾七年會于應乙陵切地名杼直吕切機之持緯者羇旅居冝切張晏曰羇寄旅客也侈尺氏切八年脈毗忍切脛骨也本作臏芉綿婢切楚姓東胡胡北狄也其國在胸奴之東者曰東胡鄗呼各切趙邑樓煩胡地名在趙九年武遂本作隧韓邑秦武王四十七年拔之至是復歸之韓蒲阪甫逺切在魏為蒲垣入秦為蒲阪劉伯莊注林胡戎名如淳云即儋林後為趙武靈王所滅王賁音奔剪之子離之父十年彗星旋醉切又先到切妖星爽陽鴻爽本作華鴻夲作鴟劉伯莊止從其本字音穰侯人羊切十四年蜀守輝守音狩本作蜀侯時秦伐蜀置守矣故稱守輝或作渾華陽國志又作軍十六年廟見音現昭雎昭姓也雎七余切要以音邀下強要同郢中以井切楚都十七年藏中才浪切物所畜曰藏公孫龍史記云趙有公孫龍即趙人也索隱云孔子弟子傳作衛人鄭氏作楚人未知孰是堅白按漢書藝文志公孫龍子十四篇注云即為堅白之辨者又按成元英莊子疏云公孫龍著守白論行於丗堅白即守白也言堅執其説而守之亦如墨子墨守之義同異自堅白之論起辨者之徒五執是非不勝異説公孫龍之辨蓋將合異以為同故曰同異臧三耳三耳者如莊子所載雞三足之説今推廣莊子疏謂數起於一一與一為二二與一為三三名雖立然竟無實體故雞可為三足則今兩耳豈不猶是一説耳主聽兩月形也兼聽而言可得為三臧祖郎切其義未詳白馬非馬比亦莊子所載狗非犬之説疏云狗之與犬一物兩名名實合則彼謂狗此謂犬名實離則彼謂狗異於犬也又墨子曰狗犬也然狗非狗犬也大旨與白馬非馬之説同公孫龍之辨皆辭勝於理今具載其言者蓋聽言之道不可不察也別筆列切異也抒意上與切抑也抒意通旨按其義當作紓紓緩也古字多通使亦音舒與知音預惇都昆切通作敦詆也一曰誰何也繳紛繳吉弔切戾也其言與人相戾紛然而爭欲人先屈務在人後方止故云繳紛爭言而競後息絀敕律切通作詘説文貶下也又作屈周紀四通鑑卷四起閼逢困敦盡著雍困敦即甲子至戊子凡二十五年赧王中十八年間道居莧切徑途也緡公音愍十九年釐王音僖咎其久切二十年尉錯尉秦官錯其名也音措膚施地名酺蓬逋切説文王德布大飲酒也或作脯毋出母者禁止之辭其他並同此義屬義殊玉切籍之秦昔切籍記之也信期信姓也如字傫倫追切疲也距難距猶拒也往走讀曰奏鷇克角切鳥子欲出者娃於佳切吳楚之間謂好曰娃猶豫夷周切又余救切解見上二十一年解下買切地名二十二年左更更音庚秦官二十四年宛於袁切故申伯國穰與陶如羊切魏冉始封穰復益封陶悝枯回切二十五年芒卯芒謨郎切姓也二十九年劉向説菀作鸇字林鷂屬陬子侯切隅也射天食亦切弓弩發也笞地超之切擊也三十年狐咺狐姓也咺火遠切斫側略切斬也使使上爽士切下疏吏切嚪徒濫切與啖同以利誘之也三十一年濟西子禮切濟水之西齊地懟徒對切怨也勞軍郎到切慰勞也辟宫辟讀曰避共具居用切弗內讀曰納淖齒淖竹角切姓也數之所矩切一二而責之也雨血去聲自上及下曰雨嬴博上音瀛下百各切皆地名大纍力偽切事相緣及也綦按楊倞荀子注音其綦謂窮極之時挈國詰結切提也擽歷各切楊倞注云櫟然落石貌其所持心所持國不行不義不殺無罪落然如石之固也仰上魚亮切基基荀子本作綦按楊倞云本也言以義為本濟義本作齊楊倞讀曰濟可要一堯切約也綦明綦讀曰基與國如字諸侯相許與者名曰與國劉伯莊注綦之綦從本字音楊倞云其極者則滅亡畫邑胡卦切齊西南近邑王蠋珠王切脰大透切頸也掠力灼切奪取也略凡言略地者皆謂行而取之用功力少阿鄄上於何切下工掾切阿即東阿鄄即鄄城皆齊地旁去聲薊吉詣切燕邑三十二年敫吉了切史記作嬓衣食衣去聲食音飼下衣之食之同紿徒在切欺也間行居莧切重如耳重讀為輕重之重如耳者衛君之姫名也三十四年共主劉伯莊注天下共宗於周為諸侯主臊蘇遭切兵利身無它音劉伯莊云虎之爪牙如兵之利刃在身其肉雖臊而人猶攻之者以其皮之所在也三十五年光狼城名本中山地趙靈王取之其地在代三十六年為好虛到切澠池綿善切邑名缶俯九切瓦器血濺音箭説文汙灑也肉袒徒旱切脫袖露肉為袒鐵籠盧東切以鐵籠車軸也傅車轊傳音附轊音衛郭璞云轊者車軸頭也乘馬石證切四馬曰乘後屬百兩屬音蜀附也兩音諒乘也言乘馬之後又附之以百乘之車騎劫騎竒寄切姓也燕將劓魚器切刖鼻也前行户郎切下行伍同操倉刀切􅓩測洽切鍬也乘城神陵切登城而守也絳繒自陵切赤色帛也束葦于鬼切葭也鼓譟先到切羣呼也太史敫吉了切徐廣音躍其女乃齊襄王法章之后太子建之母即君王后也觀津音館夫差夫音扶差𥘉加切鴟夷處脂切按伍子胥傳吳王既殺子胥乃取子胥尸盛以鴟夷革浮之江中應劭注鴟夷榏形也以馬革為之韋昭曰革囊或曰生牛皮也范蠡自謂鴟夷子皮者蓋以吳王殺子胥而盛以鴟夷今蠡自以有罪故為號也沈子胥持林切溺也俗作沉非是同量力尚切數奉數入聲子間音間望諸君望諸澤名本齊地後為趙所有樂毅自齊奔趙齊人以此號之示其所從也戰國䇿望作藍淄水莊持切出泰山梁父縣惡之烏故切稱寡稱去聲朝日音雕旦也收穀如字榖猶養也任汝鴆切保也貂勃貂丁聊切姓也屬音蜀類也徒跣先典切徒行跣足舍城音捨棧道仕諌切棚也架木為之拄頥上冡庾切下與之切蕢求位切草器也枹風無切擊鼓杖三十八年暴鳶上白報切姓也本作暴下以專切名也本作四十一年魯頃公音傾華陽如字韓地司馬彪云在密縣可更音庚梟堅堯切六博以梟為勝其法未詳從親之要從親謂合縱者要於笑切約也盛橋音矯信威信古伸字虛桃音墟魏地入邢句斷邢魏地救讀曰救蒲衍首垣于元切蒲在長垣之蒲鄉衍在河南之璵卷近首蓋牛首垣即長垣臨仁平丘仁及平丘二縣名謂以兵併臨之自蒲衍皆魏地嬰城於盈切繞城以自守也濮磨之北句斷上音卜下莫賀切地名注齊朱諭切注猶截也之要讀曰腰之脊資昔切背脊也言巳得魏地即如截齊秦腰絶楚趙脊而楚趙之縱散矣單矣音丹盡也言王之威盡行矣濡汝朱切方與音房豫銍竹乙切碭徒浪切相悉亮切巳上皆地名一經兩海兩海謂東海西海一經者東西為經故稱經一專一也要約於招切約也要約所以結約也周紀五通鑑卷五起屠維赤奮若盡旃蒙大荒落即已丑至乙巳凡十七年赧王下四十三年為質音致四十五年閼與上於葛切下音預孟康音焉與趙邑樂乘上音嶽下食陵切毅之子險狹轄夾切隘也將勇將平聲將猶方來也言鬪者當是勇者勝令軍力政切下胥後令同秦間居莧切善食音飼其陳同陳解佳買切下稍解同馬服君號也服虔曰趙奢為趙將有功賜號馬服馬服猶服馬也客卿竈客卿秦官名竈則到切范雎千餘切須賈須姓也乃密須之後折脅上之列切斷也下迄業切説文兩膀也摺齒上落答切摧也謂摧折其齒摺與拉同佯音陽卷古輦切側革切牀棧也謂以葦蕟之箔卷而褁之索隱云更溺上音庚下奴弔切令無令音零操蒼刀切謬曰靡幼切妄言屏必郢切跽其紀切長跪也肯鄉音嚮下鄉者同溷胡困切謂汨溷之也辟地音闢拓也罷敝疲弊二音之處敞呂切止也樞春朱切戶樞也四十六年中更音更秦官名四十九年承間居莧切謂乘其間隙之時説舒芮切擊斷都玩切決也四貴謂穰侯華陽君涇陽君髙陵君淖齒竹角切姓也綈袍田梨切厚繒供具居用切莝且卧切斬挫藁飼馬者五十年鄢郢於焉切又音偃並楚地屬地音燭連也言地連於齊賈禍果五切商賈之賈扼乙革切説文捉也吭寒剛切咽也母衰音無得無衰乎借字也非禁止之辭最少上祖外切極也下失照切媪烏浩切婦之老者稱奉厚音俸注人朱戍切韓地名五十二年太行胡剛切與國索隱謂列國各相許與者故云與國五十五年王齕胡骨切走趙音奏趍嚮也按據音遏戰數音朔下同禆將上頻彌切將之偏副合從子容切內鄭內讀曰納反間音諌謂反其本而間諜之能難乃旦切書傳直戀切易言以豉切輕易也毋置句斷毋者止之也使置其事而無復言也悉更平聲間趙軍問居棧切間隔之也扞蔽侯肝切衛也焦釡扶雨切搏戰伯各切謂擊搏五十六年無幾何幾音几雍於用切瓜分古華切如瓜瓣孔斌悲巾切屬其音蜀相哺蒲故切哺咀也竈突胣沒切竈窗謂之突麛裘綿披切鹿子也芾分勿切説文韠也戾力結切曲也郵于求切訓各不同一曰事之過者為郵此郵字謂無過也素餐千安切伊摯音至不任如林切不堪其事五十七年錐朱惟切處昌吕切居也頴脫上與頃切下吐活切頴禾芒鋭上突然而出故云頴脫脫􅊳也持戟訖逆切矛屬長丈六尺所執者故云持奉銅盤奉音敷勇切歃血所甲切啜血也餘者瘞之故云軟所謂盟者如是録録音祿王邵云録借字老子曰碌碌如玉落落如石言玉之混石不可一二數新垣衍新垣姓衍其名間入去聲由間道也上首功以斬首為功上猶尚也烹醢呼改切肉醬怏然倚兩切怏悵也惡能音烏脯匪父切乾肉牗里音酉本作羑侯嬴餘輕切睥睨上普計切下魚計切左脾右睨遍贊卑見切贊者告也謂以侯生遍告賔客相屬音燭連也下乃屬同五十八年鄗呼各切趙邑豪舉謂豪者舉之舉或音據異人孝文王太子華陽夫人之子母夏太后𥘉名異人後改名楚是為莊襄玉陽翟直格切子傒胡啓切秦孝文王之子適嗣讀曰嫡下同娠升人切妊也五十九年樛居由切秦紀一通鑑卷六起柔兆敦牂盡昭陽作噩即丙午至癸酉凡二十八年昭襄王其先伯翳佐舜有功賜姓嬴後有非子者事周封為附庸邑於秦曽孫秦仲宣王始命為大夫至襄公列為諸侯又二十五丗至惠文王始稱王昭襄王者武王之母弟惠文王之子也又三丗是為始皇帝五十二年嬴縮上餘輕切本作盈下所六切五星早出為嬴晚出為縮臨武君荀子楊倞注云臨武君蓋楚將未知姓名或曰劉向敘云孫卿至趙與孫臏議兵趙孝成王前臨武君即孫臏也今按史記年表齊宣王二年孫臏為軍師則敗魏於馬陵至趙孝成王元年巳七十餘年年代相逺疑臨武君非孫臏也羿研計切夏有窮氏以中竹仲切當也下中試同造父音俯秦衡父之子以善御幸於周繆王悠暗古暗字悠暗謂逺視不分辨之貌露袒露暴露也夲作路袒徒旱切本作亶露袒謂上下不相覆蓋劉向新序作落單滑然滑音骨楊倞注亂也撓沸上女巧切楊倞注攪也新序作繞下方未切則將音將帥之將傅音附將相和則士豫附成卒臧沒切兵百人曰卒莫耶上未各切下余遮切鏌鎁劒名或從金兊則楊倞注兊猶聚也與隊同劉向新序兊作鋭弋稅切好我虛到切愛也下同桀跖之石切夏桀盜跖秉鉞王伐切説文斧也卬楊倞注卬古仰字下託上曰仰冝向切下同技擊目至切楊倞注齊人以勇力擊斬敵者號為技擊錙金莊持切楊倞注八兩曰錙毳楊倞注毳讀為脆去賃丘於切楊倞注此與賃市中顧作之人而使之戰相去幾何也度徒故切楊倞注謂取其長短材力中度也衣於既切服之也三屬朱戍切羣經音辨屬甲札之數也引鄭康成説又按如淳注上身一髀褌一脛繳一凡三屬上身者上體之甲髀音陛股也褌音昆褻衣以蔽股名髀褌脛胻也胻乃脛專繳行縢也以繳脛專名脛繳皆相聮為甲胄曺本作胄楊倞引漢書胄帶劒顔師古曰著兜牟而又帶劒也贏餘輕切楊倞注贏負擔也復其户復方目切除其賦役忸之攴九切楊倞注忸與狃同串習也鰌音秋亦作趥楊倞引莊子風謂蛇曰鰌我以勝要利伊消切相長展兩切熬五刀切浸漬也墮許唯切毀也拱挹乙及切翕迄及切斂也知莫知主義切行莫行下孟切行列寒剛切左傳二十五人為行奔命奔與奔同傃音素本作蘇楊倞讀曰傃向也竭蹶渠月切劉向新序作竭走而趨之囂虛驕牛刀二切􅓆狐􅓆音憚地名在洛陽南百五十里五十三年樛几虬切五十六年衰絰上七雷切喪衣也下徒結切首戴也以苴麻為之栗腹力質切姓也腹本作股燕將樂間樂姓也間其名紀間切毅之孫鄗呼各切趙邑卿秦卿姓也秦其名燕將將渠即良切姓也渠其名蹴子六切踏也自為于偽切下同樂乘食陵切處和昌吕切秦孝文王元年喟然丘愧切太息也詘曲勿切喜失節貌禮記不充詘於冨貴釐音僖秦莊襄王元年緱氏工侯切邑名蒙驁牛刀切鄒氏音五到切蒙武之父蒙恬祖三年榆次次一音慈趙地四年齕下沒切誡居拜切敕也重於直用切大梁魏地按魏有少梁故以大梁別之魏惠王自安邑徙都於此趣駕讀曰促函谷關名在衙山下按山形如函故稱函谷關縮髙所六切人名刎武粉切斷也縞素古老切爾雅曰縞皓也繒之精白者曰縞以間居莧切迭也晉鄙魏將姓名秦始皇帝上元年涇水堅靈切水名淮南子云涇水出薄落之山並蒲浪切近也填閼上亭年切説文塞也下阿葛切説文遮􅗙也舄鹵上思積切鹵地也本作㵼下籠五切鹹地也二年麃公彼苗切應劭曰秦邑史記索隱云麃邑名太史失其姓名耳卷丘貟切縣名在河南繁陽如字繁水之陽也三年胸奴其先夏后氏之苗裔曰葷粥曰獫狁曰山戎曰胸奴皆其後也莫府師出無常處所在張幕居之以將帥得稱府故曰莫府莫與幕通烽火敷容切燧候表也邊有警則舉火間諜逹協切説文軍中反間也強起巨兩切勉也佯音陽單于音蟬胸奴夫子之號也單干者廣大之貌言其象天單于然也竒陳直刃切與陳同襜襤上都甘切下路郯切徐廣曰一作臨駰如淳曰胡名也在代北綿諸緄古本切又音昆西戎在綿諸道戎翟翟與狄通西戍大荔音戾大荔國西戎也烏氏音支西戎朐衍上求于切西戎為質職利切結信也四年畼有詭畼音暢詭俱毀切魏邑名蝗胡光切蝗即螽也食苗為災安釐音僖景湣音閔五年燕虛音墟魏地暖許元火逺二切六年合從音縱諸侯合從以抗秦衡漢書音義云以利合曰從以威力相脅曰橫觀津工喚切又音館魏地黽厄彌兖切秦地名下於賣切背韓蒲昧切違也鄢陵音偃地名郢以井切楚地濮陽音卜衛地八年鄴音業地名九年嫪毒嫪盧道切毒倚亥切劉伯莊於秦紀上音居虬切下音徒酷切於吕不韋傳上音郎到切下音靉索隱云嫪姓也毐字也蘄年宫蘄音祈在雍萯陽宫漢書李斐音倍應劭曰在鄠鑊黃郭切鼎大而無足沫莫曷切涎沫囊撲弼角切以囊盛其人舉而撲殺之瓦解下懈切散也伏質質讀曰鑕職日切鐡椹也娠左傳邑薑方娠杜預注曰懷胎為娠音之刃切一音身説音稅誘也泄私列切漏也不即不讀曰否十年宛於元切邑名雎七徐切遊間居莧切色樂音嶽義同聲色黔首其廉切黧也藉冦積夜切假也齎盜上讀曰資齎金將皮切持也厚遺弋季切贈也十一年貍陽力之切燕地齮語綺切閼與上於曷切下音豫孟康音焉與趙邑橑陽郎到切徐廣音老趙地幽繆眉救切母倡音昌嬖博計切賤而得幸十二年飲鴆直蔭切毒酒穿窬音踰穿穿壁窬窬墻擔石都濫切齊人名小罌為擔石斗石也十四年蠹都故切説文木中蠧邪柱上似嗟切下紆往切孤憤符粉切內外儲直如切內儲者言明君執術以制之在己內也外儲者明君觀聽臣下之言行斷其賞罰説林説難説式拙切難乃旦切説林者廣説諸事其多若林故曰説林難者説前人行事與已不同而詰難之按商君傳云其書有十餘萬言又按劉伯莊云説難自是一書非説難之篇所謂説難者説音遊説之説難音難易之難從之將容切以徇辝峻切行示也售承呪切十五年畨吾音婆又音盤亦作鄱趙地十八年井陘音刑趙邑十九年邯鄲音寒丹趙邑郝呵各切其傳方遇切相也鞠武居六切姓也武其名惛然恐劉伯莊云上音昏下丘用切蹊賢雞切徑也命卒足律切終也曹沫音昧又音末左傳作曹劌日造七到切至也督亢苦浪切或作剛燕地椹張鴆切刺也函音咸匱也匕首音比按風俗通云其頭類匕故曰匕首短而便用也焠取內切堅刀刃也濡縷上人余切下隴主切血出如絲縷也秦紀二通鑑卷七起閼逢閹茂盡元黓執徐即甲戌至壬辰凡十九年始皇帝下二十年首見行練切露也卒起音猝操七髙切把持擲直炙切搔也與擲通中竹仲切易水羊益切按水經出涿郡安閻山易州以此得名二十一年薊音計燕地王賁逋昆切翦之子二十二年平輿音豫本作與音余楚邑寢子衽切楚邑乞貸天得切從人求物也怚中聰徂切通作粗心不精也二十三年數挑戰數音朔挑徒了切謂擲嬈敵求戰也洗沐上先禮切又音銑滌也濯也飲食上音蔭下音寺超距超距猶言跳躍也超或作跋漢書甘延壽跋距蘄南渠之切楚地江夏有蘄春亭一音機項燕烏賢切楚將二十五年一朝陟遙切忿敷粉切怒也又芳問也召公時照切或作邵焱火弋瞻切火華也僇力竹切殺也通作戮蒲伏上蓬逋切手行也或作匍下鼻墨切伏地也或作匐要之伊消切豢養胡慣切穀食曰豢要離要一遙切姓也離其名吳人棄家為國蛛蝥上音朱下音矛蜘蛛也賈誼新書曰蛛蝥作網之靡美為切與糜同謂糜爛也下同會稽上古外切下音雞晉灼云本名茅山吳越春秋云禹巡天下登茅山羣臣乃大會計更名茅山曰會稽酺薄胡切王德布大飲酒也筆牘音讀木簡間金居莧切以金而何反間也下同雍門紆龍切齊城門阿甄上烏禾切下工掾切二地名二十六年臨淄側持切齊地因淄水以為名共居容切秦邑從衡上子容切下讀曰撗南北曰縱東西曰衡蘇秦於六國主從張儀於秦主衡戮力竹力切并力也嵇康音力幽切根柢丁計切亦根也撤直列切去也𥘉并卑政切兼也丞相綰索隱云姓王置守始究切諸侯為天子守土故稱守監居銜切臨下也鍾鐻音巨通作虡虡鹿頭龍身神獸也鍾鼓之跗以猛獸為飾北阪甫逺切陂也二十七年甬道尹竦切道上加土應劭曰築垣墻如街巷馳道如字應劭曰天子所行道也二十八年嶧山夷益切在東海下封禪封聚工禪除地本作墠時戰切蒲車以蒲草褁車𦵔秸𦵔本作蒩宗蘇切茅藉也秸通作秸訖黠切禾藁也𦵔所以為薦秸所以為席古封禪儀也絀敕律切退也本作詘通作黜梁父音甫山各祀雍於用切雍地有上帝祠羡門祠箭切應劭曰羡門名子髙古仙人也迃怪雲俱切謂回逺也瀛洲音盈神山名為解謂解説也赭音者赤色二十九年博狼沙狼洺宕切在陽武縣狙擊七豫切玃屬也狙之伺物必伏而候之凡伏而擊者謂之狙擊狙又子餘切大索色格切求也之罘房尤切山名在東萊三十三年贅壻之鋭切贅壻者猶人身體之有疣贅賈人音古商賈也臨洮吐髙切水名在隴西延袤莫侯切延長行也南北曰袤暴師劉伯莊音僕或作暴曝三十四年城旦城旦者旦起行治城四歲刑也鮒符遇切按孔叢子書鮒孔子八丗孫三十五年塹七艷切坑也亦作塹堙伊真切塞也亦作堙阿房上烏何切漢書注阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿上為房皆音房室之房或作旁白郎切復也音福重復也屬之朱欲切連也營室營室星名天官書曰天極紫宮後十七星絶漢抵營室曰閣道閣道者星名也北斗輔星隱宫餘刑顯於市朝宫刑在於隱室故曰隱宮也寫四夜切舍車解馬為寫或作缷朐權俱切地名在東海皆復方目切除其賦役辟惡音壁除也惡鬼辟音避毋令音無不稱去聲不愜意也騎衆句絶誹謗劉伯莊上音方未切下白浪切傳相柱戀切釋名傳者傳也所以傳示人三十六年燔扶藩切爇也三十七年雲夢如字澤名夢通於瞢音蒙李軌説九疑字或作嶷亦音疑其山九峯相似故以疑名焉下觀古玩切自上觀下曰觀易曰大觀在上藉柯藉在昔切下音歌地名浙江之列切江水東至會稽山隂為浙江狹中音洽或作狹並海蒲浪切射殺神亦切羣經音辨命中曰射惡死烏故切符璽相氏切釋名卬信也春秋斗樞曰黃帝時黃龍負圗中有璽章又曰天黃符璽至秦得和氏璧乃為玉璽自始皇也見事始輼輬車音溫涼本輜重之車謂之庫車有窗牗閉之則溫開之則涼故名輼涼驂乘上七南切下食證切乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也蓋取三人為名義耳更為工衡切改也數以所矩切以一二而計之數上音朔屬音蜀附也禆將頻彌切副也數趣音促臭昌救切鮑部巧切説文饐魚也錮音固説文鑄塞也徙藏劉伯莊音自浪切謂徙府藏之物於冡藏中機相機弩栝也相息亮切群經音辨相訓共言機共灌輸也灌輸劉伯莊上音館下音戍機共灌輸所以防穿近者從死從去聲下從者同藏重上自浪切下逐龍切重乃再重之重錮三泉取尤泉之數言之二丗皇帝上元年聘丑郢切馳也決隙上音缺下丘逆切怏怏倚兩切志不滿也矺陟格切與磔同謂裂其支體而殺之勝數上書蒸切任也下所具切計也使令上所吏切下力正切將命者以號令之與謀音預大呼火故切大聲多度徒落切約也下調徒弔切謂斂下盡為調菽式竹切竹也陽夏格雅切邑名蘄音機邑名閭左上里居切所在閭里以冨強為右以貧為左秦徭役煩多富強者並役盡故復取貧者屯長展兩切屯猶營也每營置長率徇似俊切銍竹乙切邑名鄼才多切本作􅫃字借為鄼亦音贊在沛郡非南陽之鄼比至頻寐切譙門慈消切譙門謂門上為髙樓以望樓一名譙故稱美麗之樓為麗譙躡之昵輒切一本作攝蒯徹丘怪切即蒯通漢書避武帝諱以徹為通傳檄胡歷切以木簡為書長尺二寸跌徒結切踢也戲許冝切水名章邯音酣張黶烏點切沛傳蓋切下相息亮切地名田儋丁甘切豁如呼活切豁然開大之貌單父上時戰切下音甫地名妻之七計切解縱上紀買切下子用切嫗威遇切説文母也不見胡電切芒碭音忙宕樊噲音快城守音狩城守者守其城也他倣此遺以醉切杠音冮舉也眴音舜動目也綬是酉切綬韍維也組之屬懾章涉切懼也夲作讋詳音佯詐也一本作陽縛符攫切束也厮音斯或作廝走音奏向也馬箠止蘂切馬撾也易弋豉切輕也魏咎劉伯莊咎音其久切秦紀三通鑑卷八起昭陽大荒落盡閼逢敦牂即癸巳至甲午凡二年二丗皇帝下二年監平居銜切秦時御史監郡平其人名也雍齒於用切姓也齒其名澠池莫踐切邑名三川郡名有河洛伊故曰三川鄧説音恱郯音談數誚數音朔誚在肖切責也恣睢上資二切下呼季切索隱云恣睢猶放縱謂肆情恣縱也桎梏上職日切足械也下姑沃切手械也犖然力角切以降胡江切服也跪謝渠委切䠆跪也䠆音長方言北燕之郊謂跪曰䠆顓與專同涓人音蠲顔師古曰涓潔也潔除之人陳涉為王曰有涓人之官羇旅紀冝切張晏曰羇寄旅客也歇或音遏當依夲字讀方與音房豫縣名并力必政切兼也並也徼於堯切要也畨盜蒲何切畨即畨陽縣於畨為盜故曰畨盜後畨改作鄱黥布渠京切本姓英氏曹耦五後切曹輩也芮而鋭切將居又切官名􅊂顔師古曰古夷字章邯司馬下邳貧悲切臣瓉曰有上邳故曰下邳從騎從如夲字居鄛音巢縣名本春秋巢國蜂起古蜂字如蜂之羣起言其衆也盱眙上許于切下音怡邑名臨濟子禮切項它徒何切顔師古曰它與他同項羽從兄之子亢父亢音抗父音甫屠之同都切謂破取城郭誅殺其人如屠六畜然環水户班切繞也謂決水自繞而固守之譴舉去戰切譴謫揆之求癸切度也又徐廣云揆一作撥發繇與徭通無間居莧切隙也少我固我按索隱曰少我者謂以我幼輕我也固我者固陋之固又按劉伯莊音義固作故謂以我幼少又恃故舊以輕我也少失照切與焉音預邪佚上以嗟切下音逸信其志信古伸字玘羊之切劉伯莊云亦作熙同音索隱字作又作起並音怡潔行胡孟切強力其良切有力也主重逐龍切搒掠劉伯莊音彭亮彭蒲庚切笞擊也通作篣掠力仗切撈也搒一音脯撗切其義乃相牽也非搒掠之搒飭音敕胡貉音陌索隱云貉即濊也尅畫上音刻下音獲更往音庚覆訊上敷伏切下音信當上上都郎切論正其罪也下時掌切傅會音附卒惰徒卧切卿子如字公之子為公子王之孫為王孫卿子謂卿之子也演劉伯莊説冠軍古玩切冠者加於首上冠軍之上也慓悍上匹妙切慓疾也下胡旦切悍勇也猾賊戶八切本作禍遺類一本作噍類如淳曰青州俗呼無孑遺為無噍類杠里音江縣名三年搏音博擊也虻音肓嚙人飛蟲蟣居起切蝨色櫛切兵罷讀曰疲被堅𬒳皮義切𬒳堅謂擐甲也執鋭弋稅切執鋭謂利兵也很下懇切戾很也半菽式竹切菽豆也士卒斫之狐疑上音胡下魚其切狐獸名其性多疑每渡氷河且聽且渡故言疑者稱狐疑汙水音于酈元云汙水出武安山洹水音袁洹水在齊魯間虛讀曰墟商都也瑕丘何加切縣名西鄉讀曰嚮朝見胡練切下廟見同左驂七含切三馬為驂祟思遂切説文神禍也望夷宫張晏曰在長陵西北臨涇水作之以望北夷或格古客切幄乙角切三禮圗謂上下四旁悉周曰幄幃音韋單帳也詳以音陽嶢關倪么切嶢山之關啖徒濫切謂以利誘之如以食餧之令其啖食耳蕢山丘怪切資治通鑑釋文卷第一
