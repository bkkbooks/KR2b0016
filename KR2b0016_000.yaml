body:
  text: 資治通鑑釋文序太史公作史記於尚書春秋左氏國語之外別出新意立本紀丗家列傳後之作史者皆宗之莫敢有異獨近丗司馬溫公作通鑑不用太史公法律總敘韓趙魏而下至于五季以事繫年月之次治亂興亡之迹并包夷夏粲然可考雖無諸史可也又自黃帝下屬五季貫穿成書皆出司馬氏一家之手此又不可得而知者通鑑之成殆百年未有釋文學者讀其書間有難字必捨卷尋繹淹移晷景一字既通則巳忘失前覽矣於是眉山史見可著通鑑釋文三十卷字有疑難求於本史本史無據則雜取六經諸子釋音説文爾雅及古今小學家訓詁辨釋地理姓纂單聞小説精力疲疚積十年而書成吁亦勤哉夫無用之學聖賢所不取古今以文章名丗傳後固不少雖傳矣未必真有輔於丗見可精索而粗用深探而約見不與文人才士競能於異丗而為後學垂益於無窮亦可以觀其用心矣見可名照嘉祐治平間眉州三卿為搢紳所宗東坡兄弟以鄉先生事之見可即清卿之曽孫也溫恭誠信見於言貌年幾七十好學之志不衰其猶所謂古君子者歟紹興三十年三月日左朝散郎權發遣黎州軍州主管學事縉雲馮時行序
