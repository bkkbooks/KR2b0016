body:
  text: 右宣義郎監成都府糧料院史照唐紀十一通鑑卷一百九十五起強圉作噩五月盡上章困敦即丁酉至庚子凡三年有竒太宗文武大聖大廣孝皇帝中之上正觀十一年鑒形居陷切亦作監竟夭於矯切壽不得長也漢書龔生竟夭天年丗襲席入切子孫丗丗因襲爵土為王也壞宫古聵切毀之也而狎轄甲切近也姦宄居洧切説文在外為盜在內為宄弦韋胡田切韓子西門豹性急偑韋以自緩董安于性緩佩弦以自急也皆勞郎到切慰也乘輿天子法駕六馬駕也蔡雍獨斷曰天子至尊不敢泄瀆言之故託於乘輿也昧旦莫佩切昧旦丕顯謂於昧旦未明之間巳大明其德言勤也書昧爽不顯坐以待旦飢歉苦簟切食不滿也豐穰如羊切詩自天降康豐年穰穰縲絏上倫追切下私列切論語注云縲黑索絏攣也所以拘罪人殪一計切殺也馬鐙都鄧切馬鞁具搏之伯各切擊也士彠鬱縳切十二年九卿漢以太常光祿勳衛尉太僕延尉大鴻臚宗正司農少府為九卿後魏以來卿各雖仍舊而所蒞之局謂之寺因曰九寺八座漢光武分尚書為六曹并一令一僕射謂之八座庶孽魚列切庶子也窺窬容朱切私視也令狐德棻令盧丁切復姓棻符分切譜諜博古切籍録樊灌古玩切樊噲灌嬰卬然五剛切髙也販鬻上方願切下余六切賣也松檟古馬切山楸砥柱諸氐切陜州有砥柱山山有三門河水所經太宗勒銘焉東京賦砥柱輟流注云山居河中猶柱然也飼羊祥吏切亦作飼倒戈都皓切紂之衆服周仁政無有戰心前徒倒戈自攻于後也糾繆靡幼切戻也皇甫方雨切復姓恚之於避切恨也吐蕃方煩切本西羌屬處河湟江岷間有發羌唐旄等者蕃發聲相近故其子孫曰吐蕃或曰南涼秃髮利鹿孤之後以秃髮為國號訛曰吐蕃也贊普滂午切吐蕃謂強雄曰贊丈夫曰普故號君長曰贊普棄宗弄讃吐蕃君長名亦名棄蘇農亦號弗夜氏黨項多曩切漢西羌别種其地古析支也白蘭郎干切白蘭羌吐蕃謂之丁零左屬黨項右與多彌接松州髙祖置以地産甘松為名諾州匿各切髙祖置隸靈州都督府把利輔雅切慶州有把利氏族與吐蕃姻援寇邊縊一計切自經也洮河道吐刀切洮水出西羌中餘級訖立切秦法斬首一賜爵一級因謂斬首為級都尉揵山尉紆勿切揵巨偃切獨邏水郎佐切與都尉揵山皆古胸奴地苾蒲結切為韀則前切馬鞍具嘻利失嘻丁結切西突厥可汗號咄陸當沒切大啜姝恱切碎葉蘇對切西突厥地名俟斤渠之切突厥號大臣曰俟斤統吐屯徒敦切突厥臣伊列水力孽切在突厥中十三年端揆巨癸切僕射參揔百揆又曰端右端揆之司謂僕射也度支徒各切户部屬官掌天下租賦物産歲計所出而支調之鄜芳無切川名鋒鏑丁歷切箭鏃瘢痍蒲官切瘢痕欒黶乙減切左氏傳晉士鞅曰欒黶汰虛巳甚猶可以免其在盈乎黶死武子所施沒矣而黶之怨實章後盈見逐茅土謨交切古者天子以五色土為壇封諸侯取其方面土苴以白茅授之使立社於其國也紊文運切亂也勦絶書天用勦絶其命勦截也截絶而滅之音了六切又子小切掘溝其月切搰也鼠噍才笑切嚼也繒慈陵切帛也辟仗皮亦切賀邏鶻胡骨切突利之子也蠻俚良爾切蠻屬藩屏方元切下輔鼎切有患難則往捍禦之為之藩屏璽書斯氏切王者印所以為信也抄掠楚交切劫財物狼狽博蓋切狼似犬鋭頭白頰髙前廣後狽狼屬也生子或欠一足二足相附而行離則躓故猝遽謂之狼狽餌藥仍吏切服餌呪術職救切詛也婆羅門蒲何切天竺國一曰婆羅門輻湊上方六切下千候切湊會也如輪輻之共於轂也羚羊角盧經切爾雅麢大羊麢與羚同郭璞注云麢似羊而大角圎鋭本草羚羊有神夜宿以角挂木不著地角有節如人手指握痕至堅徑駁佛北角切駁猶校鏺汗普沫切即西域寧逺國本拔汗那或曰鏺汗居西鞬城在真珠河之北吐火羅它覩切西域國元魏曰吐呼羅居蔥嶺西古大夏之地石史何西域康國枝庶分王者曰安曰曹曰石曰米曰何曰火尋曰戊地曰史丗謂九姓鏃曷作木切山名火燖觸水昆燖徐心切夷狄小國在伊列水界役屬西突厥十四年侃苦旱切褚竹吕切姓又丑吕切妥吐火切炫熒絹切流鬼國東夷國也其人依嶼散居東南航海十五日行乃至靺鞨上莫曷切下何葛切重三譯夷益切説文傳四夷之語者曰譯重謂敘譯其詞語度此三重之國乃至於此也余志市遮切詗者翾正切知處告言詰朝起吉切平旦也物故魏臺訪問物故之義髙堂隂答曰聞之先師物無也故事也言死者無復所能於事故也巢車鋤交切在氏登巢車以望晉軍巢車車上為櫓也瞰苦濫切所中竹仰切耗火到切耗損也撮粟倉括切六十四黍為圭四圭為撮三指撮之也西州交河郡也交河城髙昌王所都漢車師前王廷也髙班逋還切班給也櫟陽音樂邑名屬京兆府葺橋七入切又音集左氏注葺覆也謂以草覆之也鑾輿盧官切禮記注鸞輅有虞氏之車有鸞和之節西都賦乘鸞輿備法駕木橦徒紅切木名花可為布出字書犬酺音蒲酺之言布也王德布於天下令得會聚飲食也帷箔白各切簾也漢書帷簿不修飲盜馬於禁切秦穆公亡善馬岐下野人共食之穆公曰吾聞食善馬者不飲酒傷人乃皆賜酒而赦之絶纓音嬰楚莊王見説苑蚛顙直衆切蟲食物也嗅之許救切括古活切州名刀筆如字古者用簡牒吏皆以刀筆自隨所以削書也惟谷古祿切詩人亦有言進退惟谷谷窮也鄭注云前無明君却迫罪役故窮也皇儲陳如切儲嗣謂皇太子唐紀十二通鑑卷一百九十六起重光赤奮若盡昭陽單閼三月即辛丑至癸卯凡二年有竒太宗文武大聖大廣孝皇帝中之中正觀十五年琅邪余遮切沂州假氏徒玩切姓也陪臣蒲枚切諸侯之臣稱於天子曰陪臣陪重也以赭止也切赤上俟利苾俟渠之切苾蒲結切阿史那思摩也四年與頡利俱禽前年立以為可汗監國古銜切左氏太子君行則守有守則從從曰撫軍守曰監國巫覡刑狄切説文齋肅事神明者男曰覡女曰巫復姓方六切重也尫弱烏光切羸也宅兆直紹切宅墓穴也兆瑩域也安厝倉故切置也窀穸上株倫切下祥亦切窀厚也穸夜也左氏惟是窀穸之事謂葬埋猶長夜也龜筮是制切龜所以鑽灼觀兆以卜吉凶問蓍曰筮下昊札色切日昳也司墓莫故切鄭掌公墓大夫徒屬之家而窆彼驗切下棺也左氏傳作塴音北鄧切義同劈踊毗亦切撫心也踊跳也撫心而跳哀痛之至也荼毒同都切苦菜也言巳之苦毒如荼也莞爾華板切小笑貌臨壙苦謗切墓域鄯善上戰切西域國名百濟子計切西域國本扶餘别種孛蒲沒切孛星蓬然光芒短惡氣所生亂兵之象或謂之彗所以除穢布新也太微武非切太微星五帝之坐天子之庭也宦官胡慣切閹寺逹哥友居何切紇干下沒切虜復姓苫塊上始占切下苦對切禮記寢苫枕塊哀親之在土也苫編草一榱所追切説文秦名屋椽齊魯謂之桶周謂之榱髙麗力支切扶餘之別種其國即漢樂浪故地紿之蕩亥切欺也平壤如養切髙麗所都平壤城也雕瘵側界切病也豐稔而甚切穀熟也伊闕如字山名吳起曰紂之居伊闕在其南東京賦回行道乎伊闕邪徑捷乎轘轅在河南嵩陽息中切嵩陽河南縣名有嵩山霫息入切東北夷名燒剃丈几切芟也又他計切糧糗丘救去久二切乾餱也偵者丑正切問也掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之漲天知亮切塵埃冥冥亘天如水之張也赤柯櫟居何切櫟音歷地名陳亘陳讀曰陳亘古鄧切長矟所角切亦作槊思結部思結部在薛延陀故牙五臺代州縣名有五臺山十六年洎巨至切馬箠止蘂切馬檛也重數直隴切色角切素褥儒欲切茵褥馬乃老切本亦作碼腦石次玉遏索昔各切山名無賴落蓋切賴恃也又許愼云賴利也無利入於家張掖夷益切故胸奴昆邪王地漢武帝開應劭曰張國臂掖故曰張掖酒泉如字漢郡名武帝開其水若酒故曰酒泉也又舊俗傳云城下有金泉泉味如酒烽燧徐醉切烽燧火也古者以烽燧招兵置之邊亭有警輒舉火騰煙京邑及諸侯望以相應也米國如字唐國枝庶王者郢縱公足用切宇文士及諡曰恭劉洎曰亡及過自奉養不可謂恭乃改曰縱屈強渠勿切下巨兩切屈本亦作倔倔強梗戾也契苾蒲結切虜復姓泉蓋蘇文蓋蘇文或號蓋金姓泉氏自云生水中以惑衆馮翊上符中切下逸織切縣名屬同州蒲反甫逺切河東縣名故曰蒲秦始皇東巡見長坂故加反轉餉式亮切轉運也餉饋也晡食奔謨切日加申時席藁古老切席芻藁以自貶𬞞食山於切𬞞食菜食也愎諌弼力切很也十七年羽葆博抱切羽葆華蓋天子之儀衛也又唐制鼓吹五部一鼓吹二羽葆羽葆部有十八曲鼓吹尺偽切音律管塤之樂鄠侯古切邑名屬京兆府幼稚直利切亦作稚童稚也自售承呪切賣也鄖干分切古漢南之國尚乘繩證切尚主也主車乘官直長展兩切尚乘局有奉御二人直長十人隂募莫故切廣求也昵近尼質切亦作昵咱子感切姓猛彪輔休切虎文悛改千全切改寤也性褊俾面切衣小曰褊喻性不寬大股栗力質切股戰栗言懼甚也樓堞音牒城上女墻也一名俾倪睥睨敵也攢刃徂官切叢也煨燼烏回切煻煨熱灰也牖間以九切穿屋窗或抉一決切挑也檛折陟瓜切馬箠援槍上音袁下千羊切刺之七亦切榆杜音踰縣名屬遼州郟城訖洽切汝州縣名揣知初委切揣摩辨給訖立切利口捷給厮役息移切養馬析薪者一落欲效為部落瓣髮皮莧切若虜人編髮被之五狼頭纛大到切又音毒突厥之先為鄰國所滅盡殺其族至一兒且十歲見其小不忍殺乃刖足斷臂棄草澤中有牝狼以肉餌之及長與狼交合遂生十男各為一姓故阿史那突厥牙門建狼頭纛示不忘本也太子效突厥故作之幡旗孚袁切旌旐總名穹廬丘中切夷虜􅏧帳其形穹隆僵仆芳遇切踣也𠢐面陵之切剝欻起許勿切有所吹起一設突厥别部典兵者曰設風勵風讀曰諷乘亹許愼切與釁通頓丘都困切澶州縣琵琶上頻脂切下蒲巴切琵琶體圎修頸而小出胡中漢武嫁宗女於烏孫為馬上樂以慰鄉國之思推而逺曰琵引而近曰琶洋徐羊切州名駙馬符遇切都尉官漢武帝置有奉車駙馬騎三都尉晉元帝後罷二都尉惟留駙馬奉朝請諸尚主者唐紀十三通鑑卷一百九十七起昭陽單閼四月盡旃蒙大荒落五月即癸卯至乙巳凡二年有竒太宗文武大聖大廣孝皇帝中之下正觀十七年參鞫上倉含切下居六切參互而鞫治之祐川府爰救切岷州有府曰祐川府平棘訖立切邑名屬趙州賀蘭何佐切魏有紇伏者為賀蘭莫何弗因以為氏蹉跌上倉何切下徒結切蹉跌足失據藩邸都禮切邸舍諸侯王入朝至京師所舍也億度乙力切本亦作臆億度意之也度音徒各切猜二倉才切疑也禮秩直質切次也憮然罔甫切猶悵然也屬心之欲切心有所屬係也悖逆蒲昧切又蒲沒切亂也酺薄胡切説文王德布大飲酒窺伺相吏切奄窺無恙餘亮切憂也道地漢書欲為道地注云為之開通道路使有安全之地也負姊房缶切背也須灰詢趨切本亦作鬚在頥曰鬚可療力照切治病齧指倪結切噬也沈醉持林切書沈亂于酒沈冥言醉甚宫闈于非切宫中門真珠薛延陀可汗名橐駝上撻各切下徒何切胸奴竒獸言能負囊橐而馱物也親迎魚慶切禮男女親迎男先於女剛柔之義沙磧七迹切水渚有石者俟斤渠之切北虜謂大臣曰俟斤蕩平徒沆切又他浪切滌也鴻私胡公切大也私謂恩私有卒臧律切終也易有始有卒者其帷聖人乎龍沙廣志流沙在玉門關外有三名三龍沙捐余專切棄也餌之仍吏切飼也匍匐上薄胡切手行也下蒲墨切伏地也或作扶伏去食起吕切除也踣所蒲墨切仆也覽起居魯敢切欲觀起居所記注也相里息亮切復姓委質職日切形也委其體以事君戢兵側立切藏也黔渠金切州名朝集使直遙切諸州郡奉貢物入京者謂之朝集使僦屋即就切賃也雉奴文几切髙宗小子懦奴卧切又奴亂切弱也折簡古限切折簡猶今言片紙也十八年莫離攴髙麗官名蓋蘇文為之指麾許為切旌旗之所指麾顧眄眠見切説文目偏合一曰袤視字或作盻音普莧切襲服質涉切失氣金湯他郎切韓子曰雖有金城湯池詰欺吉切問也凝旒力求切凝注冕旒一意於聽虛襟居吟切虛其襟懷不自滿假對􅏡余章切對答也答受天子之命而稱揚之飛白蔡雍所造百艘蘇刀切船總名涉獵力涉切言泛覽流觀如涉水獵獸不精專也骨鯁古杏切鯁與鯁同骨強四攴故君有忠臣謂之骨鯁論量龍張切量度鍾愛諸容切晉書情之所鍾鍾聚也歔欷上音虛下許其切歎息貌焉耆於虔切下音攴西域國屈利啜居勿切西突厥臣頡鼻奚結切焉耆王之弟鄉導許亮切為之前導導所趨嚮也髙武髙麗王髙建武也前為莫離攴所殺係頸胡計切係頸示欲自殺也漂搖匹招切若萍蓬之漂搖轉徙也澠池莫踐切邑名屬河南府元璹神六切猝下蒼沒切洺彌并切州名忘拜亡亮切無主謂顔色無定震懾質涉切懼也驍衛堅堯切健也戰艦戶黤切禦敵船也四方施板以禦矢梯衝天黎切雲梯衝車所以攻城也安蘿盧何切山名器械戶戒切有盛曰械無盛曰器幽薊吉詣切並州名遼碣其謁切遼水碣石之地營頓軍營頓舍也都困切愜服詰叶切快也憤歎房吻切悶也鬱邑乙及切亦作悒不安也十九年漕渠在到切運於水也贓汙兹郎切受賕留臺留守臺也叱令尺栗切訶也鄴逆怯切縣名屬魏郡御榻託盍切牀榻私裝側霜切自以家資從軍縣官懸絹切縣官謂天子也夏家王畿內縣名內縣即國都也王者官天下故曰縣官鎮守舒救切努力奴古切方言勉也北趣逡遇切亦作趨趨嚮也甬道余隴切道上加土元莵本漢武帝所置郡莵同都切料配力弔切史記宣王料兵料數也撤之敕列切抽也蓋牟莫侯切髙麗地太宗既拔蓋牟城置蓋牟州鴨渌水乙甲切髙麗馬訾水出靺鞨之白山色若鴨頭號鴨渌水泥淖女教切泥也勍敵渠京切強也春秋傳勍敵之人爇其儒劣切燒也延燒延面切吮血租兖切嗽也會暝莫定切夕也唐紀十四通鑑卷一百九十八起旃蒙大荒落六月盡著雍涒灘三月即乙巳至戊申凡三年有竒太宗文武大聖大廣孝皇帝下之上正觀十九年刀鉞王伐切斧也唐幟式志切旗幟妻孥農都切子也糧仗直亮切糧食仗兵器省事息井切察也耨蕯新史作傉奴篤切音同薩音桑葛切耨薩髙麗官比都督也延壽惠真耨薩髙延壽北部耨薩髙惠真南部靺鞨音末曷古肅愼地後魏謂之勿吉其國數十部或附髙麗或臣突厥泥潦魯皓切泥濘水潦對盧龍都切髙麗官十二級首曰大對盧內芟師銜切結斾蒲蓋切旗也繫旗曰斾未冠古亂切年二十曰冠指蹤子容切以手指示其蹤迹也詒徒亥切欺誑鼓角吉嶽切角軍器徐廣車服儀制曰角前丗書記所不載或云夲出羌胡以驚中國之馬也橋梁力張切爾雅隄謂之梁郭璞注云即橋也或曰石絶水者為梁凡橋有木梁石梁舟梁皆謂橋耳膝行息七切漢書諸侯入轅門膝行而前言畏懼俯伏不敢安行也跳梁徒雕切躍也梁強梁後黃城新舊史皆作后黃駐蹕壁吉切警蹕也天子行幸所止故曰駐蹕標識卑遙切下職吏切為立表記之也奄至衣檢切奄至猝至也更以古衡切翻也候騎胡奏切騎士為斥候者諜者逹協切間諜反接即涉切反縛也間行居莧切竊道間行謂竊取他道不自公顯投隙而行也徑詣古定切徑詣猶直造也徒跣蘇典切徒跣足親地也賜屩訖約切草履亟來去吏切躁擾則到切疾也老耄草報切年八十九十曰耄凶懼許拱切恐懼也徼幸古堯切亦作僥皆躡眤輒切蹈也雞彘直例切豕也饗士許兩切飼軍士以酒食襲我席入切輕行無鍾鼓曰襲縋城馳偽切垂繩而下衝車昌容切橦城車也詩臨衝間間炮石披教切機石木柵測革切編立木為之以徇松閏切言使人將行遍示衆土以為戒也班師逋還切整軍還也屏迹必郢切屏蔽賜縑吉嫌切繒也為殿丁練切軍後曰殿馬鞘仙妙切馬上刀劒室也臨哭力禁切飛騎方微切太宗㨂膂力驍捷善騎射者謂之飛騎衣五色𫀆乘六間馬上出遊幸則從駕臨渝關容朱切上曰臨閭關在平州石城縣褐袍何葛切織毛為布曰褐病癰於谷切癰癤步輦力展切輦人步挽車也吮癰粗兖切嗽也嵐盧含切州名朝衡胡庚切執朝之權衡弱水日灼切水經云弱水出張掖刪丹縣西比至酒泉會水縣入合黎山腹山海經云弱水出崑崙墟西南隅也二十年喬師望喬渠嬌切姓也相屬之欲切相連屬也所解下懈切曉也辟仗匹亦切執兵仗以辟行人又甫亦切圗讖楚禁切符命之書踈勒山於切西域國距京師九千里而贏朱俱波亦名朱俱槃漢子合國也瀚海侯旰切北海名阿跌徒結切契苾上欺訖切下蒲結切北忙丁切溟海編列卑眠切編户之列編户者謂列次名籍也混元胡木切元氣混然謂太古之時也狷介古泫切又吉掾切狷者有所不為介耿介臧否輔靡切臧否猶善惡也銜之乎巖切帑藏他曩切下才浪切金帛所藏僧祗翹移切佛書阿僧祗殫人多寒切極盡也熊蹯符袁切熊掌也左氏楚太子商臣以宫甲圍成王王請食熊蹯而死弗聽杜預注云熊掌難熟兾久將有外救故此云假餘息於熊蹯也雀􅑹丘候切鳥子生哺者史記趙公子章圍主父主父不得食探雀􅑹而食之帷扆隱豈切爾雅牖户之間謂之扆膝下息七切孝經故報生之膝下以養父母日嚴負米房缶切子路曰昔者由也事二親之時常食藜藿之實為親負米百里之外親沒之後南遊於楚從車百乘積粟萬鍾願欲食藜藿為親負米不可復得也劬勞權拘切劬勞搢紳即刃切搢紳之士搢笏而垂紳搢插也插笏於帶也淺鮮息淺切少也芙蓉園在興慶宫旁汛掃思晉切灑也先到切除也二十一年餌金石仍吏切餌金石謂服丹砂藥也北首禮記死者北首生者南鄉皆從其𥘉注云北首首隂也音手又切南鄉嚮陽也夷衾上如字下去金切禮記自小斂以往用夷衾夷衾質殺之裁猶冒也注云冒所以韜尸重形者也小斂又覆以夷衾制如冒耳大夫元冒黼殺鑾駕盧湍切崔豹古今注云五路衡上金雀者朱鳥也口銜鈴鈴謂之鑾也橫橋漢書注橫音光即橫門渭橋也燕然府於虔切以多濫葛部置龜林府以同羅部置蹛林都賴都例二切以思結地置蹛林州漢書注云蹛林胸奴繞林而祭也填顔亭年切以白霫部置置顔州禪杜首時戰切社首山名在兖州釋耒盧對切神農作耒説文云耕曲木也槎木鋤加切槎牙邪斫木也命於通事舍人裏供奉未命以官故令於通事舍人裏供奉若馬周起布衣詔令於御吏裏行是也背城蒲昧切違也沒落言人民流離異域如物之沒水草木零落也遞還大計切轉還也緯于貴切髭即移切説文口上髭也骨利幹古旦切鐡勒諸部正曛許云切日入煮羊胛古狎切闔也與胸脅相會闔納汙汪胡切左氏川澤納汗山藪藏疾辰嬴音盈辰嬴懷嬴也左氏文公六年辰嬴嬖於二君奴刺奴八切啜匐上姝恱切下蒲墨切車鼻昌遮切突厥可汗號西趙南蠻也訶黎虎何切二十二年臺榭詞夜切土髙曰臺有木曰榭鷹隼聳尹切鷙鳥樂浪音洛郎郡名阿棧上於何切下仕限切失鉢屈阿棧結骨蕃部君長名堅昆古軍切本結骨蕃部因其來朝改為堅昆都督府祁連翹移切後漢書音時北虜中有祁連山窮髮之地方伐切莊子窮髮之北疏云地以草木為毛髮比方寒沍草不不生故窮髮所謂不毛之地也茅茨才資切茅葦首鼠如字首鼠一前一却也唐紀十五通鑑卷一百九十九起著雍涒灘四月盡旃蒙單閼九月即戊申至乙卯几七年有竒太宗文武大聖大廣孝皇帝下之下正觀二十二年西洱音二河名出羅谷山新史云昆明蠻以西洱河為境即葉榆河也天竺張六切身毒國也震懾質涉切震懼契丹音乞北狄國辱紇主下沒切辱紇主契丹逐部酋長之稱咄陸當沒切葉護失涉切突厥官號多邏郎佐切多邏斯水西突厥地名龜兹音丘慈西域國泥婆年題切泥婆羅國直吐蕃之西樂陵州茶餺伯各切其字或從金天竺所居城名白霫息入切部落名居於磧北強偉巨良切姓也又其兩切君羡延面切又似面切貟道信貟音運姓也絶粒力入切米食曰粒絶粒道引辟榖也當王于况切愍眉殞切憐也雙舫甫妄切兩船相並婺亡遇切州名在婺女星之分山獠魯皓切蠻獠踊貴余隴切言榖價驟貴如踊起然也回紇下沒切其先胸奴也元魏時亦號髙車居薛廷陀北職貢質力切國語職貢業事之不共又曰昔武王克商通道于九夷百蠻使各以其方賄來貢使無忘職業焉耆音煙支西域國磧石匕迹切沙土曰漠即今磧也多褐何葛切龜兹城名羯獵顚居謁切龜兹相名大俟利發俟渠之切俟利發突厥之官號窟哥苦骨切契丹帥名奚帥奚比狄國與契丹同出東胡之後奚帥者其國之將帥也峭落七笑切州名隸松漠都督府二十三年徒莫祗西南諸蠻內附太宗置傍望覽丘四川後隸戎州都督府手捫莫奔切撫持也𠢐面力之切剝也灑地沙下切汛也于闐音田又堂練切西域國伏闍信辰遮切于闐王名契苾上音乞下蒲結切西夾室訖洽切書西夾南嚮注西廂夾室贊普吐蕃之俗謂強雄曰贊丈夫曰普故號君長曰贊普髙宗天皇大聖大洪孝皇帝上之上永徽元年公除從吉也王氏音訓云謂巳成服除之以從公家之事不待終制也狼山盧當切後為州隸安北都護府桑乾音干漢屬代郡新黎盧兮切以羯漫陀部置後為州仙蕚逆各切磧北有仙蕚河後隸安北都護府油衣夷周切凡雨其者周時有之矣炙轂子曰惟絹油之製及帽油陳始有之見續事始譯語夷益切通四夷之言者睿册俞芮切琰州以冉切諸蠻州隸黔州都督二年奭施隻切駱歷各切姓橋渠驕切姓嘻運丁結切亮隂力漾切隂默也居憂信默三年不言彈彈徒案切行圎蔣子兩切惲委枌切錢貫古亂切緡也蒲類薄胡切北庭縣名突厥中有蒲類每弓月道突厥中有弓月城郎州如字即南寧州太宗更名麻州如字太宗析郎州置隸戎州都督府九成宫在鳯翔即隋仁壽宫左藏才浪切收錢帛雜綵天下賦調之所特浪郎宕切羌酋卜簷莫都含切秃磨蒲他谷切曰水蠻酋也青蛉盧經切漢嘗已開為縣屬越嶲郡青蛉水出西東入江也弄棟多貢切漢屬益州郡葉榆七涉切下音俞漢屬益州葉榆澤在縣東朱邪余遮切部落名三年逗留大透切下如字又力救切逗留不進中廏居又切釋各廏聚也生馬之所聚中廏謂天子馬間也擊鞠居六切擊鞠謂騎而以丈擊者也非蹙鞠瑗于願切浮屠同都切學佛僧也宫省所景切漢以禁中為省中禨祥居希切亦祥也昵尼質切近也亦作昵四年愔揖淫切伽獨去迦切林邑王之臣也真臘力葛切真臘在林邑西北本扶南屬國去京師二萬七百里撞鍾傳江切搗也歙失涉切州名以楯殊尹切亦作盾所以捍身兵器也蓨他雕切漢書音條頡苾奚結切五年內之諸答切昭儀朱搖切招顯其儀示隆重也士彠鬱縛切鳯泉湯他郎切在鳯翔大食實賦切本波斯地波斯息移切波斯居逹遏水距京師萬五千里而贏漲溢弋質切泛濫也門桄姑黃切呼沱徒何切山海經云太戲之山滹沱之水出焉在代州東入趙地粳米古衡切稻屬扼殺乙革切説文把也六年厭勝益涉切廣雅云厭鎮也貟外于權切官數令族力正切善也三思如字又蘇紺切參之也論語三思而後行撲殺弼角切説文挨也嫫母莫胡切黃帝妃貌甚醜黃帝立四妃象后妃四星皇甫謐云元妃西陵氏女曰嫘祖次妃方雷氏女曰女節次妃肜魚氏女次妃嫫母班在三人之下妲巳當割切紂之妃有蘇氏女也美好辨辭嬖幸於紂紂用其言毒虐衆庶於是武王伐紂斬妲巳頭垂之於小白旗以為紂之亡由此女也褒姒詳里切以其出於褒國故曰褒姒周幽王廢申后立褒姒褒姒不好笑幽王欲其笑萬方故不笑為舉烽燧諸侯悉至至而無寇乃大笑其後申侯與犬戎攻幽王王舉烽燧召兵兵莫至遂殺幽王驪山下虜褒姒盡取周賂而去塵黷徒谷切國語司空季子謂文公曰男女不相及畏黷也黷則生怨怨亂育災育災滅性張華女史針曰歡不可以黷寵不可以􅌹𦵔醢上臻魚切下音海虀𦵔醯醢也子胥新於切伍貟麋鹿旻悲切鹿屬姑蘇吳王闔閭起姑蘇之臺二年聚材五年乃成髙見三百里造舟七報切又七道切大明詩曰文定厥佯親迎干渭造舟為梁不顯其光鄭注云迎太姒而更為梁者欲其昭著示後丗重昏禮也造舟比其舟而渡也比船於水加板其上若今之浮橋文王重昏事始作而用之周公因之制禮著尊卑之差天子造舟諸侯維舟大夫方舟士特舟太姒太姒莘國之長女文王之正妃關雎千余切關雎周南詩首篇二南蓋文王之化而美后妃之德也雎鳩王雎也鳥摯而有别關關和聲也十斛胡谷切十斗為斛唐紀十六通鑑卷二百起􅏧蒙單閼十月盡元􅘬間茂七月即乙卯至壬戌凡六年有竒髙宗天皇大聖大洪孝皇帝上之下永徽六年勳庸許云切周禮王功曰勳民功曰庸地華户瓜切言門地光顯纓黻於盈切冠繫也黻以繒為之黑與青畫兩巳相背象君臣可否相濟也音分物切椒闈兹消切木名下于非切宫中門漢官儀曰皇后稱椒房以椒塗壁取其溫而芳蘭掖夷益切西都賦曰後宫則有掖庭椒房后妃之室菹若椒風坡香發越蘭林惠草鴛鸞飛翔之列吕向曰掖庭宮名在天子左右如肘腋儲二直魚切儲副昔在儲二謂為太子時宫壼苦本切宫中道飭躬畜力切正也嬪嬙上毗賔切下慈良切媚嬙婦官竅壁苦弔切穴壁為竅道斷去上音短下起吕切酒甕烏貢切罌也二嫗威遇切説文曰母也大家謂天子妖猾户八切猾亂為貓謨交切本又作貓音同又武儦切捕鼠獸蟒氏母黨切蛇最大者曰蟒梟氏古堯切不孝鳥也若隋煬帝誅楊玄感改其姓為梟氏也數見所角切為祟息遂切為禍祟也瀝血狼狄切滴瀝蓬萊宫蒲公切在京城東北彗星祥歲切彗星妖星也明兩良奬切易曰明兩作離爝暉子約切字林云爝炬火也莊子日月出矣而爝火不息其於光也不亦難乎反植音殖種也賈誼賦賢聖逆曵兮邪正倒植植音值立也犯鱗力珍切神龍頷有逆鱗嬰者死言犯君威則觸嚴刑也狡險古巧切狂也猾也忌克渠記切忌謂畏忌憎惡克謂好勝賊害左氏傳今其言多忌克顯慶元年亡匿昵力切藏也廩府力錦切倉廪府庫𧖟要徂含切以𧖟事為要省其所景切簡少也配昊天下老切春為昊天言元氣廣大也孝經郊祀后稷以配天王者必以其祖同祭於天尊之也冬至祀昊天上帝於圎丘武德中以景帝配今更以髙祖聖配五帝周禮兆五帝於四郊此五行之精氣也而鄭氏謂為太微五帝非也唐𥘉季秋大享于明堂皆祀五方天帝以元帝配今更以太宗配明堂孝經援神契曰明堂上圓下方八窗四闥布政之宫在固之陽又三輔黃圗云明堂者大道之堂也所以順四時行月令宗祀先王祭五帝也歌邏祿郎佐切部落名淳于羽俱切復姓漣水力延切縣名屬泗州叱尺栗切訶也柘栱居竦切並州名生羌之地鷹娑川素何切在突厥中懦怯奴卧切又奴亂切弱也逗遛大透切丁音溜不進也捐身與専切棄也氓黎上莫耕切民也下郎奚切衆也無恚於避切恨也二年郇昔遵切那羅奴何切那羅邇娑婆寐天竺方士也自言壽二百歲有長生術太宗館之於金飈門造藥令兵部尚書崔敦禮監主之藥成不效朝覲渠吝切周禮春見曰朝夏見曰宗秋見曰覲冬見曰遇寧謐彌畢切靜也螻蟻上音樓下魚豈切螻螻蛄也蟻蚍蜉皆蟲之微小者也餘齒昌里切禮記古者謂年齡齒亦齡也注齒人壽之數也迎氣周禮大宗伯以血祭祭五祀注云四時迎五行之氣於四郊而祭五德之帝蔡雍曰天子以四立及季夏之節迎五帝於郊導致神氣祈福豐年太微無非切周禮兆五帝於四郊鄭注以為青帝靈威仰赤帝赤熛怒黃帝含樞杻白帝白招拒黑帝汁光紀也太微五帝之坐黃帝在太微中含樞紐之神也緯書于貴切易詩書禮樂春秋孝經皆有緯書蓋漢未夏賀良之徒為之以為有經必有緯故曰緯書六天自鄭氏以為昊天上帝者天皇大帝北辰耀魄寶也及太微五帝由是有六天之説蓋出於春秋緯文曜鈎等書唐顯慶禮猶著六天之説故禮部尚書許欽宗與禮官議黜之方丘敷羊切夏至祭地於澤中之方丘亦取自然之丘象地方也神州食鄰切周禮大司樂乃奏太簇歌應鍾舞咸池以祭地示注云地祗所祭於北郊謂神州之神及社稷又通典曰神州謂王者所卜居吉土五千里之內地名也注崑崙東南地方五千里名曰神州滍水丈几切又音峙汝州魯山縣有魯山滍水所出東北至定陵入汝汜水音凡又音祀漢書注成臯城秉汜水是也今孟州泛水縣賜賚洛代切賜也曵嘻河丁結切攢矟色角切矛丈八者謂之矟屈律啜丘勿切踏雪逹合切踐也牙帳五加切虜帳建牙郵驛羽求切郵驛謂路上舍入流力求切流品也分九品官謂之流內又有視流內選事須絹切知選事謂知銓官事也釐革陵知切理也名核改易也三年鬻獄羊六切賣也左氏傳鮒也鬻獄四年乳臭蘂主切漢書是口尚乳臭謂其效小也黎明力奚切黎猶比也比至天明也肘腋上陟桞切臂節也下夷益切胳也在肘後任俠上汝鴆切下橔頰切任謂任使其氣力俠之言挾也以權力挾輔俠也皇地祗巨至切后七皇地祗神也周禮大宗伯掌地示之禮又曰以黃琮禮地注禮地以夏至謂神在崑崙者也簿録裴古切為文簿籍録之也拔汗那蒲撥切即寧逺園小曰鏺汗悒怛乙及切下當割切本漢大月氏之種朱駒半西域國或曰朱駒波即漢子合國也都曼謨官切又音曼般陀蒲官切西域國或曰漢陀曰偈羅陀治蔥嶺中都城五年版授輔綰切謂不加告命以版䇿授之嵎夷元俱切東表之地禹貢嵎夷在青州冷岍輕煙切地名或作冷陘沙磚徙官切地名風眩熒絹切目無常主浿江普蓋切又譜賴切水出樂浪西至增地入海鏤方郎豆切故漢樂浪縣龍朔元年一戎大定樂書一戎衣天下大定道琛丑林切倭國烏禾切倭奴國在東海中即日本國也正朔朱成切王謂年之始朔謂月之初古泗息利切説文受泲水東入淮嚈噠益涉切下陀葛切悒怛國也嚈噠王姓後裔以姓為國訛為悒怛也罽賔居例切罽賔國在蔥嶺南去京帥萬二千二百里陸渾胡昆切河南縣名有陸渾山在伊闕二年二十四司唐制尚書省都堂居中左右分司都堂之東曰吏部戶部禮部三行每行四司左司統之都堂之西曰兵部曰刑部工部三行每行四司右司統之凡二十四司御史臺御史臺改曰憲臺大夫曰大司憲中丞曰司憲大夫九寺祥吏切寺司也官之所止九寺即九卿也改太常曰奉常卿皆為正卿少卿為大夫之類是也七監格懴切領也改國子監曰司成館祭酒曰大司成司樂曰少司成少府監曰內府監將作監曰繕工監之類也十六衛左右衛府驍衛府武衛府皆省府字左右威衛曰左右武威衛左右領軍衛曰左右戎衛之類是也餘並見新舊史沃沮道上烏酷切下千余切其國在髙勾麗蓋馬大山之東輜重上側其切下直用切釋名曰輜厠也軍糧什物雜厠纍重故曰輜重安輯籍入切和也自殱子廉切盡也夜傅符遇切著也唐紀十七通鑑卷二百一起元􅘬閹茂八月盡上章敦牂即壬戌至庚午凡八年有竒髙宗天皇大聖大洪孝皇帝中之上龍朔二年衣碧上於既切下彼役切代青也鳴鏑丁歷切矢鋒漢書冒頓作鳴鏑注云髐箭也樞軸仲六切漢書車丞相當軸處中攻訐居謁切告訐也䫻海道越筆切地名興昔亡興昔亡可汗阿史那彌射也繼往絶阿史那步真也噍類才笑切嚼也言無復活而噍食者三年銓綜子宋切機縷怨讟徒谷切痛怨頸頰吉協切面旁俱張如字又音脹恚而項頰皆滿也厭之益涉切廣雅曰厭鎮也朔望色角切朔旦望十五日也日月相推朔會望衡古塜知隴切冢墓窺覘敕豔切窺也又癡廉切災眚所景切過也銅山徒東切漢文帝賜鄧通蜀嚴道銅山得自鑄錢李義府好聚斂故謂為銅山大賊通衢其居切爾雅四逹謂之衢含元殿胡甘切李華賦云因以鴻稱含元建名易乾坤之説曰含洪光太又曰元亨利正士翽呼外切青海如字吐谷渾中有青海周回八百里中有小山至冬氷合遊牝焉其上言得龍種嘗得波斯草馬因生騦駒故代稱青海驄論仲琮論盧頓切姓也琮徂宗切黜陟敕律切黜退陟升也扶餘房無切復姓黑齒迄得切復姓黑齒常之百濟西部人也縶陟立切繫也沙吒側加切復姓嚮者許亮切比屋簿必切比相次也僵尸居良切踣也命瘞於計切幽貍也村聚從遇切廣雅曰聚居也前書音義小於鄉曰聚堤堰於建切壅水陂塘彼為切澤障曰陂塘偃豬也屯田徒敦切凡邊防鎮守轉輸不給則結屯田以益軍儲拂菻力錦切古大秦國也居西海上一曰海西國去京師萬里麟德元年博義楚加切畫一胡麥切漢書蕭何為法講若畫一言整齊也岱宗徒耐切岱宗泰山東嶽也風俗通云泰山山之尊者一曰岱宗岱始也宗長也萬物之始隂陽交代故為五嶽之長參逐倉含切參互更張古衡切漢書譬之琴瑟不調甚者必解而更張之白丁當經切民男女年十八以上為丁丁從課沒收穫胡郭切刈榖其忿撫吻切悁怒二年祕閣兵媚切髙祖時太史局隸祕書髙宗改太史局曰祕書閣局令曰祕書閣郎中傅仁均方遇切仁均束都道士也善推步之術髙祖受禪將治曆大史庾儉傅奕薦之戊寅曆莫候切傅仁均以唐在戊寅歲甲子日登極曆元戊寅日起甲子名為戊寅元曆如漢太𥘉也推步昌追切推測考步也劉焯職略切焯字士元仕隋為大學博士著曆書十卷耽羅丁含切夷狄國藁秸古老切稈也禾去其穗下訖黠切秸亦藁也禮記郊特牲曰草席之安而蒲越藁秸之尚明之也言禮貴質所以交於神明漢書席以藁秸陶匏步交切郊特牲曰器用陶匏尚禮然也陶謂陶瓦為酒尊匏瓠也匏爵謂破匏為之皆太古之禮器貴其質素自然茵褥而蜀切説文茵車重席也褥繁采色也罍爵盧回切罍龜目酒尊刻木作雲雷之象爵刻木為之􅃮赤中爵盡也足也又象爵之形毳幕充芮切獸細毛也填咽一結切塞也乾封元年玉牒逹協切玉為簡牒玉匱求位切玉匱一長一尺三寸以藏上帝之册金匱二以藏帝之册纏以直連切又持碾切纏繞也金繩神陵切金為繩索也藏册匱纏以金繩五周玉璽方一寸二分文如受命璽石䃭音敦石䃭石篋也以方石再纍皆方五尺厚一尺刻其中以容玉匱䃭旁施石檢十枚以檢石䃭南方北方皆三東方西方皆二去䃭隅皆一尺䃭纏以金繩五周封以石泥帷帟夷益切帷在上曰帟爼豆莊所切爼豆禮器爼四足如案所以薦肉爾雅木豆謂之豆竹豆謂之籩泉寶徂圜切泉寶義取通流武德𥘉璹開元通寶錢徑八分重二銖四參積十錢重一兩今乾封泉寶錢徑寸重二銖六分以一當舊錢之十源愚袁切姓説文本作厵篆文省作原後人加水瀝觴尸羊切觶實曰觴歷觴酹于地也相里氏息亮切咎繇之後為理氏商末理證孫仲師遭難去王姓里至晉里克見滅克妻司成氏携少子季遭逃居相成為相里氏蝮氏芳六切蝮虺也佳鷂弋笑切鷙鳥𡵨陽巨支切太宗析扶風岐山及京兆之上冝置岐賜縣後苜永徽五年髙宗復置二年籍田秦昔切天子躬耕籍田以勸率天下使務農也漢書注籍猶蹈藉也耒耜詳里切田器説文臿也九推吐回切禮記月令天子三推卿諸侯九推文瓘古玩切胄直又切乾糒平祕切乾也謂乾糇總章元年翹足渠遙切舉也彗星徐醉切宋均注鈎命決曰彗五彗也蒼則王侯破天子苦兵赤則賊起強國恣黃則女害色權奪於后妃白則將軍逆二年兵大作黑則水精賊江河決賊處處起也楊韓占曰其象若竹彗木條長短無常其長大見久災深短小見不久災狹又彗所以除舊布新也五車五車五星三柱九星在畢北五車者五帝車舍也五帝坐也主天子五兵徹樂直列切去也烏荼烏荼西域國荼本作秅按漢書顔師古烏音一加切年音直加切盧迦居伽切凱歌可亥切樂也不首守又切有咎自陳曰首隊伍徒對切部隊軍伍五人為伍也怖懼普故切惶懼二年八觚攻乎切西都賦上觚稜而棲金爵注云觚稜闕角也應劭曰觚八觚有隅者也櫺盧經切窗櫺柳楶楶子結切爾雅栭謂之楶注云即櫨也切韻櫨柱上柎也枅栱吉奚切承衡木下居勇切爾雅樴謂之杙大者謂之栱巡守守又切晏子曰巡守者巡所守也飢歉苦簟切説文食不滿也酒闌盧干切漢書注闌言希也謂飲酒者半罷半坐謂之酒闌檛殺陟瓜切馬箠也言擊殺之轜車音而喪車也烏德鞬山居言切按考異曰唐曆云即鬱督軍山虜語兩音也閨門涓畦切説文特立之門上圎下方有似圭也煮粥之六切糜也爇其如劣切燒也不愜詰叶切快也駮北角切乖舛也閩中武巾切咸亨元年齊聃他甘切祖禰乃禮切謂祖與父也邏娑郎佐切下蘇箇切論欽陵吐蕃官大相曰論菹副相曰論菹扈莽亦號大論小論欽陵者大論薛祿東贊之子唐紀十八通鑑卷二百二起重光協洽盡重光大荒落即辛未至辛巳凡十一年髙宗天皇大聖大洪孝皇帝中之下咸亨二年匐延蒲北切以處木昆部置匐延都督府隸北庭都護府五咄陸當沒切𥘉咄陸可汗死沙鉢羅嘻利失可汗立分其國為十部曰五咄陸部曰五弩畢失部蒼猝蒼沒切博雅云猝暴也衰絰上倉回切下徒結切説文絰喪首戴也馬韁居良切紲也葉縣失涉切隸汝州三年昆明古敦切在㸑蠻西因總敦因州居戎州西北總州居西南敦州居南逺不過五百餘里近三百里浩舋漢書地理志金城郡縣名注云浩亹水出西塞外東至九吾入湟水浩音誥浩水也亹者水流峽山岸深若門詩大雅曰鳬鷖在亹亦其義也今俗呼此水為閣門河蓋疾言之浩為閣耳荒徼吉弔切徼猶塞也夷貊莫白切東方曰夷北方曰貊曰繆靡幼切福畤音止嫌隙胡兼切不平於心下迄逆切怨隙馮盎於浪切罕接許旱切希罕全椒兹消切滁州縣名邢奚經切撤膳直列切去也膳音時戰切擲倒直炙切投也都晧切仆也左奉𥙿率朔律釱髙宗改左右內率府曰左右奉𥙿率伶官盧經切説文弄也四年靺鞨音末曷北狄别種擐甲胡慣切貫也瘧疾逆約切熱寒休作上元元年髙麗力支切䃋石容朱切石名晟承正切大酺音蒲令民合聚飲酒為酺東西朋蒲登切輩也志趣趣音逡遇切趣尚也推梨昌追切遞相大計切更互也俳優蒲諧切説文戲也優倡優也家語齊奏宫中之樂俳優侏儒戲於前孔子曰匹夫熒侮諸侯者罪應誅瞿然俱遇切失守之貌華山胡化切又户瓜切西嶽華山在華隂書疏華變也萬物變由西方也君徹直列切惲委粉切煒于鬼切馳傳張戀切傳以木為之長尺五書符其上以為信馳傳者將而疾行也伏闍雄同都切又辰遮切齊衰音資下七雷切喪服斬布而不緝謂之斬衰齊衰則緝之也俸祿房用切秩祿也卉木許偉切草總名二年尉遲紆勿切買肖城莫蟹切新羅國中先𧖟徂含切周禮王后帥內外命婦享先𧖟於北郊漢儀春桑生皇后親桑於苑中蠶室飬𧖟于薄以中牢羊豕祠𧖟神曰苑窳婦人宇氏公主凡二神也又通典先𧖟天駟也邙山莫郎切河南洛陽北土山著令陟慮切下力正切著以為令也義琰以冉切臣軌居洧切言以為人臣之法防人符方切防守者候其胡闕切候望也突煙陀沒切本亦作堗竈也漢書見其竈直突腐矣扶兩切腐爛屬心之欲切係心鴆之直禁切澧音禮州名難詰乃旦切問也老嫗威遇切説文母也解事下懈切糾駮北角切儀鳳元年中嶽逆角切嵩山息中切中嶽也釋名云大而髙曰嵩字或作嵩詩嵩髙維嶽駿極于天白虎通曰山在中央四方之中而髙故曰嵩髙溫湯他郎切汝州渠縣有溫湯可以熟米晉陵力登切常州縣誤斫職略切斫伐措其倉故切置也一抔蒲侯切漢書注云抔謂手掬之也其字從手不忍言毀徹故止云取長陵一抔土耳同僚連條切亦作寮左氏同官為寮吾嘗同寮藺力政切祫享胡夾切祫祭也春秋傳曰大夾者何合祭也毀廟未毀廟之三皆登合食乎太祖璨倉按切禘後大計切禘夏商四時之祭春曰礿夏曰禘秋曰嘗冬曰蒸至周則改之春曰祠夏曰礿而以禘為大祭三年一祫五年一禘祫以昭合食于太祖禘以審諦其尊卑也璨時議以為新君喪畢而祫明年而禘自是之後五年而再祭蓋後禘去前禘五年而祫常在禘後三年禘常在祫後二年議者以璨言有經據遂從之贓賄呼罪切鄱陽蒲和切饒州縣名鄢陵於愋切頴川縣名二年朝鮮直遙切下相然切箕子所封漢樂浪縣三年龍支章移切鄯州縣名濠所乎刀切城下池狼狽博蓋切狼屬跋地設蒲末切吐蕃將徒跣先典切徒跣謂足親地婁盧侯切著辨亡論晉陸機吳人以祖父丗為吳將相有大勳深慨孫皓之亡遂著辨亡論二篇論權所以得皓所以亡也河橋成都王頴假機後將軍河北大都督討長沙王又列軍自朝歌至十河橋鼓聲聞數百里又奉天子與機戰機軍大敗遂遇害于軍中七札側八切又側乙切左氏晉楚遇於鄢陵潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰既戰楚師敗績閫外苦本切漢書闐以外將軍制之謂以閫外方面之難任之也李左車尺遮切廣武君殊功慵朱切殊異也黔首其廉切説文黎也秦謂民為黔首謂黑色也反語孚袁切調露元年壯麗力討切美麗也漢書蕭何治未央宫東闕北闕前殿武庫大倉上見其壯麗其怒麴薩若素葛切下爾者切吐蕃人羊同如字吐藩傳大羊同國直崑崙山偃師於幰切河南縣符呪職救切行符呪祭幻術胡辨切幻惑澠池彌兖切邑名屬河南府覘知丑廉切又敕豔切同也漢使所吏切自漢以來皆稱夷夏為蕃漢契箭詰計切契箭蕃法以為召兵之信碎葉蘇對切突厥諸部中城名井陘户經切鎮州縣有陘山其道險隘龍門如字按史屯絳龍門也休璟居永切􅌔古限切永隆元年潘鋪官切三百乘繩證切四馬曰乘安堵董五切如墻堵安靜不動也趣使趣讀曰促烽戍敷容切烽燧春遇切屯兵懷哲音哲鞫居六切窮理罪人也宥之爰救切訥言奴骨切誹諧誹當作俳或字通用戲也諧音户皆切漢書即妄為諧語諧者和韻之言也琁旬緣切開耀元年路門如字路門大寢門也天子宫內有路寢故有路門在應門之內奕丗夷益切大也亦作奕盛也台鼎湯來切三公上應台階鼎足承君故曰台鼎沔彌兖切州名剔去他歷切方陳直刃切與陳同汾隂扶芬切漢書汾隂在河東燎炬盧皎切然火下臼許切束葦燒之顗語豈切妯娌音軸里爾雅長婦謂稚婦為娣婦娣婦謂長婦為姒婦郭璞云今相呼先後或為妯娌巢由巢父許由三顧古慕切蜀先主三顧孔明於草廬中商山詩梁切商州商雒縣山也漢書園公綺里季夏黃公角里先生避秦而入商雒深山謂之四皓漸染子廉切漬也芝蘭音枝瑞草一歲三華鼎盛鼎方也僕以步谷切司馬遷報任安書云僕雖疲駑又自稱曰太史公牛馬走司馬遷李善注文選云走猶僕也言巳為父太史公掌牛馬之僕自謙之辭也唯唯干癸切唯唯言每事稱善無它一言以為規益也不餐千安切不餐周粟若伯夷叔齊也反間居莧切間諜也單使多寒切少選如字少選猶少頃也渾濬户昆切晉太康𥘉大舉伐吳王渾巳破孫皓中軍頓兵不進而王濬順流鼓棹乘勝受降渾耻且忿奏濬罪狀二人由是交怨唐紀十九通鑑卷二百三起元􅘬敦牂盡柔兆閹茂即壬午至丙戌凡五年髙宗天皇大聖大洪孝皇帝下永淳元年藍田盧甘切邑名屬京兆府襲禮席入切因也不相襲禮則有損益也裒蒲侯切綝丑林切飢饉渠吝切無穀曰飢無菜曰饉出幸如字蔡雍云天子車駕所至民臣以為僥幸故曰幸也草竊千結切書好草竊姦宄草竊草野竊盜也赤縣如字中國名曰赤縣神州神采此宰切氣之清者為神采文采也桎梏音質谷桎足械梏手械也勮渠據切欒城盧團切趙州縣名今屬真定銓衡且緣切銓官也衡言其平也弱息蘇即切漢書注息生也謂其所生之子也駱歷各切姓浮躁則到切動也令終郎定切令猶善也犀角先齊切説文南徼外牛一角在鼻一角在頂似豕麝香神夜切麝似麞常食柏葉又敢蛇其香正在臍腹前皮內别有膜裹之至寒香滿入春患急痛自以腳剔出之人取帶之能辟惡跌而徒結切跌踢足失措也熱海如字熱海在辟葉東地寒不凍截之昨結切金鼓如字漢書聞鼓聲而縱聞金聲而止注金謂鉦也一名鐲音濁近屬殊六切親屬長倩倉甸切鼓城定州縣名今屬祁州辟召必益切除也旱蝗胡光切即螽也食苗為災五嶽西嶽華山也東嶽泰山也北嶽常山也南嶽衡山也中嶽嵩山也嶽通作嶽裏行御史臺官太宗朝始有裏行之名髙宗置監察御史裏行武后置殿中裏行後亦專以裏行名官菽粟式竹切菽衆豆之總名餓殍彼表切餓死者曰殍朝陽陟遙切爾雅釋山云山東曰朝陽詩鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽弘道元年媯俱為切州名囊盛奴當切説文橐也一曰有底曰囊無底曰橐盛音時征切貯也大斌音彬邑名屬綏州朝那上直遙切下奴多切病瘖於今切不能言也診之止忍切候脈為診刺頭七賜切又七迹切則天順聖皇后上之上光宅元年禕之叮韋切羽林如字羽林宿衛之官言其如羽之疾如林之多也一説所以為王者羽翼坊曲分房切邑里也眇身弭沼切微也見嗤赤之切笑也不渝容朱切變也慘紫七感切鄱陽蒲禾切饒州縣名崑崙古渾切下盧昆切商舶舶音白海中商賈大船文水如字武后并州文水縣人故立祠堂於縣憤惋烏貫切盩厔張流切下陟栗切邑名屬鳯翔府括蒼古活切處州縣名後曰麗水有括蒼山黟令音移丹陽縣名下力正切縣令更衣古衡切改也春宫職林太子故事東宫亦曰春宫之嬖卑義切寵也翬翟許韋切下亭歷切翟雉名周禮注伊洛而南素質五色皆備成章曰翬王后之服刻繒為之形而采畫之綴於衣以為文章又曰禕衣禕音義同聚麀於丘切禮記父子聚麀注云聚云共也牝鹿曰麀包藏班交切左氏無乃包藏禍心以圖之神器時真切老子天下神器不可為也謂大寶之位是天下神明之器不偶語口切遇也盱𣅿況于切下盈之切縣名屬泗州玉鈐衛其廉切是年武后改左右鎮軍衛曰左右玉鈴衛崔察察與察同騫味道夫乾切風俗通云騫姓閔子騫之後櫟陽音藥縣名屬華州魚語居切風俗通云魚姓宋公子魚賢而有謀以字為氏承曄域輒切景諶時針切金陵如字升州縣名楚威王以其地有王氣埋金以鎮之故曰金陵今屬江寧府王氣于放切伸鋤牀魚切農器也伸展也曲阿烏何切潤州縣名今丹陽甔石丁濫切言一石之儲也方言曰甔瑩也齊攻苦切巫者行厭魅令人蠱惑故曰巫蠱漢武帝末年淫惑鬼神崇信巫術申是江充告太子宫有蠱氣帝使充治之果得桐人太子知充故為陷已殺之帝謂為實詔丞相發兵討之太子赦長安囚與鬪不勝奔湖關自殺壷關洪孤切上黨縣也捽曵昨沒切説文持頭髮批其攀縻切閹為於檢切斛瑟胡谷切五弩畢失奴古切西突厥所分十部五咄陸五弩畢失部也疣贅上音尤下之芮切疣贅瘤腫也塠阜都回切聚上也山無石曰阜唐紀二十通鑑卷二百四起強圉大淵獻盡重光單閼即丁亥至辛卯凡五年則天順聖皇后上之下垂拱三年俚户良士切嶺南蠻屬交趾音止古駱越之地漢交趾郡調露元年曰安南都護府黃花堆都回切突厥地名笞之超之切箠也㸑寶璧七亂切葉陽國志云昌寧大姓有㸑習儋都甘切州名四年神都唐號河南曰東都武后改曰神都悰徂宗切隱慝惕德切惡也季札側八切吳延陵季子伍貟音云伍子胥四瀆徒谷切爾雅江河淮濟為四瀆發源注海者也撰雛免雛戀二切東莞音官本漢琅琊縣後改為沂水屬沂州痼疾音固堅久之疾也氣沮將豫切挫折也虺氏許鬼切蟲屬一名蝮辟兵必益切除也辟兵符言為符書以辟除兵氣也梟首古堯切挂首木上瓌姑回切珦許亮切詿誤上古賣切下五故切謬誤也迎勞郎到切慰勞成蹊弦雞切四靣皆成徑道言出降者多也尚方時亮切尚方少府之屬官也作供御器物故有斬馬劒劒利可以斬馬也顗語豈切纂作管切檻户黤切載囚車十二辰丞真切干為日支為辰二十四氣五日謂之候三候謂之氣六氣謂之時四時凡二十四氣栭櫨上人之切下龍都切説文栭屋枅上標爾雅栭謂之栥注云即櫨也切韻櫨柱上柎也㮰上抽庚切説文邪柱也下頻脂切説文梠也梠謂楣辟雍必益切新論曰王者作圎也如璧刑實水其中以圜壅之名曰辟雍説文言流轉王道周而復始五級訖立切階等也茅茨才資切漢書注云屋蓋曰茨茅茨以茅覆屋也司馬遷曰墨者亦上堯舜言其德行云采椽漢書作採注云採柞本也音采又音菜鐡鷟仕角切鸑鷟鳥名鳯屬國語周之興也鸑鷟鳴於岐山鐡鷟以鐡為之巴蛋蕩旱切南方有蛋蠻除道陳如切除治也若為之驅除開通道路也遺之以醉切贈也尫弱烏王切弱也翕然迄及切合也永昌元年大圭涓畦切大圭長三尺王所搢也典瑞曰王執鎮圭搢大圭以朝鎮圭陟刃切鎮圭長尺一寸以鎮安天下蓋以四鎮為緣飾故以鎮名辭婉於阮切婉娩順也諲伊真切媛于願切美女之稱娣姒待禮切又大計切下詳里切長婦稚婦相謂為娣姒也儻來土黨切儻來者物之暫寄也儻者意外忽來者耳嘔血於口切吐也膏沐姑勞切不御膏沐無容飾也詩豈無膏沐誰適為容迦河居伽切將領即亮切將謂為將以將兵領亦將也圖讖楚譛切纎緯之書晴霽子計切雨止也耐久乃代切忍也平準之尹切準亦平也謂當其價直直十餘萬也修琦渠冝切景雲居影切晉書天文志曰瑞雲一曰慶雲一曰景雲嘉氣太平之應也刑濫盧瞰切溢也左氏刑濫則懼及善人天授元年日南至左氏僖公五年日南至杜預注云周正月今十一月冬至之日日極南又曰朔旦冬至曆數之所始治曆者因此明術數審别隂陽臘月力盍切蔡雍獨斷曰臘者歲之終也三恪克各切春秋左氏説曰周家封夏商二王之後以為上公封黃帝堯舜之後謂之三恪改造在早切作也宗秦客改造天地等十二字照為曌天為西地為埊日為月為囝星為君為臣為忠載為𥘉為年為正為􆂃太后遂自名曌長倩倉甸切士彠鬱縛切醴泉里第切縣名屬京兆府詭譎古委切詭許也公穴切權詐也亶多旱切獬豸下懈切下宅買切豸亦作慶獬豸獸也似山牛一角古者決訟令觸不直者搜捕踈鳩切索也蹂踐女九切履也函之胡讒切匱也汾符分切州名叱尺栗切呵也槍揭千羊切剡木傷盜曰槍蹇列切舉也敲朴口交切短杖也下普木切捶也逮官蕩亥切及也厲色力制切嚴也閻浮提余廉切佛經云剡部即此州名在彌廬山南故稱南閻浮提鳳皇馮貢切説文五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳皇一曰南方之鳥火精雄曰鳯雌曰皇非梧桐不棲非竹實不食非醴泉不飲溧陽力質切升州縣名珣音荀一區傾于切漢書有宅一區袈娑音加沙浮圖者所服𣑽音具云迦羅沙曵華言不正色四方律云一切上色衣不得畜當壞作袈沙色今略梵語也字本作迦沙鹿走則候切疾趨庖厨蒲交切下重株切周禮庖人注云庖之言苞也裹肉曰苞苴厨庖屋也泉獻誠祖緣切姓也南北牙或作衙南北衙掌天子禁軍也南牙諸衛兵是也北牙者禁軍也二年三宥爰救切寬也周禮司刺掌三刺三宥三赦之法炙之之石切炮也格輔兀古伯切格姓也鉗口其淹切説文鐡有所結束也五毒徒沃切害人之草如野葛狼毒之屬資治通鑑釋文卷第二十一
