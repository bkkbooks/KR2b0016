  text: 資治通鑑釋文卷第三十
  hash: sha256:db23e31a01f9e9c3358512c33871b8c2343d9b06f65cc1f103b338549d7e657f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_030-1a}
body:
  text: 右宣義郎監成都府糧料院史照後漢紀一通鑑卷二百八十六起強圉協洽正月盡四月即丁未不滿一年髙祖睿文聖武昭肅孝皇帝上帝姓劉氏諱皓本名知逺其先沙陀人晉開運二年封北平王四年少帝北遷帝乃圗義舉即位於晉陽稱天福十二年國號漢天福十二年按天福晉髙祖年號也自八年改為開運至此四年矣漢雖建國依舊稱晉年號捨開運而追續天福為十二年𥘉無義理但書其實爾徐無黨注衷甲音忠甲在衣中也春秋左傳子木衷甲以禍人臠力兖切臠切絰徒結切首戴也以苴麻為之撲普卜切擊也礫陟格切裂也厭勝一涉切廣雅曰鎮也建瑭徒郎切貯展吕切積也延袤莫候切東西曰廣南北曰袤繼旻眉貧切眇弭沼切一目小也瑩維瓊切又縈定切聿撚乃殄切佺且緣切禆將頻彌切將之偏副也述軋乙黠切契丹將也拽刺上以制切下奴八切奚王名馬櫪狼狄切養馬器也通作挫之祖卧切斫也侵軼同結切又夷質切突也木拐乖買切老人柱杖文珂丘何切繒慈陵切帛也棣大計切怏怏於兩切志不滿也井陘音刑縣名屬鎮州邠悲巾切願虞怨切延琛丑林切狡獪上古巧切下户八切又古外古邁二切掊斂蒲侯切詩曰曾是掊克滏陽扶雨切縣名屬惠州偵知丑正切博雅問也伺相吏切伺候也咽喉上伊肩切下胡鈎切字或從肉浮航胡剛切方舟也暗古暗字彥珣須倫切饌士戀切具食也脯方矩切乾肉為脯郇公相倫切地名在河東解縣審琦渠羈切甬橋余隴切地名縋馳偽切繩有所縋淖女教切泥也竹簀側革切竹棧也器械胡介切有盛曰器無盛曰械土瘠秦昔切土薄也餞之才箭切送去也悒悒乙及切悒悒不安貌倧作各切擲多炙切投也髑髏上徒谷切下落侯切頂也或從頁瘞一計切幽薶也更名工衡切改也岢嵐上音可下盧含切本柵名後升以為軍間道居莧切微路也文蔚紆勿切帑藏上他蕩切下才浪切金幣所藏也會稽上古外切下古奚切按晉灼云本名茅山吳越春秋云禹巡天下登茅山羣臣乃大會計更名茅山會稽亦曰苗山也鉉胡犬切奉頵於倫切豝邦加切臘屬猶豫猶餘救切後漢紀二通鑑卷二百八十七起強圉協洽五月盡著雍涒灘二月即丁未至戊申不滿一年髙祖睿文聖武昭肅孝皇帝中天福十二年從容七恭切從容猶休燕也孟津孟者河北地名孟州河陽縣是也春秋所謂向盟於其地置津謂之孟津存瓌姑回切彥瑫士刀切翟令竒翟直格切姓也亦亭歷切南阪甫逺切坡者曰阪撾張瓜切説文箠也惕息他歷切怵惕謂憂也甄城吉掾切通作鄄縣名屬濮州噍類才笑切青州俗呼無子遺為無噍類處分上昌汝切區處日處下扶問切分別日分浣侯旰切毋得武夫切禁止之辝憤恚上房吻切怒也下於避切恨也跪去委切䠆跪郢以井切州名俶昌六切孺贇於倫切璲徐醉切璉力展切抉古穴切剔也乘輿天子以天下為家不以京師宫室為常處則當乘輿以行天下故群臣託乘輿以言之邢音刑州名嬰城於盈切繞城以自守也飼相吏切亦作飼狐疑音胡獸名其性多疑每渡冰河且聽且渡故疑者稱狐疑贓則郎切納賄曰贓胸臆乙力切胸骨也黜陟上丑律切貶也下竹力切升也砆石地名音膚詗翾正切又大回切知處告言鑊户郭切鼎大而無足澶魏時連切並州名潰胡對切散也陵轢音歷如車之所踐也掬居六切在手曰掬尫瘠烏光切尫弱瓦礫狼狄切小石也崇惲於粉切虔釗之遙切子午谷俞玉切三秦記曰子午長安正南山名秦嶺谷一名樊川踧踖上子六切下子亦切恭謹貌褰丘虔切摳也鄱陽蒲禾切縣名屬饒州乾祐元年蹄涔鉏簮切牛馬迹也檻穽疾正切穿地以陷獸皓古老切鄜芳無切州名哂之矢忍切笑不壞顔後漢紀三通鑑卷二百八十八起著雍涒灘三月盡屠維作噩即戊申至己酉凡一年有竒髙祖睿文聖武昭肅孝皇帝下乾祐元年恣橫胡孟切不順理也思綰烏板切白挺待鼎切白杖也城隍胡光切城池也易曰城復于隍樓堞逹協切城上女垣也鴆殺直蔭切毒鳥以羽毛歷飲食即殺人詰責去吉切問也舐甚爾切以舌取物也當中竹仲切傷也㖡母羌名㖡其字未詳文珂丘何切珙居悚切掎吾居綺切牽其後曰掎公帑他黨切金幣所藏也鴟張鴟鳶也鴟張猶梟張也崛起渠勿切突也檥舟語綺切南方人謂整舟向岸曰檥輯音集又七入切和也匭函上居洧切下胡讒切匣也櫝也襁褓上舉兩切下補抱切負兒衣也邏郎佐切巡也挑戰徒弔切擲嬈敵以求戰汧陽輕煙切縣名屬隴州而陳直刃切與陳同嶼象吕切嶬魚倚切訛言五禾切謬也亦作訛斫側略切説文斬也脛形定切説文胻也昉甫兩切耐仍代切忍也竹箔白各切簾屬箭筈古活切箭末曰筈筈會也謂與弦相會通作栝聶知遇聶尼輒切姓也隱皇帝上乾祐二年援矟上于元切引也下色角切矛屬墅上與切田盧也貰始制切又神夜切貸也幾至巨依切近也羇縻居冝切羇馬絡頭也縻牛紖也洞峿音同吾鎮名德珫昌中切膾古外切細切肉也鈄滔鈄他口切姓也靖靖姓也同都切當作峹芮儒稅切磔陟格切裂也魑魅上抽知切下明祕切鬼屬説文老精物也廋辭踈鳩切匿也歷詆丁禮切毀也抒厠神與切鋌徒鼎切銀朴也墾音墾耕也鴆直禁切毒酒後漢紀四通鑑卷二百八十九上章閹茂即庚戌凡一年隱皇帝下乾祐三年丘壟魯勇切書傳曰畒壟也長槍千羊切亦作毛錐朱惟切筆也德扆隱豈切驅於口切捶擊也聮鑣上陵延切下悲驕切馬御也弭母愧切止也溆象吕切州名哲陟列切珏訖嶽切無恙餘亮切憂也病也澧音禮州名紿徒亥切欺也誑也瘖疾於今切不能言也駢蒲眠切捃托上俱運切下之石切拾也礬符袁切藥石也有白青黃黑赤五種錙銖上莊持切下慵朱切六銖為錙十黍為絫十絫為銖朝請才性切懦怯上乃卧切下乞業切弱也閨門古攜切閨閣廡文甫切堂下周屋稚子直利切幼稚傔從上苦念切下才用切侍從也蕩滌上徒浪切下亭歷切洗也濯也鸗脫盧紅切人名覘癡廉切又敕豔切窺也無厭於廉切不足也趣逡須切嚮也剽掠匹妙切劫略也蠛蠓上莫結切下母總切細蟲也生於杇壤刎武粉切斷也晡奔模切日加申時梟首堅堯切獷直古猛切單舸嘉我切大船也方言南楚江湖謂之舸巫覡刑狄切男曰覡女曰巫塑鬼蘇故切埏土象物也膜拜莫胡切胡人禮拜瀏陽力求切又音柳縣名屬潭州睢陽音雖郡名即宋州後周紀一通鑑卷二百九十起重光大淵獻盡元黓困敦八月即辛亥至壬子凡一年有竒太祖聖神恭肅文武孝皇帝上帝姓郭氏諱威字仲文邢州堯山人以漢樞密受禪都于汴建元廣順國號周廣順元年􅉑叔古伯切邠悲巾切羡餘延面切贏餘也皡下老切劉崇劉旻漢髙祖母弟也𥘉名崇髙祖即位以崇為太原尹北京留守周太祖代漢崇乃建國稱帝自太原以北有州十國號漢太行胡剛切嵐盧含切州名蔚沁上紆勿切下七鴆切並州名諳烏含切記也氓庶莫耕切民也亦作氓蟻語綺切蟲名蚍蜉也李辨音辨本字作辨北齊時里俗多作偽字始以巧言為辨至隋有柳辨又訛其字以易巧矣見宋景文手記紊文運切亂也彥顒魚容切長柯居何切斧柄也師翥章庶切糴亭歷切市穀也慷慨上口黨切下口溉切慷慨竭誠也述軋乙黠切旻武巾切火神淀堂練切地名漚僧烏侯切契丹大寧王名踶齧徒計切踶踏也齧噬也縶馬陟立切絆馬也顛踣蒲北切仆也銼祖卧切斫也勍渠京切翊夷益切廖偃廖力救切姓也柵測革切編木為之虒亭息移切地名飢饉渠吝切穀不熟曰飢𬞞不熟曰饉賑章忍切贍也趣讀曰促帥與率同鬪鬩馨激切詩曰兄弟鬩于牆注鬩狠也伺間上相吏切下居莧切伺候其間隙也龍洞徒紅切又徒弄切地名龔居容切州名承戩子踐切汜水音祀又音凡憊蒲拜切病也困也翦撲普卜切擊也郴丑林切州名鄱陽蒲禾切縣名屬饒州二年藁古老切稈也下邳貧悲切縣名屬徐州沭陽食聿切縣名屬海州索其山客切求也掊薄侯切把也榜掠按漢書上音彭下音亮岢嵐上音可下盧含切軍名晟音盛玉碗烏管切小盂也或作埦自首式救切自服其過也標卑遙切標識也諜者徒協切軍中反間者童騃語駭切癡騃愠懟上於問切怒也下直類切怨也跌徒結切説文踼也叱吒上昌栗切下竹駕切或作吒發怒聲後周紀二通鑑卷二百九十一起元黓困敦九月盡閼逢攝提格四月即壬子至甲寅凡一年有竒太祖聖神恭肅文武孝皇帝中廣順二年葦筏房越切以葦荻為船筏也倣甫兩切全琇以九切又息救切昵尼質切亦作昵瑫土刀切沅江愚袁切縣名悃𣢾苦本切情悃倩七正切假也蠔石蠔字未詳三年佃之徒年切治田也又音佃紛拏女加切亦作拏餌仍吏切飼之也爭之側迸切通作諍愍眉殯切憐也鄜芳無切州名頷之戶感切又五感切低首也珓古孝字璇興似宣切風痺必至切濕病也袝享符遇切後死者合食於先祖掊斂蒲侯切詩曰曾是掊克謂聚斂也帑庾上他黨切金幣所藏也下勇主切倉無屋者徐鉉胡犬切堙伊真切塞也鍇口駭切顯德元年菲食妃尾切薄也掘其月切搰也甓蒲歷切爾雅瓴甋謂之甓昌岌逆及切逗橈上大透切下女巧切跋扈蒲撥切猶強梁也朝馳遙切勍敵渠京切強也春秋傳勍敵之人髯如占切頰須也披靡普彼切仁瑀王矩切驍將堅堯切健也輜重上側持切下直用切輜載衣車重載物車行者之所資總名輜重器械胡介切械者器之總名𬒳褐胡割切短衣笠力入切説文䔲無柄也黃騮力求切馬名槥車千歲切小棺汾扶云切州名水出太原滑稽上古忽切下古奚切滑亂也稽同也以言辨捷之人言非若是説非若是言能亂異也貿莫候切字本作屹織紝上職力切作布帛之總名下如鴆切機縷也盜跖之石切醢許亥切肉醬也揚耨姑乃豆切契丹國人名後周紀三通鑑卷二百九十二起閼逢攝提格五月盡柔兆執徐二月即甲寅至丙辰凡一年有竒太祖聖神恭肅文武孝皇帝下顯德元年解文遇解胡買切姓也而殿丁練切軍後曰殿𥚹迫俾緬切性狹衣錦於避切服之也二派普拜切別水也匯胡對切水回合也菰稗上攻乎切雕苽也一曰蔣下傍卦切稗草似穀黔中渠金切郡名丗宗睿武孝文皇帝上顯德二年戮力力竹切併力也嵇康音力幽切標幟上卑遙切下昌志切以旗幟而標記之也廨古隘切公廨也傳檄胡狄切符檄皆稱尺證切愜意也咱居潤咱子感切姓也鉗其亷切以鐡有所鉗束也幻惑胡辨切惑亂也器皿眉永切飯食之器用也鈸鐸上蒲撥切下逹各切鈴之屬斜谷上余遮切下余玉切梁州谷名南口曰褒北口曰斜禆將賔彌切將之偏副也玼淺氏切又千禮也涸下各切水竭也磁音茲州名甬橋余隴切汚澤汪胡切濁水不流也彥禧許其切三年上窑餘招切地名艦户黤切戰船四方施板以禦矢其狀如牢艘蘇刀切船之總名比至必寐切弩炮上暖五切弓有臂者下披教切機石也秣馬音抹食馬榖也滁直魚切州名淝水符非切水出九江山入淮在廬州合肥江渦口古禾切水名出淮陽燕犒上伊甸切合飲也下口到切餉犒也薊音計州名繁纓上蒲官切馬鬛上飾下伊盈切馬膺前飾并力卑正切兼也正也安堵音覩如墻堵不遷動也相埒龍輟切機上居履切揕機也後周紀四通鑑卷二百九十三起柔兆執徐三月盡強圍大荒落即丙辰至丁巳凡一年有竒丗宗睿武孝文皇帝中顯德三年屋椽重緣切榱椽髀并弭切又部禮切股也鏃作木切矢末也巵章移切酒器跨據枯化切一培鋪枚切瓦未燒者按漢書張釋之傳云長陵一杯土顔師古注音步侯切手掬也其字從手或讀為杯非也又按培字亦作抔意同而兩音當互讀也龔音恭姓也番禺上音僠下音愚縣名屬廣州承俊祖峻切彥頵紆倫切輕佻吐雕切爾雅曰佻偷也抉古穴切剔也行陳上胡郎切下直刃切行五軍陳也孥戮農都切書曰豫則孥戮汝鴻臚凌如切官名昭惲委粉切嬖博計切愛也灣頭堰烏還切堰名漣陵延切州名糲食力逹切脫粟也檛張瓜切箠也鄖國于分切漢南之國楚撻他合切捶楚而繫撻也黥渠京切黑刑在面堡壁音寶堡墇小城也烽火敷容切烽火掖曰烽晝曰燧糗糒上去久切又丘救切下平祕切乾糇也處訥奴骨切鐡綆古杏也索也紡績上撫兩切網絲也下則歷切緝也從容七恭切從容猶休燕也肺附附或作附如肝肺之相附著反間居板切反居棧切反其本而間諜之也靴許茄切鞮屬亦作鞾搏徒官切獠盧皓切西南夷曰獠四年甬道音踊築垣墻如街巷躬擐胡慣切貫也甲胃直佑切甲鎧也胄兜鍪也垍其兾切泝淮蘇故切逆水而上也舁以諸切共舉也削柿則几切削木餘也噉徒濫切亦作啖湜承職切厮養音斯或作廝養馬者豚犬徒渾切小豕曰豚俘馘古獲切軍戰斷耳也灘他干切水濡而乾曰灘橐駝徒何切或作他韋昭曰背肉似橐葭葦上音加葦之未秀者下音偉蘆也淖女教切泥也茇涉蒲掇切或作跋髙郵音尤縣名屬揚州癃良中切罷病也後周紀五通鑑卷二百九十四起著雍敦牂盡屠維叶洽即戊午至己未凡二年丗宗睿武孝文皇帝下顯德五年鸛水古玩切在楚州西北易文贇易羊益切姓也贇於倫切東㳍州博故切地名延釗之遙切齷齪上𥘉角切下側角切迫也一曰小兒鹵田郎古切鹹地間道居莧切微路鋹丑兩切鋼甲居郎切堅鐡也無厭於亷切貪婪不足也忷懼許容切又許拱切擾恐也六年另之古瓦切剔人肉置其骨也縣於縣平聲鏄鍾伯各切鎛鍾十有二架以當十二辰之位匏土蒲交切八音之數匏笙也土塤也秬黍臼許切黑黍縊一賜切經也醜繆靡幼切繆戾貸他代切以物施人也玉鉞王伐切斧也沿流余專切緣水而上也舳艫上仲六切下龍都切漢律名船方長為舳艫內斌悲巾切橈周女救切攪橈棣徒計切州名邸丁禮切蒼頡篇曰邸舍也嚮時許亮切往時也繕時戰切治也修也葺七入切補葺商賈音古行賣曰商坐販曰賈忤五故切逆也愕然逆各切驚恐貌詼諧上枯回切下户皆切譏戲也邊幅方六切布帛廣也浣侯旰切謔浪迄却切戲也詩謔浪笑敖單父音善甫縣名屬宋州擲伏上它歷切挑也下房六切隱也凡隱匿者謂動發之商榷訖嶽切博雅揚榷都凡也質責職日切正責之也上遊如字文頴曰居水之上流顔師古曰遊即流也府藏才浪切物所畜也婞直下頂切狠也全椒即消切縣名屬滁州洎巨至切賕音求以財物枉法相謝也詰之去吉切問也托音託更衣工衡切改也資治通鑑釋文卷第三十
