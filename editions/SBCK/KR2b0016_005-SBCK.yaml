  text: 資治通鑑釋文卷第五
  hash: sha256:1042cffd49b8835db683829fa233469c52c977a3cf6b5d3268251af630641593
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_005-1a}
body:
  text: 右宣義郎監成都府糧料院史炤漢紀三十一通鑑卷三十九起昭陽恊洽盡閼逢涒灘即癸未至甲申凡二年淮陽王光武族兄字聖公王莽末漢兵起無所統諸將共議立聖公爲帝其後兵敗降於赤眉建武元年光武詔封爲淮陽王更始元年音庚王莽有更始將軍之號漢兵起亦號聖公爲更始將軍聖公即位遂以更始紀元甄阜側鄰切姓也又音甄陶之甄宛於元切南陽邑縯音衍淯陽音育南陽邑在淯水之陽舂陵書容切南陽邑懦弱乃卧切又乃亂切或作愞怯弱也張卬魚央切續漢書卬作卬鮪榮美切諶時壬切前隊音遂王莽置六隊劋子六切截也郾於建切頴川邑馳傳張戀切傳以木爲之長尺五書符其上以爲信馳傳者將之而疾行也出蘇鶚演䕏輜重上側其切下直用切輜車名輜厠也謂軍糧什物雜厠載之以其累重故稱輜重章懐􅀃并力卑正切並也兼也執古􅀔字李軼弋質切幾巨依切近也􅀃音稅誘也亟進紀力切急也犇古奔字翟義姓譜音徒歷切方進之子蹀血音牒謂履渉之也鉦諸盈切鐃也衝輣歩耕切樓車撞城丈降切繫也或作䡴衝城車怖普故切惶懼也􅁄陽紀力切南陽邑在􅁄水之陽岑彭助簮鋤針二切姓也風俗通云古岑子國之後而陳直刃切列也通作陣級居立切秦法斬首一賜爵一級故因謂斬首爲級怯乞業切多畏也中堅並平聲凡軍事中軍將最尊居中以堅銳自輔故曰中堅也易之弋䜴切輕易之也行陳上户庚切下讀曰陣謂廵行軍陣乘銳弋稅切利也鼔譟先到切羣呼也潰胡對切亂也滍直理切水名出南陽東北入汝或作泜音祗乃在常山非此滍水溢弋質切滿也燔符􅀽切􅋹也鴆殺直禁切鴆鳥以羽毛歷飲食即殺人金縢徒登切廣雅云緘縢皆弋也詳具孝平元始五年徇辭俊切行示也􅁺俞絹切官屬横胡孟切恣也玉玦古穴切半璧也玦者義取决断司中大贅之芮切王莽官名劫居怯切強取也詰責去吉切問也格殺古陌切擊也剉千卧切折傷也醯馨奚切酸也邯下安切訢與欣同懣音滿又音悶煩也㗖鰒魚㗖徒濫切鰒音雹海魚也郭璞注鰒似蛤偏著石馮几馮讀曰憑隗崔五罪切姓也下同上邽音圭漢陽邑前書屬隴西囂五髙切移檄州秋切以木簡爲書長尺二寸以證召也燉煌音屯皇郡名應劭曰敦大煌盛也無辜辜罪也音􅀌綬是酉切韍維也析先歷切南陽邑曄域輙切厭之一葉切當也飱粥飱古飡字小飰也内其内讀曰納爲質職利切結信也稱是尺孕切等也鹵掠上籠五切獲也字與虜同下離灼切奪取也豨許豈切東海人名豬曰豨掘其勿切又其月切搰也辟雍於容切學名天子曰辟雍或作廱䠠惲上當蓋切姓也下於粉切邸丁禮切倉頡篇曰邸舎也趨讙許元切通作諠並和乎卧切相應和也闥土曷切慱雅闥謂之門呼火故切叫也或作謼紺袀上古暗切下弋旬切又音均偏裻謂之袀戎衣也紺青赤色以爲袀衣章懷注袀純也純爲紺服也其􅀃非是匕首卑履切風俗通曰匕首劒屬其頭􅀋匕短而便按式漢書字作栻木局也有大地所以推隂陽占吉凶以楓子􅀥心木爲之漸臺將廉切臺居水池取漸漬之意罷極罷音疲間􅀜如字猶言﨑嶇展轉也叱之尺栗切呵也餔時必胡切申時食一曰歠也或作哺公賔就公賔姓也就其名臠分力轉切塊切肉屬焉珠玉切係屬也下屬心同提擊徒計切擲也以要伊消切行違胡孟切行者言之迹也恣睢上資四切下呼貴切恣睢言放情恣縱也爲虚讀曰墟貉莫白切蠻貉囂然五髙切嚻然衆口愁貌冠幘側革切􅀃文髪有巾曰幘耿况古幸切姓也晉大夫趙夙滅耿因封焉其後遂以爲氏脅迄業切以威力相恐也下同連率所􅀋切與帥同睢陽音雖梁國邑狐疑狐音胡獸名其性多疑毎渡河氷且聽且渡故言疑者爲狐疑黜陟上􅐫律切貶也下竹力切升也苛政音何細也鄴魚怯切魏郡之邑屈起渠物切如山之崛起邯鄲音寒丹趙國邑有邯鄲山在東城下趙奢冢在此山西謂之馬服山繆王子林音謬東觀記子林作臨灌古玩切澆也任俠上汝鴆切下胡頰切任謂任使其氣力俠之言挾也以權力挾輔人也謳者一侯切齊歌曰謳任身如鴆切或作妊二年薊吉詣切字本作􅠥即漁陽郡黠下八切桀􅃛屬縣之欲切附也言附縣而屯聚怍在各切怍顔色變也俛首俛與俯同低頭也刮席古刹切摩切也歙許及切沘陽音比南陽邑穰人羊切南陽邑驃􅀐毗召切勁疾皃亦作票宗佻他彫切􅀃文遷廟也膳夫時戰切庖人淑神六切弇古南切耿况之子轔良刃切轢也腐奉甫切爛也募莫故切廣求也邪揄音耶俞􅀃文邪揄者以手相弄邪或作歋弋支切揄或作瘉容朱切此音邪揄語輕重不同爾章懷釋慙懅巨魚切心急也控弦口弄切引也趣駕趣讀曰促蕪蔞力于切在涿郡饒陽縣傳舎知戀切客館也椎鼔傳追切擊也通作槌紿音怡江南呼欺曰紿亦作詒嘑沱上音呼沱一作池音駞在涿郡之饒陽澌音斯流氷詭古委切詐也比至必寐切近也􅋹火儒劣切燒也燎衣力小切炙也努力暖五切方告勉也邳肜上貧悲切下余中切傳相音轉即輾轉之轉貰縣式制切鉅鹿邑下貰之同音爰曽兩元切姓也名曽字子路防子防通作房常山邑鄗火各切光武即位於此更名髙邑屬常山灋古法字􅀕遵􅀕側界切周邑其先受封於􅀕因以爲姓繕時戰切繕修也扞侯旰切衞也蓋延古合切食之食讀曰飤齎祖稽切持也􅃰竹角切郡名倪宏五兮切姓也南􅒋力全切鉅鹿邑鄧滿續漢書滿作蒲從容七恭切從容休燕也鐡脛形定切胻也大槍七羊切矟也五幡孚􅀽切幟也更始􅀄諸賊並起各以軍容強盛爲號故鐵脛大槍五幡三者皆賊之自號也鄡堅堯切鉅鹿邑隆慮慮音盧避殤帝諱改曰林慮歸德侯颯鄧展颯音立王莽天鳯元年展德侯颯者亦音立其姓王昭君弟此歸德侯乃姓劉也單于音蟬匈奴天子之號漢書音義曰單于者廣大之稱言其象天單于然中亂中或音竹仲切牚距牚謂支撑丑庚切距作拒陸渾胡昆切春秋遷陸渾之戎於此洪農邑釁許覲切瑕釁也或作舋陳僑巨嬌切東觀記僑作矯孟津或作盟津武王伐紂與諸侯同盟于此調徒釣切謂計發之也糇音侯食也字或作餱器械胡介切械者器之緫名佼彊古巧切佼姓也或作姣周大夫原伯佼之後邔音忌南郡邑􅗛紀三十二通鑑卷四十起旃􅀩作噩盡柔兆閹茂即乙酉至丙戌凡二年丗祖光武皇帝上之上建武元年嬰於盈切宣帝曽孫之子王莽立爲平帝之嗣號曰孺子嬰即安定公也臨涇堅靈切安定邑蓩郷莫老切字林云蓩毒草也地以所産得名恢口回切越嶲先蘂切郡名古卭都國有嶲水言其郡越此水也僅渠遴切􅂊也殄徒典切絶也盡也機軸直六切機弩牙也軸車軸也皆在物之要故取諭焉要領伊消切要者衣要領者衣領凡持衣則執要與領故以要領爲喻警居影切戒也綴陟衛切連綴也大呼火故切陳動讀曰陣一帀子合切周也馳騖亡遇切直騁曰馳亂馳曰騖浚靡靡音麻或音縻縣名莽改爲俊麻鈔切教切略取也􅂢與專切棄也彊華上其两切姓也解南解音蟹解縣之􅀯軍掫子侯切續漢志曰新豐有鴻門亭掫城即此貙膢上丑于切獸名􅀃文似狸下龍珠切􅀃文臘􅀕也前書音義云貙以立秋日􅀕獸王者亦以此日出獵用􅀕宗廟又云兾州北郡以八月朝作飲食俗謂之膢臘札側八切簡札笥中先嗣切盛衣竹器徒跣息典切足親地也赭音者赤色齧折上倪結切噬也下之列切斷也鄼音賛即蕭何所封屬南陽䜟文楚讃切釋名曰䜟纎也其義纎微汾隂扶云切河東邑公乘歙公乗秦官名音承言其得乗公家之申歙許及切名也馮翊音弋本秦内史髙帝更名河上郡武帝太􅀄改今名衙音牙春秋秦晉戰于彭衙即此屬左馮翊厭新一葉切王莽號新室言劉茂欲厭勝之祜侯古切祉敕里切遺者弋季切贈也下並同囑之之欲切託辭也􅃖赤之切輕侮也嫌戸兼切疑也者逺于願切離也沸方味切涫也下索蘇各切繩索靣縛符攫切縛手於後唯見其靣也棨㦸上遣禮切有衣之㦸也下訖逆切矛屬漢制假棨㦸以代斧􅃏崔豹古今注曰棨㦸前驅之器也以木爲之肉􅃝徒旱切袒裼而露肉也刎武粉切斷也剽奪匹妙切強取也勞來上力報切下力代切謂慰勉而招延之也稺直利切㓜稚也與稚同栒邑栒音旬右扶風邑犨葉上昌牛切下式渉切二縣並屬南陽睢陽音雖梁國邑縊一䜴切􅀃文經也憙許吏切亦音熈祼􅀰果切袒也逡千旬切朴匹角切與璞通殖常職切興生財利曰殖賑章刃切贍也張掖羊益切郡名前書音義云故匈奴昆邪王地武帝開之應劭曰張國臂掖故曰張掖輯與集同爾雅曰集和也庫鈞前書音義曰庫姓即倉庫吏後也今羌中有姓庫音舎云承鈞之後章懷􅀃竺曽張六切姓也本作竹􅀌竹君之後至竺晏竹下加二勠力力竹切併力也烽燧前書音義曰邊方備警急作髙上臺臺上作桔臯桔臯頭有兠零以薪草置其中常􅊠之有冦即燃火舉之以相告曰烽又多積薪冦至即蟠之望其烟曰燧晝則燔燧夜乃舉烽渾邪上夏昆切下音耶匈奴王號誑居況切欺也馮愔伊􅁋切忤五故切逆也儲大伯上直魚切下他蓋切齊大夫諸子之後詗問耻慶切伺也又火逈切贛榆上音紺下音俞東海邑跪巨委切䠆跪也二年嘘唏上音虚下訏旣切歎息也字或從欠檀郷徒干切郷名在山陽瑕丘縣東北反城音幡覆也銚期餘招切姓也漳水諸良切水經曰漳水源岀上黨長子縣綝丑林切癭於郢切頸瘤也綿曼音萬眞定邑不内讀曰納幅巾方六切不加冠幘但以一幅飾首而已挑徒了切又田􅂓它彫二切橈挑宛轉也取其取讀曰娶檻車胡黤切車而爲檻形以板四周之無所通見伺相吏切伺􅀱也耽丁含切樂也怏怏於兩切情不足也貿莫􅀱切交易也很胡懇切很戾也泄先列切漏也脅虚業切以威相恐也扞関侯旰切在巴郡史記曰楚肅王爲扞関以拒蜀􅁀汜􅁀姓也汜孚梵切潘蹇上普官切下居偃切歙許及切淄川側持切淄川國在齊國般陽縣夲古齊長城藺相如藺良刃切姓也相如趙良將醪魯刀切􅀃文兼汁滓酒饌雛綰切具食也或作䉵羛陽許冝切聚名其地在魏郡雍奴如字與潞並屬漁陽沛博蓋切本秦泗水郡髙帝更名昱音育堵郷音者即南陽堵陽縣堅鐔徒南切又徐心切合從子容切前書音義曰以利合爲從以威􅀔相脅爲横烏氏氏音支安定邑畨湏音盤在右扶風汧縣坑客庚切爾雅曰虚也郭璞云阬塹也殮力驗切殯殮郁夷於六切右扶風邑小雅四牡之詩曰四牡騑騑周道倭遲韓詩作周道郁夷言使臣乘馬行於此道谷口余蜀切水注谿曰谷左馮翊邑倨慢上居御切下莫晏切倨傲而慢易也堡博抱切或作堢堡障小城也繹思羊益切謂紬繹而思之折箠止蘂切馬檛也笞丑之切捶擊之漢紀三十三通鑑卷四十一起強圉大淵獻盡屠維赤􅁬􅀂即丁亥至巳丑凡三年丗祖光武皇帝上之下建武三年徼伊消切遮也難卒卒音猝澠池莫踐切又莫忍切洪農邑潰胡對切散也左氏民逃其上曰潰回谿阪甫逺切坡者曰阪一曰澤障也回谿溪名在洪農澠池俗名回坑雒陽本作洛魚豢云漢火行忌水故去水加佳自光武後改爲雒字日昊札色切日過中也崤厎何交切崤山名厎阪也一名嶔岑山在洪農澠也垂翅施智切翼也桑榆容朱切皆木名前書谷永曰太白岀西方六十日法當參天今巳過期尚在桑榆之間桑榆謂晚也錚錚􅀄耕切金聲佼佼古巧切好貌均輸舂朱切均輸官名屬司農􅐭鐡論云郡國諸侯各以其方物貢輸往來多苦惡不償其費置輸官以相紹運故曰均輸猶與上音由又余救切下音預􅀃文玃属居山中聞人聲豫登木無人乃下山謂不决曰猶豫一􅀃隴西俗謂犬子爲猶犬隨人行忽先忽後故云猶豫又一􅀃猶豫者友也友爲人行好先行郟住以􅀱其人百歩之間如此者數四先者豫也遂曰猶豫見蘇鶚演義間使居莧切從間道而遣使也軹音只河内邑跋扈上蒲檢切下侯古切猶強梁也或􅀃扈竹籬也氷居者於水未至時作竹籬以􅀱魚之入水退小魚獨留大者跳跋籬扈而岀故言跋扈賂遺弋季切贈也堵陽音者南陽邑㬥古􅁀字下邽音圭京兆邑秦武公伐邽戎置有上邽取邽戎之人來爲此縣故加下云芳丹姓也續漢書作茅蔣震蔣即兩切姓也邯丁甘切角閎上訖岳切姓也汧苦堅切水出扶風西北入渭右扶風邑駱延歷各切姓也盩厔上張流切下陟栗切山曲曰盩水曲曰厔右扶風邑鄠侯古切古扈國右扶風邑槐里户恢切右扶風邑菀於阮切􅀜中上林菀也委輸委輸謂輸委積者也委音迂僞切輸音式喻切縑音兼絹也墯徒果切落也䣛息七切脛頭卩也或作􅂰創􅀄莊切傷也椎直追切擊也或作槌睢陽音雖梁國邑穰如羊切南陽邑妻之七計切以女嫁人曰妻鄼在河切本作䣜沛郡之邑紆邕俱切從容從七㳟切從容休燕也慰藉慈夜切慰安也藉薦也言安慰而薦之四年㳂江余專切縁水而下也泝􅃆上桑故切逆流而上也下彌兖切應劭曰􅃆水出武都東南入江顔師古曰漢上曰􅃆坼丑客切裂也鬲音革平原邑荒耗火到却損也肘陟栁切臂節也賁休章懷音奔前書賁赫賁音肥郯音談東海邑擣覩老切推擊也里閈侯旰切􅀃文曰閭也汝南平輿里門曰閈旄􅀐莫袍切旄頭之􅀐也徐援釋疑曰乘與黄麾内羽仗斑弓前左罼右䍐執罼者冠熊皮冠謂之旄頭警蹕壁吉切所警者戒肅也蹕止行人也或作䟆磬折之列切磬折者屈身如磬之曲折也莊子漁父篇夫子曲要磬折井厎蛙烏􅀲切水蟲形似蝦蟇莊子曰塪井之蛙擅一􅊤之水而跨跱塪井之樂廡罔甫切堂下周屋幘側革切髮有巾曰幘駑馬農都切駑駘也馬之最下者鈆刀余專切青金也似􅃬而色青賈􅁩云鈆刀爲銛言不可強扶持而用也躑躅上直炙切下直録切躑躅猶踟􅦚也挫祖卧切賈逵注國語曰折其鋒曰挫五年不懌音亦不恱也襲席入切春秋釋例掩其不備曰襲挑戰徒釣切謂擿嬈敵以求戰也倡樂上音昌下音岳倡亦樂也中覇竹仲切當也樽祖昆切本又作尊周禮有司尊彛以􅇲从木後人所加下邳符悲切東海邑本在薛其後徙此有上邳故曰下邳永平十五年更爲下邳國卜筮時制切筮决也􅀛曰卜蓍曰筮捽昨没切􅀃文持頭髮頰古恊切面旁也趣讀曰促裝側羊切裹束也􅆷在良切殺也伋居立切蝗胡光切螽也掎之居蟻切偏持其足又舉綺切偏引也讀曰諷洎其兾切及也契讀曰卨本作偰屈起其勿切特起也捷疾葉切獲也勝也饉渠遴切􅂼不熟爲饉流􅀠􅀰計切附著也鑊胡郭切鼎大而無足曰鑊伏質如字質鍼也伏於鍼上而斬之么麽上一堯切下莫可切么麽皆微小之稱奸音干揮洗先典切謂揮去跣足也酈音歷姓也酈食其覬覦上音兾下音踰覬幸也覦欲也謂幸得其所欲瞽􅀃公户切􅀃文目但有朕不察其事而言之如無目之人尉佗徒何切趙佗也本爲龍川令行南海尉事故曰尉佗合從子容切前書音義曰以利合爲從以威􅀔相脅爲横亢父音抗甫屬東平國搏戰伯各切索持也昌慮音盧東海邑至蕃蕃音皮魯國邑保朐其于切東海邑懼呼勇切恐懼聲畫中胡夾切齊郡有畫水蓐食儒欲切前書音義未起而牀蓐中食蓐冝作褥藉也深塹七艶切深坑也髙壘力􅁤切軍壁也壊臺胡怪切敗也臨菑本齊國所都齊王宫中有壞臺也東觀記壞作環截昨結切斷也釃酒所冝切釃濾酒也詩曰釃酒有藇鉅昩如字水名一名巨洋洋水在樂安國僵音薑仆也勍敵渠京切強力也辟之必益切除也投劾胡得切案罪曰劾自投其劾狀而去也投猶下也田颯音立䥴羌侯子全切鑴謂琢鑿之故以爲名餌仍吏切食也喁喁魚容切衆口向上也羇旅居冝切覊􅀉旅客也函谷􅀜函音咸本在洪農縣衡山嶺武帝元鼎三年遷於新安乃於故􅀜置洪農郡蚯蚓上音丘下以忍切蟲名􅀃文側行者交趾音止郡名杜佑通典云南方夷其足大指開拆􅀂兩足並指則相交故云交趾也悍侯肝切猛也莎車素何切西域國名漢紀三十四通鑑卷四十二起上章攝提格盡旃蒙協洽即庚寅至乙未凡六年丗祖光武皇帝中之上建武六年復傜役復方目切髙祖十二年過沛復其民并復豐顔師古曰復謂不傜賦也騰書徒登切􅀃文曰傳也三思蘇暫切參之也瓦解音蟹散也􅂝貳賢圭切􅀃文離也貳疑也烏合如字鄒陽云周用烏集而王亟紀力切急也固爭側併切固上之也荆􅁄上音京下紀力切荆􅁄榛梗之謂射鈎食亦切乾時之役管仲射齊威公中帶鈎棧閣士限切謂棧木爲閣道尤豫尤音􅁋􅀃文曰冘冘行貌東觀記曰狐疑不决也亦音由不定也質責職日切質正也謂正責之隴坻丁計切又音底隴抵謂隴阪即隴山也在隴西郡省所景切簡也并之卑政切兼也並也糧儲陳如切亦糧也或作䊰忸忲上足丑切下他蓋切忸猶貫也謂慣習前事而復爲之忲習也或音逝奥鞬上於六切下居言切奥本作薁匈奴日逐王號肝膽覩敢切肝之府也忿悁上父吻切怒也下縈元切忿也魯仲連曰棄忿悁之節局迫渠玉切􅀃文促也易強以䜴切輕也丘墟去魚切􅀃文大丘也溝􅊤上古侯切爾雅云水注谷曰溝下里各切爾雅云阬虚也痾於何切病也瘳丑鳩切病愈砥厲軫視切柔石也先零音憐西羌名竝河蒲蕩切依也伺􅀱相吏切􅍕闚也亦候也譎古穴切詐也表的上卑遥切表猶標也言爲標凖下都歷切的謂射的也言爲指射跳梁上徒􅂓切跳梁走也字皆從􅟦陸陸力竹切陸陸猶碌碌也槽櫪上才勞切果木葉實相半也下􅀰擊切􅀃文㯕椑也博雅云木下支謂之椑㯕併肩字林併音果正切並也切瑳倉何切治骨曰切象曰瑳言朋友之道如切瑳以成器萎腇上於罪切下乃罪切萎腇耎弱也咋舌側革切大聲又疾各切叉手􅀄加切手指相錯也象叉之形七年謬眉救切謬誤徼訐上吉了切邀也徐廣謂徼一時權下居列切言發人私也隂槃薄官切安定邑拓他各切拓猶開也八年鷄頭鷄或作笄山名一名􅻊峝山車紖以忍切又丈忍切引軸也小月氏音支西域國名上邽音圭史記故邽戎邑也屬隴西黥布渠京切狂狡古巧切猾也詿誤音挂􅀃文詿亦誤也執銳弋稅切執銳謂利兵也節檛陟􅀲切箠也髙勾麗音釣梨或作驪在遼東之東南與濊貊相接武帝時開其地屬元莬郡九年􅉖眉殞切悲也憐也糗糒上去乆切􅆈米麥下歩拜切乾餱也恚憤上於避切怒恨也下房吻切懣也攅柱徂刓切叢木以爲柱緱氏工侯切河南邑轘轅胡關切通作環轘轅関名險道也在河南緱氏縣東南鈔􅀄教切略取也涿竹角切郡名䌓畤音止鴈肘邑左衽忍甚切祍謂衣衿衣衿向左謂之左祍􅃛下八切桀􅃛譯音亦傳四夷之語者訢與欣同觖望窺睡切望也前書音義觖猶兾也眄睨上彌殄切下研計切斜視也夸奢苦􅀲切夸亦奢也降挹乙力切安也其義與抑同駱驛上盧各切下夷益切言不絶也抅彌續漢書寧彌國王夲名抅彌前書作杇彌杇音烏十年第一地名也在安定髙平縣續漢書髙平有第一城十一年艘蘇刀切船之緫名棹卒上直教切東觀記棹作櫂募莫故切召也飛炬其吕切束葦燒也迎勞􅀰到切慰勞也墊江徒恊切巴郡之邑露橈人遥切短檝也爾雅檝謂之橈露橈者謂露其檝在外人在船中臨洮吐髙切洮水岀西域北至枹罕東入河誡居拜切敕也骨鯁古杏切骨鯁喻正直也􅀃文曰鯁魚骨也食骨留咽中爲鯁縞古老切素也詰責喫吉切問責之也涪水音浮應劭曰涪水出廣漢南入漢邑繞而沼切􅆞繞沅水音元水經注沅本作沈在廣漢入涪或作沉非是旗幟昌志切又式志切幟幡也追北北讀爲南北之北史記樂書北者敗也故軍敗者皆謂之北或音背非是章懷釋浩亹上音誥下音門金城邑亹者水流峽山間兩岸深􅀂門焉俗呼閤門河隘烏懈切狹也湟牛胡光切水名岀金城臨羌縣東至允吾入河一名樂都水塢候於古切字林塢小障也或作隖溝洫忽域切溝洫者通水之道也漢紀三十五通鑑卷四十三起柔兆涒灘盡柔兆敦牂即丙申至丙午凢十一年丗祖光武皇帝中之下建武十二年魚涪津涪音浮在犍爲南安縣北臨大江其廣數百歩綴陟衛切聮也又陟劣切秣馬音末食馬穀也幡孚􅀽切旗幟銜枚上户監切下木回也周官有銜枚氏枚狀如箸横銜之繣絜於項以止言語讙嚻至晡奔謨切日加申時譴責去戰切謫問也繁郫上符􅀽切下蒲縻切蜀郡二邑朝請才性切挑戰徒弔切放麑五稽切􅀃文狻麑獸也一曰麑鹿子韓子曰孟孫獵得麑使秦巴西持之其母隨而呼秦巴西不忍而與其母啜羮昌恱切甞也樂羊爲魏將攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一柸而攻抜中山鴻臚音廬官名􅉠贈上符遇切下昨亘切錢財曰贈布帛曰􅉠皆所以贈終翬許歸切瑛於驚切爲􅋪落蓋切惡疾也或作癘青盲眉耕切目無眸子參狼所今切武都西夷種也拘㳟于切止也執也逗留逗古注字音豆􅀃文逗留止也漢書音義謂曲行避敵漢法軍行逗留畏懦者斬亭障漢紀作亭候亭候望敵之所障者謂塞上要險之處別築爲城因置吏士而爲障蔽以扞冦也鄣之向切顔師古􅀃轂古禄切輻所湊也十三年郅惲上之日切下委隕切宛於元切南陽邑閨音圭閨門闔户臘切閉也瞽師音古無目之人也爲樂師取其無所見於音聲審也葆車音保車上建羽葆也合聚五采羽名爲葆輿輦力展切輿者車之緫名輦者駕人以行請間居莧切間􅂩也十四年鄯善鄯時戰切西域國名蠲音㳙除也饋求位切餉也或作餽贓則郎切納賄曰贓浸子鴆切漬也漸也十五年不厭一葉切伏也瞑眩上莫遍切下奚遍切陸德明釋加瞑眩困極也孛歩内切又蒲没切妖星右翊公翊與職切右馮翊也謚神至切行之迹也墾康很切闢也覈小革切實也牘音讀木簡趣讀曰促首服式救切謂自陳其非而服其罪髠剔上苦昆切下他歷切切去髮也或作􅚎穗徐醉切苗羙好也岐翹移切旁出也麊泠上莫支切下郎丁切交趾邑忿敷粉切又敷問切怒也蠻俚俚兩耳切南夷種名十六年糾擿它狄切擿猶發也愞奴亂切愞弱殿最上丁見切後也謂課居後也下祖外切凡要之首也謂課居先十七年憙許冝切貰式夜切貸也晥城下板切廬江邑怨懟直􅀋切怨也酣胡甘切酒樂也鮮卑山名本東胡之支屬別依此山因以號焉赤山在遼東西北屬烏曰襄賁賁音肥東海邑十八年宕渠宕徒浪切巴郡之邑蒲坂甫逺切河東邑乘桴芳無切馬融釋云編竹木大者曰栰小者曰桴昭穆上音韶本音招昭穆者昭以照下穆以順上爲義後避司馬昭諱昭作韶讀十九年挺緩待鼎切釋文持也章懷注云解也徹直列切去也嶠南渠廟切嶺嶠也爾雅曰山銳而髙曰嶠駱越音洛駱者越之別名裒薄侯切聚也汜音似又音泛箠止蘂切䇿也棟􅁞上多貢切與弄棟同音下徂含切西南夷渠帥二十年器械胡介切内盛曰器外盛曰械辦嚴並如字嚴即裝也避明帝諱故改之斤斤音靳爾雅曰明明斤斤察也李廵曰斤斤精詳之察也二十一年穹廬去弓切旃帳也其形穹隆故曰穹廬祼身郎果切露体也焉耆音祁西域國名二十二年烏逹鞮侯鞮都棃切匈奴單于號幕南莫各切沙土曰幕郎沙磧也􅀛兹前書音丘慈今亀音丘勿切兹音阻惟切蓋急言耳章懷􅀃兼從子容切以利合曰從瑇瑁上待戴切下莫代切二字並或從甲珠厓冝佳切通作崖郡名蒟醬音矩枸子如赤揕椽木而生味辛牂柯上兹郎切下古何切牂柯者係船􅍻也楚伐夜􅀰椓船於且蘭岸因以名其地榷酒古岳切謂禁民酤釀官自開置如設木渡水獨取利也筦古滿切與管同旃罽居例切與􅖯通􅀃文西胡毳布也白雉直几切昔周公相成王越裳氏重九譯而獻白雉漢紀三十六通鑑卷四十四起強圉恊洽盡上章涒灘即丁未至庚申凡十四年世祖光武皇帝下建武二十三年玊況玊音肅名況字文伯京兆人章懷注谷蠡上音鹿下盧奚切匈奴王號龍祠並如字前書匈奴法五月大㑹龍城􅀕其先及天地龍神二十四年􅅃苦緩切叩也臨沅音元武陵邑應劭曰沅水出牂柯入于江矍鑠上厥縛切下書藥切勇貌東􅀚記作矆哉是翁矆許縛切大視也五溪苦奚切酈元注水經云武陵有五溪謂雄溪樠溪武溪潕溪辰溪悉是蠻夷所居故謂五溪皆槃瓠之子孫也愔伊􅁋切日索昔各切盡也瞑目莫定切閉目長者家兒長上聲長者家兒謂權要子弟二十五年徼外吉弔切塞也境也貊音陌穢貊國人也􅀕肜上側介切下余中切姓也灋古法字樂音洛鵠胡沃切鳥名􅀃文鴻鵠也鶩亡遇切鴨也下雋字兖切長沙邑壷頭音胡壷頭山名在武陵沅陵東武陵記曰此山頭與東海方壷山相似神仙多所游集因名壷頭山也充昌容切武陵邑搤於革切特也握也咽喉上烏前切下戸鉤切字或從肉好畤音止右扶風邑怫符勿切欎也賈胡音古商胡薏苡上於旣切下羊巳切神農本草經曰薏苡味甘微寒主風溼痺下氣乆服輕身益氣轉䂓知戀切䂓圎也孫子曰戰如轉圎石於萬仞之山者執也貫脛形定切􅀃文胻也僵音薑仆也以間居莧切諜也􅈺雅何間切􅈺雅猶沈静也矯制調徒弔切試也言矯制選試偵候丑正切覘也謂窺同之二十六年陂池上普何切下徒何切裁與􅂊同郴丑林切糒歩拜切乾餱也閼氏上於連切下音支匈奴皇后號邏􅀰佐切廵也二十八年鍾虡音巨爾雅曰木謂之虡所以掛鍾磬也􅀃文曰虡飾爲猛獸邸丁禮切舎也輜車音甾衣車也乘馬石證切四馬曰乘郅支職曰切匈奴單于別國也繒慈陵切帛也鞬韥上居言切所以戢弓矢下徒谷切弓衣或作韣竽瑟上雲俱切􅀃文管三十六簧也下所櫛切庖犠所作弦樂空侯上枯公切下胡溝切字或從竹樂器也師延作蓋空國之侯所好故謂之箜篌三十年封禪封聚工禪除地時戰切本作墠林放分兩切鄭康成曰林放魯人潰胡對切散也亂也創􅀄莊切傷也中元元年篣蒲庚切笞擊也通作榜燎力召切燔柴而􅀕也更衣工行切改也騶􅀐甾尤切廐御也水崖冝佳切通作厓或從水地祗翹移切􅀃文地祗提出萬物也古字作示辟雍上必益切下於容切辟明也雍和也所以和明天下雍或作廱天子學也􅇊渠綺切􅀃文巧也逺之于願切離也僅渠遴切􅂊也二年日仄古則字與􅉴同日向西曰􅉴入臨力鴆切滇良多年切益州西夷盱雲俱切又匈于切通作䏏允街允音鈆金城邑允吾上音鈆下音牙金城邑顯宗孝明皇帝上永平元年猥烏賄切猶濫也供養上居用切下弋亮切栩況羽切震讋質渉切失氣言也元菟同都切郡名古眞番地八佾弋質切佾列也謂舞者行列也春秋左氏傳曰天子八佾二年三老五更工衡切鄧展曰漢直以三公爲三老大夫爲五更按孝經援神契曰尊事三老父象也宋均注曰老人知天地之事者五更老人知五行更代者劉攽東漢刋誤云天也之事之字當作人言知天地人三才故謂之三老李竒曰王者父事三老兄事五更鄭康成云三老五更謂老人更知三德五事者蔡邕以爲更當爲叟叟老人之稱也都紵無它音續漢志作絺紵阼階存故切主階也􅃝徒旱切褐也祝鯁祝饐祝之六切鯁古杏切饐一結切字或作哽噎謂老人食多哽噎故置人於前後祝之令其不咽噎也搢紳搢音晉挿也紳音申大帶也謂搢笏於紳牀茵於眞切褥也酈如淳音蹢躅之蹢南陽邑三年炟丁逹切宫闈音韋爾雅曰宫中之門謂之闈劉昌宗音暉加縁俞絹切衣純也綺􅜄上去􅀝切􅀃文繒也下胡谷切細縳也苞苴上班交切􅀃文艸也以爲麤履從包取其可藏物下子余切履中艸亦包也澍雨音注􅀃文云􅀨所以澍生萬物故曰澍全椒即消切九江邑􅄶􅀘典切性狹詆毀丁禮切訾毀也提曵羊列切拕也撞丈降切撞擊也諌爭側迸切與諍同諌諍謂直言以悟入也黼黻上音甫下音弗黼象斧形白與黒相次文或作黻兩巳相背黒與青相次文或作䄡帷昌艶切披衣也或從巾于窴徒賢切又徒見切與闐同西域國名中竹仲切當也妻之七計切以女嫁人也漢紀三十七通鑑卷四十五起重光作噩盡旃蒙大淵獻即辛酉至乙亥凡十五年顯宗孝明皇帝下永平四年魴符芳切誹誹音非又音沸謗也儲直魚切儲副綬承呪切韍維也五年驃􅀐上毗召切下渠異切鄴音業魏郡之邑盱雲俱切通作䏏又匈于切六年王雒山雒或作雄在廬江郡湖邪尸逐侯鞮邪以遮切鞮丁奚切匈奴單于號七年督郵音尤古官號釋名曰督郵主諸縣罰􅀒郵殿糾攝之又馮鑑續事始後漢有郡主簿亦曰督郵隋以録事參軍代之掌勾秘旨文簿舉彈善惡檻穽上胡黤切下才性切檻爲機以捕獸穽謂穿地䧟之謾毋官切欺也八年度遼徒故切遼水在幽則之域謂出師當度遼水也曼柏上音萬五原邑浮屠同都切􅀽宏漢紀浮屠佛也佛者漢言覺也將以覺悟群生也㓗齊齊讀曰齋伊蒲塞悉則切即優婆塞也中華翻爲近住言受戒行堪近舊住也章懷注桑門桑門即沙門也􅀽宏曰沙門漢言息也蓋息意去欲而歸于無爲也天竺張六切即身毒國所謂浮國胡也狐疑音胡獸名其性多疑故謂不决者爲狐疑駮北角切乖舛也析先擊切分也字從木斤破木也九年計偕古諧切偕俱也所召之人令與計吏俱上重熹上音冲下音熈祝詛上職救切本作呪下莊助切或作謯儵式竹切十年塤許元切樂器也以土爲之六孔釋名曰塤喧也聲濁喧然丗本曰暴辛公所作箎陳知切管樂也以竹爲之長尺四寸小者尺二寸七孔丗本曰蘇成公所作綝丑林切衰絰上倉回切或作䙑下徒結切喪首戴也呉札側八切延陵季子也十一年伏軾賞職切車前横木板也伏憑也采菽式竹切大豆也要腹要讀爲􅆎膂之􅆎十二年哀牢南夷種也居于牢山顯宗永平中以其内屬因置哀牢縣屬永昌郡汴音卞水受陳留浚儀隂溝至蒙爲汴水東入于泗樂浪音洛郎郡名古朝鮮國洄户恢切􅀃文泝洄也稔如甚切爾雅曰稔秋糓熟也十三年太行胡􅀰切山名在河内山陽西北涇古靈切丹陽邑湯沭莫卜切湯沐者取其賦稅以供湯沐之具十四年邢穆户經切姓也鮪榮羙切恪克各切謹也斷葱音叚濩澤胡陌切河東邑錯㦍上倉各切或作䇎竦也下逆各切相遇驚也或作愕捶之止蘂切擊也汚染汪胡切又烏故切亦作洿長跪渠委切亦作䠆跪也牾五故切逆也或作忤乘間居莧切間􅂩之間彷徨上歩光切下胡光切徘徊也分別彼列切異也觧也杅水音于􅀃文飲器也方言盌謂之盂脯糒上匪父切乾肉也下歩拜切乾餱也十五年下邳符悲切東海邑應劭曰邳在薛其後徙此臣瓉曰有上邳故曰下邳昞音丙廖音僚春秋傳召伯廖以廖爲名者舋許僅切鏬拆也伊吾如字匈奴中也名在敦煌北大磧之外明帝開置冝禾都尉以屯田呼衍匈奴王號并兵卑正切兼也並也十六年敦煌音屯皇郡名應劭曰敦大煌盛也甲卒臧没切兵百人曰卒蒲􅀋無他音海水之在匈奴者以蒲􅀋號將軍者與祁連將軍同義祁連山在匈奴中章懷曰蒲􅀋海今名婆悉海在敦煌北絶幕莫各切直度曰絶沙土曰幕涿邪上音卓下以奢切匈奴中山名逗留上音豆下力救切􅼱也顔師古曰豆讀與住同歐血一口切吐也悉簿上歩户切皆爲文簿而上之豺狼上牀皆切狼屬狗聲或作犲下魯當切似犬銳頭而白頰髙前廣後大呼荒故切或作嘑格殺古栢切或作格擊也騧馬姑華切黄馬黒喙弇古南切猾户八切狡獪􅅡如劣切燒也蓐食儒欲切謂床褥中食轔藉上良刃切轢也下慈夜切踐也轔或从足十七年匳中離塩切俗作奩進趣逡湏切嚮也汶山音問本冉駹國自武帝開置汶山郡白狼如字西南夷逺國槃木音盤西南夷逺國唐菆將侯切白狼王也􅀛兹解見光武二十二年槃橐他各切䟽勒國城名昆侖盧昆切山名在酒泉郡西南山有昆侖之体故名之符傳符者契也兩相合也傳以木爲之長尺五書符於上又以一板偕封所以爲信並見唐蘇鴞演義十八年􅀓矢音付附著也至笮側賣切壓笮也字本作輓籠上無逺切引也下力董切竹器也滋殖常職切生也多也鎧口代切甲也幡孚􅀽切幡幟漢紀三十八通鑑卷四十六起柔兆困敦盡閼逢涒灘即丙子至甲申凡九年肅宗孝章皇帝上建􅀄元年昱余六切苛音何苛細也慝他德切惡也晏晏烏間切晏晏温和也尚書考靈耀曰堯聦明文塞晏晏篣格上蒲庚切笞也通作榜下音鬲其字从手擊也逞丑郢切快也滌徒歷切洗也箠楚止蘂切謂鞭箠而苦楚之也衣屨九遇切履屬槁苦浩切枯槁尉頭並如字西域國名居尉頭谷因以爲號南與䟽勒接衣服􅀋烏孫郛芳無切郭也祖禰乃禮切禰父廟也陸德明釋諮問音咨諮詢也魴符方切臯林温禺犢禺魚容切又元俱切犢徒谷切北匈奴王號二年昆明如字西夷國名在越嶲郡之西北四塞悉則切􅀃文窒也澍雨上朱戍切時雨也鮮先典切少也蘧伯玉巨居切蘧瑗爲衛大夫緑褠居侯切臂衣即臂韝也譴去戰切責也怒也拳拳巨貟切拳拳猶勒勒也含飴盈之切􅀃文采糵煎方言謂之餳屬託之欲切委託也屬籍上殊玉切附也謂所附宗籍􅀃文籍簿書也織室之翼切前書有東織西織屬少府平帝改置織室章懐􅀃浣衣胡管切濯也通作澣創瘢上􅀄良切瘠也與瘡同下蒲官切痍也髙結讀曰䯻束髮也卑湳乃感切羌種名勒姐下音紫或音子野切羌種名滇吾上音顚燒當羌名郝崇呵各切姓也傅育方遇切姓也封養如字西羌別種臨洮吐髙切隴西邑沘陽上音比􅀯陽邑冠軍古玩切南陽邑峭直上七肖切三年忤五故切逆也虖沲上音呼下徒何切在涿郡之饒陽都慮音廬隱栝古活切隱審量栝之也孫卿子曰拘木必待隱栝蒸揉然後直也康居音渠西域國名抅彌續漢書寧彌國王夲名抅彌前書作扜彌扜音烏漊中郎侯切水名在武陵蠻中羡陽善切四年伉音抗􅅥厲上他歷切愓懼也厲危也瞑目上莫定切閉目也與焉與讀曰預五年懣懣音滿又音悶鄯善上時戰切西域國名斷音叚截也戹於革切隘也更相工衡切互也僵仆上居良切僨也下方遇切頓也畨辰畨音潘姓也六年彪必幽切儲水陳如切停水也安作恊韻音則護切􅃭汝朱切短衣也袴苦故切􅀃文脛衣也貂丁􅂓切􅀃文䑕屬大而黄黒岀丁零國七年鞠躬居六切本作躹鞠躬者㳟謹之至也厭勝一渉切伏也飲酎丈救切三重釀醇酒也訣古穴切訣別卷津上丘權切即河南卷縣穫胡郭切刈也刺探上音次下湯勘切􅀱伺也瓢飲毗霄切瓢匏也鄼音賛南陽邑八年三木樓訾子斯切三木樓匈奴中山名因以爲號欵苦緩切􅀃文意有所欲也輕狡古巧切狂也健也思諐與愆同過也解酲上佳買切散也下直征切酒病也詖彼義切蒼頡篇曰詖侫謟也沁水千浸切河内邑隂喝上於禁切下一介切猶噎塞也􅀌雛仕于切鳥生子而啄者曰雛䊸邕俱切跼蹐上渠六切促也謂踡跼不伸下資昔切小歩也如踧踷然詈力智切罵也貰岀市夜切赦也疚居祐切病也嶠道渠廟切嶺也山銳而髙者帑藏上他莽切又音奴下才浪切帑藏金帛之所元和元年鍜練上丁貫切下郎甸切蒼頡篇曰鍜椎也鍜練猶成熟也閥閱上房越切下欲雪切史記曰明其等曰閥積功曰閱木訥奴骨切木質也訥遲鈍也丙箠主蘂切䇿也所以箠擊定箠令者謂令甲令乙令丙爲篇之次鉆鑚上其淹切鐡鋷也肘以劫束也下祖官切又作喚切刺也所以穿鑚臏刑謂鑚去其髕骨也怵然食聿切􅇶愓也儲跱上陳如切積也下直里切具也支柱竹主切牚也駮議此角切駮猶校也靁古雷字駰伊眞切受訊息晉切閤也悛此縁切改也捧夫奉切兩手承也坐臧則即切納賄曰臧大且渠且子余切匈奴王號也漢紀三十九通鑑卷四十七起旃蒙作噩盡重光單閼即乙酉至辛卯凡七年肅宗孝章皇帝下元和二年􅗖如鴆切􅀃文孕也矯舉夭切妄也饜於艷切通作厭悃愊上苦本切下孚逼切􅀃文悃愊至誠也車利涿兵涿竹角切匈奴大人名入塞先代切丁零音憐西羌名編訢音欣同李􅆊作四分曆􅆊清河人見蔡邕議惟訢無所考􅆊扶泛切綜校上子宋切下古孝切錯綜而校正之也酺薄胡蒲故二切􅁺俞絹切官屬沾張廉切或作霑濡也漬也岱宗待戴切泰山也爲四岳之所宗故曰岱宗汶上文運切水名岀琅邪朱虚東泰山東入濰有三山王帝祠驃􅀐上毗召切亦作票栩火羽切三正諸盈切三正謂天地人之正所以有三焉周爲天正商爲地正夏爲人正抄掠上􅀄教切下離灼切奪取也誾魚斤切中正皃衎衎苦汗切和樂皃嘿莫北切静也通作黙倍雇上蒲昧切加也下古暮切賃也三年騑芳微切夾轅者爲服馬服馬升爲騑馬泄先列切漏泄晷居洧切日影也俸符奉切秩禄也慤克角切損中東觀記作頓中續漢書及華嶠書作損中或作植章懷說㳂無正字難隨字音拘攣閭縁切係也拘執也章和元年隗五罪切晃户廣切酋豪自秋切長也大小榆谷上羊朱切下俞玉切榆溪名水注谿曰谷西羌中有大小兩谷也敞昌两切莎車素和切西域胡國徼吉弔切􅁁酤二年倉帑上千剛切倉庚也下它莾切藏金帛之所也膳時戰切具食也藏才浪切物所畜也賚洛代切賜也苑委逺切所以養禽獸也囿尤救切苑有烜也賑䘏上忍切贍也灋古法字羡以淺切阯音止􅀃文基也幹古满切主當也與管同瓌姑回切慠魚到切倨也挹一入切酌也睚眦上五懈切怒視下仕懈切恨視裁哀昨代切制也公羊辨而裁之裁數矣所角切不一也貪婪婪盧含切亦作惏左傳貪婪無厭扜侯旴切衛也稜盧登切莫適音的謂無指的也五校胡教切五校即五營也謂長水歩兵射聲胡􅀐車􅀐等五校尉也内之讀曰納湟中胡光切水名出金城臨羌塞外月氏胡所居之地冩谷西羌地名東觀記冩作鴈孝和皇希上永元元年箄歩佳切木筏也東號並平聲西芽別瑳稽顙上康禮切下蘇黨切額至地也欵苦管切至也塢壁安古切庫城也警蹕上居影切下卑吉切警戒肅也蹕止行人也舛尺兖切舛錯調度上徒弔切調賦也下徒故切用度也樂恢上五用切姓也下苦回切其名忿撫吻切悁忿偎烏賄切濫也郅壽職日切姓也誡居拜切敕也瞽言公户切瞽非無目者目但有联不察事而言之如無目之人孔子曰未見顔色而言謂之瞽牢獄牢閑也所以固有罪惲於粉切稒陽上音固五原邑􅀻渠比鞮海鞮丁奚切匈奴中海名禆賔移切副助也燕然上因肩切山名在匈奴速邪烏地中汜音似又音泛中竹仲切當也緹􅀐緹田黎他禮二切􅀃文緹帛丹黄邑也漢官儀執金吾緹􅀐二百人今奴客及緹􅀐言並縱横也偪筆力切爾雅曰迫也或作逼訩訩許拱切衆言也牾五故切逆也或作忤二年淑神六切閻礱上余廉切下廬紅切震慴質渉切懼也要之於堯切遮也􅉠符遇切賻贈郾於建切頴川邑谷蠡上音鹿下音黎匈奴王號創􅀄莊切傷也閼氏上於連切下音支匈奴皇后號三年璜胡光切賂遺上音路遺也下弋季切贈也纂祖管切纂承風厲風讀曰諷脅迄業切迫脅噫嗚上音醫又乙戒切下一故切歎傷之貌黷徒谷切䙝也於除鞬鞬居言切匈奴王名朔漠上所角切下莫各切北方之沙漠也即匈奴中訐居謁切訐謂發􅀭人之惡漢紀四十通鑑卷四十八起元􅘬執徐盡旃䝉大荒落即壬辰至乙巳凡十四年孝和皇帝下永元四年綬是酉切又承呪切􅀃文韍維也齮魚綺切悍士侯旰切勇猛之士也卒遇倉没切忽也怖普故切惶懼也蝗胡光切􅀃文螽也穰如羊切南陽邑磊魯猥切閹衣廉切又衣檢切宫中主門者鈎盾音順中官所􅀠其處在少府監内之内讀曰納酺薄胡切宥于救切寛也种兢直弓切姓也兢其名華嶠上胡化切下渠廟切詭過委切詐也穢烏外切惡也亹亹武斐切勉也謂勉勉乎不倦也郃音合又音閤椒房兹消切漢官儀曰皇后稱椒房取其蕃實之義也翹足祁堯切企足也充牣而振切滿也彪􅀘休切録尚書事録力竹切謂總領之也澧中里第切水名岀武陵郡傿於建切聶尚尼輙切姓也譯使上羊益切下䟽吏切傳夷語之人盟詛莊助切大事曰盟小事曰詛鄭康成􅀃五年伉口浪切魴符􅀆切卞忌皮變切姓也單父音善甫山陽邑横貸上胡孟切下吐戴切謂誤辱貰貸其罪也汙於胡切又烏故切亦作洿睢陽音雖梁國邑技巨綺切巧也鼓吹尺僞切􅀃文吹者音律管壎之樂也廏馬居又切馬舎釋名曰廏聚也生馬之所聚也貫友古玩切姓也塢烏古切小障也一曰􅋻城也航寒剛切方舟也賜支賜支西戎也禹貢所謂析支者也王肅云析支在河関西鄭元以爲山名􅃛下八切桀􅃛六年儆居影切戒也并力卑政切兼力也曼栢音萬五原邑格殺古陌切擊也鈔􅀄教切略取也納質陟利切結信也薁鞮上於六切下丁奚切匈奴王號郵亭音尤境上行書舎也度幕上徒故切濟也過也下末各切應劭曰幕沙幕匈奴之南界也要擊要讀曰􅆎穴官人勇切散也七年鄡􅏔堯切鉅鹿邑八年烏居戰並如字南匈奴右温禺犢王名涿鞮上竹角切下丁奚切車師後部王名祉敕里切九年􅀕參上側介切姓也沮材汝切止壞也䄠古禪字嫕一計切枹罕枹讀曰膚本枹鼔字其字從木金城邑旴况于切臨洮吐髙切隴西邑療力劭切治也蓋暹上古盍切下思廉切甘英續漢書作甘菟大秦西域胡國也一名􅀺鞬以在海西亦云海西國條支並如字西域胡國其地臨西海海水曲環其南及東北三面路絶唯西北隅通陸道珍恠上知鄰切寳也下古壞切異也十年畏懦乃卧切又乃亂切弱也或作愞愷苦亥切十一年芻蕘上䆫俞切下如招切蒭蕘採薪者詩詢于芻蕘十二年秭歸上音姊南郡之邑窘渠殞切急迫也糴亭歷切市􅂖也十三年鮪羽􅁤切允川允音鈆水出金城允街瓦解音蟹散也判也十四年隃麋上音踰右扶風邑拳勇拳本作權見燒當滇良傳狂狡古巧切猾也亦狂也委輸上迂僞切下式喻切謂輸委積者也繕脩時戰切􅀘葺也巫蠱公吐切左傳注曰蠱惑也巫師惑人故曰巫蠱軼音逸比景比毗志切日南郡之邑名如淳曰日中於頭上景巳在下故以名之頸居郢切􅀃文頭莖也匃居太切乞也或作丐蕩佚前書音義曰佚音鐡蕩音讜佚蕩緩也僂身隴主切背曲也逡廵上七倫切下松倫切逡廵行不進也愴然􅀄亮切悲傷也鄛郷上士交切在南陽郡十五年顧復蓼莪詩顧我復我復芳目切箋云顧旋視也復反覆也弱冠古亂切蓼莪上音六下五何切義草名蒿之屬蓼者言其長大皃詩小雅之章􅀫留上音秀下力救切猶停留也􅀫留本作須留見清河孝王傳十六年緱氏古侯切河南邑百岯山爾雅山一成曰岯平眉切即百岯山也東觀記作坯音同俗作伾誤也章懐釋元興元年痼古慕切乆疾篋詰計切箱篋首服上式救切自陳其罪而服也實覈下革切􅀃文實事也覈考也敦煌音屯皇郡名發擿他歷切挑也凡隱伏者謂動發之資治通鑑釋文卷第五
