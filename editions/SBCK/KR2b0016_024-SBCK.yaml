body:
  text: 右宣義郎監成都府糧料院史炤唐紀四十一通鑑卷二百二十五起閼逢攝提格盡屠維恊洽七月即甲寅至已未凡五年有竒代宗睿文孝武皇帝中之下大曆九年羌渾音䰟羌西羌党項之屬渾吐谷渾也皆近吐蕃璘離珍切三藏才浪切三藏謂經律論也見釋氏法苑義林巫覡刑狄切說文能齋肅事神明也男曰巫女曰覡俟閒居莧切俟間謂待疾之瘳也犒苦到切餉也瑝胡光切璿似宣切十年瑁莫到切屠同都切殺也謂誅殺其人如屠六畜然􅋇靣臨支切剥也郴丑林切州名鄜芳無切州名暹思廉切遹余律切輜重上側持切載衣車下直用切載物車行者之車緫曰輜重奚也奚本東胡種爲匈奴所破元魏時自號庫真居鮮卑故地至隋始去庫真但曰奚跋扈上蒲末切下音户强梁也一說扈離也氷居者於水未至爲籬水去則大魚跋扈而出小魚獨留􅀥強􅀥音早強亦作彊縣名屬兾州溘死口荅切奄也莊子溘然而死謂奄然也字或作見楚詞孱弱鉏閑切孱劣懦弱也承倩倉甸切䜟楚譛切驗也符䜟之書瘞於計切幽埋也怦披耕切晃胡廣切翊逸職切縉即刃切十一年氐羌氐本西南夷種漢置武都郡排其種人分竄山谷或號青氐或號白氐羌夲三苗姜姓之别裔今之西南羌是也濮博木切州名鄆王問㓛州名滎澤户扄切縣名屬鄭州雍丘於用切縣名屬亦州皷譟蘇到切羣呼也枕藉上之禁切下自夜切首之所據曰枕身之依依曰藉械送胡戒切械囚具謂加以三木而傳送之喧咽烏結切嗚咽也哭者衆其聲喧然故稱喧咽頔亭歷切偶語相嚮耳語也下偶言同􅈴貴許云切有功勲之貴顯者十二年鮑薄巧切姓也賄賂上呼罪切贈送也下洛故切賂遺也悛此縁切改也夜醮子肖切醮􅀕也奏章以逹其誠涵胡男切鞫君六切窮理罪人也韈望發切足衣首從才用切首謂罪首從謂從坐綰烏板切驟從上側鳩切下才用切廏御也撤直列切去也洄户恢切滉胡廣切掊多薄侯切掊克也謂聚歛斵竹角切說文斫也餐錢七安切謂廪禄之外復有餐錢也堂封唐制宰相堂封歳三千六百縑興元後纔千二百徳宗時復舊汲人汲縣名屬衛州指其地故言汲人拔谷余玉切地名澡子皓切澶市連切州名十三年白渠漢武帝時趙中大夫白公穿渠引涇水漑田名白渠碾磑上尼展切磨也下五對切䃺也古者公輸班作磑三渠謂塡漢渠御史渠尚書渠也在靈州渾瑊渾胡奔切姓也瑊古咸切銀麟力珍切二州名党項上多曩切西羌別種古析支國也三銓且縁切唐制吏部兵部皆有三銓尚書掌其一侍郎分其二尚書所掌爲尚書銓侍郎所掌其一爲守銓其一爲東銓銓各有印矯居了切詐也泌必媚切曇徒含切十四年縮漏所六切謂促縮夜漏也鹽酪盧各切鹽酪乳乳酪所以調羮臨力禁切衆哭曰臨相屬之六切連也甄別上居延切察也下彼列切分別也曠官苦謗切書無曠庶官注曠空也位非其人爲空官尚父太公爲周師尚父說者謂可尚可父天子師也鷃於諌切卿雲如字文選卿雲黼黻河漢謂司馬長卿楊子雲也後言瑞者以慶雲爲卿雲蓋取黼黻河漢之意豢養胡慣切圈飬豹貀女滑切獸名似狸蒼黑無前足善捕䑕字亦作豽稱其昌孕切冝也所衣於旣切服之也乘轝上神陵切下羊茹切轝舁車也第五􅄾渠冝切第五姓也漢有第五倫搉鹽上訖岳切搉者歩渡橋爾雅謂之石杜今之略犳是也禁閑其事利緫入官下無由以得有如渡氷之榷因以立名漢武帝􅀄榷酤酒是也檛登陟􅀲切馬杖也亦以擊鼓禰衡以撾擊皷作漁陽槮諝私吕切帑藏上他曩切金幣所儲下才浪切物所蓄也德棻敷文切諶氏任切傀姑回切琇珪以九切又音秀宫壼苦本切宫中道也傪倉含切孟浪如字斥言􅁀也墮㢮上許規切毁也下施是切釋也木妖時將帥宦官競治第舎殫耗材木事皆反常故􅁛爲禾妖饔餼上於容切下許旣切饔饔飱也餼說文曰客芻米也春秋傳齊人來餼諸侯唐紀四十二通鑑卷二百二十六起屠維恊洽八月盡重光作噩五月即己未至辛酉凡一年有竒代宗睿文孝武皇帝下大曆十四年粗率徂古切猶言忽略也詼諧上枯回切譏戯也下雄皆㓛歡諧也襲衣似入切重也衣一襲也猶言一副耳土著直略切言著􅁟地而有常居不隨蓄牧移徙也紊亡運切亂也量書音良尚書掌七品巳上選侍郎掌八品以下選皆有銓量之書所以叙其資地而進退之也租庸唐賦役之法有田則有租有身則有庸租出穀庸出絹調出繒纊布帛選曹湏絹切文武各有其選漢之選部是也主銓選之事即唐之兵部吏部書判選法三曰書取楷於遒羙四曰判取文理優長以下始試書判試判登科謂之入等辛京杲辛姓也杲古老切翟直􅁉切姓也黄萯簿亥切又音負地名趣寧趨玉切速也沃壤如兩切無塊曰壤沃饒之地也晟丞政切曲環曲姓也後漢有代郡太守曲謙江油縣名唐屬江油郡即鄧艾代蜀之道趣白埧趣千餘切嚮也平川謂之垻白垻地名大度河水名在雅州之南與南詔接唐儀鳯中甞置大度縣隕于敏切說文從髙下也易有隕自天苴咩城苴音酢咩音養南詔地名雲南王異牟所築延袤十五里去雲南城三百里或作陽苴咩城又曰羊苴咩城延袤莫候切延說文長行也南北曰袤􅀠人郎計切僕􅀠也輼輬上烏昆切下龍張切說文卧車也後因載䘮飾以栁翣遂爲喪車之屬改轅雨元切輈也卜祝周官太卜掌三兆之法太祝掌六祝之辭璵羊諸切􅀺憐題切姓也左道禮亂名改作執左道以亂政殺注左道􅀂巫蠱及俗禁聵五恠切聾也京畿渠希切天子千里地以逺近言之則言畿此指言京師故謂之京畿單于鎭北單音禪單于大都護府與鎭北大都護府並屬關内道左藏才良切帑藏之外庫比部音毗掌内外諸司公廨及勾覆錢物唐時甞改爲司計又唐制天下財賦皆納於左藏太府四時以數聞尚書北部覆其岀入也贏縮上余經切有餘利也下所六切不足也􅁞食昨含切如蠶之食言多耗蠧財物也蠧敝上多故切下音弊􅀂蟲之蠧耗而多弊壞於物也阻山莊所切恃也言依恃山谿之險也休假古訝切休告也德宗神武聖文皇帝一建中元年兩稅德宗相楊炎作兩稅法夏輸無過六月秋輸無過十一月視大曆十四年墾田數爲定廢租庸調法版籍上補綰切下秦昔切所以書户口輿地也丁中如字凡民始生爲黄四歳爲小十六爲中二十一爲丁六十爲老授田之制丁及男年十八以上人一頃僥利堅堯切僥倖其利也雜徭餘招切徭賦也租庸調雜徭謂穀絹布帛繒纊所岀不一也風言如字風傳其言也曖昧上於代切下莫佩切謂晻曖昏昧也洪經綸洪姓也共工氏之後本姓共氏後改爲洪氏墾闢上口很切治也下毗亦切開也謂治其荒田而開闢之以耕種之屏必郢切蔽也􅀂藩屏之屏賻贈符遇切􅂇也所以贈終布帛曰賻侵漁如字言掊克其民􅀂漁獵然載書作代切盟書也餽運求位切轉餉也蘇疲音皮謂蘇息其民者疲困者微孽魚列切庶子也猶木之有孽生故以爲喻藩邸典禮切藩謂爲藩屏者几郡國朝􅀫之舎率名邸邸至也言所歸至也賜予余吕切郭璞云子猶與也參佐倉含切藩鎮之官属也登里吐蕃牟羽可汗之號代宗時始􅁽命之九姓胡天寳􅀄回紇裴羅自稱骨咄禄毗伽闕可汗悉有九姓地九姓者曰藥羅葛曰胡咄葛曰啒羅勿曰貊歌息訖曰阿勿嘀曰葛薩曰斛唱素曰藥勿葛曰奚邪勿合骨咄禄咄都骨切本回鶻相頓莫賀逹干也擊殺可汗并九姓胡自立爲合骨咄禄毗伽可汗源休愚􅀽切蕃姓後魏秃傉檀之子賀入魏太武錫姓源氏瀕湖毗賔切水涯也謂湖之濵疲甿莫耕切民也通作氓湔洗則前切猶疑猶餘救切玃屬其性多疑一說隴人呼犬子曰猶好先行邞住以候其人遂曰猶豫猶疑亦猶豫之謂沈氏式荏切姓也縊於計切經也仰給魚向切恃也給贍給也不貲音資財也不貲者謂費財不少置遞置郵買遞驛遽所以傳命覘報丑廉切又丑艶切闚也精悍侯幹切精強勇悍也句檢句古侯切句稽也檢居奄切檢柙也紿蕩亥切欺也豐歉豐稔也歉詰念切博雅貧也一曰食不滿也又苦簟切貴糴亭歷切買入曰糴賤糶他弔切賣出曰糶蠲免圭淵切除也鬻余六切賣也湍悍他官切水之急流其􅀔勇悍也漕卒上在到切水運也下藏没切漕運中所役卒也江船船自江行者爲江船與汴船河船渭船同義艘蘇刀切船之緫名脆薄此芮切說文小耎易斷也董突陁骨切回紇臣名武義可汗之叔父也魚肉言羣胡大小相吞猶魚肉然京觀古玩切積尸封土其上謂之京觀京髙丘觀謂如闕形也魁岡枯回切北斗魁星之氣十月在戍爲魁岡貟㝢上王問切姓也下音宇其名供張並去聲供具張設也殤服音傷說文不成人也年十九至十六死爲長殤十五至十二死爲中殤十一至八歳死爲下殤其服有差二年衰絰上倉回切亦作縗喪衣也下徒結切首戴也以茸麻爲之旄􅃏上莫袍切說文幢也下王伐切大斧也行節制者持之書武王左杖黃􅃏右秉白旄以麾橈敗奴巧切撓亂也軍敗即橈亂故云撓敗城隘烏懈切陋也􅋇居里之切寡婦也蕞陋才外切小也貪婪盧含切婪亦貪也凱旋可亥切兵樂曰凱司馬法得意則愷樂愷歌示喜也城濮之戰振旅愷以入于晉閹官衣廉切宫中主門之官又衣檢切䜛鋤咸切譛也舋積許愼切與釁同鐡劵上他結切下區願切丹書鐡劵國之所以示信漢功臣表與功臣剖符作誓丹書鐡劵金匱玉室藏之宗廟藺良刃切姓也愔於今切柵音􅁽寨柵也編立木爲之邯鄲上胡甘切下多寒切縣名屬磁州伾攀悲切十圍五攻孫子十則圍之五則攻之謂以衆擊寡崞口音郭地名代州崞縣有崞山唐紀四十三通鑑卷二百二十七起重光作噩六月盡元黓閹茂即辛酉至壬戌凡一年有竒德宗神武聖文皇帝二建中二年屈強屈渠勿切亦作倔屈強謂梗戾也閩越眉巾切東南越甬橋尹竦切道上加土曰甬橋名在徐州渦口烏禾切渦口在徐州按說文水受淮陽扶溝浪蕩渠東入淮睥睨上匹計切下研計切衺視也左睥右睨魚朝恩魚姓也風俗通云宋公子魚賢而有謀以字爲族後因氏焉頷之五感切首肯也芃蒲紅切昕許斤切閒道居莧切微􅂩之道也而墮許規切毁也鎰弋質切壷關音胡縣名屬潞州邯鄲音寒丹縣名屬惠州洹水于元切縣名屬魏州翟暉翟亭歷切姓也又音宅稹止忍切蹇紀偃切郢以井切廨居隘切公舎羡延靣切延也餘也絞古巧切縊也王氣于放切太元經曰五行用事者王祫轄夾切合􅀕先祖親疎逺近也洧羽􅁤切傀古回切宣武宣武藩鎭自劉元佐始傳四丗而滅有州四曰汴頴宋毫嗤赤之切􅀏也摶伯各切索持也賛普吐蕃之俗謂彊雄曰賛文夫曰普故號君長曰賛普三年漳濵諸良切漳水之濵挑戰徒弔切擿嬈敵以求戰也鼓譟先到切羣呼也草莽模黨切衆艸也浮圗同都切浮圗佛寺也􅀽宏漢記云浮圗佛也佛者漢言覺也將以覺悟羣生不内讀曰納嬰城於盈切繞城以自守不量力張切不度量也腦乃老切亦作繕時戰切治也濮陽音卜縣名屬濮州齧倪結切噬也慢罵莫晏切亦作嫚詵䟽臻切岌逆及切畢華畢卑吉切姓也本畢公髙之後遡蘇故切倒戈都皓切戈平頭㦸也倒戈謂反以自攻􅀺明憐題切􅀺猶比也謂至天明也日蹙子六切迫也梟工堯切挂首於木上郅職日切憤悒上房吻切滿也下乙及切不安也說之音稅誘也房說音恱鄆玉問切州名髓息委切骨中脂曰髓僥冀上古堯切幸也下几利切欲也涿竹角切州名怦披耕切貽與之切遺也夷落夷落謂蠻夷部落也按王武俊本契丹奴皆部與張孝忠善射齊名岀夷夷落也詰旦去吉切平旦也纊苦謗切絮也賦率賦率謂征賦之歛率也率朔律切諠悖上許元切下蒲没切諠華而悖慢也擘􅀶厄切說文撝也呼曰火故切大呌也股栗上果五切下力質切股髀戰慄言其恐懼也趣逡湏切嚮也慷􅁣上口莽切下口漑切謂竭誠也括古活切檢也商賈音古行賣曰商坐販曰賈搒捶上音彭下止蘂切搒掠捶擊也囂然許嬌切又五刀切喧也僦櫃質錢僦即就切賃也櫃求位切匣也德宗時以軍費行借富商錢杜佑爲度支又取僦櫃納質錢窖居效切或作􅐎鉥時橘切勠力音六說文併力也嵇康音力幽切泚千禮切蠟書盧盍切以蠟爲彈圎置書其中故曰蠟書髻中吉詣切束髮之間也􅃾田容朱切膏􅃾地也藹然於蓋切多皃可汗河干切戎酋稱翳密施翳壹計切回紇種名頡子思迦頡奚結切迦居伽切回紇宰相也愜山苦恊切在魏州澶相上時連切下悉亮切二州名䑛靣甚􅈛切矍然厥􅅞切遽也區頰賛頰胡結切吐蕃臣名鍔五各切祍如甚切衣襟也慤克角切謹也濡汝朱切嘔血於口切吐也仰給魚嚮切廣雅曰持也唐紀四十四通鑑卷二百二十八起昭陽大淵獻正月盡十月即癸亥不滿一年德宗神武聖文皇帝三建中四年眇亡沼切目小也無湏髭髯也俗作􅂡􅀜播傳作無髯液汚上羊益切津液也下烏路切穢也又音烏盲宰相武庚切目無瞳子李希烈罵關播云謂其用李元平目􅀂盲無所見也尉氏於胃切縣各屬汴州邏􅀐郎佐切廵邏之􅀐彭婆薄波切地名驍將上堅堯切下子亮切驍健也剸㗖上旨兖切細割也下徒濫切食也將割而食之故謂之剸㗖韓白謂韓信白起也漢王僞遊雲夢縳韓信白起遷隂密至杜郵賜死此韓白之禍也四凶李希烈稱朱滔王武俊田恱李納爲四王顔真卿反之稱爲四凶誘脅上與乆切下虚業切以利動之曰誘以威迫之曰脅好畤音止縣名武德二年析醴泉置屬京兆畤者封土積髙所以察天地五帝之基扯秦有西畤鄜畤武畤密畤好畤爲五畤也郟城訖洽切縣名屬汝州封有麟封府容切姓也麟力珍切郵驛羽求切境上行書舎又置驛馬皆所以傳命也蘄渠之切州名玢悲巾切憺徒濫切又徒敢切騾軍盧戈切淮西地少馬乘騾以戰號騾子軍尤悍銳俘馘上芳無切軍中所獲也下古獲切截耳也春秋以爲俘馘疆􅂣上居良切界也下羊益切畔也璬吉了切趣之趨玉切速也脫屣所綺切履不躡跟也言所去之易也稅間架音嫁趙賛奏行稅間架每屋兩架爲間上屋稅錢二千中稅千下稅五百明年詔罷其法執筭蘇貫切所以籌筭也其法用竹徑一分長六寸二百七十一枚而成六觚爲一握貿莫候切易財也郴丑林切州名頔亭歴切論刺没藏論盧昆切吐蕃臣名舊史刺作頰不戢側立切藏兵也詩載戢干戈詿誤古賣切詿亦誤也脅從虚業切書脅從罔治孔頴逹䟽其􅀍迫脅而從距王命者卒乘上臧没切下實證切崤函上何交切下胡䜛切崤謂崤山今陜縣東二崤是也函謂函谷古函谷在今靈寳縣汧渭上音汧下音胃二水出鳯翔府寳雞縣􅃛虜下八切桀黠也覷七慮切伺視也禍拏女加切牽也謂禍相牽拏關輔漢關中之三輔也曰京兆尹曰左馮翊曰右扶風唐爲關内道也弭怨綿婢切止也滬澗侯古切水名趣許千余切嚮也許州名斥候昌石切許愼淮南子云斥度也候視也又望也滻水所簡切水名在京兆府萬年縣犒師口到切軍餉也糲食郎葛切脫粟也蹴七六切蹋蹴也擐甲胡慣切貫也春秋傳擐甲執兵馬鬛良渉切馬髮毛也僦質上即就切賃也下之日切以物相贅也謂前年栝僦櫃質錢解見上卷販鬻上方援切􅀒販也下余六切賣也卒倉没切急也聞蹕音畢蹕止行者曖烏害切爲殿丁練切軍後爲殿頎渠希切列炬其吕切羅列火炬也釭古紅切又古雙切披猖上匹羙切即披靡之謂下音猖即猖狂之謂皆散亂之意也􅄮靈岳􅄮巨支切姓黃帝時有􅄮伯溆徐吕切胏附方廢切謂􅀂肺肝之相附着慊慊苦簟切恨也駱驛上音洛下音懌駱谷關之驛也忷忷許容切擾恐也猝愕倉猝之猝驚愕之愕昌巙渠規切膠水在漢膠東國一曰密水唐時膠西爲密州沇以轉切澘然師姦切涕流兒盩厔上之由切下職日切縣名屬鳯翔府山曲爲盩水曲爲厔三秦漢書項羽旣背約更立沛公爲漢王又三分關中立秦三將章邯爲雍王都廢丘司馬欣爲塞王都櫟陽董翳爲翟王都髙奴故曰三秦即唐關内道也拓撻各切開拓也梯衝上天􅀺切雲梯也以登城衝昌容切亦作䡴䧟陣車也􅋲空旱切兇渠兇音凶賊之渠師也怨讟徒谷切說文怨痛也春秋傳民無怨讟凝䆳雖遂切深逺也􅂝離奚圭切相􅂝持而離去也祖伊商紂臣名見商書盪滌上他浪切下亭歷切猶言蕩滌祅氛敷文切祅氣也逹干回鶻相磨咄莫賀逹干頓也蹉跌上倉何切跌也下徒結切踼也輻湊上方六切車輻也下倉奏切㑹也聚也亦作輳攘袂上汝陽切揎􅃑出臂曰攘下彌弊切衣袂也汧陽輕煙切縣名屬隴州孤㹠徒渾切豕子曰㹠本作豚平弇古南切又音掩唐紀四十五通鑑卷二百二十九起昭陽大淵獻十一月盡閼逢困敦正月即癸亥至甲子不滿一年德宗神武聖文皇帝四建中四年掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言恊力共攻之穿塹穿去聲貫也塹七艶切遶城水也數沮上所角切屢也下子與切止也飛狐道狐音胡縣名屬蔚州縣有飛狐關故以名縣明􅤬余章切覘賊丑廉切又丑艶切闚也􅃭袴上汝朱切短衣也下苦故切脛衣也蕪菁咨盈切本草注云蕪菁北人又名蔓菁根葉及子乃是菘􅁼詩采封采菲䟽云陸機云葑蕪菁幽州人或謂之芥方言云豐蕘蕪菁也陳楚謂之豐齊魯謂之蕘關西謂之蕪菁趙郡之部謂之大芥駱歷各切姓也彚于貴切兕革上徐姊切如野牛而青一說雌犀也革獸皮忷懼許容切又許拱切擾恐也春秋傳曹人忷懼所傃桑故切所向也轒輼上符分切下烏昆切說文淮陽名車隆穹爲轒應劭曰轒輼匈奴車愽雅以爲栁車歔欷上欣居切下許旣切歎息貌輾尼展切轢也閒行居莧切微行也塡塹上徒年切塞也下七艶切阬也身中陟仲切傷也舁以朱切肩舁也爲忤五故切逆也萬俟著萬音墨俟音其虜􅃨姓從容上七容切猶雍容也朏敷尾切叱干遂叱尺栗切叱干代北􅃨姓之後盱眙上匈于切下盈之切縣名屬泗州塢壁安古切說文曰小障也一曰􅋻城壁壁壘也京峴胡典切山名京大也疑即珢邪大峴山樓堞徒恊切城上垣也否隔備鄙切否泰之否以泰通言之則否爲隔也畏懾質涉切畏懼也跼蹐跼其欲切曲也蹐井亦切累足也詩謂天蓋髙不敢不跔謂地蓋厚不敢不蹐箋云跼蹐者天髙而有雷霆地厚而有䧟淪言上下皆可畏怖也樞密昌朱切謂機密之事矜衒熒絹切自賣也雷同並如字禮記母雷同注雷之發聲物無不同時應者人之言當各由巳不當然也一說雷震驚百里而百里爲一同事無可否而同之故謂之雷同眩黄絹切目無常主彊愎弼力切强很也畏懦奴亂切又奴卧切懷畏懼而怯懦也勦說􅀄交切又􅀄教切禮母勦說注勦猶覧也謂取人之說以爲巳說臆度上乙力切胷臆也下待各切以胷臆之意忖度之論語臆則屢中悖蒲没切逆也呐呐儒劣切言緩也又奴骨切木訥奴骨切論語剛毅木訥近仁注云木質樸訥遲鈍也詰喫吉切責問之也扈從扈音户從才用切衛侍也從天子在外故曰扈從琯古滿切子瑗于願切郊坰㳙熒切邑外曰郊野外曰林林外曰坰連衡音横合從連衡也以利今爲從以威􅀔相脅爲衡紿蕩亥切欺詒也韜他刀切藏也說丈劒衣也悍卒上侯旰切下子没切卒之勇悍者嬴秦以成切斥言秦皇也姓嬴氏故稱爲嬴秦聖劉漢哀帝以􅁨賀良等言更號曰陳聖劉洗刷洗滌也刷數滑切拭也疵垢上疾移切病也下古后切塵垢也鬱堙上紆勿切幽滯也下於眞切堙塞也興元元年宗祧他彫切逺祖廟也轉餉式亮切饋運也祀奠堂練切說文置􅀕也禮有奠􅀕疲甿謨耕切民也亦作氓杼軸上直吕切下直六切機具也靦皃他典切靣慙也墊陌錢墊都念切䧟也即趙賛所請除陌錢法也凡公私貿易千錢舊筭二十加爲五十兩相易者約直爲率至是而罷賀蘭並如字本後魏時虜􅃨姓周書有賀蘭詳傳曰其先與魏俱起有紇伏者爲賀蘭莫弗霍丘忽郭切縣名屬夀州蘄黄渠支切二州名撤直列切去也芻牧芻䆫俞切禾秸也牧畜牧也冠氏古玩切縣名屬魏州幄帟上於角切下羊益切三禮圗曰在上曰帟四旁及上曰帷上下四旁悉周曰幄廡下罔撫切堂下周屋也榜􅀘曩切亦作牓木片也又題牓也相枕質任切首之所據也宫掖夷益切宫中掖庭也故言宫中必曰宫掖黷音讀蒙也亦作瀆易曰再三瀆趣逡遇切趨向也逗留上音逗下音溜稽遲不進也矛楯食允切矛戈矛楯甲楯也矛所以傷敵楯所以杆身其用相反故事之不恊者爲矛楯唐紀四十六通鑑卷二百三十起閼逢困敦二月盡四月即甲子不滿一年德宗神武聖文皇帝五興元元年諡神至切亦作謚濮博木切州名剽掠上匹妙切下離灼切劫奪財物也滉胡廣切滬澗上侯古切水名脅迄業切迫脅陳濤斜並如字陳濤斜地名也斜又音余遮切秣莫葛切食馬穀逗留上大透切下六疚切謂退縮不進也趣之趨玉切速也疲弊上音皮勞也下毗至切困也釁許覲切瑕釁也窘巨允切迫也觖望古穴切怨望也募莫故切召也譎詐古穴切權詐也芟翦上所銜切刈草也下即淺切截也謂鋤姦誅惡􅀂芟刈翦截然可解胡買切曉也銜命户監切謂奉王命出行宣慰故謂之銜命鄜坊上芳無切下音方二州名聮營聮音連謂營壘相聮齟齬上床吕切下魚巨切說文不相值也翹足渠遥㓛舉足髙曰翹足疚心居宥切病也詩憂心孔疚謂憂心若病也慝他德切惡也吞噬上吐根切咽也下時制切㗖也悵望丑亮切說文望恨也禆將賔彌切將之偏副光銑蘇典切閒之居莧切諜也悖蒲没切逆也城湟胡光切說文城池也有水曰池無水曰湟易城復于湟拉盧合切摧也郜音告姓也出自周文王子封郜國國在濟隂晉有尚書髙昌郜乆又古沃切璀七罪切密裝側羊切密具裝束所以備行盩厔上張留切下職日切縣名屬鳯翔府山曲曰盩水曲曰厔駱谷上音洛下音欲在盩厔縣然藁古老切稈也錯愕逆各切驚恐之意格殺如字格或作格擊也跨若化切兩股閒也擐甲胡慣切貫也春秋傳擐甲執兵讋服質涉切失氣也言皆喪氣而畏服瓌公回切昕許斤切璿似宣切潼􅀜徒東切在華隂本名衝關河水南湧衝激華山之東故以爲名潼又音通亦謂水至此通㑹也竇覦上田候切姓也下羊朱切逹奚胡雞切虜􅃨姓後魏書有逹奚薄奚統奚吐奚四氏狼狽狼音郎狽音貝生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽也蔣子兩切姓也說之音稅誘也腥臊上先青切下蘇曹切豕膏臭也汚漫上烏路切穢也下謨官切塗也亦作墁歔欷上欣居切下許旣切歎息皃搏膺補各切拊膺切大呼火故切譟也琳􅀺沈切趣逡湏切嚮也恧女六切慙也亦作怛回紇下没切即回鶻也跂立遣尒切謂􅺿踵而立旋踵如字轉足也所以喻事之速捷雜沓徒合切沓沓然混雜之稱輿皁昨早切左氏傳人有十等王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣􅀠􅀠臣僚僚臣僕僕臣臺誕謾上徒旱切下莫半切不經之稱突陁没切觸也銛鋒思廉切利刃也筋力舉欣切迕五故切逆也駐蹕駐音注止也蹕音畢警蹕也蹕以清道所以止行者故稱車駕之所止曰駐蹕岷峨岷音民峨音俄蜀二山轉餉式亮切饋運也窺伺上缺規切下相吏切頋望也大憝徒對切怨也惡也周書云惡大憝晷刻居洧切日影也晷刻謂日影猶未轉刻褒斜上􅀘刀切下余遮切漢中谷名南谷名褒北谷名斜首尾七百里夐絶休正切又許縣切逺也洶洶許拱切又許容切喧擾之稱咽喉上音煙下音侯梗古杏切喉爲物所介也抉於决切說文挑也疵才支切疵瑕虧橈奴巧切虧損撓亂也旌旄上音精游車載旌析羽注所以精進士卒也下音毛幢也暹思廉切裘褐音曷備寒之服詩無衣無褐何以卒歳陜虢上失冉切下郭獲切二州名鍠音横玷都念切疵玷也讟徒谷切說文怨痛也春秋傳民無怨讟邢音刑河間邢氏出自周王之後􅁎姓之國邢侯爲衛所滅後爲氏豁逹呼活切顔師古曰豁然開大之皃雄猜倉才切狠於猜忌也區㝢王矩切猶言宇宙忠藎徐刃切進也詩王之藎臣轍直列切車轍迹也節􅃏王伐切節以專殺斧􅃏以專斷梟夷堅堯切梟首而夷滅也鑾輿盧官切人君乘車四馬鏕八鑾鈴象鑾鳥聲和則欽也故謂之鑾輿鑾通作鸞􅉁􅊽上臻魚切虀􅉁也下音海醯􅊽也裌衣古袷切􅃨衣說文曰衣無絮也唐紀四十七通鑑卷二百三十一起閼逢困敦五月盡旃􅀩赤􅁬若七月即甲子至乙丑凡一年有竒德宗神武聖文皇帝六興元元年繒咨騰切帛也儲㣥上直愚切下文里切猶言蓄積也艘蘇刀切船之緫名舷胡千切船邊也裙渠云切下裳也與帬同疫音役民皆疾也砥礪上音㫖下音厲平石也羈礙羈居冝切馬絡頭也礙謂羈所掛礙也鋒鏑鋒戈㦸刃也鏑丁歷切箭鏃也掣肘上昌列切挽也下執柳切臂肘也餫王問切野餉也困憊蒲拜切極也病也與備同燕薊上音煙下音計薊州名在燕地冘豫冘音􅁋說文曰冘冘行皃東觀記曰狐疑不决也亦音由不定也潰胡對切散也怦披耕切縑苦廉切并絲繒也大譟蘇到切羣呼也阻􅉣上側吕切隔也下色入切不通滑也諜人逹恊切行反間者弩力乃古切勉力也飲於禁切飲之也狹隘上轄甲切下烏懈切陋也詵踈臻切滻西所簡切滻水在京兆府萬年縣滻水西岸北望春宫也佖毗至切又簿必切神䴥村居牙切亦作麚地名柵測革切寨栅編立木爲之以禦敵蹙子六切迫也股栗上音古下力質切驚懼皃安堵董五切人情之安如墻堵之不遷動釭古雙切又古紅切露布不封之以示明告中外漢李雲露布上書移副三府自後魏以來軍中露布皆書於帛建於􅃮竿鍾􅙇音具說文鍾鼓之跗以猛獸爲飾前書音義曰􅙇鹿頭龍身神獸也熒惑惠扄切星名熒惑曰南方夏火主禮也視禮虧失則罰見嬴縮上怡成切下所六切五星早出爲嬴晩出爲縮疲瘵上蒲麋切勞也下側界切病也瘡痍上􅀄良切下延知切皆傷也沇以轉切權衡權者所以權萬物衡者所以平萬物中滑稽傳非徒低昻之差乃銖兩之覺也故謂之權衡奠枕堂練切安枕也楊子奠枕于京旅拒上力舉切衆也下臼許切捍也謂率衆以相捍拒誅鉏牀魚切謂國家肆行誅討若薅鉏蕪穢然綜理子宋切機縷也理治也綜理謂整治其事使皆有紀􅀂機之錯綜也齎祖稽切持也啖徒敢切姓也前秦録有將軍啖鐡本作噉泌兵媚切杭胡剛切夢魘於冉切驚夢也一曰睡中魘梟堅堯切斷首掛木上驍悍上古堯切健也下侯旰切勇也控制苦貢切控御也縊殺於賜切經死也朝􅆒上馳遥切下余章切華陜虢上胡化切中失冉切下郭􅀗切三州名鎰弋質切斌必鄰切貯展吕切積也猗氏於冝切縣名在河中府廡罔撫切堂下周屋翟直格切姓也忿䦧上敷粉切悁也下馨激切詩兄弟䦧于牆注狠也液夷益切􅑻訖岳切豐稔如甚切歳熟也歸覲渠遴切歸省其親也道殣音僅道中死人人所覆也詩行有死人尚或殣之正元元年需詢趨切辟易辟頻亦切辟易謂開張而易其故處也京顧京姓也風俗通云鄭武公子叚封京城其後因爲氏顧其名澧盧啓切州名郢以井切鄘餘封切掘塹上渠物切下七艶切坑也遶城水也􅅝許驕切喧也涿竹角切州名奬勵上即兩切下力制切勸勉也窺覦上缺規切下羊朱切私視也芻藁上􅀄俱切芻茭也下古老切禾稈也所以供軍馬餓殍平表切餓死者曰殍鴆殺直禁切毒鳥以其毛歷飲食則殺人賑章刃切瞻也躡尼輒切蹈也履也曲沃烏酷切縣名屬絳州妥貼上他果切安也下他恊切伏也亦作帖匄居太切乞也灞必駕切水名在京兆府萬年縣唐紀四十八通鑑卷二百三十二起旃蒙赤􅁬􅀂八月盡強圉單閼十月即乙丑至丁卯凡二年德宗神武聖文皇帝七正元元年尉珪紆胃切姓也左傳有大夫尉止娖隊測角切說文謹也謂謹其隊伍說諭音稅誘諭也窘巨隕切迫急也徼堅堯切倖也亦作僥覬几􅀋切覬覦也敭余章切舉也亦作掦曩乃黨切曏也殫多寒切極盡也咫尺諸氏切賈逵云八寸曰咫擠牋西切排也闔胡臘切罹鄰知切遭也中畿渠依切天子千里地以逺近言之則言畿當天下之中故謂之中畿梟殄上堅堯切梟首也下徒典切絶也靦他典切面慙也陸梁如字猶言疆梁狴牢部禮切狴犴獄名賚音頼賜也侵軼徒結切又音逸突也妓渠綺切于闐徒賢切又徒見切西域國名韶時昭切州名二年四夔巨規切虞舜臣名時崔造韓㑹盧東美張正則爲友以王佐自許時人謂之四䕫琇音誘又音秀榷酒音角水上横一木以渡人者喻禁民酤釀鹽鐡茶之􅀋官自開置如設木爲􅅦獨取利也􅁻中孚如字吉姓也出自尹吉甫之後厎柱音旨底柱山在陜州峽石縣山有三門河所經撗海滄景藩鎮自程日華始傳三丗至程權入朝十六年而李全略有之至其子同捷而滅有州四曰滄景德􅀠號橫海軍申光彰義藩鎭自呉少誠始傳三丗有州三曰申光蔡洮河鎭他刀切水岀西羌中北至抱罕東唐爲洮河道蒸煑仍切火氣上行也熨紆勿切持火所以申繒也縶陟立切繫也彍􅀐虚郭切張也說文弩滿也兵志曰唐有天下二百餘年而兵之犬􅀔三變其始盛時有府兵府兵後廢而爲彍􅀐彍􅀐又廢而方鎮之兵盛矣土著直略切言著土地而有常居不隨蓄牧移徙也鉉胡犬切墨縗倉回切縗䘮衣左氏晉襄公遂墨以葬文公晉於是始墨墨謂墨縗也剽之匹妙切強取也好畤音止縣名武德二年析醴泉置屬京兆府糗糧去乆切乾飯屑也恟懼許容切又許拱切擾恐也春秋曹人恟懼驍勇堅堯切健勇也汧城音牽城名在隴州汧陽縣太和元年築俘掠上音孚軍所􅀗也下音略奪取也犒口到切餉也托䟦上他各切下蒲撥切􅃨姓􅀄黄帝子昌意少子受封北土黄帝以土德王北俗謂土曰拓謂后曰跋故以托跋爲氏彧乙六切離閒居莧切閒厠之閒腫主勇切廱也三年槍七羊切矟也浦滂午切隘道烏獬切狹道也大呼火故切呌也躡昵􅂺切蹈也炭竇谷上他案切中大透切下音欲地名嶲息委切州名鳯迦居伽切搒音彭擊也澣胡玩切宣歙失渉切一州名憸人七廉切詖也憸利於上書爾無昵于憸人又思廉切鄯音善州名論頰􅀬上盧昆切下古恊切吐蕃臣名苴那時子余切東蠻王名詗伺上翾正切又火逈切知處告言下音伺奄闚也西陲是爲切邊也潘原普官切縣名在保定郡壕柵上音豪城壕也下音􅁽寨柵也現索上胡甸切露也下山責切求也謂露意而求索也鬛良涉切髪毛愕眙上五各切驚也下丑吏切直視也輜重上側持切載衣車下直用切載物車行者之車緫曰輜重犲狼犲牀皆切狼屬狗聲街遞大計切謂表奏旣逹於朝廷當於朝中宣示百僚時乃於通街傳遞至臣僚私居故謂之街遞弇衣檢切又古含切趣遣趨玉切足也斃毗􅀕切說文頓仆也憤惋烏貫切驚歎也剖析上普后切判也下先擊切分也兩選息絹切兩經銓選也齧臂五結切噬其臂也行幐徒登切囊可帶者或作縢釘鞵上音丁鐡釴也下户佳切屩也以釘置鞵下所以踐泥塗也鞚苦貢切馬勒也郜居號切神龍二年更名河南府陽城爲告成即漢郜城縣也王莾時亦名告成屬山陽郡郜又入聲仰魚向切恃也糴亭歴切買入曰糴綵纈上此宰切綾綵也下胡結切繫也謂繫繒染爲匹也党項多曩切漢西羌別種其地古析支國售丞呪切說文賣物去手也詩賈用不售唐紀四十九通鑑卷二百三十三起強圉單閼八月盡重光恊洽即丁卯至辛未凡四年有竒德宗神武聖文皇帝八正元三年交惡烏路切緼藉上於問切或作藴下慈夜切藴藉者人有雅度之稱藴者蓄也藉者積也蓄積美稱之謂也見蘇鴞演義侻他䀨切輕也俚語音里鄙俚之語􅄶直俾緬切􅄶狹而訐直也厭禱上於葉切下都皓切厭伏而禱求也勃然蒲没切卒然也閒居莧切間厠之間嗚咽烏結切聲塞也黄臺􅀲辭黄臺􅀲辭乃髙宗之子雍王賢所作其辭曰種􅀲黄臺下􅀲熟子離離一摘使􅀲好再摘使􅀲稀三摘猶爲可四摘抱蔓歸見鄴侯家傳解古買切鞫居六切窮治罪人也瑛於驚切蠭目犲聲蠭芳容切亦作蜂犲士皆切左傳楚子將以商臣爲太子訪諸令尹子上子上曰是人也蠭目而犲聲忍人也不可立愍懷眉隕切謂晉愍帝懷帝也衷甲音中藏甲於衣中也羌渾胡昆切羌謂西羌渾謂吐谷渾皆近吐蕃汧陽輕煙切縣名屬隴州華亭胡􅀲切本屬安定郡後屬隴州垂拱二年更名曰亭川元和三年省入汧源清􅃆彌兖切誅剥北角切誅求割剥也合骨咄禄咄都骨切本回鶻相頓莫賀逹干也擊殺可汗并九姓胡自立爲合骨咄禄毗伽可汗可汗河干切戎酋稱猶曰單于也大食西域國夲波斯地其地廣萬里東距突􅀐施西南屬海天竺張六切即身毒國所謂浮圗胡也突董陁骨切回紇臣名武義可汗之叔父也回紇葉護葉失涉切回紇太子葉護也肅宗時領兵四千􅀐􅂇討安慶緒後於其國得罪死其弟移地健立号牟羽可汗桀驁魚到切桀􅃛驕驁也貂裘都聊切䑕屬大而黄黒出丁零國以鼠爲裘故稱爲貂裘􅂝奚圭切持也讋質渉切失氣言也葱嶺倉紅切西河舊事云葱嶺其山髙大上悉生葱故名曰葱嶺寘支義切彈箏峽彈唐干切箏音爭峽音狹地名在涇州之右斥候昌石切許慎淮南子云斥度也候視也又望也徭餘招切徭役也屏必逞切屏去也四年惆悵上笞鳩切失意也下丑亮切望恨也弭緜婢切止也扞禦上侯旰切抵扞也下偶許切止遏也杜郵上羽求切地名漢爲渭城縣其地今在咸陽縣東北秦白起遷隂密出咸陽西門十里至杜郵賜死即此地葺七入切脩葺擠牋西切排也麤傲上倉胡切或作觕下五到切麤狠倨傲也畿甸上渠希切天子千里地以遠近言之則言畿下堂練切畿内服也書五百里甸服脆弱此芮切說文小耎易斷也郝呵各切姓也驃旁匹召切又毗詔切南蠻驃國也苴夢衝苴子余切衝昌容切勿鄧酋長也涪房尤切州名奚奚本東胡種爲匈奴所破元魏時自號庫真居鮮卑故地直京師東北四千里其地東北接契丹西突厥南白狼河北霫至隋始去庫眞但曰奚室韋契丹別種東胡之北邊蓋丁零苗裔也地據黄龍北傍峱越河共有七姓􅎤跌上奚結切下徒結切鐡勒諸部曰阿跌亦曰呵咥或爲􅎤趺詈力智切罵也趣千俞切嚮也五年參䟽􅆪切峭刻七肖切峻也其情嶮峻而慘刻也詭誕上過委切詭詐也下徒旱切誕妄也左衛率率所􅀋切衛率秦官西漢屬詹事東漢屬少府晉分爲左右衛率各頷一部唐因之胄曹直又切唐六曹參軍在府曰曹在州曰司胄曹之職掌兵械公廨興繕罰謫大朝㑹行從則受黄質卑鎧弓矢於衛府乞藏遮遮正奢切吐蕃臣蔚紆勿切州名頡于迦斯頡訖結切迦居伽切回鶻臣名六年鎬下老切阿啜姝恱切回鶻天親可汗爲葉公主所毒死可汗之弟自立國人共殺之以可汗㓜子阿啜嗣鄆王問切州名朱邪音耶朱邪出於西突厥至其後丗別自號曰沙沱而以朱邪爲姓齎子奚切持也仰食魚向切恃也頒逋還切賜也特勒梅錄龍玉切回鶻臣名即逹北特勒梅錄將軍也壟力踵切丘壟也俯僂俯低頭也僂力主切背僂也謂曲背七年僙音黄􅁃鋋􅁃音愈姓也鋋時連切實錄作康鋋新舊史作􅁃鋋扼音厄浹辰即恊切徹也自子至亥曰辰夾辰十二日也誣武夫切誣極也爲質陟利切物相贅也故兩國交質曰質子峞五􅁅切瑟琶川上頻眉切下蒲巴切地名東奚所居唐紀五十通鑑卷二百三十四起元􅘬涒灘盡閼逢閹茂五月即壬申至甲戌凡三年有竒德宗神武聖文皇帝九正元八年縋馳僞切繩有所垂而下也滂普􅀰切愎弼力切很也悛且縁切改也書惟受罔有悛心不叶音恊汜水音祀縣名屬孟州又音泛瑗于願切衰絰上倉回切亦作縗喪衣也下徒結切首戴也以苴麻爲之榻吐盍切床也另古瓦切剔人肉置其骨亦作冎郴丑林切州名殿最都奠切上功曰最下功曰殿下殿罰同銓且縁切衡也考其藝能而陞黜之謂之銓選選曹湏絹切文武各有其􅃟漢之選部是也王銓選之事即今之兵部吏部僉議七廉切咸也皆也謂衆議覈下革切說文實也考事邀遮其辭得實曰覈海舶薄陌切汎海舟也賑撫之刃切贍也賑贍而慰撫之揣楚委切奚陟音􅀆姓也和糴亭歷切市穀也買入曰糴纎嗇殺側切纎廉纎嗇儉嗇也羇遊居冝切􅀉也絺紵上丑飢切細􅁑也下文吕切說文檾屬細者爲絟粗者爲紵一鬻余六切賣也囊橐上奴當切袋也下他各切無底囊也囷倉去倫切倉圎曰囷貨泉貨賄也見下泉布注糶他吊切賣出曰糶僦即就切賃也米糙七􅍳切粗米未春絁綿始移切繒似布曰絁蛤蛤葛合切音螺李師古傳􅀄棣州有蛤鹽池歳産鹽四十萬斛李長卿以州入朱滔獨蛤爲李納所據以專利也三􅆜城汊楚稼切水歧流曰􅆜李師古傳李納築壘於德州南跨河以守蛤謂之三以城也怦披耕切澭於容切栢栢皇氏古帝号後爲氏顓帝師栢亮父帝嚳師伯超之裔也九年贏怡成切說文有餘賈利也保鄣本作堡障鄜坊上芳無切下音坊二州名鞭靴上卑連切馬撾也下許茄切䪘屬谿壑上牽奚切水注川曰谿下虚各切溝也曖昧上烏代切隱也下莫偑切暗也重辟上逐隴切下房益切法也重辟謂五刑大辟之罰也驩音歡州名昇璘離珍切又良刃切倩七正切假也頥盈之切顙也僨軍僨音􅁬張晏曰僨僵仆也僨軍謂軍不嚴整􅀂僵仆也抗衡抗口浪切衡車上横木抗衡謂兩相抗拒􅀂車衡相抗也觖望音决怨望也馳突陁骨切謂奔馳迅速也風飈卑摇切說文扶揺風也馹書人質切說文驛傳也捃居運切說文拾也疆􅂣上居良切界也下羊益切畔也寧謐彌畢切安静爲寕謐勔虧兖切黔巨金切州名耗䞉耗呼到切虧減也䞉寔證切増益也郾城於幰切縣名屬許州踣蒲北切倒也徼求於消切與邀同邀遮而有所求也頗僻上滂和切下滂辟切書民用側頗僻敬邪也滋蔓音萬左傳無使滋蔓蔓難圖也謂滋長而連蔓倉卒且没切亦作猝􅂢余專切棄也輯睦音集和也跋扈跋蒲末切扈音户跋扈跳梁也一說扈離也水居者於水未至爲扈水去則大魚跋扈而出小魚獨留諶時任切十年羊苴咩城苴音酢咩音養南詔地名雲南王異牟㝷所築延袤十五里去雲南城二百里舊傳作陽苴咩城也䍧柯服上則郎切下古俄切漢爲䍧柯郡唐爲䍧州屬江南道覊縻則䍧柯係船杙也楚滅夜郎軍至且蘭㭬船於岸因以名其處䍧柯服謂䍧柯人所服也歔欷上休居切下休旣切歎息也壠坻音底在隴西郡應劭曰隴西有壠坻在其西也顔師古曰壠坻謂壠阪即今之壠山也擊柝他各切漢書曰宫中衛城門擊刀斗傳五更衛士周廬擊柝也量移量平聲移徙也謂得罪逺責者遇赦則量徙近地甄恕居延切察也一曰免也擯弃必刃切擯斥也惬詰恊切快也不核奚革切意猶覈實羯胡居列切虜別號窳怠音愈裴駰曰病也說文曰􅈸也篋詰恊切箱篋也繒纊苦謗切繒帛也纊絮也泉布天官外府掌􅀖布之入出以供百物而待􅀖之用注其藏曰泉其行曰布闢田毗亦切開也課績則歷切課治課也績勞績也故古有考課考績之法姦莫耕切民也亦作氓澆訛上古堯切薄也下五禾切謬也殿罰丁練切下功曰殿公􅁃以王切官倉也資治通鑑釋文卷第二十四
