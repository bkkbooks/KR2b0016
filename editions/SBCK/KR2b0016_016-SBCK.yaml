body:
  text: 右宣義􅀰監成都府糧料院史炤梁紀一通鑑卷一百四十五起元黓敦䍧盡閼逢涒灘即壬午至甲申凡三年髙祖武皇帝天監元年大司馬􅄛姓蕭氏名衍字叔逹仕齊爲大司馬尋封梁王二月受齊禪國號梁改元天監繕時戰切治也修也昺兵永切昉甫兩切西邸丁禮切蒼頡篇曰邸舎也朏敷尾切䜟記楚譛切䜟驗之書咄咄當没切呵也晉商浩云咄咄怪事百揆求癸切度也揆度百事九􅃬九錫一曰車馬二曰衣服三曰樂器四曰朱户五曰納陛六曰虎賁七曰斧􅃏八曰弓矢九曰柜鬯寳晊之日切緬彌兖切余妃以諸切姓曰風俗通云秦由余之後鄱陽蒲何切亦作番郡名系梁襦人朱切短衣也躡屩居略切屨也賃女禁切以財雇物憔悴上慈焦切下秦醉切憂愁也斬衰七回切斷布而不緝謂之斬衰齊衰津私切本作齋謂裳下緝慰喭音唁弔生也憺徒甘切又于廉切徒濫切璽紱上想氏切印也下音弗印之組郗氏抽遲切姓也瑩烏定切頷之户感切醇酒常倫切不澆酒也慴殺盧合切摧也又質渉切子恪克各切從容七㳟切從容猶休燕也鴆之直禁切毒鳥以羽毛歷飲食即殺人更生工衡切更生猶再生也謗木􅀘矌切譏惡事者書之於木肺石方廢切肺石赤石也周禮秋官左嘉石平罷人右肺石逹窮人一函胡䜛切匱也横議胡孟切不順理也浣濯胡管切濯衣垢也或作澣膳時戰切具食也亦作饍到漑到都導切姓也漑古代切􅎦祖紅切嬖臣博計切賤而得倖也荻炬上亭歷切下臼許切束葦燒洮陽土髙切零陵邑禇緭禇丑吕切姓也出商後宋㳟公子石食采於禇其後因以爲氏焉緭于貴切饑饉渠遴切無􅂖曰饑無􅂼曰饉熒惑上户垌切下胡國切春秋緯文耀鉤云赤帝熛怒之神爲熒惑焉位在南方禮失則罰出晉灼云常以十月入太微受制而岀行列􅀫司無道出入無常驍勇堅堯切徤也府藏才浪切府庫也物之所蓄㰱血色洽切歠也盱眙上况于切下与之切臨淮邑小峴胡典切山名在壽州六安縣有五峴山是以分大小峴桐城亦有五峴非此見樂史太平寰宇記以撲普木切擊也趣逡須切嚮也閒道居莧切微道也道琛丑林切涪音浮即梓潼涪城鎛鍾伯各切十二辰頭鈴鍾也虡音巨爾雅曰木謂之虡所以掛鍾磬三老按孝經援神契曰尊事三老人象也宋均注曰老人知天地之事者鄭康成云三老謂老人更知三德者敦煌音屯皇郡名應劭曰敦大煌盛也系後魏􅅝牛刀切蔣橋子兩切在蜀郡去城都二十里郫音皮蜀郡之邑二年藉田秦昔切亦作耤藉借也漢文帝藉千畒古者使民如借故謂之耤肉袒徒旱切􅃝裼而露肉也稽顙上康禮切下蘇黨切額至地也麤衣倉胡切亦作言謔迄却切戯也漅湖子小切又鋤交切廬江居巢縣有二大湖漅湖在其東南餞才線切柵測革切編立木爲之城隍胡光切城池也有水曰池無水曰隍殿最上下見切後也謂課居後也下祖外切凡要之首也謂課居先狼籍唐蘇鶚演義云狼籍者物雜亂之皃狼所卧藉之草皆穢亂鞠獄居六切窮理罪人也猥烏賄切猶濫也翂府文切檛陟􅀲切棰也拷訊上苦老切掠也下音信問也童騃午駭切癡也瞑莫定切閉目杻械上敕九切下胡介切桎梏也貴嬪毗賔切婦也周禮有九嬪陵轢􅀰擊切如車之所踐也甄琛甄側鄰切姓也琛其名田林切摴蒱抽居切􅀓塞名呼盧也因舋許愼切􅂩也罪也三年惔于廉切又徒甘切徒濫切登陴頻彌切城上女垣䀯奔謨切日加申時冠軍古玩切官名冠軍言在諸車之上無厭於鹽切不足也春秋左傳曰貪惏無厭嬖昵尼質切近也亦作暱爕蘇叶切掌櫛側瑟切梳北之緫名髙麗音黎扶餘國之別種其國在遼東之東詰朝去吉切平旦創􅀄莊切通作瘡膿潰上奴冬切腫血也下胡對切散也雞雛崇芻切雞子也闇與暗同妖弭上於喬切下母愧切妖怪也弭止也邢蠻邢乎經切姓也帳扆上知亮切曰幬謂之帳下於希切爾雅牖户間謂之扆又隱豈切貢篚府尾切竹圎器盛於篚而莫焉綜仙琕蒲蠲切擐甲胡慣切貫也執槊所角切矛屬通俗文曰矛丈八者謂之槊捫足音門以手撫持也吐谷渾谷余蜀切渾户昆切本遼東鮮卑徒河渉歸之庶長名曰吐谷渾其後遂以爲號柔然柔然即北狄蠕蠕國也姓郁乆閭氏梁紀二通鑑卷一百四十六起旃蒙作噩盡強圉大淵獻即乙酉至丁亥凡三年髙祖武皇帝二天監四年淪歇許竭切休息也瑒音暢餼􅅒上許旣切饋生肉也下力寢切給芻米也􅀒笈及入切又極曄切􅀒書箱也忱之時壬切宕昌徒浪切西羗別種其地東接中華西通西域凱可亥切畟察色切又子力切撲討普木切擊也器械内盛曰器外盛曰械恚於避切怒恨也闢毗益切開也楯食尹切所以扞身蔽目者畎古泫切菌巨隕切草名􅀃文地蕈莊子曰蒸成菌柔脆此芮切小耎易斷也本作太戊莫候切即商髙宗裠屐裠音羣下裳也屐竭㦸切屩也迢遰上田􅂓切下徒計切謂去相逺也統綰烏板切繫也夷獠西南夷謂之獠音盧皓切鬱怏於兩切情不足皃廣袤莫侯切東西曰廣南北曰袤墊江徒恊切巴郡之邑祉丑里切穰汝陽切豐穰五年屠各屠音儲即休屠地也後號爲屠各涇堅靈切宣城邑工賈音古百工商賈也桑門桑門即沙門也􅀽宏曰沙門漢言息也蓋息意去欲而歸于無爲昞兵永切亦作昺怡與之切曄筠輙切膠水古肴切即漢長廣縣地晉省之至隋改曰膠水系後魏猖蹷上尺良切下居月切猖狂㒹蹷也戕在良切戕猶殘也醯醢上馨奚切酢味也下許亥切肉醬也芻狗側隅切束芻爲狗􅀕祀所用適則用之過則棄之宛州於元切梁置此州右率衞所􅀋切與帥同圍柵測革切編立木爲之挫之則卧切摧也堰於建切障水也舟艦户黤切戰船四方施板以禦矢狀如牢繖扇蘇旱切繖蓋也麾幢宅江切旛幢也中弩上竹仲切輜重輜載衣車也重載物車也行者之資緫曰輜重音直用切殿後丁練切軍後曰殿邃雖遂切朐山城音劬應劭曰臨朐山有伯氏駢邑在東莞臨朐系後魏楹棟上以成切柱也下多貢切爾雅曰棟謂之桴山蹊胡雞切徑也抄掠上楚教切下離灼切劫人財物餌之仍吏切食也銜枚上乎監切下謨柸切止言語讙囂欲令敵人不知其來也周官有銜枚氏狀如箸横銜之繣結於項詮此縁切睢口宣佳切睢水之口在元魏梁郡懦怯上乃卧切又乃亂切弱也下乞業切畏也盡磔張格切張也開也巾幗古獲切婦人喪冠又古對切一􅀃婦人以巾上覆髪如帕􅀋吕姥莫􅀘切􅀃文母也騃午駭切癡也下邳符悲切漢置臨淮郡永平巾更爲國􅁑嶧山在其西安堵音覩謂安如墻堵也乘閒居莧切間􅂩縋食馳僞切以繩掛食而下也饋之求位切餉也通作餽舋許愼切􅂩鏬也昶丑兩切可汗音寒戎酋稱紇奚勿六跋紇下没切跋蒲撥切紇奚虜複姓勿六跋其名蠕蠕國人蠕蠕乳兖切蟲動皃即柔然國魏大武以其無知狀􅀋於虫故改其號爲蠕蠕又而尹切社崘盧昆切蠕蠕逺祖號豆代可汗昱余六切卭笮音昨卭都定笮越嶲郡二邑六年迮側革切迫也撞宅江切擣也掘其月切搰也爲陳直覲切與陣同黯乙減切文釗止遥切殪一計切􅀃文死也烟塵烟與煙同􅅮戰伯各切索持戰也濊水烏外切又於廢切呼括切擲直炙切投也齋舫甫妄切又音謗並兩船曰舫斜谷上以遮切下余蜀切在武功南入谷百里而至該綜子宋切該􅀶而錯綜也暠古老切妬都故切嫉妬梁紀三通鑑卷一百四十七起著雍困敦盡閼逢敦牂即戊子至甲午凡七年髙祖武皇帝三天監七年犇古奔字療力照切治也鴻臚凌如切漢武帝置此名胡廣曰鴻聲也臚傳也所以傳聲賛道九賔燔扶元切燒也抗衡苦浪切拒也猶爭衡也愉羊朱切捶之止蘂切擊也懌羊益切􅎰音叶脅虚業切迫也訣古穴切訣别齎祖稽切持也褥儒欲切藉也鎻蘇果切鋃鐺也姙女鴆切孕也刳空胡切刳剔也顥胡老切截昨結切斷也本作􅎒邊徼吉弔切塞外此屬殊王切􅀋也衣毛於旣切殱子廉切滅也郢以井切州名系後魏嬰城於盈切繞城以自守仙琕蒲眠切籖求千廉切郵籖汝水忍與切出上洛盧氏還歸山東入淮景雋子峻切趣逡須切嚮也間之居莧切諜也酈道元酈音歷姓道元其名也貂裘丁聊切􅀃文鼠屬大而黃黒其毛可以爲裘衣髙車古赤狄餘種􅀄號狄歷北方以其言語與匈奴同或曰其先匈奴甥也嚈噠上益渉切下音怛西域胡國大月氏之種􅀋亦曰髙車之別種其王都抜底延城蓋王舎城也蒲􅀋海名一曰婆悉海在敦煌北怖普故切惶懼也八年㑹稽上古外切下堅奚切郡名禹㑹諸侯計功因曰㑹稽㑹稽者㑹計也封禪時戰切積土増山曰封爲墠􅀕地曰禪岱宗待戴切泰山也爲四岳所宗故曰岱宗廵狩舒救切孟子天子適諸侯曰廵狩廵狩者廵所守也柴燎力照切柴􅀕天也梁甫山名因以爲縣在泰山郡燧人徐醉切伏羲之先有燧人氏鑚燧岀火教人熟食結繩食陵切繩索也易上古結繩而治䥴子泉切斵也陽羡千線切㑹稽邑推演以淺切推廣也并力卑正切兼也並也塹七豊切坑也鮦陽除柳切在鮦水之陽汝隂邑潺溝士山切蠻獠所居之地與雍州相近詰去吉切問也僧暹息廉切鄴魚怯切魏郡之邑系後魏泄先列切漏也九年瑩縈定切又維瓊切唯唯以水切諾也詡況羽切臨涇古靈切安定邑系後魏掖庭羊益切按韋昭云以爲在掖門内故謂之掖庭娠春秋左傳曰邑姜方娠杜預注曰懷胎爲娠音之刃切一音身講肄羊至切習也朝請才性切選思兖切擇也怇擾音巨恐擾也撙祖本切臨陳直覲切與陣同黟歙上於火切下失渉切新安二邑瀹以灼切暅况晚切又古鄧切下同擊拊斐父切拍也書傳云拊亦擊也十年捊力括切手桴也摩也汾州扶天切汾水岀太原晉陽山西南入河後魏置汾州東莞音官晉太康中置郡晣之列切昶丑兩切朐山其居切東海邑郯城徒含切東海邑古郯子國糧樵慈焦切糧食也樵薪也僵音薑僨也節傳張戀切符也馳馹入質切驛傳蕞爾祖外切小皃厮養相支切析薪養馬者伺知相吏切伺候也壁壘魯水切軍壁雜沓徒合切重也秣陵音抹丹陽邑十一年怏怏於兩切意不滿也嗤之充之切笑也聞望文運切聲所至也幾盡巨依切近也减膳减損也膳具食也古者減膳撤樂所以自損音時戰切鞠理居六切窮理罪人也黃㼐蒲眠切博雅曰㼐􅀲屬佟之徒冬切僅渠遴切􅀃文材能也十二年絢許縣切譴責誥戰切謫問也瓦解音蟹散也筏音伐船筏送任子任汝鴆切猶質子也舸賈我切太船也方言南楚江湖謂之舸十三年拓闥各切開拓漂輕匹妙切浮也亦輕也巉石鋤銜切又仕檻切合脊資昔切讀如背脊之脊也調徒弔切賦調贓兹郎切受賄曰贓梁紀四通鑑卷一百四十八起旃蒙恊洽盡著雍閹茂即乙未至戊戌凡四年髙祖武皇帝四天監十四年上冠太子冠古玩切白虎通曰男子㓜娶必冠女子㓜嫁必笄跪苦委切拜也又巨委切䠆跪稽首音啓首至地也貴嬪毗賔切妃嬪周禮有九嬪廡罔甫切堂下周屋愕然逆各切驚愕攘衰七囬切喪衣肇治小切酣飲胡甘切應劭曰治也張晏曰中酒曰酎百揆求癸切度也揆度百事矯舉夭切不正爲矯刀鐶户關切刀之柄鐶撞宅江切擊也掖羊益切佫也在肘後本作腋􅈆澗直連切水名在河南書曰澗水東􅈆水西搤乙革切持也捉也握也厠門􅀄吏切􅀃文圊也閒道居莧切微路也皆道也狂悖蒲昧切又蒲没切逆也亂也撲討普木切擊也㓕也級居立切階級疫音役民皆疾也沮水子余切出新城房陵東入江暹思廉切十住菩薩􅆊音菩蓬逋切薩蘇逹切釋氏有十住十地十行大乘神陵切釋氏有三乗法門曰大乗曰中乗曰小乗大乗者􅆊語云摩訶衍言其運載無邊得無上菩提伯驎離珍切魔眉波切邪􅀑雍於用切州名系後魏􅄮翹移切因􅄮山以名州屬後魏華胡化切因華山以名州屬後魏專横胡孟切恣也中竹中切當也瀛怡成切州名後魏孝文帝所置闥他逹切宮中小門二曰門屏劾胡得切法有罪也葭萌上音加下亡行切後魏爲郡治鄱陽蒲何切或作番鄱水所岀吴孫權置郡闔城轄臘切閉也兇懼許容切又許供切擾恐也春秋左傳曹人兇懼管籥弋灼切搏鍵器也和熹虚其切東漢和帝鄧后之謚也十五年泝淮蘇故切逆淮水而上也輞文紡切車輞輻方六切輪轑揉竹忍九切屈竹也絙居曽切大索也鹿盧上音禄下龍都切字或從車井上汲水木大辟音闢五刑有大辟從尸辛所以制節其罪也從口用法也邂逅上胡懈切下音后邂逅不期而遇也撾築撾捶也築擣也陟􅀲湬即由切水名罔壟上古郎切下力踵切山岡丘瓏澈直列切水澄絞古巧切絞擾􅌔古限切強蚪強其兩切姓也蚪渠幽切謔虚約切戲也闚缺䂓切視也或作闚戍邏郎佐切廵也芸于分切除田間穢也販貿上方願切下莫候切販􅀒貿易也伺間上相吏切下居莧切伺候也間􅂩也疆埸上居良切界也下羊益切畔也刹􅀄八切寺刹鈴鐸上郎丁切似鐘而小下逹各切大鈴也南箕居之切星名詩曰惟南有箕瑒直梗切又音暢比屋毗至切又簿必切屋相比次也十六年縑音兼帛也縷隴主切􅀃文綫也杼軸上文吕切機之持緯者下仲六切機具也或作柚貫繈居兩切孟康曰繈錢貫也俗作鏹檢覈下革切覈實給劵去願切劵約􅀃文契也殿最上丁練切下祖外切下功曰殿上功曰最脯脩上匪父切乾肉也下思留切脯也木訥奴骨切言難也論語剛毅木訥近仁十七年氐酋上丁奚切下自秋切氐戎之酋長憺徒敢切又徒濫切南轅雨元切􅀃文輈也黃􅃏王伐切大斧也以黃金爲飾襚徐醉切贈襚或作􅩽壙苦謗切塹穴也詰難上去吉切下乃旦切埒力輟切亞也重稱上直用切下昌孕切啻施智切􅀃文語時不啻也苑囿苑有垣曰囿音於阮切殖實職切猶種也昧爽音妹未明也紆邕俱切詘也勞也撤直列切去也驃􅀐航胡郎切鎧仗可亥切鎧甲器仗也貯丁呂切積也紵直吕切檾之粗者榛莽側詵切木叢生曰榛揣􅀄委切度也北邙謨郎切山名在河南洛陽緇素側持切黒色繒釋家壞色衣也糟糠上作曹切下苦岡切糟粕糠粃也梁紀五通鑑卷一百四十九起屠維大淵獻盡昭陽單閼即巳亥至癸卯凡五年髙祖武皇帝五天監十八年仲瑀王矩切銓削此縁切銓衡而削去也虎賁音奔勇士稱也􅀂虎賁獸言其猛也詬罵呼漏切怒罵也棰辱止蘂切􅀃文以杖擊也敺擊烏后切捶擊也韶市昭切郷塾神六切禮記古之教者家有塾黨庠鄭氏注云門側之堂謂之塾沙汰他蓋切擇也琡昌六切又音祝鮮卑相然切鮮卑山名東胡別種因寓此山故號鮮卑􅁺俞絹切官屬任俠上汝鴆切下胡頰切任謂任使其氣力俠謂以權力挾輔人絹藏才浪切庫藏顛仆芳遇切僵仆􅀃文頓也又蒲北切僮僕徒東切奴也妓渠綺切女樂馬腦椀烏管切馬腦玉石也以爲椀器赤玉巵章移切飲酒禮器也以赤玉爲之惋歎烏貫切驚歎窺覦容宋切窺覘而覬覦也辟雍上必益切下於容切學名天子曰辟雍鄭康成云辟明也雍和也所以和明天下徹直列切去也又敕列切詰去吉切問也彪􅀘休切蕤賔人誰切蕤賔者應鍾之所生周語曰蕤賔所以安静神人獻酬交酢筝甾莖切􅀃文鼓弦竹身樂也一􅀃秦人薄義父子争瑟而分之因以爲名憤恚上房吻切懣也下於避切怒也骨鯁古杏切骨鯁喻正直也􅀃文鯁魚骨也食骨留咽中爲鯁昱余六切縛符攫切繫也束也髙句麗音鉤黎夫餘別種在遼東之東髙其姓也普通元年份悲巾切异羊吏切弁皮變切無行下孟切言迹也永巷宮中之長巷列女傳周宣姜后脫簮待罪永巷衣袂彌蔽切䄂也噬時制切囓噬􅙃面陵之切剥也劃也鼔譟先到切羣呼也刁整刁都聊切姓也荻筏上亭歷切蘆屬下房越切箄也募莫故切廣求也左道禮記曰執左道以亂衆殺無赦鄭元注云左道􅀂巫蠱也桑落酒丗謂桑落河多美酒按水經蒲城有劉白墮士釀酒挹河流醖成芳酎名桑落水自王公庶人毎飲則云桑郎桑郎反語爲桑落蓋訛轉耳軺車餘招切輕車一馬車也燕然因肩切山名在匈奴速邪烏地中扶桑扶桑海中島名山海經云大荒之中有扶桑維敦崦嵫上衣檢切下子之切崦嵫山名日所入處崦或作􅙜餞才線切送去也二年勍敵渠京切疆也春秋傳勍敵之人旱暵呼旦切地豆干夷狄國名在室韋國西千餘里邴蚪邴兵永切姓也蚪渠幽切麤聦徂切踈也力士儛罔甫切婆娑也用足相背瞋目稱人切張目頷首五感切低首也紿音殆欺也誑也慷􅁣上苦莽切下口漑切慷􅁣竭誠也剥北角切刻割也琬琰上委逺切下以冉切璧名邃雖遂切白抹乃􅂚切城名􅋲口旱切忖度上取本切下徒落切嚈噠上益渉切下音怛西域國名大月氏之别種亦曰髙車之別種其原出於塞北自金山而南在于闐之西都烏許水伊匐蒲北切髙車王彌俄突之弟也抄掠上初教切下離灼切劫人財物也拯讀曰拯救之拯舊􅀃無切語音蒸之上聲伏曼容云濟也磧北七迹切沙土曰幕即今磧也在後魏北地翻孚􅀽切跋扈上蒲撥切下侯古切猶強梁也臆度上乙力切下徒各切以貿臆度量也三年乾羅夷狄國名其國多釋氏經教幨徒敢切又徒濫切四年賑之刃切又章刃切贍也􅅃塞苦管切叩也至也衰絰上千回切喪服下徒結切首戴也以苴麻爲之輼車烏昆切卧車也剽掠匹妙切刧略也覘候丑艶切窺視而伺候也鐡勒歷德切匈奴之苗裔種􅀋最多雖姓氏各別緫謂之鐡勒騧姑華切黄馬黒喙突陳上陁没切觸也下直覲切與陣同肺腑上方廢切下芳遇切心胷也一作肺附如肝肺之相附著也欄楯食尹切欄檻驕愎弼力切很也破六韓拔陵破六韓虜三字姓拔陵其名音蒲撥切佛龕口含切塔也又云塔下室遊眺他弔切視也臨哭力禁切衆哭曰臨怡怡與之切和也恱也梁紀六通鑑卷一百五十起閼逢執徐盡旃􅀩大荒落即甲辰至乙巳凡二年髙祖武皇帝六普通五年彧於六切赫連恩赫連虜􅃨姓其先劉去卑之勃勃稱王朔方謂王者繼天爲子是爲徽赫與天相連因姓赫連氏敕勒畜力切敕勒其先匈奴也一曰鐡勒其語訛轉耳我悖蒲昧切又蒲没切亂也暹思廉切􅃎彼貧切本亦作邠古􅃎國莫折大提莫折􅀜西複姓大提其名沖直弓切沙漠莫各切沙上曰漠逡廵七倫切逡廵行不進也器械胡介切器之緫名有盛曰器無盛曰械行陳上胡剛切下直覲切行伍軍陣幢師宅江切猶連率也蠕蠕亦立軍法千人爲軍軍置將百人爲幢幢置帥離沮將預切喪也飈卑遥切扶摇風也汧苦堅切扶風邑吴山在西古文以爲汧山偏禆頻彌切副助也酈道元酈音歷姓也道元其名秀容秀容本漢汾陽縣地後省之至元魏置肆州秀容縣髀部禮切股也駝徒何切駱駝驍勇堅堯切健勇睢陵音雖下邳國邑屬後魏詮此縁切渦陽古禾切又烏禾切水涸爲渦􅀃文水入淮者在譙郡後魏置渦陽縣顥下老切甓城蒲歷切後魏之地慰勞郎到切安慰而勞勉也努力奴古切方言勉也咽喉上烏前切下户鉤切字或從肉賀拔度賀拔虜􅃨姓與後魏同出隂山代爲酋長北人謂地爲拔以其緫有其地人相賀因以爲氏宇文肱宇文虜􅃨姓出遼東南單于之後有並廻因獵得王璽以爲天授鮮卑以謂天爲宇因號宇文瑩烏定切涇堅丁切州名後魏太武置蓋以涇水爲名東莞音官郡名魯鄆邑屬後魏郢以非切州名屬後魏汾符分切州名後魏置西河郡兼置此州异羊吏切六年馬圈驅圎切又巨卷切後魏城名馬嵬五回切坡名趣之趣讀曰促脅之虚業切以威力相恐也蹙子六切迫也後殿丁練切軍後曰殿綜子宋切城父音甫譙郡之邑孝芬敷文切四甄之人切又居延切挑戰徒了切擿嬈敵以求戰也希聃他含切曇尚徒含切龍亢古郎切譙郡之邑忿恚上敷問切下於避切怒恨也鮓側下切懌羊益切鼎沸芳味切如鼎中之涫沸也梟首堅堯切斷首掛木上洿宫汪胡切洿池其宫宅也斬骸雄皆切脛骨也弁皮變切忤五故切逆也嘿然密北切静也通作黙從容七㳟切猶休燕也鐡劵去願切以鐡爲劵約也憮然文甫切失意皃紇下没切枹罕古罕羌侯邑枹讀曰膚其字從木屬後魏造次七到切急遽也輻湊上方六切車輪轑也下千候切本作輳輻共轂也謂衆輻之所輳萬俟醜奴万俟音墨祺虜複姓醜奴其名大盾食尹切本作輴車轉者輜重上側持切下直用切輜載衣車也重載物車也行者之資緫曰輜重乘間居莧切間􅂩也繕時戰切治也柵測革切編木爲之中流矢中竹仲切飛矢曰流矢敺殺一口切捶擊而殺之也恟懼許容切又許拱切擾恐也淑媛上神六切善也下于眷切羙女之稱泄先列切漏也瀝骨郎擊切滴也滲所禁切下漉也跣先典切足親地胝竹尼切胼胝悆羊庶切又商居切趣逡須切嚮也屬籍上殊玉切附也閫也下秦昔切簿書也謂所附宗籍釗音昭唐突陁没切唐突觸也字或從手撓亂火髙切攪也其字從手一􅀃撓曲也女教切其字從木閫外苦本切門中橛也馮唐曰闑以内寡人制之闑以外將軍制之闑音牛列切亦閫也暅况晚切又古鄧切乜列河乜母野切蕃姓餌之仍吏切食也賖詩車切􅀃文貰買也淅陽先的切本漢南郷縣晉改爲順陽後魏復爲南郷郡又分置浙川縣後周省之隋開皇􅀄郡廢大業􅀄置淅陽郡䱇上演切魚名皮可爲鼓一曰蛇䱇黃質黒文匍匐上蓬逋切手行也下鼻墨切伏地也字或作扶伏禠敕􅁓切又直是切解也捶止蘂切擊之轜車人之切䘮車也或作輀嫗威遇切母也蠡升音禮嗅地許救切以鼻就臭也梁紀七通鑑卷一百五十一起柔兆敦牂盡強圉恊洽即丙午至丁未凡二年髙祖武皇帝七普通七年松岍苦堅切地名潰胡對切散也亂也琚音居鮮于脩禮相然切複姓風俗通曰武王封箕子于朝鮮其子食采於于因氏焉桑乾音干漢屬代郡晉省之後魏置桑乾郡宰嚭匹鄙切左傳定四年吴王闔閭以大夫伯嚭爲太宰斁羊益切敗也鈔掠上楚教切下離灼切劫人財物也薊城音計燕國之邑屬後魏鄴逆怯切魏郡之邑屬後魏曏火亮切曏謂往者也沱徒何切一作池音同水名山海經云太戲之上滹也之水出焉按漢書光武至呼沱河章懷注云在饒陽縣北縣屬􅀓陵國南北時屬後魏栗法光栗力質切姓也栗陸氏古帝號因爲氏法光其名飱千安切小飯曰飱更相工衡切互也􅀟熾昌志切壘魯水切軍壁相埒力輟切猶並也級居立切首級趣逡須切嚮也尉慶賔尉紆切切姓也慶賔其名鄱陽蒲何切或作番郡名恢苦回切躡之尼輙切蹈也履也忠􅅃苦緩切誠也愛也謚音示呼譟先到切羣呼也間行居莧切從間道而行也刼之居怯切􅀃文人欲去以力脅止曰劫誣武夫切誣誷窘渠殞切急迫也盡并卑政切兼也並也數合􅁑合切兩龠爲合亶多旱切穰城人羊切義陽邑耗竭大到切減也損也租調徒弔切租賦邸丁禮切蒼頡篇曰邸舎也憾胡感切恨也雋才智過千人曰雋子峻切大通元年皇甫度皇甫複姓宋戴公之子充石字皇父子孫以字爲氏漢興改父爲甫度徒故切楷苦駭切叱干麒麟叱昌栗切叱干虜複姓麒麟其名塹中七艶切坑塹斃毗􅀕切死也唾掌湯卧切口液也銜柸脯放切飲器腕烏貫切手腕憂怖普故切惶懼也帑藏上它莽切又音奴下才浪切金帛之所也殫盡多寒切殛盡也黜陟丑律切退黜其幽者升進其明者不悛且縁切改也止也朝菌求敏切蕈也莊子朝菌不知晦朔郭象注芝生於朝而死於暮故曰朝菌湛僧智湛文減切姓也僧智其名具丘􅀶蓋切清河邑糸後魏榻託盍切牀也潼􅀜音童本名衝􅀜河自龍門南流衝激華山故以爲名在洪農華隂左傳所謂桃林塞也南北糸後魏烟伊真切又因蓮切悵然丑亮切望恨斌之悲巾切昱余六切背腫之隴切􅀃文癰也􅓅岀羊諸切又羊茹切亦作輿舁車也比曉必寐切神􅁤居洧切劭實照切勰音叶拓跋上他各切下蒲撥切虜複姓闔門胡臘切閉也烏合如烏鳥之乍合故曰烏合幟昌志切又式志切旌旗之屬安堵音覩安如墻堵免胄直祐切兠鍪也叡以芮切挫祖卧切摧也麋費上美爲切下芳未切縮所六切退也短也銜枚音媒所以止讙􅅝周官有銜枚氏枚狀如箸横銜之俘馘上芳無切軍所􅀗也下古􅀗切軍戰斷耳也謂折馘執浮春秋傳云以爲俘馘鼔譟先到切羣呼也尸咽一結切塞也不貲即移切少也嬖人博切􅀃文便嬖愛也劾胡得切法有罪也謡言餘招切爾雅徒歌謂之謡鸞落官切孫氏瑞應圗曰鸞者赤神之精鳯皇之佐也徒玩切􅀃文􅆑不孚也殯必刃切殯殮勦子小切絶也沮林汝切止壞也理不俯九切與否同荆􅁄紀力切木之叢生也猶曰榛莽尓馬柢柵測革切離落也編木爲之蒲坂甫逺切或作反河東邑應劭曰秦始皇東廵見長坂故加反云有歷山舜所耕也有雷首山夷齊居其陽所謂首陽山漳水諸良切在陽平東北山海經曰漳水出荆山南注于沮水駱超駱盧各切姓也梁紀八通鑑卷一百五十二著雍涒灘即戊申一年髙祖武皇帝八大通二年間迭居莧切代也厠也内讀曰納吐豆柔然頭兵之從祖也隘口烏懈切狹隘裔餘制切馮翊與職切郡名决録注曰馮馮也翊明也扼於革切持也握也或作搤自解佳買切散也宗王珍孫宗正複姓本漢楚元王交之孫劉德爲宗正支孫因以氏焉珍音陟隣切行陳上胡剛切下直刃切行伍軍陳也河漘食倫切水厓也詩曰寘諸河之漘􅀆石錐朱惟切在洪農之北舉烽敷容切􅀃文遂候表也邊有警則舉火顔師古􅀃夜曰燧晝曰烽京畿渠希切天子千里地以逺近言之則言畿也府藏才浪切蓄物之所也鞏古勇切河南邑周孝王封周威公孫惠公於鞏號東周即此入南北屬後魏縱㢮賞是切懈怠也日蹙子六切促也詩曰日蹙國百里壅蔽於隴切塞也障也谷士恢谷古禄切姓也爾朱榮爾朱複姓其先契胡部落大人代爲酋帥居爾朱川因以爲氏憔悴上慈消切下秦醉切憂愁皃廏居右切馬舎悍馬侯旰切猛桿羈絆上居冝切馬絡頭也下􅀶漫切馬縶也蹄齧上田黎切蹋也下五結切噬也嬖孽魚列切庶孽猶木之有孽生也賀六渾胡昆切梟戮梟首誅戮也音堅堯切蠕蠕而兖切蟲動皃即柔然國也井陘音刑常山邑井陘山在其南屬後魏􅇭口扶雨切水名在魏郡鄴縣屬後魏肘腋上陟栁切臂節也下羊益切胳也在肘後通作掖脅迄鄴切迫脅酖直禁切毒酒臨洮吐髙切隴西邑屬後魏釗音昭儲陳如切儲副窺窬羊朱切􅀼視也滄州七岡切後魏所置蓋取滄海爲名奚毅奚胡鷄切姓也夏車正奚仲之後毅魚旣切矯詔舉夭切不正爲矯驊騮上户花切下力求切駿馬名周穆王馬亦名驊騮璽綬上斯氏切下是酉切印組也太行胡郎切山名在河内山陽西北慕容紹宗慕容虜複姓其先髙辛氏少子居北夷號東胡至渉歸爲鮮卑單于自云慕二儀之德繼三光之容因以爲姓子孫氏焉紹宗其名芟翦上所銜切下即淺切芟刈也翦截也躁則到切動也疾也羅刹􅀄八切幕下莫各切帷在上曰幕瓦解胡解切散也袂彌蔽切袖也恍惚上虎晃切下呼骨切失意皃汎禮汎符咸切姓也皇甫謐云本姓凡氏遭秦亂避地於汎水因改焉襁負居兩切􅀒兒衣諶是壬切常伯常伯常所長事者書曰王左右常伯常任震悚息拱切恐懼也成行戸岡切列也濮陽博木切古昆吾國漢屬東郡晉分置濮陽國甄宻甄側隣切姓也琛丑林切瑩烏定切朝見朝者覲君之緫稱見謂自下而見上也朝馳遥切見胡甸切酒酣胡甘切張晏曰中酒曰酣蹋地徒盍切以足拍地槊所角切矛屬或作矟瞋嫌上昌真切怒也下户兼切不平於心也沙彌釋氏僧名猶曰沙門耳餞賤淺切送行飲酒沈重音祖見切一音賤字林子扇切送去食也邙隂莫郎切又武方切地名酈惲酈音歷姓也惲於粉切擐甲胄音患貫也甲鎧也胄兠鍪也􅅮戰伯各切索待也輕俠胡頰切任俠沁水千浸切河内邑邢杲邢奚經切姓也杲古老切波斯西域國名都􅀫利城在忸宻西古條支國也其王姓波氏名斯弁皮變切畨郡蒲何切次下同􅇭口扶雨切水名在鄴山海經云神囷之山􅇭水出焉縳符攫切繫也束也箕張居之切猶春秋魚麗之陣也鼓譟先到切羣呼也棒部項切􅀃文梲也謂木杖檻車户黤切通作檻轞車者車而爲檻形謂以板四周之無所通見閶闔上齒良切下胡臘切天門也銍城竹乙切譙郡之邑屬後魏渣口測加切水名出義陽一作溠梁紀九通鑑卷一百五十三起屠維作噩即己酉凡一年髙祖武皇帝九中大通元年南頓都囷切汝南邑古頓子國應劭曰頓迫於陳其後南徙改號南頓舂陵書容切按後漢書章懷注云舂陵郷名本屬零陵冷道縣元帝時徙南陽仍號舂陵劭寔照切琡昌六切燔燎燔燎所以告人也天髙不可逹故燔柴以􅀕之庶髙煙上通也爾雅曰􅀕天曰燔柴燔音煩燎力皎切睢陽音雖梁國之邑春秋時宋郡屬後魏滎陽户扄切滎水之陽郡名屬後魏崿岅上五各切下扶板切地名秣馬莫葛切食馬􅂖也屠膾古外切􅀃文細切肉也蟻附語豈切蟲名蚍蜉也或作螘附者謂其能屯聚也遺鏃作木切矢鋒也刳苦胡切剖破也纂祖管切掎角居蟻切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之刁宣刁丁聊切姓也風俗通云齊大夫豐刁之後因以爲氏桎梏上之日切下古沃切在足曰桎在手曰梏犲狼牀皆切􅀃文狼屬狗聲或作豺暹息廉切案堵音覩應劭曰案按次第也堵如墻堵不迁動也馳傳張戀切車傳猜忌倉才切猜疑而忌憚也跋扈上蒲撥切下侯古切猶強梁也􅋲空旱切顒顒魚容切爾雅云顒顒卯卯君之德也桴筏上芳無切下房越切小曰桴大曰筏乗之度水虺許偉切檦匹沼切艘蘇刀切船之緫名郷導許亮切郷趍也導引也結陳直刃切與陣同須髮須面毛也俗作鬚非是徐鉉曰借爲所湏之湏髮方伐切頭毛也北邙莫郎切又武方切北山名在河南洛陽轘轅胡􅀜切􅀜名險道也在河南緱氏縣東南比至必寐切呵之虎何切叱也銖慵朱切十黍爲絫十絫爲銖巴􅀖加切春秋時巴地晉宋間爲夷獠所居至後魏得其地立巴州獠魯皓切西南夷別族酋自秋切長也愷苦亥切鐡劵去願切劵約也釋名曰劵綣也相約束繾綣爲限也重賂音路厚遺也崑崙上公渾切下盧昆切􅄺槃上乃結切下蒲官切釋氏經名猶華人云示滅也佛以人死其精神常存佛之死示寂滅而巳非眞死也菩薩上薄胡切下桑割切釋氏佛號百辟音壁畿内羣臣也尖山子廉切山名薊音計燕國之邑昧旦没佩切未明也万俟醜奴万俟音墨祺虜􅃨姓醜奴其名金輅洛故切金輅者以金飾車也輅亦車也謂之輅者言行於道路也妖賊於喬切妖邪也梁紀十通鑑卷一百五十四上章閹茂即庚戌一年髙祖武皇帝十中大通二年雋子峻切子鵠胡沃切勍敵渠京切疆也春秋傳勍敵之人䜛嫉上十咸切譛也下秦悉切妬也驃􅀐毗召切勁疾皃或作票侯莫陳恱侯莫陳三字姓尉遲菩薩尉紆勿切代北􅃨姓本號尉遲部與後魏同起因以爲氏菩薩其名仵疑古切柵測革切編木爲之挑之他彫切􅀃文撓也覘候癡廉切又敕艶切窺伺也晡奔謨切日加申時黎明音離黎猶比也謂比至天明也披靡普彼切披裂偃靡也驍果堅堯切驍健而果敢也木槍千羊切剡木而爲槍長梯天黎切􅀃文木階也駱超駱盧名切姓也超其名宇文泰宇文複姓名泰至其子􅁴受西魏㳟帝禪國號周伺察相吏切􅀃文閹窺也一曰伺候也怏怏􅀝兩切情不足也捷疾葉切􅀗也尅也勝也􅅮之音博謂擊之從容七㳟切猶休燕也蒐狩上踈鳩切下舒救切田獵也左傳春蒐夏苗秋狝冬狩攘袂彌蔽切神也北填填讀曰鎮汾胡符分切汾州山胡㝃乳羙辯切生子免娠也唾地吐卧切口液也或從水耐乃帶切中合湯來切星名大角大角星名史記曰大角天王帝庭蝮蛇房六切蛇名廣三寸色如綬􅈹有針一名反􅈹螫手施􅃗切毒也或作蠚腕烏貫切手腕或作掔讌射上伊甸切合飲也下神夜切弓弩發於身而中於逺也狼戾郎計切猶狼籍也􅀶伯各切博塞喜譟先到切羣呼也恟恟許容切諠擾之意徇徐閏切行示也舋逆許愼切罪舋也或作釁愴然􅀄亮切悽愴泊傍各切上也斛斯椿斛斯代北復姓爲代部洛統帥號斛斯部因以爲氏斛胡谷切曄筠輙切憂怖普故切憂懼也曇徒含切滑臺戸八切滑臺春秋時爲衛國秦時爲東邵後魏改爲滑州因滑臺以爲名馬藺良刃切草名鷙之利切撲殺弼角切舉而擊之如格殺也捶之止蘂切擊也瞋目昌真切張日也紇豆陵歩蕃紇豆陵代北三字姓歩蕃其名紇音下沒切毓余六切縊於賜切自經也并力卑政切兼也並也逗留音豆溜謂不進也拳敺上逵貟切下一口切以手捶擊也掘其月切搰也趣讀曰促琰之以冉切溱水側詵切水名在河南梁紀十一通鑑卷一百五十五起重光大淵獻盡元黓困敦即辛亥至壬子凡二年髙祖武皇帝十一中大通三年瘖於今切不能言也邙山莫郎切又武方切山名在河南洛陽肆眚肆緩也眚過也書曰眚災肆赦春秋曰肆大眚所景切遞特計切更易也沖挹上直弓切下伊入切謙冲而退挹也仵龍仵五故切螭丑支切彊之巨兩切勉之圖䜟楚譛切符命之書䜟驗也瀛餘輕切晉時河間國後魏爲郡孝文帝置瀛州白鷂以招切又余照切調發徒弔切調計發也嶷魚力切又魚其切縞素古老切爾雅曰縞皓也繒之精白者曰縞移檄胡狄切符檄古者以竹簡爲書長一尺二寸擐甲胡貫切貫也春秋傳擐甲執兵馬矟所角切矛屬或作槊通俗文曰矛丈八者謂之槊屈彊上其月切通作倔下巨兩切屈彊謂不柔服也榖秸古八切藁去皮曰秸慷􅁣上苦莽切下口漑切慷􅁣竭誠也蠭起蠭與蜂同如蠭之起言其衆也路梗古杏切謂阻塞也槲胡谷切木名檞􅈪也或書作箏側莖切樂器秦蒙恬所造擘脯上博厄切下方矩切乾肉爲脯擘謂分而食之吐哺蒲故切吐口中所食也周公一飯三吐哺以接下賢士也輟洗先典切洗足也漢髙祖輟洗足而聴鄜食其之􅀃歌闋苦穴切終也訖也紿之徒亥切欺也誑也麤倉胡切麤踈弭服母媿切止也􅃛胡八切桀􅃛布裠音羣􅀃文下裳也釋名曰裠羣也連接羣幅也曄筠輙切昕許斤切猥烏賄切猶多也并汾符分切州名漢置太原郡兼置并州後魏置西河郡兼置汾州皆在河東妖術於喬切妖邪之術符厭一渉切廣雅云厭者謂行符厭勝之術也戮力音六􅀃文曰戮力并力也首函胡䜛切匵也置首於函匵中賑之止刃切贍也燕居伊甸切燕安之居惋愕上烏貫切下五各切驚歎也􅀫勤明逹􅀫勤複姓跬歩大蘂切􅀃文半歩也司馬法凡人一舉足曰跬跬三尺也兩舉足曰歩歩六尺也湔滌上將仙切下徒歷切湔洒也滌洗也竒邪上紀冝切下音斜周禮有竒衺之人鄭氏注云竒衺譎詭非常也逺之于願切離也脫屣所綺切澆競古堯切澆薄爭競之風也誚責才􅀏切亦責也通作譙從横子容切或作縱東西曰縱南北曰横异羊吏切􅊫楚􅃛切斛律金胡谷切代北複姓其先爲部落統帥號斛律部因以爲氏庫狄干苦故切代北􅃨姓鮮卑叚匹磾之後避難改姓庫狄居代後遷中夏頓顙蘇黨切俯其首額也椎牛直追切擊殺也或作桘緦服息兹切㸑七亂切炊㸑華隂户化切洪農邑華山在縣之南也貰邹誕音丗與字林聲韻並同又音時夜切􅀃文貸也愔揖􅁋切昌㝢王矩切畨禺上普官切又蒲何切下魚容切又音虞南越地名般􅀂音波釋氏經名佛有六波羅宻般􅀂其一也猶言智慧尓嬰城於盈切繞城以自守四年右衛率所􅀋切與帥同㥄閭承切偕行古諧切俱行賒詩車切貰買也邸店丁禮切客舎也洹水干元切水名在鄴鮮卑相然切東胡別種居鮮卑山因以爲號内之讀曰納灅波力水切津名飼之相吏切通作飲食也割臂割古􅂚切刺臂取血而爲盟誓也春秋左傳曰割臂盟公契闊上苦結切本亦作挈下苦活切契闊勤苦也韓詩云約束也綦母雋綦母複姓綦渠之切雋其名春秋左傳晉有大夫綦母張磬析苦定切古之磬其形曲折故喻人折腰莊子漁父篇夫子曲腰磬折勍敵渠京切彊也春秋傳勍敵之人函谷胡䜛切在洪農山形如函故曰函谷酖直禁切毒酒寳炬其吕切亶多旱切圜丘圜通作圎爾雅云土之髙者曰丘圜者所以象天體蓋禮􅀕於圜丘也轟轟呼宏切衆車聲捋􅀰活切手捋也取也摩也揣􅀄委切度也資治通鑑釋文卷第十六
