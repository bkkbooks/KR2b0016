body:
  text: 右宣義郎監成都府糧料院史炤晉紀二十一通鑑卷九十九起重光大淵獻盡閼逢攝提格即辛亥至甲寅凡四年孝宗穆皇帝中之上永和七年苻健渠建切強氏姓也其兩切又其良切兩音通用下同大秦苻健字建業苻洪第三子也據長安稱天王大單于建元皇始國號秦始於此史以前秦別之靚疾政切又疾郢切長樂音洛魏郡之邑屬司州廋踈鳩切雍州於用切楞盧登切與稜同墮徒果切氐酋上丁奚切羌也下自秋切長也龕音堪儁與俊同恱綰恱姓也鮮卑人迸北諍切散也薊音計燕國之邑屬幽州行陳上胡郎切下與陣同降胡下江切謏先鳥切灄頭上所涉切水名也在西陽恚於避切恨怒也逄約逄薄江切姓也鄄城上音絹僕陽國之邑屬兖州李邽音圭庫傉官偉庫傉官代北三字姓也傉内沃切至唐止姓庫一字樂陵上音洛郡名漢所置至晉爲樂陵國屬兾州吐谷渾葉延谷音浴渾音䰟吐谷渾虜國號即鮮卑之後義見上羈縻羈馬絡頭也縻牛紖也言牽制之故取喻爾彪􅀘休切會稽上古外切山名禹㑹諸侯而計㓛命曰㑹稽猶㑹計也秦爲郡昱音育噂􅊱上兹損切下徒合切相對談語也徼幸工堯切通作僥丁零翟䑕丁零在康居比去匈奴庭接習水七千里事見魏略八年愉音于碻磝上口勞切下五勞切城名後魏爲濟州治所瓉藏侃切圭􅃈也爲質陟利切結信也鮮卑上音先東胡别種依鮮卑山因以爲號之陳與陣同下方陳同被創􅀄莊切傷也繆嵩本史音謬姓也劉猗於冝切爲祟雖遂切伸也紿之徒蓋切欺誑也菁子情切芍陂上七削切在安豐郡孫叔敖所造以灌田也晞音希鶩亡遇切馳也縋馳僞切垂繩而下也涪城音浮梓潼邑屬梁州遺以醉切贈也不解胡買切曉也三思蘇暫切語三思而後行王俠音恊張悕音希元菟古真番之地漢武元封三年置此郡九年上邽㳙畦切邑名屬秦州之天水郡晃胡廣切鄠音户古京兆縣名晉爲始平郡屬雍州譙昨焦切郡名屬豫州蠡臺音禮地名在梁國屬豫州輔車尺奢切頰骨牙車也丁嬈奴了切又音擾盱眙上况于切下與之切臨淮邑屬徐州十年岌魚及切琪音其宛於􅀽切地名在南陽國鮪渚爲鬼切地名􅁺以絹切曹官也郗丑之切姓也咄咄當没切呵也空函音咸淅川上音錫嶢栁上音堯也名也在武關藍田之間突陳與陣同女媧堡媧音􅀲堡音保地名樂浪郡名也上音洛下音郎古朝鮮地漢武所置晉屬平州僂力主切又音樓皝胡廣切䜟楚譛切䜟纎也其義纎微倜儻上他歴切下它黨切不覊也厭次一琰切縣名屬兾州之樂陵國又一涉切次如字又音恣斌悲巾切與彬同晉紀二十二通鑑卷一百起旃蒙單閼盡屠維恊洽即乙卯至已未凡五年孝宗穆皇帝中之下永和十一年噉徒敢切食也與啖同濟北子禮切郡國名屬兖州瓫與盆同瞎許夾切一目盲也彊后其兩切又其良切皆姓通稱也䜟楚譛切䜟書也釋名曰䜟纎也其義纎微之謂菁子情切墮徒果切楞來登切冠軍上音觀在諸軍之上故曰冠軍數而所主切計其過也謚神至切行之迹也瓘音貫彊遣其兩切下彊人酒同索孚蘇各切姓也易揣上音亦姓也下􅀄委切名也張玲郎丁切訞言於喬切躡之尼輙切踵蹈也拉落合切折也阬丘更切比有毗至切近也星孛音佩又音勃皆彗星也秦分扶問切分野也綝尺林切善也髙句麗句音鈎麗音離在遼東之東漢武元封時開屬中國釗指遥切納質陟利切結信也鴦於良切又烏郎切錘傳追切金鎚也鉗巨淹切以鐵有所劫束也鋸居御切孟莊子始作鋸脛下頂切又形徑切脚脛也比比薄必切次也驍堅堯切健也十二年淄水側持切在齊地辟閭蔚辟閭復姓也並如字衛文公支孫以居楚丘榮辟閭里因爲辟閭氏蔚紆物切其名也每朝見朝直遥切見胡電切閼頭音遏什翼犍渠焉切代王拓跋氏之名也晉載記什作涉書􅀃音稅誘也崤函上户茅切下音咸山名在洪農秦雍於用切二州名也軹關上音􅁓在河内比肩上如字並也禳汝羊切羸牸上力爲切痩也下音字牝牛也使人上踈吏切結陳與陣同病創􅀄良切傷也帥衆上音率領也將也龕音堪鄄城上音絹僕陽國之邑屬兖州診章忍切候脉又視也驗也塹七艶切阬也遶城水也嬰城於盈切遶城以自守也嶷魚力切又魚其切載􅨕與遁同音鈍緦臨力禁切􅂘臨也廙羊吏切升平元年悛此縁切改也彊很胡懇切戻也恚於避切恨怒也䵩眉騧馬名上音􅀺黒而黃也下音瓜黄馬黒喙也敕勒敕勒即鐵勒國也其音訛轉耳謡田餘招切徒歌謂之謡轅軛於革切車軛也不省息井切視也眇亡沼切一目小也燖徐鹽切湯中瀹肉也撲殺蒲角切舉而擊殺之也嗷嗷牛刀切衆口愁也趫丘妖切捷也譟先到切群呼也叡以芮切與睿同輻湊音福車輻也湊本作輳千候切共轂也歐血烏后切吐也與嘔同彪之􅀘求切二年蚝七吏切五畤音山神靈之所止也秦有西畤好畤鄜時武畤密畤凡五畤也郗曇上丑之切姓也下音談氐豪上音低羌也屏息上必郢切屏藏其息濮陽音卜古昆吾國屬兖州山茌仕疑切太山郡之邑屬兖州趣去上音促疾也背本歩内切弃也憤惋烏貫切驚歎也可足渾乎昆切代北三字姓也前燕後燕之望姓􅄺皓上奴結切姓也皓其名巫蠱音古巫者執左道以亂政而惑人蠱惑也撓辭及教切又女巧切又呼髙切擾也一疾皃三年泓烏宏切潸山産二音流涕觀下音貫好施二字並去聲暐于􅀑切齧倪結切噬也莵途兎二音怖普故切惶懼也郇音荀驃􅀐毗召切勁疾皃亦作票豪撗户孟切非理也屏氣上必郢切屏藏其氣勁卒子没切渦潁上音戈水名受淮陽扶溝浪蕩渠東入淮潁水岀潁川陽城亦東入淮沛音貝故秦泗水郡㻱音津與璡同勝殘上詩證切論語解云勝殘􅁀之人使不爲惡也晉紀二十三通鑑卷一百一起上章涒灘盡著雍執徐即庚申至戊辰凡九年孝宗穆皇帝下升平四年鶩亡遇切可足渾代北三字姓也木強顔師古注周勃傳云木謂質樸強其兩切勁也之悖蒲昧切又蒲末切皆亂也孤􅊔里之切無夫也安重直隴切多難奴旦切蠡臺音禮地名在梁國屬豫州贇於倫切羙好也帥􅀐上音率什翼犍晉載記什作涉犍渠焉切拓拔代王名也妻之七計切以女嫁人也會稽上工外切山名後爲郡屬陽州晉灼曰本名茅山吴越春秋云禹廵天下登茅山大㑹群臣㑹計因更名曰會稽昱音育劉惔徒甘切鮮卑上音仙東胡別種依鮮卑山因以爲號五年郄曇上丑之切姓也下音談名也􅀃恪上音稅誘也豁呼枯切􅃆中莫踐切水名出武都東南入江驃􅀐毗召切勁疾也靚疾郢疾政二切櫓楯上音魯大循也下食尹切所以扞身蔽目者單男單音丹虜姓也又音善亦姓也自喪蘇浪切屏息上必郢切懼而屏藏氣息也哀皇帝􅂭和元年介守介猶獨也下邳符悲切國名屬徐州宛於元切地名在南陽􅁃以主切姓也畫而胡麥切分畫也長孫知上切大也成行户郎切列也緬弭兖切逺也賖音奢逺也踧子六切踧踖行恭謹貌􅁣􅀂蓋切慷􅁣也氛符文切祅祥之氣也處分上昌汝切至也定也下符問切所當然也鍾虡横曰簨縱曰虡音巨木謂之虡所以掛鍾磬也虡師爲猛獸中流矢上竹仲切傷也飛矢曰流矢興寧元年江虨布蠻切又甫巾切厭屈上於葉切厭伏也珣音荀􅁺以絹切曹屬也未易以䜴切星孛歩内切彗祅也角亢音岡星名也綸騫上音倫姓也騫其名髙車古赤狄種或曰匈奴甥也二年土斷都玩切决也皆以上着爲决㫁耳斷榖徒管切絶食也禇太后丑吕切姓岀河南赭圻上音者下音祈地名沈充式荏切姓岀吴興禁錮錮音固銓衡銓即衡也乂量也度也次也衡横也平也所以量度人物而爲之平也三年臠力兖切切大切也洌洲上音列地名崤澠上户交切山名下弭兖切水名澠也縣也皆在洪農筑音竹辟閭蔚辟閭􅃨姓義見上苛令苛音何煩也下力政切犍爲上渠焉切下如字郡名屬益州鞬居言切雍端上於用切姓也文王子雍伯之後司馬隗司馬姓也隗五罪切母丘暐上音無母丘􅃨姓出河東其先食菜母丘因氏焉西海公上太和元年澹徒敢徒濫二切水摇動貌二年遹音聿述也枹罕上音孚下音漢古罕羌侯邑賀肫賀姓也肫音純覘敕艶切窺也穄田子例切糜也似􅁰而不黏吕氏春秋曰飯之羙者有山陽之穄埿奴奚切與泥同又浦鑒切郗愔上丑之切姓也下挹􅁋切廋所鳩切姚眺它弔切蒲坂甫逺切河東邑屬司州有歷山舜所耕者葦絙上于鬼切蘆也下古登切大索也澌音斯流水也三年張蚝七吏切華隂户化切縣名在洪農以華山在其南也甬東之悔越王句踐旣破吴遷吴王夫差於甬東吴王曰侮不用子胥之言自令䧟此甬東者東鄙甬江東也翟傉上音狄下奴沃切名也榆眉上羊朱切地名挑戰徒了切擿嬈敵以求戰也恱綰恱姓也綰其名鼎跱持里切三分其勢而立如鼎之三足也恣撗户孟切非理也委輸謂輸送委積者上迁僞切下式喻切見前漢鮑宣傳貸音忒從人求物也紏擿上音﨣督也下他歷切發動其私也􅁵校上里之切理也下音教撿也考也晉紀二十四通鑑卷一百二起屠維太荒落盡上章敦牂即己巳至庚午凡二年海西公下太和四年乃遺于僞切可足渾乎昆切代北三字姓前燕後燕之望鉅野上音巨髙平國之邑名屬兖州魯獲麟之所汶水音問水岀狼邪朱虚東泰山東入濰舳艫上音逐下音盧􅂳之万長者也一曰舟尾也見衆上形甸切見在之衆遼碣上音僚水名在潦陽下音傑東海有碣石山易水音亦水岀涿郡隋爲易州因水得名也河濟子禮切水名出王屋山賖音奢澀色入切樂安上音洛鄱陽郡之邑名屬楊州燕之諸王遥領也郷導上許亮切所向也導引也悉羅騰悉羅􅃨姓也騰其名染干津染而琰切姓也譙梁昨焦切地名在豫州李邽音圭宙直又切輕剽匹妙切輕也與僄同義設餌仍吏切粉餅也戰數音朔不一也下數往數以並同輜重上測持切下直用切鎧仗上可亥切甲也仗刃㦸緫名躡娖輙切蹈其後也冠軍上音貰下冠丗同郝晷上音霍姓也君焉音煙乘輿乘輿者天子所乘之車也故群臣託乘輿以言之猖狂心不能審得失之地也要結於宵切約也好援上呼報切東朝直遥切稱職上尺證切相當也邸舎都禮切漢謂屬國舎爲邸近丗爲逆旅之稱間問古莧切乘間而問之大鴻臚音閭漢武帝更秦典客之官爲此名鴻大也臚傳也謂以禮大陳序賔客䧟陳直刃切與陣同丗子令力政切比者必利切近也肥如遼西郡之邑名屬幽州邯鄲上音寒下音丹趙地也舎此與捨同傍歩浪切縁也從者才用切閺郷亡云切地名在洪農郡之湖縣岱宗岱泰山也泰山爲四岳之宗故曰岱宗屬目上音燭與矚同視之甚也藉藉秦昔切險易以䜴切平也伍貟音云即伍子胥侵橈奴巧切又音蒿皆亂也無厭於炎切飽足也行伍上户剛切列户不更下音耕賦調徒弔切亦賦也厮役上音斯厮養也役使也必當丁浪切相當也索頭先各切什翼犍渠焉切涂中音除又音途水名在臨准郡之堂邑於晉爲下邳國號泣上音豪五年斌與彬同盟津上音孟河北地名屬河内於其也置津故曰孟津周武盟諸侯於此故曰盟津軹􅀜音止在河内軹縣屬司州行造七到切從容上七恭切下如字猶休宴也躊躇上音躊下音除勞之力到切慰也反閒古莧切反其言而爲之間􅂩也笁瑶笁音竹姓也讁陟革切罰也嬀俱推切石頭城名在吴丹陽郡秣陵即其地也隗五罪切涪城上音浮梓潼邑屬梁州虓許交切虎聲也蚝七吏切大呼火故切呌也覘敕艶切窺也郡將子亮切閒道古莧切微道也榷賣上音角且趨音促餘蔚紂物切又音尉姓也名蔚髙句麗句古侯切麗音离東夷國名居遼東之東質子上音至質子所以結言也覆簣求位切取士籠也歛葬力驗切殯殮也嶷魚力切謀畫音􅀗計䇿也見幾音機微也令長上力政切下之兩切觀省上息井切察也審也晉紀二十五通鑑卷一百三起重光恊洽盡旃􅀩大淵獻即辛未至乙亥凡五年太宗簡文皇帝咸安元年帥歩上音率翟斌上音狄下音彬同澠池弭兖切縣名在洪農郡朱􅊮下余中切什翼犍渠焉切代王拓跋氏也什或作渉脇迄業切兩膀也鷲峽上音就地名在􅄷池枹罕上音孚下亦音漢古罕羌侯驃􅀐毗召切勁疾也吐谷渾谷余蜀切渾胡昆切其先鮮卑徒可渉歸之庶長名曰吐谷渾其後因以爲號漒川其良切水名在河南幾亡音祈近也詰朝去吉切平旦也恍惚上虎晁切下呼骨切上邽音圭九錫九錫一車馬二衣服三樂四朱户五納陛六虎賁七斧􅃏八弓矢九秬鬯郗丑之切姓也惬結叶切床笫阻史切又側里切牀簀也痿儒佳切痺濕病也禇太后禇丑吕切姓也昱余六切數行户剛切王彪之􅀘休切􅀝傍歩浪切笁瑶音竹白帢苦合切土服也弁缺四隅謂之帢一􅀃魏文帝倣古皮弁裁縑帛以爲帢歔欷上休居切下休旣切歎息也邸丁禮切舎也幘側革切髪有巾曰㥽詔乘輿食陵切車輿切晞音希輕剽匹妙切刧奪也㻱子仁切與璡同晃胡廣切􅁺俞絹切官屬惋烏貫切驚歎也怛當割切飲酖直禁切毒酒灞上必駕切自􅀃自爲之􅀃也讜音黨屏之必郢切屏斥也熒惑户坰切春狄緯文耀鉤云赤帝嘌怒之神爲熒惑急省息并切審也察也日旰居案切日晚也乞伏司䌓乞㐲複姓司䌓其名二年勰音恊刀音彫姓也下眈丁含切壼苦本切相者悉亮切媵以證切妾媵處分上昌汝切區處曰處下扶問切分别曰分長樂音洛魏郡之邑屬司州核真户革切讀如覈實之覈淑妃神六切後宫女官悚荀勇切因叱昌栗切訶也烈宗孝武皇帝上之上寧康元年恟恟詩容切喧擾之意戰慴之涉切懼也從容七恭切猶休燕也撤直列切去也趣音促襁褓上舉兩切下􅀘抱切􅀒兒衣沮水子余切水名岀漢中巴獠魯皓切蠻獠周虓虚交切趣江陵上逡須切卭莋疾各切卭莋二國皆西南夷墊江墊音重疊之疊巴郡之邑屬梁州箕踞音據箕踞謂伸其兩足一曰箕踞其形似箕彗星徐醉切妖星欀袂彌蔽切􅁬䄂也鮮卑相然切山名東胡別種因保此山遂以爲號二年朞功朞言周朞功言大功慘七感切三年正朔諸盈切正者􅀊之首月也朔者􅀃文月一日始蘇也臨哭力禁切衆哭曰臨濛莫紅切東莞音官郡名屬徐州圗䜟楚僣切符命之書䜟驗也掖庭音亦韋昭云以爲在掖門内故謂之掖庭閹人衣檢切宫中守門者挫則卧切摧挫晉紀二十六通鑑卷一百四起柔兆困敦盡元􅘬敦牂即丙子至壬午凡七年烈宗孝武皇帝上之中太元元年郗愔郗處脂切姓也愔揖淫切浙江之列切江水東至㑹稽山隂爲浙江輿櫬􅀄覲切棺也苟萇直良切叚鏗口莖切席仂盧則切爲質職利切結信也球音求􅅞之符攫切射之神亦切命中曰射不中竹仲切當也傷也蕞爾徂外切小皃抗衡口浪切羊衡也敦煌音屯皇郡名屬凉州應劭曰敦大煌盛也行陳上户剛切下直刃切稽首音啓首至地也按堵音覩按次第如墻堵不遷動也索泮索蘇各切姓也泮音半切􅃆漢莫踐切漢上曰􅃆橈女巧切弱也其字從木郷導許亮切索虜虜以索辨髪故曰索虜髙車古赤狄餘種􅀄號狄歷或曰其先匈奴甥也故北方以其言語與匈奴同冦鈔楚交楚教二切略取也閼婆閼烏􅁑切又音焉紇根胡骨切窟咄上苦骨切下當没切伺便相吏切伺候也訥奴骨切狡猾上古巧切狂狡也下户八切亦作徻也穢貊上烏廢切下亡格切其國在東北方與髙句麗同種控弦口弄切控引也黠虜户八切傑黠也重譯羊益切譯者傳譯四夷之言也重譯謂重重而譯之殣渠遴切理也忿撫吻切又敷問切怒也拓跋珪拓他各切跋蒲撥切亦作拔代北􅃨姓自云拓天而生拔地而長遂以氏焉幢麾宅江切旙幢桑乾川乾音干地名在代北二年新羅新羅者其先本辰韓種也地在髙麗東南艦户黤切戰船四方施板以禦矢其狀如牢灋古法字菲薄妃尾切微也屐竭㦸切屩也哀惋烏貫切驚歎也三年邸丁禮切蒼頡篇曰邸舎也檝即渉切舟櫂也或作楫艘蘇刀切船之緫名􅨕丑絹切盱眙音吁怡臨淮邑屬徐州挹乙及切大宛於􅀽切西域國名汗血馬大宛國有髙山其上有馬不可得因取五色母馬置其下與交生駒汗血因號曰天馬子檻車户黤切載囚車也劾胡得切法有罪也四年并力卑政切兼也並也枹鼔風無切擊鼔杖也間使居莧切閒道之使也輜重上側其切下直用切璪之子皓切下邳貧悲切國名屬徐州五年薊音計燕國之邑屬幽州馴致詳遵切順也善也泝蘇故切逆流而上曰泝擯必仞切弃也黷武徒谷切黷猶慢也數也元莵同都切郡名琳犂沈切休忍夷狄國名蟻聚語豈切蜉蟻之聚也􅄶阨俾緬切㣣也潼關音童在華隂本名衝關河自龍門南流衝激華山東故以爲名馳傳張戀切車傳狃女救切習也徼幸堅堯切詐也汧雍氐汧輕煙切雍於用切謂汧雍之間氐羌也垣敞垣于元切姓也敞其名昌兩切鉅鹿臼許切國名屬兾州應劭曰鹿林之大者也六年交阯音止或作趾郡名屬交州瑗于願切晞音希七年鄯善鄯時戰切西域國名蝗胡光切螡也廣袤音茂東西曰廣南北曰袤彌窴堂見切車師前部王名休密䭾徒何切鄯善國王名晃胡廣切沖直弓切岱宗待戴切泰山也爲四岳之所宗輯睦音集又七入切爾雅曰輯和也嘿然宻北切静也通作黙闇劣闇古暗字时掖上陟柳切臂節也下夷益切胳也在肘後不解音邂曉也挫祖卧切摧也櫛風側瑟切如梳櫛之櫛沴氣乃結切又郎計切殖丞職切種也帥音率嘷音豪廏居又切馬舎也詵所臻切晉紀二十七通鑑卷一百五起昭陽恊洽盡閼逢涒灘即癸未至甲申凡二年烈宗孝武皇帝上之下太元八年銓此縁切筑陽音竹又音逐順陽邑屬荆州炬臼許切束葦燒斜谷上以遮切下于蜀切漢中谷名琰以冉切墅上與切田廬左祍如甚切衣衿也夷狄之俗左其衣祍論語微管仲吾其􅀍髮左祍矣鄖城音云古漢南之國柵測革切編立木爲之趣逡湏切嚮也器械胡介切械者器之緫名勍敵渠京切強也春秋傳勍敵之人憮然音武失意皃蹙子大切迫也中流矢中竹仲切傷也飛矢曰流矢壷飱千安切壷漿飱飯也豚髀上徒渾切小豕也下音陛服也飼音嗣或作飤暐羽鬼切屐竭㦸切屩也澠池音􅃆洪農邑屬司州飊卑遥切扶摇風也絛籠上他刀切􅀃文云扁緒也戓作縚下蘆東切所以蓄鳥也草笩房􅚼切結草爲舟也衣巳於旣切昵尼歴切近也通作焉􅂄於䖍切西域國名􅀛兹音丘􅄌西域國名嬰城於盈切遶也繞城以自守迫脅虚業切以威力相恐也翟斌翟直格切姓也斌悲巾切􅀓翼傅讀曰附藉虎慈夜切下藉彼音同蛟居肴切龍之屬也鎧仗可亥切鎧者甲之緫名仗謂器仗也趣使趣讀曰促擐甲胡貫切貫也春秋傳楚人擐甲執兵九年餘蔚餘姓也蔚紆勿切後燕慕容垂字道明皝之第五子雋封吴王王後奔秦符堅敗埀起兵至榮陽自稱燕王建元曰燕元史以後燕別之始於此饌雛綰切具食也亟岀紀力切􅔂也急也桑榆容朱切木名䄡裳􅃖占切蔽膝之衣也屠各屠音儲屠各者皆休屠之屬庫傉官偉傉奴沃切庫傉官三字姓綦母綦渠之切母音無􅃨姓滕其名鼔譟先到切群呼也披靡普彼切豁呼括切可足渾譚可足渾三字姓譚其名誚才􅀏切亦作譙闇古暗字佺期逡縁切送任如鴆切質子也華隂户化切洪農邑屬司州強永強其兩切姓也永其名樂浪音洛狼郡名屬平州􅉖公眉殞切鼷鼠音􅀆小䑕也一曰有螫毒者或謂之甘鼠噬時制切嚙也龐演音衍後秦姚萇字景茂弋仲第二十四子兄襄旣戰死萇率諸弟降秦及符堅敗萇遂起兵于北地稱大將軍大單于萬年秦王年號白雀史以後秦別之始於此􅁺屬俞絹切官屬漳水音章山海經曰漳水出荆山南注于沮水灌之古玩切澆也恟懼恟音凶又許拱切亦作春秋傳曹人懼苛峻上音何虬渠幽切琳音林壘襲壘力􅁤切姓也襲其名無厭於鹽切不足也驃騎毗召切勁疾皃焉能上於䖍切獪胡古邁切呐龍侯女劣切又女鬱切將馗下渠追切節傳節與卪通傳張戀切拓他各切亦開也雄徤始有部衆自號柔然魏太武以其無知狀􅀋於虫故改其號蠕蠕亢埿上音岡下又徒計切什翼犍渠焉切載記什作渉鏘七羊切昶丑兩切玉門酒泉郡之邑屬凉州漢罷玉門關屯徙其人於此因以爲號允吾音鈆牙本金城郡之邑入晉廢之乞伏國仁乞伏􅃨姓國仁其名按姓纂云乞伏本鮮卑乞伏部酋帥號其後因以爲氏焉西秦乞伏國仁鮮卑人也符堅敗自稱大單于秦河二州牧建元曰建義史以西秦別之始於此乙旃童埿旃之然切乙旃􅃨姓後魏官氏志云獻帝命叔父之後爲乙旃氏童埿其名繹幕音亦清河國之邑屬兾州梟之堅堯切梟其首也繕脩時戰切治也十一年斌悲巾切枹罕音膚其字從木古罕戎也秃髪思復鞬秃髪姓也思復鞬名蓋其先壽閴之在孕母胡掖氏因寢而産於􅀍中朝鮮謂被爲秃髮因而氏焉鞬居言切傳檄下胡狄切符檄也古者以木簡爲書長尺二寸謐覔畢切帝嚳枯沃切髙辛氏顗語豈切刀雲刀丁聊切姓也雲其名馬嵬五回切地名上邽音圭天水邑屬秦州魏代王拓跋珪什翼犍之孫太子寔之子即代王位大㑹於牛川改元登國又改代稱魏始於此酒酣胡甘切應劭曰洽也纂作管切啖青徒濫切氐羌名剽掠上匹妙切下力灼切剽刼掠取也趣乞逡須切嚮也窟咄上苦骨切下當没切幢將宅江切幢主也縞素古老切爾雅繒之精白者曰縞寺人時吏切閹官也中之上竹仲切創重上􅀄莊切傷也下直用切窺覦上去隨切下羊朱切或作窬皆私視也臨洮吐髙切隴西邑屬秦州兆水岀西羌中輜軿上側持切衣車也下薄經切輕車也􅀃文軿車前衣車後字林載衣物車前後皆蔽􅀂今庫車鉾鎧上音牟劒端也下可亥切甲也矟色角切長矛也或作槊晉紀二十九通鑑卷一百七起強圉大淵獻盡重光單閼即丁亥至辛卯凢五年烈宗孝武皇帝中之下太元十二年犇古奔字弈羊益切沾衿居吟切交祍也釗指遥切瓮口烏貢切與甕同驍勇堅堯切徤也冬鸞冬姓也鸞其名盧宫切涇陽堅靈切漢屬安定郡至晉發之長子持良切上黨邑屬并州井陘音刑常山邑屬兾州鼔譟先到切羣呼也􅨕徒困切與遁同櫝音獨旻武巾切數之所矩切一二計之也掘其月切榾也倮即果切袒也亦作祼後凉按載記吕光字丗明父婆樓佐命符堅本氏人也堅死自定凉州稱凉州牧建元太安史以後凉別之始於此張掖音亦郡名屬凉州應劭曰張國臂掖故曰張掖伺釁上相吏切下許愼切謂伺探其釁􅂩也瑀王矩切索嘏索昔各切姓也嘏其名古馬切餉之式亮切饋也亦作饟騂馬思營切馬赤黃色十三年朝那直遥切安定邑屬雍州辟閭渾辟必益切辟閭􅃨姓其先衛文公支孫居楚丘榮辟閭里因以爲氏渾胡昆切蔚紆物切來降胡江切景行下孟切詩曰高山仰止景行行止鄭氏箋云景明也古人有高德者則慕仰之有明行者則而行之司雍於用切司雍二州苑川於阮切西秦王所都之地庫莫奚庫莫奚者夷狄國名一曰奚其先東部胡宇文之別種爲燕王皝所破竄匿松模之間俗善射獵好爲冦抄焉契丹音乞夷狄國名與庫奚異種同􅀋居於和龍之北皝胡廣切邊芮而銳切翟勍翟徒歴切姓也勍渠京切弁皮變切詰之去吉切問也十四年薊城音計燕國薊縣之城屬幽州忱是壬切邢奴音刑浮屠同都切􅀽宏漢記浮屠佛也佛者漢言覺也將以􅁴悟羣生暱尼質切近也亦作昵姏姆上音甘老女稱也下音茂母也五誡音戒釋家有五誡犇湊犇古奔字湊猶輻湊也千候切黄􅃏王伐切斧以黄金飾車尺遮切姓也本齊田氏之後至漢田千秋以年老得乘小車入省中時人謂之車丞相因爲氏焉淑媛上神六切下于眷切後宫女官之稱邊烽敷容切燧候表也邊有警則舉火厝火倉故切置也土斷都玩切决也謂以土著而决斷之長殤尸羊切􅀃文不成人也年十九至十六死爲長殤十五年細行胡孟切揭飛揭音朅又渠列切紇突隣紇下没切紇突隣部落之號也直力鞮丁奚切劉衛辰之子也鄄城工􅁺切燕國之邑屬幽州脅虚業切迫脅也珣音荀十六年妻之七計切以女嫁人曰妻郷導許亮切郷先而引導也郿音媚扶風邑屬雍州強金槌強其兩切姓也金槌名直追切􅅃附苦管切誠􅅃也佺期此縁切觚攻乎切求好呼到切愛好也爲質職利切結信也大兠當侯切中目竹仲切傷也琰以冉切餘杭胡剛切邑名在吴郡郁乆閭地粟􅀽郁乆閭柔然國三字姓也地粟􅀽其酋長名大磧七迹切沙土曰漠即今磧也􅃰邪山上音卓下以奢切或作涂山名在代北英雋子峻切智過千人曰雋晉紀三十通鑑卷一百八起元黓執徐盡柔兆涒灘即壬辰至丙申凢五年烈宗孝武皇帝下之上太元十七年鮑遵鮑簿巧切姓也遵其名炬音巨束葦燒也艘蘇刀切船之緫名暍許􅁑切􅀬皃郝晷郝黒各切姓也崔䕃於禁切樂浪音洛狼郡名屬平州秣馬音末食馬榖也枹罕音膚枹鼔之枹其字從本古罕羌侯之地郗恢郗丑飢切姓也曇徒含切華隂户化切洪農邑屬司州金墉餘封切城名在河南洛陽西北角三國魏明帝所築豪横胡孟切豪強恣横也怏怏於兩切志不滿也倒戈丁老切平頭㦸也倒者謂以戈自攻也賖詩車切逺也十八年單于音蟬虜之尊號猶中國稱天子也傉官偉傉奴駑切庫傉官三字姓偉其名熾磐上尺志切下蒲官切井陘音刑常山邑屬益州旻武巾切晃胡廣切十九年紛陁徒何切冠軍古玩切功在諸軍之上故曰冠軍屠各音除屠各猶休屠之稱􅇭口扶雨切水名在鄴山海經云神囷之山􅇭水出焉標榜上卑遥切褾榜猶相表襮挫之祖卧切槯折也太行胡剛切山名在河内山陽西北詭道過委切詐也軹􅀜音􅁓軹縣之關在河内郡陳于直刃切切瓉藏旱切伉儷上苦浪切敵也下力計切耦也東莞音宜郡名屬徐州嚴禰乃禮切親廟也涇陽堅靈切邑名在安定湟中胡光切在金城破芜縣地汧川苦堅切地名在扶風一紐女九切系也􅁃楷􅁃勇主切姓也秀容秀容本漢汾陽縣地後省之至元魏始置肆州秀容縣内燕内讀曰納胡母亮母音無胡母􅃨姓軻彈軻音柯姓也翟瑥翟徒歷切姓也瑥音温衂女六切敗衂吴頡胡結切二十年嬖人愽計云賤而得幸曰嬖茹千秋茹人諸切奭施􅃗切從容七恭切猶休燕也媟私列切嬻也慢也貸吐戴切寛貸上邽音圭天水邑屬秦州間以居莧切迭也厠也拓跋渉珪拓他各切跋蒲撥切代北􅃨姓渉珪其名莫者羖羝莫者􅃨姓羖羝其名羖公土切羝丁奚切狃女九切狎也驕也穄田子例切星見胡甸切漂紕招切漂移也斥候按許慎淮南子云斥度候視也參合陂班糜切在代郡屬幽州即漢參合縣地沙漠莫各切沙土曰漠索虜昔各切戎虜以索瓣髮詗火逈切知處告言也衘枚音咸所以止言語讙囂狀如箸撗衘之迸去北諍切散走也倭奴烏禾切薊音計燕國之邑屬平州二十一年兵趣逡湏切嚮也嘔血一口切吐也沮陽七余切孟康音爼上谷邑屬幽州彊愎上渠良切下弼力切剛彊愎戾也眭䆳睦音雖姓也䆳其名雖遂切颺言余章切如風之所飛楊也曖昧於代切晻曖暗昩也鼔吹尺僞切􅀃文吹者音律管壎之樂也出警居影切警者戒肅也入蹕畢吉切蹕所以清道止行人也儲㣥上陳如切下丈里切猶蓄積也濮陽音卜國名屬兖州古昆吾國也惷弱陟降切惷謂騃昏也愠懟上於問切怒也下直􅀋切怨也長孫肥長知丈切長孫􅃨姓創􅀄莊切傷也勍敵渠京切強也春秋傳云勍敵之人醒桑經切又先定切醉解也魘於琰切驚夢闇弱闇古暗字禇粲禇丑吕切姓也擲之直炙切投也搔也輯和七入切與集同集和也于栗磾丁奚切晡博孤切日加申時也韓􅒲竹角切城隍胡光切城池也蒲阪甫逺切河東邑屬司州有歷山舜所耕也資治通鑑釋文卷第十一
