body:
  text: 右宣義郎監成都府糧料院史炤唐紀二十一通鑑卷二百五起元黓執徐盡柔兆涒灘即壬辰至丙申凡五年則天順聖皇后中之上長壽元年萬象神宫垂拱四年改明堂爲萬象神宫于闐堂練切又音田西域國尉遲紆勿切伏闍東徒切又辰遮切欋椎上權俱切下傳追切齊魯謂四齒杷曰欋新書云杷椎椀脫之諺盌脫烏管切小盂亦作盂􅭢心洪孤切􅀃文黏也眯目莫禮切物入目中莊子曰播糠眯目足絓古賣切罥也於鐙丁鄧切馬鞁具褫其丑豸切奪衣也綝丑林切拷掠苦浩切下力灼切涪陵防尤切縣名屬涪州駮之北角切難也更生古衡切幞頭防玉切亦作襆本幞巾故用全幅帛向後襆髪謂之襆頭自周武帝建德中始裁爲四脚謂爲四帶二帶繫腦後垂之二帶反繫頭上令曲折頂故亦曰折上巾唐制惟人主得用硬脚彎弧烏還切牽也􅀃文持弓􅀜矢下洪􅀌切以木曰弧以角曰弓易繫辝弦木爲弧揮桴芳無切本亦作枹擊鼔槌也吐蕃方煩切西羌種党項多曩切漢西羗别種魚蝦虚加切魵也長須蟲也一餤杜覽切􅀃文噍啖也酋慈秋切長也鈐其廉切昝捶子感切下諸蘂切五聽他定切書吕刑曰兩造具備師聽五辝周禮小司宼以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽三覆芳六切反也吞聲他根切齊聃都甘切矍然厥縳切遽皃元綜子宋切璹神六切習猫謨交切本亦作貓又音苗捕䑕獸也習謂馴擾之也鸚鵡於耕切下岡甫切能言鳥也山海經黃山有鳥赤喙青羽人舌能言語名之曰鸚鵡也􅀑朴匹角切言其身必誅死爲􅀑也爲之于僞切鉤距古侯切漢趙廣漢善爲鉤距以得事情晉灼曰鉤距也距閉也使對無疑􅀂不問而自知衆莫覺所由以閉其術爲距也促柱趨玉切侯堇箏賦曰急弦促柱變調改曲卑殺纎妙微聲䌓縟芻狗䆫榆切結芻爲狗􅀕祀用之莊子芻狗之巳陳也行者踐其脊蘇者取而爨之糟粕匹各切糟酒滓也糟爛爲粕許愼云粕巳漉麤糟也蘧廬求於切郭象莊子注云蘧廬猶傳舎也萋菲千西切菲或當作斐詩巷伯萋􅀆斐􅀆成是貝錦喻䜛人集作已過以成於罪者頓姦頓讀曰鈍鋒芒無方切鋒之銳利􅀂毫芒也窒陟栗切塞也枷研倪堅切䃺楔轂先結切下呼角切楔㰇也轂急束也㰇子廉切摺膺力合切又之涉切折也膺􅇩也史記折脅摺齒籖爪千廉切銳也貫也子珣思旬切休璟居永切碎葉蘇對切西域國二年厭呪益涉切厭伏也勝也呪詛也瘞於罽切幽薶也孝諶時任切季昶丑兩切希瑊古咸切絞古巧切不校居效切論語注云校報也言見侵犯不報也拭之設職切拂拭愀然七小切色變轝入羊茹切舁車也内五音納􅀓以方遇切棣大計切州名延載元年黙啜姝恱切突厥種名室韋如字契丹别種丁零之苗裔也俀子吐猥切是歳西突厥部立阿史那俀子爲可汗俀子阿史那獻之兄也俟斤渠之切突厥大臣號契苾欺訖切下蒲結切虜複姓沙吒陟加切又陟駕切虜􅃨姓廣成廣成子居於空同之上黃帝往訪之問至道焉河上河上公者莫知姓氏漢文帝時居陜河之儐誦道德經文帝探老氏之言河上公爲帝宣暢㣲妙傳所注經遂失所止後人因謂之河上公瀚海侯旰切北海名群鳥之所解羽故曰瀚海月俸房用切秩禄也有儲陳如切儲積何藉慈夜切天樞春株切武后以銅鐡爲天樞其制􅀂柱髙一百五尺鐡山爲之趾周百七十尺毎二丈無慮用銅鐡二百萬斤愔揖􅁋切蟻穴魚豈切韓子千丈之隄以螻蟻之穴而潰針芒諸深切黄帝素問曰針頭如芒氣岀如箱冩氣四夜切天􅁽萬歳元年溱側詵切州名古蠻夷地漢屬䍧柯正觀十六年開山洞立溱州夾紵直吕切作以布􅃮之貯之展吕切居也所費芳未切耗也府藏才浪切物所畜爲之于僞切無遮朱邪切無礙也萬緍眉巾切緍以貫錢一貫千錢也南璆渠尤切心愠於問切愠怒方酺薄胡切聚飲宣榭詞夜切爾雅無屋曰榭春秋書成周宣榭火左氏傳曰人火之也宣榭周家講武屋別在洛陽者建章宫名文頴曰越巫名勇謂漢武帝曰越國有火災大起宫室以厭勝之故武帝作建章宫在未央宫西入唁魚戰切弔也叱之尺栗切訶也王屋烏谷切武王旣渡孟津有火自上復于下至于王屋流爲烏馬融曰王屋王所屋也知幾居希切忖度趨本切下逹各切詩小雅曰他人有心予忖度之􅀺氓謨耕切黎衆也氓民也姦宄居洧切在外爲盜在内爲宄妍􅃖倪堅切猶羙惡也沙礫郎狄切小石倐來式竹切忽也尤甄稽天切察也蟠龍蒲宫切曲也合􅀕古曷切萬歳通天元年少室失照切嵩山東爲太室西爲少室恪憺杜覧切安静也大食西域國本波斯地文翽呼外切剛愎弼力切狠也霫息入切白霫國紿之徒愷切欺也糠粥之育切糜也黃麞谷諸羊切如意初里歌曰黄麞黄麞草裏藏彎弓射爾傷蓋詩妖也至是諸軍皆敗以䌈其字未詳四鎮􅀛兹于闐碎葉䟽勒也十姓咄陸五啜弩失畢五俟斤也離間居莧切韜他刀切閻余廉切頡跌奚結切下徒結切單于音蟬匈奴王號也駱務歴名切猝至蒼没切囹圄上盧經切下偶許切周獄名數挂上所角切下古賣切方寸徐庶曰方寸亂矣方寸心也唐紀二十二通鑑卷二百六起強圉作噩盡上章困敦六月即丁酉至庚子凡三年有竒則天順聖皇后中之下神功元年憬藏居永切綦渠之切姓勮渠據切譒補過切勔彌兖切惎渠記切上邽㳙畦切即天水縣屬秦州漢曰上邽瀼州如羊切正觀中開置以逹交趾在鬰林之西南交趾之東北尚乘石證切尚猶主也主天子車乘也殿中省官屬有奉御二人薄之伯各切迫也剽掠上匹妙切下力灼切劫略也供張居用切下竹亮切漢書注云􅀂今言悵設也吮其粗兖切欶也靴鼻許茄切革履不橈女教切又女巧切以木曲也無厭於鹽切戎狄貪婪無厭􅂖種之勇切嶠巨笑切鑄九鼎武后改明堂爲通天宫鑄九州鼎各位其方列廷中炫燿胡絢切迦宻古牙居伽二切緑珠晉石崇妓妾也孫秀傳人求之弗得乃勸趙王倫誅崇緑珠自投于樓下而死凶狡古巧切獪也虺正許愇切太宗子越王也垂拱四年越王舉兵于豫州後削屬籍改其姓爲虺氏争噉杜覽切食也抉眼一穴切挑也剥面北角切裂也帖席託恊切安也􅋇靣陵之切剥也選司須絹切銓選自首舒救切自陳逺之于願切離也輜重莊持切輜載衣車重載物車行者之所資緫名輜重乙􅁈羽於筆切乙姓忷懼許容切又許拱切亦作春秋傳曹人懼窮蹙子六切迫也潞水魯故切在潞城爲并州浸即濁漳水也竇州大透切本南扶州正觀八年更名竇州凱旋可亥切奏凱樂振旅而旋旋還也流沙書禹貢西􅀍于流沙䟽云流沙當是西境最逺者也而地理志以流沙爲張掖居延澤計當在居延之西大逺矣志言非也王制曰西不盡流沙大漠末各切北方沙漠也薄伐如字詩小雅薄伐玁狁至于太原注云言逐出之而巳薄語辭調發徒弔切謂計發之􅂢之余專切窟穴苦骨切螻蟻郎侯切螻螻蛄也蟻蚍蜉也螻蟻皆蟲之小者也㒹躓陟利切跲也聖曆元年從容七㳟切猶休燕櫛風側瑟切櫛猶梳也鋒鏑丁歷切箭鏃祔姑符遇擠上色角切下牋西切排也殛訖力切􅉁醢側魚切􅐽􅉁之稱下許亥切肉醬也甄明稽延切察也乆視元年傴僂上於武切下隴主切傴僂背曲也飫聞依據切猒飫也鐡檛陟􅀲切箠也匕首卑履切通俗文曰匕首劒屬其頭􅀋匕短而便用也奏藁古老切草也石淙徂宗切地名在告成縣告成後省入登封詭譎古委切下公穴切權詐也嘲謔上陟交切下迄􅁍切嘲弄戯謔也媒衒熒絹切行且賣也舞槊所角切矛屬鶻胡骨切鳥名唐紀二十三通鑑卷二百七起上章困敦七月盡旃􅀩大荒落正月即庚子至乙巳凡四年有竒則天順聖皇后下乆視元年獻俘方無切俘馘軍所獲也麴莽母黨切鮮華相然切貝博蓋切州名伽藍求迦切梵語云僧伽藍摩或云僧伽囉摩􅀂中華言衆園也里陌莫白切田閒道南北曰阡東西曰陌闤闠上户關切下胡對切古今注云闤市壇也闠市門也精舎子盈切釋迦譜云息心所棲曰精舎言精練行者所居列刹􅀄轄切􅆊言刹華言竿即幡柱也緇衣側持切黒色僧所服壞色衣也百層昨陵切層級一隅虞俱切角也陬也廷爭側迸切漢書注廷爭謂當朝廷而諌諍其鞚苦貢切馬鞚卓犖吕角切卓犖有才辯也數面所角切商賈公户切行賣曰商坐販曰賈弋獵逸織切繳射飛鳥也仰屠魚向切廣雅曰仰視也恐喝上欺用切下許葛切牲牢郎刀切杜預曰牛羊豕各一爲一牢也長安元年柏人博陌切邢州縣名後改爲堯山颺言余草切書傳曰大言而疾曰颺亟明其失也爲妖於堯切本亦作袄左氏天反物爲灾地反物爲祅愀然七小切色變琮藏宗切媵婢以證切送女從嫁爲媵婢褰裳起䖍切摳衣也言褰裳遜位以禪於禹復辟必亦切君也復子明辟周公還政於成王也自怡與之切安也䕃覆敷敕切磧中七迹切即沙漠拓州他各切開也斛胡谷切十斗爲斛一縑古甜切絹也糴數徒歷切市􅂖米爲糴二年季昶丑兩切論彌薩桑割切吐蕃臣名窺之去隨切小視碣石其謁切海邊山名營州栁城縣東有碣石山猗氏於離切晉州兾氏縣漢猗氏縣地也三年聽事湯丁切古者冶官處謂之聽事後語省直曰聽故加广恩渥乙角切􅀃文霑也戩子淺切南和邢州縣名迫趣趣讀曰促遽呼火故切衣紫於旣切語客牛據切台衡湯來切謂公相之任冝并并讀曰併恼恼許容切擾恐貌撫髀部禮切股也箝口其廉切籋也畏忤五故切逆也自擲直炙切投也晙袓峻切復冒莫報切犯也餞才線切酒食送人曰餞皎然吉了切杲古老切悚惕他歷切憂也中傷竹仲切四年迥秀户頂切探之他含切鍠胡盲切拯饑拯舊􅀃無切讀如蒸字之上聲􅀃文一舉也胥恱新於切相也酒酣胡甘切張晏曰中酒曰酣髙麗力支切強市巨兩切抑買之也歧山翹移切縣名屬鳯翔府能斷都玩切决也長倩倉甸切爲累力僞切事相縁也成均規倫切學名五帝名大學曰成均少閒居莧切少愈也通衢權俱切四逹謂之衢占相之廉切視兆也相息亮切首原舒救切有咎自陳則原貸之也屈突居勿切複姓禳災如羊切祀除殃癘也昇皮變切大辟毗亦切分外扶問切嶠渠廟切􅅮擊伯各切以長竹杖切中宗大和大聖大昭孝皇帝上神龍元年多祚有故切多􅍈之先本靺鞨酋長後入中國䦩眉貧切􅉑州縣名元琰以冉切􅁣然口漑切慷􅁣湛丈減切横遭胡孟切憤房吻切懣也北門左右羽林將軍掌統北衙禁兵曰北門張東之謂李多祚曰將軍居北門幾何年矣南牙南牙諸衛兵也怛當割切鼎鑊胡郭切鼎大而無足廡下罔甫切堂下周屋環繞音患屬籍殊玉切所附之宗籍唐紀二十四通鑑卷二百八起􅏧􅀩大荒落二月盡強圉恊洽即乙巳至丁未凡二年有竒中宗大和大聖大昭孝皇帝中神龍元年上陽宫其宫在東都禁苑之東接皇城之西北陵寢七稔切古宗廟前制廟後制寢秦始岀寢起於墓側故陵上稱寢殿嗚咽一結切聲塞也謙冲上苦兼切遜也下持中切和也中饋求位切食也帷幔草緩切幕也在房曰帷亦幔也季昶丑兩切産禄吕産吕禄机上居履切椹机之上噬臍時制切下徂􅀆切左氏􅀂不早圗後君噬臍注云言齧腹臍喻不可及婉兒於阮切上官昭容名屬文之欲切善綴文辭婕妤即涉切下羊諸切婦官婕言接幸妤言羙稱也唐制婕妤爲丗婦之首豫且子魚切泉陽人網元􅀛者梟氏古堯切即髙宗皇后王氏蟒氏母黨切即髙宗淑妃蕭氏葉静式渉切葉姓也墨敕畜力切時韋后及太平安樂公主等用事於側門降墨敕斜封授官號斜封官朝露陟遥切朝露見日則晞言其易散也湜常職切伺其思吏切􅍕闚也南皮景州縣名今屬凔州章武有北皮亭故此云南皮愔於今切湛丈咸切又持林切元琰以冉切髠苦昆切􅚎髪也瞿然偶遇切瞿然心驚皃厭益涉切厭伏也小技巨綺切藝也巧也知謇音蹇嗜酒時利切慾也􅁵職陵之切理也上邽㳙畦切即秦州天水縣祼身郎果切祼􅃝也索色百切求也􅃁宰知隴切冢宰大宰也䥫錮音固鑄塞之也有畸居冝切殘餘也二年嶠渠廟切滑户八切州名䦩郷眉巾切邑名屬虢州􅇭陽㧋雨切邑名屬惠州曇徒含切悛七縁切冉而剡切姓也參蒼含切宫壼苦本切宫中道也緇衣莊持切謂浮屠服壞色衣者酆王敷中切鄷國名屣履所􅀝切履不躡跟珦式亮切詆丁禮切詆訶也瀧吕江切州名寗承基乃定切寗姓也洵須倫切泚雌氏切姚餘招切璹神六切覈下革切覈實也瓊渠營切州名縛之伏約切束也竹槎鋤加切冎而古瓦切剔人肉置其骨也棓地滿墨切僵也捶殺主蘃切擊也儋丁藍切州名代閒猶言丗閒耳避太宗諱故云代閒仁愿魚怨切碾磑上尼展切磨也下五對切䃺也元紘音宏苐五氏苐五姓也後漢書其先齊諸田徙園陵者多故以次苐爲氏黙啜殊恱切鳴沙故靈州縣咸亨􅀄以爲安樂州治小􅀃靈州有沙踐之有聲故曰鳴沙沙吒陟加切娑􅁑蘇何切解琬上胡買切姓也下於阮切嗢鹿上烏没切隴右道覊縻州名以突􅀐施索􅁑莫賀部置隷北庭都護府景龍元年俌音甫郤縠胡谷切郤榖晉文公之謀帥也元帥所􅀋切中軍帥也穿扎側八切晉養由基善射射徹七扎故曰穿扎蒐踈鳩切春獵也卒乘石證切歩曰卒車曰乘紊文運切亂也迦葉上居伽切下失渉切天笁國􅃨姓攝提失涉切史記天官書大角兩旁各有三星鼎足句之曰攝提攝提者直斗杓所指以建時節晉書天文志攝提爲楯以夾擁帝座也春秋元命苞曰攝提之爲言提携也提斗携角以接於下也據檻户黤切檻䦨楯也憇去例切息也蝮氏芳福切反仄扎色切反仄不安也羅織質力切武后時有羅織經謂網羅無辜織成反狀也浚儀須閠切汴州縣名竹書紀年云梁惠王爲大溝於此郛以行圃田之水縣北有浚水像而儀之故謂之浚儀如綫私箭切縷也言其不斷僅如綫耳瘴海之亮切瘴癘也青蠅餘陵切繩之爲蟲汙白使黒汙黒侯白詩青繩刺幽王信讒侫變亂善惡也鼎鑊胡郭切鑊大鼎也謂鼎烹之誅涪陵音浮邑名屬涪州贖生神蜀切謂以錢救贖生命也鼈必列切介甲蟲也拯之切救也鬻生餘六切賣也錢刀如字漢書食貨志寳於金利於刀注云名錢爲刀以其利於民也罟公土切網緫名唐紀二十五通鑑卷二百九起著雍涒灘盡上章閹茂七月即戊申至庚戌凡二年有竒中宗大和大聖大昭孝皇帝下景龍二年衣笥相吏切篋也篚也皆所以盛衣裳幣帛者也趙簡子曰帝賜我一笥衣服裙上渠云切亦作帬􅀃文曰下裳也釋名曰帬羣也連接羣幅也破陣樂太宗爲秦王時軍中作秦王破陣樂歌堂堂自隋樂府有堂堂曲調露􅀄京城民謡有側堂堂橈堂堂之言太常丞李嗣真曰側者不正橈者不安再言堂者謂唐再受命之象也娬媚娘文甫切太宗始召武后爲才人旣見賜號武媚永徽後民皆歌娬媚娘曲英王石州英王中宗也天寳後樂曲多以邊地爲名有伊州甘州涼州等石州亦此􅀋桑條韋永徽末里歌有桑條韋也女條韋也樂梁肉吕張切漢書注云梁粟􅀋也米之善者冗貟而隴切散也三受降城下江切張仁愿築東受降城中受降城西受降城屬豐州拂雲祠敷勿切地理志云中受降城有拂雲堆祠也拓地撻各切開也朝那奴何切山名邏衞郎佐切遊兵也退恧女六切元楷苦駭切屬和之欲切下胡卧切塔廟託盍切浮圗也疆場夷益切詩傳云􅂣畔也如來如來佛别號也沛國􅀶蓋切即徐州尚宫時亮切婦官唐制有尚宮尚義尚服各二賀婁落侯切複姓臧獲兹郎切楊雄方言云師岱之間罵奴曰臧罵婢曰獲燕之北郊民而聓婢謂之臧女而婦奴謂之獲又見左氏定昆古渾切安樂公主所作池名欲以勝昆明故云定昆延袤莫候切南北長曰袤織成裙質力切安樂公主使尚方合鳥毛織二帬以其一獻韋后也一億乙力切十萬曰億花卉許偉切草緫名粟粒力入切灑油所蟹切汛也膏􅃾羊朱切肥也霜雹弼角切雨永也沙彌民卑切僧始落髪後之稱也善見律云沙彌雖未具戒亦入比丘數甄之人切娑葛素何切又去聲突驍施烏質勒之子阿史那獻西突厥彌射可汗孫也䖍瓘古玩切拔汗蒲末切本曰錣汗眤尼質切郷導許亮切于闐堂練切西域國無厭於鹽切不足也俀子吐猥切可汗名西突厥部所僞立者斛瑟羅胡谷切阿史那歩真子焉耆音煙祗西域國葛巾居曷切􅀃文絺綌艸也障車竹亮切水竇大透切鑿垣爲空庭燎力小切詩傳云庭燎大燭也設大燭於庭逹旦不寐以守歳也伉儷口浪切配偶也金縷力主切綫也花釵􅀄佳切歧笄也阿㸙之奢切􅀃文父也三年僮奴徒紅切奴也拔河新史記云觀宫女拔河爲宫市以嬉䙝慢私列切黷也俯僂力主切杜預云俯共於傴傴共於僂渾脫胡昆切太尉長孫元忌以烏羊毛爲渾脫氊帽人多效之謂之趙公渾脫近服妖也見五行志婆羅門呪職救切婆羅門蓋天竺國也俗尚浮圖法傳禁呪山惲於粉切蟋蟀音悉率蟋蟀蛬也國風刺晉僖公之詩義取好樂無荒良士瞿瞿一襲席入切衣服上下具曰襲猶言一副也酒巵章移切酒器古以角爲之受三升字或作觝箴規諸深切誡也分茅莫交切古者天子以五色土封諸侯苴以白茅授之使立社於國也胙土才故切左氏胙之土而命之氏胙報也陵轢郞撃切車踐也貿易莫候切易財也衰耗莫報切九十曰耄裴漼七罪切祼獻古玩切周禮太宗伯以肆獻祼享先王注云獻獻醴謂薦血腥也祼之言灌也灌以鬱鬯謂始獻尸求神時也瑶爵餘招切玉也周禮注獻醴薦血腥䟽云王岀迎牲入豚解而腥之薦於神坐以玉爵酌醴齊以獻尸后亦以玉爵酌醴齊以獻尸也齋娘莊皆切戒絜也五行志曰景龍三年郊祀韋后爲亞獻以婦人爲齋娘以􅀕祀之服執事近服妖也膠水居肴切萊州縣名輯秦入切和也趨射逡湏切言利之所在人多奔之􅀂水之趨於下射之志於的也擯必刃切夐翾正切又翾縣切巫覡刑狄切在男曰巫在女曰覡杜陵徒古切故杜伯國漢宣帝以杜東原上爲􅀄陵更名杜爲杜陵縣故城在今萬年縣南睿宗元眞大聖大興孝皇帝上景雲元年􅀺園憐題切抛􅀍交切隨絙居鄧切大繩踣地蒲墨切僵也櫻桃於耕切朱櫻也岌魚乞切郞姓錡渠冝切又魚綺切守捉側角切唐制兵之戍邊者大曰軍小曰守捉曰城曰鎮而緫之者曰道葉静能與涉切葉姓也文韀則前切馬鞁具贛人古送切䖍州縣名有贛水漢書如淳音感崇曄域􅂺切榜棰薄庚切仙鳬馮無切晡奔謨切日加申時昱余六切擫紫益涉切本亦作壓􅀃文一指按也或作擫襁褓居兩切下音保襁褓􅀒皃衣也趫勇丘妖切捷也沁七鴆切州名沅愚􅀽切州名唐紀二十六通鑑卷二百十起上章閹茂八月盡昭陽赤奮􅀂即庚戊至癸丑凡三年有竒睿宗元眞大聖大興孝皇帝下景雲元年􅍕至衣撿切猝也窘迫巨殞切窘亦迫也漕渠在到切華隂漕渠也梳髻山於切理髮也下吉詣切束髮也股慓公土切下力質切股脚也慓戰慓通作栗漢書股戰而栗言懼甚也􅁀横胡孟切暴横言不順理斜封徐嗟切中宗時韋后及太平安樂公主用於側門降墨敕斜封授官號斜封官凡數千貟流言如字其言如流謗毀無實也詩曰流言以對㓂攘式内覘伺丑廉切又敕􅃩下思吏切􅍕窺也纎介居拜切一介草喻事之小者節􅉖美隕切湊千候切雨泣王矩切謂泣下如雨絶馳道漢成帝紀上甞急召太子出龍樓門不敢絶馳道馳道天子所行道也横度曰絶脅父迄業切迫也癉惡丁但切書䟽明其爲善當褒賞之病其爲惡當罪罰之癉病也爲雪于僞切雪除也禕衣音暉畫翬翟者周禮三翟唯禕言衣者王后六服之首故以衣目之覆以敷救切蓋也一夷衾去金切禮記小歛用夷衾伷先直又切殖貨丞職切種也言至徙所惟財貨是殖詗翾正切知處告言女官如字或作女冠女爲道家流者屏斥卑正切除也奚霫習入切奚白霫北狄國嬖倖卑義切幸也混淆何交切濁也亦作殽雜也彊禦偶許切詩不侮鰥寡不畏彊禦䟽言不畏懼於彊梁禦善之人請謁於歇切左氏唯我鄭國之有請謁焉謁告也倪􅀂水研奚切姓也狡兎古巧切所噬時制切㗖也湯沐古者諸侯京師有朝􅀫之邑泰山有湯沐之邑蓋朝􅀫亦名湯沐諸侯來京師主爲朝王故名朝􅀫從王廵符主爲助􅀕􅀕必沐浴故名湯沐隨事立名耳二年晙祖峻切乘輦力展切輓車也璟居永切􅃎王悲巾切涖力至切沸騰甫味切下徒登切詩百川沸騰沸岀也騰乘也衆口沸騰言如水之涌沸而相乘矣鎧曹可亥切又口漑切甲也鎧曹十六衞官屬也汲引訖立切漢書傳相汲引不爲比周誑誤古況切欺也澹泊杜覧切又徒濫切澹泊安静也鄜涇芳無切俌方矩切枯柿上史切字本作柹􅀃文赤實果也解琬胡買切姓也阿㸙之奢切􅀶雅日父也􅀄中宗以韋后乳媪妻之丗謂媪婿爲阿㸙湜丞職切俱罄詰定切空竭賑恤之忍切又止刃切救恤葺園七入切􅀃文茨也左氏注云覆也殫國多寒切極盡也衣紫衫於旣切衫師銜切唐制三品以上服紫天台湯來切山名異苑曰㑹稽天台山雖非遐逺廣成莊子黄帝聞廣成子在於空同之上陸德明曰廣成子或云即老子也疾徑昨悉切疾捷也徑邪道也離騷經夫捷徑以窘歩新史作捷徑元宗至道大聖大明孝皇帝上之上先天元年合􅀕閤曷切又曷閤切合􅀕天地也賈曽議虞夏之時禘於郊則地祗羣望皆合於圎丘以始祖配滻東所簡切滻水出京兆藍田谷入霸出塞先代切邊塞璡即刃切佺且縁切奚酋慈秋切奚之酋長也大酺薄胡切奚酋名冷陘奚經切山名在營州北契丹中契丹音乞本東胡種魚袋徒耐切髙宗勑五品以上賜緋魚袋並飾以銀彗星徐醉切妖星軒轅于元切史記天官書軒轅黄龍體孟康曰形如騰龍援神契曰軒轅十二星后宫所居也大角訖岳切史記天官書曰大角天王帝廷也晉書天文志大角在攝提閒大角天王坐也又爲天棟正經紀也心前思㝷切史記天官書曰心爲明堂大星天王前後星子屬不欲直直則天王失計洪範五行傳曰心之大星天王也前星太子後星庶子嬀蔚俱爲切於勿切下邽㳙畦切華州縣名以有上邽故曰下邽郯王音談故郯國在下邳琚斤於切凶猾户八切狡也榻託盍切牀也蓋主如字又古盍切鄂邑蓋主漢昭帝姊蓋侯妻也與燕王旦上官桀等謀作亂自殺也飛煉郎甸切飛煉謂丹竈之事漢武内傳曰李沙君言臣能凝澒成白銀飛丹沙成黄金金成服之白日升天詼嘲枯回切詼嘲譏戯也暐羽􅀑切逗遛音豆下力救切不進也沙陀徒何切沙陀突厥部處月種也居金娑山之陽蒲􅀋之東有大磧名沙陀故號沙陀突厥朱邪移遮切忘不無故切棄忘能撩蓮條切􅀃文撩理也嗔稱人切恚也稽失堅奚切留止也開元元年改期渠之切期日也合醵上閤􅂚切下極虐切􅀃文㑹飲酒也百戯如字漢書天子饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戯以觀視之蓋􅀂此雜變不一陳之故名百戯也髙麗力支切東夷靺鞨音末􅂚北狄國大祚榮存故切祚榮姓大氏本粟末靺鞨附髙麗者李盡忠契丹盡忠其祖窟歌賜姓李氏乞四欺訖切乞四北羽靺鞨酋長行岌魚及切舛謬尺兖切舛錯一擲直炙切投也煩苛胡哥切察也虐也赤箭子賤切赤箭藥名陶隱居云比草亦是芝􅀋莖赤如箭簳葉甚端根如人足又云如芋有十二子爲衞有風不動無風自揺如此亦非俗所見圗經曰赤箭實似苦練子核作五六稜中有肉如麪爲墟如字又于僞下丘於切立也謩與謨同潘浦官切州名閑廏何間切䦨也下居又切周禮天子十有二閑馬六種注云毎廏爲一閑唐制尚乘奉御掌内外閑廏之馬左右六閑一曰飛黄二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑瀧閭江切州名率更古衡切東宫官震懾之渉切懼也䙝狎私列切䙝黷溺在乃歷切溺猶惑也撝虚爲切權譎古穴切詭詐微蹇九輦切􅀃文跛也唐紀二十七通鑑卷二百一十一起閼逢攝提格盡強圉大荒落即甲寅至丁巳凡四年元宗至道大聖大明孝皇帝上之中開元二年音律劣戍切音謂五音宫商角徵羽律有十二陽六爲律隂六爲吕通謂之律也教坊敷羊切􅀄有内教坊置于禁中蓬萊宫側更置左右教坊于京都以中官爲之使自是不隷太常法曲如字􅀄隋有法曲其聲清而近雅明皇受之選坐部􅇊子弟三百教於梨園號皇帝梨園弟子宫女數百亦爲梨園弟子居冝春北院樸素匹角切尚樸素謂敦尚質朴見素守真不尚文飾也老子見素抱撲少私寡欲佛圗澄符勿切澄夲姓帛氏天竺人善誦神呪役使􅀑神石勒重之號曰大和尚勒子季龍立傾心事澄後澄謂弟子曰石氏當滅吾及未亂先化矣遂卒明年季龍死遂大亂石勒僣國號趙鳩摩羅什鳩居尢切什音實入切羅什亦天竺人姚興待以國師之禮仍使入西明閤及逍遥園譯岀衆經姚氏僣國號秦㝷㓕沙汰他蓋切沙之汰之瓦礫在後謂選擇之有所棄斥者也翽呼外切黙啜姝恱切黙啜可汗突厥頡利族也創建楚亮切亦作剏造也頽壞徒回切墜也惀龍春切希瑊古咸切又胡嵓切紊文運切亂也涪房尤切州名都擔都甘切又都濫切􅀩婦莫紅切覆也􅃆彌兖切州名滁陳如切州名毀天樞春朱切延載元年武后大裒銅鐡合治之作天樞置端門外髙百餘尺用銅鐡二百萬斤故鎔歴月也咄禄當没切貟外于權切太宗時巳有貟外置其後又有特置同正貟至於試檢校兼守判知之􅀋皆非本制耳吐蕃方煩切西羗屬坌逹延坌蒲悶切攝失涉切過官唐制凢選事侍郎以下三注三唱仍過門下省審故曰過官撓女巧切又女教切􅅰亂也別墅承與切田廬也拜跪渠委切拜也五幄乙角切帷幄四合象宫室也愽弈夷益切圍棊也回颷卑遥切􅀃文扶摇風也字作飊又亦作飄通作焱音紕招切回風也上須詢趨切􅀃文面毛也徐鉉云俗作􅂡非是所湏之須本借此耳銜鐙乎嵓切馬勒􅀃文銜从金以行以行馬者也下丁鄧切馬鞁具檀徒丹切州名羔犢上居勞切下徒谷切羔羊子犢牛子也孳息疾置切書傳乳化曰孳息生也灤水盧官切新史作灤河遮其之奢切遏也嗤之昌之切􅀏也薛婆蒲禾切謂其無勇也離宫力支切子虚賦離宫别館彌山跨谷秦作離宫三百漢書注云離宫者謂於別處置之非常所居也環於音宦繞也花萼逆各切花跗承花者也花萼相輝取詩棠棣之華萼不韡韡燕飲兄弟之意以名樓也賞賚洛代切賜也燕寢伊殿切周禮宫人掌王之六寢之脩六寢者路寢一小寢五路寢以治事小寢以時燕息焉又女御掌御叙于王之燕寢蓋小寢通謂爲燕寢也閭閻余廉切閭閻里中門肥饒如招切謂其地膏腴冨饒也温湯他郞切驪山之温湯驪山在昭應縣歳稔忍甚切熟也常平倉千剛切漢時令邊郡皆築倉以􅂖賤時増其價而糴以利農榖貴時减價而糶名曰常平倉疊宕徒浪切並州名鄫王慈陵切故鄫國在東海鄄王於巾切故衛地在濮陽突􅀐施徒没切西突厥別種郷導郷讀曰嚮導引也并殺并讀曰併三年謁告於歇切請也告如字休假曰告齊澣風俗通曰四氏於國齊魯宋衛是也澣胡管切媢嫉莫報切妬也下昨悉切害也言妬害其功書媢作冐蔽也愎戾弼力切狠也斷斷丁亂切又音短又如字守善之貌猗於綺切又於冝切猗然專一它技巨綺切言無它技藝好之呼報切亦職質力切主也􅎤跌上奚結切下徒結切鐡勒諸部曰阿跌亦曰呵咥或爲􅎤跌胡禄屋咄陸部也酋慈秋切長也葛邏禄郎佐切鐡勒部突厥族也䑕尼施女夷切咄陸部膜拜􅂪逋切胡人拜吞蛭職日切水蟲賈􅁩新書楚王食寒􅉁而得蛭恐左右見而監食不誅則廢法遂吞之令尹賀曰王有仁德天之所輔也是夜嘔而蛭岀乆疾皆愈殺蛇市遮切孫叔敖爲兒時見兩頭蛇恐後人復見乃斷之其母曰汝有隂德必不死也舁之羊諸切􅀃文共舉也鳳泉湯他郎切在鳯翔郴丑林切州名遞䭾大計切下唐何切彊幹古旦切謂以京師爲幹四方爲枝拔汗那蒲末切西域國烏孫如字漢烏孫昆彌其人青眼赤須狀􅀋彌猴也大宛於􅀽切西域國罽賔居例切西域國恐愒欺用切下許葛切相恐怯也歙縣失渉切屬歙州玢悲巾切鳩集居尤切鳩聚也昕許斤切四年介意居拜切閒也彛章延知切常也法也倪五􅀆切景倩蒼甸切鵁鶄上居肴切下倉經切郭璞曰鵁鶄似鳬脚髙毛冠江東人家養之以厭火災鸂􅴞􅀂􅀆切畜力切鸂􅴞水鳥色黄赤有班文食短狐蟲在水中江東諸郡皆有之麒麟渠之切麒麟仁獸王者之佳瑞牡曰麒牝曰麟孔衍圗曰麟仁獸木之精也市舶薄陌切海舟師子國西域國居西南海中多竒寳能馴養師子因以名國之嫗威遇切母老稱拔曵固以制切鐡勒部也一曰拔野古又曰拔野固在磧北迸卒北諍切迸散走者郝呼各切靈荃且縁切霫息入切白霫國暾欲谷他昆切桀􅃛巨列切下八切剽掠匹妙切劫也妥帖吐火切安也自衒熒絹切行且賣也橋陵渠嬌切在奉先西北三十里蒼頭千剛切蒼頭奴也病痁詩廉切􅀬瘧异羊吏切旰食古旦切日晩也五年崤谷何交切二殽函谷之地在陜州豸冠宅買切獬豸也唐制殿中侍御史戴黒豸升殿紏不肅者險詖彼義切字或從心躋僖牋西切躋升也僖公閔公庶兄繼閔而立廟坐冝在閔下而魯升之閔上春秋譏焉整比毗志切北謂校次之也唐紀二十八通鑑卷二百一十二起著雍敦䍧盡旃􅀩赤奮􅀂即戊午至乙丑凡八年元宗至道大聖大明孝皇帝上之下開元六年惡錢如字漢法敢雜以鈆鐡爲它巧者其罪黥劉秩曰鑄錢不雜鈆鐵則無利雜則錢惡惡錢謂雜訟鐡盗鑄者矣不售承呪切賣也頡質奚結切入見賢遍切知璿旬縁切讜議多曩切銑酥典切投匭居洧切銅匭匣也頒郷飲酒禮唐制州貢明經秀才進士身孝悌旌表門閭者行郷飲酒之禮刺史爲主人郷致仕有德者爲賔其次爲介又其次爲衆賔與之行禮季冬之月正齒位則縣令爲主人郷之老人年六十以上有德望者一人爲賔次爲介爲三賔爲衆賔賔主燕飲則司正北靣揚觶而戒之以忠孝之本也􅃆彌兖切俸房用切僉議千廉切書傳曰僉皆也按䟽言衆人舉之故云僉也七年俱宻如字西域國也其王突厥延陁種糶之他弔切􅀃文岀􅂖也萬􅀐竒􅀉切睿宗改千􅀐爲萬􅀐明皇以萬􅀐平韋氏改爲左右龍武軍悄然七小切渤海蒲没切本粟末靺鞨也眷宗拜渤海郡王以所統爲忽汗州領都督自是始去靺鞨號專稱渤海祁翹夷切邑名屬太原府複道方六切重也蹶然爾雅蹶動也居衛切陸德明音其月切又音厥驚而起也仁琛丑林切饒假舉厦切假借饒猶優也八年有魃蒲撥切詩大雅曰旱魃爲虐如惔如焚注云魃旱神也鄭氏云其氣生魃而害益甚也神異經云南方有人長二三尺袒身目在項上走行如風名曰魃所見之國大旱赤地千里一各旱母烏萇仲良切西域烏荼國一曰烏伏那亦曰烏萇直天竺南東鄙接大食骨咄當没切骨咄或曰呵咄羅俱位恭于切或曰商彌在大雪山勃律河北􅈆􅂖呈延切􅈆水在河南榖水在新安勺磨職各切庭􅄾渠冝切太祝之六切太常官屬山茌仕之切又音緇齊州縣名武德元年置恂須倫切契苾上音乙下蒲結切拔悉宻北狄國輕而牽政切左氏戎輕而不整刪丹師姦切邑名漢屬張掖郡驍勇堅堯切健也欽澹徒濫切九年㢸古弼字陽翟直格切邑名屬頴昌府不解下懈切曉也党項多曩切漢西羗別種駱駝堰上歷各切下徒何切君􅎢敕略切西陲是爲切邊陲繫絙居登切大索也又居鄧切麟德曆髙宗時李淳風作甲子元暦以獻詔太史起麟德二年頒用謂之麟德曆一行更造新曆一行姓張氏郯國公公謹之孫也出家爲僧隱於嵩山詔造新暦一行於是推大衍數立衍以應之撰開元大衍曆道士邢和璞甞謂尹愔曰一行其聖人乎漢之洛下閎造曆云後八百歳當差一日必有聖人正之今年期畢矣而一行造大衍正其差謬則洛下閎之言信矣黄道游儀一行受詔改治新曆欲知黄道進退而太史無黄道儀梁令瓉以木爲游儀一行是之乃奏曰李淳風黄道儀法頗難術遂廢臣更造游儀使黄道交於奎軫之間内施白道月環用䆒隂陽盈縮動合天運簡而易從也其儀以古尺四分爲度旋樞􅀟環其表一丈四尺六寸一分縱八分厚三分直徑四尺五寸九分古所謂旋儀也七政日月五星十年志愔揖􅁋切公廨錢居隘切唐􅀄京司及州縣皆有公廨田後以用度不足京官有俸賜而巳諸司置公廨本錢職田質力切唐􅀄文武官給職分田正觀十一年以職田侵漁百姓詔給逃還貧户視職田多少毎畒給粟二斗謂之地子宥賢爰救切左氏祁奚曰叔向社稷之固也猶將十氏宥之以勸能者何辟毗亦切法也若敖牛刀切􅀂敖楚令尹子文之氏餒而弩罪切飢也楚子良生子越椒子文以爲熊虎之狀豺狼之聲必滅􅀂敖氏曰􅀑猶求食􅀂敖氏之􅀑不其餒而而語助也驃􅀐毗召切勁疾貌京觀古亂切積尸封土謂之京觀愛弛施氏切解也漢書以色事人者色衰而愛弛卜相息亮切逈秀户頂切小勃律蒲没切西域國去京師九千里而贏壽安東都縣名伷先直又切皁􅀠在早切郎計切左氏士臣皁皁臣輿與臣􅀠汾隂符分切河束縣名明皇祀后土獲寳鼎改曰寳鼎縣脽上蘇林曰脽音誰如淳曰脽者河之東岸特堆掘長四五里廣二里餘髙十餘丈汾隂縣治脽之上后土祠在縣西汾水在脽之北西流與河合顔師古曰以其形髙起如人尻脽故以名云一􅀃此臨汾水之上地本名鄈音與葵同彼郷人呼葵音如誰故轉爲脽字耳漢舊儀云葵上十一年贛尉古送切贛䖍州縣名有贛水漢書如淳音感儲偫文里切具也嵐盧含切州名蘄渠之切州名暹思廉切十二年所擯必刃切斥也璆渠幽切日晷居洧切日景也周禮大司徒以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中老人星老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕没于丁其下衆星古未名者史云廼渾天家以爲常没地中者也防閤古曷切唐制職事官及防閤庶僕一品防閤九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品以下給庶僕霹􅆮匹歷切下狼狄切霹靂木謂雷所震者瑒丑亮切謝䫻越筆切西域國顯慶時謂訶逹羅攴武后改今號箇失宻古賀切西域國距勃律五百里十三年彍􅀐忽郭切張弩也府兵之法浸壞衞士耗散張􅀃請一切募士􅀫衛又更號曰彍􅀐十二衛隋制十二衞唐因之曰翊衛曰驍􅀐衛曰武衛曰屯衛曰禦衛曰候衛爲左右焉彍􅀐分􅀠十二衛毎衛萬人供張上居用切下竹亮切滉户廣切涺斤於切澐于分切蕃息符􅀽切餼牽許氣切詩小雅注云牛羊豕爲牲熟曰饔腥曰餼牲曰牽論語注云牲生曰餼左氏餼牽竭矣杜預云生曰餼牽謂牛羊豕也輻湊千候切㑹也猶衆輻之聚於轂也唐紀二十九通鑑卷二百一十三起柔兆攝提格盡昭陽作噩即丙寅至癸酉凡八年元宗至道大聖大明孝皇帝中之上開元十四年折􅂨陟隆切折􅂨平也或作中宋均云折斷也中當正也􅀂折斷其物與度相中當也獠魯皓切又音爪切叱罵尺栗切訶也鞫之居六切元紘乎萌切蓬首蒲洪切詩首如飛蓬垢靣舉􅌋切靣垢忘洗言懼也席藁古老切稈也撤膳敕列切去也吐屯徒渾切吐屯突厥大臣號耳質子陟利切大壹夏大氏切閒道居莧切道邃雖遂切十五年君􅎢敕略切河鄯音善以紓商居切緩也諾邏郎佐切輜重上莊持切下直用切輜載衣車重物車行者之所資緫曰輜重一綟郎計切又力結切綟猶繚也大將即亮切契苾上音乞下蒲結切渾户昆切瀚海侯旰切氏悔名賛普吐蕃王號至晡奔謨切日加申時褘吁韋切漼取偎切鶉觚殊倫切下攻乎切涇州縣名板􅆬居案切板􅆬􅀃文築墻耑木也猝至千没切臨洮吐刀切即洮州十六年春瀧閭江切璘離珍切開元大衍曆九年僧一行受詔推大衍數作新曆十五年草成而一行卒詔張􅀃與曆官陳元景等次爲曆衍七篇略例一篇曆議十篇上之起明年頒于有司時善筭瞿曇譔者怨不得預改曆事二十一年奏大衍冩九執曆而其術未盡太子右司禦率南宫􅀃亦非之詔待御史李麟太史令亘執圭較靈臺候簿大衍十得七八麟德纔三四九執一二焉乃罪􅀃等而是否決祁連承之切祁連一名天山亦曰白山按西河舊事云山在張掖酒泉二界上刀􅋇力之切剥也十七年舋許愼切瑒田亮切縚他刀切麻察謨加切風俗通云齊大夫麻嬰後也詎爲臼許切豈也鉛錫余專切􅀃文青金也錫銀鉛之間也器皿眉永切􅀃文飯食用器也十八年而很下懇切戾很逖他歷切承玼雌氏切又此禮切捺禄乃曷切山名稽顙上遣禰切下昔曩切􅋕至地也㓂鈔楚交切又楚教切略取也爭長竹文切棨㦸遣禰切㦸有衣曰棨㦸音訖逆切􅀃文有技兵也周禮㦸長丈六尺參半倉含切間厠也詈辱力智切罵也繦中舉兩切本又作襁􅀒兒衣也十九年擗踴毗亦切撫心也琳梨沈切漸陶將廉切流入也經緯于貴切織橫􅁝也南北爲經東西爲緯戡定苦含切勝也兵萊夷郞才切萊齊東夷也孔子相魯定公㑹齊侯于夾谷齊使萊人以兵劫公孔子以公退曰士兵之兩君爲好裔夷之俘敢以兵亂之非齊君所以命諸侯也齊侯心怍麾而避之􅁍費人兵媚切費季孫邑孔子言於定公曰今三家過制請損之季氏將墮費費宰公山不狃帥費人以襲魯攻之弗克入及公側仲尼命申句湏樂頎下伐之費人北遂堕費抗衡口浪切争衡也獻馘古獲切詩魯頌矯矯虎臣在泮獻馘注云馘所格者左耳也狙詐千余切它硉勒没切解人下懈切解縣之人二十年俘斬芳無切軍所獲也詩􅃈蘇果切相屬之欲切連也貪婪盧含切􅀃文河内之北謂貪曰婪邀伊消切遮也隘道烏懈切比至毗至切賽祠先代切報也大雩雲俱切公羊曰大雩旱􅀕也注云君親之南郊以六事謝過自責唐禮孟夏雩祀昊天上帝于圎丘開元禮通事舎人王嵓請刪去禮記舊文而益以今事張􅀃以爲禮記不刋之書不可改易唐正觀􅂋慶禮儀注冝加折􅂨以爲唐禮於是蕭嵩等撰定爲一百五十卷爲大唐開元禮曲是唐之五禮之文始備棣大計切營鄚末各切並州名二十一年琬於阮切稹止刃也峭直千􅀏切峭直謂峻陿也恬和徒廉切安也侏儒鍾輸切侏儒短人也黄㼐蒲眠切警􅃛下八切慧也掀之虚言切操行七到切節操下下孟切􅃆彌兖切漼取猥切穗胡桂切漎徂聦切地狹胡夾切隘也厭卿於􅃩切漬汙疾智切􅀃文漚也汙汪胡切唐紀三十通鑑卷二百一十四起閼逢閹茂盡重光人荒落即甲戍至辛巳凡八年元宗至道大聖大明孝皇帝中之中開元二十二年賑止忍切又之刃切贍也誑古况切欺也官冶以者切鑄冶呉王濞普懿切漢髙祖兄仲之子富埒龍輟切芟之師銜切刈也僦車即就切賃也糴亭歷切市􅂖也尸解佳買切道家有尸解漢書形解銷化注云尸解也張晏曰人老而解去故骨如變化也不叶檄頰切合也大閱欲雪切􅂤閱也匄居太切乞也二十三年契丹上音乞九推通回切進之也酺蒲胡切王德布大㱃酒也白挺徒鼎切从木杖也手板􅀘綰切笏也繞􅂣爾紹切畫胡麥切衣於旣切服箱上音􅀒下思將切詩小雅大東曰晥彼牽牛不以服箱注云服牝服也箱大車之箱也周禮車人牝服二柯注云牝服長八尺謂較也䟽云車較即今人謂之平鬲皆有孔内軨子於其中而又向下服故謂之牝服也鄭司農云牝服謂車箱服讀爲􅀒以衆軨所依􅀒然也詩䟽又云兩較之内謂之箱蓋車内容物之處犀象先齊切南徼外牛一角在鼻一角在頂象長鼻牙南越大獸三年一乳于蔿羽委切于蔿者元德秀所爲歌也帝聞異之歎曰賢人之言哉考異曰明皇雜録作于蔿新傳作于蔿于未詳其義今從雜録瑝胡光切琇息救切咎繇姑勞切曽參梳簮切哀誄魯水切謚也死而誄之儉嗇殺測切老子洽人事天莫􅀂嗇河上公注云嗇貪也治國當愛惜民財不爲奢泰左氏僖二十一年務穡勸分杜預云穡儉也􅄺禮乃結切契丹臣君長展兩切二十四年瑛於京切璵羊諸切琚斤於切璲徐醉切璬吉了切瑁莫報切玢悲巾切珙居悚切瑱他甸切穰苴子余切司馬穰苴田氏之裔也齊景公以爲將軍將領即亮切復使爲將領軍阿犖山力角切新舊書皆作軋犖山軋犖山突厥所謂􅃲戰神者安禄山本營州栁城胡本姓康母阿史德爲覡居突厥中禱子於軋犖山及生有光照穹廬野獸盡鳴望氣者言其祥范陽節度使張仁愿搜廬帳欲盡殺之匿而免母以神所命遂字軋犖山冒姓莫報切謂假稱猶人首之有覆冒也窣干蘇骨切里閈侯旰切􅀃文閭也汝南平輿里門曰閈牙郞牙郎謂爲互市駔儈合㑹二家交易者也驍勇堅堯切捉側角切善揣􅀄委切度也紿曰蕩亥切欺也長揖一入切漢書注長揖者手自上而極下也温時刃切籩豆卑眠切禮器竹曰籩木曰豆屈到九勿切􅁰稷賞吕切􅀃文禾屬而黏者以大暑而穜故謂之黍孔子曰􅁰可爲酒禾入水也稷五􅂖之長非馨䤈經切􅀃文香之逺聞者泥古乃計切不通也簠簋方矩切下居洧切外方内圎曰簠内方外圎曰簋簋有蓋象􅀛形盛􅁰稷稻粱禮器也可去起呂切盤盂雲俱切盤盂盃按言非禮器矣韶濩音護商湯樂也箜篌音空侯樂器也師延作或􅀃空國之侯所好筝笛甾莖切􅀃文鼔弦竹身樂也茹毛如倨切飲也麴糵魚列切牙米也書􅀂作酒醴爾爲麴糵􅀃文謂酒母也施及以䜴切清廟左氏清廟茅屋大路越席大羮不致菜盛不鑿昭其儉也杜預云清廟肅然清静之稱園寢園謂山陵之塋域寢謂陵上寢殿古不墓􅀕漢諸陵皆有園寢承秦所爲也寢夲在宗廟後有衣冠几杖象生之具以薦新物也蒐狩踈鳩切獵名左氏春蒐夏苗秋獮冬狩從母才用切爾雅母之姊妹爲從母姨舅延知切爾雅妻之姊妹同岀爲姨注同岀謂俱巳嫁袒免周禮免音問尊禰乃禮切父廟曰禰彛倫延知切書彛倫攸叙彛常也倫理也􅀋也蟠於蒲官切禮記禮樂之極乎天而蟠乎也蟠猶委也承乾太子承乾太宗子夐呼玩切河湟胡光切湟水出金城臨羌東入河閥閱房越切閥閱功狀也中傷竹仲切二十五年傔人詰念切侍從也㩧於弼角切博雅㩧擊也又北角切亦擊也鏽息救切􅁓錢如字漢以來喪葬有瘞錢後丗俚俗稍以􅁓寓錢爲􅀑事明皇用之巫覡刑狄切男曰巫女曰覡諐素祛言切二十六年可敦突厥妻號可敦猶曰閼氏也葉護失渉切葉護猶大臣也攣縮閭縁切怛邏當割切下郎佐切南詔之笑切南蠻本哀牢夷後烏蠻別種也夷詔王爲詔越澹徒濫切新史六詔曰􅀩嶲越析浪穹邆睒施浪􅀩舎今通鑑從竇滂雲南别録也渳河緜婢切西渳河蠻也亦曰河蠻道繇郎州也大和如字城名夷語山陂陀爲和故謂大和龍武軍如字明皇以萬􅀐平韋氏改爲左右龍武軍京口埭徒耐切壅水曰埭二十七年靈􅊫􅀄戞切處木昆古渾切西突厥咄陸部章仇渠尤切複姓􅀕數所角切二十八年引内諾荅切昕許斤切莫敖吾髙切屈瑕也莫敖楚官狃於女九切牀也蒲騷音蕭又音縿春秋鄖邑也江夏雲杜縣有鄖城莫敖敗鄖人於蒲騷鄧曼曰莫敖狃於蒲騷之役將自用也二十九年盩厔張流切陟栗切鳯翔縣名水曲曰盩山曲曰厔及霽子計切雨止也背瘢蒲官切瘢痕哀惋烏貫切驚歎資治通鑑釋文卷第二十二
