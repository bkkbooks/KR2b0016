  text: 資治通鑑釋文卷第三
  hash: sha256:d92ee033c6e020976ef1da76cc6f4b43c349e9a4f1add41b8b122ad4d5e8552e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_003-1a}
body:
  text: 右宣義郎監成都府糧料院史炤漢紀十一通鑑卷十九起彊圉大荒落盡元黓閹茂即丁巳至壬戌凡六年丗宗孝武皇帝中之上元朔五年彍弩滿引曰彍音郭五兵謂矛㦸弓劒戈耰鉏上音憂摩田器也下牀魚切立薅所用也箠挺上之累切馬檛也下大鼎切杖也撻他逹切擊也桑弧音胡以桑木爲弓蓬矢歩工切篙也以篙爲箭詘曲勿切詰詘也禆賔彌頻移二切副助也伉音抗又工郎切衛青子繦褓上舉兩切下􅀘抱切􅀒兒衣龍頟鄂格切平原邑南窌披教切通作奅地名軹音只河内邑彗星徐醉切妖星壅閼上音擁下音遏塞也止也格明詔格音閣謂岐閣不行從容從千容切輣車蒲庚切兵車也鍜矢都玩切治鐵六年肺腑漢書腑作附如肝肺之相附著票姚上頻妙切下羊召切勁疾之貌行胡浪切次也絶幕末各切沙幕也匈奴之南界沙土曰幕直度曰絶罷音疲勞也徼工堯切要也錮音固元狩元年償辰羊切還也間居莧切􅂩也數􅀟遇切徼幸堅堯切通作僥羽檄胡歷切符檄也以木簡爲書長尺二寸詳見髙帝十年猶豫夷周切又餘敕切玃屬其性多疑一􅀃隴西人呼大子曰猶好先行却住以􅀱其人遂曰猶豫嬴餘輕切月氏音支西域胡大宛於先切西域胡土著直略切言著土地而有常居不随畜牧移徙也汗血汗侯旰切大宛國有天馬種汗血者汗從前肩髆出如血號一日千里于窴徒賢切又徒見切與闐字同西域胡國治西域去拘彌國三百里康居音渠西域胡􅍕蔡如字西域胡國在康居西北臨大澤無崖蓋乃北海也賈人音古坐販曰賈身毒身音乹毒音篤即天竺也所謂浮屠胡羌人羌夷種名也水經云羌水岀羌中參谷即其地安息悉即切西域胡國治畨兠城其池臨潙水遺弋季切贈也朝馳遥切覲君之緫稱九譯夷益切傳四夷之言者譯猶繹也如繹絲然紬其語而繹之周禮象胥之職九譯者謂所經歷凡九駹音尨夷名徙音斯夷名僰蒲北切夷種名氐丁奚切夷種名筰才各切夷名嶲先蘂切夷種名其國有嶲水昆明西夷種名有滇池方三百里武帝作昆明池習水戰以討之滇國音㒹史記漢書作滇越西夷國名本楚莊王弟莊蹻爲國於此二年票􅀐頻妙切勁疾貌焉支於䖍切山名折蘭折上列切匈奴中姓顔師古云鮮卑有蘭姓者即其種渾邪渾下昆切邪時遮切匈奴之屬爲王者匈奴伊穉邪與斜同音休屠上許虯切下音儲匈奴所封王地後降漢武帝開置縣屬武威郡圜陳音陣兵法有方圜陳大黃黄肩弩名大黄者參連弩其大者也居延匈奴中水名即古流沙武帝開置縣屬張掖郡使路博德築遮虜障於其城祁連祁上夷切即天山也在張掖酒泉二郡界酋涂上才由切下音塗匈奴中王號淖女教切祝詛上職救切詛也下莊助切詶也馳傳張戀切漯隂吐合切平原邑貫始制切貸也日磾丁奚切匈奴休屠王子没入漢賜姓金氏閼氏上於連切下音支驂乘上七南切下石證切三年倉廥古外切蒭藁之藏分扶問切渥洼上音握下於佳切水名在敦煌界便辟便毗連切辟讀曰僻書曰便僻側媚解者謂便者便人所好僻者避人所惡四年絫古累字藻繢白鹿皮幣縁以藻繢繡也㑹五采而爲之音户賄切橢佗果切圜而長曰橢東郭咸陽東郭姓也名咸陽􅎂徒計切鐡鉗也在項曰鉗在足曰􅎂占之贍切下同軺弋昭切小車以風讀曰諷孛蒲没切妖星食其食音異其音基數竒上所角切下居冝切謂竒􅃗不耦也愠於問切怒也砂礫砂或作沙小石曰礫音歷騾來弋切漢書作臝冒莫克切犯也紛挐女加切亂相持搏也遲明丈二切漢書作㑹明窴顔窴徒賢切匈奴中山名食讀曰飤幕府幕府者以軍幕爲義軍旅無常居止故以張幕言之猿臂上于元切如淳曰臂如猿臂通肩也漢書作爰顔師古曰爰緩意也谷蠡上音禄下音棃翰海如字北海名在沙漠北崔浩云羣鳥之所解羽故云翰海齎與資同資裝也蹋鞠上徒臈切下鉅六切蹋本作躢鞠以皮爲之蹵躢而戲令居令音零徐廣云里名在金城朝請才性切一鄣之向切塞上築城爲蔽鄣以扞寇慴之渉切與讋同忤音悟逆也佯音陽漢紀十二通鑑卷二十起昭陽大淵獻盡重光恊洽即癸亥至辛未凡九年丗宗孝武皇帝中之下元狩五年堧地人縁切内垣之外遊地也得與音豫莊青翟莊姓青翟名後避明帝諱莊改作嚴㳺水發根游水姓也發根其名畫灋胡麥切䇿畫之法卒起卒倉没切忽也六年廢格格讀曰閣上也雍於用切右扶風邑腹誹誹讀曰非謗也元鼎元年剽匹妙切剽掠二年導官導官少府官屬或謂獄名非也减宣古斬切姓也瘞壹計切埋也均輸舂朱切委輸也謂諸當所有輸於官者又均輸之齎側􅀆切持道也倨居御切不㳟也要領一遥切詳見元朔三年玉門縣名屬酒泉郡又有玉􅀜在龍勒縣界葱嶺西域山名極髙大其上悉生葱故名葱嶺鄯善鄯時戰切西域胡種本樓蘭王國治扞泥城元鳯中與匈奴爲反間其弟尉屠􅂄降漢言之漢乃立爲王更其國名鄯善史因稱鄯善云莎車素和切西域國本莎車城因以爲號車師西域國居交河城以河水分流繞城故云交河䟽勒歷德切西域國䟽勒其城名因以爲號日逐匈奴王號如渾邪休屠之稱焉耆上於䖍切下音支西域國名危須西域國治危須城因以名國與焉耆鄰界尉􅀺西域國治尉􅀺城因以立名與鄯善旦末相接操千髙切持也大放甫往切依倣也三年函谷􅀜函胡䜛切武帝徙􅀜於新安乃於故􅀜置洪農郡伊穉邪匈奴單于名穉持利切邪或作斜士嗟直牙二切穉邪胡人語也四年圜丘禮􅀕天於圜丘爾雅云土之髙者曰丘圜者所以象天躰圜通作圎汾隂扶云切河東邑脽上音誰汾河之東岸持堆也顔師古曰以其形髙起如人尻脽故以名云一􅀃本名鄈音葵彼郷人呼葵如誰轉而爲脽字耳故漢舊儀云葵上羡門祠箭切古仙人名子髙惡敢惡音烏共給共讀曰供搤音乞與㧖同魏脽本魏地之境故云魏脽課殿丁練切下功曰殿繦屬上舉兩切下之欲切繦索也屬聮也􅀂繩索之相屬最上祖外切上功曰最邯鄲上音寒下音丹趙國邑有邯鄲山樛居虬切姓也風諭風讀曰諷黥渠京切墨形在面或作剠劓魚器切去􅈹刑或作㓷塡撫塡讀曰鎭屣山爾切小履五年崆峒漢書作空同山名亭徼工釣切邊徼亭障也醊食上竹芮切下讀曰飤史記作餟漢書作腏音並同謂連續而􅀕朝朝日上音昭下音晁以朝旦拜日也郊見胡電切將即亮切帥也鏦音䆫謂撞而刺之也郟音夾顔師古曰縣名屬頴川畨禺上蒲禾切下魚容切南海郡治也謾音幔又莫連切欺誑也龍亢音岡漢書作㰍古龍字沛郡之邑湟音皇水名在金城臨􅏔塞外瀬音頼水名在越地䍧柯上兹郎切下居何切解見元光五年酎丈救切三重釀醇酒也不售史記漢書作不讎謂不驗也西羌西羌其本岀自三苗姜姓之别其國近南岳金城郡河􅀜縣之西南羌地是也南接蜀漢徼外枹罕上音鈇其字從木下讀如字金城邑六年㝷陿地名音挾姚氏云在始興西三百里近連口也􅀺旦力脂切􅀺黒色天曉時又邌明者邌待也義各有主交趾音止本南越地杜佑通典云南方夷人其足大指開廣􅀂並足而立其指交故名交趾武帝開置交趾郡九眞水名武帝平南越開置郡因以爲名日南日南者言其在日之南開北户以向日武帝平南越置日南郡珠厓冝佳切通作崖在大海中崖岸之邊出真珠故曰珠厓武帝平南越置珠厓郡儋耳丁甘切越地在大海中其種大耳渠率自謂王武帝開之置儋耳郡緱氏工侯切河南邑賽先代切報也且蘭子余切夷種也一名頭蘭越嶲先蘂切嶲水岀卭都國謂越此水故名越嶲武帝開之置郡白馬白馬氐夷種名居於河池一名仇池因亦呼爲仇夷揭陽音竭南海邑爲解佳買切判也􅀃也浮沮子閭切一本作苴匈奴中井名去九原郡二千里令居音零徐廣云里名在金城地敦煌音屯皇郡名應劭云敦大也煌盛也封禪禪上戰切封土於山禪􅀕於地也合祛丘於切李竒曰祛開散合閉也開閉於天地見兒寛傳注元封元年讋之渉切失氣也轅終古轅音􅀽姓也漢書作榬禦兒偶舉切越地有禦兒水越語云勾踐之地北至禦兒即北禦或作語卯石越地名顔師古曰功臣表作外石疑表誤史記又作北石繚嫈上音遼下於耕切越地名虚音墟奉邑扶用切與俸同􅀫留上先就切下力就切謂有所須待也梁父音甫山名因以爲縣屬泰山郡阯音止山之基足也茅三脊茅謨交切靈茅也杜預曰江淮之間一茅三脊藉才夜切薦也䄠古禪字􅀕也蛇丘蛇音移泰山邑邸丁禮切諸侯之舎在京師者率名曰邸並海歩浪切依也牟大莫浮切取也衣於旣切塡星音鎭德星漢紀十三通鑑卷二十一起元􅘬涒灘盡元黓敦䍧即壬申至壬午凡十一年丗宗孝武皇帝下之上元封二年瓠子胡悞切隄名在鄄城以南濮陽以北廣百歩深五丈蜚廉蜚古飛字本神禽名能致風氣身如鹿頭似雀有角而蛇尾文如豹文武帝象之以爲觀因取名焉眞番眞番國與燕相接後役屬朝鮮武帝滅朝鮮盡得其地置元菟郡徐廣曰一作畨汗畨音普安切朝鮮東夷國朝音潮鮮音仙其地有汕水故名朝鮮武帝滅之置樂浪郡即武王封箕子之地浿水普蓋切出樂浪郡王險古邑朝鮮王滿所都也臨屯徒渾切東夷國後以爲郡辰國辰即辰韓之國雍音壅汶水音問岀琅邪朱虚縣風諭風讀曰諷滇王音㒹西夷小邑武帝因降以爲益州郡勞深靡莫西夷小國皆與滇同姓史記深作寖三年浞野仕角切地名亭障之向切漢制毎塞要處别築爲城置人鎮守之謂之候城此即障也顔師古􅀃間使居棧切下同相路人相悉亮切應劭云戎狄不知官故稱相也路人其相名下並同韓隂漢書隂作陶參音三唊音頰相與相讀如字右渠子長漢書表作長路長如字路音各樂浪上音洛下音郎郡名元菟同都切郡名澅清澅清獲又胡卦切地名韋昭曰屬齊荻苴上音狄下千餘切地名功臣表云屬勃海􅄺陽乃結切古陽邑浮桴桴芳無切編竹木爲之大者曰栰小者曰桴四年穹廬上丘中切下凌如切匈奴旃帳也爲質音致結信也讇古謟字紿音殆欺也五年􅏦音潜廬江邑舳艫上音軸下音盧舳船後持柂處艫船前持櫂處樅陽千容切廬江邑並海歩浪切依傍也犇踶犇古奔字踶徒計切走也蹋也跅㢮上土各切下式爾切跅者跅落無檢局㢮者放廢不遵禮度六年岑娶漢書娶作陬子侯切烏孫王昆莫之孫名軍湏靡岑娶其官號也昆彌音縻烏孫之王號其先曰昆莫名獵驕靡今昆彌者顔師古謂昆取昆莫彌取驕靡黎軒漢書作犛靬靬與軒同又音鉅連切張掖郡驪軒縣名取此眩人眩與幻同即吞刀吐火之術驩潜西域小國在大宛西大益西域小國與驩潜國相接在大宛西扜冞上音烏下音彌漢書作扜彌西域國名在大宛東蘇䪥下戒切西域胡國府藏才浪切物所蓄也苜蓿上莫六切下息六切草名兒單于烏維單于死其子詹師廬立年少號兒單于太􅀄元年虎圈求逺切養畜之所漸臺子廉切漸浸也臺在池中爲水所浸故曰漸臺井幹樓井幹者積木而爲樓如井上木欄之形幹或作韓因杅羽俱切匈奴地名貳師大宛國城名其地多善馬武帝遣李廣利伐宛取馬因亦號貳師將軍郁成大宛支國哆昌野切二年飢罷讀曰疲浚稽上音峻下音雞山名在武威郡北匈奴以爲障蔽三年呴犂湖呴音吁匈奴單于名廬朐音劬匈奴中山名睢陽音雖梁國邑輪臺西域國名東接枝渠犁國橐佗徒何切或作駞韋昭曰皆肉似橐也匈奴以爲竒畜適爲適讀曰謫糒音備乾糇也煎靡煎子延切大宛貴人名昧蔡上音末下先曷切大宛將名亡走音奏疾趨也上邽音圭古邽戎國武帝開之置上邽縣屬隴西郡有下邽故曰上邽四年侵牟謨侯切言如牟賊之食苗也簿責歩戸切以文簿而一一責之且鞮上子余切下丁奚切匈奴單于名天漢元年緱王工侯切匈奴昆邪王姊子也左伊秩訾訾子移切匈奴官號煴火於云切謂聚火無焱者窖工孝切地藏也飲食上於禁切下讀曰飤齧魚結切噬也咽音宴吞也羝丁奚切壯羊也白氂力之切毛之強曲者二年創􅀄良切􅀃文傷也下同􅃰涂上音卓下以奢切漢書作􅃰邪匈奴中山名前行胡岡切下同㦸盾上几劇切有技兵也下食尹切所以扞身者通作楯葭葦上音家􅀃文葦之未秀者下音偉蘆也幟式志切旌旗之屬趣降趣讀曰促降胡江切服也鞮汘丁奚切山名輻方六切輪轑也壘石上盧對切謂放石以投人因山隅曲而下一片氷漢書片作半音泮大片也娸糵音欺齊人謂麴餅曰娸娸糵謂釀成其罪蹂人九切踐也空弮去權切又音眷弓弩弮也與絭同北首式救切嚮也雋字兖切又辭兖切姓也躧履山爾切履不著跟曰躧海瀕音頻又音賔厓也成娩音晚又音免匈奴王名漢紀十四通鑑卷二十二起昭陽恊洽盡閼逢敦䍧即癸未至甲午凡十二年丗宗孝武皇帝下之下天漢三年榷酒酤榷音角水上横一木以渡人者喻禁民酤釀官自開置如設木爲榷獨取利也瘞於例切􅀕地曰瘞謂埋其物示歸於地羈縻上几冝切下美爲切繫聮之意馬絡頭曰羈牛靷曰縻愞如􅁺如亂二切弱也四年累重上力瑞切下直用切謂妻子輜重余吾音餘又音徐山海經云鮮水北注徐吾徐廣曰余吾水在朔方髆伯各切太始元年巫蠱公土切巫者執左道以亂政而惑人蠱惑也指體即藥毒害人是􅀂行符厭俗之爲魅故曰巫蠱先賢撣音纒匈奴日逐王名二年涇水堅靈切水出安定郡涇陽縣开頭山東南入渭櫟陽音藥左馮翊邑袤音茂長也南北曰袤三年成山一作盛山音同在東萊不夜縣斗入海之罘音浮山名在東萊腄縣倢伃上音接下音于倢言接幸也伃美稱也字或从女任身任讀曰妊中意竹仲切當也四年不其音基山名因以爲縣屬琅邪郡征和元年捜踈鳩切求也索山客切取也二年􅃰竹角切郡名屈氂上丘勿切下力之切澎音彭縣名在東海脫簪上吐活切免也下淄岑切首笄也平反音翻謂録因覆奏使從輕也佯音陽恚於避切恨也訐居謁切面相斥罪也祟音粹􅀃文神禍也其字从岀从示示者􅀑神所以示人汙烏故切染也亦作洿鉗其炎切鑷也灼職略切炙也贛音貢挌殺古陌切擊也無且子閭切迸走北諍切散走也櫓籠五切楯也逺與敵戰故以車爲櫓用自敝也一􅀃櫓望敵之樓也楫棹漢書楫作輯音集字從木棹直教切短曰楫長曰棹以行船者鴻臚凌如切武帝置此名胡廣曰鴻聲也臚傳也所以傳聲賛導九賔毆讀曰驅秺都故切濟隂邑適嗣適讀曰嫡蹵子六切迫蹵鬲與隔同惓惓逵貟切忠謹之意蹋徒臘切踐也邘音于河内郡壄王縣邘亭是也本古邘國三年郅居之日切水名兠衘當侯切山名姑且子余切水名句山音鉤西山也陿轄夾切隘也徇徐閨切行示也梟首工堯切掛首於木上也􅁺俞絹切官屬狐疑狐音胡狐之渡河且聽且度其性多疑故稱不决者爲狐疑决睢息隨切匈奴官名燕然燕一千切山名在匈奴速邪烏地中壍七艷切阬也城父音甫沛郡之邑横橋横音光横門渭橋也四年靁古雷字黳煙奚切黒也悖歩内切亂也墾口很切耕也匄古大切乞也亦作丐蓍􅀛升脂切篙屬蓍􅀛筮者以爲卜䇿鬴古釡字山名耐乃代切忍也五伯讀曰霸苛音何細也後元元年馬何羅漢書作莾何羅以明德馬后惡其先有反者故昜姓莾僵居良切僨也穉直利切㓜也亦作稚珥仍吏切耳飾二年盩厔上張流切下竹乙切右扶風邑五柞宫材各切有五柞木因以名宫在扶風盩厔縣闥他逹切博雅云闥謂之門隆慮音廬河内邑鄂五各切江夏邑共養上居用切下弋亮切漢紀十五通鎰卷二十三起旃􅀩恊治盡柔兆敦䍧即乙未至丙午凡十二年孝昭皇帝上始元元年璽相氏切王者之印軫止忍切缾歩丁切琅邪邑磾下奚切綬是酉切又承呪切韍維也二年辟彊上必亦切下其良切墯殰罷極墯落也殰音讀敗也罷音疲勞也極困也言馬畜孕重者如是匈奴苦之郷亦曰嚮更之工衡切改也壷衍鞮丁奚切匈奴單于號龍城龍或作籠崔洁天西方胡皆事龍神故名大㑹處爲龍城餘見上三年椒房兹消切皇后所居也以椒和泥塗壁取其温而芳也四年姑繒兹陵切西夷別種葉榆葉一作楪音同西夷種名居葉榆澤因以爲號辟明辟音壁种音沖五年君姁况羽切􅀃文嫗也黃犢車犢徒谷切牛子也叱之尺栗切訶也蒯聵上苦怪切下五怪切衛靈公子儋耳丁甘切本南越地武帝元鼎六年開置郡至昭帝罷之眞番普安切本眞番國武帝元封二年開置郡至昭帝罷六年難乃旦切阻也操千髙切持也節旄上子結切下謨􅂁切節以旄爲之上下相重如竹節也朝露朝陟遥切朝露見日則晞以人命短促亦如之斧􅃏上匪父切或作鈇下王伐切大斧也鑊胡郭切鼎大而無足者衿居吟切衣系也號哭號胡刀切大呼也又哭也詩或號或呼歐血一口切吐也夕臨力禁切駑怯上農都切駘也下乞業切畏也貰時夜切貸也曹柯古河切春秋齊地曹翽欲劫齊威公處故稱曹柯鉤町上音劬下音挺西南夷國後爲縣屬䍧柯鉤或作句元鳯元年氐人丁奚切夷種名其人分竄山谷或號青氐或號白氐見魚豢魏略馬適建馬適姓建其名並如字肄羊至切習也䟆必吉切字或从足以止行清道也擅調上時戰切專也下徒釣切選也畫室胡卦切彫畫之室也俗作畫狼跋上盧當切下卜末切狼獸名狼跋箋云老狼有胡進則躐其胡退則跲其尾夸枯􅀲切通作誇趣郷上逡湏切下許亮切讙許元切通作諠讙譁也麋旻悲切鹿屬莵土故切與兎同獸名懣音悶又音滿􅀃文煩也絞古巧切縊也刺王七賜切謚法暴戾無親曰刺其字从束从刀訢與欣同四隊徒内切部也甌脫王上一侯切下土活切土室也以其所居甌脫之處呼也二年風漢風讀曰諷三年胿息隨切姓也番和番音盤張掖邑義渠西戎國名在􅄮梁涇􅃮之北烏亘烏亘本東胡之種爲冒頓所破餘衆散保烏亘山因以爲號冒頓讀如本字或音墨特匈奴頭曼單于之子鮮卑山名東胡別種因保此山遂以爲號偵丑正切覘也南旁歩浪切依也㷭與烽同度遼度徒故切遼水在幽州之域擊烏亘當度遼水往擊之應劭云四年轑陽音料或音遼地名在魏郡清淵縣扞冞上音烏下音彌西域國􅀛兹上音丘下音慈西域胡國在大宛之西白龍堆都回切樓蘭王所居之地懲艾艾讀曰乂反間居棧切反其本而間諜也尉屠耆音祁樓蘭王弟漢立爲鄯善王屏語必郢切屏蔽而言也匈許容切膺也通作􅅐横門音光在長安北伊循城漢書作伊修城在鄯善國漢於其中置屯田吏士塡撫竹刃切漢紀十六通鑑卷二十四起強圉恊洽盡昭陽赤􅁬􅀂即丁未至癸丑凡七年孝昭皇帝下元平元年敞昌兩切傳張戀切車傳方與音房豫山陽邑馮式馬讀曰慿式一作軾車前横木撙衘子本切挫也衘馬衘叱咤上尺栗切呵也下竹駕切噴也箠止蘂切馬䇿冒莫克切犯也匽與偃同耎脆上而兖切柔也下此芮切易斷也細旃旃與氈同􅀃文然毛也訢訢古欣字喜也橛其月切車鉤心也吸許及切内息也􅏽息廉切細也惰徒卧切􅈈也脯方矩切乾肉䣛行息七切脛節也通作膝漸漬上子廉切流入也下前智切浸潤也浹子牒切徹也晡奔謨切日加申時闇於今切黙然也襁緥上舉兩切下􅀘抱切􅀒兒衣攀援音爰引也屬吏之欲切委也湔洒上子㒹切澣也下先禮切濯也捽材兀切持也嗌音益咽喉九旒音流旌旗之旓諸侯九旒至軫誖布内切乖也詭禍過委切詭猶反也屬車朱欲切連也言車之相聮屬祅言於喬切地反物爲祓祅言怪也泄先列切漏也猶與猶如字又餘救切與音豫鄂逆各切驚也本作愕母内讀曰納珠襦汝朱切謂貫珠以爲􅃭形􅀂今革襦也晉灼􅀃斬衰七回切䘮服衣之衰也斬言衰服其下不緶直斬割之俳倡俳音排俳優諧戯也倡音昌樂土也湛􅃆湛讀曰沈又讀曰躭湛􅃆荒迷也旁午如字一從一横爲旁午􅁋辟讀曰僻邪僻也五辟頻亦切五刑也墨劓荆宫大辟組則古切􅀃文綬屬其小者以爲冕纓戇陟降切愚也良娣音弟漢制太子有妃有良娣有孺子凡三等間燥處間讀曰閑燥先到切謂寛靜髙敞之處長楊長仲良切楊木名因以名宫五柞材各切亦作莋有五柞木因以名宫與長楊皆在右扶風盩厔縣少内掖庭主府藏之官食讀曰飤幾居依切近也數焉所角切嫗威遇切􅀃文母也澓中翁澓芳福切中讀曰仲姓澓字中翁蓮勺上音輦下音灼左馮翊邑鄠音扈右扶風邑軨獵車軨音零文頴曰小車也前有曲輿不衣者近丗謂之軨獵車奭施􅃗切中宗孝宣皇帝上之上本始元年朝請才性切二年僦子就切賃也抵曰丁禮切拒也覆過敷救切蓋也乞之音氣與也悸音揆心動也偏袒徒旱切脫衣袖而偏露也虚耗呼到切損也趣讀曰促祁連祁上夷切匈奴中山名蒲􅀋並如字匈奴中海名按傳云其地有蒲􅀋澤是也在燉煌北三年娠矢人切妊也漢書身多作娠以累力瑞切託也去也丘吕切除也烏貟音云匈奴地名逗遛逗音豆又持遇切謂稽留不進也大父行胡浪切雨雪于具切自上而下曰雨丁令音零胡戎小國在康居北羈屬上音機羈縻也下音蜀繫属也瓦解胡買切散也滋欲郷漢書滋作兹郷讀曰嚮缿筩上音項下音同缿若今盛錢臧瓶爲小孔可入而不可出用受書令投於中顔師古􅀃告訐居謁切面相斥曰訐僵仆上居良切債也下芳遇切頓也鉤距上古侯切下􅍫許切晉灼曰鉤致也距閉也擿伏上它歷切挑也下房六切隱也凡隱匿者謂動發之四年轝羊茹切舁車也質樸匹角切素也鈆余專切青金也地節二年囏古艱字左大且渠且子余切匈奴宫號呼盧訾子移切匈奴王號南旁歩浪切依也西嗕居嗕奴獨切匈奴種也漢紀十七通鑑卷二十五起閼逢攝提格盡屠維恊治即甲寅至己未凡六年中宗孝宣皇帝上之下地節三年勞來上盧到切下盧代切謂慰勉而招延之下同箴只深切箴規飭讀與敕同整也籞偶舉切禁苑也縱横上子用切放縱也下胡孟切恣横也貸種上吐戴切假貸也下之勇切五糓種也繡絪馮絪亦作茵馮讀曰慿茵蓐也謂以繡爲絪馮輓音晚牽引也繕時戰切補也苑於阮切蓄獸之所女曹女音汝曹軰也壹間居莧切謂相去才間􅂩耳躢徒臘切踐也燕見於甸切安也息也與宴同駮北角切傅生傅讀曰附伯讀曰霸復屬之欲切連也敺與驅同捶楚上之蘂切擊也下創所切痛也鍜練上丁貫切鍜治也下郎甸切煉鑠也鞠獄居六切推窮也讞魚蹇切平議也删定所艱切除削也爲質職利切憙許吏切渠犁西域胡地與輪臺相接武帝時置校尉屯田媪烏浩切女老之稱四年窶人其羽切貧而無禮者􅃛下八切􅃛慧讙言許官切又音喧卒卒音猝忽遽之貌趙衰􅀄爲切名衰字子餘事晉文公謚曰成季顓與專同直守直讀曰值羔居勞切羊子也莵吐故切亦作兎鼃烏􅀲切蝦蟇也惲於粉切直突陁没切當作堗竈窗謂之堗嘿然密北切通作黙上行胡郎切列也燋即消切傷火也芒刺上武方切草耑也下七賜切草芒也字或作莿阿衡伊尹官也阿􅀝衡平言天子所􅀝群下取平故曰阿衡闇與暗同湛持林切湛溺財與􅂊同趣之讀曰促醖釀上紆問切下汝亮切醖釀造酒也言宣帝不早防閑霍氏致令貫盈宗族誅夷是醖釀浸漬而成其邪謀也噍􅀋作􅀏切無復有活而噍食也青州俗呼無子遺爲無噍􅀋鹽賈賈讀曰價售直也瘐勇主切病也或作瘉音同課殿最課苦卧切試也殿丁見切後也課之當居後最祖外切凡要之首也課之當居先海瀕音頻又音賔涯也岸也潢池音黄積水曰潢乘傳張戀切車傳鉏鉤上牀魚切薅所用也或作鋤下古侯切鐮也元康元年訾讀曰貲蠭氣蠭與鋒同言鋒銳之氣顔師古􅀃愍美隕切痛愍小解讀曰懈怠也莎車素和切西域國㰱色洽切􅀃文歠也春秋傳㰱如忌馬象龍象通作像馬象龍者言馬形似龍也爲比必寐切並也二年華倢伃華户化切姓也倢伃解見上祈律先的切分也謂分破律條厨傳張戀切厨謂飲舎傳謂傳舎稱過稱尺孕切愜意也過者過度之過几來者稱其意而過去忿兵芳問切怒也更治工衡切猶經歴也痿人佳切風痺疾也梟古堯切不孝烏也凡言之不祥者人謂之梟音三年供張上居用切下竹亮切陳設也百兩力􅃞切乘也共具共讀曰供老誖布内切惑也贏音盈有餘也郵亭音尤行書舎四年晻讀曰暗湟音皇水名出金城郡臨羌縣塞外東入河義渠安國義渠姓也先零音憐羌種名旁縁歩浪切依也抵冒莫北切謂記突而前罕开开口堅切罕羌开羌皆西羌別種漢破滅之置縣以其人處於地因以名之屬天水郡分別筆列切異也稔如甚切歳熟曰稔漢紀十八通鑑卷二十六起上章涒灘盡元黓閹茂即庚申至壬戌凡三年中宗孝宣皇帝中神爵元年泰畤音止􅀕處曰畤鈍徒困切不利也筯舉欣切肉之力也矻矻口骨切勞極貌延袤延長行也袤音茂南北曰袤東西曰廣溷胡頓切亂也吻武粉切口角也齧䣛上五結切噬也下息七切孟康曰良馬低頭口至䣛故曰齧䣛乘旦食證切良馬駕則旦至故曰乘旦靶音霸轡革也絺綌上丑基切細􅁑也下乞逆切麄􅁑也鬱燠上紆勿切下於六切甚􅀬也貂丁聊切䑕屬岀丁零國煗乃短切與暖同圉空魚巨切囹圉也庭燎力小切庭設大燭也悃苦本切悃愊鬻弋六切賣也冽音列寒也唫魚音切古吟字蜉蝤音浮由甲蟲也好叢聚而生朝生而夕死蝤通作蝣俊艾艾讀曰乂遞鍾晉灼曰遞音遞迭之遞二十四鍾各有節奏擊之不常故曰遞鍾琴名也逄門子逄皮江切即逄􅀩烏號胡刀切楚有柘桑烏栖其上支下著地不得飛欲墮號呼故曰烏號一􅀃黃帝乘龍上天小臣不得上挽持龍􅏋􅏋拔墮黃帝弓臣下抱弓而號故名烏號沛普蓋切流貌呴嘘上許于切下音虚岀氣貌呼吸許及切内息也逺于願切離也財擇財與裁同驁與傲同倨也任子如鴆切保也以父任爲郎故曰任子琱瑑上丁聊切下音􅂐刻鏤爲文也浩亹上音誥下音門金城邑顔師古曰浩水名亹者水流峽山岸深􅀂門也銜枚上胡衫切下謨杯切枚狀如箸横銜之欲其無聲陿中音狹山陗而夾水曰陿挑戰徒弔切擿嬈敵求戰也數責所矩切計其目而責之徼上堯切要也齎剘􅀆切持也鮮水音仙山海經云北鮮之山鮮水出焉北流注徐吾斛胡谷切十斗曰斛􅂢余專切棄也拊循拊古撫字和輯輯與集同皸瘃上音軍拆裂也下袟玉切寒創也敦煌敦音屯郡名莫須小種羌名懈㢮式爾切放也燔符􅀽切爇也沮才汝切沮壞糴亭歷切市􅂖也卒有卒讀曰猝茭稾上居肴切乾芻也下古老切禾稈也畮古畒字朞月居之切復其時也徼幸古堯切通作僥乘間居莧切空􅂩也罷敝罷讀曰疲媮託侯切苟且也鈔􅀄教切略取也二年黃羝都黎切羌人名浩星賜浩星姓也賜其名留且子閭切羌人名猶非先零大豪也帝紀作酋非疑誤泄先列切漏也蓋寛饒蓋公盍切姓也召時照切召公奭也通作邵詆挫上典禮切訶也下祖卧切摧也藜藿上怜題切下忽郭切草名旁塞歩浪切依也歐一口切吐也郝􅀫呼各切匈奴王號握衍朐鞮朐音劬鞮丁奚切匈奴單于號耳孫耳音仍昆孫之子爲耳孫稽侯㹪先安切又所姦切後爲呼韓單于烏禪幕禪音蟬西域小國先賢撣音纒匈奴日逐王名􅀛兹音丘慈西域國薄胥堂胥先余切後爲屠耆單于三年歙然許及切盛也紿音殆欺也恚於避切恨也奥鞬上音郁下居言切匈奴王號漢紀十九通鑑卷二十七起昭陽大淵獻盡元黓涒灘即癸亥至壬申凡十年中宗孝宣皇帝下神爵四年鷙脂利切􅀃文擊殺鳥也比郡頻二切連也中傷竹仲切當也饋遺上求位切餉也下弋季切贈也臘力盍切建丑之月爲臘或作臈正臘歳之首月爲正之盈切姑且子余切匈奴中水名谷蠡上音鹿下盧奚切匈奴王號姑瞀樓頭瞀莫侯切屠耆單于子名五鳯元年呼揭丘例切西方匈奴後爲呼掲單于唯犂當户唯弋癸切匈奴官號五單于屠􅂄單于呼韓邪單于呼掲單于車犂單于烏籍單于闟敦上音蹋下音頓匈奴中地名爭奏則􅀱切進也酒炙之夜切燔肉也二年倨慢居御切不遜也呼遫累遫古速字累力追切匈奴官號也郅支骨都侯郅之日切呼韓兄呼屠吾斯自立爲單于號也脛脛形定切直貌窶數上其羽切下山羽切戴器也三年鶡雀鶡音芬字本作鳻通用耳鳻雀大而色青出羌中顔師古􅀃澆淳堅堯切薄也酒不雜爲淳以水澆之則味漓薄散樸匹角切僕木質也割之則散解怠解讀曰􅈈妖於喬切災也夲作袄軼音逸過也明飭飭讀與敕同誡也奸音干求也四年穰人常切豐也賈讀曰價糶他弔切出糓也娯元俱切樂也晻與暗同炰歩交切灸也自勞來到切拊缶上方武切拍也下方乆切瓦器也擊之以節歌蕪穢上微大切荒蕪下烏外切惡穢萁音其豆莖也譚徒南切愬蘇故切譛也甘露元年絮舜絮女居人餘二切姓也枹鼔風無切擊鼓眩胡眄切亂視也狹胡夾切隘也懦奴卧切弱也且鞮侯且子余切鞮丁奚切匈奴單于號屈彊屈其勿切通作倔梗戾也銖婁渠堂銖音殊婁音力于切呼韓單于之子細沉瘦音捜烏孫狂王之子係􅃈上胡計切繫束也下損果切銀鐺也本亦作鎻檻車户黤切載囚車觧見上翖即翕字馮嫽音了嫽者慧也故以爲名竺次張六切姓也二年嚻音敖萯陽宫萯音倍秦文王所起在右扶風鄠縣屬玉觀屬之欲切晉灼曰屬土鳥鵁鶄以名觀也􅅃苦緩切叩也三年盭綬盭古戾字草名也以戾染綬亦諸侯王之制也棨㦸棨音啓有衣之㦸也襲席入切一稱爲一襲猶言一副衣服也綺去􅀝切細綾也縠胡谷切羅縠阪甫逺切坡者曰阪糒音備乾飯驁五到切黃龍元年烏揭丘例切夷狄國名堅昆堅昆國去單于七千里綜核上子朱切讀􅀂緫下夏革切讀􅀂覈器械胡介切有盛爲器無盛爲械鮮先踐切少也信讀曰伸漢紀二十通鑑卷二十八起昭陽作噩盡屠維單閼即癸酉至已卯凡七年孝元皇帝上􅀄元元年厩居又切馬舎也下同放甫往切效也下同笥先嗣切竹器也圎曰簞方曰笥以塡顔師古曰塡讀與窴同取女取讀曰娶臯古罪字二年郷納郷讀曰嚮詭辯古委切詭違也違道之辯忤五故切逆也下同睚眦上五懈切下仕懈切嗔怒貌被皮義切加也規橅橅音模具字从木規倣也日􅉴阻力切日過中也華龍華胡化切姓也壓烏狎切壞也佽飛佽七四切武帝時宫名如淳曰漢儀注佽飛其矰繳以射鳬鴈給􅀕祀也嚴籞偶舉切射苑也詘辱曲勿切詘責挫辱之也牢獄郎刀切一曰狴犴怏怏􅀝兩切志不滿也趣讀曰促鴆直禁切鴆鳥黒身赤目食野􅁑以羽畫酒飲之立死珠厓冝佳切通作崖解見上洲上之由切水中可居曰洲賈􅂢之􅂢余專切賈􅁩曽孫東漸將廉切入也浸也與讀曰豫越裳氏夷狄國名王充論衡字作越甞九譯夷益切解見上悁悁縈年切忿也魯仲連傳棄悁忿之節擠之子奚切又子詣切墜也蠢爾尺尹切蟲動貌駱越音洛顔師古曰即西甌也瑇􅈘上音代下音昧文甲也􅀛屬􅍊古暴字三年煬餘亮切五年秣馬莫葛切食馬糓也康居音渠餘財財與􅂊同敺與驅同永光元年撞丈江切擊也亟居力切疾也酎直祐切醇酒刎武粉切斷也簫先彫切參差管樂象鳯之翼韶時昭切舜樂名雜糅乆救切糅和也舛午上尺兖切舛錯也下五故切午逆也乖刺刺來曷切僻也戾也稠直流切多也否泰皮鄙切卦名鯀工本切崇伯之名即檮杌也共工居容切少皥氏之後即窮竒也驩兠火官切帝鴻氏之後即渾敦也偕音皆俱也讇古謟字䛕也間􅂩上居莧切間空也下乞逆切􅂩罅也詆丁禮切毀也辱也譁火􅀲切讙譁也悄悄千小切憂貌愠於問切怒也更相工衡切償也比周頻寐切忠信爲周阿黨爲比歙歙訿訿歙許急切訿音紫詩潝潝訿訿毛氏云潝潝然患其上訿訿然思不稱其上兩觀古玩切兩觀謂闕也孔子爲魯司冦七日誅少正卯於兩觀之下放逺于願切放逐也逺離也詖彼義切險言曰詖猶豫猶夷周餘救二切齗齗牛斤切忿疾之意耆老渠脂切方言云長也髠鉗上苦昆切去髪也下其炎切以鐡束頸二年使錯千故切置也精祲子鴆切精氣感祥盪大浪切動也淑問殊六切善也蕩滌上徒莾切下徒歷切徙也除也巫蠱公土切蠱惑也觧見上彡姐上所廉切又先廉切下音紫顔師古曰今西戎尚有此姓而彡音先冉切料敵料音聊量也發調徒弔切賦也漢書作發軵淮南子曰内郡軵車而餉軵音冗推也並和胡卧切應也偏禆頻移切副助也弋陽與職切汝南邑資治通鑑释文卷第三
