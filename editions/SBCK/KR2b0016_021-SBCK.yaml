body:
  text: 右宣義郎􅁥成都府糧料院史炤唐紀十一通鑑卷一百九十五起強圉作噩五月盡上章困敦即丁酉至庚子凡三年有竒太宗文武大聖大廣孝皇帝中之上正觀十一年鑒形居䧟切亦作監竟夭於矯切壽不得長也漢書龔生竟夭天年丗襲席入切子孫丗丗因襲爵土爲王也壞宫古聵切毀之也而狎轄甲切近也姦宄居洧切􅀃文在外爲盗在内爲宄弦韋胡田切韓子西門豹性急偑韋以自緩董安于性緩佩弦以自急也皆勞􅀰到切慰也乘輿天子法駕六馬駕也蔡邕獨斷曰天子至尊不敢渫瀆言之故託於乘輿也昧旦莫佩切昧旦丕顯謂於昧旦未明之間巳大明其德言勤也書昧爽不顯坐以待旦饑歉苦簟切食不滿也豐穰如羊切詩自天降康豐年穰穰縲絏上倫追切下私列切論語注云縲黒索絏攣也所以拘罪人殪壹計切殺也馬鐙都鄧切馬鞁具搏之伯各切擊也士彠鬱縳切十二年九卿漢以太常光禄勲衛尉太僕延尉大鴻臚宗正司農少府爲九卿後魏以來卿各雖仍舊而所蒞之局謂之寺因曰九寺八座漢光武分尚書爲六曹并一令一僕射謂之八座庶孽魚列切庶子也窺窬容朱切私視也令狐德棻令盧丁切複姓棻符分切譜諜􅀶古切籍録樊灌古玩切樊噲灌嬰卬然五剛切髙也販鬻上方願切下余六切賣也松檟古馬切山楸砥柱諸氐切陜州有厎柱山山有三門河水所經太宗勒銘焉東京賦厎柱輟流注云山居河中猶柱然也飼羊祥吏切亦作飤倒戈都皓切紂之衆服周仁政無有戰心前徒倒戈自攻于後也糾繆靡㓜切戻也皇甫方􅀨切複姓恚之於避切恨也吐蕃方煩切本西羌屬處河湟江岷間有發羌唐旄等者蕃發聲相近故其子孫曰吐蕃或曰南涼秃髪利鹿􅀌之後以秃髪爲國號訛曰吐蕃也賛普滂午切吐蕃謂彊雄曰賛丈夫曰普故號君長曰賛普弃宗弄讃吐蕃君長名亦名弃蘇農亦號弗夜氏党項多曩切漢西羌别種其地古析支也白蘭􅀰干切白蘭羌吐蕃謂之丁零左屬党項右與多彌接松州髙祖置以地産甘松爲名諾州匿各切髙祖置􅀠靈州都督府把利􅀘雅切慶州有把利氏族與吐蕃姻援㓂􅁁縊壹計切自經也洮河道吐刀切洮水岀西羌中餘級訖立切秦法斬首一賜爵一級因謂斬首爲級都尉揵山尉紆勿切揵巨偃切獨邏水郞佐切與都尉揵山皆古匈奴地苾蒲結切爲韀則前切馬鞍具咥利失咥丁結切西突厥可汗號咄陸當没切大啜姝恱切碎葉蘇對切西突厥地名俟斤渠之切突厥號大臣曰俟斤統吐屯徒敦切突厥臣伊列水力孽切在突厥中十三年端揆巨癸切僕射參揔百揆又曰端右端揆之司謂僕射也度支徒各切户部屬官掌天下租賦物産歳計所出而支調之鄜芳無切川名鋒鏑丁歷切箭鏃瘢痍蒲官切瘢痕欒黶乙減切左氏傳晉士鞅曰欒黶汰虚巳甚猶可以免其在盈乎黶死武子所施没矣而黶之怨實章後盈見逐茅土謨交切古者天子以五色土爲壇封諸侯取其方面土苴以白茅授之使立社於其國也紊文運切亂也勦絶書天用勦絶其命勦截也截絶而滅之音了六切又子小切掘溝其月切搰也䑕噍才􅀏切嚼也繒慈陵切帛也辟仗皮亦切賀邏鶻胡骨切突利之子也蠻俚良爾切蠻屬藩屏方元切下􅀘鼎切有患難則往捍禦之爲之藩屏璽書斯氏切王者印所以爲信也抄掠楚交切劫財物狼狽愽蓋切狼似犬銳頭白頰髙前廣後狽狼屬也生子或欠一足二足相附而行離則躓故猝遽謂之狼狽餌藥仍吏切服餌呪術職救切詛也婆羅門蒲何切天竺國一曰婆羅門輻湊上方六切下千候切湊㑹也如輪輻之共於轂也羚羊角盧經切爾雅麢大羊麢與羚同郭璞注云麢似羊而大角圎銳本草羚羊有神夜􅀫以角挂木不著地角有節如人手指握痕至堅勁駁佛北角切駁猶校鏺汗普沫切即西域寧逺國本拔汗那或曰鏺汗居西鞬城在眞珠河之北吐火羅它覩切西域國元魏曰吐呼羅居葱嶺西古大夏之地石史何西域康國枝庶分王者曰安曰曹曰石曰米曰何曰火㝷曰戊地曰史丗謂九姓鏃曷作木切山名火燖觸水昆燖徐心切夷狄小國在伊列水界役屬西突厥十四年􅋲苦旱切褚竹吕切姓又丑吕切妥吐火切炫熒絹切流􅀑國東夷國也其人依嶼散居東南航海十五日行乃至靺鞨上莫曷切下何􅁑切重三譯夷益切􅀃文傳四夷之語者曰譯重謂叙譯其詞語度此三重之國乃至於此也余志市遮切詗者翾正切知處告言詰朝起吉切平旦也物故魏臺訪問物故之義髙堂隂荅曰聞之先師物無也故事也言死者無復所能於事故也巢車鋤交切在氏登巢車以望􅀳軍巢車車上爲櫓也瞰苦濫切所中竹仰切耗火到切耗損也撮粟倉括切六十四􅁰爲圭四圭爲撮三指撮之也西州交河郡也交河城髙昌王所都漢車師前王廷也髙班逋還切班給也櫟陽音樂邑名屬京兆府葺橋七入切又音集左氏注葺覆也謂以草覆之也鑾輿盧官切禮記注鸞輅有虞氏之車有鸞和之節西都賦乘鸞輿備法駕木橦徒紅切木名花可爲布岀字書犬酺音蒲酺之言布也王德布於天下令得㑹聚飲食也帷箔白各切簾也漢書帷簿不修飲盗馬於禁切秦穆公亡善馬岐下野人共食之穆公曰吾聞食善馬者不飲酒傷人乃皆賜酒而赦之絶纓音嬰楚荘王見􅀃苑蚛顙直衆切蟲食物也齅之許救切括古活切州名刀筆如字古者用􅂤牒吏皆以刀筆自隨所以削書也惟谷古禄切詩人亦有言進退惟谷谷窮也鄭注云前無明君􅁍迫罪役故窮也皇儲陳如切儲嗣謂皇太子唐紀十二通鑑卷一百九十六起重光赤􅁬􅀂盡昭陽單閼三月即辛丑至癸卯凡二年有竒太宗文武大聖大廣孝皇帝中之中正觀十五年琅邪余遮切沂州叚氏徒玩切姓也陪臣蒲枚切諸侯之臣稱於天子曰陪臣陪重也以赭止也切赤上俟利苾俟渠之切苾蒲結切阿史那思摩也四年與頡利俱禽前年立以爲可汗􅁥國古衘切左氏太子君行則守有守則從從曰撫軍守曰監國巫覡刑狄切􅀃文齋肅事神明者男曰覡女曰巫複姓方六切重也尫弱烏光切羸也宅兆直紹切宅墓穴也兆􅉷域也安厝倉故切置也窀穸上株倫切下祥亦切窀厚也穸夜也左氏惟是窀穸之事謂葬埋猶長夜也􅀛筮是制切􅀛所以鑚灼觀兆以卜吉凶問蓍曰筮下昊札色切日昳也司墓莫故切鄭掌公墓大夫徒屬之家而窆彼驗切下棺也左氏傳作塴音北鄧切義同擗踊毗亦切撫心也踊跳也撫心而跳哀痛之至也荼毒同都切苦菜也言巳之苦毒如荼也莞爾華板切小􅀏皃臨壙苦謗切墓域鄯善上戰切西域國名百濟子計切西域國本扶餘别種孛蒲没切孛星蓬然光芒短惡氣所生亂兵之象或謂之彗所以除穢布新也太微武非切太㣲星五帝之坐天子之庭也宦官胡慣切閹寺逹哥友居何切紇干下没切虜複姓苫塊上始占切下苦對切禮記寢苫枕塊哀親之在土也苫編草一榱所追切􅀃文秦名屋椽齊魯謂之桶周謂之榱髙麗力支切扶餘之別種其國即漢樂浪故地紿之蕩亥切欺也平壤如養切髙麗所都平壤城也彫瘵側界切病也豐稔而甚切􅂖熟也伊闕如字山名呉起曰紂之居伊闕在其南東京賦廻行道乎伊闕邪徑捷乎轘轅在河南嵩陽息中切嵩陽河南縣名有嵩山霫息入切東北夷名燒薙丈几切芟也又他計切糧糗丘救去乆二切乾餱也偵者丑正切問也掎角舉綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之漲天知亮切塵埃􅁳􅁳亘天如水之張也赤柯櫟居何切櫟音歷地名陳亘陳讀曰陣亘古鄧切長矟所角切亦作槊思結部思結部在薛延陀故牙五臺代州縣名有五臺山十六年洎巨至切馬箠止蘂切馬檛也重數直隴切色角切素褥儒欲切茵褥馬乃老切本亦作碼腦石次玉遏索昔各切山名無頼落蓋切頼恃也又許愼云頼利也無利入於家張掖夷益切故匈奴昆邪王地漢武帝開應劭曰張國臂掖故曰張掖酒泉如字漢郡名武帝開其水􅀂酒故曰酒泉也又舊俗傳云城下有金泉泉味如酒烽燧徐醉切烽燧火也古者以烽燧招兵置之邊亭有警輙舉火騰煙京邑及諸侯望以相應也米國如字唐國枝庶王者郢縱公足用切宇文士及謚曰恭劉洎曰亡及過自奉養不可謂恭乃改曰縱屈強渠勿切下巨兩切屈本亦作倔倔強梗戾也契苾蒲結切虜複姓泉蓋蘇文蓋蘇文或號蓋金姓泉氏自云生水中以惑衆馮翊上符中切下逸織切縣名屬同州蒲反甫逺切河東縣名故曰蒲秦始皇東廵見長坂故加反轉餉式亮切轉運也餉饋也晡食奔謨切日加申時席藁古老切席芻藁以自貶􅂼食山於切􅂼食菜食也愎諌弼力切很也十七年羽葆愽抱切羽葆華蓋天子之儀衛也又唐制鼔吹五部一鼓吹二羽葆羽葆部有十八曲鼔吹尺僞切音律管壎之樂鄠侯古切邑名屬京兆府㓜穉直利切亦作稚童稚也自售承呪切賣也鄖干分切古漢南之國尚乘䋲證切尚主也主車乘官直長展兩切尚乘􅈰有奉御二人直長十人隂募莫故切廣求也昵近尼質切亦作暱昝子感切姓猛彪􅀘休切虎文悛改千全切改寤也性褊俾面切衣小曰褊喻性不寛大股慄力質切股戰慄言懼甚也樓堞音牒城上女墻也一名俾倪睥睨敵也攅刃徂官切叢也煨燼烏回切煻煨􅀬􅁅也牖閒以九切穿屋䆫或抉一決切挑也檛折陟􅀲切馬箠援槍上音􅀽下千羊切刺之七亦切榆杜音踰縣名屬遼州郟城訖洽切汝州縣名揣知初委切揣摩辯給訖立切利口捷給厮役息移切養馬析薪者一落欲效爲部落瓣髮皮莧切􅀂虜人編髪被之五狼頭纛大到切又音毒突厥之先爲鄰國所滅盡殺其族至一兒且十歳見其小不忍殺乃刖足斷臂棄草澤中有牝狼以肉餌之及長與狼交合遂生十男各爲一姓故阿史那突厥牙門建狼頭纛示不忘本也太子效突厥故作之幡旗孚􅀽切旌旐緫名穹廬丘中切夷虜􅏧帳其形穹隆僵仆芳遇切踣也􅋇面陵之切剥欻起許勿切有所吹起一設突厥别部典兵者曰設風勵風讀曰諷乘亹許愼切與釁通頓丘都困切澶州縣琵琶上頻脂切下蒲巴切琵琶體圎脩頸而小岀胡中漢武嫁宗女於烏孫爲馬上樂以慰郷國之思推而逺曰琵引而近曰琶洋徐羊切州名駙馬符遇切都尉官漢武帝置有奉車駙馬􅀐三都尉􅀳元帝後罷二都尉惟留駙馬奉朝請諸尚主者唐紀十三通鑑卷一百九十七起昭陽單閼四月盡旃􅀩大荒落五月即癸􅆗至乙巳凡二年有竒太宗文武大聖大廣孝皇帝中之下正觀十七年參鞫上倉含切下居六切參互而鞫治之祐川府爰救切岷州有府曰祐川府平􅁄訖立切邑名屬趙州賀蘭何佐切魏有紇伏者爲賀蘭莫何弗因以爲氏蹉跌上倉何切下徒結切蹉跌足失據藩邸都禮切邸舎諸侯王入朝至京師所舎也億度乙力切本亦作臆億度意之也度音徒各切猜貳倉才切疑也禮秩直質切次也憮然罔甫切猶悵然也屬心之欲切心有所屬係也悖逆蒲昧切又蒲没切亂也酺薄胡切􅀃文王德布大㱃酒窺伺相吏切奄窺無恙餘亮切憂也道地漢書欲爲道地注云爲之開通道路使有安全之地也􅀒姊房􅇲切背也須􅁅詢趨切本亦作􅂡在頥曰䰅可療力照切治病齧指倪結切噬也沈醉持林切書沈亂于酒沈􅁳言醉甚宫闈于非切宫中門眞珠薛延陀可汗名橐駝上撻各切下徒何切匈奴竒獸言能􅀒囊橐而䭾物也親迎魚慶切禮男女親迎男先於女剛柔之義沙磧七迹切水渚有石者俟斤渠之切北虜謂大臣曰俟斤盪平徒沆切又他浪切滌也鴻私胡公切大也私謂恩私有卒臧律切終也易有始有卒者其帷聖人乎龍沙廣志流沙在玉門􅀜外有三名三龍沙􅂢余專切棄也餌之仍吏切飤也匍匐上薄胡切手行也下蒲墨切伏地也或作扶伏去食起吕切除也踣所蒲墨切仆也覽起居魯敢切欲觀起居所記注也相里息亮切複姓委質職日切形也委其體以事君戢兵側立切藏也黔渠金切州名朝集使直遥切諸州郡奉貢物入京者謂之朝集使僦屋即就切賃也雉奴文几切髙宗小子懦奴卧切又奴亂切弱也折􅂤古限切折簡猶今言片紙也十八年莫離攴髙麗官名蓋蘇文爲之指麾許爲切旌旗之所指麾顧眄眠見切􅀃文目偏合一曰袤視字或作盻音普莧切襲服質渉切失氣金湯他郎切韓子曰雖有金城湯池詰欺吉切問也凝旒力求切凝注冕旒一意於聽虚􅁭居吟切虛其􅁭懐不自滿假對􅏡余章切對荅也荅受天子之命而稱揚之飛白蔡邕所造百艘蘇刀切船緫名渉獵力涉切言泛覽流觀如涉水獵獸不精專也骨鯁古杏切鯁與骾同骨彊四攴故君有忠臣謂之骨骾論量龍張切量度鍾愛諸容切晉書情之所鍾鍾聚也歔欷上音虛下許其切歎息皃焉耆於䖍切下音攴西域國屈利啜居勿切西突厥臣頡鼻奚結切焉耆王之弟郷導許亮切爲之前導導所趨嚮也髙武髙麗王髙建武也前爲莫離攴所殺係頸胡計切係頸示欲自殺也漂揺匹招切􅀂萍蓬之漂摇轉徙也澠池莫踐切邑名屬河南府元璹神六切猝下蒼没切洺彌并切州名忘拜亡亮切無主謂顔色無定震懾質渉切懼也驍衛堅堯切健也戰艦戸黤切禦敵船也四方施板以禦矢梯衝天􅀺切雲梯衝車所以攻城也安蘿盧何切山名器械戸戒切有盛曰械無盛曰器幽薊吉詣切並州名遼碣其謁切遼水碣石之地營頓軍營頓舎也都困切愜服詰叶切快也憤歎房吻切懣也鬱邑乙及切亦作悒不安也十九年漕渠在到切運於水也􅂍汙兹郞切受賕留臺留守臺也叱令尺栗切訶也鄴逆怯切縣名屬魏郡御榻託盍切牀榻􅀻裝側霜切自以家貲從軍縣官懸絹切縣官謂天子也夏家王畿内縣名内縣即國都也王者官天下故曰縣官鎭守舒救切努力奴古切方言勉也北趣逡遇切亦作趨趨嚮也甬道余隴切道上加土元莵本漢武帝所置郡莵同都切料配力弔切史記宣王料兵料數也撤之敕列切抽也蓋牟莫侯切髙麗地太宗旣拔蓋牟城置蓋牟州鴨渌水乙甲切髙麗馬訾水出靺鞨之白山色􅀂鴨頭號鴨渌水泥淖女教切泥也勍敵渠京切強也春秋傳勍敵之人􅅡其儒劣切燒也延燒延面切吮血租兖切嗽也㑹暝莫定切夕也唐紀十四通鑑卷一百九十八起旃􅂪大荒落六月盡著雍涒灘三月即乙巳至戊申凡三年有竒太宗文武大聖大廣孝皇帝下之上正觀十九年刀􅃏王伐切斧也唐幟式志切旗幟妻孥農都切子也糧仗直亮切糧食仗兵器省事息井切察也耨蕯新史作傉奴篤切音同薩音桑葛切耨薩髙麗官比都督也延壽惠眞耨薩髙延壽北部耨薩髙恵眞南部靺鞨音末曷古肅愼地後魏謂之勿吉其國數十部或附髙麗或臣突厥泥潦魯皓切泥濘水潦對盧龍都切髙麗官十二級首曰大對盧内芟師銜切結斾蒲蓋切旗也繫旗曰斾未冠古亂切年二十曰冠指蹤子容切以手指示其蹤跡也詒徒亥切欺誑鼔角吉岳切角軍器徐廣車服儀制曰角前丗書記所不載或云夲岀羌胡以驚中國之馬也橋梁力張切爾雅隄謂之梁郭璞注云即橋也或曰石絶水者爲梁凢橋有木梁石梁舟梁皆謂橋耳􅂰行息七切漢書諸侯入轅門􅂰行而前言畏懼俯伏不敢安行也跳梁徒彫切躍也梁強梁後黃城新舊史皆作后黃駐蹕壁吉切警蹕也天子行幸所止故曰駐蹕標識卑遥切下職吏切爲立表記之也􅍕至衣檢切􅍕至猝至也更以古衡切翻也候􅀐胡奏切􅀐士爲斥候者諜者逹恊切間諜反接即涉切反縛也閒行居莧切􅀼道閒行謂竊取他道不自公顯投􅂩而行也徑詣古定切徑詣猶直造也徒跣蘇典切徒跣足親地也賜屩訖約切草履亟來去吏切躁擾則到切疾也老耄草報切年八十九十曰耄兇懼許拱切恐懼也徼幸古堯切亦作僥皆躡眤輙切蹈也雞彘直例切豕也饗士許兩切飼軍士以酒食襲我席入切輕行無鍾鼔曰襲縋城馳僞切垂繩而下衝車昌容切橦城車也詩臨衝閑閑礮石披教切機石木柵測革切編立木爲之以徇松閏切言使人將行徧示衆土以爲戒也班師逋還切整軍還也屏跡必郢切屏蔽賜縑吉嫌切繒也爲殿丁練切軍後曰殿馬鞘仙妙切馬上刀劒室也臨􅂘力禁切飛􅀐方微切太宗㨂膂力驍捷善􅀐射者謂之飛􅀐衣五色􅂁乘六閑馬上岀遊幸則從駕臨渝􅀜容朱切上曰臨閭􅀜在平州石城縣褐袍何葛切織毛爲布曰褐病癰於谷切癰癤歩輦力展切輦人歩挽車也吮癰粗兖切􅎳也嵐盧含切州名朝衡胡庚切執朝之權衡弱水日灼切水經云弱水岀張掖删丹縣西比至酒泉㑹水縣入合􅀺山腹山海經云弱水岀崑崙墟西南隅也二十年喬師望喬渠嬌切姓也相屬之欲切相連屬也所解下懈切曉也辟仗匹亦切執兵仗以辟行人又甫亦切圗䜟楚禁切符命之書踈勒山於切西域國距京師九千里而贏朱俱波亦名朱俱槃漢子合國也瀚海侯旰切北海名阿跌徒結切契苾上欺訖切下蒲結切北忙丁切溟海編列卑眠切編户之列編户者謂列次名籍也混元胡木切元氣混然謂太古之時也狷介古泫切又吉􅁺切狷者有所不爲介耿介臧否􅀘靡切臧否猶善惡也銜之乎巖切帑藏他曩切下才浪切金帛所藏僧祗翹移切佛書阿僧祗殫人多寒切極盡也熊蹯符􅀽切熊掌也左氏楚太子商臣以宫甲圍成王王請食熊蹯而死弗聽杜預注云熊掌難熟兾乆將有外救故此云假餘息於熊蹯也雀􅑹丘候切鳥子生哺者史記趙公子章圍主父主父不得食探雀􅑹而食之帷扆隱豈切爾雅牖户之閒謂之扆􅂰下息七切孝經故報生之膝下以養父母日嚴􅀒米房􅇲切子路曰昔者由也事二親之時常食藜藿之實爲親􅀒米百里之外親没之後南遊於楚從車百乘積粟萬鍾願欲食藜藿爲親􅀒米不可復得也劬勞權拘切劬勞搢紳即刃切搢紳之士搢笏而垂紳搢挿也挿笏於帶也淺鮮息淺切少也芙蓉園在興慶宫旁汛掃思晉切灑也先到切除也二十一年餌金石仍吏切餌金石謂服丹砂藥也北首禮記死者北首生者南郷皆從其􅀄注云北首首隂也音手又切南郷嚮陽也夷衾上如字下去金切禮記自小歛以徃用夷衾夷衾質殺之裁猶冒也注云冒所以韜尸重形者也小歛又覆以夷衾制如冒耳大夫元冒黼殺鑾駕盧湍切崔豹古今注云五路衡上金雀者朱鳥也口銜鈴鈴謂之鑾也横橋漢書注横音光即横門渭橋也燕然府於䖍切以多濫葛部置􅀛林府以同羅部置蹛林都頼都例二切以思結地置蹛林州漢書注云蹛林匈奴繞林而􅀕也窴顔亭年切以白霫部置寘顔州禪杜首時戰切社首山名在兖州釋耒盧對切神農作耒􅀃文云耕曲木也槎木鋤加切槎牙邪斫木也命於通事舎人裏供奉未命以官故令於通事舎人裏供奉􅀂馬周起布衣詔令於御吏裏行是也背城蒲昧切違也没落言人民流離異域如物之没水草木零落也逓還大計切轉還也緯于貴切髭即移切􅀃文口上髭也骨利幹古旦切鐡勒諸部正曛許云切日入煑羊胛古狎切闔也與胷脅相㑹闔納汙汪胡切左氏川澤納汗山藪藏疾辰嬴音盈辰嬴懷嬴也左氏文公六年辰嬴嬖於二君奴刺奴八切啜匐上姝恱切下蒲墨切車鼻昌遮切突厥可汗号西趙南蠻也訶􅀺虎何切二十二年臺榭詞夜切土髙曰臺有木曰榭鷹隼聳尹切鷙鳥樂浪音洛郎郡名阿棧上於何切下仕限切失缽屈阿棧結骨蕃部君長名堅昆古軍切本結骨蕃部因其來朝改爲堅昆都督府祁連翹移切後漢書音時北虜中有祁連山窮髮之地方伐切莊子窮髪之北䟽云地以草木爲毛髪比方寒沍草不不生故窮髮所謂不毛之地也茅茨才資切茅葦首䑕如字首䑕一前一却也唐紀十五通鑑卷一百九十九起著雍涒灘四月盡旃􅀩單閼九月即戊申至乙卯几七年有竒太宗文武大聖大廣孝皇帝下之下正觀二十二年西洱音二河名岀羅谷山新史云昆明蠻以西洱河爲境即葉榆河也天竺張六切身毒國也震懾質涉切震懼契丹音乞北狄國辱紇主下没切辱紇主契丹逐部酋長之稱咄陸當没切葉護失渉切突厥官號多邏郞佐切多邏斯水西突厥地名􅀛兹音丘慈西域國泥婆年題切泥婆羅國直吐蕃之西樂陵州茶餺伯各切其字或从金天竺所居城名白霫息入切部落名居於磧北彊偉巨良切姓也又其兩切君羡延面切又似面切貟道信貟音運姓也絶粒力入切米食曰粒絶粒道引辟榖也當王于况切􅉖眉殞切憐也雙舫甫妄切兩船相並婺亡遇切州名在婺女星之分山獠魯皓切蠻獠踊貴余隴切言榖價驟貴如踊起然也回紇下没切其先匈奴也元魏時亦號髙車居薛廷陁北職貢質力切國語職貢業事之不共又曰昔武王克商通道于九夷百蠻使各以其方賄來貢使無忘職業焉耆音煙支西域國磧石匕迹切沙土曰漠即今磧也多褐何􅁑切􅀛兹城名羯獵顚居謁切􅀛兹相名大俟利發俟渠之切俟利發突厥之官号窟哥苦骨切契丹帥名奚帥奚比狄國與契丹同岀東胡之後奚帥者其國之將帥也峭落七􅀏切州名􅀠松漠都督府二十三年徒莫祗西南諸蠻内附太宗置傍望覧丘四川後􅀠戎州都督府手捫莫奔切撫持也􅋇面力之切剥也灑地沙下切汛也于闐音田又堂練切西域國伏闍信辰遮切于闐王名契苾上音乞下蒲結切西夾室訖洽切書西夾南嚮注西廂夾室賛普吐蕃之俗謂彊雄曰賛丈夫曰普故號君長曰賛普髙宗天皇大聖大洪孝皇帝上之上永徽元年公除從吉也王氏音訓云謂巳成服除之以從公家之事不待終制也狼山盧當切後爲州􅀠安北都護府桑乾音干漢屬代郡新􅀺盧􅀆切以羯漫陁部置後爲州仙蕚逆各切磧北有仙蕚河後􅀠安北都護府油衣夷周切凡雨其者周時有之矣炙轂子曰惟絹油之製及帽油陳始有之見續事始譯語夷益切通四夷之言者叡􅁽俞芮切琰州以冉切諸蠻州􅀠黔州都督二年奭施􅃗切駱歷各切姓橋渠驕切姓咥運丁結切亮隂力􅃞切隂黙也居憂信默三年不言彈彈徒案切行圎蔣子兩切惲委枌切錢貫古亂切緡也蒲􅀋薄胡切北庭縣名突厥中有蒲􅀋每弓月道突厥中有弓月城郎州如字即南寧州太宗更名麻州如字太宗析郎州置􅀠戎州都督府九成宫在鳯翔即隋仁壽宫左藏才浪切收錢帛雜綵天下賦調之所特浪郎宕切羌酋卜檐莫都含切秃磨蒲他谷切曰水蠻酋也青蛉盧經切漢甞已開爲縣屬越嶲郡青蛉水岀西東入江也弄棟多貢切漢屬益州郡葉榆七涉切下音俞漢屬益州葉榆澤在縣東朱邪余遮切部落名三年逗留大透切下如字又力救切逗留不進中廏居又切釋各廏聚也生馬之所聚中廏謂天子馬閑也擊鞠居六切擊鞠謂􅀐而以丈擊者也非蹙鞠瑗于願切浮屠同都切學佛僧也宫省所景切漢以禁中爲省中禨祥居希切亦祥也昵尼質切近也亦作暱四年愔揖滛切伽獨去迦切林邑王之臣也眞臘力􅁑切眞臘在林邑西北本扶南屬國去京師二萬七百里撞鍾傳江切擣也歙失涉切州名以楯殊尹切亦作盾所以捍身兵器也蓨他雕切漢書音條頡苾奚結切五年内之諸荅切昭儀朱揺切招顯其儀示隆重也士彠鬰􅅞切鳯泉湯他郎切在鳯翔大食實賦切本波斯地波斯息移切波斯居逹遏水距京師萬五千里而贏漲溢弋質切汎濫也門桄姑黃切呼沱徒何切山海經云太戯之山滹沱之水岀焉在代州東入趙地秔米古衡切稻屬扼殺乙革切􅀃文把也六年厭勝益涉切廣雅云厭鎭也貟外于權切官数令族力正切善也三思如字又蘇紺切參之也論語三思而後行撲殺弼角切􅀃文挨也嫫母莫胡切黄帝妃貌甚醜黃帝立四妃象后妃四星皇甫謐云元妃西陵氏女曰嫘祖次妃方雷氏女曰女節次妃肜魚氏女次妃嫫母班在三人之下妲巳當割切紂之妃有蘇氏女也羙好辯辭嬖幸於紂紂用其言毒虐衆庶於是武王伐紂斬妲巳頭垂之於小白旗以爲紂之亡由此女也褒姒詳里切以其岀於褒國故曰褒姒周幽王廢申后立褒姒褒姒不好􅀏幽王欲其􅀏萬方故不􅀏爲舉烽燧諸侯悉至至而無㓂乃大􅀏其後申侯與犬戎攻幽王王舉烽燧召兵兵莫至遂殺幽王驪山下虜褒姒盡取周賂而去塵黷徒谷切國語司空季子謂文公曰男女不相及畏黷也黷則生怨怨亂毓災毓災滅性張華女史箴曰歡不可以黷寵不可以􅌹􅉁醢上臻魚切下音海虀􅉁䤈醢也子胥新於切伍貟麋鹿旻悲切鹿屬姑蘇呉王闔閭起姑蘇之臺二年聚材五年乃成髙見三百里造舟七報切又七道切大明詩曰文定厥佯親迎干渭造舟爲梁不顯其光鄭注云迎太姒而更爲梁者欲其昭著示後丗重昏禮也造舟比其舟而渡也比船於水加板其上􅀂今之浮橋文王重昏事始作而用之周公因之制禮著尊卑之差天子造舟諸侯維舟大夫方舟士特舟太姒太姒莘國之長女文王之正妃􅀜雎千余切關雎周南詩首篇二南蓋文王之化而羙后妃之德也雎鳩王雎也鳥摯而有别􅀜關和聲也十斛胡谷切十斗爲斛唐紀十六通鑑卷二百起􅏧􅀩單閼十月盡元􅘬閑茂七月即乙卯至壬戌凡六年有竒髙宗天皇大聖大洪孝皇帝上之下永徽六年勲庸許云切周禮王功曰勲民功曰庸地華户􅀲切言門地光顯纓黻於盈切冠繫也黻以繒爲之黒與青畫兩巳相背象君臣可否相濟也音分物切椒闈兹消切木名下于非切宫中門漢官儀曰皇后稱椒房以椒塗壁取其温而芳蘭掖夷益切西都賦曰後宫則有掖庭椒房后妃之室菹􅀂椒風坡香發越蘭林惠草鴛鸞飛翔之列吕向曰掖庭宮名在天子左右如肘腋儲貳直魚切儲副昔在儲貳謂爲太子時宫壼苦本切宫中道飭躬畜力切正也嬪嬙上毗賔切下慈良切媚嬙婦官竅壁苦弔切穴壁爲竅道斷去上音短下起吕切酒甕烏貢切罌也二嫗威遇切􅀃文曰母也大家謂天子妖猾户八切猾亂爲猫謨交切本又作貓音同又武儦切捕䑕獸蟒氏母黨切蛇最大者曰蟒梟氏古堯切不孝鳥也􅀂隋煬帝誅楊􅀇感改其姓爲梟氏也數見所角切爲祟息遂切爲禍祟也瀝血狼狄切滴瀝蓬萊宫蒲公切在京城東北彗星祥歳切彗星妖星也明兩良奬切易曰明兩作離爝暉子約切字林云爝炬火也莊子日月出矣而爝火不息其於光也不亦難乎反植音殖種也賈􅁩賦賢聖逆曵􅀆邪正倒植植音值立也犯鱗力珍切神龍頷有逆鱗嬰者死言犯君威則觸嚴刑也狡險古巧切狂也猾也忌克渠記切忌謂畏忌憎惡克謂好勝賊害左氏傳今其言多忌克顯慶元年亡匿昵力切藏也􅅒府力錦切倉廪府庫􅁞要徂含切以􅁞事爲要省其所景切􅂤少也配昊天下老切春爲昊天言元氣廣大也孝經郊祀后稷以配天王者必以其祖同􅀕於天尊之也冬至祀昊天上帝於圎丘武德中以景帝配今更以髙祖聖配五帝周禮兆五帝於四郊此五行之精氣也而鄭氏謂爲太㣲五帝非也唐􅀄季秋大享于明堂皆祀五方天帝以元帝配今更以太宗配明堂孝經援神契曰明堂上圓下方八䆫四闥布政之宫在固之陽又三輔黄圗云明堂者大道之堂也所以順四時行月令宗祀先王􅀕五帝也歌邏禄郎佐切部落名淳于羽俱切複姓漣水力延切縣名屬泗州叱尺栗切訶也柘栱居竦切並州名生羌之地鷹娑川素何切在突厥中懦怯奴卧切又奴亂切弱也逗遛大透切丁音溜不進也􅂢身與専切棄也甿􅀺上莫耕切民也下郎奚切衆也無恚於避切恨也二年郇昔遵切那羅奴何切那羅邇娑婆寐天竺方士也自言壽二百歳有長生術太宗館之於金飈門造藥令兵部尚書崔敦禮監主之藥成不効朝覲渠吝切周禮春見曰朝夏見曰宗秋見曰覲冬見曰遇寧謐彌畢切靜也螻蟻上音樓下魚豈切螻螻蛄也蟻蚍蜉皆蟲之微小者也餘齒昌里切禮記古者謂年齡齒亦齡也注齒人壽之數也迎氣周禮大宗伯以血􅀕􅀕五祀注云四時迎五行之氣於四郊而􅀕五德之帝蔡邕曰天子以四立及季夏之節迎五帝於郊導致神氣祈福豊年太微無非切周禮兆五帝於四郊鄭注以爲青帝靈威仰赤帝赤熛怒黄帝含樞杻白帝白招拒黒帝汁光紀也太微五帝之坐黄帝在太微中含樞紐之神也緯書于貴切易詩書禮樂春秋孝經皆有緯書蓋漢未夏賀良之徒爲之以爲有經必有緯故曰緯書六天自鄭氏以爲昊天上帝者天皇大帝北辰耀􅅎寶也及太微五帝由是有六天之􅀃蓋出於春秋緯文曜鈎等書唐顯慶禮猶著六天之􅀃故禮部尚書許欽宗與禮官議黜之方丘敷羊切夏至􅀕地於澤中之方丘亦取自然之丘象地方也神州食鄰切周禮大司樂乃奏太簇􅁔應鍾舞咸池以􅀕地示注云地祗所􅀕於北郊謂神州之神及社稷又通典曰神州謂王者所卜居吉土五千里之内地名也注崑崙東南地方五千里名曰神州滍水丈几切又音峙汝州魯山縣有魯山滍水所出東北至定陵入汝汜水音凡又音祀漢書注成臯城秉汜水是也今孟州汎水縣賜賚洛代切賜也曵咥河丁結切攅矟色角切矛丈八者謂之矟屈律啜丘勿切蹋雪逹合切踐也牙帳五加切虜帳建牙郵驛羽求切郵驛謂路上舎入流力求切流品也分九品官謂之流内又有視流内選事須絹切知選事謂知銓官事也釐革陵知切理也名核改易也三年鬻獄羊六切賣也左氏傳鮒也鬻獄四年乳臭蘂主切漢書是口尚乳臭謂其効小也􅀺明力奚切􅀺猶比也比至天明也肘腋上陟桞切臂節也下夷益切胳也在肘後任俠上汝鴆切下橔頰切任謂任使其氣力俠之言挾也以權力挾輔俠也皇地祗巨至切后七皇地祗神也周禮大宗伯掌地示之禮又曰以黄琮禮地注禮地以夏至謂神在崑崙者也簿録裴古切爲文簿籍録之也拔汗那蒲撥切即寧逺園小曰鏺汗悒怛乙及切下當割切本漢大月氏之種朱駒半西域國或曰朱駒波即漢子合國也都曼謨官切又音曼般陀蒲官切西域國或曰漢陀曰偈羅陀治葱嶺中都城五年版授􅀘綰切謂不加告命以版䇿授之嵎夷元俱切東表之地禹貢嵎夷在青州冷岍輕煙切地名或作冷陘沙磚徙官切地名風眩熒絹切目無常主浿江普蓋切又譜頼切水出樂浪西至增地入海鏤方􅀰豆切故漢樂浪縣龍朔元年一戎大定樂書一戎衣天下大定道琛丑林切倭國烏禾切倭奴國在東海中即日本國也正朔朱成切王謂年之始朔謂月之初古泗息利切􅀃文受泲水東入淮嚈噠益涉切下陁􅁑切悒怛國也嚈噠王姓後裔以姓爲國訛爲悒怛也罽賔居例切罽賔國在葱嶺南去京帥萬二千二百里陸渾胡昆切河南縣名有陸渾山在伊闕二年二十四司唐制尚書省都堂居中左右分司都堂之東曰吏部戸部禮部三行毎行四司左司統之都堂之西曰兵部曰刑部工部三行每行四司右司統之凡二十四司御史臺御史臺改曰憲臺大夫曰大司憲中丞曰司憲大夫九寺祥吏切寺司也官之所止九寺即九卿也改太常曰奉常卿皆爲正卿少卿爲大夫之􅀋是也七􅁥格懴切領也改國子監曰司成館􅀕酒曰大司成司樂曰少司成少府監曰内府監將作監曰繕工監之􅀋也十六衛左右衛府驍衛府武衛府皆省府字左右威衛曰左右武威衛左右領軍衛曰左右戎衛之􅀋是也餘並見新舊史沃沮道上烏酷切下千余切其國在髙勾麗蓋馬大山之東輜重上側其切下直用切釋名曰輜厠也軍糧什物雜厠累重故曰輜重安輯籍入切和也自殱子廉切盡也夜傅符遇切著也唐紀十七通鑑卷二百一起元􅘬閹茂八月盡上章敦䍧即壬戌至庚午凡八年有竒髙宗天皇大聖大洪孝皇帝中之上龍朔二年衣碧上於旣切下彼役切代青也鳴鏑丁歷切矢鋒漢書冒頓作鳴鏑注云髐箭也樞軸仲六切漢書車丞相當軸處中攻訐居謁切告訐也䫻海道越筆切地名興昔亡興昔亡可汗阿史那彌射也繼往絶阿史那歩眞也噍􅀋才􅀏切嚼也言無復活而噍食者三年銓綜子宋切機縷怨讟徒谷切痛怨頸頰吉恊切面旁俱張如字又音脹恚而項頰皆滿也厭之益渉切廣雅曰厭鎭也朔望色角切朔旦望十五日也日月相推朔㑹望衡古塜知隴切冢墓窺覘敕􅃩切窺也又癡廉切災眚所景切過也銅山徒東切漢文帝賜鄧通蜀嚴道銅山得自鑄錢李義府好聚斂故謂爲銅山大賊通衢其居切爾雅四逹謂之衢含元殿胡甘切李華賦云因以鴻稱含元建名易乾坤之􅀃曰含洪光太又曰元亨利正士翽呼外切青海如字吐谷渾中有青海周回八百里中有小山至冬氷合游牝焉其上言得龍種甞得波斯草馬因生騦駒故代稱青海騘論仲琮論盧頓切姓也琮徂宗切黜陟敕律切黜退陟升也扶餘房無切􅃨姓黒齒迄得切􅃨姓黒齒常之百濟西部人也縶陟立切繫也沙吒側加切􅃨姓曏者許亮切比屋簿必切比相次也僵尸居良切踣也命瘞於計切幽貍也村聚從遇切廣雅曰聚居也前書音義小於郷曰聚堤堰於建切壅水陂塘彼爲切澤障曰陂塘偃豬也屯田徒敦切凡邊防鎭守轉輸不給則結屯田以益軍儲拂菻力錦切古大秦國也居西海上一曰海西國去京師萬里麟德元年愽义楚加切畫一胡麥切漢書蕭何爲法講􅀂畫一言整齊也岱宗徒耐切岱宗泰山東嶽也風俗通云泰山山之尊者一曰岱宗岱始也宗長也萬物之始隂陽交代故爲五嶽之長參逐倉含切參互更張古衡切漢書譬之琴瑟不調甚者必解而更張之白丁當經切民男女年十八以上爲丁丁從課没収穫胡郭切刈榖其忿撫吻切悁怒二年秘閣兵媚切髙祖時太史局􅀠秘書髙宗改太史局曰秘書閣局令曰秘書閣郎中傅仁均方遇切仁均束都道士也善推歩之術髙祖受禪將治曆大史􅁃儉傅弈薦之戊寅曆莫候切傅仁均以唐在戊寅歳甲子日登極曆元戊寅日起甲子名爲戊寅元曆如漢太􅀄也推歩昌追切推測考歩也劉焯職略切焯字士元仕隋爲大學愽士著曆書十卷耽羅丁含切夷狄國藁秸古老切稈也禾去其穗下訖黠切秸亦藁也禮記郊特牲曰草席之安而蒲越藁秸之尚明之也言禮貴質所以交於神明漢書席以藁秸陶匏歩交切郊特牲曰器用陶匏尚禮然也陶謂陶瓦爲酒尊匏瓠也匏爵謂破匏爲之皆太古之禮器貴其質素自然茵褥而蜀切􅀃文茵車重席也褥䌓采色也罍爵盧回切罍􅀛目酒尊刻木作雲雷之象爵刻木爲之􅃮赤中爵盡也足也又象爵之形毳幕充芮切獸細毛也塡咽一結切塞也乾封元年玉牒逹恊切玉爲􅂤牒玉匱求位切玉匱一長一尺三寸以藏上帝之􅁽金匱二以藏帝之冊􅆞以直連切又持碾切􅆞繞也金繩神陵切金爲䋲索也藏􅁽匱􅆞以金䋲五周玉璽方一寸二分文如受命璽石䃭音敦石䃭石篋也以方石再累皆方五尺厚一尺刻其中以容玉匱䃭旁施石檢十枚以檢石䃭南方北方皆三東方西方皆二去䃭隅皆一尺䃭􅆞以金䋲五周封以石泥帷帟夷益切帷在上曰帟爼豆莊所切爼豆禮器爼四足如案所以薦􅁏爾雅木豆謂之豆竹豆謂之籩泉寳徂圜切泉寳義取通流武德􅀄璹開元通寳錢徑八分重二銖四參積十錢重一兩今乾封泉寳錢徑寸重二銖六分以一當舊錢之十源愚􅀽切姓􅀃文本作厵􅂐文省作原後人加水瀝觴尸羊切觶實曰觴歷觴酹于地也相里氏息亮切咎繇之後爲理氏商末理證孫仲師遭難去王姓里至􅀳里克見滅克妻司成氏携少子季遭逃居相成爲相里氏蝮氏芳六切蝮虺也佳鷂弋笑切鷙鳥􅄮陽巨支切太宗析扶風岐山及京兆之上冝置岐賜縣後苜永徽五年髙宗復置二年籍田秦昔切天子躬耕籍田以勸率天下使務農也漢書注籍猶蹈藉也耒耜詳里切田器􅀃文臿也九推吐回切禮記月令天子三推卿諸侯九推文瓘古玩切胄直又切乾糒平秘切乾也謂乾糇緫章元年翹足渠遥切舉也彗星徐醉切宋均注鈎命決曰彗五彗也蒼則王侯破天子苦兵赤則賊起強國恣黃則女害色權奪於后妃白則將軍逆二年兵大作黒則水精賊江河決賊處處起也楊韓占曰其象􅀂竹彗木條長短無常其長大見乆災深短小見不乆災狹又彗所以除舊布新也五車五車五星三柱九星在畢北五車者五帝車舎也五帝坐也主天子五兵徹樂直列切去也烏荼烏荼西域國荼本作秅按漢書顔師古烏音一加切䄭音直加切盧迦居伽切凱歌可亥切樂也不首守又切有咎自陳曰首隊伍徒對切部隊軍伍五人爲伍也怖懼普故切惶懼二年八觚攻乎切西都賦上觚稜而棲金爵注云觚稜闕角也應劭曰觚八觚有隅者也櫺盧經切䆫櫺柳楶楶子結切爾雅栭謂之楶注云即櫨也切韻櫨柱上柎也枅栱吉奚切承衡木下居勇切爾雅樴謂之杙大者謂之栱廵守守又切晏子曰廵守者廵所守也饑歉苦簟切􅀃文食不滿也酒䦨盧干切漢書注䦨言希也謂飲酒者半罷半坐謂之酒䦨檛殺陟􅀲切馬箠也言擊殺之轜車音而喪車也烏德鞬山居言切按考異曰唐曆云即􅊊督軍山虜語兩音也閨門㳙畦切􅀃文特立之門上圎下方有似圭也煑粥之六切糜也􅅡其如劣切燒也不愜詰叶切快也駮北角切乖舛也閩中武巾切咸亨元年齊聃他甘切祖禰乃禮切謂祖與父也邏娑郎佐切下蘇箇切論欽陵吐蕃官大相曰論菹副相曰論菹扈莽亦號大論小論欽陵者大論薛禄東賛之子唐紀十八通鑑卷二百二起重光恊洽盡重光大荒落即辛未至辛巳凡十一年髙宗天皇大聖大洪孝皇帝中之下咸亨二年匐延蒲北切以處木昆部置匐延都督府􅀠北庭都護府五咄陸當没切􅀄咄陸可汗死沙鉢羅咥利失可汗立分其國爲十部曰五咄陸部曰五弩畢失部蒼猝蒼没切博雅云猝􅁀也衰絰上倉回切下徒結切􅀃文絰喪首戴也馬韁居良切紲也葉縣失涉切􅀠汝州三年昆明古敦切在㸑蠻西因緫敦因州居戎州西北緫州居西南敦州居南逺不過五百餘里近三百里浩舋漢書地理志金城郡縣名注云浩亹水岀西塞外東至九吾入湟水浩音誥浩水也亹者水流峽山岸深􅀂門詩大雅曰鳬鷖在亹亦其義也今俗呼此水爲閤門河蓋疾言之浩爲閤耳荒徼吉弔切徼猶塞也夷貊莫白切東方曰夷北方曰貊曰繆靡幼切福畤音止嫌􅂩胡兼切不平於心下迄逆切怨􅂩馮盎於浪切罕接許旱切希罕全椒兹消切滁州縣名邢奚經切撤膳直列切去也膳音時戰切擲倒直炙切投也都晧切仆也左奉􅁉率朔律釱髙宗改左右内率府曰左右奉􅁉率伶官盧經切􅀃文弄也四年靺鞨音末曷北狄别種擐甲胡慣切貫也瘧疾逆約切􅀬寒休作上元元年髙麗力支切䃋石容朱切石名晟承正切大酺音蒲令民合聚飲酒爲酺東西朋蒲登切軰也志趣趣音逡遇切趣尚也推棃昌追切逓相大計切更互也俳優蒲諧切􅀃文戯也優倡優也家語齊奏宫中之樂俳優侏儒戯於前孔子曰匹夫熒侮諸侯者罪應誅瞿然俱遇切失守之皃華山胡化切又户􅀲切西嶽華山在華隂書䟽華變也萬物變由西方也君澈直列切惲委粉切煒于􅀑切馳傳張戀切傳以木爲之長尺五書符其上以爲信馳傳者將而疾行也伏闍雄同都切又辰遮切齊衰音資下七雷切喪服斬布而不緝謂之斬衰齊衰則緝之也俸禄房用切秩禄也卉木許偉切草緫名二年尉遲紆勿切買肖城莫􅈉切新羅國中先􅁞徂含切周禮王后帥内外命婦享先􅁞於北郊漢儀春桑生皇后親桑於苑中蠶室飬􅁞于薄以中牢羊豕祠􅁞神曰苑窳婦人㝢氏公主凡二神也又通典先􅁞天駟也邙山莫郎切河南洛陽北土山著令陟慮切下力正切著以爲令也義琰以冉切臣􅁤居洧切言以爲人臣之法防人符方切防守者候其胡闕切候望也突煙陁没切本亦作堗􅍳也漢書見其竈直突腐矣扶兩切腐爛屬心之欲切係心酖之直禁切澧音禮州名難詰乃旦切問也老嫗威遇切􅀃文母也解事下懈切糾駮北角切儀鳳元年中嶽逆角切嵩山息中切中嶽也釋名云大而髙曰嵩字或作崧詩崧髙維嶽駿極于天白虎通曰山在中央四方之中而髙故曰崧髙温湯他郎切汝州渠縣有温湯可以熟米晉陵力登切常州縣誤斫職略切斫伐措其倉故切置也一抔蒲侯切漢書注云抔謂手掬之也其字從手不忍言毀徹故止云取長陵一抔土耳同僚連條切亦作寮左氏同官爲寮吾甞同寮藺力政切祫享胡夾切祫􅀕也春秋傳曰大袷者何合􅀕也毀廟未毀廟之三皆登合食乎太祖璨倉按切禘後大計切禘夏商四時之􅀕春曰礿夏曰禘秋曰甞冬曰烝至周則改之春曰祠夏曰礿而以禘爲大􅀕三年一祫五年一禘祫以昭合食于太祖禘以審諦其尊卑也璨時議以爲新君喪畢而祫明年而禘自是之後五年而再􅀕蓋後禘去前禘五年而祫常在禘後三年禘常在祫後二年議者以璨言有經據遂從之􅂍賄呼罪切鄱陽蒲和切饒州縣名鄢陵於㦥切頴川縣名二年朝鮮直遥切下相然切箕子所封漢樂浪縣三年龍支章移切鄯州縣名濠所乎刀切城下池狼狽􅀶蓋切狼屬跋地設蒲末切吐蕃將徒跣先典切徒跣謂足親地婁盧侯切著辨亡論晉陸機呉人以祖父丗爲吴將相有大勲深􅁣孫皓之亡遂著辨亡論二篇論權所以得皓所以亡也河橋成都王頴假機後將軍河北大都督討長沙王又列軍自朝歌至十河橋鼓聲聞數百里又奉天子與機戰機軍大敗遂遇害于軍中七札側八切又側乙切左氏晉楚遇於鄢陵潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰旣戰楚師敗績閫外苦本切漢書闐以外將軍制之謂以閫外方面之難任之也李左車尺遮切廣武君殊功慵朱切殊異也黔首其廉切􅀃文􅀺也秦謂民爲黔首謂黒色也反語孚􅀽切調露元年壯麗力討切羙麗也漢書蕭何治未央宫東闕北闕前殿武庫大倉上見其壯麗其怒麴薩􅀂素葛切下爾者切吐蕃人羊同如字吐藩傳大羊同國直崑崙山偃師於幰切河南縣符呪職救切行符呪􅀕幻術胡辨切幻惑澠池彌兖切邑名屬河南府覘知丑廉切又敕􅃩切同也漢使所吏切自漢以來皆稱夷夏爲蕃漢契箭詰計切契箭蕃法以爲召兵之信碎葉蘇對切突厥諸部中城名井陘户經切鎭州縣有陘山其道險隘龍門如字按史屯絳龍門也休璟居永切􅌔古限切永隆元年潘鋪官切三百乘繩證切四馬曰乘安堵董五切如墻堵安静不動也趣使趣讀曰促烽戍敷容切烽燧春遇切屯兵懷悊音哲鞫居六切窮理罪人也宥之爰救切訥言奴骨切誹諧誹當作俳或字通用戯也諧音户皆切漢書即妄爲諧語諧者和韻之言也琁旬縁切開耀元年路門如字路門大寢門也天子宫内有路寢故有路門在應門之内奕丗夷益切大也亦作奕盛也台鼎湯來切三公上應台階鼎足承君故曰台鼎􅃆彌兖切州名剔去他歴切方陳直刃切與陣同汾隂扶芬切漢書汾隂在河東燎炬盧皎切然火下臼許切束葦燒之顗語豈切妯娌音軸里爾雅長婦謂稚婦爲娣婦娣婦謂長婦爲姒婦郭璞云今相呼先後或爲妯娌巢由巢父許由三頋古慕切蜀先主三頋孔明於草廬中商山詩梁切商州商雒縣山也漢書園公綺里季夏黃公角里先生避秦而入商雒深山謂之四皓漸染子廉切漬也芝蘭音枝瑞草一歳三華鼎盛鼎方也僕以歩谷切司馬遷報任安書云僕雖疲駑又自稱曰太史公牛馬走司馬遷李善注文選云走猶僕也言巳爲父太史公掌牛馬之僕自謙之辭也唯唯干癸切唯唯言毎事稱善無它一言以爲規益也不飡千安切不飡周粟􅀂伯夷叔齊也反間居莧切間諜也單使多寒切少選如字少選猶少頃也渾濬户昆切晉太康􅀄大舉伐吴王渾巳破孫皓中軍頓兵不進而王濬順流鼓棹乘勝受降渾耻且忿奏濬罪狀二人由是交怨唐紀十九通鑑卷二百三起元􅘬敦䍧盡柔兆閹茂即壬午至丙戌凡五年髙宗天皇大聖大洪孝皇帝下永淳元年藍田盧甘切邑名屬京兆府襲禮席入切因也不相襲禮則有損益也裒蒲侯切綝丑林切饑饉渠吝切無􅂖曰饑無菜曰饉出幸如字蔡邕云天子車駕所至民臣以爲僥幸故曰幸也草竊千結切書好草􅀼姦宄草􅀼草野􅀼盗也赤縣如字中國名曰赤縣神州神采此宰切氣之清者爲神采文采也桎梏音質谷桎足械梏手械也勮渠據切欒城盧團切趙州縣名今屬眞定銓衡且縁切銓官也衡言其平也弱息蘇即切漢書注息生也謂其所生之子也駱歷各切姓浮躁則到切動也令終郎定切令猶善也犀角先齊切􅀃文南徼外牛一角在鼻一角在頂似豕麝香神夜切麝似麞常食栢葉又敢蛇其香正在臍腹前皮内别有膜裹之至寒香滿入春患急痛自以脚剔岀之人取帶之能辟惡跌而徒結切跌踢足失措也􅀬海如字􅀬海在辟葉東地寒不凍截之昨結切金鼔如字漢書聞鼔聲而縱聞金聲而止注金謂鉦也一名鐲音濁近屬殊六切親屬長倩倉甸切鼔城定州縣名今屬祁州辟召必益切除也旱蝗胡光切即螽也食苗爲災五嶽西嶽華山也東岳泰山也北岳常山也南嶽衡山也中嶽嵩山也嶽通作岳裏行御史臺官太宗朝始有裏行之名髙宗置監察御史裏行武后置殿中裏行後亦專以裏行名官菽粟式竹切菽衆豆之緫名餓殍彼表切餓死者曰殍朝陽陟遥切爾雅釋山云山東曰朝陽詩鳯凰鳴矣于彼髙崗梧桐生矣于彼朝陽弘道元年嬀俱爲切州名囊盛奴當切􅀃文橐也一曰有底曰囊無底曰橐盛音時征切貯也大斌音彬邑名屬綏州朝那上直遥切下奴多切病瘖於今切不能言也診之止忍切候脉爲診刺頭七賜切又七迹切則天順聖皇后上之上光宅元年禕之叮韋切羽林如字羽林宿衛之官言其如羽之疾如林之多也一􅀃所以爲王者羽翼坊曲分房切邑里也眇身弭沼切微也見嗤赤之切􅀏也不渝容朱切變也慘紫七感切鄱陽蒲禾切饒州縣名崑崙古渾切下盧昆切商舶舶音白海中商賈大船文水如字武后并州文水縣人故立祠堂於縣憤惋烏貫切盩厔張流切下陟栗切邑名屬鳯翔府括蒼古活切處州縣名後曰麗水有括蒼山黟令音移丹陽縣名下力正切縣令更衣古衡切改也春宫職林太子故事東宫亦曰春宫之嬖卑義切寵也翬翟許韋切下亭歷切翟雉名周禮注伊洛而南素質五色皆備成章曰翬王后之服刻繒爲之形而采畫之綴於衣以爲文章又曰禕衣禕音義同聚麀於丘切禮記父子聚麀注云聚云共也牝鹿曰麀包藏班交切左氏無乃包藏禍心以圖之神器時眞切老子天下神器不可爲也謂大寳之位是天下神明之器不偶語口切遇也盱􅇇況于切下盈之切縣名屬泗州玉鈐衛其廉切是年武后改左右鎭軍衛曰左右玉鈴衛崔􅊫􅊫與察同騫味道夫乾切風俗通云騫姓閔子騫之後櫟陽音藥縣名屬華州魚語居切風俗通云魚姓宋公子魚賢而有謀以字爲氏承曄域􅂺切景諶時針切金陵如字昇州縣名楚威王以其地有王氣埋金以鎭之故曰金陵今屬江寧府王氣于放切伸鋤牀魚切農器也伸展也曲阿烏何切潤州縣名今丹陽甔石丁濫切言一石之儲也方言曰甔瑩也齊攻苦切巫者行厭魅令人蠱惑故曰巫蠱漢武帝末年淫惑􅀑神崇信巫術申是江充告太子宫有蠱氣帝使充治之果得桐人太子知充故爲䧟已殺之帝謂爲實詔丞相發兵討之太子赦長安囚與􅃲不勝奔湖􅀜自殺壷􅀜洪􅀌切上黨縣也捽曵昨没切􅀃文持頭髪批其攀縻切閹爲於檢切斛瑟胡谷切五弩畢失奴古切西突厥所分十部五咄陸五弩畢失部也疣贅上音尤下之芮切疣贅瘤腫也塠阜都回切聚上也山無石曰阜唐紀二十通鑑卷二百四起強圉大淵獻盡重光單閼即丁亥至辛卯凡五年則天順聖皇后上之下垂拱三年俚户良士切嶺南蠻屬交趾音止古駱越之地漢交趾郡調露元年曰安南都護府黃花堆都回切突厥地名笞之超之切箠也㸑寳璧七亂切葉陽國志云昌寧大姓有㸑習儋都甘切州名四年神都唐號河南曰東都武后改曰神都悰徂宗切隱慝惕德切惡也季札側八切吴延陵季子伍貟音云伍子胥四瀆徒谷切爾雅江河淮濟爲四瀆發源注海者也譔雛免雛戀二切東莞音官本漢琅琊縣後改爲沂水屬沂州痼疾音固堅乆之疾也氣沮將豫切挫折也虺氏許􅀑切蟲屬一名蝮辟兵必益切除也辟兵符言爲符書以辟除兵氣也梟首古堯切挂首木上瓌姑回切珦許亮切詿誤上古賣切下五故切謬誤也迎勞郎到切慰勞成蹊弦雞切四靣皆成徑道言岀降者多也尚方時亮切尚方少府之屬官也作供御器物故有斬馬劒劒利可以斬馬也顗語豈切纂作管切檻户黤切載囚車十二辰丞眞切干爲日支爲辰二十四氣五日謂之候三候謂之氣六氣謂之時四時凢二十四氣栭櫨上人之切下龍都切􅀃文栭屋枅上標爾雅栭謂之栥注云即櫨也切韻櫨柱上柎也㮰上抽庚切􅀃文衺柱也下頻脂切􅀃文梠也梠謂楣辟雍必益切新論曰王者作圎也如璧刑實水其中以圜壅之名曰辟雍􅀃文言流轉王道周而復始五級訖立切階等也茅茨才資切漢書注云屋蓋曰茨茅茨以茅覆屋也司馬遷曰墨者亦上堯舜言其德行云采椽漢書作採注云採柞本也音采又音菜鐡鷟仕角切鸑鷟鳥名鳯屬國語周之興也鸑鷟鳴於岐山鐡鷟以鐡爲之巴蜑蕩旱切南方有蜑蠻除道陳如切除治也􅀂爲之驅除開通道路也遺之以醉切贈也尫弱烏王切弱也翕然迄及切合也永昌元年大圭㳙畦切大圭長三尺王所搢也典瑞曰王執鎭圭搢大圭以朝鎭圭陟刃切鎭圭長尺一寸以鎭安天下蓋以四鎮爲縁飾故以鎮名辭婉於阮切婉娩順也諲伊眞切媛于願切羙女之稱娣姒待禮切又大計切下詳里切長婦稚婦相謂爲娣姒也儻來土黨切儻來者物之暫􅀉也儻者意外忽來者耳嘔血於口切吐也膏沐姑勞切不御膏沐無容飾也詩豈無膏沐誰適爲容迦河居伽切將領即亮切將謂爲將以將兵領亦將也圖䜟楚譛切纎緯之書晴霽子計切􅀨止也耐乆乃代切忍也平準之尹切準亦平也謂當其價直直十餘萬也脩􅄾渠冝切景雲居影切晉書天文志曰瑞雲一曰慶雲一曰景雲嘉氣太平之應也刑濫盧瞰切溢也左氏刑濫則懼及善人天授元年日南至左氏僖公五年日南至杜預注云周正月今十一月冬至之日日極南又曰朔旦冬至曆數之所始治曆者因此明術數審别隂陽臘月力盍切蔡邕獨斷曰臘者歳之終也三恪克各切春秋左氏􅀃曰周家封夏商二王之後以爲上公封黃帝堯舜之後謂之三恪改造在早切作也宗秦客改造天地等十二字照爲曌天爲西地爲埊日爲月爲囝星爲君爲臣爲忠載爲􅀄爲年爲正爲􆂃太后遂自名曌長倩倉甸切士彠鬰縛切醴泉里第切縣名屬京兆府詭譎古委切詭許也公穴切權詐也亶多旱切獬豸下懈切下宅買切豸亦作慶獬豸獸也似山牛一角古者决訟令觸不直者搜捕踈鳩切索也蹂踐女九切履也函之胡讒切匱也汾符分切州名叱尺栗切呵也槍揭千羊切剡木傷盗曰槍蹇列切舉也敲朴口交切短杖也下普木切捶也迨官蕩亥切及也厲色力制切嚴也閻浮提余廉切佛經云剡部即此州名在彌廬山南故稱南閻浮提鳳皇馮貢切􅀃文五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳皇一曰南方之鳥火精雄曰鳯雌曰皇非梧桐不棲非竹實不食非醴泉不飲溧陽力質切昇州縣名珣音荀一區傾于切漢書有宅一區袈娑音加沙浮圖者所服􅆊音具云迦羅沙曵華言不正色四方律云一切上色衣不得畜當壞作袈沙色今略梵語也字本作迦沙鹿走則候切疾趨庖厨蒲交切下重株切周禮庖人注云庖之言苞也裹肉曰苞苴厨庖屋也泉獻誠祖縁切姓也南北牙或作衙南北衙掌天子禁軍也南牙諸衛兵是也北牙者禁軍也二年三宥爰救切寛也周禮司刺掌三刺三宥三赦之灋炙之之石切炮也格輔兀古伯切格姓也鉗口其淹切􅀃文鐡有所結束也五毒徒沃切害人之草如野葛狼毒之屬資治通鑑釋文卷第二十一
