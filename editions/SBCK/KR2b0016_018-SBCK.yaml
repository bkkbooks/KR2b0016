body:
  text: 右宣義郎監成都府糧料院史炤陳紀一通鑑卷一百六十七起強圉赤􅁬􅀂盡屠維單閼即丁丑至已卯凡三年髙祖武皇帝帝姓陳氏諱霸先梁太平二年進封陳王尋受梁禪建元永定國號陳永定元年周公宇文㤗事魏爲大􅃁宰其子覺襲位封爲周公尋建國爲周始見於此柴燎力弔切燎柴以􅀕天庶髙煙上通也圜丘禮􅀕天於圜丘爾雅云土之髙者曰丘圜者所以象天體圜通作圎方丘禮􅀕地於方澤謂地方而下故􅀕其神於澤中取方丘焉以象地體方故也祧廟吐彫切逺祖廟也吐谷渾谷余蜀切渾户昆切本遼東鮮卑徒河渉歸之庶長名曰吐谷渾其後別爲一種遂以爲號鄯時戰切州名系周鈔掠􅀄交切楚教切略取也揣之􅀄委切度也頠郢以井切州名系梁盪徒沆切孜津之切怏怏􅀝兩切志不滿也艘蘇刀切船之緫名蹠口之石切城名孝勱莫敗切法􅉤巨俱切柵測革切編立木爲之間行居莧切從間道而行沿流余專切縁水而下也芊韶音千地名賀蘭祥賀蘭代北􅃨姓其先有紇伏者與後魏俱起爲賀蘭莫何因氏焉祥其名忷懼許容切又許拱切演音衍湛市林切又持林切文減切愔揖滛切暹思廉切敱五來切艦戸黤切戰船四方施板以禦矢其狀如牢紇下没切蝗胡光切􅀃文螽也叔瓉才賛切又在旱切敺之一口切捶擊也溷胡困切溷穢黃􅃏王伐切大斧以金爲飾百揆求癸切度也揆度百事九􅃬車馬衣服樂器朱户納陛虎賁斧􅃏弓矢秬兇以上爲九錫􅉖眉殞切乙弗鳳乙弗複姓縛符攫切繫也醼伊甸切合飲也毓余六切詰朝去吉切平旦相質職利切質當以爲信逼筆力切迫也亦作偪淅州先歷切本漢之析縣也恪克各切排闥排推也闥宫中小門一曰門屏音土曷切杜姥宅莫􅀘切地名膜拜莫胡切胡人拜稱刪定所艱切陳置此官以治律令祔符遇切合􅀕名沌口音篆水名在江夏裨將頻彌切將之偏副也䑽他盍切大船曰䑽子蒨倉甸切閩中眉巾切東南越地砦士邁切籬落也或作寨令狐整令郎丁切令􅀌複姓整其名漢有令狐氏岀本自畢萬之後國語云晉大夫令狐文子即魏顆也浚私閏切洟岀弋之切又他計切鼻液也或作吾不俯九切與不同裸郎果切􅃝也裎丑郢切又馳成切􅃝也古襌衣趙魏之間無袌者謂任溲穢上所鳩切又所九切溺謂之溲或作􅘞下烏外切又於廢切穢惡也二年鼔吹天僞切音律管壎之樂本作籥􅊒迄逆切瑱他甸切藉田秦昔切耤借也帝耤千畒也古者使民如借故謂之耤典籖七廉切官名峭絶七肖切陖也擊柝闥各切或作􅈀夜行所撃者易曰重門擊柝以待暴客舉烽敷容切􅀃文燧候表也邊有警則舉火掘其月切也朏敷尾切自劾胡得切自狀其過也公颺與章切又餘亮切沈湎上持林切下面善切湛溺於酒也憤戻吻切懣也批拉上普􅄒切又蒲結切下落台切擊也摧也謂以力相擊而摧折者捶楚止蘂切捶擊而痛楚之也脅虚業切胷脅昕許斤切撻土曷切打也努力奴古切方言勉也惙然陟劣切疲也伺便相吏切伺候其便也欷歔並平聲歎息皃噤口巨禁切􅀃文口閉也䙝黷上先列切下徒谷切狎侮也撞之宅江切悸巨季切心動曰悸語吃居乙切懦乃卧切又乃亂切弱也犁耳憐題切耕具車釭古􅀟切車轂鐡也嵇曄嵇音􅀆姓也曄筠輙切酣飲胡甘切說文酒樂也府藏才浪切府庫也蓄物之所省所景切簡也謳歌烏侯切􅀃文齊歌也聲䡀旨善切揺也通作顫愴然楚亮切悽愴也洗氏先禮切姓也酋長自秋切豪帥也三年鮮卑相然切山名東胡別種因保此山遂以爲號皖口胡管切廬江皖縣之口浟以周切湜常職切廐居又切馬舎也洮州吐刀切古爲諸羌之地後爲吐谷渾所據至後周武帝逐􅄍谷渾置洮州厭之一渉切廣雅云厭鎮也㗖徒濫切噍啖也淦口音紺又古含二切淦水出豫章新淦縣西入湖漢猗氏乙竒切河東邑古猗頓城碁劫上渠之切下居怯切基博弈也劫者謂碁皆相持爭行先後􅀂一劫不當則成彼利矣夐休正切翾縣切蚌盤歩項切以蚌蛤爲盤􅁓鴟處脂切亦曰􅁓鳶孝琬於阮切逌音由頥與之切嗚咽烏結切聲塞也瑒杖梗切又丑亮切濡須人朱切水名存歷淮南陽孫權築塢於此陳紀二通鑑卷一百六十八起上章執徐盡元黓敦䍧即庚辰至壬午凡三年丗祖文皇帝上天嘉元年滑稽上古忽切下古奚切滑亂也稽同也以言辨捷之人言非􅀂是􅀃是􅀂非言能亂異也便辟上毗連切下毗亦切便僻舉上輕易也涇堅靈切宣城邑韋昭曰涇水出蕪湖漅湖漅祖了切在廬江居巢廣志曰有二大湖巢湖在縣東南舳艫上音軸下音盧舳船後持柂處艫船頭刺櫂處嬰城於盈切繞城以自守也伯球巨鳩切炊昌垂切炊㸑蓐食儒欲切謂牀褥中食直趣逡湏切嚮也火炬􅍫許切􅀃文束葦燒􅀩衝並平聲字或作艨艟戰船所以突敵鎔餘封切鎔煉也灑之沙下切汛也蘆荻上龍都切下亭歷切兼葭之屬淖女教切泥寧也器械胡介切械者器之緫名有盛曰器無盛曰械舴艋上陟格切下音猛泌音祕鷙鳥脂利切廣雅曰鷙執也鳥之勇猛者􅀃文擊殺鳥也覘察癡廉切又敕􅃩切窺度也澄汰他蓋切沙汰也嬖博計切愛也道弁皮変切昵愛尼質切或作暱唐突陁没切字夲作搪揬觸也叱利騷叱昌栗切代北複姓騷其名本西郡大人酋帥之號後魏􅀄各依舊號爲氏塼職縁切或作甎古史考曰烏曹作甎兩廡文甫切堂下周屋曰廡睨魚計切邪視也吃訥居乞切言蹇也内刀内讀曰納老嫗威遇切􅀃文母也鴻臚凌如切胡廣曰鴻聲也臚傳也所以傳聲賛導九賔不懌羊益切不恱也沅州匡􅀽切以沅水爲名陳髙祖所置孝珩户庚切糖䭔上徒郎切亦作餹方言錫謂之餹下都回切亦作圎餅也鄱陽蒲何切郡名鄱水所出西入湖系陳芒刺上武方切草耑也下七賜切草芒也字或作䓶粃糠上補履切下口郎切榖不熟爲粃􅂖皮曰糠莊子曰是其塵垢粃糠將猶陶鑄堯舜者也拯難拯救也舊􅀃無切語音䒱上聲伏曼容云濟也杳伊鳥切劼丘八切晡奔謨切目加申時搯曰洽切搯柢也􅀲按曰搯浟以周切死不府九切與否同糴亭歷切市榖也石鼈必列切地名二年傖楚助庚切傖儜也珉眉巾切郷導郷趨也導引也郷許亮切泄先列切漏也間諜上居見切下徒恊切軍中反間者城隍胡光切城池也有水曰池無水曰隍南傍歩浪切依也贇於倫切顥胡老切􅂎墟里切國名春秋􅂎子之地也莒居許切國名春秋莒子之地巫覡刑狄切酖直禁切毒酒絶肋盧則切脅骨也杲炳老黔中巨金切春秋時巴地戰國屬楚秦伐楚取之屬黔中郡二漢晉宋齊屬武陵至後周改曰黔州湝居諧切荔郎計切榷酤榷音角水上横一木以渡喻禁民酤釀官自間置如設木爲榷獨取利也澌息咨切羈縻上居冝切下靡爲切羈馬絡頭也縻牛紖也言牽制之故取喻也三年馮翊與職切郡名握槊色角切通作矟矛長丈八者爲槊琵琶上頻脂切下蒲巴切琵琶胡樂胡人馬上所鼓推手前曰批引手後曰把或從手趑且上取私切下七余切一作趑趄謂不進也賈人音古商賈之人屬籍上殊玉切附也下秦昔切簿書也謂所附之宗籍蒯通蒯苦怪切姓也漢髙帝時人蹶然居月切又音橛跳也彪補休切更相工衡切互也􅄶隘上俾􅃡切下烏懈切狹窄也疽千余切癰也巋區圍切又苦軌切丘媿切穰城人羊切義陽邑踝胡瓦切足骨也轝羊茹切舁車也亦作輿迮側伯切迫也潦魯皓切雨水大皃拍樓堞徒恊切樓堞謂城上譙樓與女垣也鎧仗可亥切鎧者甲之緫名仗謂器仗檛之陟􅀲切馬䇿也左氏傳曰繞朝贈之以䇿杜預云馬檛也乘傳張戀切車傳大呼火故切叫也刎武粉切斷也面縛符攫切杜預云縛手於後唯見其面也漑古代切灌也調度上徒弔切調賦也下徒故切用度也孝琰以冉切娠左氏傳云邑菱方娠杜預注曰懷胎爲娠音之刃切一音身祼郎果切袒也淋漉上力尋切漓也下盧谷切滲也陳紀三通鑑卷一百六十九起昭陽恊洽盡柔兆閹茂即癸未至丙戌凡四年丗祖文皇帝下天嘉四年畏懦乃卧切又乃亂切畏怯而懦弱也箠止蘂切擊也當作捶爭衡上側莖切競也猶曰抗衡尓屈強上其勿切通作倔下其兩切通作彊梗戾也瓦解音邂散也稽顙上康禮切下冩曩切以額觸地戮力音六􅀃文戮力并力也稽康音力幽切芮而銳切頠魚毀切舋許愼切罪舋諶是壬切狼顧魯當切靣正向後而胷腹不轉爲狼顧摧衂女六切挫敗也衰沮將豫切喪也井陘音刑常山邑井陘山在其南入質脂利切以質子結信也如薺在禮切甘菜詩曰誰謂荼苦其甘如薺絞古巧切縊也梟堅羌切斷首掛木上軹􅀜諸氏切在河内軹縣系北齊中楹怡成切柱也舄思積切履也斧扆隱豈切􅀃文戸牖之間謂之扆饌雛戀切具食也或作籑跪巨委切䠆跪也三思蘇暫切參之也語三思而後行驕横胡孟切不順理也箕踞居御切謂伸兩脚而坐其形如箕楔飲胡計切祓除不祥即三月上巳祓禊也輕佻吐刀切爾雅曰佻偷也䙝先列切褻狎縱横並平聲東西曰縱南北曰横子琮藏宗切可汗何干切戎酋稱賂遺弋季切贈也蠕蠕而兖切北狄即柔然國後魏太武以其無知狀􅀋虫故改號蠕蠕慘然七感切慘愴㑹稽上古外切下堅奚切越地禹㑹諸侯江南計功因曰㑹稽㑹稽者㑹計也系陳五年鼓譟先到切群呼矟色角切矛屬或作槊沮澤將豫切浸濕之澤也椎氷直追切擊也冰凍也象水疑之形紊文運切亂也轘之胡貫切車裂人也閹衣檢切也癡超之切不慧也租調徒弔切賦調墾口很切耕也白虹戸公切郎顗云凡日傍氣色白而純者名爲白虹貫日玦古穴切佩如環而有缺也擘之􅀶厄切擘開之也間使居莧切間諜者昞兵永切􅀂干鳳人者切若干複姓鳳其名蹔藏濫切蹔猶卒也通作蹔供養上居用切下弋亮切泯彌鄰切又弭盡切㓕也潼􅀜本名衝關在華隂之東左切首鎧嫗威遇切謡言餘招切徒歌曰謡塡讀曰鎮幡孚􅀽切幟也撾之陟􅀲切捶也脛形定切􅀃文胻也厮役相支切析薪養馬者或作㒋陳紀四通鑑卷一百七十起強圉大淵獻盡重光單閼即丁亥至辛卯凡五年臨海王光大元年所屬之欲切屬望矯敕舉夭切詐也伺間上相吏切下居莧切伺候其間􅂩也昉分兩切華皎華胡化切姓也商湯之後宋戴公考父食采於華子孫氏焉皎古了切繕甲時戰切治也爲質職利切結信也趣逡須切趣嚮之趣他􅀋此澧陽里弟切天門邑叱奴氏叱奴代北􅃨姓叱昌栗切樂浪音洛狼郡名古朝鮮之國其地系北齊瘡痍上􅀄莊切下以脂切皆傷也羡似面切又延面切朝見上馳遥切下胡甸切朝覲君之緫稱見謂自下而見上也軛乙革切􅀃文轅前也赤棒部項切􅀃文梲也謂木杖白螺落戈切地名沌口柱兖切水名在江夏艦户黤切戰船四方施板以禦矢􅃺如牢舸賈我切大船也方言南楚江湖之舸憤恚上房吻切懣也下於避切怒也􅃆州莫踐切系後周樓堞徒恊切譙樓女垣也僵紀良切僨也張掖羊益切郡名應劭曰張國臂掖故曰張掖系後周詰之去吉切問也誹謗府尾切訕也毀也撲殺普木切擊殺也牢掌郎刀切牢獄而掌之也桎梏上之日切在足曰桎下古沃切在手曰梏蕪菁上微夫切下咨盈切草名二年木杆可汗杆居案切汗河干切木杆突厥尊號可汗酋長之稱穹廬丘弓切顔師古曰穹廬旃帳也其形穹廬故曰穹廬孝珩何庚切療力照切􅀃文治也斛斯文斛斯代北􅃨姓其先號斛斯部因氏焉斛胡谷切歧陽翹移切其地在後周獠魯皓切夷獠郷導趣鄉而導引也音許亮切髙祖宣皇帝上之上太建元年賻符遇切助也所以贈終布帛曰賻勱莫敗切份悲巾切綦連猛綦渠之切姓也連猛其名邪臣徐嗟切不正也入不俯九切與否同永卷永巷列宫名有長巷故名之也拉殺洛合切摧殺之也掖庭音亦按韋昭云以爲在掖門内故謂之掖庭也襁褓上舉兩切下􅀘抱切負兒衣􅃛下八切桀黠陸媪烏皓切婦之老者稱盲眉耕切目無眸子曰盲紇下没切百越百越猶百蠻之稱也鄫文公鄫疾陵切國名在琅邪春秋鄫子之地二年讞之語蹇切又魚戰魚列二切􅑪莫結切􅀃文析竹也繡幰許偃切張繒車上爲幰鼓吹尺僞切音律管曛之樂幢宅江切旛幢大賈音古葦羽􅀑切草名􅀃文大葭也通作􅓗憤邑上父吻切下乙及切或作悒憤懣而怏悒也越嶲先蘂切郡名古卭都國越過嶲水因以名焉崤何交切山名在洪農汾扶云切水名岀太原􅀳陽山西南入河三年詡况羽切愔揖􅁋切專横胡孟切恣也函胡䜛切匵也腦乃老切或作腦辮婢典切􅀃文交也翟顯貴翟亭歷切姓也顯貴其名酖直禁切毒酒元􅋲苦旱切谷㑹堒其字未詳曇獻徒含切僧伽求迦切纒弰所交切弓末鄀而灼切南郡之國古鄀子國陳紀五通鑑卷一百七十一起元􅘬執徐盡閼逢敦䍧即士辰至甲午凡三年髙宗宣皇帝上之下太建四年令萱況􅀽切女媧姑華切古之神聖女􅁃季才􅁃以主切姓也堯時有掌􅁃大夫後因爲氏季才其名比日必寐切上台湯來切星名旦奭音適周公旦召公奭昵尼質切近也或作暱踣蒲北切僵也春秋傳晉人踣之承間居莧切乗其間􅂩之時也可不俯九切與否同乘傳張戀切車傳叱羅恊昌栗切叱羅代北複姓恊其名匪懈古隘切􅀃文怠也輯睦輯音集爾雅曰輯和也詭過委切詭詐很胡懇切恨戾怏怏於兩切志不滿也揣􅀄委切度也贇於倫切穆提婆穆姓也提婆名也本駱越之子冒姓穆氏婆蒲何切彰候之向切亭鄣驛􅃸以扞冦也饋餉上求位切通作餽下式亮切通作饟介胄上居拜切鎧也下直祐切兠鍪也撾背陟􅀲切捶也謡言餘招切爾雅徒歌謂之謡槲胡谷切木名諜人徒恊切反間者饒舌如招切多言也洪珍陟鄰切怯去劫切畏也撲普木切擊也仆芳遇切又敷救切頓也僵也古泫切折也拉落合切折也剗楚限切平也削也衷甲陟弓切藏甲於衣也左傳楚人衷甲以禍人榻託合切􅇃也湝居諧切合從即容切以利合曰從􅎰音恊厭蠱上於琰切下公户切厭謂厭魅􅀂行符厭俗之爲魅蠱謂巫蠱執左道以亂政指體即爲害人故曰厭蠱恍惚上虎晃切下呼骨切恍惚失意皃斜谷上以遮切下余蜀切漢中谷名南谷名褒北谷名斜首尾七百里剃他計切􅀃文􅚎髮也鬻獄余六切賣也無厭於鹽切不足也府藏藏才浪切蓄物之所大邏便邏郎佐切突厥木杆之子也佗鉢上徒何切下北末切突厥木杆之弟也褥但儒欲切佗鉢之弟繒兹陵切帛也阿史那后阿史那突厥之姓也那囊何切鼎峙文里切鼎足而立也五年蠹國都故切如蠱食木之蠹也瞋目昌眞切張目也噉徒敢切噍啖也黥字渠京切墨刑在面或作剠凱苦亥切歧州翹移切木扶風郡元魏置歧州後周因之灋􅉤上古法字下音巨俱切涂水同都切水出益州牧靡南山西北入繩柵測革切編立木爲之驍勇堅堯切徤也紘乎萌切侏張侏追輸切餌仍吏切食也蒿箭呼髙切蒿矢肘陟栁切臂節也彪􅀘休切龍見當雩見胡甸切雩羽俱切左傳龍見而雩杜預注云龍見建巳之月蒼龍􅀫之體昏見東方萬物始盛待雨而大故􅀕大逺爲百穀祈膏雨前隊徒對切部隊也顔師古音遂摩訶上莫婆切下虎何切銑鋧上蘇典切下胡甸切銑鋧小鑿也槾莫干切又亡旦切蘄渠之切城名胡墅承與切城名沙汰他蓋切擇也閹衣撿切宫中守門者麗伯律麗郎計切姓也伯律其名劾胡得切法有罪也推岀他回切􅀃文排也賄呼罪切財也邙莫郎切又武方切北山名在河南洛陽面腫之隴切釋名曰腫鍾也寒􅀬氣鍾聚也酖直禁切毒酒綜子宋切灄口城失渉切水名在西陽湛陀湛徒減切姓也陀徒何切名也騫去乹切盱眙音吁怡臨淮邑鯁直古杏切鯁魚骨也食骨留咽中爲鯁正直之臣亦如之故曰鯁直孝琰以冉切挫祖卧摧也切擐胡貫切貫也騊駼上徒刀切下同都切駝徒何切駱駝輜重輜側持切載衣車也重直用切載物車也歔欷上朽居切下香依切又許旣切歎息也脯方矩切乾肉爲脯􅀛兹音丘慈西域胡國朐山城音劬應劭曰臨朐山焉有伯氏駢邑東萊邑鼔譟先到切羣呼也驃􅀐匹妙切勁疾皃或作票㻛音暢眚所景切過也災也島上都皓切水中有山曰島瘞壹計切埋也輼輬上烏昆切下吕張切卧車也有䆫牖閉之則温開之則涼後因載喪飾以栁翣遂名喪車六年一溢米弋質切米二十四分升之一也禮曰朝一溢米淑妃神六切後宫女官通作婌跣行先典切足親地衰麻倉回切或作縗喪服苫廬傷廉切編草爲之陟屺口巳切寺名詩曰陟彼屺􅀆􅄶俾􅃡切褊小撻他逹切捶也闔門胡臘切閉也賚落蓋切􅀃文賜也愷可亥切飼相吏切或作飤蠍許竭切螫人蟲徂七余切郎果切􅃝也噱極虐切大􅀏也或作㖸手摶伯各切索持也搤乙革切握也促也陳紀六通鑑卷一百七十二起旃􅀩恊洽盡柔兆涒難即乙未至丙申凡二年髙宗宣皇帝中之上太建七年下邳貧悲切漢武帝置臨進郡永平中更爲下邳國有葛嶧山在其西古嶧陽也澁呐上色入切下儒劣切言艱也又音訥籃縷上力甘切下力主切敝衣也春秋左傳云篳路藍縷長顒魚容切嬖幸博計切賤而得幸也府藏才浪切蓄物之所也儲上陳如切下直里切猶蓄積也疆埸上居良切界也下羊益切畔也乘間居莧切乗間􅂩之間軹􅀜音紙􅀜名也在河内軹縣掎角居綺切南其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之募莫故切廣求也稽胡堅奚切狄種名一曰歩落種蓋匈奴別種劉元海五部之苗裔或云山戎赤狄之後勁居正切徤也殄徒典切盡也貯展吕切積也嗷然牛刀切􅀃文衆口愁也舋許慎切罅􅂩也或作釁從容七㳟切猶休燕也普六茹堅普六茹三字姓堅其名茹人余切本姓楊氏魏㳟帝時賜今姓誼冝􅀉切韞於粉切馹入質切驛傳也芮而銳切太行胡郎切東太行山在河内山陽西北㢸古弼字汾曲扶云切地名汾水之曲也岀太原晉陽煚俱求切汾潞魯故切二州名系後周中潬大亶切城名江南人呼水中沙堆爲潬金墉餘封切城名在河南洺陽西北角三國魏明帝所築系北齊舟艦户黤切戰船四方施扳以禦矢狀如牢繕時戰切吐卧切口液也􅇭口奉甫切􅇭水之口在鄴地子溢夷質切彘直例切豕也噬時制切囓也徇徐閏切行示也忷懼許容切又許拱切或作兇擾恐也左傳曹人兇懼脅之迄業切迫脅陳紀七通鑑卷一百七十三起強圉作噩盡屠維大淵獻即丁酉至巳亥凡三年髙祖宣皇帝中之下太建九年相願相息良切姓也願其名相氏岀姓􅁐又息亮切後秦録有馮翊相雲作德獵賦覘癡廉切又敕􅃩切窺也幟式志切又昌志切旌旗之屬比至必寐切近也粲蒼按切鄴城魚怯切魏郡鄴縣之城系北齊慕容三藏慕容􅃨姓慕莫故切三藏其名藏才浪切按姓纂鮮卑渉歸進拜單于遵循華俗自云慕二儀之德繼三光之容以爲氏子孫襲焉鮮于丗榮鮮于􅃨姓丗榮其名武王封箕子于朝鮮其子食菜於于因氏焉鮮相然切戮力音六并力也送􅅃苦管切誠􅅃鵬鸞上蒲登切下盧官切伺相吏切同候也紿徒在切欺也捶止蘂切擊也􅍕至衣檢切忽也遽也囊奴當切有底曰囊鞍於寒切馬鞍具䕃於禁切資䕃撤直列切去也藉田秦昔切藉借也古者帝藉千畒借民力以治公田天子親耕以爲其先元緯于貴切二諜徒恊切反間者憑軾賞職切車前横木板也憑謂據也俘芳無切軍中所獲也斧􅃏上匪父切或作鈇下王伐切大斧也沮潰上將豫切下胡外切沮壞也潰亂也瓊渠營切可汗河干切戎酋稱重踝胡瓦切􅀃文足踝也紇奚永安紇奚代北複姓永安其名紇下没切朝覲上馳遥切覲君之緫稱下渠遴切入見也致積子賜切芻廪之屬致餼許旣切殺之曰餼九儐必忍切亦作擯􅀃文導也禮器曰擯詔告道賔主也九介居拜切助也杜預曰介輔相威儀者贄脂利切古者相見之禮各執物以爲贄男贄大者玉帛小者禽鳥女贄榛栗􅀥脩琵琶上頻脂切下蒲巴切琵琶胡樂胡人馬上所鼔推手前曰琵引手後曰琶因以爲名努力奴古切方言勉也奏凱樂凱可亥切兵樂曰凱司馬法得意則愷樂愷歌示喜也城濮之戰振旅愷以入于晉移檄胡狄切符檄古者以竹簡爲書長尺二寸麒渠之切仁獸也麋身牛尾一角麟離珍切牡麒也陸機曰麕身牛尾角端有肉音中鍾吕路寢七稔切按路寢制如明堂以聽政路太也人君所居皆曰寢見周禮天官䟽清廟眉召切清廟者􅀕有清明之德者之宫也權衡並如字權重也衡平也衡所以任權而平物之輕重也度量上徒故切下音諒度者分寸尺丈引也所以度長短量者龠合升斛也所以量多少厮役相支切析薪養馬者或作㒋衣綢上於旣切服之也下陳留切大絲繒也綃思邀切生絲也一曰綺屬服縗倉回切􅀃文服衣六寸博四寸直心亦作衰椒兹消切本作茮莍實也似榝意榝似茱茰本草味辛有毒瘖疾於今切不能言也蓬首薄紅切如蓬草之亂詩曰首如飛蓬垢面舉后切面垢汚蠡升音禮没鐸徒落切逌以周切行陳上胡郎切下直刃切十年艦户黤切戰船施板四方以禦矢狀如牢鎻蘇果切銀鐺也髯汝鹽切頰須也搴丘䖍切方言取也舫府望切兩船曰舫轝羊洳切舁車亦作輿又羊諸切蹙子六切迫也羅睺户鈎切輯音集又七入切和也艥即渉切舟櫂或作楫幅方六切布帛廣也或作䋹襆髮博木切絡髪謂之襆㻛音暢郢以井切州名捫音門以手撫持也煬余尚切相質職日切正也謂正自相當擲笏直炙切投笏於地也橈辭女巧切曲也薊音計燕國之邑系後周十一年眚所景切災也過也懾服之渉切懼也失氣也沈湎上持林切下彌兖切沈湎謂嗜酒􅁳醉也輿櫬初覲切親身棺也捜所鳩切索也求也或作諮津私切謀事曰􅖴諏將侯切咨事爲諏頓顙昔曩切額至地也付囑朱欲切託辭也俛首羙辨切又讀曰俯低頭也酖直禁切毒之也妻之七計切以文嫁人曰妻樽彛上租昆切酒器也下延知切宗廟常器也珪瓉藏旱切圭瓉秬鬯宗廟之盛禮周禮云祼圭有瓉以肆先王粉黛上府吻切􅀃文傅面也下待戴切􅀃文􅀞眉也撻他逹切擊也嬪御毗賔切婦也周禮有九嬪九御恐怖普故切惶懼也羽翮下革切羽莖也羽本謂之翮晟氶正切鄷徼馮切地名在京兆杜陵鄖王分切漢南之國漢中有鄖􅀜郕是征切地名在東平恪克各切柵口測革切砦柵也編立木爲之陳紀八通鑑卷一百七十四起上章困敦即庚子凡一年切閉也徇地徐閏切徇略也覬魚豈切勞勉郎到切慰勉之也㗖徒潘切以物餧人令其㗖食也猜警倉才切猜疑也警覺也臨涇堅丁切安定邑系後周葉式渉切南陽邑楚葉公邑有長城號曰方城系後周沁東七鴆切沁水之東饟式亮切餽也或作餉慅慅采老切爾雅慅慅勞也又音騷動也縻縶上美爲切下陟立切皆繫也縻牛紖也縶絆也幾敗巨依切近也亟發紀力切又去吏切疾也􅃆彌兖切州名儇呼縁切州名爲質職利切結信也趣浚須切嚮也他放此猥􅀩烏賄切猶濫也耄莫到切老耄栰房越切舟伐也或作筏大曰栰小曰桴詭道過委切詐也雷霆上魯回切古作靁下唐丁切靁者隂陽薄動霆者雷之餘聲也兠鍪上當侯切下莫浮切首鎧也識不俯九切與否同遏烏葛切止也遮也縛符攫切繫也束也逹挐女加切暹息廉切蓼隄力竹切蓼縣之隄去梁郡七里挑戰徒弔切擿嬈敵以求戰沛博蓋切沛國之邑屠其城同都切屠謂破取城邑誅殺其人如屠六畜然洙水市朱切水出㤗山蓋臨樂山北入泗檻送户黤切載囚車也甑山子孕切縣名珣相倫切㢸古弼字漳口諸良切漳水之口山海經曰漳水出荆山南注沮大摩訶上眉波切下虎何切氐帥丁奚切氐羌酋帥逹奚惎逹奚代北複姓惎其名渠記切俸房用切秩禄也百揆求癸切度也揆度百事書曰納乎百揆代奰代徒耐切姓也奰平祕切名也玉逹玉音肅姓也逹其名陳紀九通鑑卷一百七十五起重光赤奮􅀂盡昭陽單閼即辛丑至癸卯凡三年髙祖宣皇帝下之下太建十三年隋姓楊氏諱堅小名那羅延周大象二年封爲隋王明年受周禪改元開皇國號隋始於此􅁃季才􅁃以主切姓也季才其名煚俱永切璽紱上想氏切下分物切印之組也憤房吻切問也惋烏貫切驚歎躊躇上直由切下直魚切爾雅躊躇猶豫也彪􅀘烋切昞兵永切固爭側迸切惲於粉切絢許縣切湜常職切萊郎才切春秋萊子之國襁褓上紀兩切下博抱切􅀃文曰小兒衣熾昌志切邳公貧悲切國名即魯薛縣弛賞是切放也劾胡得切法有罪也譴去戰切􅀃文謫問也泄先列切漏也瑳倉何切又千可切汾州扶云切以汾水爲名元魏所置系隋夐虚政切又翾縣切邘雲俱切國名周武王子所封河内野王縣西北有邗城犧牲虚冝切宗廟之牲也牲師庚切全牛也胡墅承與切城名好肉好肉謂錢之形制也漢書食貨志云好肉皆有周郭韋昭曰肉錢形也好錢穿也巫蠱公户切巫師爲蠱故曰巫蠱左傳注曰蠱惑也率更令更工衡切官名㳂革上余專切㳂襲也下各核切革更也折衷陟仲切折􅇆平也裊轘上堅堯切斷首掛木上也下胡貫切以車裂之徹敕列切通也臠力兖切肉臠璠孚􅀽切方輦力展切挽車也方輦謂並車而挽之騃語駭切癡也歧州翹移切元魏所置至隋廢之險詖彼義切心怶憸也一曰險詖不正也字或從心錫徐盈切飴屬嗤之充之切􅀏也發擿它歷切挑也謂動發人之私隱撝吁爲切送質職利切送質子以結信也賧吐濫切夷人以財贖罪也畨禺上普官切又蒲禾切下音虞又魚各切文頴曰南海郡洽也菴邏上烏含切又音淹下那佐切突厥佗鉢可汗之子也玷厥多忝切突厥種名奚霫子習切東北夷名狼頭纛徒沃切又音蹈按突厥傳其先居西海之右獨爲部落爲隣國所滅其族有一兒年且十歳兵人刖足斷臂棄草澤中有牝狼以肉餌之及長與狼交合遂有十男其後各爲一姓惟阿史那氏最賢遂爲君長故牙門建狼頭纛示不忘本也契丹契音乞其國在庫莫奚東與庫莫奚異種同􅀋十四年鈍徒困切礪力制切砥石剉麄卧切斫也媪烏皓切女老稱掣昌列切挽也肘陟栁切臂節也褶袖徒協切衣之在上者也短衣廣䄂鼔吹尺僞切音律管壎之樂紿徒亥切欺也僵仆上居良切僨也下芳遇切頓也暠下老切又古老切典籖七簾切官名鴻臚凌如切胡廣曰鴻聲也臚傳也所以傳聲賛導九賔骨鯁古杏切骨彊四支故君有忠臣謂之骨鯁溳口于分切溳水之口􅀃文水出南陽蔡陽入夏水沌陽杜兖切沌水之陽沌水在江夏控弦苦貟切滿引也可洛峐古來切山名無㝵音礙猶曰無遮也周槃蒲官切地名慷􅁣上口莽切下苦蓋切慷􅁣竭誠也拳逵貟切手也􅇌一口切捶擊也昱余六切臨洮土刀切隴西邑洮水出西羌中東北入河長城公上至德元年忤五故切逆也不懌羊益切不恱也鄱陽蒲何切或作畨郡名鄱水所出北入湖系陳縡作亥切汶州音問以汶水爲名水出琅邪􅅦酒音角喻禁民酤釀官自開置如水上横一木以渡獨取利也賚洛代切賜與也縑古甜切􅀃文并絲繒也織之翼切作布帛緫名齊斧齊如字又音資張晏曰征伐斧也以整齊天下也張軌曰齊斧蓋黄􅃏也應劭曰齊利也虞熹老林云齊當作齋凡師出必齋戒入廟而受斧也疫營􅃗切人皆疾也磧北七迹切沙上曰磧也其地在塞北晃胡廣切琮藏宗切敦煌音屯皇郡名努力奴古切方言勉也沅陵愚􅀽切武陵邑租調徒弔切澹徒濫切汴水皮變切水出陳留浚儀隂溝至􅀩爲雝水所解下買切曉也叢脞上才公切下倉果切書曰元首叢脞哉孔氏傳云叢脞細碎無大略日旰古按切晚也晏也彧於六切燎炬上力小切下其吕切束葦燒也孥乃都切子也亦通作帑緇素側持切緇謂繒之黒色素謂繒之縞白者陳紀十通鑑卷一百七十六起閼逢執徐盡著雍涒灘即甲辰至戊申凡五年長城公下至德二年稱是昌孕切等也餞音踐灞上必駕切本滋水秦穆公更其名隴州力踵切漢汧縣後魏置東秦州又改爲隴州村塢於五切亦作隖堡博抱切堡障小城也烽堠敷容切燧候表也邊有警則舉火榆􅀜羊朱切在隴右􅀩恬爲秦侵胡闢地數千里累石爲城植榆爲塞是也渭水于貴切水岀隴西首陽渭首亭南谷東入河潼􅀜徒東切本名衝􅀜在華隂諤逆各切緫丱古患切束髪爲角兩䯻相並擯必刃切斥他舋許愼切隙鏬也齧五結切噬也頓顙昔曩切下其額也跪去委切䠆跪妻之七計切以女嫁人曰妻結綺云􅀝切閣名楣旻悲切户楣釋名楣近前各兩若面之有眉檻户黤切欄檻沈檀上持林切下唐干切皆香木也間以居莧切厠也異卉許偉切百草緫名龔九容切姓也複道方六切上下有道故謂之複淑媛上方六切下王眷切後宫五官號婕妤上音接下音于顔師古曰婕言接幸也妤美稱也眄睞上普莧切下洛代切傍視縱横上子用切下胡孟切放縱而恣撗也豪􅁵里之切或作􅁵孟康曰豪兎豪也十豪爲􅁵珥貂蟬珥刃止切璫也貂丁􅂓切貂蟬惠文冠也以貂尾爲飾附蟬爲文蟬取其清髙飲露而不食貂紫蔚采潤而毛不彰也從容七㳟切三年本暈本與㡷同戎姓暈其名音運蒲坂甫逺切河東邑有歷山舜所耕也相屬之欲切聮屬也􅀛兹音丘􅄌西域胡國髙麗音黎東夷國名廐馬居宥切馬舎也菽式竹切豆也殭尸居良切死不朽也帑藏上他莽切又音奴藏金帛之所也下才浪切物所蓄也損耗火到切減也王氣于放切太元曰五行用事者王過不俯九切與否同昕許斤切四年党項羌党音黨漢西羌别種其地古析支也郕時征切地名在東平春秋魯孟氏邑行間寒剛切列也詰之去吉切􅀃文問也日􅉴札色切日昳也伷直祐切嵬王訶嵬五灰切訶虎何切吐谷渾之太子也祥明元年夲字犯仁宗廟諱改曰祥懦乃卧切又乃亂切弱也木杆居按切突厥可汗之號諜徒協切軍中反間者穫黄郭切􅀃文刈榖也地窖居効切說文地藏也勱莫敗切蘄渠之切州名後周所置系隋滁直魚切州名隋所置湓城蒲奔切在尋陽不拯舊􅀃無切語音蒸之上聲救也艦户黤切戰船四方施板以禦矢狀如牢舴艋上陟格切下音猛小舟也厭之一渉切廣雅云厭鎮也詆丁禮切毀訾也疆埸上紀良切界也下羊益切畔也麋明悲切鹿屬二年恮此縁切孽魚列切妖孽鉗口其淹切鉗束其口也愠於問切怒也澹然徒濫切静也安也恬也琬於阮切中流矢竹仲切傷也飛矢曰流矢頡胡結切伽求迦切璞匹角切灘他干切艘蘇刀切船之緫名峭七􅀏切􅀃文陖也迅激上思晉切下吉歴切礙衺疾波也銜枚音媒􅀂馬之銜勒所以止言語讙􅅝周官有銜枚氏枚狀如箸横銜之遲明丈二切言事畢然後天明明遲於事故曰遲明艫龍都切舳艫嶷語其切又魚力切采石在丹陽蕪胡一號牛渚磯裨王頻彌切偏副也資治通鑑釋文卷第十八
