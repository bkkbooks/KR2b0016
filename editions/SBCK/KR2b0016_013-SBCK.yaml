body:
  text: 右宣義郎監成都府糧料院史宋紀一通鑑卷一百一十九起上章涒灘盡昭陽大淵獻即庚申至癸亥凡四年髙祖武皇帝帝姓劉氏名裕字德輿小字􅀉奴晉義熈十三年進爵爲宋王至元熈二年受晉禪國號宋建元永􅀄永􅀄元年熾磐上昌志切下歩丹切西秦王乞伏氏之名從容七㳟切休燕也解其音蟹曉也拊髀上匪父切拍也下部禮切股也雍於用切州名以其四山之地所擁故以雍名焉亦謂西北之位陽所不及隂陽氣雍閼也入南北系宋按南北史無地理志今用晉志郡邑相統屬處各於逐國所有土地合音釋者仍分所系燕朝上烏前切下直遥切慕容氏之燕也操千髙切執也蕩滌徒歷切洗也除也更始工衡切改也倣甫兩切效也秣陵莫􅁑切丹陽郡之邑系宋冠軍古喚切功冠諸軍故曰冠軍褚后丑吕切姓也嶠渠廟切侃空旱切羡之延面切又似面切殄瘁似醉切輕易弋豉切亦輕也翳犢上於計切下徒谷切山名在後魏馮滷郎古切池名在後魏林邑南蠻國名本日南郡象林縣漢末功曹姓區有子曰連殺令自立爲王子孫遂有其地其國延袤數千里以塼爲城蜃炭塗之人皆奉佛文字同於天笁鈔掠楚交切又楚教切略取也浩亹上音誥下音門水名也亹者水流峽山岸深􅀂門俗呼此水爲閤門河蓋疾言之浩爲門耳因以名縣屬金城郡系西秦張掖羊益切郡名應劭曰張國臂掖故曰張掖也系北涼兼并􅂌政切僥堅尭切倖也蓼泉力竹切地名系涼眺他弔切敦煌音屯皇郡名糸北涼牧犍居言切北涼沮渠􅀩遜之子索嗣昔各切姓也嗣其名勞之郎到切慰也桴芳無切軍所獲也酋狄温子酋自秋切杏城羌種名二年上邽音圭天水郡之邑系宋苑委逺切苑囿也灌古玩切澆也吐谷渾谷余蜀切渾戸昆切其先本遼東鮮卑徒河渉歸之庶長也名曰吐谷渾其後因以爲號焉沮渠鄯善沮子余切鄯時戰切本臨松盧水胡人其先爲匈奴官號沮渠因氏焉鄯善其名甖烏莖切􅀃文缶也酖直禁切鴆毒伺相吏切候也一曰奄闚也臨于力禁切􅂘也契汗秃眞契音乞汗音寒秃吐谷切契汗夷種國號秃眞其名輻湊上方六切車輪轑也下千候切輻共轂也夲作輳謂衆輻之所共輳塡咽音因塞也本作垔它倣此三年檀道濟檀徒干切姓也大公爲灌檀令其後因以爲氏焉瘳勑留切疾愈也賑之之刃切贍也乞伏是辰乞伏複姓也是辰其名爲西秦將與秦王熾盤同姓按乞伏本鮮卑乞伏部酋帥名其後因以爲氏焉瞽言公户切矇瞽者之言無所􅀚望儲貳陳如切儲副幾危巨依切近也拔拔蒲撥切代北複姓即後魏柘拔氏也後爲長孫氏達奚代北複姓即後魏拓拔氏也逹奚後爲奚氏丘穆陵代北複姓郎後魏拓拔氏也丘穆陵後爲穆氏丘敦代北複姓即後魏拓拔氏也丘敦後爲丘氏滑臺護八切本春秋鄭之􅅒延邑其城甚固後魏置東郡又改爲滑州因滑臺以爲名欻起許勿切暴起乘舋許愼切􅂩罅也通作釁灅南魯水切水名岀鴈門後魏明元帝築宫其地名曰灅南挫祖卧切摧也銳弋稅切利也翟廣亭歴切姓也滑稽户八切姓也本滑伯國􅁎姓其後因以爲氏陽瓉藏旱切黒矟色角切長矛也或作槊栗磾都奚切晃胡廣切徇徐閏切行示也道瑾渠遴切娥清五何切姓也碻磝上苦勞切下五勞切城名後魏爲濟州治所琰以冉切東莞音官故魯鄆邑晉太康中置郡系宋竺䕫張六切姓也曇逹曇從含切姓也營陽王景平元年鄴魚怯切魏郡之邑系後魏臨淄側持切齊國之邑系後魏潰胡對切亂也芟夷所銜切刈也募莫故切廣求也延袤音茂延長行也南北曰袤東西曰廣驃􅀐毗召切勁疾皃或作票晡奔謨切日加申時嬰城於盈切繞也繞城以自守濮陽博木切晉爲濮陽國至後魏改爲郡枋頭分房切建安中曹公於淇水口下大枋木以成堰遏淇水東入白溝以通漕運時人號其處爲枋頭在汲郡系後魏縊於計切又於賜切塹七艶切坑也橦車直降切擊也或作䡴衝城車大麻絙居登切以大麻爲索也盟津並如字即孟津也按孔頴逹尚書䟽云孟者河北地名春秋所謂向盟也於其地置津謂之孟津論衡曰武王伐紂八百諸侯盟此故曰盟津河内河陽縣是也系宋大形甸切山名其地險固在琅邪陽都縣系宋臨朐其居切東莞郡之邑系宋器械胡介切械者器之緫名柔然按傳柔然姓郁乆閭氏始元魏神元之末掠􅀐得一奴髪始齊眉忘本姓名其主字之曰木骨閭木骨閭者首秃也木骨閭與郁乆閭聲相近故後因以爲氏木骨閭生穆帝時坐後期當斬亡匿廣漢谿谷間有衆百餘人至其子車鹿㑹雄健始有部衆自號柔然大武以其無知狀􅀋於虫故改其號蠕蠕䜟楚譛切䜟驗也莫者阿胡莫者代北複姓阿胡其名太行胡剛切山名在河曰山陽西北系後魏峭七􅀏切峻也參合陂參蒼含切參合代郡之邑陂阪也池也音班糜切系後魏秃髮傉檀秃他谷切秃髮虜複姓其先壽間之在孕其母胡掖氏因寢産於􅀍中朝鮮謂􅀍爲秃髮因而氏焉秃髪烏􅀌以後魏元興元年僣號西平王稱南涼及國滅其弟傉檀入魏賜姓兀氏傉音奴篤切畨禾畨白干切禾本作和晉屬武威北涼以爲郡治老耼他甘切姓季名耳字伯陽謚曰耼周守藏室之史也辟􅂖必益切除也漢張良道引不食􅂖孟康曰服辟􅂖藥而静居行氣也圗籙龍王切道家仙籍之書服餌仍吏切藥餌訛吾禾切謬也爰居爰居海鳥也爾雅一名雜縣樊光云似鳯皇爰居事見國語莊子云魯侯御而觴之于廟思無邪似嗟切按論語正義曰詩之爲體論功頌德止辟防邪大抵皆歸於正宋紀二通鑑卷一百二十起閼逢困敦盡彊圉單閼即甲子至丁卯凡四年太祖文皇帝上之上元嘉元年鼔鞞部迷切一作鼙􅀐上之鼔也黷武徒谷切黷猶慢也數也諠譁上許元切下呼瓜切喧閙也闥他逹切門内也韓詩云門屏之間曰闥褊傲上俾􅃡切或作惼狹意也下五到切倨慢也憤邑上房吻切下乙及切憤滿而於邑也細行胡孟切行迹也索山客切取也猥烏賄切曲也棠棣上徒郎切本作常下大計切郭璞云子如櫻桃可食者詩小雅鹿鳴之什取其鄂足得華之光明以興兄弟焉一眚所景切過也春秋左傳云且吾不以一眚掩大德詰旦去吉切平旦誡古拜切敕也璽綬上想氏切王者印也下是酉切又承呪切印之紐也踣蒲北切倒也斃也春秋傳晉人踣之吝嗇上良刃切下所力切吝靳也嗇愛也典籖千廉切官名昵比上尼質切下必寐切親近也或作暱悸其季切心動曰悸曇首徒含切嗚咽烏結切嗚唈而哽咽也貂渠丁聊切谷名在涼地蹺􅀐牽幺切行輕皃婕妤上即葉切接幸也下以諸切羙貌也婦官之稱柔然紇升蓋可汗紇下没切汗音寒按蠕蠕傳即柔然國紇升蓋乃其號尔猶夏言制勝也可汗酋長之稱猶夏言皇帝也耽都含切慕璝古回切勠力音六并力也稽康音力幽切吕静字韻與飂同字林音遼氐羌丁奚切按風俗通云氐本西南夷種地理志武都有白馬氐又魚豢魏略云漢置武都郡排其種人分竄山谷或號青氐或號白氐續漢書云羌三苗萎姓之別裔也柞山音昨其地在柔然國宕昌徒浪切西羌別種其先岀自三苗之裔漢時先零燒當等丗爲邊患其地東接中華西通西域南北數千里姓別自爲部落苜帥皆有地分不相統攝宕昌即其一也夏主按本傳鐡弗劉武南單于苗裔左賢王去卑之孫北部帥劉猛之從子居於新興虒意之北北人謂胡父爲鮮卑母爲鐡弗因以號爲姓丗領部落至武之孫屈丐當後秦姚興時欲使助没弈千鎮髙平旣而拜安北將軍以鮮卑二萬餘落鎭朔方屈丐襲殺弈干而并其衆僣稱大夏天王耻姓鐡弗遂改爲赫連氏云統萬夏赫連勃勃於黒水之南營都號統萬即朔方也二年叱盧犍叱盧代北􅃨姓犍其名叱音昌栗切後改爲祝氏枹罕枹讀曰膚本枹鼔字也其字從木古罕羌侯邑也河州之邑屬北史後魏武都惠文王氐羌種其地在武都或􅄷池漢建安中有楊騰者爲部落大帥養令狐茂搜爲子騰死羣氏立爲主子孫遂分襲其地宋武帝時佛狗子名盛􅀄守􅄷池帝封爲武都王盛死私謚曰惠文王輜重上側持切下直用切輜載衣車也重載物車也行者之資緫曰輜重裝艦户黤切戰船四方施板以禦矢其狀如牢裝謂褁也三年㬭疾雀切樂冏上五角切姓下俱永切表檄胡狄切符檄幡字􅀽切幡幟脅虚業切以威力相恐也劭實照切幔莫半切幕也廙與職切又音異畏懦乃卧切又乃亂切或作愞畏怯而懦弱也帆檣帆符咸切舟上幔所以汎風或作檣慈良切船檣也柵測革切編木爲之單舸賈我切大船也方言南楚江湖謂之舸檻送户黤切以檻車載送也徒跣蘇典切足親地也訣古穴切訣別髙屐竭㦸切屩也覬音兾相垀力輟切相亞也無間然居莧切間非也拊斐父切拍也赫連赫連夏國複姓本姓鐡弗氏至屈丐始改爲赫連氏自謂徽赫與天連也詳見上蠕蠕乳兖切伙號也姓郁乆閭氏即柔然國後魏太武以其無知狀􅀋於虫故改其號曰懦懦餘見營陽王景平元年土著直略切言著土地而居處有常也蝗音皇螽也熒惑上户扄切下胡國切星名南方主夏爲禮蒲坂甫逺切河東邑有歷山舜所耕也嵻㟍上音康下音郎山名在西羌中湟河胡光切􅀃文細繒也四年洮陽他刀切地蜀零陵諸羌之地也大磧七迹切水渚有石者在後魏鼔譟先到切羣呼也倪研奚切掎之居綺切從後牽曰掎居月切僵也拓拔齊上他各切下蒲撥切虜複姓齊其名􅀄黄帝子昌意少子受封北土黄帝以上德王北俗謂土爲拓謂后爲跋故以拓抜爲氏捍蔽侯旰切衛扞也身中竹仲切傷也流矢如字飛矢曰流矢槊色角切長矛也蕞爾祖外切小皃鳩合居尤切鶻鵃也鳩合猶烏合之稱燼徐刃切火餘也鎧可亥切甲之別名鷙勇脂利切廣雅曰鷙執也凡鳥之勇銳獸之猛悍者皆名鷙也對陳直忍切與陣同鴻臚凌如切官名胡廣曰鴻聲也臚傳也所以傳聲賛導九賔宋紀三通鑑卷一百二十一起著雍執徐盡上章敦䍧即戊辰至庚午凡三年太祖文皇帝上之中元嘉五年降挹一入切謂退抑也疫營􅃗切􅀃文云民皆疾也神䴥古牙切一作麚壯鹿後魏年號尉眷尉紆勿切姓也眷其名上邽音圭天水邑史記故邽戍邑也系後魏壘魯水切軍壁儆備居影切戒也鈔掠􅀄教切略取也頡户結切灋古法字狷古縣切又音絹急也挑戰徒弔切謂擿嬈敵以求戰􅅮戰伯各切索持也偏裨賔彌切副助也齎側􅀆切持也潰胡對切亂也引内讀曰納捫天嶺捫音門其地在北凉西秦界杼直吕切遺弋季切贈也􅄢居例切􅀃文西胡毳布也繒慈陵切帛也又疾陵切沃陵沃烏酷切姓也師子師子國天竺旁國也其國舊無人止有􅀑神及龍居之諸國商賈來共市易􅀑神不見其形但岀珍寳顯其所堪價商人依價取之諸國人聞其土樂因此競至因遂成大國焉刹刹摩訶刹初八切師子王之名天竺張六切西域國名即身毒也迦毗黎迦居伽切毗頻脂切天竺王號浮屠同都切􅀽宏曰浮屠佛也佛者漢覺也將以􅁴悟羣生也六年諳究烏含切􅀃文悉也不數所角切頻數臨哭力禁切亦􅂘也詰起吉切責問也髙車古赤狄之餘種􅀄號狄歷北方以爲髙車丁零其語略與匈奴同而時有小異或云其先匈奴甥也伺相吏切􅍕闚也一曰候也犢徒谷切牛子趣歸趣讀曰促翟承伯翟直格切姓也承伯其名罕开谷开口堅切罕开羌種名漢得其人因以名縣屬天水郡東漢以後省之汧川苦堅切水岀扶風汧縣東北入渭莵園同都切又音􅁟故切按蠕蠕傳莵園水去平城三千七百餘里俘芳無切􅀃文軍所獲也弱水弱水者以其力不能載物故謂弱水按桑欽云水自張掖刪丹西至酒泉合黎餘波入於流沙􅃰邪上竹角切下以奢切字或作涂山名在漠北穹廬丘中切穹廬游帳也其形穹隆故曰穹廬窘渠殯切迫也賈胡音古商賈之胡憤悒上房吻切下於及切憤懣而􅁨悒也妻之七計切以女嫁人曰妻鋌徒鼎切􅀃文銅鐵樸也酢器倉故切醶也或作醋忿恚上敷問切下於避切怒也恨也尫纎烏光切尫弱纎細也刳空胡切剖破隂槃蒲宫切縣名晉屬京兆入南北系夏苛藍苛音何又下可切藍盧甘切山名在隂槃晡奔謨切日加申時闇與暗同七年燥先到切乾也敕勒敕勒之先本匈奴苗裔即鐡勒國也其聲訛轉耳圈渠􅂐切防閑也水潦魯皓切雨水大皃癘力制切疾疫也漳水漳諸良切岀晉魏郡鄴縣即後魏相州泓烏宏切涸下各切水渇也艘蘇刀切船之緫名水滲所禁切滲漉泝河蘇故切逆流而上曰泝墯徒果切落也凶狡古巧切狡獪也并力卑政切兼也並也屬以之欲切委也閽寺呼昆切守門人也鄜城芳無切本秦文公夢黄蛇止於鄜衍作畤以祠白帝之處至元魏置敷城縣隋改爲鄜城隗歸五罪切唱和上尺亮切導也下胡卧切應也儜兒女耕切弱也仆芳遇切僵也頓也㳂河余專切縁水而下也鍾虡音巨爾雅曰木謂之虡所以掛鍾磬也􅀃文曰虡飾爲猛獸紿之徒亥切欺也誑也沮敗材汝切止壞也逼筆力切爾雅迫也愷苦亥切烏訥闐烏姓也訥闐其名訥内骨切闐徒年切嬰城伊盈切繞城以自固也鶉觚鶉殊倫切觚古胡切縣名屬安定本後秦姚泓之地姚泓旣滅其地尋入赫連勃勃穰人羊切豐也重創上直用切下初莊切厚傷也掘其月切搰也符契苦計切符合契約也芍陂芍音酌又音鵲在安豐郡屬北史後魏昔楚相孫叔敖所造以灌田也渒賔彌切水名出弋陽漑功代切井陘音刑常山邑井陘山在南系後魏幢將宅江切軍幢之將帥也蠕蠕傳云千人爲軍軍置將百人爲幢幢置帥徇徐閏切行示也府藏才浪切物所蓄也琛丑林切詭過委切詐也怏怏􅀝兩切志不滿也宋紀四通鑑卷一百二十二起重光恊治盡旃􅀩大淵獻即辛未至乙亥凡五年太祖文皇帝上之下元嘉八年乙旃眷乙旃代北複姓眷其名按後魏官氏志獻帝命叔父之裔爲乙旃氏焉蒲撥切蹙子六切迫也輿櫬􅀄覲切棺也趣絶趣讀曰促賜復芳目切除其租賦也忷懼許容切擾恐也春秋左傳曹人兇懼潰胡對切散也乘輿上識蒸切駕也下羊諸切車輿也下邳符悲切漢武帝置臨淮郡永平中更爲國至宋因之驚怖普故切惶懼也反間居莧切間諜也下間己同音中害竹仲切傷害也探其湯紺切亦作撢邏者郎佐切廵也湛直深切又直減切􅂍則郎切納賄曰􅂍優貸他代切寛也綜子宋切鄣泥諸良切通作障又音之亮切庶擁泥濘也庸㟭武巾切本作岷江水所出秦隴西之臨縣後魏置岷州因山以爲名崐嶺古渾切崑崙山嶺也警蹕上居影切下卑吉切一作䟆漢書云岀稱警入稱蹕顔師古曰警者戒肅也䟆者止行人也邢穎奚經切姓也本周之裔邢侯爲衛所滅其後因以氏焉賢儁予峻切智過千人曰儁諶氏任切詎有其據切字林未知詞也三思蘇暫切參之也論語三思而後行巫蠱公户切巫師爲蠱故曰巫蠱春秋左傳注曰蠱惑也羖羊果五切􅀃文夏羊牡曰羖一􅀃羖䍽手也九年無厭於塩切春秋左傳貪婪無厭泄先列切漏也密雲本漢厗溪縣地元魏立密雲郡及密雲縣焉犒師苦報切餉軍也涪城音浮梓潼邑下涪陵同音僑舊渠嬌切博雅客也驃􅀐毗召切馬行疾皃帶方郡名蓋後漢末公孫度所置入南北系後魏樂浪音洛狼古朝鮮之地系後魏元菟同都切古眞畨之地屬後魏附庸餘封切小城曰附庸附庸者以國事附於大國也􅀒舋許愼切罪也戰陳直覲切與陣同甄灋崇側隣切姓也虞舜陶甄於河濵後因以爲氏糶倉他弔切市􅂖也糧儲陳如切積也夜縋馳僞切春秋左傳夜縋而出㑺之祖峻切墾闢上苦狠切耕也下房益切開也樗蒱抽居切博塞也戯責側賣切逋財也或作債腰髀上伊消切身中也旁禮切股也箕坐居之切謂伸其兩脚而坐其形如箕隱几於靳切馮几也魂魄上胡昆切陽氣也下匹陌切隂神也賜胙胙誤切􅀕福肉也􅄢賔居例切西域國名十年休屠上許蚪切下直閭切武威邑屬北涼涇州堅靈切本漢安定郡涇水岀开頭山至魏大武置涇州懟直􅀋切􅀃文曰怨也郫頻彌切蜀郡之邑廏居右切馬舎也昞兵永切亦作昺郪山千私切又七西切益州山名􅄨士革切葭萌上音加下亡行切縣名三國蜀改爲漢壽晉泰始中又改爲晉壽屬梓橦洋川徐羊切洋水導源巴山東北流逕漢中西郷縣又東北流入漢漢戚夫人生於洋川髙帝寵之名其川曰洋以表誕生之休洋也顗魚豈切十一年秃鹿偎秃吐谷切偎口猥切柔然敕連可汗之兄也斷矟色角切長矛也或作槊椎直追切擊也或作桘索邈昔各切姓也挌殺各陌切擊也其字從手質魏職利切結信也十二年􅉑古伯切國之周文王之母弟封於􅉑悖耄上蒲没切下莫到切老耄而心志惑亂也闔門胡臘切閉也􅀛兹音丘慈西域胡國恱般西域胡各在烏孫西北其先匈奴北單于之部落也性好清潔俗皆剪髮齊眉以䬾餬塗之昱昱然光澤日三澡漱然後飲食也般薄官切又博干切釋典音鉢渴槃陁槃薄官切陁徒何切西域胡名其國在葱嶺東有髙山夏多積霜雪粟特西域胡名古奄蔡也一名温般沙居於大澤在康居西北沓臻上徒合切重也合也下側侁切至也及也大酺蓬逋切􅀃文王德布大㱃酒也髙麗王璉麗力之切璉力展切其先出夫餘王甞得河北女因閉於室内爲日所照旣而有身生一卵置之暖處有一男破而出及長字之曰朱􅀩其俗言未􅀩者善射也雖一矢殪獸甚多大餘之臣謀殺之朱􅀩遂走至紇骨城乃居焉號曰髙句麗因以髙爲氏釗止遥切髙麗璉之曽祖也稒陽古暮切或作㧽漢屬五原至晉省之入南北系後魏摹之音模宋紀五通鑑卷一百二十三起柔兆困敦盡重光大荒落即丙子至辛巳凡六年太祖文皇帝中之上元嘉十三年稍間居莧切瘳也剽猾符霄切又匹妙切輕猾也如炬其吕切如火炬也脫幘側革切髪有巾曰幘中流矢中竹仲切傷也飛矢曰流矢敝褐胡割切短衣殿後丁練切軍後曰殿檻車户黤切載囚車或作㩜莎泉道蘇禾切地名仇池渠尤切山名在武都下辨氐羌之地其上方百頃四面壁立峭絶除固自然有樓櫓􅁍敵之狀髙七里餘苑委逺切養獸之所綴株衛切十四年脅迄業切迫脅撗於胡孟切恣横也琬於阮切破洛那西域國名即大宛國也都貴山城在䟽勒西北者舌西域胡名故康居國也在破洛那西北導譯羊益切傳譯四夷之言者牧犍居言切北涼沮渠蒙遜之子也自稱西河王紿之徒在切欺也􅜫其字未詳十五年潄蘇奏切又音廋浚稽上音俊下音雞山名在武威北率更令更工衡切官名猶秦中更也巾褠古侯切巾謂巾幘褠謂單衣弛施是切懈也十六年􅀍苫詩亷切草覆屋鐔長生鐔夕林切姓也長生其名犇古奔字嬖之博計切愛也乘傳張戀切傳者以木爲之長尺五書符其上以爲信也鹵瘠上郎古切下秦昔切鹵薄而瘠瘦也詰難上去吉切下乃旦切相問難也遊􅀃音稅誘也馛蒲撥切委贄脂利切猶曰委質也面縳符攫切縳手於後唯見其面也鮮卑相然切山名東胡別種因保此山遂以爲號涌泉余壟切騰涌之水鑠書藥切吳提蠕蠕國主名也號敕連可汗闞駰闞姓也春秋左傳齊有大夫闞止音苦濫切駰音伊眞切敞昌两切翹足渠遥切企也舉也行度徒故切度數饑饉上居依切下渠遴切􅂖不熟爲饑菜不熟爲饉披靡普彼切披裂而偃靡也十七年刪丹所姦切張掖郡之邑後魏曰山丹糾剔上吉酉切下他歷切糾舉而剔解之忤五故切逆也僮徒紅切僮僕饋求位切餉也或作餽噉徒敢切或作啖斌悲巾切索山客切取也瘳丑鳩切疾瘉伺察相吏切奄闚也番禾番音盤禾或作和武威邑系南凉黯烏減切密函胡䜛切匵也拂拭上敷勿切下賞職切荻亭歷切草名葦也號􅂘乎刀切大呼也亦􅂘也餐千安切吞也俗作飡稱此昌剰切等也曄筠􅂺切演之音衍志趨逡遇切志所嚮鈇􅃏上方矩切或作斧下王伐切大斧也十八年盎一浪切黔首其嚴切􅀃文黎也秦謂烏爲黔首謂黒色也輯睦音集爾雅曰集和也鉗其淹切以鐡有所刧束也弭母媿切止也疹章刃切疾疹骨鯁占荇切骨彊四支故君有忠臣謂之骨鯁與骾同斃毗􅀕切頓仆也鼎鑊胡郭切鼎大而無足曰鑊以食讀曰飤養也鄯善鄯時戰切西域胡名㸑松子㸑七亂切姓也華陽國志云昌寕大姓有㸑習天門蠻天門郡之蠻夷也漊中力主切天門郡之邑宋紀六通鑑卷一百二十四起元􅘬敦䍧盡柔兆閹茂即壬午至丙戌凡五年太祖文皇帝中之中元嘉十九年幟式志切又昌志切旌旗之屬功費芳木切耗費也定分扶問切且末子余切西域胡國在鄯善西都且末城因以爲號繕時戰切治也髙昌並如字髙昌本西域車師前王之故地其地􅀔髙敞人庶昌盛因名髙昌晉時以爲郡治至後魏爲闞爽所據及闞伯周遂稱髙昌王武興按夷貊傳武興本仇池楊難當自立爲秦王宋文帝討之奔後魏至其兄子又德又聚衆葭蘆以其弟文洪爲白水太中屯武興其後遂爲武興國虎賁愽昆切勇士􅁛也若虎賁獸言其猛也祈山翹移切山名在武都郡西羌地汜儁上符咸切姓下子峻切名樂歌山蠻其地在雍州襄陽縁􅃆彌兖切水名岀武都沮縣東狼谷二十年奂之火貫切岍城苦堅切按後魏扶風汧縣有禹貢岍山岍水所岀至唐築臨汧縣葭蘆城上古牙切下落胡切渡赤河經􅄮山三百四十里即其地覘祠上丑艷切不相吏切闚視也一曰候也二十一年捽昨没切􅀃文持頭髮也掣下尺列切挽也搏伯各切手擊也敺烏口切棰礊也徒跣先典切徒謂歩行跣謂足親地也蹇蹶上九輦切下居月切跛蹇而㒹蹶也芸田于分切除苗間穢也春秋左傳芸人之田償之辰羊切還也標卑遥切舉也識也又必小切巫覡胡狄切男曰覡女曰巫商賈音古行賣曰商坐販曰賈圗䜟楚譛切符命之書䜟驗也爲亢苦浪切子夏傳云極也廣雅云髙也叱延叱昌栗切吐谷渾之種頭銳弋稅切尖也一襲席入切一稱爲一襲猶言一副衣服也菽式竹切􅀃文豆也或作尗象尗豆生之形間道居莧切㣲道二十二年愔一尋切禕吁韋切昶昌兩切溳山蠻于分切在南陽蔡陽溳水之地以餌仍吏切食也于闐徒賢切又徒現切西域胡國餞慈演切又疾箭切􅀃文送去曰餞饌士戀切具食也或作籑旰古按切日晚也晏也襁褓上舉兩切下補抱切􅀒兒衣衾衽上去金切被也下如甚切文字音義云卧席訛五禾切僞也亦作譌詩曰民之譌言盧水胡落姑切北地胡也碻磝津上苦勞切下五勞切後魏城名解見上以􅂍兹郎切納賄曰􅂍從容七㳟切猶休燕也攸屬之欲切附也舛昌兖切乖誤也肘腋上陟桞切臂節也下羊益切胳也在肘後亦作掖玷丁簟切又都念切缺也檄文胡狄切符檄也犯蹕畢吉切擗止行人也儲陳如切儲副也探取他含切拈取之也詰問去吉切誚責也抵蹋敵盍切謂扺諱也不撓女巧切謂不屈也又女教切舋責許愼切罪責也攘􅃑上人羊切下彌蔽切謂揎䄂岀臂也瞋目昌眞切張目也流漣力延切泣下也或作㦁易曰泣涕連如樵薪樵薪謂小木散材折而爲㸑者樵音慈焦切忸女九切愧也又女六切熹虚其切屬藉上珠玉切附也下秦昔切簿書也謂所附宗籍璞匹角切邸丁禮切蒼頡篇曰舎也泯彌鄰切滅也又彌盡也饋求位切餉也餼許旣切生曰餼熟曰饔春秋左傳曰齊人來餼諸侯二十三年壘魯水切軍壁縱弛施是切懈弛迅息晉切疾也又私閠切汾水扶云切汾水岀太原汾陽北山屬後魏掉徒了切揺也振也又徒弔切戲水許冝切在京兆新豐東或作戲屬後魏􅉦厔上張流切下式質切山曲曰􅉦水曲曰厔因山水之曲以爲縣名在右扶風系後魏紐女九切結也系也林邑海南夷貊也其地夲漢日南郡象林縣古越裳界飲於禁切釀具女亮切醖器也眩焉熒絹切目無常主也盪徒浪切滌除也孑遺居列切詩曰靡有孑遺謂無遺餘也登陴頻彌切城上女墻也鼔譟蘇到切羣呼也纂偶作管切纂集而比偶也耦牛五口切耕牛百兩力􅃞切車數信􅀫並如字春秋左傳曰凡師一􅀫爲舎􅄪􅀫爲信過信爲次簳古旱切箭笴休宫屠各屠陳如切即休屠胡也掘其月切穿也搰也櫛阻瑟切梳比之緫名傖荒傖鋤庚切亦作搶吴人罵楚人曰傖賈􅁩傳曰國制搶攘晉灼云亂皃金日磾都奚切漢時匈奴休屠王之子賜姓金氏豪忮支義切狠也宋紀七通鑑卷一百二十五起強圉大淵獻盡上章攝提格即丁亥至庚寅凡四年太祖文皇帝中之下元嘉二十四年敦煌音屯郡名應劭曰敦大煌盛也沮渠牧犍沮子余切犍居言切又渠焉切沮渠姓也其先爲匈奴左沮渠之官因以爲氏索山客切求也守藏才浪切守庫藏者左道禮記曰執左道以亂衆殺無赦鄭康成注云左道􅀂巫蠱也泉貝博蓋切海介蟲也古者象形以貨貝而寳􅀛誚責才􅀏切􅀃文嬈譊也通作譙二十五年潞音路上黨邑古潞子國也系後魏太蒐所求切索也古者以蒐狩習武事詬詈上呼漏切下力智切怒罵也匃古大切乞也或作丐交阯音止或作趾郡名杜佑云南方夷人其足大指開廣􅀂並足而立其指交故名交趾彧於六切焉􅂄於乾切西域胡國􅀛兹音丘慈西域胡國乙直伽求迦切乙姓直伽其名二十六年羯兒居謁切􅃰邪山上音卓下以奢切一作涂山名在後魏淑殊六切岱宗徒耐切風俗通云泰山山之尊者一曰岱宗封禪時戰切積土増山曰封爲墠􅀕地曰禪耽都含切掘其勿切又其月切塹七艶切阬也挑戰徒弔切謂擿嬈敵以求戰也輜重上側持切下直用切輜載衣車重載物車大稔如甚切廣雅曰稔秋􅂖熟也沃火烏酷切灌也偵候丑正切謂覘偵而伺候之也奄至衣檢切忽也遽也琨古渾切鑠書藥切俸房用切秩禄也或作奉大鉤古侯切劒屬樓堞徒恊切譙樓與女垣也木柵測革切編立木爲之當百丁浪切厎也間使上居莧切下踈吏切從間道而遣使也垣謙之垣雨元切姓也謙之其名環釧尺絹切謂玉環金釧也譎誑上古穴切下居况切詐欺也供帳上居用切下知亮切供具帳設也蠕蠕而兖切狄號解見本卷上障之亮切􅀃文隔也翳行壹計切隱蔽而行諜徒恊切反間􅇊巨綺切􅇊倆􅀑縳㐲約切􅀃文束也更事工衡切歷也固爭爭止也讀曰諍郗標上抽遲切姓也標其名音卑遥切噍􅀋作􅀏切如淳曰無復有活而噍食者也青州俗呼無孑遺爲無噍􅀋忿敷粉切又敷問切怒也恚於避切怒恨也翟黒子翟亭歷切姓也黒子名僮徒紅切僮僕餘舋許愼切過也罪也縶脂利切縶維也檻内户黤切檻車之内也溲其踈鳩切溺謂之溲嗷嗷五勞切衆口愁也悸其季切心動也􅄨士革切賑章刃切贍也和好呼到切謂相和輯而愛好也無厭於鹽切無厭謂不足也桑乾川乾音干在代郡鮮卑相然切山名東胡別種因保此山遂以爲號療力照切􅓼病􅀃文治也通作􅓼挫側卧切􅉥望丘弭切舉踵而望也拯按集韻云舊􅀃無切語音蒸之上聲引易抍馬壯吉按陸德明釋云拯救之拯馬融云舉也伏曼容云濟也王肅云拔也子夏作抍拆取也芮芮儒稅切國名誠􅍁苦管切意有所欲也掎角居綺切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之斌悲巾切汧隴苦堅切汧水隴山在後魏之地倩使七政切假也盱眙上况于切下與之切臨淮邑趣逡湏切嚮也幢主宅江切官號諸幢主並九品下階器械胡介切内盛曰器外盛曰械愎弼力切很也撤直列切去也通作徹枋頭分房切地名在汲郡系後魏鞞鼔部迷切􅀐上鼓也釋名鞞禆也禆助鼔節也舸古我切大船也方言南楚江湖謂之舸鐡鎻蘇果切或作鎻長柯斧柯居何切􅀃文斧柄也佛狸里之切控弦苦貢切引也仆音赴又蒲北切頓也僵也兠鍪上當侯切下莫侯切首鎧也鍪或作鞪鎧可亥切甲之緫名突陳上陁没切下直覲切能中竹仲切當也函谷􅀜函胡䜛切􅀜名在洪農衡山嶺山形如函故稱函􅀜漢武帝遷於新安勍敵渠京切彊也春秋傳勍敵之人日􅉴札色切􅀃文日在西方時側也晡奔謨切日加申時没踝尸瓦切􅀃文足踝也創􅀄莊切傷也蒯應苦怪切姓也應其名橐駝上音託下徒何切韋昭曰背􅁏似橐故云橐馳隍胡光切城池也有水曰池無水曰隍蹂女九切踐也剥北角切刻割也葦羽􅀑切大葭也通作􅓗筏房越切箄屬或作撥邏郎佐切廵也艦户黤切戰船四方施板以禦矢狀如牢朝請才性切酃酒郎丁切湘東酃縣之酒猶桑落河多羙酒丗稱桑落酒也幾至巨依切近也僵音薑􅀃文僨也宋紀八通鑑卷一百二十六起重光單閼盡元黓執徐即辛卯至壬辰凡二年太祖文皇帝下之上元嘉二十八年右衛率朔律切官名通作帥掠力灼切奪取也或從刀數有所角切屢也忷懼許容切又許拱切擾恐也劭時照切齎牋西切持遺也揜衣檢切覆也灌古玩切澆也塹七艶切阬也􅁳期彌賔切幽也韲之祖稽切本作􅕖鄭康成曰凡䤈醬所和細切爲􅕖屠之同都切刳也謂殺之如屠六畜然鐡鑱鋤衡切􅀃文銳也一曰犂鐡正朔之盈切正月朔旦也縻滅忙皮切分滅也彄絙上恪侯切下居登切大索也謂以大索爲彄如弓弩彄之彄縋桶上馳僞切以繩有所埀也下他董切方斛謂之桶截昨結切􅀃文斷也或作截肉薄傍各切謂相背􅀒而上城也疫營􅃗切衆皆疾也璞匹角切檀和之徒干切姓也太公爲灌檀宰後氏焉槊上色角切長矛也或作矟通俗文曰矛丈八者謂之矟趑趄上即私切下七余切行不進貌稅調徒釣切稅賦調役也驃􅀐毗召切勁疾皃或作票解嚴撤警也􅅡如劣切燒也飲至於禁切春秋左傳歸而飲至以數軍實杜預注云飲於廟以數車徒器械及所獲也芟所銜切刈也翦即淺切截也堡愽抱切隄也墇也或書作堢典籖七廉切官名彈徒干切糾也軌居洧切詰責去吉切問也誚責也梁鄒側鳩切城名晃户廣切覆載敷救切蓋也禮記天無私覆地無私載儲貳陳如切儲副也酤古暮切賣也或作沽販方願切􅀃文買賤賣貴也市􅌀澄延切市物邸舎也􅉑之將亡古伯切地名周文王母弟􅉑仲封於此故號曰􅉑按春秋左傳有神降於莘􅉑公使祝應宗區史嚚享焉神賜之土田史嚚曰􅉑其亡乎吾聞之國將興聽於民將亡聽於神其後晉荀息伐􅉑滅下陽私立府藏才浪切庫蔵也漢靈帝􅀄開西邸賣官自􅀜内侯入錢各有差按山陽公載記曰時賣官二千石二千萬四百石四百萬其以德應選者半之或三分之一於西園立庫以貯之周邵時照切周公旦召公奭惡來哀都切商紂之臣史記曰惡來善䜛毀諸侯雋乂子峻切智過千人曰雋仇尼道盛仇尼􅃨姓也元和姓纂後燕録亦有洛陽公仇尼倪譚徒含切僧綽昌約切曇首徒甘切諳烏含切􅀃文悉也一曰記也憶也曄筠輒切演音衍瑀王矩切二十九年張掖羊益切郡名應劭曰張國臂掖也系北涼和疋五下切古文雅字矯稱舉夭切矯謂不正也永巷永巷宫中所直名漢官儀曰令一人宦者爲之秩六百石掌宫婢侍使馮翊與職切郡名决録注曰馮馮也翊明也瘡痍上初莊切下以脂切皆傷也穢於廢切惡也趣逡湏切嚮也逼筆力切爾雅迫也猜倉才切疑也太行胡郎切山名按晉地理志云在河内野王西北裝束側羊切褁束也淑殊六切嗤赤之切笑也或作􅸅妬當故切忌也或作妬恚於避切怒恨也辟􅂖必益切不食􅂖也孟康曰服辟􅂖藥而静居行氣書笥相吏切書篋圎曰簞方曰笥竹器也泄先列切漏也巫蠱公吐切巫者執左道以亂政而惑人蠱惑他若行巫厭俗之術埋莫皆切􅄟也鸚鵡上烏莖切下又甫切能言之鳥因以爲名呪詛上職救切或作祝下莊助切亦作不稔如甚切不豐熟也秃髮幡秃他谷切秃髪複姓詳見上幡孚􅀽切冠軍古玩切官名謂功冠諸軍故曰冠軍浢津田候切水名在河東拓跋僕蘭上他各切下蒲撥切又蒲八切或作拔虜複姓一􅀃黄帝子昌意少子受封北土黄帝以土德王北俗謂土爲拓謂后爲跋故以拓跋爲氏大索索晉灼音􅁽顔師古曰音求索之索水名在滎陽屬後魏漢髙與項羽戰于京索間即此應劭曰今有大索小索亭尼延知切又女夷切癡丑之切不彗也苑中於阮切禁苑中也大呼火故切叫也或如字江􅃆莫踐切應劭曰􅃆水岀武都東南入江屠各陳如切本休屠之􅀋因曰屠各胡統萬赫連勃勃於黒水之南營都號爲統萬即朔方郡也爲後魏太武所滅㢮施是切懈㢮曏許亮切曏猶生也忸女六切滔他刀切恱也慢也桑榆羊朱切本名日在桑榆晚也峻私閏切險也陗也􅜫其字未詳資治通鑑釋文卷第十三
