  text: 資治通鑑釋文卷第十四
  hash: sha256:1bbf4fb8f3771dbfff5a8da50c3596c1fe8b5fa95a059b259c1a82e1461dc573
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_014-1a}
body:
  text: 右宣義郎監成都府糧料院史炤宋紀九通鑑卷一百二十七起昭陽大荒落即癸巳凡一年太祖文皇帝下之下元嘉三十年三捜踈鳩切求也旿阮古切惆悵上丑鳩切下丑亮切失意而望恨也惋烏貫切驚歎也湛之直深切又徒減切鑠書藥切三思蘇暫切參思之也論語三思而後行嫌賢兼切疑也或作慊屏必郢切屏蔽也繞爾紹切􅀃文􅆞也内難乃旦切患也黜下入切慧㸃幢隊宅江切執旛幢之隊者斌悲巾切戮力戮力并力也音力竹切又力周切愕逆各切相遇驚也叱之昌栗切呵也眄普莧切視皃克不讀曰否音俯九切徑古定切直也捍侯旰切抵捍也趣逡湏切嚮也顧嘏顧古暮切姓也嘏其名音古馬切喧譟上許元切下先到切驚呼也幾中之上巨希切下竹用切近也中傷也泓之烏宏切惶怖普故切惶懼也石頭城名在丹陽秣陵吴孫權改爲建業築城於此投􅃑彌蔽切衣䄂也憤父吻切懣也衂女六切􅀃文鼻出血殄徒典切盡也義綦音其燾徒到切典籖七廉切官名司􅀠郎計切漢武帝􅀄置以掌徒􅀠而廵察沖持中切㑹稽上古外切下古奚切禹㑹諸侯江南計功命日㑹稽會稽者㑹計也巾箱思將切竹器也謂衣巾之篋僧䖍渠焉切瑾渠吝切楷口駭切又居諧切爗筠輙切覬音兾玠古拜切訣古穴切別也竣且旬切又且縁切徇辝峻切行示也札側八切􅀃文牒也宗慤克角切波迸北諍切散走也波迸猶曰奔波也移檄胡狄切符撽也憾胡紺切恨也暢丑亮切琛丑林切闢毗亦切􅀃文開也驍銳上古堯切下弋稅切驍徤也銳利也湓口蒲奔切湓水在廬江潯陽舫府望切並兩船曰舫又音謗舋許愼切罪舋也柵測革切編立木也上流如字文頴曰居水之上流艦戸黤切戰船四方施板以禦矢狀如牢曜兵弋􅀏切振曜兵􅀔也冠軍古玩切冠者加於首上冠軍言在諸軍之上怯去刼切畏也珍孫知鄰切相屬之欲切相連屬附也溧洲溧力質切水名出丹陽溧陽縣洲之由切水中可居曰洲􅂰息七切脛耑也或作壘魯水切軍壁覘丑廉切又丑艶切闚視也銜枚上乎監切下謨杯切止言語讙􅅝欲令敵人不知其來也周官有銜枚氏狀如箸横銜之繣結於項潰胡對切溢夷質切滿也創􅀄莊切傷也稽顙上康禮切下冩曩切謂額至地也誑古况切欺也諳練上烏含切下郎甸切諳悉而練熟也牛塘徒郎切地名偃瀦曰塘崗方山埭崗居郎切山􅆃曰崗埭待載切壅水也募莫故切廣求也大航寒剛切船也沸亂方未切涫也刳苦胡切剖破也臠力兖切肉臠也噉徒敢切􅀃文噍啖也號哭胡刀切大呼也亦哭也慟哭徒弄切􅀃文大哭也一曰哀過也縛伏約切束也梟堅堯切斷首卦木上媵以證切又音孕媵御也汙瀦上音烏下張如切濁水不流曰汙水所停曰豬恪苦各切淑媛上神六切下于眷切謚柛至切行之迹也愷可亥切盱眙上音吁下音怡臨淮邑更互工衡切更相而迭互也蹻足訖約切舉足行髙也又丘祅切舉趾謂之蹻狼盧當切􅀃文似大銳頭白頰髙前廣後蟹下買切蟲名􅀃文有二敖八足旁行非蛇鱓之穴無所庇悍侯旰切勇也炫金熒絹切明也數襲席入切一副爲襲數襲者猶言數副衣服也櫝徒谷切􅀃文匱也本作匵笥相吏切篋也盛衣之器糜蠹都故切如蟲食木爲蠹也侈充䜴切字林汰也䁹睨上匹計切下研計切􅀃文云衺視也閫苦悶切門橜通作梱忤五故切逆也愜苦恊切心伏也或作㥦濮陽􅀶木切漢東郡之邑晉置濮陽國其地濮水所出南入鉅野屬後魏琬於逺切宋紀十通鑑卷一百二十八起閼逢敦䍧盡著雍閹茂即甲午至戊戌凡五年丗祖孝武皇帝上孝建元年驍􅀐堅堯切健也銖慵朱切十􅁰爲絫十絫爲銖馛蒲撥切闇與暗同湓口蒲奔切湓水在潯陽詰去吉切􅀃文問也􅀃音稅誘也見㡬居希切微也易君子見幾而作溘克盍切􅀃文􅍕忽也朝露陟遥切朝露見日則晞以謂人命短促亦如之竺超民竺張六切姓也黃標卑遥切以黄而標識也又音卑小切諶之氏任切拊膺上方武切下於陵切拍胷也癡王之切下慧也圗籙龍玉切籍也衛率朔律切將也通作帥崧思融切舳艫上音軸下音盧舳船後持柂處艫船頭刺櫂處慆他刀切趣逡須切嚮也舸賈我切大船也方言南楚江湖謂之舸夾陳直覲切與陣同大峴胡典切山名在壽州六安縣有五峴山是以分大小峴桐城亦有五峴非此舋許愼切􅂩罅也翦撲普木切翦伐而撲滅也採石此宰切在丹陽蕪湖即牛渚磯也一名採石鼓棹直教切歌鼔而行舟也或作擢躡尼輙切蹈也履也攫居縛切􅅮也旗幟昌忌切又式志切幟旛也迸走北靜切散走也嬖必計切說文便嬖愛也紿音殆欺也誑也掇豬劣都活二切詩曰薄言掇之掇拾也噉杜覧切噍㗖也中心竹仲切中傷也縈於營切縈繞也薈之烏外切鄱陽音婆或作番郡名鄱水所出西入湖僦即就切賃也翟靈寳翟停歷切姓也誡居拜切敕也繕時戰切治也惽沮上呼昆切惽亂也下將䂊切沮喪也廨古隘切公舎郢州以井切三國時魏文帝以江北諸郡爲郢州尋復爲荆州至宋武帝分荆湘江豫州之八郡置郢州治江夏􅃆口彌兖切􅃆水出武都東南入江過江夏謂之夏水虚耗火到切損也二年葭蘆上古牙切下落胡切氐人地名渡赤河經岐山即其處安輯音集爾雅曰和也扞侯盱切衛扞也三年瑀王矩切澄直陵切熒惑上户扄切下胡國切星名春秋緯文耀釣云赤帝熛怒之神爲熒惑焉位在南方禮失則罰出焉厭之一渉切伏也疆􅂣上居良切界也下夷益切畔也􅂍兹􅀰切受賄曰􅂍更生工衡切更猶再也輪郭輪郭謂錢之形制也按漢書云周景王鑄大錢文曰寳貨肉好皆有周郭鉛􅃬上余專切青金也下先的切銀鉛之間也踊貴尹竦切騰貴也駮之北角切謂乖舛也府蔵才浪切物所蓄也賑章刃切贍也猥烏賄切猶濫也􅇌於口切捶擊也詆訕上丁禮切毀訾也下所諫切誹謗也笨車蒲衮切竹車鹵簿裴古切天子車駕次第爲鹵簿憙許記切􅀃也或作喜傲五到切慢也倨也大明元年畋亭年切取禽獸也崞山音郭其山在鴈門系後魏比至必寐切近也荆榛上居卿切荆􅁄也下側詵切木叢生曰榛諫爭爭上也與諍同僑渠嬌切􅀉也屬籍上殊玉切下秦昔切謂所附宗籍也訛言五禾切謬也或作譌閨音圭閨閣二年釀女亮切醖也酤古暮切賣也伺相吏切候也碣石其列切書曰夾右碣石孔氏傳碣石海畔山禇湛之禇丑吕切姓也湛直深切又徒減切馴船倫切順也激訐居列切攻發人之私也􅄶心俾編切狹意呐呐奴骨切本作訥遲鈍也論語君子欲訥於言矯矯舉夭切勁正皃囂風虚驕切喧也謟黷徒谷切䙝也易上交不謟下交不黷闍東徒切又時遮切曇標上徒含切下卑遥切又俾小切妖於喬切妖怪沙汰他蓋切擇也跌蕩徒結切放蕩也阼存故切主位也怏怏􅀝兩切情不足也榻託盍切牀也􅞿與居切􅀃文共舉也􅆒與章切舉也幽仄仄古側字幽隱也側陋也慿藉慈夜切依藉相㳂與專切㳂襲也閥閱上房越切下欲雪切明其等曰閥積功曰閱怙侯古切􅀃文恃也庇􅄻於禁切亦庇也通作䕃雨雪于具切自上而下曰雨羡之似面切又延面切孟蚪渠幽切窟瓖公窟苦骨切瓌姑囬切鎧可亥切甲緫名矟色角切通俗文曰矛丈八者謂之矟大漠莫各切沙土曰漠可汗河干切戎首稱賄虎猥切􅀃文財也輻輳上方六切下千候切夲作輳輻共轂也謂衆輻之所輳愿虞怨切宋紀十一通鑑卷一百二十九起屠維大淵獻盡閼逢執徐即巳亥至甲辰凡六年丗祖孝武皇帝下大明三年驃􅀐毗召切勁疾皃或作票垣閬垣雨元切姓也閬其名音浪浚隍上私閏切深也下胡光切有水曰池無水曰隍操行上七到切下胡孟切志操而行迹也警蹕上音景下卑吉切警者戒肅也䟆止行人也祝詛上職救切或作呪下莊助切或作􅳊蔣城蔣即兩切姓也風俗通云出周公之裔城其名登陴頻彌切城上女垣也間道居莧切間􅂩之道也纂祖管切集也盱眙上音吁下音怡臨淮邑瑗于願切道􅉖眉殞切齎祖稽切持遺也􅀃舒芮切誘也餉式亮切猶遺也盪定徒莽切盪除而安定之也三緘古咸切緘封也家語曰魯人三緘其口㰱血色治切歠也凢載牲㰱血所以爲盟誓琨之古渾切逼筆力切迫也函表胡䜛切匵也以匵盛表誹謗誹妃尾切又音非亦謗也刻紇則切法有罪也訕訐所晏切謗也或作姍下居謁切發人私也抉眼一決切挑也京觀古玩切積尸封土其上謂之京觀營陳直覲切與陣同苑於阮切苑囿也五路魯故切與輅同五路謂玉路金路象路革路木路並天子之法車皆有錫鸞之飾或曰象五行也金根車九魚切秦始皇以商瑞山車金根之色於是作金根之車商曰乘根秦改曰金根取以金爲飾也羽葆蓋葆􅀶抱切按羽葆華蓋天子之儀衛也四年藉田秦昔切耤借也􅀃文帝藉千畒也古者使民如借故謂之藉通作耤勛詩云切闡齒善切吐谷渾谷余蜀切渾户昆切本遼東鮮卑徒河渉歸之庶長名曰吐谷渾其後遂以爲號忿之敷粉切怒也又敷問切疫營􅃗切疾疫銜之户監切銜恨之也樗蒲抽居切博扄戲名謂博塞呼盧也劉毅家無儋石之儲樗蒱一擲百萬擲直灸切投也沮渠安周沮子余切沮渠複姓本匈奴官號因以爲氏闞伯周苦濫切姓也春秋左傳齊有大夫闞止五年鄴魚怯切魏郡之邑屬後魏明堂並如字夏曰太室商曰重屋周曰明堂按明堂上圎法天下方法地八䆫法八風四逹法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風黃􅃏音越夲又作戊以黄金飾斧故曰黄􅃏詵所臻切斫之􅀂切擊也脅虚業切以威力相恐也探他含切又丁紺切或作標棨信遣禮切􅀃文傳信也一􅀃形如㦸有幡書之吏執爲信或作􅙶從容七㳟切猶休燕也郅君章郅之日切姓也俸扶用切秩禄也淑儀神六切後宮女官通作婌悔吝上虎猥切下良刃切恨惜也六年樂浪音洛狼郡名古朝鮮國系後魏諒音亮誠信也嘿然密北切静也或作黙嘲謔上陟交切言相調也下迄􅁍切戲也禁錮音固禁止而錮塞也澹逹濫切又杜覽切氏豪丁奚切戎種之豪酋仇傉檀仇渠尤切傉奴篤切氏豪名枝􅂀普拜切如木之有枝葉如水之有宗􅂀浮圗圗或作屠􅀽宏漢記浮屠佛也佛者漢言覺也將以覺悟羣生七年謿訐上陟交切下居謁切謿弄而告訐也老傖鋤庚切吴人罵楚人曰傖老慳丘閑切恡也齴魚蹇切露齒皃踣蒲北切僵也倒也崑崙奴上公渾切下盧昆切媟思列切慢也嬻也耽之丁含切眤尼質切親也或作暱擗踊上毗亦切下由竦切孝經曰擗踊哭泣嗚咽上音烏下一結切噫嗚而哽咽也七行胡郎切列也嬖􅀶計切愛也挂古賣切垂挂通作掛顗語豈切褘許歸切八年酣胡甘切酒樂也醒桑經切醉觧也弛惰上賞是切下徒果切懈弛而怠惰也􅁣然口􅁣切太息也撤直列切去也銓衡上逡縁切下何庚切銓簡而衡平也箴諸深切誡也撓女巧切曲也僅渠吝切􅀃文材能也宋紀十二通鑑卷一百三十起旃蒙大荒落即乙巳凡一年太宗明皇帝上之上泰始元年磨鑪上莫婆切下良據切磨礪而錯鑢也耒子盧對切錢名乙渾上於筆切姓也下户昆切又胡本切矯舉夭切正不正也陸麗陸刀竹切姓也古帝號有陸終其後因以爲氏麗鄰知切又郎計切數爭上所角切頻也下側迸切止也劉尼以脂切又女夷切狷吉􅁺切􅄶急也又古縣切閹人衣廉切奄閽閉門者謠餘招切爾雅云徒歌謂之謠贗五晏切僞物也或作偐闈于非切爾雅云宫中門謂之闈苛苛細也音何捶扑上止蘂切下普木切皆擊也慘七感切􅀃文毒也猜倉才切疑也屏息必郢切屏絶氣息也横死胡孟切猶枉也震慴之涉切怖也失氣也通作懾挑吐凋切撥也眼睛咨盈切目珠子也漬之前智切􅀃文漚也一曰浸也粽作弄切通作糭便僻上毗連切下毗亦切便者便人所好僻者僻人所惡迕五故切逆也戢側立切齄莊加切鼻上皰或從􅁏亦作皶誄力水切累也周禮大祝作六辭六曰誄􅀃音稅誘也昶丑两切邑邑乙及切不安皃詰問去吉切誚責也移檄胡狄切符檄也古者以竹簡爲書長尺二寸􅂝户圭切提也俗作携非是屬文之欲切善於文辭也糾奏居黝切督繩其罪而進之故曰糾奏詭辭過委切詐也咫尺諸氏切賈逵云八寸曰咫十寸曰尺得間居莧切􅂩也弭母婢切止也鵝眼鵝五何切錢名宋廢帝置每千錢不盈三寸綖環綖夷然切環胡􅀜切錢名宋廢帝置其錢劣於鵝眼縷隴主切􅀃文綫也一掬居六切􅀃文在手曰掬貴嬪毗眞切婦也周禮有九嬪鸞輅魯故切有虞氏之車有鸞和之節飾之以青取其名耳龍旂渠希切交龍爲旂天子之旌也喁喁魚容切衆口向上怖普故切惶懼也猶豫余救切或如字獸名􅀃文玃屬也聞人聲豫登木無人乃下故曰猶豫鎧仗上可亥切甲也下直亮切器仗也揜衣撿切覆也解其音蟹曉也搯苦洽切抵也爪按曰搯拘舉朱切拘留也􅇌捶烏后切擊也通作毆陵曵餘制切牽挽也木槽財勞切畜獸之食器攪古巧切擾亂也掘渠勿切又其月切搰也裸郎果切露體也曚謨蓬切縛符攫切繫也檐都甘切檐􅀒也級居立切等級也亦階級湓口蒲奔切湓水在廬江潯陽潘欣之普官切姓也周文王畢公之子季孫食采於潘其後因氏焉沈直深切艦户黤切戰船四方施板以禦矢狀如牢沈懷寳式稔切姓也古作邥周文王子􅆅季食采於沈子孫因以爲氏桎梏上之日切下古沃切在足曰桎在手曰梏商紂所作器械胡介切内盛曰器外盛曰械壘魯水切軍壁彊居亮切勉也厭之一渉切廣雅云厭鎭也充牣而振切牣滿也阮佃夫阮虞逺切姓也佃夫其名佃當練切悖虐蒲没切謂悖亂而暴虐也巫覡刑狄切􅀃文能齊肅事神明也在男曰覡在女曰巫不中竹仲切不當也迸走北諍切散走也跣蘇典切足親地也纂祖管切纂承秣陵音抹丹陽邑婕妤上即渉切下羊諸切婕捷幸也妤美稱謬靡㓜切誤也暱尼質切親近也或從尼琰以冉切愕五各切驚也繕時戰切善也藐􅀌妙小墨角二切春秋左專以是藐諸􅀌辜辜罪也音􅀌卞之皮變切宋紀十三通鑑卷一百三十一起柔兆敦䍧即丙午凡一年太祖明皇帝上之下泰始二年絡繹上盧各切下羊益切言不絶也呵叱上虎何切下昌栗切聲訶喝皃龐孟虯龐薄江切姓也孟虯其名虯渠幽切睢陵睢音雖下邳國之邑系索兒索昔各切又山客切下邳符悲切葛嶧山在其西古嶧陽也覬音兾璪作道切慰勞郎到切慰安而勞勉也顧琛上古暮切下丑林切曇生徒含切標卑遥切又必小切元怙侯古切犀利先稽切兵器堅也濟不俯九切與否司矜居陵切􅀃文矛柄也拍手普伯切拊掌之行胡孟切言之迹也閒行居莧切從間道而行煽式戰切動也貯展吕切積也或作著兵難乃旦切控擠控引也苦貢切詶譬時流切通作酬詶酢而譬喻也募莫故切廣求也勔弭兖切曇瓘古玩切部陳直覲切與陣同塘埭上徒郎切偃瀦也下徒賚切以土堨水捷疾葉切􅀗也勝也柵測革切編立木也驍果堅堯切驍健而果敢也潰胡對切水旁決曰潰扞宗侯旰切寨士邁切籬落也首辭式救切首猶服也自狀其過闇與暗同鬻爵余六切賣也販賣方願切􅀃文販賤賣貴也冲之直弓切赭圻上章也切下渠市切地名舟檝即渉切舟櫂也㳂流余專切縁水而下也挂帆上古賣切通作掛下符咸切舟上幔所以汎風陵轢狼狄切如車所踐故曰陵轢諧户皆切和也調也斃毗􅀕切頓仆也一曰死也鋒鏑上敷容切兵耑也下丁歷切矢鏠也詰朝去吉切平旦懦簿乃卧切薄弱也又乃亂切或作偄姥山滿補切山名道蔚紆勿切朝請才性切囊奴當切袋也有厎曰囊無厎曰橐流查鋤加切水中浮木或作搓突圍陀骨切觸而出也舸賈我切大船也方言南楚江湖謂之舸僧暠古老切抄􅀄教切略取也嬰城於盈切繞城以自固也艘蘇刀切船之緫名怯橈上去刧切下女巧切畏恐也恚於避切怒恨也匱之求位切竭也亦乏也􅄨士革切贑古送切南康邑創􅀄莊切傷也誑居况切欺也番禺上蒲何切下魚容切南海邑旣梗古杏切或作鯁如魚骨之塞也下同洄洑上胡猥切􅑴洄也下房六切伏流也蟻聚魚豈切蚍蜉也或作螘易於屯聚泝流蘇故切水欲下違之而上者曰泝流趣逡湏切嚮也蓼潭盧鳥切閎音宏瘧魚約切疾也􅀬寒休作墮徒果切落也舫府望切並兩船曰舫脾蒲攴切􅀃文土藏也偕古諧切俱也刎武粉切斷也慷􅁣上口黨切下口漑切慷􅁣壯士不得志也鎻損果切銀鐺也或作鏁鄱陽音婆或作番三國吴置郡晉宋因之嶠道但嬌切山銳而髙又渠廟切亦作㠐曅筠輙切訢音欣推鞌上他回切下於寒切馬鞁具也曏許亮切與向同陲是爲切逺邊也或作埀旰食古按切日晚而食也狡猾上古巧切狂狡也下户八切姦猾也昱余六切爲質職利切結信也尉元紆物切姓也元其名秅當故切濟隂邑或作秺管籥弋灼切搏鍵器也以啓閉門户豁呼括切離沮將豫切離喪也左衽如甚切衣衿也夷俗衣衿尚左故曰左衽論語吾其被髪左衽矣涪音浮應劭曰涪水出廣漢南入漢蜂起敷容切如蜂之起言其衆也下礚丘蓋切地名與彭城相近璨蒼按切重賂洛故切厚遺之也宋紀十四通鑑卷一百三十二起強圉恊洽盡上章閹茂即丁未至庚戍凡四年太宗明皇帝中泰始三年遁徒困切逃也枕職任切謂尸首相據於地也毫􅁵上乎刀切下力之切孟康曰毫兔毫也十毫爲􅁵􅅃苦管切誠實也㝢内王矩切㝢宙也亦作宇褰開褰去乹切猶闡也倐忽式竹切忽謂迅疾也介胄直佑切介猶鎧也胄謂兠鍪也蟣虱上居豈切下所櫛切或作蝨彊埸上居良切下羊益切疆界也埸畔也日蹙子六切迫也詩曰今也日蹙國百里播穫播種也穫刈也音黄郭切書曰厥父菑厥子乃弗肯播矧肯穫駙馬符遇切駙馬都尉官名漢武帝置掌駙馬翹足渠遥切舉也企也隍胡光切城池也有水曰池無水曰隍儲陳如切糧也東萊郎才切郡名古萊子國朐城權俱切東海郡朐城之縣兇懼兇許容許拱二切􅀃文擾恐也春秋左傳曰曹人兇懼黔陬上巨淹切下子侯切琅邪邑古介國也不其如淳曰其音基長廣邑洋水似羊切洋水岀齊郡臨朐石膏山東北至廣饒入鉅定伺􅂩相吏切伺候其間􅂩也襲似入切春秋釋例掩其不備曰襲韶市昭切睢陵音雖下邳國邑讜音黨忻許斤切慕容白曜莫故切虜􅃨姓其先鮮卑渉歸進拜單于遵循華俗自云慕二儀之德繼三光之容因以爲姓其後氏焉白曜其名音弋照切酈範酈音歷姓也挫祖卧切摧也忿撫吻切怒也麒麟上渠之切下離珍切雄曰麒雌曰麟其􅃺麋身牛尾狠蹄一角仁獸也因取以爲名勍敵渠京切彊也春秋傳勍敵之人怡怡盈之切和皃沂水魚衣切水出東海費縣東西入海狼顧盧當切面正向後而胷腹不轉爲狼顧僥倖上堅堯切或作徼下胡耿切或作婞翻然孚􅀽切涸曷各切水竭也或作沍強遣其兩切或作彊圂城胡困切地名亟去吏切又紀力切疾也島覩老切海中有山曰島炬臼許切束葦燒也鼔譟先到切羣呼也横槊色角切長矛也或作矟􅏿墮上陟玉切下徒果切謂足中寒腫覈而墮者􅂰行息七切脛節或作謂以􅂰而行也平輿音預汝南邑古沈子國有沈亭蹈藉蹈行皃藉踐也音慈夜切或作躤夸枯􅀲切大言也傖荒鋤庚切猶曰荒服壷漿上共􅀌切下資良切以圜器而盛水漿也俚兩耳切南夷種名禕吁韋切畋亭年切取禽獸也崞山音郭在鴈門崞縣因此山取名後魏改爲石城繁畤音止本鴈門邑後魏改置䌓畤郡相悉亮切厭勝一渉切厭塞也恣横胡孟切不順理也饌雛綰切具食也或作籑捉側角切持也五年惡衣烏各切粗服也雜調徒弔切賦調也酬和胡過切酬酢而應和也文萇直良切忿懟直􅀋切怨也大鴻臚音閭百揆巨癸切度也緫度百事蠻獠盧皓切西南夷謂之獠東莞音官晉太康中置郡宋因之翕然許及切合也盛也剽掠匹妙切剽劫也掠奪也鄞音銀又牛巾切會稽邑其地有鮚􆁛六年觀古玩切爕蘇叶切障面之亮切掩面也標榜上卑遥切標榜猶相表􅁀也榜與牓同眞可汗河干切戎酋稱猶曰單于之􅀋也蠢爾尺尹切蠱動皃鑾輿落官切人君乗車四馬鏕八鑾鈴象鸞鳥聲和則謹也通作鸞斛胡谷切十斗爲斛坐論盧昆切議也闚缺規切視也或作闚憾胡紺切恨也檻車户黤切載囚車簪緇岑切首笄也絞古巧切縊也􅋆匹沼切髦枯昆切􅚎髪也于闐徒賢切又徒莧切或作窴西域胡國素目伽求迦切于闐國人名蠕蠕而兖切即柔然國拯救也舊􅀃無切語音蒸之上聲警候警戒也候望也警音景宋紀十五通鑑卷一百三十三起重光大淵獻盡旃蒙單閼即辛亥至乙卯凡五年太祖明皇帝下泰始七年臨漳諸良切本漢鄴縣地全宥尢救切寛也騧姑華切明帝忌諱禍敗凶喪之言改騧字爲􅚷以其似禍字也􅚷同上忤意五故切逆意也刳斮上空胡切屠也下側略切斬也府藏才浪切物所蓄也俸禄扶用切秩禄也嬖倖愽計切賤而得幸曰嬖剛很胡懇切剛愎而很戾也敺拉上烏后切下落合切敺捶而摧拉之訛言五禾切謬也或作譌恟恟許容切擾恐皃又許洪切邸第丁禮切倉頡篇曰邸舎也􅀃文屬國之舎漢書音義曰第謂有甲乙之次第邢祐邢奚經切姓也祐其名僅渠吝切􅂊也嬈懼爾紹切煩亂而憂恐也撫勞郎到切撫循而慰勞也自勝書蒸切􅀃文任也黃􅘼力賀切婦人衣邏將上郎佐切下子亮切逰兵也翦落即淺切􅎒斷也噬虎時制切囓也􅅮狸上伯各切擊也下陵知切伏獸似貙螟蛉亡忙丁切下力丁切􅀃文曰螟蛤桑蟲也或作􅘾剿拉子小切絶也或作剿嫗威遇切􅀃文母也旁孽魚列切庶孽也猶木之有孽也并轡轡兵媚切馬轡也并或音卑政切揃落子踐切揃搣謔迄􅁍切戯也詩善戯謔􅀆􅉠音附助也所以贈終布帛曰􅉠黟歙上於夷切下失渉切二縣名屬新安幻惑胡辨切詐惑稚弱直利切㓜稚或作稺衞率朔律切官名與帥同凖之之尹切毅魚旣切有决也漠南莫各切沙土曰漠馳傳張戀切馳傳者謂奉傳而疾行也慱以木爲之長尺五書符其上以爲信也昭穆市昭切父昭子穆昭南向穆北向璽紱上想氏切王者之印下分物切印之組也癰於容切癰癤吮粗兖切嗽也澹泊上徒濫切下旁各切恬静也采椽上倉宰切下重縁切采本作採木也非文采之采椽謂屋角也斵竹角切不雕刻也抱罕枹字從木音膚金城邑兢不俯九切與否同泰䂊元年酋自秋切長也􅃆水彌兖切出武都沮縣東狼谷東南入江滍葉上直里切又音雉水名出南陽魯陽縣魯山東北下式渉切亦南陽邑也石磧七迹切沙土曰漠即今磧也叩函胡䜛切匵也内奩内讀曰納奩力鹽切盛物器也愔挹滛切敦煌音屯皇郡名屬後魏躡履尼輙切蹈也羈留居冝切馬絆也言牽制而留之如羈馬之義撻他逹切打撻賧罰吐濫切夷人以財贖罪也五溪苦奚切武陵有五溪謂雄溪㨺溪酉溪潕溪辰溪皆蠻夷所居也嶷魚力切又魚其切􅄨士革切牲師庚切犠牲脯匪父切乾肉也蒼梧王上元徽元年演音衍訥内骨切難也典籖七廉切官名太洑房六切伏流也或作澓芻䆫俞切刈也窘巨隕切廹也二年蠱惑公吐切疑惑也委積上於僞切下子賜切牢米薪蒭之緫名瓦解胡買切散也索筆山客切取也白虎幡孚􅀽切旗幟名趣逡湏切嚮也爲質音致結信也醇酒殊倫切不澆酒也􅅮戰伯各切索持以戰也晡奔謨切日加申時皂莢橋古恊切木名因以號橋朱雀桁胡剛切與航通方舟也駕方舟爲橋在國之南故名爲朱雀桁撤直列切去也趣讀曰促踣蒱北切倒也眚所挭切災也過也從容七㳟切從容猶休燕也杜姥宅莫􅀘切地名剔他歷切挑也諦視丁計切審也慷􅁣上口黨切下口漑切憤意闔門户臘切閑也彈詰上唐干切糾也下去吉切問也覆鞠居六切窮理罪人也囹圄上盧經切下魚吕切周獄名撲討普下切擊討也蠻蜑蕩旱切蠻屬隔閡音礙外閉也防邏郎佐切廵也闚􅎿上缺䂓切下容朱切私視也三年信饋求位切餉饋間之居莧切諜也屬意之欲切委也宋紀十六通鑑卷一百三十四起柔兆執徐盡著雍敦䍧即丙辰至戊午凡三年蒼梧王下元徽四年鴆毒直禁切毒鳥也以毛羽歷飮食即殺人祔符遇切以後死者合食於先祖膳羞時戰切具食也庖人和味必嘉善爲膳致滋味爲羞琚斤於切杞嶷􅂎口巳切姓也出自夏后氏之後嶷魚力切馮翊逸織切郡名决録注曰馮馮也翊明也屬後魏鐡卷去願切􅀃文契也釋名曰劵也相約束繾綣爲恨也叡以芮切笞箠上超之切下之累切皆擊也濔綿婢切顒魚容切伺相吏切伺候也傖人助庚切纂嚴祖管切集也驍􅀐堅堯切徤也泊白各切止也倪奴研奚切翽呼外切順皇帝昇明元年崞山古􅀶切在鴈門石城縣屬後魏市􅌀澄延切􅌀市物邸舎厮養相支切析薪養馬者或作㒋吹箎陳知切管樂也以竹爲之長尺四寸九孔丗本曰蘇成公所作也鋋矛時連切小矛也鍼其廉切籋也椎直追切擊也或作桘通作槌鋸居御切槍唐也通作鐻慘然七感切愁不申也狡獪上古巧切下古外切狡獪兒戯也刳苦胡切剖破也臠力兖切或作脟切肉臠也裸􅃝上郎果切下徒旱切露體也射堋逋鄧切射埻也骲箭薄巧切骨鏃謂之骲其齊前西切􅀃文肶臍也或書作臍通作齊猖蹷上尺良切下居月切猖狂顛蹷也扶匐上蓬逋切手行也或作匍下蒲北切伏地也或作伏詗呼政切又火逈切知處告言也覘見丑艶切窺也窐孔音圭甑空也須髯如占切頰須也韞於粉切拊膺斐父切拍胷也􅋆匹眇切瑛於京切梟夷堅堯切梟首夷族也元琰以冉切馬橙都鄧切馬鞁具韜他刀切藏也裲襠角上良奬切下都郎切其一當背其一當胷惋駭烏貫切驚歎也湓口蒲奔切水名在廬江潯陽控制苦貢切控禦也樓櫓魯故切城上守禦望樓釋名曰櫓露也上無覆屋柵測革切編立木爲之曇瓘上徒含切下古玩切舋難上許愼切舋􅂩下乃旦切禍難彊之其兩切迫也弩力奴古切方言勉也啜羮昌恱切爾雅茹也拳敺上逵貟切下烏后切以手擊之也其頰古恊切面傍也仆芳遇切僵也頓也又敷救切并力卑政切兼也並也俣虞矩切陔抲開切詰旦去吉切平旦泄先列切漏也景倩倉甸切瓌公回切蹔昨濫切不人也亦作暫挫銳上則卧切下弋稅切摧折其利也挑戰徒弔切謂擿嬈敵以求戰也堦闥上居諧切下他逹切堦房闥也慴憚上質渉切慴懼也黃􅃏玉伐切斧也以黃金飾之榗紳即刃切紳帶也搢挿也挿笏於紳也搢或作縉犲狼犲牀皆切狼屬狗聲狼似大頭白頰髙前廣後掣肘上尺列切挽也下陟栁切臂節也魄匹陌切隂神也剽勇匹妙切輕勇二年羫苦江切骨體曰羫薺才詣切草名詩云誰謂荼苦其甘如薺毓余六切咀在吕切嚼也偵丑正切覘也鶴唳郎計切鶴鳴櫟林來的切在南郡華容縣界擎渠京切舉也楯食尹切矛楯之楯青繖蘇旱切蓋也徇辝峻切行示也宕昌徒浪切西􅆧別種其先三苗之裔漢時先零燒當等丗爲邊患其地東接中華西通西域南北數千里姓別自爲部落酋帥皆有地分不相統攝宕昌其一也晃户廣切虎圈求逺切養獸之所㦸訖逆切有枝兵也朏敷尾切眄普莧切顧眄澆薄堅堯切漓薄也晷居洧切日景臨澧里第切天門邑鞞拂上部迷切釋名曰鞞禆也禆助鼔節也吕氏春秋曰帝嚳令人作鞞鼔之樂下敷勿切􅀘綴陟衛切連綴資治通鑑釋文卷第十四
