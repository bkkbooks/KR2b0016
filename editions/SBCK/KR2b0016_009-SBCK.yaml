body:
  text: 右宣義郎監成都府糧料院史炤晉紀一通鑑卷七十九起旃蒙作噩盡元黓執徐即乙酉至壬辰凡八年丗祖武皇帝上之上帝姓司馬諱炎懿之孫昭之子丗執魏政魏咸熈元年昭進爵爲晉王炎爲丗子明年昭薨炎嗣晉王位尋受魏禪改元泰始國號晉追謚懿宣帝昭文帝師景帝泰始元年璆渠幽切彧於六切濡湏音儒水名在淮南歷陽孫權築塢於此屬揚州自此以下凡言郡邑州名悉以晉地理志它皆放此票􅀐毗召切勁疾貌闡齒善切靚疾正切又疾郢切金墉城音容在河南洛陽西北角屬司州魏明帝所築歔欷上休居切下休旣切歎息也鄴魚怯切魏郡之邑屬司州伷直又切東莞莞音官郡名屬徐州肜以中切群從才用切謂從父從祖及從昆弟沈持林切有差􅀄加切有等差也顗語豈切質任上陟利切信也下汝鴆切徐也矯舉夭切正曲也通作橋絲紖直忍以忍二切牛系也或作絼恪克各切謹也儁子峻切二年王氣于放切太元曰五行用事者王鴻臚力居切漢景帝改秦典客爲大鴻臚應邵曰郊廟行禮賛九賔鳩聲而臚傳之也沈醉持林切沈湎於酒也下沈痛同轝羊諸切舁車也咋齧上側革切本作齰下五結切皆噬也凱可亥切徼幸堅堯切通作僥衰絰上千囬切杜預曰衰在胷前下徒結切䘮首戴也苴千餘切麻之有子者䘮禮服苴麻取其麤也衣錦於旣切相解舉蟹切判也省息并切察也審也􅁵陵之切理也革而正之惡烏故切猝且没切倉猝也泝流桑故切逆流而上曰泝塉确上秦昔切塉薄下克覺切磽确謡餘招切爾雅曰徒歌謂之謡比至必寐切譟先到切羣呼也還都還讀曰旋巫覡胡狄切在男曰覡在女曰巫能齋肅事神明也璽紱上想氏切印也下分忽切印之組也三年憙許記切劾胡得切法有罪繆眉救切戾也犍爲渠焉切郡名屬益州洗馬東宫官屬秩比謁者國語曰勾踐親爲夫差先馬先猶前馬也私見切樓觀樓重屋也觀古玩切闕也華覈華胡化切姓也覈夏革切厝倉故切置也通作措交趾音止郡名按杜佑云南方夷人其足大脂開廣􅀂並足而立其指交故以爲名屬交州卒有且没切猝急也烽燧上孚逢切下似醉切邊有警急則舉火夜曰烽晝曰熢甔石都濫切齊人名小甖爲儋受二斛耗財火到切減也損也睢陵音雖下邳國之邑屬徐州䜟緯上楚禁切下于貴切䜟文圖緯書名鮮卑拓拔沙漠汗汗音寒鮮卑者東胡之别種依鮮卑山因以爲號柘他各切拔蒲撥切自云拓天而生拔地而長遂氏曰拓拔乃元魏之先沙漠汗其名四年亭傳傳知戀切釋遽也周禮十里有廬廬有飲食三十里有􅀫􅀫有路室注云可止􅀫若今亭有室也亭者人所停集􅀓者轉轉相傳黜陟丑律切黜退也陟進也書曰黜陟幽明不泥乃計切滯也左遷子賀切左手足不如右彊左遷者言貶下也凖量上主尹切下吕張切考課者凖則量度其優劣也降殺上古巷切下也下所介切削也叶音恊合也彈之徒干切紏也頺徒回切下墜也藉田秦昔切通作耤借也古者帝藉千畒使民如借故謂之耤隕羽敏切從髙而下也琛丑林切壘魯水切軍壁鑠式灼切􅁺俞絹切官屬無與去聲芍陂芍音鵲楚相孫叔敖所造徑百里灌田萬頃在安豐郡五年瑾渠遴切雍於用切即禹貢雍州謂西北之位陽所不及隂陽氣壅閼也瓘古玩切臨菑側持切本作淄齊國之邑屬靑州下邳符悲切國名古嶧陽山在其西屬徐州戍邏上傷遇切守邊也下郎佐切㳺兵也墾口很切耕也僉息僉謂傅僉也息謂僉之子姓星孛蒲昧切又蒲没切妖星酷糴上古暮切賣酒下亭歷切市榖逴丑略切瑩烏定切抗口浪切綜子宋切汜敷劒切又詳里切珝况羽切璜胡光切六年渦口屋戈切渦水岀淮陽浮溝浪蕩渠東入淮又姑華切餐古飡字千安切小飯也徹軍直列切去也與撤同縑音兼􅀃文并絲繒也纓紲上伊盈切下私列切皆系也并力卑政切檻車胡黤切車而爲檻形以版四周之無所通見􅀜中三輔舊事云西以散􅀜爲限東以函谷爲界二􅀜之中謂之關中犇古奔字㑹稽上工外切下古奚切郡名屬揚州禹㑹諸侯江南計功因命曰㑹稽㑹稽者會計也七年牛渚掌與切在丹陽蕪湖一名采石倒戈丁老切戈平頭㦸也倒戈謂反以自攻紞都感切愷可亥切賊不俯九切與否同夷獠盧皓切西南夷謂之撩袤莫候切八年嬖卑義切愛幸也阼階昨悮切主階也跪去委切䠆跪忠讜多曩切直言也白馬胡蜀汶山郡之夷族名沮衆材汝切正壞也抄掠上楚教切略取也下力灼切奪取也衿領衿居吟切衣系也領衣衿也藉慈夜切借也艦户黤切戰船四方施板以禦矢狀如牢樓櫓守禦望樓也櫓露也上無覆屋柹蔽柹方廢切斫木札也横斷上胡盲切闌也下丁管切截也敦煌敦音屯郡名屬凉州承間居莧切􅂩也下伺間同漸漬上將廉切下疾智切懼許容切又許拱切擾恐也亦作忷春秋傳曹人懼甲梃甲鎧也梃杖也徒頂切臧否上兹郎切善也下俯九切不也懣莫困切煩也悶也相貿莫候切易也時趣七句切一時趣向也景從景讀曰影造次七到切急遽也可杭胡郎切通作航謗訕所諫切倉頡篇曰訕非也掩襲席入切春秋釋例掩其不備曰襲譎計古穴切詭也江􅃆漢江􅃆水酖直䕃切分界符問切守也界竟也黷武徒谷切慢也數也易再三黷通作瀆晉紀二通鑑卷八十起昭陽大荒落盡屠維大淵獻即癸巳至已亥凡七年丗祖武皇帝上之下泰始九年悖蒲没切逆也戇陟降切愚也狼狽狼魯當切似犬狽􅀶蓋切狼屬生子或欠一足二足相附而行離則蹎蹶猝遽謂之狼狽飲於禁切偪彊上筆力切迫也下巨兩切勉也發摘他歷切挑􅎥其私􅀮者内長展兩切詰責去吉切問責也鋸居御切古史考曰孟莊子作䛯十年媵以證切媵御驕横户孟切一訛言五禾切亦作譌噂􅊱上兹損切下徒合切噂噂􅊱􅊱相對談語枕之任切卧首據物也典選須絹切擇也又音須兖切甄拔稽延切甄察也拔擢也屏居必郢切隱也裒蒲侯切蓼莪上力竹切下牛何切小雅詩也蓼草名蒿屬蓼者言其長大貌蕩隂蕩音湯在司州魏郡蕩隂之戰嵇紹死之蕃表蕃方煩切屏也表外也見兵形甸切據今所有之兵財與纔同逋逃上奔模切下徒刀切爲屬朱欲切委也魴符方切白􅋕鄂格切顙也通作額蛟居肴切龍之屬能率魚飛砥掌氏切磨石礪力制切䃺也齊斬即夷切縗裳下緶而齊者爲齊下不緶直斬割之者爲斬闇於金切黙也衰麻倉回切亦作縗􅀃文服衣六寸博四寸直心咸寜元年掘其月切搰也酒藏才浪切庫藏也離間古莧切迭也隔也二年令􅀌豐離呈切令狐􅃨姓豐其名薉塞烏廢切荒蕪也塞滿也車浚車昌遮切姓也浚私閏切梟首堅堯切斷首撞殺傳江切􅉒也吴會吴爲荆楊交廣之都會更興古衡切代也并亡并讀曰併堡博抱切堡障索然昔各切盡也將疑子亮切將帥㦸楯上訖逆切有枝兵也下食尹切所以扞身蔽目者還趣趣讀曰趨走也更事古衡切歷也珧餘招切䂮力灼切三年鴦於良切扞城侯旰切衛也或作干詩公侯干城鄴城魚怯切魏郡鄴縣屬司州顒魚容切瑋羽􅀑切濮陽音卜古昆吾國屬兖州疆埸上居良切界也下羊益切畔也俶昌六切紏司吉酉切督也司主也訐居謁切謂政發人隂私獄犴鱼旰切犬也犬所以守故犴謂之獄囂虚驕切喧也入質職利切質子所以結信也可汗河干切戎酋稱四年􅑺忙經切蟲食榖葉者繕時戰切􅀘也修也螺蜯上盧戈切屬大者如叶岀日南漲海中下歩項切蜃屬淤依據切􅀃文澱滓濁泥字或從士種牛朱用切如種植之種紘乎萌切觚古胡切受酒器一升曰爵二升曰觚泓烏宏切踧踖上子六切下資昔切恭謹之貌皖城胡管切廬江邑屬揚州艘蘇遭切船緫名峴山胡甸切在襄陽侈汰上尺氏切㤗也下他蓋切奢也本作㑀謚神至切行之迹震懾震懼也懾怖也之渉切五年横設户孟切不順理也四鈞居匀切三十斤爲一鈞九石四鈞爲石猿臂如字猿臂通有也猿或作爰爰緩也劉淵其先匈奴冐頓漢髙祖以宗女妻冒頓故其子孫遂冐姓劉氏淵於扶羅之孫左賢王豹之子􅀐射竒􅀉切射於馬上任俠上汝鴆切下胡頰切任謂任使其氣力俠之爲言挾也以權力挾輔人也歔欷上朽居切下許旣切歎息也􅀑目菜名即芝草買菜菜名即平慮草曖昧上於蓋切隱也下莫佩切暗也後累力僞切事相縁及鋒起鋒當作蜂推枰上通回切下蒲兵切􅀶局量計吕張切量度而計筭也運漕陸行曰運水行曰漕涂中同都切涂水名在堂邑黃􅃏王伐切大斧也以黃金飾之冠軍古玩切言在諸軍之上扁􅀘典切詰朝去吉切平旦省所景切簡少也不重直隴切晉紀三通鑑卷八十一起上章困敦盡著雍涒灘即庚子至戊申凡九年丗祖武皇帝中太康元年鎭戍傷遇切守邊者城戌同義丹陽監監音緘丹陽監軍也磧七迹切水渚有石錐朱惟切鋒芒銳者筏房越切編竹爲之箄筏也著陟略切置也炬臼許切束葦而燒融液上余中切炊氣上出下夷益切流膏也幟式志切又昌志切旌旗之屬沅湘愚􅀽切沅水岀䍧牱湘水出零陵皆入江長騖亡遇切驅也馳也直造七到切至也下徑造同懷輯懷來也輯和也音集傳檄胡狄切以木簡爲書長尺二寸昺俾景切藉慈夜切借也數節􅀟遇切賈昌朝音辨云數計目也解佳買切散也著手陟略切置也㓜少失照切少小也柵測革切編立木爲之結陳結締也陳音陣蔣班蔣即兩切姓也潰胡對切逃散也惲於粉切闇與暗同檝即渉切舟櫂也或作楫駱驛上盧各切下夷益切或作絡繹要濬讀曰邀帆符咸切舟上慢所以汎風或作䑺鼔譟先到切羣呼也石頭城名在金陵面縳符攫切縛手於後唯見其面也輿櫬􅀄覲切棺也轘轅上音還下音􅀽關名在河南緱氏酺音蒲􅀃文王德布大㱃酒也更易上居行切改也下羊益切轉也縞素古老切白色繒􅅃附苦管切誠也附託也嬰城伊盈切謂繞城以自守渡遼連條切遼水在幽州域擊胡當渡遼水故爲將軍之號度或去水瑾渠遴切復十年房六切除其賦稅稽顙上康禮切下冩曩切額至地也昵近尼質切親也有屬之欲切付也忿敷粉切敷問切怒也怨恚於避切恨也攄抽居切跳刀田聊切躍也降首上胡江切服也下舒救切有咎自陳騁丑郢切直馳也謗􅊱上􅀘曠切毀也下逹合切妄言禁推川佳切禁者制也推者窮詰也挫祖卧切懣也憤房吻切懣也旋斾上旬縁切復返也下蒲蓋切繼旐之旗沛然而垂藺生良刃切藺相如􅄶俾緬切狹小也憤邑於汲切􅁨也本作悒戍守傷遇切守邊也滍淯上音雉下音育滍水在魯陽東經襄城入汝淯水岀酈縣西北山中南入漢餉遺上式亮切饋也下以醉切贈也封禪時戰切積土增山曰封爲墠􅀕地曰禪韜戢上他刀切下側立切皆藏也賔屬賔服也屬附也珠玉切鮮卑相然切本山名東胡之别種因退保此山遂以爲號彊獷上巨良切暴也下古孟切大獷不可附也雜胡昨合切謂戎狄之在塞内諸郡諸雜居不一二年掖庭羊益切按韋昭云以爲在掖門内故謂之掖庭也慕容部鮮卑自塞外入居遼西􅁄城之北號曰慕容部其後因以爲氏始見於此三年喟然口愧切太息也紏繩上居黝切下食陵切紏察而繩正之也鼔吹尺僞切或作籥琇息救切狼藉上魯當切下奏昔切狼藉草而卧其草必亂故物之緃横敗亂者皆謂之狼藉愷苦亥切􅏁澳上盈之切采蘖煎也下於六切水内曰澳􅃢瑚上相干切下洪孤切􅃢瑚似玉而赤色作株形生於海怳然詡往切狂之兒當詰去吉切責問也從容七㳟切猶休燕也􅁤則居洧切法也謚傳上神至切下祍戀切謚者行之迹請謚于太常傳者記也請于史官郭槐胡塊切賈充妻謐莫橘切本姓韓賈充外孫充子早卒無嗣以謐爲繼乃姓賈氏鄫慈陵切春秋鄫子之國揆求癸切度也與聞與讀曰預四年晃胡廣切新沓徒合切水名旉芳無切暾他昆切繆蔚上莫六切姓下紆勿切名聃季乃甘切左氏傳魯衛毛聃文之昭也不禁居吟切勝也自首式救切自狀其過也駮議北角切􅄂也議不同也六佾夷質切舞行列也六佾三十六人乘輿石陵切天子所乘車輿不敢斥言尊者故稱乘輿診止忍切候脉自強巨兩切勉也整厲上之郢切下力制切整肅而嚴厲也歐血一口切吐也往臨良䲴切哭臨刪師姦切廆五罪切五年銓次此縁切銓衡也告訐居謁切謂發人之私駁違北角切言駁正違失焉能於虔切何能土斷都玩切決也皆以土著爲斷并就并讀曰併兼也太阿厚匈奴胡名六年嶠渠廟切宇文部南單于之逺屬也在遼東塞外固獵得玉璽以爲天授鮮卑謂天爲宇號宇文部其後以爲氏扶餘扶餘胡所部之國其國王名依慮沃沮上烏酷切下千余切其國在髙句麗蓋馬大山之東北與挹婁夫夫餘南與濊貉接七年劇陽子劇竭㦸切劇陽所封縣名子爵也都太愽匈奴别種萎莎胡萎於危切莎蘇禾切匈奴別種晉紀四通鑑卷八十二起屠維作噩盡著雍敦䍧即已酉至戊午凡十年丗祖武皇帝下太康十年祫胡夾切大合􅀕也龕苦含切叚氏徒玩切鮮卑擅石槐之後皝胡廣切伺相吏切伺候也瑋羽􅀑切遹以律切繇餘招切又音由伷直佑切以別彼列切異也猾户八切狡猾繫胡計切孝惠皇帝上之上永熈元年要近於􅀏切要謂清要之官近謂左右邇臣小間居莧切病少差聞望聞去聲華廙上胡化切下與職切歆之孫劭實照切録尚書事録力玉切采記也謂緫録衆事漢武帝􅀄有領尚書事至章帝以趙憙牟融並録苟書事尚書有録名蓋始於此猶􅃁宰緫已之義大臣權重者爲之遂趨音促下趨鍳同虎賁音奔猛士謂如虎之奔獸臨喪臨如字親蒞其䘮也陵兵守山陵之兵斌悲巾切嘏舉下切復租調復房六切調徒弔切謂除其稅租繇役不稱昌孕切謂今日行賞太過與平吴時所封功臣輕重不相副稱闇於金切黙也悾悾苦貢切誠心又苦紅切苦江切愎弼力切佷也蒯欽蒯苦怪切姓也欽其名闇與暗同踈逺于願切離也楷口駭切嶠渠廟切淑媛上神六切下于眷切後宮女官差長上􅀄加切下展兩切元康元年擲直炙切投也寺人寺音侍掌王宫之女御跪言巨委切䠆跪也其趣十句切趣向閹衣檢切宫中守門者脅之虚業切人迫也冝作熁頠魚毀切紿之蕩亥切欺也廐居又切馬舎鴦於良切悝苦囬切隂漸子廉切入也愷可亥切見省息井切察也楙音茂督將將去聲諠許元切亦作讙譁胡瓜切讙也翕習許及切聚集也彌畢切􅉲莊䕃切䜛毀也帶方郡名屬平州繆莫六切姓也摯虞摰脂利切姓也虞其名瓌茹回切恢枮囬切牽秀牽輕煙切姓也秀其名昵尼質切近也不􅁤居洧切不法也趣兵趣音促速也恟懼許容切又許拱切擾恣也亦作春秋左傳曹人懼騶虞幡騶側鳩切幡孚􅀽切騶虞獸也白虎黒文尾長於身繪繡于幡上檛張􅀲切擊也頠魚毀切彌縫上民卑切下符容切彌縫隙漏也二年厭劾上於業切下胡得切厭伏而劾之也符書符􅂐隂書即厭勝術也三年普撥北末切綽昌約切四年郝散黒各切匈奴胡也五年雹弼角切雨冰也調徒釣切選也濡源奴官切在上谷郡之北屬幽州叄合陂班縻切在代郡屬幽州即漢叄合縣地猗㐌上於冝切下唐何切拓抜沙漠汗之子盛樂盛漢書作成樂音洛城名在并州新興郡猗盧龍都切猗㐌之弟六年馬蘭郎干切馮翊羌盧水龍都切北地胡嬖人卑義切賤而得幸者解系胡買切姓也系其名更相工衡切互也撓亂大髙切攪也其字從手一􅀃橈曲也女教切其字從木氐羌丁奚切風俗通云氐本西南夷種殄冦徒典切殄滅也蟠道蒲官切道路蟠曲廞虚金切七年鑚祖官切刺也核下革切果核寜馨寜晉書音義無音而丗以寗音之寜馨猶言阿堵阿堵之義蓋指物之稱析理先擊切分義理如破木胡母輔之音無胡母􅃨姓其先本陳胡公之後公子元奔齊遂有齊國齊宣王母弟封母郷逺本胡公近取母邑故曰胡母戊鯤公渾切􅊂音夷任放上汝鴆切下甫妄切祼郎果切比舎頻至切並也釀汝亮切醖也綜子宋切綜核也訥奴骨切言難也言藉秦昔切書藉砥礪上掌氏切下力制切䃺石也䄇馳成切祼也又丑郢切䙝先列切䙝慢也捷疾葉切獲也八年賨人祖東切南蠻賦稱賨人者乃稅賦之家宕渠徒浪切巴西邑屬梁州苾薄必切慰勞郎到切慰安而勞問也稔如甚切歳熟曰稔晉紀五通鑑卷八十三起屠維恊洽盡上章涒灘即已未至庚申凡二年孝惠皇帝上之下元康九年要荒一遥切要服荒服也要者謂束以文教荒者要服之外又簡略也貪婪盧含切亦作惏左傳貪婪無厭單于音蟬匈奴天子之號漢書音義曰單于者廣大之貌言其象天單于然也執贄脂利切古者相見之禮皆有所執以爲贄書曰三帛二生一死贄是也弛施是也疆埸上居良切下夷益切乘間居莧切乘其間隙騭職日切僅渠遴切材能也燼徐刄切火餘也先零音憐西羌名罕开上呼旱切下苦堅切顔師古曰罕开羌之别種也漢武帝時破之置縣因以此名之析支先擊切山名西戎地也王肅云析支在河關西猾夏户八切猾亂也夏華夏也閡牛代切外閉也怖普故切惶懼也逷他歷切爾雅遐逷逺也逺處昌與切居也遇否部鄙切塞也更制居衡切改也糝桑感切􅀃文以米和羮一曰粒也擠子西切排也蹔藏濫切猶猝也通作暫呼厨泉南單于王名其後爲前趙即劉元海之叔祖也三率所􅀋切通作帥驍勇堅堯切徤也句驪上古侯切下音離亦作麗東夷國也在遼東之東噬齧上視制切下魚結切羇旅居冝切羇􅀉也旅客也叱之昌栗切呵也鄴魚劫切魏郡之邑屬司州顒魚容切石函胡讒切石匱簏箱力木切竹髙篋也戇陟降切愚也騃五駭切癡也蝦蟆上何加切下謨加切埶位執古勢字紫闥他􅁑切宫中小門不解佳買切散也令聞並去聲犇古奔字舛昌兖切錯亂也過當丁浪切謂越其中也獄犴魚旰切犬所以守故謂獄爲犴解胡買切無厭於廉切不足也又於熖切敦煌音屯皇郡名属凉州應劭曰燉大煌盛也揣􅀄委切度也繕時戰切治也拘攣閭縁切拘執也攣係也娠杜預曰壞胎爲娠音之忍切一音身虨甫巾切又方閑切永康元年纉作管切蕤儒追切琰以舟切櫖抽居切中台湯來切星名韙于􅀑切猗乙竒切反間居莧切變其言以間諜椎直追切擊也亦作槌佽飛七四切晉始置二衛官有左衛右衛佽飛者右衛之官属衛尉籌直由切更籌囧居永切肜以中切解系解胡買切姓也系其名唐叔虞食邑於解縣因以爲氏詰去􅁻切問也荂妨俱切穴從上而勇切下才用切穴從僕射者謂武賁中郎將羽林郎將之屬光禄勲所統詡况羽切劭寔照切左􅃝徒旱切脫衣䄂而肉􅃝也偏脫其左故曰左袒鼓譟先到切羣呼也眭祕眭息爲切内之内讀曰納誚責才􅀏切亦作譙九錫車馬衣服樂器朱户納陛虎賁斧􅃏弓矢秬鬯狡􅃛上古巧切下胡八切狂狡桀黠也廞許金切剽匹妙切輕也愞奴卧切又乃亂切弱也少城失邵切治成都太城治益州漢武帝開西南夷置益州郡治滇池更漢三國益州分置改置不一今太城治益州未詳益州所治也恂相倫切比至必寐切帥音率領也下同上官晶上官􅃨姓其先楚莊王子爲上官大夫以上爲官氏晶子盈切隗伯五罪切晉紀六通鑑卷八十四起重光作噩盡元黓閹茂即辛酉至壬戍凡二年孝惠皇帝中之上元寧元年􅁤居洧切汜瑗汜符咸切姓也皇甫謐曰本姓凡遭亂避地汜水因改焉貂蟬上丁聊切下時連切冠名貂内勁捍而外温潤蟬居髙飲㓗口在掖下此因物生義故以爲􅃣飾髦莫􅂁切撓亂火髙切攪也其字從手淑神六切弇古南切苾毗必切斷徒玩切絶也勞尚郎到切犒勞汶山羌汶音旻汶山郡之羌也屬益州濁澤直角切水名在青州齊國濁或作􅃰鄴魚怯切魏郡之邑屬司州憤房吻切怒也􅗱余六切攘臂人羊切揎䄂出臂朝歌音昭汲郡之邑屬司州商紂所都暾他昆切奭施􅃗切華隂户化切洪農邑屬司州華山在其南郗隆郗抽遲切姓也難乃旦切䆳雖遂切帝坐北斗之北曰紫微犬帝之坐天子之常居也泓烏宏切璜胡光切堮阪五各切關名在河南陽城屬司州成臯􅀜名在河南成臯屬司州即鄭之虎牢楙音茂厭勝一葉切廣雅曰厭鎮也巫覡刑狄切在男曰覡在女曰巫能齋肅事神明嵩山思融切中岳著張略切服衣於身陽翟直格切河南邑屬司州沮將預切喪也衂女六切敗也溴水扄􅞔切水名在河内温縣屬司州懣音悶又音滿􅀃文煩也㴶七罪切惔徒濫切伷直又切汶陽音問魯郡之邑屬豫州大酺音蒲酺之爲言布也布德於天下而聚飲食爲酺或作脯音同敞齒兩切冠軍古玩切功􅃣諸軍故曰冠軍琨公渾切倜儻上他歷切下他曩切倜儻卓異也旟羊諸切邸閣丁禮切屬國舎曰邸瘞於計切埋也繇餘招切潦魯皓切雨水大貌弢他刀切剽掠上匹妙切下離灼切強刼人財物也演音衍柵楚格切營屯也編立木爲之趣之趣讀曰促太安元年葭萌上苦牙切下謨耕切蜀先主改葭萌爲漢壽至晉改爲晉壽梓潼邑屬梁州寋碩寋紀偃切姓也叡俞芮切詵所替切子臧兹郎切菰古胡切􅀃文雕苽也一名蔣或作苽蓴殊倫切蒲中秀鱸落胡切魚名林慮凌如切山名在汲郡林慮縣屬司州蒺蔾上秦昔切下鄰題切易曰據于蒺蔾爾雅曰蒺蔾布地蔓生細葉子有三角刺人宛於􅀽切南陽邑屬荆州離間居莧切間隔也虓虎交切屬天朱欲切連也閶闔上尺良切下轄臘切門名在河南洛陽之西屬司州慕容廆五罪切慕容􅃨姓按本傳慕容廆字弈其先號曰東胡曽祖莫護跋始建國於轉成之北時燕代多冠歩摇冠見而好之乃歛髮襲冠因呼歩揺爲慕容音訛轉耳或云慕二儀之德繼三光之容遂以慕容爲氏父涉歸以全栁城之功進拜鮮卑單于渉歸死國人立廆號前燕俘斬芳無切軍所􅀗也晉紀七通鑑卷八十五起昭陽大淵獻盡閼逢困敦即癸亥至甲子凡二年孝惠皇帝中之下大安二年塢安古切與隖同通佫文同築居曰塢質職利切結信也下爲質同易也以豉切輕也縋馳僞切掛繩而下也儲陳如切􅀃文也省家息并切察也掩襲上衣撿切下習入切春秋釋例掩其不備曰襲擐甲古患切貫也春秋傳擐甲執兵突陁没切突岀猶搪揬之義中矛上張仲切傷也下迷浮切酋矛也建於兵車長二丈沈持林切薳羽委切迭徒結切更迭劫訖業切人欲去以力脅止曰劫墊江逹協切巴郡之邑展轉上知輦切或作輾下陟兖切輾轉反側也誑古况切欺也弓欽弓姓也伺祥吏切髯如止切頰鬚挑刀徒了切弄也走㦸訖逆切有枝兵也藍田關盧甘切在雍州京兆秦嶢關釁許覲切罪也偏裨上紕連切下頻彌切將之副也侃空旱切蒯苦怪切并軍并音併郫城頻彌切蜀郡之邑轝羊茹切􅀃舒芮切誘也下同楷口駭切蓀蘇昆切桀盗巨列切桀黠盗之下儁似轉切長沙邑屬荆州晫竹角切銓此縁切次也公當當去聲公平也當中也函谷胡南切􅀜名在洪農緱氏古侯切河南之邑屬司州所相息亮切扶助也紿徒在切欺也創􅀄莊切傷也龔恢上九容切姓下口囬切名邯鄲音寒單廣平邑屬司州貉奴􅂚各切督不音否闡齒善切著張略切服衣於身白帢􅁑合切又乞洽切韎韐士服制如韍唳郎計切鶴鳴曰唳考掠考亦作栲掠離灼切皆擊也兩踝胡瓦切足骨也千金堨於􅁑切壅堨也千金堨名水碓都隊切手舂書容切涸下各切水竭也窮踧子六切踧冝作蹙窮極迫促也逖他歷切趣逡須切嚮也間行古莧切謂􅀼令人行也齎祖稽切持也從甥才用切母之從兄弟之子玘墟里切逺戍舂遇切守邊也牛鞞音卑又必爾切犍爲邑屬益州芋王遇切蹲鴟也浚私閏切叡以芮切五苓夷苓郎丁切永興元年滔吐刀切炙之石切置肉火上好畤渚市切邑名衙博衙五加切姓博其名棐穆公子食采於衙因氏焉投袂彌蔽切猶拂䄂也左氏傳楚子聞之投􅃑而起􅉁醢上臻魚切虀菹下呼改切醯醢如薺徂禮切甘菜眕止忍切繇夷周切縞素古老切縞素白色頰古恊切面旁也濺子賤切激濺也六璽想氏切蔡邕獨斷曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽薊城音計燕國之邑屬幽州東嬴公滕嬴以成切滕徒登切東嬴者晉宗室之踈屬封嬴公名滕王浚之黨羯朱居列切烏元胡名斌悲巾切睿以芮切琅邪菉王覲之子即元帝縱横並去聲放縱而恣横也馥房六切驍勇古堯切驍健也彎為還切跋扈上蒲揆切下侯古切跋扈猶強梁能禦牛許切止也爭衡户庚切猶抗衡也梟古堯切斷首加於木上鹿蠡上盧育切戓作谷下鄰知切匈奴王之號左於陸匈奴國王號犢車徒谷切牛子也以牛駕車貣敵德切從人求物所乘食陵切駕也易水易音亦水岀􅃰郡安閻山拓跋猗㐌拓他各切跋蒲撥切鮮卑胡之氏猗於冝切㐌唐何切沙漠汗之子漢王劉淵字元海新興匈奴人漢以宗女妻冒頓故子孫冒姓劉氏元海據離石稱大單于尋即漢王位改元元熈始於此鴻臚凌如切鴻聲也臚傳也所以傳聲賛導九賔膽量上覩敢切下音諒謂有膽氣志量儀觀古玩切儀形神觀也妻略妻去聲略與掠同府藏才浪切庫藏物所儲蓄也帴將先切馮􅀍具一作郟古洽切襄城邑屬豫州暾他昆切更立工行切改也聶􅅺輙切姓泫氏音㳙上黨邑屬并州屯留屯音純上黨邑屬并州長子長音長短之長上黨邑屬并州晉紀八通鑑卷八十六雋特之第三子也永興初自稱成都王尋僣帝號改元大武國號大成始於此復其房六切除其賦稅也􅁃敳􅁃以主切姓也敳其名五來切辟之必益切除也無厭於廉切薄行胡孟切不敦行檢也勱莫夬切璠孚􅀽切膩女利切肥膩汚烏故切染也䴵必郢切􅀃文麪餈也中毒竹仲切傷也扼殺乙革切持殺之也井陘音刑常山邑屬兾州井陘山在其南饑饉渠遴切榖不熟曰饑􅂼不熟曰饉惲於粉切勞徠上郎到切下郎代切勸勉之意孝懷皇帝上永嘉元年玫謨柸切鞠羡上居六切姓下于線切名遺榮以醉切贈也更辱工衡切互也狡古巧切猾也昶昌兩切㑹稽上古外切下古奚切郡名禹㑹諸侯於江南計功因命曰㑹稽㑹稽者㑹計也盾杜本切珉眉巾切詮且縁切讃則旰切訇氐訇呼宏切姓也氐其名句方句古侯切姓也方其名名論盧困切名譽議論也褉胡計切禊飲壼苦本切闓音開㔨督􅀘昧切三窟苦骨切穴也王衍王敦王澄以荆州青州司徒爲三窟二年太行胡郎切在河内山陽西北屬司州祛丘於切耽都含切蹋折上徒合切踐也下之列切斷也令狐亞力程切令狐複姓亞其名澹徒濫切琠他典切甄城音絹濮陽邑屬兖州轘轅上音還下音􅀽關名在河南緱氏突陳上陀骨切下直刃切與陣通軹􅀜音􅁓在河内軹縣屬司州北宮純北宫􅃨姓純其名壷􅀜洪孤切上黨邑屬并州安堵音覩安然如墻堵不遷動也晉紀九通鑑卷八十七起屠維大荒落盡重光恊洽即已巳至辛未凡三年孝懷皇帝中永嘉三年熒惑上户扄切下穫北切南方火星紫微星名在北斗北即太帝之坐箸遲據切萇直良切逯明逯盧谷切姓也明其名胡羯居列切胡虜戎羯也濟河子計切渡河也間出居莧切迭岀也沮衆材汝切止懷也屯留音純上黨邑属并州長子長讀曰長短之長上黨邑属并州顥下老切冠軍古玩切功冠諸軍故云訇􅄾上呼宏切姓也􅄾其名渠羈切宕渠徒浪切巴西邑属梁州涪城音浮梓潼邑属梁州歡樂陳留王名嶷魚其切又魚力切演音衍無慮應劭曰慮音閭顔師古曰即所謂醫巫閭属遼東悛且縁切又七倫切四年璯黃外切蝗音皇螽也下邳符悲切國名属徐州古嶧陽山在其西顗魚豈切璿旬縁切喜許記切貫甲古玩切擐甲也梟首古堯切掛首木上悝口囬切又音里蕤如住切澠池莫踐切戓作黽洪農邑屬司州繁畤諸市切鴈門邑属并州崞音郭鴈門邑属并州羽檄胡歷切檄以木簡爲書長尺二寸有急事則加鳥羽挿之􅄺陽奴結切南陟邑属荆州沶口音怡地名在新城沶郷縣地宛於元切南陽邑属荆州穰人羊切義陽邑属荆州璃鄰知切惲於粉切掘其月切㮊音荗摯虞摯脂利切姓也虞其名㲜布􅄍敢切毳布也合作毯朱提上音殊下音時郡名属益州恚於避切恨怒也五年應詹應於陵切姓也詹其名醴陵盧啓切長沙邑属荆州弢他刀切忿撫吻切怒也眺他弔切確克角切抄掠楚交切又􅀄教切刧人財物也瑁莫報切洧倉榮美切地名疋語下切古雅字艘蘇刀切船緫名硤石侯夾切在河南河隂属司洲輜重上側持切下直用切釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重珉眉巾切屠各音儲休屠之裔其後因以爲號糜沸上忙皮切下方未切如糜糝之涫沸也鼎峙除几切鼎足而立也薈烏㑹切翜山立切又山甲切絙古登切又古鄧切百六椽俞絹切言辟官属百六人故稱之刀恊刀丁聊切姓也恊其名壼苦本切頵居筠切靚疾政切軼音逸􅀥嵩􅀥姓也文士傳云􅀥氏本姓􅁄避難改焉蒲坂甫逺切河東邑属司州有歴山舜所耕也潼􅀜徒紅切本名衝關在洪農華隂左傳所謂桃林塞也下邽音圭秦武伐邽戎置有上邽故加下馮翊邑属雍州鏁蘇果切銀鐺也酒酣胡甘切嘘之休居切出氣急曰吹緩曰嘘破車昌遮切謂破壞輿輪也便弓毗連切弓馬間便疾也索綝索蘇各切姓也綝丑林切其名竺恢竺張六切姓也恢其名綜子朱切秋然親小切容色變也廆五罪切抎抎于粉切有所失引春秋傳抎子辱矣犍渠焉居言二切犗牛也毖兵媚切琰以冉切晉紀十通鑑卷八十八起元黓涒灘盡昭陽作噩即壬申至癸酉凡二年孝懹皇帝下永嘉六年靳沖靳居覲切姓也沖其名珝况羽切嬪毗賔切婦也周禮有九嬪鎧可亥切甲也妻略七計切娶也無處敞吕切居也攘􅃑上汝陽切下彌蔽切愷䄂出臂也鼓髯如占切鼓頰須也􅀌降胡江切孤者侯王之謙稱降服也結陳直刃切與陣通從容上七㳟切柘之夜切桑木猗盧於冝切柘拔沙漠汗之子魴符方切絡驛上盧各切下羊益切言不絶也勱莫敗切蟹胡買切蟲名二敖八足攄抽居切汾水扶云切水岀太原輿櫬􅀄覲切空棺也亟紀力切疾也急也迕五故切逆也未解音蟹曉也所并卑政切兼併也䂭磝上五勞切下口勞切城名爲質陟利切商榷古岳切商度也榷楊大舉也㡬諌居依切幾者微也當微諌納善言於君乘輿食陵切登車也恂相倫切悝口囬切又音里梁伏疵梁伏虜複姓疵其名枋頭分房切在没郡曹操於淇水口下大枋木以成堰遏淇水東入白溝以通漕運時人號其處曰枋頭間道居莧切㣲道也襲取席入切春秋釋例掩其不備曰襲􅅞筏上符攫切下房越切編竹爲筏也羇旅居冝切羇􅀉也旅客也邯戰音寒丹廣平邑屬司州郷導許亮切趨郷而引導也郝詵上呵各切姓也下所臻切其先商帝乙時有子期封太頌郝郷後因氏焉中七竹仲切傷也自分扶問切百乘食證切證時壬切謐彌畢切匹磾下都黎切鼓譟先到切羣呼鎧可亥切甲也薊音計燕國之邑属幽州孱陵士連切南平也属荆州沌口持兖切江夏安陸有沌水其地曰沌属荆州狼狽愽蓋切獸名狠屬生子或欠一足二足相附而行離則踣故倅遽謂之狼狽搤於革切捉也訥内骨切瓘古玩切襁􅀒紀兩切語襁􅀒其子而至孝􅉖皇帝上建興元年䳨儀胡光切鶠鳳其雌鶉䳨儀劉聦皇后殿名身衣於旣切重茵伊眞切茵褥數興所角切頻數也窺窬上去隨切下羊朱切肘腋上陟栁切臂莭也下羊益切臂後也龍逄皮江切􅀜龍逄阽危余廉切臨危巾櫛阻瑟切佩巾梳櫛也汶山音問郡名屬益州郗鑒郗綺㦸切姓也嶧山羊益切山名在魯郡鄒縣格斷丁貫切謂以格式斷之恚於避切怒恨也勰音恊傖子助耕切楚人别種也躭丁含切泓烏宏切邃雖遂切逄羡逄皮江切姓也羡其名方虔西方􅃨姓少金天氏位主西方故因氏焉見姓苑奭施􅃗切岌魚及切繆愷繆莫六切姓也愷其名元莵同都切郡名属平州累及力僞切事相縁及也樂浪上音洛下音狼郡名属平州高勾麗勾古侯切麗音離東夷國名在遼東之東鯨鯢上渠京切下五稽切海大魚也雄曰鯨雌曰鯢闓音開愉容朱切駁議北角切駮雜也議不同也逖他歷切蹴子六切蹋也潯水城音尋水出廬江潯陽泠口郎丁切地名在零陵郡此水岀九疑山北流至冷道而入江貰神夜切寛貸也摶徒官切貪横胡孟切欲物曰貪非理曰横覘之丑艶切闚視也春狄傳曰公使覘之盛樂音洛城名在親興郡屬并州灅水力水切水名出鴈門資治通鑑釋文卷第九
