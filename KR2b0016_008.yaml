body:
  text: 右宣義郎監成都府糧料院史炤魏紀一通鑑卷六十九起上章困敦盡元黓攝提格即庚子至壬寅凡三年丗祖文皇帝上帝姓曹諱丕魏王操之子立爲魏太子襲封魏王尋授漢禪改元黄𥘉國號魏追封操武皇帝廟號太祖黃𥘉元年氣埶古勢字後皆倣也望施户智切惠也與也芟刈上所銜切刈也或作靳下魚廢切刈穫也幾平巨希切近也鄴逆怯切漢魏郡也魏王操所都騷動蘇曹切擾也譙沛上昨焦切下博蓋切譙即漢沛國之邑入三國屬魏爲作于僞切下同長檄刑狄切以木簡爲書長尺二寸稟食力錦切通作廩鄢陵於幰切漢頴川邑三國屬魏行列行音杭伍也矯舉小切以繫胡計切聮屬也亦作系華歆華去聲姓也歆其名璽紱分物切璽之組詡况羽切臨菑側持切水名一作淄漢齊國之邑三國屬魏掾掾屬也刺姦掾官名于絹切廙羊智切又逸職切魚豢魚性也豢其名諺魚變切佫言也性分扶問切賦分也興難難去聲不調徒弔切選也舉邪余遮切他選湏選切銓官銓擇之灋古法字區別筆別切别異也涼州漢改雍州曰涼州爲刺史治隴西魏分涼州置秦州治上邽校尉胡教切校者營壘之稱故謂軍之一部爲一校尉候也因釁許慎切隙罅也與舋同卒離音猝忽也徇軍辭峻切行示也河西漢置張掖酒泉燉煌武威金城於河西謂之河西五郡入三國屬魏燉煌徒渾切漢郡名應劭曰燉大也煌盛也入三國屬魏掎之居綺切從後牽曰掎北塞先代切邊塞也才觀觀去聲猶神觀之觀曄筠輒切晃胡廣切衰斬千回切或作縗杜預曰衰在胷前也斬謂裳下不緶直斬割之而墮翾規切亦作隳禪時戰切下同唐虞禪夏商周繼愷悌可亥切愷樂也悌易也圖緯于貴切圖繢之書繁陽魏郡之邑在䌓水之陽其界爲繁淵屬魏燎祭力照切燔柴祭天正朔正本音政秦避始皇諱改從平聲得不俯九切沙幕莫各切沙士曰漠匈奴界中嘿然密北切通作黙蝗胡光切螽也裾斤於切衣後裾二年羡延面切羇旅居冝切羇寄也旅客也武擔都濫切又都覃切山名在成都西古蜀王妃死使五丁就武都檐土於此葬遂爲名阬丘庚切亦作坑鼎跱文里切亦作峙言三國鼎足而立索虜悉各切拓跋上撻各切下蒲撥切亦作拔虜復姓即元魏也自云拓天而生拔地而長遂以氏焉朱邪邪音耶西突厥之號至唐憲宗時有朱邪盡忠者始見於中國全忠其後也見五代史論要皆要平聲蕞爾徂外切小貌以識職吏切誌記鄂五各切漢江夏邑縣權徙都於此更名武昌瑁禪上莫報切下時連切甄氏側鄰切姓也俞芮切古作􅌖貴嬪毗賔切婦也周禮有九嬪不得見胡甸切下朝上曰見後皆倣此譖側禁切讒毁也譴詰戰切謫問也眚所景切過也所見不明抵罪劾胡得切法有罪翊軍逸織切飛貌故以號將軍斃毗祭切死也不應於陵切宓美畢切檛張瓜切箠也不悛且縁切止也改也江州漢巴郡之邑即巴縣瑾渠遴切遺弋季切有所與曰遺易於易去聲下音亦委質職日切形也猶曰委身所間居莧切隔也巫音誣漢南郡之邑應劭曰巫山在西南吴置建平郡於此秭歸蔣兕切漢南郡之邑字或作姊按袁山松云楚大夫屈原被放怱然暫歸有賢姊曰女須亦歸喻令自寛因以名其地三國屬吴宛於元切漢南陽邑屬魏平輿音預漢汝南邑屬魏鄄城工掾切漢濟隂邑後屬魏陿弱侯夾切隘也通作狹憔顇上慈消切下秦醉切憔顇瘦也慙恚於避切怒恨也票騎上頻妙切勁疾貌傅讀曰附俘芳無切彪補休切馮几馮音慿皮弁皮變切皮冠也行馬周禮掌舍設梐枑杜子春釋云梐枑行馬也盧水胡在北地名治元多又有名封賞鸇隂口鸇之然切前漢志作鶉隂屬安定郡後漢志武威郡有鸇隂云故屬安定入三國屬魏且次漢武威邑地理志作揟次孟康曰揟音苴次音咨入三國屬魏顯美地名在武威之張掖勞賜上郎到切勞慰也見糧胡甸切下虜見兵即音建宼鈔楚交切又楚教切略取也挑戰上徒了切解見上截昨結切斷也不別筆列切持著直略切附也外沮村汝切止壞也詿誤古賣切詿礙也行陳音杭下直覲切謂行伍軍陣艘蘇曹切舩緫名擿句上他歷切挑也吴難難如字言吴不敢輕易於魏玳瑁上徒戴切通作瑇下莫代切文甲也字或從甲沈珩上式荏切下何庚切灑沙下切汛也翻孚袁切繇夷周切劉基之父蹋頓上徒盍切烏元丘力居從子鮮卑戎王名鮮卑相然切山名漢時東胡爲匈奴冒頓所滅餘種走保此山因以爲號三年鄯善時戰切西域國名去于闐千五百里界迫匈奴龜兹前書音丘慈今龜音丘物切兹音沮惟切蓋急言爾章懷說龜兹城去葱嶺七百里西域國也于闐徒賢切又徒莧切西域國名夷道南郡之邑蜀先主置冝都郡猇亭許交切在漢夷道縣即冝都地也當罷蒲縻切疲勞也佷山漢之南郡邑舊屬武陵丗或以銀爲音屬吴五谿沅水岀䍧柯自䍧柯郡界分流爲五故曰五谿見荆州記郢州以井切黃𥘉三年魏文帝以江北諸郡爲郢州尋復爲荆州譎古穴切詭詐也揣之楚委切度也更甞工衡切歷試也瓦解音蟹判也鐃鎧上尼交切小鉦也周禮以金鐃止鼓下可亥切甲之緫名傳肜以戎切後殿都甸切軍後曰殿舫甫妄切並兩船調度上徒釣切下徒故切約之有長短曰度輯睦上籍入切和也下莫六切順也駱統盧各切姓也出東陽柵測革切編立木也横受上户孟切非理曰横棧潛棧姓也士限切嬖寵嬖卑義切賤而得幸曰嬖乘輿上食證切下寅諸切四馬輿車也天子以天下爲家不以京師宫室爲常處則當乘輿以行天下故羣臣託乘輿以音之浩周浩胡老切姓也慤苦覺切謹也濡須音儒水名在九江歷陽孫權築塢於此郃音閤禆頻彌切偏將徼倖上堅堯切求也下胡耿切倖即幸也綆纜上古杏切下盧瞰切所以維舟迸散北諍切散走也瑋羽鬼切創夷𥘉莊切皆傷也或作瘡痍魏紀二通鑑卷七十起昭陽單閼盡强圉協洽即癸卯至丁未凡五年世祖文皇帝下黃初四年永安漢主爲陸遜所敗於夷陵退屯白帝改白帝爲永安羨溪羡音夷江夏沙羡縣即其處去濡湏三十里三國屬吴奄至衣檢切忽也襲席入切春秋釋例掩其不備曰襲自内讀曰納槖臯橐音托又章夜切賈昌朝羣經音辯臯音姑漢九江邑三國屬魏與吴接境裁五千裁與纔同樓櫓郎古切城上守禦望樓也釋名曰櫓露也上無覆屋伺相吏切候也間隙古限切間厠之隙淺陿侯夾切隘也通作狹荻筏上亭歷切下房越切編荻爲之箄筏也詡况羽切卒謀七忽切省疾息井切察也審也曶呼骨切越嶲嶲音髓蜀地郡名本卭都漢武帝開置若逺于願切離也敝蹻史記虞卿躡蹻檐簦釋云蹻草覆也舉夭切好合好去聲牛喘昌兖切急息也蘄春音祈縣名漢屬江夏入王國吳置蘄春郡雍闓丘哀切通作開益州郡大姓伉口浪切牂柯牂柯者係船杙也楚伐夜郎至且蘭㭬舩以牂符名其處其水亦名牂柯江漢武帝元鼎六年開置牂柯郡牂兹郎切柯居何切三國系蜀地繇餘招切希與與去聲冝數所角切頻數也狐疑音胡獸名其性多疑每渡氷河且聽且渡故言疑者稱狐疑執偪筆力切迫也通作逼重險傳容切複也五年枹鼓風無切擊鼓杖毗頻脂切而旋旬縁切還也蔡潁按漢書蔡即九汪下蔡縣亦古州來國其地在淮潁之會頴水出潁川陽城東至下蔡入淮左傳楚靈王狩于州來次于潁尾是也入三國屬魏潁餘頃切衣葦衣去聲葦羽鬼切說文大葭也石頭城名在呉丹陽郡秣陵即其地艦户黤切戰舩四方施板以禦矢狀如牢幾至幾平聲殆也亢衡口浪切猶爭衡也考核下革切實也通作覈下覈奏同曁豔暨其兾切姓也彈射彈徒干切紏射也射食亦切命中曰射處之敞吕切止也棄瑕何加切說文玉小赤也一曰過也厮吏息移切役也無幾幾數也居倚切歩度根鮮卑別種檀石槐因衆畏服推爲大人居髙栁北其後益盛徒置烏侯秦水上歩度根乃三丗孫也攜貳户圭切攜離也貳疑也六年謖所六切鮑勛勛通作勲黠虜胡八切桀黠時當當去聲重思直用切再也庲降庲音來南中地名諸葛亮征南中郎其地以名官曰庲降督使李恢爲之督者察也益州故滇王國漢武帝所開置也蜀主改曰建寜縱足用切下七縱同更戰工衡切下更鑿同滇池多年切漢益州郡之邑在蜀地滇池澤在縣西北渠率所類切通作帥不易以豉切輕也渦烏禾切水洄爲渦又古禾切說文水入淮在漢沛國譙縣三國屬魏洶涌上詡拱切水聲下尹竦切騰也夜要要平聲蹴舩子六切蹋也土豚徒渾切通作敦加土爲堆也遏斷上烏葛切遮也止也下徒玩切絶也番陽音婆或作鄰漢豫章邑吴芮所封號番君以此至三國呉置鄱陽郡七年忿之撫吻切怒也摽垺上卑遥切本作墂封上爲識下盧拙切說文云庳垣也亦堤也塹七艷切坑也蕤儒佳切琮藏宗切牛渚掌與切通作陼在呉地丹陽蕪湖晉號牛渚城一名採石讜音黨交趾音止杜佑云南方夷人其足大指開廣若並足而立其指交故名漢武帝定越地置郡入三國屬吴徼外吉弔切邊徼扶南南蠻國名西去林邑國三千餘里在海大灣中其王本女子字葉栁時有外國人混潰者夢神賜之弓旦詣神祠得弓遂㲹海至扶南葉栁懼而降之於是混潰納以爲妻而據其國林邑南蠻國名本漢時日南郡象林縣馬援鑯柱之處也漢末縣功曹姓區有子曰連殺令自立爲王子孫遂襲其地烈祖明皇帝上之上太和元年魴符方切禦兒偶舉切吴郡有禦兒水在右越地越語云勾踐之地北至禦兒即此禦或作語弋綈上逸職切黒色下大奚切厚繒菲薄敷尾切微薄也以塞先代切臧否音鄙惡也禕許歸切以遺去聲禆賔彌切助也行陳上胡郎切列也陳音陣猥烏賄切鄙也諮諏諮通作咨謀事曰咨諏將侯切咨事爲諏伷直又切與胄同斜谷上以遮切下于蜀切漢中谷名南谷名褒北谷名斜音尾七百里橈女巧切曲也見兵胡甸切據今所有之兵也震懾質涉切失氣也疆埸上居良切界也下夷益切畔也遂絀勑律切通作黜黥劓上渠京切墨刑在面或作剠下牛例切去鼻刑戓作㓷髠苦昆切去髪􅎂大計切以瑣加足魏興漢西城縣建安中置西城郡魏以漢中遺人在東陲者置魏興郡魏紀三通鑑卷七十一起著雍涒灘盡上章閹茂即戊申至庚戍凢三年烈祖明皇帝上之下太和二年㮊莫候切子午子午道漢乎帝時王莾通之三秦記曰子午長安正南山名秦嶺谷一名樊川屬魏横門孟康曰横音光在長安北邸閣上典禮切說文屬國舎也下又有邸閣非此比東毗至切近也郿音眉顔師古音媚漢右扶風邑三國屬魏箕谷居之切或謂郿縣郿塢是析山翹移切漢武都上禄縣有祈山三國屬魏卒聞卒音猝天水漢隴西郡地武帝分置天水郡顔師古曰秦州地記云郡前湖水冬夏無増减故名天水三國屬魏爲重鎭街亭漢陽隴縣有街泉亭所謂秦亭即此三國屬魏省將所景切簡也蹻巨嬌切甄壯稽延切察也譎挑上古穴切說文權詐也下徒了切求戰也如古之致師詰問去吉切詰責也晥胡管切古脘國漢廬江邑三國屬呉爲重鎮柴路讀曰寨背湖蒲昧切背猶反也旁江蒲亢切依也絓地胡卦切通作罫礙也萬兩物相偶曰兩力尚切先人蘇佃切下先入同疽千余切說文癰也鬱築鞬居言切小種鮮卑軻比能之壻也未解胡買切曉也塞胷悉則切窒也髣髴上撫兩切下敷勿切或作彷佛潼關音童在漢洪農華隂縣本名衝關河自龍門南流激衝華山東故以爲名入三國屬魏賨叟藏宗切南蠻之稅賦者拊手婓父切拍手蹉跌蹉倉何切跌徒結切鈍徒困切不利也散關桑賛切關名在漢故道縣三國係蜀衝車昌容切衝城車逆射神夜切謂迎其雲梯而射之遲將軍遲去聲待也陽羡延面切漢㑹稽邑屬呉傳著上符遇切著也下直略切附也三年衜古道字疲於邑上汪胡切呼也通作嗚下於汲切憂也通作悒辭觀辭說也觀古玩切禰衡乃禮切姓也衡其名翥章庶切饋餉上求位切或作餽下式亮切或作饟往使䟽士切將命者乃解佳買切脫也漚口烏侯切在漢長沙國魏紀四通鑑卷七十二起重光大淵獻盡閼逢攝提格即辛亥至甲寅凡四年烈祖明皇帝中之上太和五年衛旍旍通作旌卒不可卒音猝上邽邽音圭漢縣名屬漢陽其地有邽山入三國屬魏雍郿上於用切郿音媚二邑皆屬漢右扶風入三國屬魏徼亮徼伊消切遮也通作邀掘營其月切穿也栩况羽切䣛與膝同脛頭卪也以御牙嫁切迎也又魚據切治也椒房兹消切皇后所居以椒和泥塗壁取其温而芳也遞上大計切更易也紫闥他逹切宫中小門一曰門屏料度徒洛切度量也青紱分勿切綬也珥筆乃吏切簪筆常棣大計切詩鹿鳴之什爾雅常棣棣也郭璞注曰子如櫻桃可食蓼莪上音六下五何切詩谷風之什否隔否部鄙切塞也下否可復通字同音矯枉舉夭切正曲也二虢古伯切周王季之子虢叔皆文王之母弟也封於虢故曰二虢左傳曰虢仲虢叔玉季之穆也憤懣僨滿也懣莫困切煩冤也適子都歷切正也本作嫡戮力音六說文曰戮力并力也稽康音力幽切阜陵漢九江郡之邑蒨日阜隂入三國屬呉六年入省思井切審也下定省同哭臨立禁切衆哭曰臨金墉餘封切在河南洛陽西北角魏所築孟津在魏地河内郡周武王伐紂㑹諸侯盟於此亦曰盟津遼東遼音聊水名岀塞外古燕國地秦立遼東郡漢末公孫度所據抵忤上典禮切觸也本作牴下五故切逆也亦作娪摩陂上眉波切地名在古郟鄏即漢之河南縣魏青龍元年以龍見改名曰龍陂數與所角切頻數也成山音盛在東萊不夜縣斗入海焉知於䖍切何也與聞與音預及也眯夢眯音米物入月曰眯寐中神游曰夢中大中去聲當也抉擿上一决切挑也下他歷切發也從華從去聲隨行也請屬之欲切託也亦作囑掎居綺切從後牽曰掎青龍元年龍見形甸切顯也土塞悉則切牽也蕤如佳切累重上力瑞切下直用切謂妻子資産也陘北户經切井陘山名在常山郡陘圠者言在井陘之北也句注山名在魏地鴈門隂館縣顔師古句音章句之句或音鉤將千將去聲樓煩故樓煩胡地在鴈門屬魏泄歸泥泄先列切鮮卑别種歩度根兄扶羅韓之子也幕北莫名切沙漠之北來降降平聲樂浪故朝鮮國漢武帝開置郡樂音洛浪音狼自漢末公孫度所據至景𥘉二年魏平之乘桴芳蕪切馬融曰桴編竹木大者曰栰小者曰桴闚𨵦上苦規切下容朱切私視也寒埆克角切說文山多石一說地不平滉瀁上胡廣切下餘亮切水溢蕩貌之難乃旦切賁育上博昆切下余六切孟賁夏肓皆古之勇猛者流腫之隴切疾也洿染洿汪胡切染而琰切言疾病相傳瑁莫報切間隙居莧切隔也隙鏬也下乘間同所覺古孝切寤也沓渚沓逹荅切水名漢遼東郡有沓氏邑顔師古云凡言氏者皆謂因之而立名盤玄上蒲官切下胡故切猶根節槃錯也舎近舎音捨釋也尉他徒何切南海尉任囂病且死召南海龍川令趙他行南海尉事漢立他爲南越王本南海尉故曰尉也元莵同都切故句驪胡國漢武帝開置自漢末爲公孫度所據至景𥘉二年魏平之疽創上七余切癰疽也下𥘉良切通作瘡句麗上古侯切下音離按本傳云東夷舊語以爲夫餘别種言語諸事多與夫餘同其國在遼東之東千里與朝鮮濊貊沃沮相接紿言蕩亥切欺也通作詒皂衣皂昨早切隷也所衣黒繒因謂之皂衣鶡雞何葛切似雉隱處昌據切所也六安古國臯陶後漢武帝别爲六安國後屬廬江入三國屬吴庲降見魏紀三蠢動蠢尺尹切蟲動也稱職稱去聲冝也邸閣與禮切在漢沮縣沮水傍邸或作阺岸傍欲落者故以閣爲道二年五丈原在扶風郿縣域中屬魏塹七艶切坑也居巢湖巢袒了切漢廬江邑後爲居巢侯國廣志曰有二大湖巢湖在縣東南入三國屬呉沔口彌兖切在江夏沙羡縣域中按水經云夏水冬竭憂流故曰夏水自江陵縣過華容縣又東至雲杜縣入沔謂之賭口自賭口下沔水過夏口㑹于江所謂沔口即此行隊上胡剛切列也要伊消切遮也亦作徼比至比毗至切近也韓扁𥙷典切邏郎佐切廵也葑豆方用切菰根也江東有葑田張拓張張吾軍之張拓音託忣拓之拓挑戰上徒了切挑戰謂擿嬈敵求戰也巾幗巾首飾也幗古穫切婦人喪冠噉杜覧切亦作啖公琰以冉切結陳直覲切與陣同分部分去聲籌度逹各切謀也憒憒古對切心亂也孫謀孫音孫順也毛詩鄭氏釋檝即涉切舟櫂也斷後徒玩切絶也揣楚委切揣度也還解舉蟹切釋也覘儀敕豔切窺也攙儀𥘉衘切先其事之謂攙羽檄胡狄切魏武奏事云令邊有警輒露檄挿羽槎山鋤加切斫木也禦延偶許切止也倵人名未詳赴難難去聲贏財以成切餘也怏怏於亮切情不足也汶山文運切本冉駹國漢武帝開置汶山郡三國系蜀巴丘漢長沙下雋縣地吳始曰巴丘魯肅甞守此有湘山即君山永安漢魚復縣屬巴郡公孫述於此築城號白帝有永安宫蜀主改魚復爲永安幽邃鄙遂切深逺也逋亡奔模切亡也抵突陁没切說文犬從冘中出爲突猨狖上于元切或作猿下余救切鼠屬善旋窟藏上苦骨切窟穴也下才浪切物所畜也蠭敷容切說文曰螫人飛蟲也羈居冝切馬絡頣魏紀五通鑑卷七十三起旃蒙單閼盡強圉大荒落即乙卯至丁已凡三年烈祖明皇帝中之下青龍三年甄后側鄰切姓也狷狹上吉掾切有所不爲也下侯夾切隘狹也從容從七恭切從容猶休燕也從行從才用切隨行曰從咤陟駕切歎咤也慰省所景切視也恨望下艮切怨也落度度徒鶴切猶落魄不得志貌許昌宮漢頴川長社邑獻帝都之魏文帝改曰許昌至明帝又於此建宫緫章觀古玩切爾雅曰觀謂之闕於上觀望傳舎傳株戀切驛遽也蘇鶚演義謂馳傳者如今之過所解見上壞音怪毁之曰壞嬪嬙上毗賔切周禮有九嬪下所力切女字也亦音墻淑媛上神六切善也下于眷切說文美女也螽斯音終螽斯蚣蝑也北芒莫郎切洛陽北山名阿房上烏何切下或音旁阿房者言殿之四阿皆爲房也一說大陵曰阿言其殿髙若於阿上爲房不度徒各切度量也著上陟略切下莫報切說文小兒蠻夷頭衣縹綾上普沼切青白色羸越倫爲切瘦也舎其舎音捨釋也悲惡烏路切憎也察校居效切檢校也涿竹角切郡名屬魏讜言多曩切善言也祈禳如羊切祈求福也禳除禍也厭之益渉切厭勝也巫蠱公土切巫者執左道以亂政而惑人蠱惑也指體即藥毒害人是若行符厭俗之爲魅故曰巫蠱萐莆上實洽切下方矩切瑞草也堯時生於庖厨扇暑而涼蟾蜍上時占切下常如切蝦蟇也爲蟾蜍以受龍水見作見形甸切下龍見同音犯蹕壁吉切蹕所以止行人清道也岀稱警入稱蹕互文耳造䣛造七到切就也䣛通作膝犠牛許冝切色純曰犧璜玦上胡光切下古穴切半壁孛彗上蒲昧切彗所以除舊布新孛氣似彗臶在甸切又祖閟切四年湔則前切水名漢蜀郡縣虎縣玉壘山湔水所出東南至江陽入江氐王都奚切武都氐也西戎之別種來降胡江切服也略齊前西切等也采椽上倉宰切本作棌木也漢書唐虞採椽固非謂文采也下重緑切屋角也毓余六切乃解舉蟹切直詆丁禮切毀訾也昶丑兩切景𥘉元年山茌仕之切漢泰山郡有茌縣荏山在縣東北即山莛縣也或音淄東漢爲茌侯國入三國屬魏單于單音蟬匈奴天子之號言廣大之貎象天單于然公孫淵方誘鮮卑假以此號禘大計切禘祭也祗翹移切地祗提出萬物者也芟刈上師銜切刈也或作蔪下魚廢切刈穫也降首降胡江切服也首舒救切有咎自陳伉苦浪切以徇辭峻切行示也鍾簴其舉切說文鍾鼓之拊也飾爲猛獸之足於下故從虎從異通作虡橐佗上他各切下徒何切匈奴竒獸名陬子侯切隅也厮息移切役也儋石都濫切應劭曰齊人名小罌爲儋晉灼曰石斗石也或曰儋者一人之所負儋也儲陳如切糧也或作䊰將吏將去聲奉禄上扶用切俸秩參少上倉含切參考也覬音兾貍䑕上陵之切說文㐲獸似貙茵蓐上於眞切下儒欲切褥藉也縁飾上子絹切衣純也帑藏上他曩切金幣所藏下才浪切物所蓄也餐千安切糜費上忙皮切下芳未切内之内音納掖庭羊益切即宫中永巷也後改爲掖庭妻妻上如字下去聲貣貰上敵德切從人求物也下始制切貸也横與户孟切不順理下横生同爲墟丘於切丘謂之墟棊跱丈里切止也或作峙畫地胡卦切又胡麥切界也啖徒濫切食也嘏舉下切研覈上倪堅切研磨也下下革切覈實也鯀古本切禹父四隩乙六切四方土可居也中器竹仲切當也魏紀六通鑑卷七十四起著雍敦牂盡旃蒙赤奮若即戊午至乙丑凡八年烈祖明皇帝下景初二年衜古道字以要於霄切不解佳買切判也下解散同譎其古穴切詭也好尚好虚到切愛也尚髙尚也郤正綺㦸切匪懈居隘切怠也智調徒弔切才調之調力彊如字或音巨兩切探他含切義同探賾遼隧遼東邑本作隊音遂圍塹七艶切阬也墯徒果切落也幟式志切旗屬趣之逡須切嚮也淹月衣廉切讀若厭足也抄楚教切略取也雨霽子計切雨止也楯櫓上食尹切下即古切楯所以蔽身櫓大盾也鈎衝上居侯切鉤梯也所以鉤引上城者下昌容切䡴城車窘急渠殞切急迫也檄胡狄切肉袒徒旱切袒楊而露肉也退舎始夜切三十里爲一舎老耄莫到切年九十曰耄送任汝鴆切質子也京觀古玩切積户封土其上謂之京觀帶方漢帶方城在樂浪郡其地爲公孫度所據至景𥘉二年魏平之閉著陟略切置也囹圄上盧經切下魚吕切獄名巧詆典禮切詆訶也刀嘉上丁聊切謗訕上𥙷曠切說文毀也下所晏切蒼頡篇曰訕非也或作姍是儀是姓也儀本姓氏孔融嘲曰氏字民無上因改作是窮詰去吉切問也舎之始野切赦宥也謝厷乎萌切數言色角切頻數也殿最都甸切上功曰最下功曰殿藉草慈夜切以茅藉地懷叙懷姓也闞澤闞姓也苦濫切厝倉故切通作措悉中陟仲切當也嫌難嫌疑也難如字分計分去聲爲監監本平聲如三監之監後皆轉爲去聲便僻上毗連切僻也下匹亦切邪也驍騎古堯切徤也屬之之欲切付也下三年屬君同強作其亮切勉也辟邪必益切宫中常所給使者軹關諸氏切在河内軹孫三國屬魏三年諦都計切審也口吃居乙切言蹇也更宿居行切更互也下更止同謐密畢切斐敷尾切忤五故切逆也銛思廉切利也不橈女巧切曲也守將將去聲憒憒古對切心亂也適莫上都歴切從也莫定也駱驛上盧各切下夷益切驛馬也橫受户孟切非理也悛此縁切改也邵陵厲公上正始元年嶷鄂力切猾户八切亂也二年札側八切喪誅上息郎切下陟輸切言死亡誅戮者屢見彊羸上巨良切健也下力爲切瘦也掎角居綺切偏引也秣馬莫葛切食馬榖也芍陂芍音鵲楚相孫叔敖所造徑百里灌田萬頃在漢六安國蓼地柤中之加切楚地春秋魯襄公㑹吴于柤即此卒卒音猝急也滋蔓音萬蔓延也左傳無使滋蔓并力卑政切兼也並也涪音浮蜀地廣漢郡涪水所出南入江三年儋耳丁甘切越地在大海中漢武帝元鼎六年開儋耳郡儋耳者其種大耳渠率自謂王者其地屬吴珠崖漢武帝開置在大海中崖岸之邊出眞珠故曰珠崖其地系吴降殺所拜切衰小之也降去聲四年襲席入切春秋釋例㭺其不俻曰襲掩衣撿切說文曰歛也諜人逹恊切軍中反間者繕時戰切善也毗輔毗頻脂切輔助監秦居懴切誡也與鑑通難掉徒釣切摇也閹官閹衣檢切宫中守門者燼徐刃切火餘也榛藪上側詵切木叢生曰榛間厠上古莧切隔也下𥘉吏切雜也五年駱谷駱音洛漢中郡興執有駱谷路南口曰儻谷北口曰駱谷黃金谷名在漢中郡漢陽縣南接漢川險固之極比爾間比毗至切近也旗幟昌志切旌旗之屬擐甲擐胡慣切貫也邀絶伊消切邀遮也絶㫁也朝晡奔謨切晡日加申時斆户孝切教也六年票騎票頻妙切勁疾貌官名別僚彼列切别異也僚官也謂别其官日磾都黎切宿留上息救切下力救切停待也廨古隘切公舎省奪省所景切簡少也解之佳買切說也覘丑艶切闚視也竺張六切譛毁譛側禁切愬也毀謗也覬覦上几利切幸也下容朱切欲也謂幸得其所欲盎烏浪切憤恚上房吻切懣也下於避切恨也便僻上毗連切下普擊切邪僻魏紀七通鑑卷七十五起柔兆攝提格盡元黓涒灘即丙寅至壬申凡七年邵陵厲公中正始七年頎渠希切沃沮上烏酷切下千余切東沃沮其國在髙句驪蓋馬大山之東東濱大海北與挹婁夫餘南與濊貊接肅愼氏周成王旣伐東夷肅愼來賀即此其國在不咸山北在夫餘東北干餘里濱大海南與北沃沮接蒲圻圻音祈漢江夏郡有蒲圻湖入三國屬吴武昌故楚之東鄂在漢爲江夏郡之鄂縣吴改爲武昌都焉黃龍元年始遷都建業踧踖上子六切下資昔切恭謹之貌平康夷冉駹諸羌別種其地在漢汶山郡邳肜上貧悲切下以中切襁舉兩切負兒衣也以約小兒於背上銚期銚餘招切姓也期名八年不與音豫下干與同䙝近私列切猶昵近也𥙷䘺文莧切䘺衣縫解也洮西他刀切洮水岀隴西臨洮東北入河九年充牣而振切滿也内人上音納結刑結吉屑切締也謂刑不解者五歳少邪少讀若多少之少邪餘遮切分界分方文切別也失分扶問切定分也許容切又許拱切擾恐也纔屬屬音蜀附也言其聲氣僅相聮屬耳愴然楚亮切悽愴三公不俯九切與否同裒多裒薄侯切聚也嘉平元年伺相吏切奄闚也離間居莧切間隔也逗留上大透切下力救切逗止也留行相待也司蕃司姓也蕃其名棧豆棧仕限切馬皂也豆所以飼馬甲夜謂𥘉更也㹠犢上徒渾切豕子也下徒谷切牛子也挾彈上檄頰切持也下徒案切挾弓以行圎將營將去聲敞齒兩切耽都含切昵如乙切親也沈持林切委質職日切形也䈥舉欣切肉之力也鬼躁則到切鬼躁鬼幽皆管輅術數所言槁木枯老切糟粕上臧曹切酒滓也下匹各切􅜷糟曰粕彧乙六切叶音恊和同也行間胡剛切行列間也挑戰徒弔切擿嬈敵以求戰也闇與暗同彪𥙷休切勞精勞姓也狷吉掾切有所不爲二年無難督都毒切凡言督者督察也無難督官名左遷子賀切左手足不如右彊左遷者貶下也故鄣音章漢丹陽邑譎古穴切詭也并力卑政切專也塗塘吴主所築塘名在堂邑屬漢臨淮郡適庻適讀曰嫡釁許槇切鏬拆也本作舋州泰州姓也泰其名竹絙絙音亘索也鎧可亥切甲也三年涂水同都切水名出漢益州郡牧廉縣南山西北至越雋入繩水岀馬湖合岷江索昔各切繩也自首舒救切有咎自陳倜儻倜他歴切倜儻卓異也從容七㳟切猶燕休也單固單多寒切姓也狠下懇切很戾造次七到切急遽也哂矢忍切笑不壞顔曰哂漢壽本漢廣漢郡之葭萌蜀主改曰漢四年東莞音官漢琅邪邑入三國屬吴中惡竹仲切傷也幾危居依切近也慺慺盧侯龍珠二切恭謹貌三思蘇暫切參之也更作古衡切改也下更相同音羈吴居冝切馬絡頭其字通作羈從两從馽馽馬絆也羈呉猶羈馬之義疆場上居良切界也下夷益切畔也間諜上居莧切下逹恊切軍中反間也徼功於堯切要也最差𥘉加切差猶愈也錯置錯通作唶塉土秦昔切薄土也冦鈔楚教切略取也偪筆力切迫也角之角如字競也度陳直覲切與陣同冠軍古玩切以功冠諸軍故曰冠軍帆符咸切舟上慢所以㲹風或作䑺矛㦸上迷浮切酋矛也下訖逆切有枝兵也兠鍪上當侯切下莫浮切兠鍪首鎧楯食尹切所以捍身蔽目倮身即果切露體也亦作祼縁堨於割切壁也說文壁間有隙鼔譟蘇到切群呼也蹈藉蹈行貌藉慈夜切字或作躤踐也魏紀八通鑑卷七十六起昭陽作噩盡旃蒙大淵獻即癸酉至乙亥凡三年邵陵厲公下嘉平五年越嶲先藥切古卬都國漢武帝開置郡入三國屬魏嶷魚其切又鄂力切率師率讀曰師歙許及切昶丑兩切其喪田浪切恪克各切罷勞罷讀疲創痍上𥘉莊切下延知切皆傷也蟣蝨上舉豈切蝨之子也下色櫛切齧人蟲邯胡甘切熟省息井切察也審也可斷徒玩切分叚也徼倖古堯切倖也通作僥狄道亭歷切漢隴西邑其地有狄種故云狄道三國屬魏疆埸音亦封疆場畔也徹直列切去也柵測革切編立木也流腫之隴切釋名曰腫鍾也迕五故切逆也伺相吏切奄闚也流曵餘制切牽也引也仆音付一音蒲北切頓也僵也怨黷徒谷切痛怨也本作讟左傳民無怨讟張設知亮切陳設也裁傷裁與纔同更飲工衡切改也篾束莫結切析竹皮也梟市工堯切斷首挂於木㦧然七感切痛也冝作慘剽急匹妙切輕也輯睦音集爾雅曰和也沾洽上之廉切詩旣沾旣足下侯夾切和也合也髙貴郷公上正元元年怏怏於兩切志不滿也築殺音竹擣也毓餘六切其量音諒外要伊消切關鑰弋灼切關下壯也妬都故切嫉妬也昵尼質切親也歔欷上休居切下香衣切歎息也樂浪音洛狼古朝鮮國漢武帝開置郡三國屬魏褻近私列切猶昵近也儐者必鄰切賛導者又必刃切儐相也臨洮吐髙切水名岀西羌中漢爲臨洮縣在隴西入三國屬魏二年瓦解胡買切判也目瘤力救切赤瘤腫病也創甚傷也讀若瘡蹶然居月切又紀劣切跳也袤莫候切懦乃卧切又乃亂切弱也錯兵千故切通作措㶏水倚謹切水名岀陽城少室山東入頴即汝南㶏強縣留賛力求切姓也岀衛大夫留封人之後相屬之欲切聮也鼔譟先到切群呼也五結切噬也䧟陳直覲切與陣同披靡上匹美切裂也下忙彼切偃也鎧可亥切甲之緫名胄直祐切兠鍪也潰胡對切亂也橐皐上音託又章夜切下如字又音姑迸北諍切散走也怡與之切廷爭與諍同黷武徒谷切黷猶慢也數也枹罕音膚其字從木漢金城邑入三國屬魏蝮蛇孚六切毒蛇也螫施隻切蟲行毒也蝮螫手則斷腕烏貫切手腕也櫟陽音藥漢馮翊邑三國屬魏轒輼上符分切下烏昆切說文淮陽名車隆穹爲轒應劭曰轒輼匈奴車博雅以爲栁車拒堙伏眞切拒捍也堙塞也僑渠嬌切僑寄憤踊上房吻切下餘隴切憤悱而踊躍也卒至音猝覆喪上敷救切下蘇狼切覆覂也喪亡也慰勞並去聲安慰而勞問也上邽音圭邑名古邽戎地也屬漢陽魏以爲重鎭魏紀九通鑑卷七十七起柔兆困敦盡重光大荒落即丙子至辛已凡六年髙貴郷公下甘露元年赤舄思積切朱履也屬文之欲切將易將去聲易改也轉也音亦若趣逡湏切嚮也下同黠下八切桀黠說吴音稅誘也纂祖管切餞才線切餞送也綝丑林切褠古侯切單衣也比曉毗至切近也毓餘大切酖直禁切毒酒也反之孚袁切覆也瘁秦醉切病也泄先列切漏也二年難問乃旦切阻也中藏才浪切内藏也下帑藏音同燥先到切乾也詰之去吉切問也帑藏帑他曩切金帛之所也藏才浪切物所蓄也振施上章忍切下施智切振救也施與也輕俠胡頰切輕謂輕薄俠謂任俠間巳居莧切迭也下反間音同靚疾政切爲質職利切結信也壘魯水切軍壁塹七艶切坑也州泰州姓也左傳晉有大夫州繹輜重上側其切載衣車也下直用切載物車也行者之所資緫曰輜重長城方城山名左傳所謂楚國方城以爲城者在漢南陽堵陽葉縣之境山自比陽連百里號曰方城亦曰長城數挑戰數色角切挑徒了切謂屢擿嬈敵以求戰也搏伯各切索持也諺魚變切俗言跌徒結切踼也三年省食所景切減省突陀骨切突出冒陳直覲切與陣同禆將墳彌切副助也俘馘上芳夫切下古獲切軍所獲也五更古衡切鄭康成云三老五更老人更知三德五事者蔡邕以更爲叟闓與開同朝見胡甸切朝者覲君之緫稱見者下於上稱見鞬九言切弓衣適子讀曰嫡歎咤陟嫁切叱怒也憒憒胡對切又古外切班告頒布也告者宣告也喁喁魚容切衆口向上唯唯以水切恭應之辭汜符咸切又詐里切猜嫌上倉才切下户兼切猜忌嫌疑也射鉤古侯切魯送公子紏歸齊使管仲别將兵遮莒道射中小白帶鉤斬袪起魚切祛衣𬒮也左傳晉侯使寺人披伐蒲重耳踰垣而走披斬其祛㦸棨有衣之㦸以赤黒繒爲之音啓興埶古勢字漢城固縣地有興執山蜀主建關於此漢樂二城名蜀主建興五年諸葛亮出屯漢中營沔北於南山下原上築漢樂二城蔣斌上子兩切下悲巾切四年冠軍古玩切漢南陽邑三國屬魏陽夏音賈漢陳國之邑三國屬魏龍見胡甸切諶是任切元皇帝上景元元年伷直祐切枕章鴆切卧首據物地顗并命必刃切或作併璜胡光切奐火貫切廞虚今切䂮力灼切磨刃也受分扶問切定分也二年沮水千餘切沮水出武都東狼谷南至沙羡南入江蔚紆勿切荗也水潦魯皓切兩水大皃酈音歷趣銷趣讀曰促速也食其音異基比屋毗必切比次也珝况羽切拓拔力微拓吐各切抜蒲撥切鮮卑名沙漠汗漠莫各切汗胡安切拓抜力微之子車惃氏惃古渾切可汗别族詰汾上去吉切下符分切可汗鄰之子盛樂盛時征切漢書作成樂音􅏖雲中邑入三國屬魏魏紀十通鑑卷七十八起元黓敦牂盡閼逢涒灘即壬午至甲申凡三年元皇帝下景元三年雨單呉主孫亮之子名按吴録載休詔曰太子名雨單雨單音如湖水灣澳之灣字商􅔾音如迄今之迄瘳化力弔切又力救切姓也出付周文王子伯瘳之後一云出古賢者廖伯安之後更相上衡切互也伶盧經切綜核上子宋切讀若錯綜之綜下夏革切讀若覈實之覈荷􅓩荷負也音下可切􅓩鍼也鍫也音測洽切箕踞音據謂伸其兩脚而坐其形如箕鍜都玩切煆煉也繕時戰切治也滅虢古伯切國名春秋左傳晉侯假道於虞以伐虢絆博漫切縶維之也四年交趾音止越地郡名屬吴諝私吕切擅調上時戰切專擅也下徒釣切調發也趣甘松趣音趨嚮也甘松蜀地諸羌之地有甘松嶺以地産甘松爲名斜谷上余遮切下于蜀切漢中谷名解見上徇辭峻切行示也愷可亥切肜以中切庫藏才浪切物所蓄也頎渠希切趣截上趨玉切下昨結切速斷也遲鈍徒困切謂性緩而又魯鈍也水碓都内切輪車也杜預作連機碓數百户長展兩切漢制萬户以上爲令千户以上爲長皎厲上吉了切下力制切皎猶矯也厲猶戻也不中竹仲切當也江油江油本漢之廣漢剛氐道地後因置縣蜀之邊要也畏懦乃卧切又乃亂切或作愞怯弱也檻車户黤切載因車涪音浮蜀地廣漢邑涪水所岀南入江瀕於必隣切際也推轉通回切推墯而流轉也列陳直刃切殄民徒典切殄㓕也調度下徒父切調賦而用度也節傳張戀切節者操也瑞信也謂持節者必盡人臣之節操長一尺二寸秦漢以下改爲旌幢之形近丗漸長數尺傳者以木爲之長尺五書符於上以爲信並見唐蘇鶚演義華覈胡化切姓也覈其名卒聞音猝忽也忡悵上丑中切下丑亮切憂忡而悵惘也煩苛音何煩細也髦莫褒切閹官衣檢切宮中守門者通作奄黷武徒谷切黷猶慢也數也撲普木切擊也塢烏五切車城也轝羊茹切亦作輿舁車也又羊諸切悖傲上蒲没切下魚到切強很而倨慢也咸熈元年㑹不俯玖切與否同距臼許切違也比至必寐切聽内讀曰納紿徒在切欺也白棓歩項切通作棒白幍若洽切帽也雷鼓盧對切急擊鼓也本作欙鎧杖苦亥切甲也杖謂器仗也机舉履切說文木也拄冡庾切袤橕也鈔略𥘉交切又楚教切略取也狼藉上音郎下秦昔切狼藉草而卧去則穢亂故物之散亂者謂之狼藉辿勑連切掩骼上衣檢切歛也下古伯切枯骨曰骼埋胔上莫皆切下疾智切骨有肉曰胔徼利於堯切要也憤激上房吻切下古歷切憤懣而振激也擾攘上而沼切下汝陽切謂擾亂而攘竊也郤正綺㦸切姓也或作郄大臨力禁切哭而蒞喪曰臨愴楚亮切悽愴稚直利切亦作穉琇息救切又以九切爨谷取亂切西夷之姓也名聞亡運切聲所至也䣛息七切脛節也亦作膝從容七㳟切猶休燕也麤倉胡切陳也資治通鑑釋文卷第八
