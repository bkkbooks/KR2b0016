front:
  text: 珥忍止切珥璫貂丁聊切貂者取其有丈而不炳煥外柔易而内剛健諜徒恊切反間也診止忍切說文視也障之亮切掩蔽也叡俞芮切三年掠力灼切奪取也䧟陳直覲切與陣同矟色角切長矛也或作槊披靡披裂也靡散也披音普彼切縈於營切繞也妖於喬切妖怪鐡鎻損果切亦作鏁頸居郢切說文頭莖也徇辝峻切行示也燼徐刃切火餘也痍毀延知切傷也撤直列切去也祔符遇切合葬也寨士邁切籬落也磊磈上魯猥切下烏賄切宕昌徒浪切西羌種也誄力水切累也周禮大祝作六辭六曰誄縗絰上七雷切喪衣也亦作衰下徒切以苴麻爲之袴褶上口護切下席入切袴褶騎服也漑灌上居代切下古玩切注也澆也芸殖上于分切下丞職切芸耨而種殖也捍邊侯旰切衛也貯丁吕切積也稔如甚切廣雅曰稔秋糓熟也溢夷質切滿溢贓汙上兹郎切受賄曰贓下汪胡切汙穢也大辟婢亦切死刑闞伯周闞苦濫切姓也春秋左傳齊有大夫闞止敦煌音屯皇郡名應劭曰敦大也煌盛也四年圈求逺切養獸之所謚神至切行之迹也誹謗上府尾切下𥙷曠切皆訕也賁耻賁符非切姓也耻其名蓁側詵切烽燧上敷容切下徐醉切說文燧候表也邊有警則舉火顔師古云夜曰㷭晝曰燧璡子鄰切丗祖武皇帝上之上永明元年鏗丘耕切禳之如陽切說文磔禳祀除癘殃也古者燧人禜子所造眚所景切災也過也籥弋灼切關下壯也詰責去吉切問也誚責也裝束側霜切褁束也饌士戀切具食也古作籑捉側角切搤也惙然陟雪切疲也憂也詩云憂心惙惙憤悒上扶粉切懣也下於急切憂也豁懐呼活切大度量也或作豁恂思廵切胛古狎切闔也與胷脅相㑹闔也複方六切重也屬鞬居言切說文所以戢弓矢彖吐玩切越嶲先蘂切郡名古邛都國謂越過嶲水因以爲名橈法女巧切乞也彪悲幽切纉祖管切賈人音古啇賈鬻余六切賣也瓦礫郎擊切小石曰礫腕烏貫切手腕劾胡得切法有罪也
