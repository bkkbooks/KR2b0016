body:
  text: 齊紀二通鑑卷一百三十六起閼逢困敦盡屠維大荒落即甲子至已巳凡六年丗祖武皇帝上之下永明二年才儁子峻切智過千人曰儁昉分兩切眺他弔切倕是爲切惲於粉切縝章忍切拂敷勿切說文過擊也幌户廣切帷幔也晉惠起居注云有雲母幌茵席於貢切筃褥也通作䄄糞溷上方問切下胡困切穢濁也琰以冉切乖刺盧逹切辟也戾也从束从刀徐錯曰刺乖違者莫如刀茹法亮茹人諸切姓也法亮其名餉遺弋季切賂也調帛徒弔切調謂計發也斛胡谷切十斗曰斛跼蹐上渠六切促也謂踡跼不神下資昔切小歩也如踧踖然讞語蹇切又魚戰切魚列切皆議罪也佗唐何切謬靡㓜切妄言悍愚侯旴切勇也齎牋西切持遺也誡居拜切警也備也宥于救切赦也曅筠輙切肉柈蒲官切器名或作槃盤汙烏故切染也穢也璉力展切獠魯皓切又竹狡切西南夷賧吐濫切夷人以財贖罪或作倓悰昨宗切典籖千廉切官名曇晢上徒含切下先的切三年楷口駭切兠鍪上當俠切下迷浮切說文兠鍪首鎧也孔雀毦仍吏切孔雀鳥名眊者羽毛飾也博雅曰㲥毦罽也一曰積羽爲衣一曰兠鍪上飾間道居莧切微道也圗䜟楚譛切符命之書䜟驗也妖邪上於喬切下似嗟切妖怪邪祟也巫覡胡狄切男曰巫女曰覡勰胡頰切造次七到切急遽也翕然許及切衆也盛也諳烏含切記也析先擊切分也髻古詣切綰髪挿楚洽切刺入簪側吟切首笄也吐谷渾谷余蜀切渾户昆切本遼東鮮卑徒酒涉歸之庶長名吐谷渾其後因以爲號悖蒲没切亂也䕃附於禁切謂庇附於人也株追輸切木根也眞可汗河干切戎酋稱也猶曰單于之類豆崘盧昆切眞可汗之子名四年泓烏宏切明徹敕列切藉田秦昔切帝藉千畒也古者使民如借故謂之藉或作耤銶渠尤切鉉胡犬切癃力中切病也均傜餘昭切使也役也辟雍上必益切下於容切學名鄭康成曰辟明也雍和也所以和明天下五年穫黄郭切刈穫也刈魚肺切芟刈也宛葉上於元切下式渉切宛古申伯國葉古葉公邑皆屬南陽國譴去戰切責也賑章刃切贍也賻禭上符遇切賻助也下徐醉切禭贈也賚洛代切賜也沘陽音比南陽國之邑公愍眉隕切創𥘉莊切傷也緦麻息兹切兩麻一絲布也邃雖遂切儵式竹切疫營隻切疾疫也餒奴罪切飢也儲陳如切儲㣥袨服熒絹切好衣也糟糠上臧曹切酒滓也下丘岡切粃糠也短褐何葛切粗衣侯醫垔於眞切柔然國人名也候婁匐勒匐蒲北切髙車阿伏至羅王號猶夏言天子也候倍髙車窮竒之號猶夏言大子也機杼上居希切織具也下丈吕切機之持緯者府藏才浪切物所蓄也刀鈐其淹切兵鈐以閑防神府以備非常繒慈陵切帛也纊苦謗切絮也蝗音皇說文螽也六年採樵昨焦切採薪也下邳符悲切葛嶧山在其西古嶧陽也蹹逹合切踐也俘芳無切軍所獲也帛烏祝帛溥陌切姓也烏祝其名拓拔斤上他各切下蒲撥切又蒲八切虜複姓澧陽里弟切天門邑糴買亭歴切布糓也埭徒耐切以上堨水曰埭下同逼蹴上筆力切下子六切迫也促也蠲圭淵切除也瘼末各切病也訢音欣餬口洪孤切寄食也慘愓上七感切下他歷切慼也憂也恧女六切慙也肉袒徒旱切脫衣而露肉也緌儒佳切系冠纓也綜子宋切緫也百濟百濟之國蓋馬韓之屬也本扶餘王東明之後有仇合篤於仁信始立國于帶方故地遂爲東夷強國𥘉以百家濟因號百濟其國東極新羅勾麗西南俱限大海其都曰居抜城亦曰固麻城七年珉眉巾切慕容契慕莫故切虜複姓魏初莫護跋率部落入居遼西時燕代多冠歩揺冠跋好之乃歛髪襲冠諸部因謂之歩揺後音訛爲慕容焉契私列切賾士革切斆胡孝切瀹以灼切齊紀三通鑑卷一百三十七起上章敦䍧盡元黓涒灘即庚午至壬申凡三年丗祖武皇帝中永明八年地豆干地豆干國在室韋國西千餘里以皮爲衣服無五糓唯食肉酪頥盈之切邢産邢户經切姓也産其名庫莫奚庫莫奚其先東部胡宇文之別種至齊時其後種類漸多分爲五部一曰辱紇主二曰莫賀弗三曰契箇四曰水昆五曰室得毎部一千人爲其師隨逐水草頗同突厥𬗟彌兖切劫居劫切強取也推通囘切推墮嫌户兼切疑也犒口到切餉也悆羊如切狡古巧切狂狡潰胡對切逃散也麤踈倉胡切心不精也舸賈我切大船也方言南楚江湖謂之舸艇待鼎切小船舴艦上陟格切下莫梗切博雅舴艋小舟沿流余專切說文縁水而下也縊於賜切自經也鉞王伐切大斧怖普故切惶懼也哽塞上古杏切下悉則切哽咽也塞窒也屬藉殊王切附也謂所附宗藉蛸氏相邀切齊武帝改其子巴東王子響爲蛸氏猿雨元切亦作蝯爾雅曰猱蝯善援透擲直炙切投也嗚咽一結切聲塞也魚復音腹巴東邑藹於蓋切繕時戰切治也廨古隘切公悆勺飲職略切挹取也僵仆上居良切僨也下芳遇切又蒲北切頓也慌惚上虎廣切下呼骨切髣髴上撫兩切下敷勿切說文相似也厝倉故切置也衰服倉回切服衣長六寸博四寸直心或作縗慺慺盧侯切㳟謹皃又龍珠切間然居莧切間厠之間嗤赤之切笑也祼葬郎果切露體而葬也越紼分勿切引車索喋喋徒恊切利口也悝口囬切又音里潦魯皓切雨水大皃走下則候切疾趨也鋊余玉切銅屑也與漢書磨錢取鋊同義礱盧紅切磨也砥礪上掌氏切下力制切書傳云砥於礪皆磨石也銷思邀切鑠也殖丞職切興生財利曰殖悛且縁切諳烏含切記也憶也蠕蠕而兖切柔然國之別名九年臛黒各切羮臛膾古外切細切肉也𦵔羹臻魚切麋鹿爲𦵔􅐽𦵔之稱茗粣上莫逈切茗草下測革切粽也南齊虞悰作扁米粣嗜常利切欲也芰竒寄切說文蓤也洮陽土刀切零陵邑齊時爲吐谷渾戍兵處枹罕枹字從木音鈇古罕羌侯邑也後魏爲重鎭竣且旬切羔裘羔裘黒羊裘也貂璫上丁聊切下都郎切冠上前挿貂尾以金璫飾首也衣幍乞洽切土服狀如弁缺四角魏武帝製魏志注云太祖放古皮弁裁縑帛以爲之駰伊眞切五輅魯故切五輅謂金輅玉輅象輅革輅木輅皆有錫鸞之飾謂之輅者言行於道路也拓他各切開拓祧他彫切逺祖廟也禋於眞切精意以享謂之禋六宗按書孔氏傳六宗謂四時也寒暑也日也月也星也水旱也桑乾音干郡名系後魏禘祫上大計切下轄夾切禘祭也祫大合先祖親踈逺近也周禮五歳一禘三歳一祫圜丘禮祭天於圜丘爾雅云土之髙者曰丘圜者所以象天體圜通作圓崞山古博切在鴈門系後魏中霤力救切神名朏敷尾切又滂佩切書召誥帷丙午朏孔氏傳云朏明也月三日明生之名縞冠古老切素冠幘側革切說文髮有巾曰幘素紕禮記釋文紕音埤飾縁邊也瘠秦昔切病也闋苦穴切終也鑾輿盧官切天子之車以鑾鈴爲飾象鸞鳥聲和則謹也通作鸞禫徒感切除服祭名斐膚尾切林邑南蠻國名本漢時日南郡象林縣漢末功曹姓區有子曰連殺令自立爲王子孫遂襲其地金簟徒玷切簟席也胙昨悮切猶襲也飼祥吏切食也亦作飤十年庾蓽上以主切姓也蓽其名音壁言切郟鄏上古洽切下如蜀切地名在河南周武王定鼎于郟鄏周公營以爲都是爲王城昶丑兩切評蒲兵切博雅評訂平也歔郗上休居切下許旣切歎息也趣逡須切嚮也齊紀四通鑑卷一百三十八昭陽作噩即癸酉凡一年丗祖武皇帝下永明十一年郢以井切郡名麈尾麈麋屬其尾可以爲拂石頭城名在丹陽秣陵呉孫權改爲建業築城於此馬芻䆫俞切芻秣苑委逺切說文所以養禽獸者也更畨工衡切互也誚責才笑切通作譙嬖博計切賤而得婞曰嬖輦力展切輓車内讀曰納彪補休切瑶起余招切琛丑林切戢側立切鏗丘耕切典籖七廉切官名沔北莫踐切沔水之北雨雪于具切自上而下曰雨脅虚業切迫也諶時任切澄直陵切弈羊益切盛也繇直又切占辭沮材汝切止壞也屏必郢切斥去也戀力卷切慕也行陳上胡剛切下直覲切行伍軍陣也同軌居洧切車跡也謂書同文車同軌懦劣上乃卧切又乃亂切下力輟切弱也鄙也沖持中切恂須倫切募莫故切召募朱雀桁胡剛切通作航喧湫即由切本作啾謂喧譁啾唧也槌車直追切擊也亦作桘八騶甾尤切說文廐御也傖楚鋤庚切呉人罵楚人曰傖亟紀力切急也矯舉夭切正不正也絳衫絳赤色衫小𥜗也音師銜切毗頻脂切輔也瓌公回切曅筠輙切嫡都歴切親也正也膂爾舉切字林云脊骨也敞齒兩切調徒弔切賦調逋博孤切逋欠邸治丁禮切蒼頡篇曰邸舎也子午谷余玉切南北道相當故謂之子午其谷從京兆杜陵直絶南山徑漢中也漢平時王莽開之慝惕德切惡也鑰鉤上弋灼切關下壯也下居侯切鑰之鉤具也歐於口切捶擊也囊奴當切袋也有厎曰囊酣胡甘切酣飲張晏曰中酒曰酣應劭曰洽也繞而沼切纒也大斂力驗切殯也稚珪上直利切下古攜切不逞丑郢切􅗓毗祭切帛也衣𥚑斤於切說文衣袌也詰問去吉切誚責也跛眇者上𥙷火切行不正也下弭沼切失目也慰勞來到切安慰而問勞也徇辝峻切行示也黈纊上天口切冕前纊也下苦謗切絮也又細綿也前旒力求切說文埀玉也冕飾橈女巧切曲也斛胡谷切十斗曰斛輼輬車上於昆切下力羊切卧車也後因載䘮飾以栁翣遂名喪車鞞鐸上部迷切騎上鼔也下逹各切大鈴也稽顙上康禮切下冩曩切額至地也鄴魚怯切魏郡之邑屬後魏栗磾丁奚切堡博抱切堡障小城也金墉餘封切移晷居洧切日影也劾胡得切法有罪也贓茲郎切受賄曰贓儲陳如切積也勔彌兖切齊紀五通鑑卷一百三十九閼逢閹茂即甲戌凡一年髙祖明皇帝上建武元年俠轂古禄切車轂㗖徒濫切以食餧人曰㗖謂以利誘之如㗖之也衞率朔律切官名綦母珍之綦渠之切母微夫切複姓春秋左傳晉有綦母張隧中徐醉切墓道也諫爭諫古晏切爭與諍通諌諍者直言以悟入也鄱陽蒲禾切或作番鏘七羊切灋古法字䙝狎上先列切下轄甲切䙝侮也狎近也祼袒上郎果切下徒旱切露體也泆弋質切淫泆珉眉巾切伉儷上口浪切下郎計切敵也耦也淆胡茅切淆溷雜也亂也悛此縁切改也止也陵轢郎擊切如車所踐也禁闥他逹切博雅闥謂之門漂陽音栗溧水所出丹陽邑灰盡徐刃切火餘也與燼同擯斤上必刃切下昌石切棄也逐也慷慨上口黨切下口漑切歎息也𬒮彌蔽切䄂也殉辝閏切以人送死曰殉比屋頻寐切又薄必切言屋之相近也相次也癘疫上力制切下營隻切疾病也警蹕上居影切下卑吉切警者戒肅也蹕止行人也三思蘇暫切參之也論語三思而後行景􅉴札色切日昳嗇神殺測切愛惜也司契苦計切約也老子曰有德司契明當丁浪切中也厎也捶撻上之蘂切下他逹切皆擊也迭相徒結切更也連甍謨耕切屋棟相接也僑渠嬌切寄也并合卑政切並也兼也併省所景切簡也斆後教切廐牧居又切馬舎也訊思晉切問也勝殘識烝切論語可以勝殘去殺王肅曰勝殘殘暴之人使不爲惡也徼幸於堯切要也餞之才線切字林云送去食也三臨力禁切哭也尉元紆胃切姓也元其名媪烏浩切婦之老者稱禇公丑吕切姓也姥莫𥙷切女老稱藉其慈夜切依也猜疑倉才切亦疑也弓楯食尹切所以杆身蔽目瀹弋灼切圍棊渠之切博棊也或作碁悰徂宗切賖緩詩車切逺也銓簡銓度而簡擇也且縁切叡俞芮切偏頗滂禾切不平也憮然罔甫切憂也漸染上將廉切下而琰切漸漬而汙染也金日磾丁奚切屣履所綺切屣不躡跟也屬意之欲切委也阮氏五逺切姓也纂嚴祖管切集也湓城蒲奔切湓水在尋陽泝流蘇故切逆流而上曰泝沮將豫切喪也鄣面之亮切隔也蔽也鑊胡郭切鼎大而無足僵居良切僨也琇之思救切又餘受切銶音求朏敷尾切衣人於旣切服之也胛古狎切背胛泄私列切漏也譟先到切羣呼也誚責七笑切亦責也或作噍仆芳遇切頓也又蒲北切柯令孫柯古俄切姓也吴公子柯廬之後何氏姓苑云呉人也又虜複姓後魏柯拔氏後改爲柯氏酖直禁切毒酒嬰尫疾嬰於盈切纏也尫烏光切尫弱之病也戮力音六戮力併也嵇康音力幽切字林音遼耗失火到切損也橐駞上音託下徒何切駱駞韋昭曰背肉似橐孑遺居列切詩曰靡有孑遺謂無遺餘也下邳符悲切葛嶧山在西古嶧陽也魴符方切怏怏於亮切情不足也凱苦亥切馛蒲撥切質任上職利切下汝鴆切質子任子所以結信也諦丁計切審也降𣢾上胡江切下苦管切降伏也誠𣢾也椽重縁切榱也甔石都濫切應劭曰齊人名小罌爲甔晉灼曰石斗石也俶載昌六切詩載芟云俶載南畒擐甲胡慣切貫也春秋傳擐甲執兵挫祖卧切摧也勰胡頰切赭陽章也切南陽國之邑葉倉式渉切南陽邑倉在其地沙堨於葛切地名遮擁曰堨齊紀六通鑑卷一百四十起旃蒙大淵獻盡柔兆困敦即乙亥至丙子凡二年髙宗明皇帝中建武二年間岀居莧切迭也褊躁上俾緬切褊狹下則到切躁疾安堵音覩謂安如墻堵不遷動也塹柵上七艶切坑也下楚格切編木爲之誄魯水切黎明憐題切黎猶比也謂比至天明也訣古穴切訣別拊斐父切拍也曏者許亮切曏者謂往日也盱眙上況于切下與之切臨淮邑闢毗亦切開也門里澄延切說文一畒半一家之居也蕞爾徂外切小皃舋許愼切罅坼也介胄直佑切介猶鎧也胄謂兠鍪也罷弊罷讀曰疲勞也縛筏上符攫切繫也下房越切船筏也船艦户黤切戰船四方施板以禦矢狀如牢斫職略切潰胡對切亂也殿丁練切軍前曰啓後曰殿結陳直覲切列也與陣同搏戰伯各切說文索持也謂擊博喪蘇浪切亡也飼祥吏切食也級訖立切首級也秦人獲首者進秩一級故謂之首級俘芳無切軍所獲也轡兵媚切馬轡也嬰城於盈切繞也謂繞城以自守恟懼許容切又許拱切說文擾恐也弩力暖五切方言勉也斜谷上以遮切下余玉切斜谷在武功西南入谷百里而至貯展吕切積也炬􅍫許切束葦燒炊昌埀切㸑也矢中竹仲切傷也頰古恊切面旁也涇堅靈切後魏置此州以涇水爲名𡵨翹移切州名元魏所置擐甲胡慣切貫也春秋傳擐甲執兵漠北来各切沙土曰漠在匈奴中羈居冝切讀如羈縻之羈跬歩大蘂切半歩也司馬法凡人一舉足曰跬跬三尺也兩舉足曰歩歩六尺也小沛博蓋切沛國之邑漢髙祖所起處屬後魏碻磝上苦勞切下五勞切城名後魏爲濟州治所期親居之切復其時也謂周年之服屬飲至於禁切飲至謂飲於廟以數車徒器械及所獲也然不俯九切與否同庭爭側迸切止也邙山莫郎切河南洛陽北山名妻其七計切以女嫁人曰妻恚於避切怒恨也推以他回切進也合甑子孕切甗也古史考曰黄帝始作甑頽圯上徒回切墜也下部鄙切毀也葺七入切葺治沮水子余切水岀房陵東至郢入江虎賁音奔勇士稱也若虎賁獸言其猛也所樂魚教切欲也劾胡得切法有罪也泮宫音判或作頖泮宮諸侯之學也泮半也半有水半無水也鄭注禮記云頖班也所以班政教翊軍與職切翊輔也官名三年複芳六切重也拔拔蒲撥切虜複姓魏文帝以拔拔皇抜之長改爲長孫氏勿忸于忸女六切代北三字姓官氏志云改爲于氏尉遲上紆勿切下直尼切虜複姓後改爲尉氏姻㜕上音因下音連猥烏賄切猶濫也覈下革切實也琇思救切又餘受切媵以證切妾勝㦸几劇切有枝兵也調徒弔切選也拘恭于切止也執也鮮矣息淺切少也黄耇古厚切黄耇老人之稱黄謂白髮落更生黄者耇謂面不浄如垢剔他歴切解也餘濼音歷滴歷鎗楚耕切鼎屬嶸音宏揆求癸切度也懌羊益切恱也暠古老切庖人蒲交切厨者櫟城來的切在司州屬後魏樵蘇在焦切樵取薪也蘇取草也餐蘇昆切餔也膳時戰切具食也恂音荀詰旦去吉切平旦汾扶云切晉西河國後魏置西河郡兼置汾州駑怯上農都切下乞業切駑鈍而畏怯也斌悲巾切稔如甚切豐稔咫尺諸氏切八寸曰咫十寸曰尺逋亡博孤切逃也闔門胡臘切閉也盗跖之石切李竒注漢書云跖秦之大盗也齊紀七通鑑卷一百四十一起強圉赤奮若盡著雍攝提格即丁丑至戊寅凡二年髙宗明皇帝下建武四年恪苦各切朝請才姓切鮮于相然切複姓風俗通曰武王封箕子于朝鮮其子食采於朝鮮因氏焉探他含切逺取也毅魚旣切鉉胡畎切詡况羽切季敞昌兩切朝見胡電切自下而見上曰見鞠躬居六切㳟愼皃俯僂上匪父切下力主切低頭而區背也噉粥上徒敢切食也下之六切麋也乘間居莧切隙也宥于救切寛也不強巨兩切勉也陘北音刑陘山之北其道嶮隘在常山屬後魏敦煌音屯皇郡名應劭曰敦大也煌盛也屬後魏酋自秋切長也蒲坂甫逺切河東邑有歷山舜所耕也瘞壹計切幽薶也鎬胡老切武王所都在京兆長安西􅌡怡成切州即河間郡屬後魏共居容切汲郡之邑其地淇水所出春秋鄭太叔岀奔共即此屬後魏爲質職利切結信窘渠殞切急迫也宛於元切南陽國之邑郛音孚郭也梟首堅堯切斷首掛木上面縛符攫切縛手於背唯見其靣突岀陀骨切觸突而出斃毗祭切死也槎山鋤加切亦作查與氐羌相近鷲硤疾僦切其地在氐羌龍門礌石洛罪切推石自髙而下也靡碎上忙皮切下蘇對切縻爛也碎䃺也裨將頻彌切將之偏副也哂之式忍切哂笑也論語夫子哂之曵以制切牽引也縑堅嫌切并絲繒也鈔掠上楚教切下力灼切奪取也虹城户公切後魏之地沔北彌兖切沔水之北䐗陟魚切柵測革切編立木拒敵曇紛徒含切瓠胡悮切匏也趣逡須切嚮也傘蘇旱切蓋也或作繖貝丘博蓋切清河國之邑屬後魏暄許元切殖丞職切封殖永泰元年縛符攫切擊也臠力兖切肉臠嗚咽一結切聲塞也泌必媚切又毗必切蓐食儒欲切謂牀褥中食蹈藉蹈行皃藉踐也音慈夜切或作躤晡博姑切日加申時渦陽屋戈切又古禾切縣名後魏所置按說文渦水受淮陽扶溝浪蕩渠東入淮璝古回切器械户戒切何休注公羊云攻守之器曰械鄭氏大傳云禮樂之器及兵甲也郭璞三蒼解詁云械器之緫名黯乙減切髙亢苦浪切髙極也乘黄石證切詩曰乘乘黄鄭氏云四馬皆黄訊息晉切問也殛紀力切誅也溢夷質切滿溢瞋目昌眞切張目皃荒悸其季切心動也繆靡㓜切誤也戾也腕烏貫切說文手掔也楊雄曰掔握也療力照切治也忿敷問切怒也懊憹上烏浩切下奴冬切琴之歌名謂懊惱而㦀憹也儂郎儂音農我也呉語瓌公回切金甖於耕切缶也亦作罌鴆直禁切毒鳥以羽歷酒即殺人朓通堯切又他召切樗蒱抽居切樗蒱戲也若邪山邪以遮切在㑹稽嶷魚其切又鄂力切徒跣先典切足親地單景儁單上衍切姓也景儁其名饌士戀切說文具食也或作籑𬗟弭兖切浙江之列切江水東至㑹稽山隂爲浙江擔篙上都甘切下居勞切方言所以溂船謂之篙或作㰏荷鍤上夏可切負也下則洽切鍫也埭徒耐切以土堨水涸下各切水竭也壘魯水切軍壁俸扶用切俸秩嬪御匹賔切婦也周禮有九嬪九御巫覡胡狄切男曰覡女曰巫紇胡没切入臨力禁切哭也幘側革切冠幘說文髪有巾幘秃鶖上他谷切下此由切鳥名亦作鴉謇九輦切鴻臚音廬鴻聲也臚傳也所以傳聲賛導九賔齊紀八通鑑卷一百四十二起屠維單閼即己卯凡一年東昬矦上永元元年鄴魚怯切魏郡之邑屬後魏澄直陵切變不俯九切與否同小襖烏浩切衣襖菩薩上薄胡切下桑割切昶日兩切僮徒紅切僮僕猒禱一葉切廣雅曰猒鎮也東楹怡成切柱也榻託盍切牀也勰音恊嫗威遇切說文母也脅迄業切迫也訣古穴切別也詛莊助切呪詛亦作􅳊悛此縁切改也擯必刃切擯斥馬圈求逺切又渠篆切城名噉徒濫切食也蓬首蒲紅切詩云首如飛蓬垢靣舉后切塵垢於靣也忿敷問切怒也又敷粉切伺間上相吏切候也下居莧切隙也沮恐將豫切沮喪而恐懼也䧟陳直覲切與陣同幔莫半切幕也擔之都甘切負也分磧七迹切山名汋均實若切汋均皆水名迅音信疾也鄼城音賛順陽鄼縣城也岫似祐切紱分勿切綬也綢繆上陳留切下莫彪切綢繆猶纏綿也睽離傾畦切異也沖挹上直弓切下一入切謙沖而退挹也從容七恭切猶休燕也剗𥘉限切削也浣濯上胡管切通作瀚下直角切謂洗滌衣垢也鞌勒烏寒切鞍韀㘅勒也宛城於元切南陽宛縣之城跪去委切長跪羈旅居冝切羈寄旅客也颺與章切又餘亮切肇治小切衣幘側革切髮有巾曰幘重澀色入切不滑也驍勇堅堯切徤也櫓音魯大盾也睚眦睚音厓舉眼也眦即眥字音才詣切謂目正也言舉目相忤者即殺之一說上音五懈切下音仕懈切瞋目皃媟近私列切狎也慢也慓輕匹妙切疾也闇與暗同揣之初委切度也憺徒濫切索山客切求也肫徒渾切豕也一作豚瓦解音蟹判也朓他弔切渢房戎切曇慶徒含切晡博姑切日加申時號哭乎刀切大呼也亦哭也露袒徒旱切脫衣而露袒也遊邏郎佐切遊廵者詗問耻慶切伺也荻徒歴切蘆屬轝羊茹切舁車亦作輿又音以諸切矟所角切矛屬通俗文曰矛丈八者謂之矟踊余壠切跳也衣帢乞洽切弁缺四隅謂之帢帢士服也一說帢㡌也扶匐上蓬逋切手行也本作匍下鼻墨切伏地也或作伕捉刀側角切搤也一曰握也恣横胡孟切剛很下懇切剛愎而很戾也嬖倖博計切賤而得倖也吝嗇上良刃切惜也下所力切慳也稱是昌孕切冝也等也推之他回切擠也甌擲甌瓦器擲投也音直炙切演音衍吭胡郎切咽也杜姥宅莫補切地名朱雀航胡剛切或作桁結纓於盈切冠系也格殺古陌切擊也幡㦸上孚袁切幟也下几劇切有枝兵也髙鄣之亮切鄣蔽也與障通幢宅江切旛幢袴褶上口護切下音習騎服也阬穽上丘庚切郭璞云阬塹也下才性切䧟穽也蠡器落弋切蚌屬可以爲飲器齊紀九通鑑卷一百四十三起上章執除即庚辰凡一年東昬侯下永元二年僵仆上居良切僨也下芳遇切頓也說音稅誘也丗􅋆匹沼切爲質職利切結信也應和胡卧切伯昕許斤切驃騎毗召切勁疾皃或作票管籥弋灼切管籥搏鍵器也嬰城於盈切繞也繞城以自守涪音浮應劭曰涪水出廣漢南入漢按晉地理志云劉備據蜀分廣漢涪縣屬梓橦至西魏改爲涪城惰徒卧切懈也小峴胡典切山名在壽州恌他彫切典籖七廉切官名沈佚之沈式任切姓也佚之其名音逸憕持陵切八掆輿掆居郎切又居浪切字林捎掆舁也斷遏上徒玩切絶也下烏葛切遮也止也荒傖鋤耕切亂皃爨取亂切炊爨舫府望切兩船曰舫瑩烏定切壘魯水切軍壁查硎上鋤加切下奚經切地名荻走歷切草創葦屬岀盪徒莽切滌盪也箸遲倨切起箸採石倉宰切在丹陽蕪湖即牛渚磯也昧旦莫佩切未明也開桁胡剛切本作航忿敷問切又敷粉也怒也蠏浦上胡買切下滂古切澤名内讀曰納鰌籃魚籠也上七由切下盧甘切嬖倖博計切賤而得倖也咺之呼逺切倀子仲良切又抽良切狂也一曰倀倀無見皃詆訶丁禮切訾毀而譏訶也吐谷渾谷余玉切渾胡昆切冠軍古玩切冠者加於首上冠軍言在諸軍之上挽之武逺切說文引之也或作輓趣逡須切嚮也俘芳無切說文軍所獲也春秋傳以爲俘馘一曰取也相枕職任切卧首相據也綺麗夫倚切綺繒之羙麗者蓮華呼瓜切芙蕖訂岀丁定切平議而岀雉頭丈几切以雉頭毛爲之晉武帝焚雉頭裘鸖氅齒兩切鸖之羽毛也作服以象之故曰鸖氅白鷺縗雙佳切鷺首也伊霍虚郭切伊尹霍光曜甫弋笑切憺徒敢切又徒濫切口回切晷刻矩鮪切日景之分刻也恬素徒廉切恬靖也素淡也城隍胡光切說文城池也有水曰池無水曰隍器械胡介切械者器之緫名舟艦胡黤切禦敵船四方施板以禦矢狀如牢艘蘇遭切船緫名葺七入切𥙷也兩函胡䜛切匵也闡丈昌善切忱是壬切狂悖蒲没切狂亂藉以慈夜切依藉也斃毗祭切死也汶陽音問魯之郡邑纂嚴祖管切纂集兵嚴夬古賣切藹於蓋切移檄胡狄切符檄古者以竹簡爲書長尺二寸亶多旱切黄鉞王伐切大斧以黄金爲飾捷疾葉切尅也勝也說文軍獲得也碌碌音禄老子曰碌碌如王落落如石言玉之混石不可一二數叡以芮切懦乃卧切又乃亂切弱也絢許縣切惔徙敢切澮古外切郢以井切州名舉烽敷容切邊方備警急作髙土臺臺上作桔臯頭有兠鍪積薪草置其中常低之有冦即燃火舉之以相告曰烽篹祖𬋩切撤直列切去也通作徹枯萎邕危切草木枯死也禆販上頻彌切下方願切副助而負販也埭徒耐切以土堨水也嗔昌眞切怒也縛菰上伏約切束也下攻乎切說文雕苽一名蔣也募莫故切廣求也麝幐中幐徒登切麝臍囊中也右率朔律切官名柈中蒲官切說文承槃也或作槃瘡𥘉莊切傷也或作創瞑莫定切夕也潰胡對切逃散也鼔譟先到切羣呼也流腫之隴切釋名曰腫鍾也寒熱氣鍾聚也幅巾方六切不加冠㥽但以一幅飾首而巳祥禫徒感切除服祭名灄陽所沙切水名在七陽西陽瞥然普蔑切暫過湯鑊胡郭切鼎大而無足惻愴上察色切下楚亮切痛也傷也惓惓逵貟切謹也惋切烏貫切驚歎而切直也狼狽博蓋切獸名狼屬生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽恟懼許容切又許拱切擾恐也湓城蒲奔切湓水之城在廬江尋陽瑀王矩切匈匈許容切諠擾之意魚服音腹巴東邑栗磾丁奚切仙琕蒲眠切道怵敕律切道士墩都昆切平地有堆也覘之丑艶切窺也又丑廉切柵測革切編立木也鐡纒矟色角切長矛也通作槊突陳直覲切與陣同中卿竹仲切傷也踧踖上子六切下子石切㳟謹皃鯁直古荇切正直之臣如骨鯁也秣陵莫葛切丹陽邑窮蹙子六切迫也釡中奉甫切鍑屬諳烏含切悉也抗峙直里切相峻峙也仍梗古杏切梗阻掆古郎切舉也猒勝一渉切廣雅云厭鎭也鎧胄鎧可亥切甲也胄謂兠鍪日調徒弔切計調大桁胡剛切本作航雕鏤郎豆切雕刻也牋將先切表識書也一曰編也挼奴禾切手相切摩也徇辭俊切行示也顗語豈切餐音孫餔也又干安切躊躇上直留切下直於切廣雅云躊躇猶豫也檻送檻户黤切載囚車也字或從車射鉤士食亦切下古侯切乾時之役管仲射齊威公中帶鉤斬袪起魚切袪衣袂也春秋左傳晉侯使寺人披伐蒲重耳踰垣而走披斬其袪飼祥吏切養也瀏陽力乆切長沙邑資治通鑑釋文卷第十五
