  text: 資治通鑑釋文卷第十九
  hash: sha256:29ea28872cbb7622c9e65faa691336409eb2c2eeb2d3d4171ad3984d37a8f0c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0016_SBCK_019-1a}
body:
  text: 右宣義郎監成都府糧料院史隋紀一通鑑卷一百七十七起屠維作噩盡重光大淵獻即巳酉全辛亥凡三年髙祖文皇帝上之上帝姓楊諱堅洪農華隂人周大象二年封隋王明年受周禪建元開皇時陳太建十三年也至九年滅陳遂爲正統開皇九年塞悉則切幟式志切又昌志切旌旗之屬譟先到切羣呼也蜂蠆丑邁切毒蟲驃騎毗召切或作票勁疾皃摩訶上眉波切下虎何切恪苦各切酤攻乎切通作沽俘芳無切軍所獲也自劾紇則切自狀其過慰勞郞到切安慰而勞勉之也蔣元遜蔣子兩切姓也元遜其名耆闍時遮切寺名瑱他甸切怯懦上去劫切畏也下乃卧切弱也又乃亂切怏怏倚兩切志不滿也壘塹上魯水切軍壁也下七豔切坑也柵測革切籬柵也編立木爲之挫祖卧切摧也景從於丙切與影通羅睺户鉤切又音后㳂流與專切縁水而下也欻然許勿切暴起也燕然因肩切山名在匈奴速邪烏地中行陳上胡郎切下直刃切行列軍陣也貟明貟王問切姓也窘渠殞切急迫也趣逡須切響也潰胡對切亂也縢徒登切說文緘也緘謂束篋也募莫故切廣求也部分北問切朱雀航寒剛切舟也或作桁榻吐盍切牀也貴嬪毗賔切婦也周禮有九嬪歔欷上朽居切下香衣切又許旣切歎息皃挺刃待鼎切持也降胡江切服也箋將先切說文表識書也妲己當割切有蘇氏女商紂妃衰服倉回切說文服衣六寸博四寸直心或作號哭乎刀切呼也亦哭也詩曰或號或呼藉草慈夜切或作耤唁魚戰切弔生也一襲似入切按國語云一稱賈逵按禮記𫀆必有表不單衣必有裳謂之一稱杜預云衣單複具云稱也郢以井切州名鎻蘇果切銀鐺也巴蜑徒旱切南方夷也艦戸黤切戰船四方施板以禦矢其狀如牢僅渠吝切說文材能也偲息兹切奉公埭待戴切以土遏水曰埭字或從石酒酣胡甘切徇辭峻切徇者行示也鄔居業鄔安古切姓也鄔郡太守司馬牟之役因以爲氏洗氏先禮切姓也洸古黄烏光二切璒都滕切夐休正切瓌古回切墾康很切耕也治也纍纍力追切說文綴得理也驪山音離古驪戎國在新豐南凱入可亥切謂奏凱樂而入也療力照切療治憤慨上房吻切下口漑切滿也怒也給復方六切除其賦役也可汗河干切戎首稱驍將堅堯切勇也健也從容七恭切猶休燕也焉敢於䖍切瑳七何切又七可切瓘古玩切昵尼質切近也或作暱慘七感切毒也苛酷上胡歌切下苦沃切苛細也酷虚也醒桑經切又思挺切醉解也演音衍所量力張切度量禆將頻彌切將之偏副也郷導許亮切郷趣也導引也送𣢾苦管切誠𣢾彪𥙷休切王氣于放切太元曰五行用事者王叡音脊澡子皓切洗也浴也戢阻立切止也歛也晃戸廣切瑩縈定切瑩飾也排詆詆丁禮切毀訾也党項音黨漢西羌别種古析支地也蹲狗徂尊切坐狗也封禪時戰切積士増山曰封爲墠祭地曰禪譯羊益切妥他果切龜兹音丘慈西域胡國邳公貧悲切其地在薛沮壊材汝切止壞也荔郎計切岷州武巾切因山以爲名疫營隻切說文云民皆疾也闔家胡臘切閉也十年楷苦駭切華陽胡化切很胡懇切很戻也賃女禁切雇賃贓兹郎切受賕曰贓賄呼罪切財賄猗氏於冝切河東邑忿敷粉切又敷問切怒也遺之弋季切贈也捶止蘂切擊也愍眉殞切悲也憐也訛言五禾切謬也或作譌婺州亡遇切隋所置以當天文婺女之分爲名元懀烏外切儂奴冬切我也吳語浙江之列切說文江水東至㑹稽山隂爲浙江舸賈我切大船也方言南楚江湖謂之舸閩越音旻按說文曰閩東越蛇種也故字從虫馳傳張戀切車傳海島都皓切海中有山曰島譴詰戰切謫問也畨禺上蒲禾切又音槃下魚容切又音隅南海邑逗留上音豆下力救切或作留逗留謂不進也繖蘇旱切蓋也篋苦協切箱篋俚獠上良止切南夷種名下魯皓切西南夷謂之獠十一年瓉七賛切又在旱切呪詛上職救切或作祝下莊助切或作樝鴆直禁切毒鳥以其羽毛歷飲食即殺人隋紀二通鑑卷一百七十八起元􅘬困敦盡屠維協洽即壬子至已未凡八年髙祖文皇帝上之下開皇十二年恚於避切怒恨也愷可亥切通籍秦昔切通朝注之籍踳駁上尺允切下北角切相乖舛也陵轢狼狄切如車所踐也府藏才浪切物所畜也廡文甫切堂下周屋也十三年堙谷於眞切塞也仆芳遇切說文頓也又敷救切􅌔古限切圗識楚譛切符命之書識驗也昶丑兩切都藍魯甘切突厥可汗號晟承正切遂迦居伽切又音加馴詳遵切順也十四年泫然胡畎切廨古隘切公舎焯之若切輿櫬𥘉覲切棺也春秋傳士輿櫬勞徠上盧到切下盧代切謂慰勉而招延之琮徂宗切邙山莫郎切又武方切北山名在河南洛陽糶他弔切出糓也昉甫爾切巫蠱公户切巫者執左道以亂政而惑人蠱惑也指體即藥毒害人是若行符厭俗之爲魅故曰巫蠱禨祥居依切亦祥也或作僟劭實照切捃摭上居運切下之石切拾也盥手古玩切說文澡手也從臼水臨皿也十五年柴燎力弔切爾雅云祭天曰燔柴謂天髙不可逹故燔柴以祭之庶髙煙上通也十六年筠于倫切嶷魚其切又魚力切恪苦各切煚乆永切十七年酋帥自秋切長也爨震㸑七亂切姓也震其名䍧柯上慈郎切下古何切䍧柯者係船􅍻也楚伐夜郞至且蘭椓船於岸因以名其地蜻蛉川上倉經切又音精下郎丁切地名西洱河而止切又仍吏切河名瘴之亮切癘也更相工衡切互也脅虚業切以威力相恐也懔懔力稔切懼皃固爭側迸切止也矯言舉夭切許也挂古賣切俗作掛亶多旱切緋褌古渾切䙝衣啜羮昌悅切甞也訶之虎何切叱也與呵同彧於六切麥􅲄蘇骨切麥屑也一作鸚鵡上於莖切下罔母切能言鳥也鴻臚凌如切鴻聲也臚傳也所以傳聲賛導丸賔樗抽居切摴蒱戯也博物志曰老子入胡作樗蒱幾死巨依切近也屈突通突陁骨切屈突複姓通其名瞋目昌眞切張目也叱之昌栗切訶也任俠上汝鴆切下胡頰切任謂任使其氣力俠之言挾也以權力挾輔人也括古奪切結也棒部項切說文梲也謂木杖敺一口切捶擊也抄掠上楚交切又初教切下離灼切略奪也伺知相吏切伺候也泄先列切漏也眺他弔切視也髙麗音離十八年靺鞨上亡逹切下胡葛切北土畨人猫鬼眉鑣切妖邪之鬼蠹政都故切如蟲食木爲蠹也水潦魯皓切雨水大皃詆讕上丁禮切毀訾也下落干切語言也十九年舉烽敷容切燧候表也邊有警則舉大詰去吉切問也族蠡落戈切山名又音禮鹿角如字陣名猶春秋魚麗之陣尔貴不俯九切跪去委切䠆跪也毓德余六切養也長也推覈下革切實也㢸古弼字瞑然莫定切閉目焉知於䖍切何知也鞠之居六切推窮也掘其月切搰也隋紀三通鑑卷一百七十九起上章涒灘盡昭陽大淵獻即庚申至癸亥凡四年髙祖文皇帝中開皇二十年敦煌音屯皇郡名應劭曰敦大煌盛也更葉工衡切改也戮力音六說文并力也嵆康與字林力幽切怖普故切惶懼也湛直深切又音徒减切蜀鎧可亥切甲也𦵔醬臻魚切麋鹿爲𦵔虀𦵔之稱也良娣特計切按漢書太子有妃有良娣有孺子凡三等饌雛戀切具食也縵綵莫半切說文曰繒無文也縑堅嫌切并絲繒也投杼丈吕切機之持緯者杯勺上晡枚切下實若切挹酌器忿然撫吻切怒皃晛地伐胡典切耐奴代切忍也嗚咽於結切聲塞也揣初委切度也昵尼質切近也或作䁥阿𡡉莫婆切猒勝一葉切猒鎭也草褥儒欲切藉也當之王浪切厎也左衛率所類切官名通作帥翌日與職切明日也懟直類切怨也髯汝塩切頰須也肘陟桞切臂節也孽子魚列切庶子也鍜鋉上丁貫切鍜治也下郞甸切煉鑠也藥藏才浪切庫藏貯展吕切積也飼馬祥吏切飼養也琱都聊切說文曰琢文也螫手施隻切蟲行毒也榆林容朱切縣名隋置勝州兼置此縣其地有榆溪塞即蒙恬爲秦侵胡闢地數千里累石爲城植榆爲塞是也閻毗上余廉切姓也毗其名房脂切撻他逹切捶也䙝慢先列切䙝狎而侮慢也娬媚娘娬罔甫切或作嫵曲名曏許亮切或作向鄒文騰鄒側鳩切姓也文騰其名慘然七感切悽慘㩧殺弼角切博雅云擊也癲鬼多年切狂也苛酷上音何下枯沃切苛細而酷虐也翹足祁堯切舉也企也伽求迦切縲紲上力追切下私列切縲䌇絏攣也所以拘罪人也枷鎻上居牙切囚械也下蘇果切銀鐺也刑厝倉故切或作措說文置也仁夀元年炫黃絹切山獠魚皓切蠻獠盎烏浪切二年磧南七迹切沙土曰漠即今磧也怙侯古切說文恃也噲之古賣切嬖人愽計切賤而得幸也馳傳張戀切車傳二溢米弋質切米二十四分升之一也脯鮓上方矩切乾肉爲晡下側夏切釋名曰鮓𦵔也竹筩徒東切說文斷竹也襆逢玉切說文裳削幅謂之襆裹古火切說文躔也劭實照切紿徒在切誑也識之職吏切說文誌也稱是昌孕切等也縛符㩴切擊也釘心丁定切釘篸也杻械上敕九切下胡介切桎梏也圗䜟楚譛切符命之書䜟驗也邸丁禮切蒼頡篇曰邸舎也磑五對切䃺也公輸班作磑碾泥展切碾也忤五故切逆也撓女教切曲也搢紳即刃切搢笏而垂紳也夏零郎丁切零兩冬澍音注時雨三年颺余章切簸颺又餘亮切糠苦剛切穀皮粃𥙷履切說文不成粟也咽伊甸切愽雅云吞也狼籍秦音切解見陳紀七􅊡粥上諸延切或作饘說文糜也周謂之饘朱謂之餬下之六切瓊渠營切囮夷周切捕鳥媒也媒謨盃切說文云謀也紇單貴紇下没切單時戰切代比複姓貴其名隋紀四通鑑卷一百八十起閼逢困敦盡強圉單閼即甲子至丁卯凡四年髙祖文皇帝下仁壽四年章仇太翼章仇複姓齊公族姜姓之後本章弇因避仇遂加仇字爲氏太翼其名訣古穴切别也嗇所力切說文愛濇也澣胡管切濯幹或作浣殖丞職切滋殖晡奔謨切日加申時縊於賜切說文經也劾胡得切法有罪也怏怏於亮切志不滿也器械胡介切械者器之緫名鷄雛崇芻切鷄子也頍丘婢切倜儻上他歷切下他莽切倜儻卓異也熒惑上户扄切下胡國切熒惑星名南方主夏爲禮視禮虧失不行夏令則熒惑逆行鄴魚劫切魏郡之邑絓古賣切絓者罥絓也嵐盧含切州名在太原因竒嵐山爲名有渥洼池岀良馬亦山氣也井陘音刑常山邑亦山名在縣南綦良綦渠之切姓也良其名滏口奉甫切滏水出鄴縣聃都甘切羃離音覔婦人所戴詭過委切詭許也粹與薛同菩蕯上蓬逋切下桑葛切暠古老切驍勇堅堯切健也襲似入切春秋釋例掩其不備曰襲商賈音古行賣曰商坐販曰賈艘蘇刀切船緫名銜枚音媒以止讙囂周官有銜枚氏枚狀如箸横銜之遲明丈二切待也言事畢然後天明明遲於事故曰遲明勣則歷切大蒲結切又頻必切鐡勒别種名薛延陀徒何切鐡勤別種名歌楞魯登切鐵勒契苾之屬字也咥丑二切又徒結切鐡勒薛延陀之屬焉耆於䖍切西域國名二年鹵簿裴古切車駕次第爲鹵薄以稱昌孕切等也氅毦仍吏切􅌁羽毛飾也氅毛齒兩切鶴羽珂苦何切馬腦幘側革切髪有巾曰幘袴褶席入切騎服瑾渠遴切厭之一涉切鎮也診章刃切說文視也餌藥仍吏切服餌倓徒甘切又徒濫切徒坎切侗徒紅切侑于救切窖居効切地藏也或作窌黿愚袁切大鼈也鼉徒何切說文水蟲也似蜥蜴而長大鼈必列切甲介蟲鯨魚渠京切海大魚也雄曰鯨雌曰鯢常以五月生子於岸八月導而還海鼓浪成雷噴沐成雨水族畏之噴普悶切吐氣也歘然許勿切暴起鼇牛刀切海中大鼈幻人胡辨切吞刀吐次之術三年解辮上舉蟹切判也下婢典切交也謂判散其辮髪尔流求國流求國居海島其王姓歡斯氏名渴刺兠不知其由來有國丗數也彼土人呼之爲可老羊安輯音集又七入切爾雅曰輯和也殿最上丁練切下祖外切下功曰殿上功曰最二祧他彫切逺祖廟爲祧二祧謂文武廟也辯音辯本字作辯北齊時里俗多作僞字始以巧言爲辯至此又訛其字以巩易巧奚霫息入切東北夷名薊古詣切燕國之邑幟昌志切又式志切旌旗之屬鉦諸盈切鐃也似鈴輜重上側持切載衣車也下直用切載物車也幹古案切築垣板也衣之於旣切服之也樓櫓音魯城上守禦望樓也說文櫓露也上無覆屋稽顙上康禮切下昔曩切額至地也張掖羊益切郡名應劭曰張國臂掖故曰張掖鄯善時戰切西域國名汎孚𣑽切說又浮皃𪷟汜音蒙似水名崑崙上公渾切下盧昆切山名隋紀五通鑑卷一百八十一起著雍執徐盡元􅘬涒灘即戊辰至壬申凡五年煬皇帝上之下大業四年沁水千浸切河内邑水出上黨羊頭山匍匐上蓬逋切手行也或作扶下鼻墨切伏地也或作伏矍然厥縛切遽也倭烏禾切女王國名在東海中無恙弋亮切憂也病也槍車千羊切或作鋼錐上居郎切下朱惟切以堅鐡爲錐也矰咨騰切鈴郎丁切似鍾而小槌傳追切擊也或作椎赤土南海中逺國矚朱欲切視之甚也古限切謇之九件切闐咽上徒賢切下一結切塞也灋古法字仲錡渠綺切又魚綺切遏阿葛切遮也止也詡况羽切左道禮記曰執左道以亂衆殺無赦鄭氏注云左道若巫蠱也厭勝一渉切鎭也杲古老切虎賁音奔猛士也如虎之賁獸庾質庾以主切姓也其先堯時爲掌庾大夫後因氏焉質其名也澆河堅堯切郡名隋所置晉時吐谷渾主阿豺築澆河城即此舶薄陌切蠻夷汎海丹曰舶那邪迦邪以遮切迦求伽切赤土主之子也右翊衞翊與職切官名五年鐡义𥘉加切以鐡爲器其形岐頭鉤音荅以鐡爲餉具也􅗋刃祖管切廣雅曰鋌也一曰小矟又祖筭切浩舋川上盲誥下音門浩舋水岀西塞外東至吾入湟水㗖徒濫切如以食與人也罽居例切毛布若今毼喧譟先到切羣呼也且末子余切西域胡國讁陟革切冦鈔初交切又楚教切㓂掠奪取也晦㝠莫徑切晦冥皆暗也餒弩罪切飢也伺相吏切伺候也詰去吉切問也咄吉當没切突厥啓民之子賀若弼賀若複姓弼其名若人者切六年酋自秋切長也紿徒亥切欺也誑也黠下八切桀黠便辟便毗連切辟讃曰僻便者謂便人所好辟者謂避人所惡琮藏宗切皛胡子切嬪御符眞切婦也周禮有九嬪九御更相工衡切互也酒酣胡甘切應劭曰洽也稜盧登切柵測革切城柵編立木爲之也承間居莧切間隙也譴去戰切讁問也譎古穴切詐也脯匪父切乾肉爲脯脅虛業切迫也七年蛆千余切蟲在肉中鑹取亂切小矟也亦作􅗋幔莫半切幕也漂紕招切浮也慰勞郎到切安慰而勞勉也膳時戰切具食也眩縈絹切糴亭歷切市榖也共推通回切進也糇糧胡溝切乾食也剽掠匹妙切剽劫掠取也豆子䴚各黨切或從酉地名瘡痍上𥘉莊切下以脂切皆傷也鄃羊朱切地名在涿郡又音輸清河邑蓨音條渤海邑蜂起敷容切如蜂之起言其衆也八年曷娑那娑素何切西突厥可汗之號克不俯九切鏤方龍珠切又郞豆切樂浪邑長岑鋤針切帶方邑元莵同都切郡名古畨眞國地扶餘夫餘地名在長城之北槀離國王子東明都其地號杖餘國朝鮮相然切樂浪邑周封箕子地沃沮上烏酷切下千余切東沃沮國在髙勾麗蓋馬大山之東樂浪上音洛下音狼郡名古朝鮮國黏蟬服䖍曰蟬音提漢爲縣屬樂浪肅愼並如字其國在不咸山天餘東北千餘里周成王旣伐東夷肅愼來賀即此東暆應劭曰音移漢爲縣屬樂浪駱驛上盧各切下夷石切言不絶也桑乾音干即馬邑也屬鴈門隊徒對切又音遂鎧胄上可亥切甲也下直祐切兠鍪也纓於盈切冠系也旗旛孚袁切說文幅胡也謂旗幅之下垂者烽候敷容切燧候表也邊有警則舉火𣢾苦管切意有所欲也潦魯皓切雨水大皃靺鞨上亡逹切下胡葛切畨人出北土頞音遏歕普悶切歕氣也又普門切愷可亥切懾之涉切怖也亦作慴浿水普大切水岀樂浪郡西至増地入海漢時置浿水縣碣石渠列切說文特立之石也在髙麗界秦築長城起自碣石即此非禹貢碣石山也矟所角切矛屬或作槊掘其月切搰也乙支文德乙支複姓文德其名方陳直刃切與陣同他類此覘丑廉切又丑豔切闚視也武厲邏郎佐切本髙麗地隋伐之置遼東郡謗訕所諌切謗謂毀訾也蒼頡篇云訕非也隋紀六通鑑卷一百八十二起昭陽作噩盡旃蒙大淵獻即癸酉至乙亥凡三年煬皇帝中大業九年涿竹角切范陽邑募莫故切廣求也驍果堅堯切驍健而果敢也貯展吕切積也鼷䑕胡雞切小䑕也一曰有螫毒者或謂之甘䑕郝孝德郝呼各切姓也孝德其名閺郷無分切在洪農湖縣創初莊切傷也濰水以追切水出琅邪箕屋山東入海擲直炙切投也揭居謁切髙舉也又蹇列也潰胡對切逃散也劓魚器切刖鼻也趣逡須切嚮也橦雲梯橦傳江切梯天黎切衝天木階也垂絙古登切大索也喑嗚上於今切又於含切下音烏懷怒氣也咄嗟當没切咄嗟發怒聲紊音問亂也逗留音豆溜謂不進也帆布符咸切舟上幔所以汎風褘許歸切踊躍上尹竦切跳踊也下弋灼切距躍咽喉因蓮切字或從肉邙山莫郎切又武方切比山名也山在河南洛陽洸古黃切師耽丁含切以徇徐峻切行示也丗咢五各切羅睺胡溝切慈磵道古晏切地名崤澠上胡交切下彌兖切崤山澠也皆在洪農麤聦徂切心不精也案堵音覩應劭曰案按次第也堵如墻堵不遷動也忷懼計容切又許拱切擾恐也覘偵上丑豔切下丑正切窺視也乘傳張戀切符傳疥癬上居拜切下息淺切瘡之屬符契詰計切符合而契約也瀍水澄延切水岀河南北山入于河中竹仲切流矢飛矢曰流矢餘杭杭音行伍之行呉興邑揣初委切度也九錫車馬衣服樂器朱戸納陛虎賁斧鉞弓矢秬鬯彧乙六切紿徒亥切誑也華隂胡化切洪農色郷導許亮切趣郷而引導也潼關徒紅切在華隂本名衝關河自龍門南流衝激華山東故以爲名左傳所謂桃林塞也縻之忙皮切繫也讀若羈縻之縻陴符支切城上女垣也葭蘆戍上音家下落胡切地名磔陟格切裂也臠力兖切臠切朝請才性切倜儻上他歷切下他莽切倜儻卓異也顗魚豈切元淑殊六切天竺張六切而域胡名即身毒國也所謂浮屠胡從容七㳟切猶休燕也下邽音圭天水邑古邽戎地諠許元切亦作讙譁呼瓜切諠也蝟毛于貴切一作彚說文蟲似豪豬而小爾雅曰彚毛刺也梟堅堯切不孝鳥也日至捕梟磔之桑門並如字桑門即沙門也袁宏曰沙門漢言息也蓋息意去欲而歸于無爲也柵測革切籬栅編立木爲之衂女六切敗衂下邳符悲切葛嶧山在西古嶧陽也顥胡老切十年禡祭莫駕切師旅所止地祭名釁鼔許愼切應劭云覺祭也說文舋血祭也司馬法曰血于鼙鼔者神戎器也顔師古曰凡殺牲以血祭者皆名爲舋臣瓉以爲皆無祭事非也今釁鼔謂殺之以塗釁於鼔尔春秋左傳執事不以臣釁鼔者即其議昌慮音廬東海邑迦論居伽切閫外苦本切門橛之外也邯鄲音寒丹廣平邑張晏曰邯鄲山在東城下飛黄良馬名古賦云飛黄服皂廏居又切馬舎也炫胡絢切噉之徒濫切亦作㗖詰朝去吉切平旦也林慮凌如切本曰隆慮漢時避殤帝名改曰林慮河内邑其地有隆慮山在縣北盱眙音吁怡臨淮邑堡博抱切墇也亦作堢蹲狗祖尊切山名黜陟上丑律切貶也下竹力切升也十一年蒱博薄胡切樗蒱戯也複方六切重也猥烏賄切猶濫也褾俾小切或從表也村塢烏古切通俗文曰營居曰塢筠于倫切吝嗇上良刃切下所力切慳也愛也瞿曇上權俱切下徒含切郕公時征切地名春秋時魯孟氏邑伽陁上求迦切下徒何切鴆死直禁切鴆毒鳥以羽毛歷飲食即殺人邊徼吉弔切塞徼崞音郭鴈門邑撤直列切去也通作徹腫之隴切釋名曰腫鍾也寒熱氣鍾聚也徼幸工堯切通作僥挫祖卧切摧也瑀主矩切努力奴古切間使居莧切間諜者忻口許斤切在忻州曏日許亮切曩時也剛鯁古杏切說文鯁魚骨也剛直者如食骨留咽中爲鯁悖蒲没切又蒲昧切狂悖艘蘇力切船之緫名闞稜苦濫切姓也春秋有齊大夫闞止噍類如淳曰噍音祚笑切無復有活而噍食也青州俗呼無孑遺爲無噍類隋紀七通鑑卷一百八十三起柔兆困敦盡強圉赤奮若即丙字至丁丑凡一年有竒煬皇帝下大業十二年箏瑟上側莖切樂器秦蒙恬所造也下色櫛切庖犧所作弦樂也悸其季切心動也甄翟兒甄側隣切姓也翟兒其名翟直格切又亭歷切泥水詳里切水名在河南成臯批普迷切擊也府藏才浪切物所畜也鄱陽音婆郡名鄱水所岀入湖彭蠡音禮澤名按尚書䟽云彭蠡是江漢合處在揚州之西界畨禺上蒲官切下魚容切南海邑匝作荅切周也沸方未切涫也郇須倫切地名周時武王子所封之國很胡懇切很戾也昵之尼質切近也或作暱辮髮婢典切交髪也圈求逺切養獸之所擐甲胡慣切貫也春秋傳擐甲執兵累重上力瑞切下直用切謂妻子輜重謳烏侯切歌也絢許縣切劾胡得切法有罪也詆丁禮切毀訾剥北角切刻剥也藁古老切稈也牣而振切滿也豆子䴚各黨切或從酉地名暠古老切㳟皇帝上義寧元年姥滿𥙷切女老稱髙郵音尤臨淮邑任俠上汝鴆切下檄頰切任謂任使其氣力俠之言挾也以權力挾輔人也泄先列切漏也僵居良切仆也馳檄胡狄切符檄闇與暗同後殿丁練切軍後曰殿襁負居兩切本作襁負兒衣相屬之欲切相聮屬也德叡以芮切崱士力切器械胡介切械者器之緫名邴元眞邴兵永切姓也元眞其名德韜他刀切桑乾音干漢時代郡之邑後魏改爲郡可汗河下切戎酋稱狼頭纛徒到切葆幢之屬突厥夲匈奴別種爲憐所破㓕有一兒十歳兵人見小斷其手足棄澤中有牝狼以肉餌之及長與狼交合遂生十男其一最賢者爲君長於牙門建狼頭纛故劉武周以此遺突厥又徒沃切沮氏臻魚切姓也黃帝時有沮誦爲史官乘閒居莧切間隙之間爲質職利切結信也僑居巨嬌切寄也客也瑗爲眷切羅睺戸溝切枹罕音膚其字從木古罕羌侯邑酋自秋切長也澆河堅堯切郡名隋所置古西羌地㗖徒濫切齩金五巧切擊柝闥各切夜行所擊者易曰重門擊柝也金墉餘封切城名在河南洛陽西北角三國魏明帝所築汲綆古杏切井索也爨七亂切炊爨幕府幕府者以軍幕爲義軍旅無常居止故以張幕言之歔欷上音虛下許旣切歎息也嗚咽一結切悲嗚而哽咽也誑之居况切欺也鞠獄居六切窮理罪人也琮徂宗切猗氏乙竒切河東邑古猗頓城斌廉悲巾切并力卑政切兼也並也圗䜟楚譛切符命之書䜟驗也酒酣胡甘切應劭曰洽也從容七㳟切猶休燕也禆頻彌切偏助也圗籙龍玉切籍也士彠欝縳切又屋郭切胡陌切拯舊說無切語音蒸之上聲忷忷許容切喧擾之意嬰城於盈切繞城以自守攘𬒮彌蔽切奮䄂也詬許候切詬罵涇陽堅靈切涇水之陽舋忤慎切隙舋偕行居諧切俱行也隋紀八通鑑卷一百八十四起強圉赤奮若即丁丑凡六月不滿一年㳟皇帝下義寧元年幟式志切又昌志切旌旗之屬詰去古切問也上邽音圭天水邑應劭曰史記古邽戎邑也謩蒙晡切府掾俞絹切官屬敦煌音屯皇郡名應劭曰敦大煌盛也嶠渠廟切鞘利仙妙切貰之式制切賖也郗士陵郗抽遲切姓也霽子計切侑尤救切派流普拜切水分流也殪一計切說文死也折簡折簡猶言片𥿄也蚌鷸上部項切蛤也下允律切知天將雨鳥也屬籍上殊王切附也下秦昔切簿籍也謂所附宗籍安輯音集又七入切爾雅曰輯和也盟津並如字即孟津也孟者河北地名於其地置津謂之孟津一說武王伐紂八百諸侯於此盟故曰盟津河内河陽縣是也菽式竹切說文豆也或作未象豆生之形軌居洧切珍知鄰切贇卑民切鞠氏居六切姓也磔陟格切裂也噉徒濫切說文食也或作㗖焉用於䖍切張掖羊益切郡名應劭曰張國臂掖故曰張掖咫尺掌氐切八寸曰咫十寸曰尺柵測革切編立木爲之恚於避切怒也曝薄報切曬也挑之徒了切擿嬈敵求戰瓌古回切郃陽曷閣切馮翊邑占莘國其女太姒爲周文王后詩所謂在郃之陽是也演音衍拊方武切說文楯也鉅鹿其吕切國名應劭曰鹿林之大者也旁午一從一横爲旁午猶言交横也遞相大切更易也囂牛刀切諠也洹水于元切水名􅏅齊魯間㳂流余􅌹切縁水而下也元璹殊六切槁葉苦浩切枯也離沮將䂊切喪也中潬徒早切河陽南有中潬城門閥房越切閥閱季珣相倫切籀直又切典籖七廉切官名蒲坂甫逺切河東邑有歷山舜所耕也有雷首山夷齊居其陽所謂首陽山鄠侯古切京兆邑古有扈國別墅承與切田盧也令狐德棻令狐複姓德棻其名令音零棻扶分切盩厔上張流切下陟栗切邑名山曲曰盩水曲曰屋因山水之曲以爲名璡即刃切壘魯水切軍壁鄱陽音婆郡名鄱水入西湖瓉才賛切銑蘇典切潰胡對切逃散也燔燎上音煩下力弔切天髙不可逹故燔柴以祭之庶髙煙上通也爾雅曰祭天曰燔柴訶之虎何切叱也亦作呵愕然逆各切驚也貪婪盧含切亦作惏春秋左傳曰貪婪無厭苛酷上音何下苦沃切煩苛酷虐也鄢陵顔師古鄢音偃潁川邑春秋鄭伯克段于鄢即此逡廵七倫切逡廵行不進皃愎弼力切很也螫手施隻切蟲行毒也腕踣鼻墨切僵也吼許候切牛鳴傅創上方遇切下𥘉莊切以手著其所傷之處黃鉞王伐切大斧也以黄
