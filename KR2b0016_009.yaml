body:
  text: 右宣義郎監成都府糧料院史照晉紀一通鑑卷七十九起旃蒙作噩盡元黓執徐即乙酉至壬辰凡八年丗祖武皇帝上之上帝姓司馬諱炎懿之孫昭之子丗執魏政魏咸熙元年昭進爵為晉王炎為丗子明年昭薨炎嗣晉王位尋受魏禪改元泰始國號晉追諡懿宣帝昭文帝師景帝泰始元年璆渠幽切彧於六切濡須音儒水名在淮南歷陽孫權築塢於此屬揚州自此以下凡言郡邑州名悉以晉地理志它皆放此票騎毗召切徑疾貌闡齒善切靚疾正切又疾郢切金墉城音容在河南洛陽西北角屬司州魏明帝所築歔欷上休居切下休既切歎息也鄴魚怯切魏郡之邑屬司州胄直又切東莞莞音官郡名屬徐州肜以中切群從才用切謂從父從祖及從昆弟沈持林切有差𥘉加切有等差也顗語豈切質任上陟利切信也下汝鴆切徐也矯舉夭切正曲也通作橋絲紖直忍以忍二切牛系也或作絼恪克各切謹也俊子峻切二年王氣于放切太元曰五行用事者王鴻臚力居切漢景帝改秦典客為大鴻臚應邵曰郊廟行禮贊九賔鳩聲而臚傳之也沈醉持林切沈湎於酒也下沈痛同輿羊諸切舁車也咋齧上側革切本作齰下五結切皆噬也凱可亥切徼幸堅堯切通作僥衰絰上千回切杜預曰衰在胸前下徒結切喪首戴也苴千餘切麻之有子者喪禮服苴麻取其粗也衣錦於既切相解舉蟹切判也省息并切察也審也釐陵之切理也革而正之惡烏故切猝且沒切倉猝也泝流桑故切逆流而上曰泝塉確上秦昔切塉薄下克覺切磽確謡餘招切爾雅曰徒歌謂之謡比至必寐切譟先到切羣呼也還都還讀曰旋巫覡胡狄切在男曰覡在女曰巫能齋肅事神明也璽紱上想氏切印也下分忽切印之組也三年喜許記切劾胡得切法有罪繆眉救切戾也犍為渠焉切郡名屬益州洗馬東宫官屬秩比謁者國語曰勾踐親為夫差先馬先猶前馬也私見切樓觀樓重屋也觀古玩切闕也華核華胡化切姓也核夏革切厝倉故切置也通作措交趾音止郡名按杜佑云南方夷人其足大脂開廣若並足而立其指交故以為名屬交州卒有且沒切猝急也烽燧上孚逢切下似醉切邊有警急則舉火夜曰烽晝曰熢甔石都濫切齊人名小罌為儋受二斛耗財火到切減也損也睢陵音雖下邳國之邑屬徐州讖緯上楚禁切下于貴切讖文圖緯書名鮮卑拓拔沙漠汗汗音寒鮮卑者東胡之别種依鮮卑山因以為號柘他各切拔蒲撥切自云拓天而生拔地而長遂氏曰拓拔乃元魏之先沙漠汗其名四年亭傳傳知戀切釋遽也周禮十里有廬廬有飲食三十里有宿宿有路室注云可止宿若今亭有室也亭者人所停集傳者轉轉相傳黜陟丑律切黜退也陟進也書曰黜陟幽明不泥乃計切滯也左遷子賀切左手足不如右強左遷者言貶下也凖量上主尹切下吕張切考課者凖則量度其優劣也降殺上古巷切下也下所介切削也叶音協合也彈之徒干切紏也頺徒回切下墜也藉田秦昔切通作藉借也古者帝藉千畒使民如借故謂之藉隕羽敏切從髙而下也琛丑林切壘魯水切軍壁鑠式灼切掾俞絹切官屬無與去聲芍陂芍音鵲楚相孫叔敖所造徑百里灌田萬頃在安豐郡五年瑾渠遴切雍於用切即禹貢雍州謂西北之位陽所不及隂陽氣壅閼也瓘古玩切臨災側持切本作淄齊國之邑屬靑州下邳符悲切國名古嶧陽山在其西屬徐州戍邏上傷遇切守邊也下郎佐切遊兵也墾口很切耕也僉息僉謂傅僉也息謂僉之子姓星孛蒲昧切又蒲沒切妖星酷糴上古暮切賣酒下亭歷切市榖逴丑略切瑩烏定切抗口浪切綜子宋切汜敷劒切又詳里切珝况羽切璜胡光切六年渦口屋戈切渦水出淮陽浮溝浪蕩渠東入淮又姑華切餐古餐字千安切小飯也徹軍直列切去也與撤同縑音兼説文并絲繒也纓紲上伊盈切下私列切皆系也并力卑政切檻車胡黤切車而為檻形以版四周之無所通見關中三輔舊事云西以散關為限東以函谷為界二關之中謂之關中奔古奔字會稽上工外切下古奚切郡名屬揚州禹會諸侯江南計功因命曰會稽會稽者會計也七年牛渚掌與切在丹陽蕪湖一名采石倒戈丁老切戈平頭戟也倒戈謂反以自攻紞都感切愷可亥切賊不俯九切與否同夷獠盧皓切西南夷謂之撩袤莫候切八年嬖卑義切愛幸也阼階昨悮切主階也跪去委切䠆跪忠讜多曩切直言也白馬胡蜀汶山郡之夷族名沮衆材汝切正壞也抄掠上楚教切略取也下力灼切奪取也襟領襟居吟切衣系也領衣襟也藉慈夜切借也艦户黤切戰船四方施板以禦矢狀如牢樓櫓守禦望樓也櫓露也上無覆屋柿蔽柿方廢切斫木札也橫斷上胡盲切闌也下丁管切截也敦煌敦音屯郡名屬涼州承間居莧切隙也下伺間同漸漬上將廉切下疾智切懼許容切又許拱切擾恐也亦作忷春秋傳曹人懼甲梃甲鎧也梃杖也徒頂切臧否上兹郎切善也下俯九切不也悶莫困切煩也悶也相貿莫候切易也時趣七句切一時趣向也景從景讀曰影造次七到切急遽也可杭胡郎切通作航謗訕所諫切倉頡篇曰訕非也掩襲席入切春秋釋例掩其不備曰襲譎計古穴切詭也江沔漢江沔水鴆直蔭切分界符問切守也界竟也黷武徒谷切慢也數也易再三黷通作瀆晉紀二通鑑卷八十起昭陽大荒落盡屠維大淵獻即癸巳至已亥凡七年丗祖武皇帝上之下泰始九年悖蒲沒切逆也戇陟降切愚也狼狽狼魯當切似犬狽博蓋切狼屬生子或欠一足二足相附而行離則蹎蹶猝遽謂之狼狽飲於禁切逼強上筆力切迫也下巨兩切勉也發摘他歷切挑􅎥其私隱者內長展兩切詰責去吉切問責也鋸居御切古史考曰孟莊子作䛯十年媵以證切媵御驕橫户孟切一訛言五禾切亦作訛噂􅊱上兹損切下徒合切噂噂􅊱􅊱相對談語枕之任切卧首據物也典選須絹切擇也又音須兖切甄拔稽延切甄察也拔擢也屏居必郢切隱也裒蒲侯切蓼莪上力竹切下牛何切小雅詩也蓼草名蒿屬蓼者言其長大貌蕩隂蕩音湯在司州魏郡蕩隂之戰嵇紹死之蕃表蕃方煩切屏也表外也見兵形甸切據今所有之兵財與才同逋逃上奔模切下徒刀切為屬朱欲切委也魴符方切白額鄂格切顙也通作額蛟居肴切龍之屬能率魚飛砥掌氏切磨石礪力制切磨也齊斬即夷切縗裳下緶而齊者為齊下不緶直斬割之者為斬暗於金切默也衰麻倉回切亦作縗説文服衣六寸博四寸直心咸寧元年掘其月切搰也酒藏才浪切庫藏也離間古莧切迭也隔也二年令孤豐離呈切令狐復姓豐其名薉塞烏廢切荒蕪也塞滿也車浚車昌遮切姓也浚私閏切梟首堅堯切斷首撞殺傳江切搗也吳會吳為荆楊交廣之都會更興古衡切代也并亡并讀曰併堡博抱切堡障索然昔各切盡也將疑子亮切將帥戟楯上訖逆切有枝兵也下食尹切所以扞身蔽目者還趣趣讀曰趨走也更事古衡切歷也珧餘招切䂮力灼切三年鴦於良切扞城侯旰切衛也或作干詩公侯干城鄴城魚怯切魏郡鄴縣屬司州顒魚容切瑋羽鬼切濮陽音卜古昆吾國屬兖州疆埸上居良切界也下羊益切畔也俶昌六切紏司吉酉切督也司主也訐居謁切謂政發人隂私獄犴魚旰切犬也犬所以守故犴謂之獄囂虛驕切喧也入質職利切質子所以結信也可汗河干切戎酋稱四年螟忙經切蟲食榖葉者繕時戰切輔也修也螺蚌上盧戈切屬大者如叶出日南漲海中下步項切蜃屬淤依據切説文澱滓濁泥字或從士種牛朱用切如種植之種紘乎萌切觚古胡切受酒器一升曰爵二升曰觚泓烏宏切踧踖上子六切下資昔切恭謹之貌皖城胡管切廬江邑屬揚州艘蘇遭切船總名峴山胡甸切在襄陽侈汰上尺氏切泰也下他蓋切奢也本作㑀諡神至切行之迹震懾震懼也懾怖也之涉切五年橫設户孟切不順理也四鈞居勻切三十斤為一鈞九石四鈞為石猿臂如字猿臂通有也猿或作爰爰緩也劉淵其先胸奴冒頓漢髙祖以宗女妻冒頓故其子孫遂冒姓劉氏淵於扶羅之孫左賢王豹之子騎射竒寄切射於馬上任俠上汝鴆切下胡頰切任謂任使其氣力俠之為言挾也以權力挾輔人也歔欷上朽居切下許既切歎息也鬼目菜名即芝草買菜菜名即平慮草曖昧上於蓋切隱也下莫佩切暗也後纍力偽切事相緣及鋒起鋒當作蜂推枰上通回切下蒲兵切博局量計吕張切量度而計算也運漕陸行曰運水行曰漕塗中同都切塗水名在堂邑黃鉞王伐切大斧也以黃金飾之冠軍古玩切言在諸軍之上扁輔典切詰朝去吉切平旦省所景切簡少也不重直隴切晉紀三通鑑卷八十一起上章困敦盡著雍涒灘即庚子至戊申凡九年丗祖武皇帝中太康元年鎮戍傷遇切守邊者城戌同義丹陽監監音緘丹陽監軍也磧七迹切水渚有石錐朱惟切鋒芒鋭者筏房越切編竹為之箄筏也著陟略切置也炬臼許切束葦而燒融液上余中切炊氣上出下夷益切流膏也幟式志切又昌志切旌旗之屬沅湘愚袁切沅水出牂牱湘水出零陵皆入江長騖亡遇切驅也馳也直造七到切至也下徑造同懷輯懷來也輯和也音集傳檄胡狄切以木簡為書長尺二寸昺俾景切藉慈夜切借也數節雙遇切賈昌朝音辨云數計目也解佳買切散也著手陟略切置也幼少失照切少小也柵測革切編立木為之結陳結締也陳音陳蔣班蔣即兩切姓也潰胡對切逃散也惲於粉切暗與暗同楫即涉切舟棹也或作楫駱驛上盧各切下夷益切或作絡繹要濬讀曰邀帆符咸切舟上慢所以泛風或作帆鼓譟先到切羣呼也石頭城名在金陵面縳符攫切縛手於後唯見其面也輿櫬𥘉覲切棺也轘轅上音還下音袁關名在河南緱氏酺音蒲説文王德布大飲酒也更易上居行切改也下羊益切轉也縞素古老切白色繒𣢾附苦管切誠也附託也嬰城伊盈切謂繞城以自守渡遼連條切遼水在幽州域擊胡當渡遼水故為將軍之號度或去水瑾渠遴切復十年房六切除其賦稅稽顙上康禮切下寫曩切額至地也昵近尼質切親也有屬之欲切付也忿敷粉切敷問切怒也怨恚於避切恨也攄抽居切跳刀田聊切躍也降首上胡江切服也下舒救切有咎自陳騁丑郢切直馳也謗􅊱上輔曠切毀也下逹合切妄言禁推川佳切禁者制也推者窮詰也挫祖卧切悶也憤房吻切悶也旋斾上旬緣切復返也下蒲蓋切繼旐之旗沛然而垂藺生良刃切藺相如𥚹俾緬切狹小也憤邑於汲切憂也本作悒戍守傷遇切守邊也滍淯上音雉下音育滍水在魯陽東經襄城入汝淯水出酈縣西北山中南入漢餉遺上式亮切饋也下以醉切贈也封禪時戰切積土增山曰封為墠祭地曰禪韜戢上他刀切下側立切皆藏也賔屬賔服也屬附也珠玉切鮮卑相然切本山名東胡之别種因退保此山遂以為號強獷上巨良切暴也下古孟切大獷不可附也雜胡昨合切謂戎狄之在塞內諸郡諸雜居不一二年掖庭羊益切按韋昭云以為在掖門內故謂之掖庭也慕容部鮮卑自塞外入居遼西棘城之北號曰慕容部其後因以為氏始見於此三年喟然口愧切太息也紏繩上居黝切下食陵切紏察而繩正之也鼓吹尺偽切或作籥琇息救切狼藉上魯當切下奏昔切狼藉草而卧其草必亂故物之緃橫敗亂者皆謂之狼藉愷苦亥切􅏁澳上盈之切采蘖煎也下於六切水內曰澳珊瑚上相干切下洪孤切珊瑚似玉而赤色作株形生於海恍然詡往切狂之兒當詰去吉切責問也從容七恭切猶休燕也軌則居洧切法也諡傳上神至切下祍戀切諡者行之迹請諡于太常傳者記也請于史官郭槐胡塊切賈充妻謐莫橘切本姓韓賈充外孫充子早卒無嗣以謐為繼乃姓賈氏鄫慈陵切春秋鄫子之國揆求癸切度也與聞與讀曰預四年晃胡廣切新沓徒合切水名敷芳無切暾他昆切繆蔚上莫六切姓下紆勿切名聃季乃甘切左氏傳魯衛毛聃文之昭也不禁居吟切勝也自首式救切自狀其過也駮議北角切雜也議不同也六佾夷質切舞行列也六佾三十六人乘輿石陵切天子所乘車輿不敢斥言尊者故稱乘輿診止忍切候脈自強巨兩切勉也整厲上之郢切下力制切整肅而嚴厲也歐血一口切吐也往臨良鴆切哭臨刪師姦切廆五罪切五年銓次此緣切銓衡也告訐居謁切謂發人之私駁違北角切言駁正違失焉能於虔切何能土斷都玩切決也皆以土著為斷并就并讀曰併兼也太阿厚胸奴胡名六年嶠渠廟切宇文部南單于之逺屬也在遼東塞外固獵得玉璽以為天授鮮卑謂天為宇號宇文部其後以為氏扶餘扶餘胡所部之國其國王名依慮沃沮上烏酷切下千余切其國在髙句麗蓋馬大山之東北與挹婁夫夫餘南與濊貉接七年劇陽子劇竭戟切劇陽所封縣名子爵也都太博胸奴别種萎莎胡萎於危切莎蘇禾切胸奴別種晉紀四通鑑卷八十二起屠維作噩盡著雍敦牂即已酉至戊午凡十年丗祖武皇帝下太康十年祫胡夾切大合祭也龕苦含切假氏徒玩切鮮卑擅石槐之後皓胡廣切伺相吏切伺候也瑋羽鬼切遹以律切繇餘招切又音由胄直佑切以別彼列切異也猾户八切狡猾繫胡計切孝惠皇帝上之上永熙元年要近於笑切要謂清要之官近謂左右邇臣小間居莧切病少差聞望聞去聲華廙上胡化切下與職切歆之孫劭實照切録尚書事録力玉切采記也謂總録衆事漢武帝𥘉有領尚書事至章帝以趙喜牟融並録苟書事尚書有録名蓋始於此猶冡宰總已之義大臣權重者為之遂趨音促下趨鑒同虎賁音奔猛士謂如虎之奔獸臨喪臨如字親蒞其喪也陵兵守山陵之兵斌悲巾切嘏舉下切復租調復房六切調徒弔切謂除其稅租繇役不稱昌孕切謂今日行賞太過與平吳時所封功臣輕重不相副稱暗於金切默也悾悾苦貢切誠心又苦紅切苦江切愎弼力切佷也蒯欽蒯苦怪切姓也欽其名暗與暗同踈逺于願切離也楷口駭切嶠渠廟切淑媛上神六切下于眷切後宮女官差長上𥘉加切下展兩切元康元年擲直炙切投也寺人寺音侍掌王宫之女御跪言巨委切䠆跪也其趣十句切趣向閹衣檢切宫中守門者脅之虛業切人迫也冝作熁頠魚毀切紿之蕩亥切欺也廄居又切馬舍鴦於良切悝苦回切隂漸子廉切入也愷可亥切見省息井切察也楙音茂督將將去聲喧許元切亦作歡譁胡瓜切歡也翕習許及切聚集也彌畢切譖莊蔭切讒毀也帶方郡名屬平州繆莫六切姓也摯虞摰脂利切姓也虞其名瓌茹回切恢枮回切牽秀牽輕煙切姓也秀其名昵尼質切近也不軌居洧切不法也趣兵趣音促速也恟懼許容切又許拱切擾恣也亦作春秋左傳曹人懼騶虞幡騶側鳩切幡孚袁切騶虞獸也白虎黑文尾長於身繪繡于幡上檛張瓜切擊也頠魚毀切彌縫上民卑切下符容切彌縫隙漏也二年厭劾上於業切下胡得切厭伏而劾之也符書符篆隂書即厭勝術也三年普撥北末切綽昌約切四年郝散黑各切胸奴胡也五年雹弼角切雨冰也調徒釣切選也濡源奴官切在上谷郡之北屬幽州叄合陂班縻切在代郡屬幽州即漢叄合縣地猗色上於冝切下唐何切拓拔沙漠汗之子盛樂盛漢書作成樂音洛城名在并州新興郡猗盧龍都切猗色之弟六年馬蘭郎干切馮翊羌盧水龍都切北地胡嬖人卑義切賤而得幸者解系胡買切姓也系其名更相工衡切互也撓亂大髙切攪也其字從手一説橈曲也女教切其字從木氐羌丁奚切風俗通云氐本西南夷種殄冦徒典切殄滅也蟠道蒲官切道路蟠曲廞虛金切七年鑽祖官切刺也核下革切果核寧馨寧晉書音義無音而丗以寧音之寧馨猶言阿堵阿堵之義蓋指物之稱析理先擊切分義理如破木胡母輔之音無胡母復姓其先本陳胡公之後公子元奔齊遂有齊國齊宣王母弟封母鄉逺本胡公近取母邑故曰胡母戊鯤公渾切􅊂音夷任放上汝鴆切下甫妄切祼郎果切比舍頻至切並也釀汝亮切醖也綜子宋切綜核也訥奴骨切言難也言藉秦昔切書藉砥礪上掌氏切下力制切磨石也裎馳成切祼也又丑郢切褻先列切褻慢也捷疾葉切獲也八年賨人祖東切南蠻賦稱賨人者乃稅賦之家宕渠徒浪切巴西邑屬梁州苾薄必切慰勞郎到切慰安而勞問也稔如甚切歲熟曰稔晉紀五通鑑卷八十三起屠維協洽盡上章涒灘即已未至庚申凡二年孝惠皇帝上之下元康九年要荒一遙切要服荒服也要者謂束以文教荒者要服之外又簡略也貪婪盧含切亦作婪左傳貪婪無厭單于音蟬胸奴天子之號漢書音義曰單于者廣大之貌言其象天單于然也執贄脂利切古者相見之禮皆有所執以為贄書曰三帛二生一死贄是也弛施是也疆埸上居良切下夷益切乘間居莧切乘其間隙騭職日切僅渠遴切材能也燼徐刃切火餘也先零音憐西羌名罕开上呼旱切下苦堅切顔師古曰罕开羌之别種也漢武帝時破之置縣因以此名之析支先擊切山名西戎地也王肅云析支在河關西猾夏户八切猾亂也夏華夏也閡牛代切外閉也怖普故切惶懼也逖他歷切爾雅遐逖逺也逺處昌與切居也遇否部鄙切塞也更制居衡切改也糝桑感切説文以米和羮一曰粒也擠子西切排也暫藏濫切猶猝也通作暫呼厨泉南單于王名其後為前趙即劉元海之叔祖也三率所類切通作帥驍勇堅堯切健也句驪上古侯切下音離亦作麗東夷國也在遼東之東噬齧上視制切下魚結切羇旅居冝切羇寄也旅客也叱之昌栗切呵也鄴魚劫切魏郡之邑屬司州顒魚容切石函胡讒切石匱簏箱力木切竹髙篋也戇陟降切愚也騃五駭切癡也蝦蟆上何加切下謨加切藝位執古勢字紫闥他葛切宫中小門不解佳買切散也令聞並去聲奔古奔字舛昌兖切錯亂也過當丁浪切謂越其中也獄犴魚旰切犬所以守故謂獄為犴解胡買切無厭於廉切不足也又於熖切敦煌音屯皇郡名屬涼州應劭曰燉大煌盛也揣𥘉委切度也繕時戰切治也拘攣閭緣切拘執也攣係也娠杜預曰壞胎為娠音之忍切一音身虨甫巾切又方間切永康元年纘作管切蕤儒追切琰以舟切櫖抽居切中台湯來切星名韙于鬼切猗乙竒切反間居莧切變其言以間諜椎直追切擊也亦作槌佽飛七四切晉始置二衛官有左衛右衛佽飛者右衛之官屬衛尉籌直由切更籌囧居永切肜以中切解系解胡買切姓也系其名唐叔虞食邑於解縣因以為氏詰去吉切問也荂妨俱切穴從上而勇切下才用切穴從僕射者謂武賁中郎將羽林郎將之屬光祿勳所統詡况羽切劭實照切左袒徒旱切脫衣袖而肉袒也偏脫其左故曰左袒鼓譟先到切羣呼也眭祕眭息為切內之內讀曰納誚責才笑切亦作譙九錫車馬衣服樂器朱户納陛虎賁斧鉞弓矢秬鬯狡黠上古巧切下胡八切狂狡桀黠也廞許金切剽匹妙切輕也愞奴卧切又乃亂切弱也少城失邵切治成都太城治益州漢武帝開西南夷置益州郡治滇池更漢三國益州分置改置不一今太城治益州未詳益州所治也恂相倫切比至必寐切帥音率領也下同上官晶上官復姓其先楚莊王子為上官大夫以上為官氏晶子盈切隗伯五罪切晉紀六通鑑卷八十四起重光作噩盡元黓閹茂即辛酉至壬戍凡二年孝惠皇帝中之上元寧元年軌居洧切汜瑗汜符咸切姓也皇甫謐曰本姓凡遭亂避地汜水因改焉貂蟬上丁聊切下時連切冠名貂內徑捍而外溫潤蟬居髙飲潔口在掖下此因物生義故以為冠飾髦莫𫀆切撓亂火髙切攪也其字從手淑神六切弇古南切苾毗必切斷徒玩切絶也勞尚郎到切犒勞汶山羌汶音旻汶山郡之羌也屬益州濁澤直角切水名在青州齊國濁或作涿鄴魚怯切魏郡之邑屬司州憤房吻切怒也育余六切攘臂人羊切揎袖出臂朝歌音昭汲郡之邑屬司州商紂所都暾他昆切奭施隻切華隂户化切洪農邑屬司州華山在其南郗隆郗抽遲切姓也難乃旦切邃雖遂切帝坐北斗之北曰紫微犬帝之坐天子之常居也泓烏宏切璜胡光切堮阪五各切關名在河南陽城屬司州成臯關名在河南成臯屬司州即鄭之虎牢楙音茂厭勝一葉切廣雅曰厭鎮也巫覡刑狄切在男曰覡在女曰巫能齋肅事神明嵩山思融切中嶽著張略切服衣於身陽翟直格切河南邑屬司州沮將預切喪也衄女六切敗也溴水扄􅞔切水名在河內溫縣屬司州悶音悶又音滿説文煩也㴶七罪切惔徒濫切胄直又切汶陽音問魯郡之邑屬豫州大酺音蒲酺之為言布也布德於天下而聚飲食為酺或作脯音同敞齒兩切冠軍古玩切功冠諸軍故曰冠軍琨公渾切倜儻上他歷切下他曩切倜儻卓異也旟羊諸切邸閣丁禮切屬國舍曰邸瘞於計切埋也繇餘招切潦魯皓切雨水大貌韜他刀切剽掠上匹妙切下離灼切強劫人財物也演音衍柵楚格切營屯也編立木為之趣之趣讀曰促太安元年葭萌上苦牙切下謨耕切蜀先主改葭萌為漢壽至晉改為晉壽梓潼邑屬梁州寋碩寋紀偃切姓也睿俞芮切詵所替切子臧兹郎切菰古胡切説文雕苽也一名蔣或作苽蓴殊倫切蒲中秀鱸落胡切魚名林慮凌如切山名在汲郡林慮縣屬司州蒺藜上秦昔切下鄰題切易曰據于蒺藜爾雅曰蒺藜布地蔓生細葉子有三角刺人宛於袁切南陽邑屬荆州離間居莧切間隔也虓虎交切屬天朱欲切連也閶闔上尺良切下轄臘切門名在河南洛陽之西屬司州慕容廆五罪切慕容復姓按本傳慕容廆字奕其先號曰東胡曽祖莫護跋始建國於轉成之北時燕代多冠步搖冠見而好之乃斂髮襲冠因呼步搖為慕容音訛轉耳或云慕二儀之德繼三光之容遂以慕容為氏父涉歸以全栁城之功進拜鮮卑單于涉歸死國人立廆號前燕俘斬芳無切軍所獲也晉紀七通鑑卷八十五起昭陽大淵獻盡閼逢困敦即癸亥至甲子凡二年孝惠皇帝中之下大安二年塢安古切與塢同通佫文同築居曰塢質職利切結信也下為質同易也以豉切輕也縋馳偽切挂繩而下也儲陳如切説文也省家息并切察也掩襲上衣撿切下習入切春秋釋例掩其不備曰襲擐甲古患切貫也春秋傳擐甲執兵突陀沒切突出猶搪揬之義中矛上張仲切傷也下迷浮切酋矛也建於兵車長二丈沈持林切薳羽委切迭徒結切更迭劫訖業切人欲去以力脅止曰劫墊江逹協切巴郡之邑展轉上知輦切或作輾下陟兖切輾轉反側也誑古况切欺也弓欽弓姓也伺祥吏切髯如止切頰鬚挑刀徒了切弄也走戟訖逆切有枝兵也藍田關盧甘切在雍州京兆秦嶢關釁許覲切罪也偏裨上紕連切下頻彌切將之副也侃空旱切蒯苦怪切并軍并音併郫城頻彌切蜀郡之邑輿羊茹切説舒芮切誘也下同楷口駭切蓀蘇昆切桀盜巨列切桀黠盜之下俊似轉切長沙邑屬荆州晫竹角切銓此緣切次也公當當去聲公平也當中也函谷胡南切關名在洪農緱氏古侯切河南之邑屬司州所相息亮切扶助也紿徒在切欺也創𥘉莊切傷也龔恢上九容切姓下口回切名邯鄲音寒單廣平邑屬司州貉奴曷各切督不音否闡齒善切著張略切服衣於身白帢葛合切又乞洽切韎韐士服制如韍唳郎計切鶴鳴曰唳考掠考亦作栲掠離灼切皆擊也兩踝胡瓦切足骨也千金堨於葛切壅堨也千金堨名水碓都隊切手舂書容切涸下各切水竭也窮踧子六切踧冝作蹙窮極迫促也逖他歷切趣逡須切嚮也間行古莧切謂竊令人行也齎祖稽切持也從甥才用切母之從兄弟之子玘墟里切逺戍舂遇切守邊也牛鞞音卑又必爾切犍為邑屬益州芋王遇切蹲鴟也浚私閏切睿以芮切五苓夷苓郎丁切永興元年滔吐刀切炙之石切置肉火上好畤渚市切邑名衙博衙五加切姓博其名棐穆公子食采於衙因氏焉投袂彌蔽切猶拂袖也左氏傳楚子聞之投𬒮而起𦵔醢上臻魚切虀菹下呼改切醯醢如薺徂禮切甘菜眕止忍切繇夷周切縞素古老切縞素白色頰古協切面旁也濺子賤切激濺也六璽想氏切蔡雍獨斷曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽薊城音計燕國之邑屬幽州東嬴公滕嬴以成切滕徒登切東嬴者晉宗室之踈屬封嬴公名滕王浚之黨羯朱居列切烏元胡名斌悲巾切睿以芮切琅邪菉王覲之子即元帝縱橫並去聲放縱而恣橫也馥房六切驍勇古堯切驍健也彎為還切跋扈上蒲揆切下侯古切跋扈猶強梁能禦牛許切止也爭衡户庚切猶抗衡也梟古堯切斷首加於木上鹿蠡上盧育切戓作谷下鄰知切胸奴王之號左於陸胸奴國王號犢車徒谷切牛子也以牛駕車貣敵德切從人求物所乘食陵切駕也易水易音亦水出涿郡安閻山拓跋猗色拓他各切跋蒲撥切鮮卑胡之氏猗於冝切色唐何切沙漠汗之子漢王劉淵字元海新興胸奴人漢以宗女妻冒頓故子孫冒姓劉氏元海據離石稱大單于尋即漢王位改元元熙始於此鴻臚凌如切鴻聲也臚傳也所以傳聲贊導九賔膽量上覩敢切下音諒謂有膽氣志量儀觀古玩切儀形神觀也妻略妻去聲略與掠同府藏才浪切庫藏物所儲蓄也帴將先切馮𬒳具一作郟古洽切襄城邑屬豫州暾他昆切更立工行切改也聶泥輒切姓泫氏音涓上黨邑屬并州屯留屯音純上黨邑屬并州長子長音長短之長上黨邑屬并州晉紀八通鑑卷八十六雋特之第三子也永興初自稱成都王尋僣帝號改元大武國號大成始於此復其房六切除其賦稅也庾敳庾以主切姓也敳其名五來切辟之必益切除也無厭於廉切薄行胡孟切不敦行檢也勱莫夬切璠孚袁切膩女利切肥膩汚烏故切染也餅必郢切説文麵餈也中毒竹仲切傷也扼殺乙革切持殺之也井陘音刑常山邑屬兾州井陘山在其南飢饉渠遴切榖不熟曰飢𬞞不熟曰饉惲於粉切勞徠上郎到切下郎代切勸勉之意孝懷皇帝上永嘉元年玫謨柸切鞠羡上居六切姓下于線切名遺榮以醉切贈也更辱工衡切互也狡古巧切猾也昶昌兩切會稽上古外切下古奚切郡名禹會諸侯於江南計功因命曰會稽會稽者會計也盾杜本切珉眉巾切詮且緣切讃則旰切訇氐訇呼宏切姓也氐其名句方句古侯切姓也方其名名論盧困切名譽議論也褉胡計切禊飲壼苦本切闓音開㔨督輔昧切三窟苦骨切穴也王衍王敦王澄以荆州青州司徒為三窟二年太行胡郎切在河內山陽西北屬司州祛丘於切耽都含切踏折上徒合切踐也下之列切斷也令狐亞力程切令狐復姓亞其名淡徒濫切琠他典切甄城音絹濮陽邑屬兖州轘轅上音還下音袁關名在河南緱氏突陳上陀骨切下直刃切與陳通軹關音𥿄在河內軹縣屬司州北宮純北宫復姓純其名壷關洪孤切上黨邑屬并州安堵音覩安然如墻堵不遷動也晉紀九通鑑卷八十七起屠維大荒落盡重光協洽即已巳至辛未凡三年孝懷皇帝中永嘉三年熒惑上户扄切下穫北切南方火星紫微星名在北斗北即太帝之坐箸遲據切萇直良切逯明逯盧谷切姓也明其名胡羯居列切胡虜戎羯也濟河子計切渡河也間出居莧切迭出也沮衆材汝切止懷也屯留音純上黨邑屬并州長子長讀曰長短之長上黨邑屬并州皓下老切冠軍古玩切功冠諸軍故云訇琦上呼宏切姓也琦其名渠羈切宕渠徒浪切巴西邑屬梁州涪城音浮梓潼邑屬梁州歡樂陳留王名嶷魚其切又魚力切演音衍無慮應劭曰慮音閭顔師古曰即所謂醫巫閭屬遼東悛且緣切又七倫切四年璯黃外切蝗音皇螽也下邳符悲切國名屬徐州古嶧陽山在其西顗魚豈切璿旬緣切喜許記切貫甲古玩切擐甲也梟首古堯切挂首木上悝口回切又音里蕤如住切澠池莫踐切戓作黽洪農邑屬司州繁畤諸市切鴈門邑屬并州崞音郭鴈門邑屬并州羽檄胡歷切檄以木簡為書長尺二寸有急事則加鳥羽插之涅陽奴結切南陟邑屬荆州沶口音怡地名在新城沶鄉縣地宛於元切南陽邑屬荆州穰人羊切義陽邑屬荆州璃鄰知切惲於粉切掘其月切㮊音荗摯虞摯脂利切姓也虞其名毯布吐敢切毳布也合作毯朱提上音殊下音時郡名屬益州恚於避切恨怒也五年應詹應於陵切姓也詹其名醴陵盧啓切長沙邑屬荆州韜他刀切忿撫吻切怒也眺他弔切確克角切抄掠楚交切又𥘉教切劫人財物也瑁莫報切洧倉榮美切地名匹語下切古雅字艘蘇刀切船總名硤石侯夾切在河南河隂屬司洲輜重上側持切下直用切釋名曰輜厠也謂軍糧什物雜厠載之以其纍重故稱輜重珉眉巾切屠各音儲休屠之裔其後因以為號糜沸上忙皮切下方未切如糜糝之涫沸也鼎峙除几切鼎足而立也薈烏會切翜山立切又山甲切絙古登切又古鄧切百六椽俞絹切言辟官屬百六人故稱之刀協刀丁聊切姓也協其名壼苦本切頵居筠切靚疾政切軼音逸棗嵩棗姓也文士傳云棗氏本姓棘避難改焉蒲坂甫逺切河東邑屬司州有歷山舜所耕也潼關徒紅切本名衝關在洪農華隂左傳所謂桃林塞也下邽音圭秦武伐邽戎置有上邽故加下馮翊邑屬雍州鎖蘇果切銀鐺也酒酣胡甘切噓之休居切出氣急曰吹緩曰噓破車昌遮切謂破壞輿輪也便弓毗連切弓馬間便疾也索綝索蘇各切姓也綝丑林切其名竺恢竺張六切姓也恢其名綜子朱切秋然親小切容色變也廆五罪切抎抎于粉切有所失引春秋傳抎子辱矣犍渠焉居言二切犗牛也毖兵媚切琰以冉切晉紀十通鑑卷八十八起元黓涒灘盡昭陽作噩即壬申至癸酉凡二年孝懹皇帝下永嘉六年靳沖靳居覲切姓也沖其名珝况羽切嬪毗賔切婦也周禮有九嬪鎧可亥切甲也妻略七計切娶也無處敞吕切居也攘𬒮上汝陽切下彌蔽切愷袖出臂也鼓髯如占切鼓頰須也孤降胡江切孤者侯王之謙稱降服也結陳直刃切與陳通從容上七恭切柘之夜切桑木猗盧於冝切柘拔沙漠汗之子魴符方切絡驛上盧各切下羊益切言不絶也勱莫敗切蟹胡買切蟲名二敖八足攄抽居切汾水扶云切水出太原輿櫬𥘉覲切空棺也亟紀力切疾也急也忤五故切逆也未解音蟹曉也所并卑政切兼併也䂭磝上五勞切下口勞切城名為質陟利切商榷古嶽切商度也榷楊大舉也幾諌居依切幾者微也當微諌納善言於君乘輿食陵切登車也恂相倫切悝口回切又音里梁伏疵梁伏虜復姓疵其名枋頭分房切在沒郡曹操於淇水口下大枋木以成堰遏淇水東入白溝以通漕運時人號其處曰枋頭間道居莧切微道也襲取席入切春秋釋例掩其不備曰襲縛筏上符攫切下房越切編竹為筏也羇旅居冝切羇寄也旅客也邯戰音寒丹廣平邑屬司州鄉導許亮切趨鄉而引導也郝詵上呵各切姓也下所臻切其先商帝乙時有子期封太頌郝鄉後因氏焉中七竹仲切傷也自分扶問切百乘食證切證時壬切謐彌畢切匹磾下都黎切鼓譟先到切羣呼鎧可亥切甲也薊音計燕國之邑屬幽州孱陵士連切南平也屬荆州沌口持兖切江夏安陸有沌水其地曰沌屬荆州狼狽博蓋切獸名狠屬生子或欠一足二足相附而行離則踣故倅遽謂之狼狽扼於革切捉也訥內骨切瓘古玩切襁負紀兩切語襁負其子而至孝愍皇帝上建興元年凰儀胡光切鶠鳳其雌鶉凰儀劉聰皇后殿名身衣於既切重茵伊真切茵褥數興所角切頻數也窺窬上去隨切下羊朱切肘腋上陟栁切臂莭也下羊益切臂後也龍逄皮江切關龍逄阽危余廉切臨危巾櫛阻瑟切佩巾梳櫛也汶山音問郡名屬益州郗鑒郗綺戟切姓也嶧山羊益切山名在魯郡鄒縣格斷丁貫切謂以格式斷之恚於避切怒恨也協音協傖子助耕切楚人别種也耽丁含切泓烏宏切邃雖遂切逄羡逄皮江切姓也羡其名方虔西方復姓少金天氏位主西方故因氏焉見姓苑奭施隻切岌魚及切繆愷繆莫六切姓也愷其名元莵同都切郡名屬平州纍及力偽切事相緣及也樂浪上音洛下音狼郡名屬平州高勾麗勾古侯切麗音離東夷國名在遼東之東鯨鯢上渠京切下五稽切海大魚也雄曰鯨雌曰鯢闓音開愈容朱切駁議北角切駮雜也議不同也逖他歷切蹴子六切踏也潯水城音尋水出廬江潯陽泠口郎丁切地名在零陵郡此水出九疑山北流至冷道而入江貰神夜切寬貸也摶徒官切貪橫胡孟切欲物曰貪非理曰橫覘之丑艷切窺視也春狄傳曰公使覘之盛樂音洛城名在親興郡屬并州灅水力水切水名出鴈門資治通鑑釋文卷第九
