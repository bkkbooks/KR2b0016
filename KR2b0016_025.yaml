body:
  text: 右宣義郎監成都府糧料院史炤唐紀五十一通鑑卷二百三十五起閼逢閹茂六月盡上章執徐即甲戌至庚辰凡六年有竒德宗神武聖文皇帝十正元十年緘古咸切禆將頻彌切將之徧副也質責職日切質正也舉正義責之管鑰上古滿切下音藥摶鍵器也稽首遣禮切下首也龜兹音丘慈跪授渠委切䠆跪也洺彌并切州名磁音慈州名潯徐心切州名羡餘延靣切延也亦餘也譎古穴切詐也詆丁禮切毀訾也銛思亷切數其所矩切計其一二而責之下悉數同掊克蒲侯切詩曰曾是掊克謂聚斂也輿臺並如字左氏傳人有十等王臣公公臣大夫大夫臣士士臣皁皁臣㒵輿臣隷隷臣僚僚臣僕僕臣臺台衡湯來切台鼎釣衡也冰解下懈切散也如氷之散解十一年中傷竹仲切涪房尢切州名造城七到切至也揣𥘉委切度也惴之瑞切憂心也即帥與率同之省息景也察也􅎤跌上奚結切下徒結切鐡勒諸部曰阿跌亦曰呵咥或爲􅎤跌泌歩必切又音祕啜利昌悅切奚酋各囘鶻户骨切即回紇也可汗河于切戎首稱骨咄都骨切内之内讀曰納說音恱邏郎佐切拉盧合切折也摧也令茵音因枯枿牙葛切與蘖同商書若顚木之有由蘖十二年渾瑊上胡本切姓也渾沌氏之後下古咸切暹思廉切朝晟音盛絪於眞切歙失渉切州名鬻余六切賣也舁與居切說文兵舉也斫之若切刀斫也傔去念切侍從之人廡罔撫切堂下周屋也脅虚業切以威力相脅也恌餘昭切憂也悸也十三年數負所角切眢於袁切又烏官切廢井也嶲選委切州名墨衰倉回切衰喪衣左氏晉襄公遂墨以葬文父晉於是始墨墨謂墨衰也比歳毗至切近也比歳謂近年撤直列切去也敺於口切歐擊也土著直略切言著土地而有常居不隨蓄牧移徙也仰魚向切恃也十四年磧鹵上七迹切水者有石者下郎古切鹹地也頔亭歴切倕是爲切諶時壬切鍠胡光切十五年輕佻他彫切偷也錡渠冝切又魚倚切涗輸汭切翻城孚袁切反也縑堅嫌切并絲繒也党項多曩切漢西羌别種其地古析支也思􅌔古限切自潰胡對切自逃散也十六年鍔逆各切沮洳上將豫切下如倨切漸濕之地也滄千剛切州名泗濠胡刀切並州名擐執胡慣切貫甲也春秋傳擐甲執兵愔於斟切鄘餘封切鞫居六切窮理罪人也舟艦音檻戰船也匹方施板以禦矢狀如牢埇橋尹竦切也名在淮泗一曰道上加土爲埇䪹普眉切于頔之兄朋比弼媚切朋黨比周也犒口到切餉也儋音談又都甘切唐紀五十二通鑑卷二百三十六起重光大荒落盡旃蒙作噩即辛巳至乙酉凡五年德宗神武聖文皇帝十一正元十七年黔渠金切州名朝宷此宰切甲胄直祐切甲謂鎧甲冑謂兠鍪欲内讀曰納橈尼巧切亂也詗丑正翾正二切知處告言也械送下戒切械囚具也謂加以三木而傳送之阬丘耕切亦作坑瘞於計切埋也悛七宣切改也紓音舒觧也緩也德棻敷文切堡音保城堡也十八年驃王毗召切驃古朱波也自號突羅朱闍婆國人在永昌南二千里去京師萬四千里挑戰徒弔切謂擿嬈敵以求戰也鄜坊上芳無切下分亡切並州名玢悲巾切又方貧切十九年朱鳶余專切邑名屬安南中都護府禘祫上待計切下胡夾切祭名周禮五歳一褅三歳一祫伾音丕偁蚩陵切杭胡剛切州名譎詭上古穴切下古委切詐也乘間居莧切隙也异音異瑀王矩切滉户廣切臠力兖切肉臠也薳羽委切誹謗上妃尾切下𥙷曠切二十年醯馨奚切說文酸也嘔烏口切吐也扃古榮切外閉關政諲伊眞切節鉞王伐切節以專殺斧鉞以專斷順宗至德洪道大聖大安孝皇帝永正元年蒼猝七忽切愽雅云暴也絪音因縗服倉回切喪服亦作衰鞵材户皆切革生鞮或作鞋瓦礫狼狄切說文小石也褻狎上昔結切下户甲切䙝瀆也狎侮也柿林院鉏里切院以木得名猶漢以長楊五柞名宫也僴然下報切詩瑟兮僴兮一曰寛大皃酒壚龍都切顔師古曰賣酒之處累土爲盧以居酒瓮四邊隆起其一面髙形如鍜爐闒茸上吐合切下人勇切顔師古曰闒茸猥賤也闒下也茸細毛皃謂非豪桀也暴撗下孟切強暴横逆也飼祥吏切以食飲物之謂飼郴丑林切州名忻許斤切與欣同藉疾夜切依藉也㑹計古㑹切㑹計謂緫合而籌之也莽鹵上莫𥙷切下郎古切頷之五感切首肯也叱尺栗切報女版切靣慙赤也或作𧹞郯徒甘切東海郡溆詞與切州名郇音荀地名在河東解縣緗息良切絿巨周切綺去倚切絢翾縣切纁許云切紘乎萌切緄音衮繟音但暏與覩同惡其於故切下大惡同詬怒許候切罵也痊且縁切病除也墮翾規切壞也紊文運切亂也饌鶵戀切具食也光琦渠覊切忷懼許容切又許拱切恐擾也憂悸其季切心動也積疹之忍切乆疾也珣音荀却之與郤同邸丁禮切蒼頡篇曰邸舎也蔚紆勿切又紆胃切攅宫徂官切殯也澭於用切又於容切說音稅誘也阻兵壯所切阻恃也左傳阻兵而安忍唐紀五十三通鑑卷二百三十七起柔兆閹茂盡屠維赤奮若六月即丙戌至巳丑凡三年有竒音洛酥酪也二年垍巨至切綢直由切惕息它歷切恐懼皃澹徒濫切注刃並如字以刃加頸而未殺也傳檄刑狄切古者未有𥿄檄以木爲書長尺二寸桎梏上之日切下姑沃切械在足曰桎在手曰梏舷胡千切船邊也屬籍上殊玉切附也下秦昔切記藉也謂所附之宗籍宣歙失涉切並州名蹙子六切迫也跣走蘇典切足親地曰跣謂跣足而走也縋馳僞切繩有所垂而下也枕籍上之禁切下自夜切首之所據曰枕身之所依曰藉愀然七小切色變皃銛思亷切靣詰喫吉切責問也邢洺土奚經切下彌并切並州名幾誤巨希切晝度逹各切忖度也庶孽魚列切孽庶子也鄜坊上芳無切下分亡切二州名三年郝玼上黒各切姓也下且里切其名奏彈唐干切彈紏也爲章奏以紏人之罪故謂之奏彈湜承職切恟恟許容切擾恐也囉良何切又魯播切冠諸古玩切朱邪音耶朱耶岀於西突厥至其後丗别自號曰沙沱而以朱邪爲姓也烏德犍山居言切烏德犍山唐歷云即鬰督軍山虜語兩音也又渠焉切洮水土刀切水名在西羌猶藉疾夜切資也乘間居莧切間隙之間稱昌孕切盲眉耕切目無眸子四年渤海渤海比狄國本粟末靺鞨附髙麗者姓大氏髙麗滅有乞乞仲象者走度遼水保太白山之東北至其子祚榮盡得扶餘沃沮弁韓朝鮮海北諸國睿宗時遣子入待因拜祚榮爲渤海郡王自是始去靺鞨專稱渤海云嵩璘力殄切賑恤上止忍之刃二切下雪律切賑恤謂贍恤之也賙之由切振贍也嫡長上丁歷切下展兩切嫡正也嫡長旣嫡且長也省費上所猛切下音沸省簡也省費謂簡其浮費量移龍張切移徙也謂得罪逺責者遇赦量徙近地句檢句古侯切句稽也檢居奄切檢押也窺覦上缺規切下容朱切覬覦也跋扈跋蒲末切扈音户跋扈跳梁也一說扈籬也水居者於水未至爲扈水去則大魚跋扈而出小魚獨留貫習貫古患切貫習謂習熟也與慣同易之易音亦說上音稅曵倒曵以制切挽也倒都皓切仆也撤直列切撤去也唐紀五十四通鑑卷二百三十八起屠維赤奮若七月盡元黓執徐九月即巳丑至壬辰凡三年有竒憲宗昭文章武大聖至神孝皇帝上之下元和四年櫟陽櫟音藥邑名屬同州即漢萬年縣藍田盧甘切京兆有藍田山山岀美玉因以爲邑爲累力謂切事相縁及也逺謫陟革切罰也德棣大計切二州名旅拒旅力舉切衆也拒臼許切捍也謂率衆以相捍拒三思息濫切三參之也論語三思而後行物故顔師古曰物故死也言其同於鬼物而故也一說不欲斥言但云其所服用之物皆巳故耳躁競上則到切動也下渠映切爭也謂躁動争競之流也䇿畫胡麦切謀䇿計畫也臂指上卑義切下軫視切臂指之臣謂相爲運用如身之使臂臂之使指也㗖之徒濫切食也一作啖膠固居肴切如膠之能固蔓連無販切如蔓之多連延也窺窬上闕規切下羊朱切與窺窬同義節鉞節子結切長一尺二寸凡爲使者持之秦漢以下改爲旌幢之形鉞于厥切大斧節鉞必上賜之者示征伐自天子出勞留郎到切慰勞而留之也間說上居莧切間諜也下音稅誘也脅虚業切迫脅也依阿上音依下烏何切依阿謂不特立其說甞附順人言兩可謂無可否諳練上烏含切下力現切諳練猶詳悉其事拂梯泉拂薄密切梯天黎切本作鸊鵜泉在豐州西受降城北三百里昱餘六切貣敵德切從人求物也京畿渠希切天子千里地以逺近言之則言畿也隳虚爲切壞也相屬之欲切相連屬也嗜常利切欲也跖蹻上之石切盗跖也下訖約切莊蹻也賈誼賦云謂隨夷溷兮謂跖蹻廉故李竒注曰跖秦之大盗蹻楚之大盗蓋跖栁下惠弟蹻楚莊王弟也鮮于私箭切風俗通曰武王封箕子于朝鮮其子食采於朝鮮因氏焉超伍笞招切伍行伍也謂越次而言格沮上剛鶴切下將豫切格止也沮壞也譚徒含切耆臣渠伊切謂耆舊之臣厚犒口到切盛其餉勞也壓境上乙甲切下居影切悉其兵甲以鎮壓疆境也陴障陴音卑城陴也障音瘴堡障也挂古賣切亦作掛售承呪切詩賈用不售亦作讎詩無言不讎嘈嘈才勞切喧呼聲也醢以徇醢呼改切肉醬也徇松閏切行示也醢以徇謂醢其犯令者以行示於衆也如漢醢彭越之類五年洄湟鎮洄户恢切湟胡光切逗留上大透切下力救切稽緩不進也費貲上芳未切下將支切耗費貲財也昵狎上尼質切昵近也下轄卑切猈侮也旰食古旦切日晚而後食也校計校音較計如字猶言計度也愜苦恊切快也論思邪熱論廬昆切邪余遮切吐蕃臣名泌兵媚切緄古本切瀛餘輕切州名汜孚𣑽切又祥里切玘去里切日􅉴扎色切日過中曰􅉴旁午毗房切一縱一橫也管鑰下音藥摶鍵器也糲郎葛切脫粟籃輿盧甘切籃竹也以爲輿贍時艶切賙也六年抶敕栗切擊也昕許斤切臯謩莫胡切與謨同攻抄上沽紅切擊也抄楚教切略取也相擊而略取黔渠金切州名溆象吕切州名鯁古荇切骨疆四支故君有忠臣謂之骨鯁鯁與骾同投匭居洧切匣也垂拱𥘉置令上表者投之名曰投匭戣渠歸切詰責上詰吉切問而責之渤蒲没切稔如枕切穀熟也七年趣趨玉切速也厝火讀曰措火懈惰上古懈切下徒卧切懈惰謂怠惰也蠲圭淵切除也澧里弟切州名痺脾至切風濕病灸灼上居又切下職略切艾炷也乳臭上蘂主切下尺救切言其穉孺猶餘乳哺臭氣􅕖粉上子兮切下府吻切􅕖凡䤈醢所和細切爲􅕖粉謂粉碎也撫桉上斐父切拍也下於旰切几桉也熒惑上户扄切下胡國切以巧佞惑人謂之熒惑猶言眩惑也版籍版𥙷綰切籍秦音切所以書户口輿地也唐紀五十五通鑑卷二百三十九起元黓執徐十月盡柔兆涒灘即壬辰至丙申凡四年有竒憲宗昭文章武大聖至神孝皇帝中之上元和七年揣楚委切揣摩也符契上音扶下苦計切符契者兩相合也爲重直隴切輕重之重非再重之重之比卑巳切並也惲於粉切悰藏宗切刳空胡切剖破也兖鄆下王問切二州名倔强上渠物切倔強不柔服也証之盛切間說上居莧切間諜也下音稅誘也諳烏含切悉之也掎角居蟻切執其足也左傳譬如逐鹿晉人角之戎人掎之言叶力共攻之也鮮衣相煎切鮮㓗之衣八年支解支如字四支也解古買切分也言分柝其四支也溷胡困切厠也濁也不内讀曰納權倖倖下便切謂侒倖之竊弄權柄者賂遺上魯故切貨賂也下以醉切贈遺也受降城降下江切屬豐州景雲三年朔方軍緫管張仁愿築三受降城其地濵河常爲河所圯至是欲脩之兼理河防也天德故城中受降城西二百里大同川有天德軍天寳十二載置乾元後徙屯永濟柵故大同城地至是李吉甫奏脩復舊城也磧口七迹切沙土曰漠即今磧也其地在賀人山西去鸊鵜泉十里确瘠上胡角切下秦昔切地之磽薄曰确瘠蜂候上敷容切下胡㓂切邊有警則舉火以爲候顔師古曰夜曰烽晝曰燧唐突觸也字亦作搪揬蹙子六切促也辰溆象吕切二州名佖毗必切又毗至切鸊鵜泉上歩覔切下天黎切在豐州西受降城三百里澈直列切刻覈刻乞得切覈下革切趣踆湏切嚮也資裝上津斯切下側羊切資財裝束所以備行屠杜乎切殺也謂誅殺其人若屠六畜然駱歷各切姓也夏綏上亥雅切下宣錐切二州名九年善羊柵測革切砦栅編立木爲之以禦敵窮蹙子六切迫也羈縻上古希切下忙皮切覊馬絡頭也縻牛紖也言牽制之故取喻也城塹七艶切阬也遶城水也抗禦上口浪切扞也下魚巨切止也謂扞禦之也清貫古玩切貫事也清貫猶言清職也不翅讀若不啻制指可制御之使奉指命者抄掠上𥘉教切略取也下離灼切劫人財物也扞蔽侯旰切衛禦也圬射堋圬汪胡切所以塗也堋逋鄧切射埻也葉失涉切邑名屬汝州十年礠丘音慈邑名屬唐州櫜鞬上姑牢切下居言切後漢馬融傳蒐獸頌曰命師於鞬櫜注鞬以藏箭櫜以藏弓鞬紀言反􅐤音髙孔子曰武工尅商倒載干戈包以虎皮名之曰鞬櫜鄭元注云建讀曰鍵音其蹇反謂藏閉之此馬鄭異義滛泆夷質切滛欲而蕩泆也踶徒祁切蹋也莊子馬怒則分背相踶又大計切听听魚隱切笑皃漢書亡是翁听然而笑櫜駞上土各切下唐何切駱駝也其背如櫜故名爲橐駝栁宗元作郭橐駝傳蓋寓言以爲諷孳子之切孶息也一曰汲汲生也蒔石至切植立也更種也又音時饔飱上於容切孰食也下蘇渾切餔也勞吏力報切淄青上莊持切二州名趣逡湏切嚮也徒說音稅募莫故切召也惡少上烏各切下式照切閭閻之無頼年少者覉旅居冝切覉寄也旅客也心狐音胡謂心若狐之疑而陳讀曰陣下其陳同如蝟毛蝟音胃虫似豪猪者爾雅蝟毛刺也詆毀上典禮切詆訿相毁也顱骨龍都切首骨也氊冐諸延切氊笠也橪毛爲之大呼荒故切呌也呵索上呼何切叱也下式格切搜也複壁上方六切重壁重橑憐蕭切說文椽也一曰蘭也楚辭曰蘭撩以木蘭爲榱也鞫居六切窮理罪人也跋扈上蒲末切下音户跳梁也一說扈籬也水居者於水未至爲籬水去則大魚跋扈而岀小魚獨留姒詳里切娣姒也長婦曰姒㓜婦曰娣雜沓徒各切沓沓然昆雜之稱防禦兵禦魚巨切唐制官志云至德後中原置節度使又大郡要害之地置防禦使以治軍事刺史兼之不賜旌節其使統兵即爲防禦兵内兵内音納趫勇上兵妖切犍勇也山棚蒲庚切鄧􅉑之間民以射獵爲生其趫勇者謂之山棚奮鎚直垂切擊也脛刑定切腓前骨書斮朝渉之脛檻車户降切載囚車也閉壁卑亦切壘也十一年弄㨂都貢切西南夷地名南詔有六節度曰弄㨂永昌銀生劎川柘東麗水也嵯巔上才何切下多年切南詔臣名拔𨫼山抜蒲八切𨫼五到切在壽州固始縣鏄伯各切鎬下老切郾城於阮切邑名屬許州甄别上稽延切察也下筆列切分别也顗語豈切夐翾正翾逈二切撿括上居掩切下古活切猶言檢校輦轂上力展切輓車也下古禄切輻所湊也唐以京兆爲師表謂四方所輻湊也故曰京兆爲輦轂師表倮露上郎果切倮露出形體也愬蘇故切唐紀五十六通鑑卷二百四十起強圉作噩盡屠維大淵獻正月即丁酉至巳亥凡二年有竒憲宗昭文章武大聖至神孝皇帝中之下元和十二年出迓虞駕切相迎也懦乃亂切弱也懈惰上古拜切下徒禍切怠惰也摩尼僧眉波切回鶻臣也元和𥘉回鶻再朝獻始以摩尼至摩尼至京師歳往來西市商賈頗與囊橐爲姦至是遣歸國也邏郎佐切廵也刳空胡切剖也菱芡上閭承切芰也下渠歛切雞頭也相帥讀曰率秀琳力㝷切郗士羙郗丑飢切姓也少玢方貧切又音邠嵖岈上莊加切下音牙山名舉烽敷容切說文燧候表也邊有警則舉火以爲候顔師古曰夜曰烽晝曰燧騾軍盧戈切軍皆騎騾故謂之騾軍洄曲胡瑰切嬀俱爲切帝舜之後居於嬀泗今上谷有嬀亭是也後爲氏冶爐城冶以者切爐龍都切城名汶港音問下音巷栅名回環胡關切猶言循環猶豫猶餘救切玃屬其性多疑一說隴西人呼犬子曰猶好先行却住以候其人遂曰猶豫故以不决爲猶豫也刈魚肺切刈穫幟職吏切旗也素易以豉切輕易也屏人必逞切屏退人也諜徒結切軍中行反間曰諜諧謔上户皆切詼諧也下虚却切戯謔也蹙子六切促也戣渠歸切蚶蛤上火甘切蚌屬下古合切雀入水爲蛤膽略覩敢切謂有膽志術略也衒熒絹切自媒也驍騎堅堯切徤也兵之勇揵爲驍騎郾城於建切邑名屬許州陵挫則卧切陵陵轢也挫摧挫也芻藁上𥘉俱切芻菱也下古老切禾稈也所以供軍馬斾蒲蓋切旗也擊旐曰斾羸老倫爲切瘠也澥下買切鏄伯各切布扼於革切持也謂分布而持扼旻彌賔切殿其上丁練切軍在前曰啓後曰殿糒平秘切糗糧羈靮上居移切馬絡頭也下丁狄切馬韁也以斷徒亂切钁其厥縳切大鉏擊柝他名切漢書曰宫中衛城門擊刁斗傳五更衛士周廬擊折也牙城古者軍行有牙尊者所在後人因以所治爲衙曰牙城者即衙城也蝟毛于僞切虫似豪猪者爾雅曰蝟毛刺也餔蒲故切申時食鞠埸渠六切蹴鞠處也櫜鞬上姑勞切下居言切櫜以藏弓鞬以藏箭阻兵側吕切阻恃也左氏傳州吁阻兵而安忍差第𥘉加切謂將士有功者等差而次第之獷戾上古猛切惡皃下郎計切狠也潾離真切又良刃切出祖租古切顔師古曰送行而宴飲也十三年昈乎古切英曇徒含切鴻臚下凌如切漢武帝置此名胡廣曰鴻聲也臚傳也所以傳聲賛導九賔栢耆上博陌切姓也栢皇氏古帝號後爲氏下渠伊切蔕都計切根蔕也駸駸千㝷切馬行疾皃二紐女紏切縊殺於賜切經死也輿櫬楚鎮切親身棺也係纍上胡繫切下力追切孟子曰係累其子弟趙氏注係累縳結也滳河丁歷切邑名屬棣州駭愕上下楷切下逆各切皆驚也嗤尺之切笑也鏑都歷切箭鏃也盪定讀若蕩定墮壞許規切毀壞也靴許茄切鞮屬考捶上若號切考掠也下主蘂切以杖擊也輦轂上力展切輓車也下古禄切輻所湊也京都四方所輻湊以輦轂取喻泌兵媚切潰歸胡對切各散歸也仰給魚様切恃其所贍給也秣馬莫撥切食馬糓也憂悸渠胃切悸心戰恐也十四年桃茢來桀切說文芀也禮記注桃茢可以爲埽除不祥祓除敷勿切除灾求福亦祭也又音廢蠹財當故切虫食木爲蠧蠧財者言其耗竭也宗奭始亦切叶讀若協唐紀五十七通鑑卷二百四十一起屠維六淵獻二月盡重光赤奮若六月即已亥至辛丑凡二年有竒憲宗昭文章武大聖至神孝皇帝下元和十四年朐山權俱切邑名屬東海郡逼彼側切迫也城塹七艶切阮也遶城水也密䟽所去切以牋䟽密聞之也齎即夷切齎持也蹙子六切促也股栗上音古下力質切驚懼皃帑他曩切金帛所藏又農都切銜枚枚音梅若馬之銜勒所以止言語讙囂令人不知周官有銜杖氏枚狀如箸横銜之駐株遇切止馬也柝他各切漢書曰宫中衛城門擊刁斗傳五更衛士周盧擊柝也譟譁上蘇到切羣呼也下呼瓜切諠譁也歔欷上欣居切下許旣切歎息皃函胡嵒切匱也又胡南切長號胡刀切號咷哭也隕絶于敏切謂氣欲絶也䑛神帋切以舌取物手搏𥙷各切以手擊物也攘臂汝陽切揎𬒳出臂曰攘旌節咨盈切說文遊車載旌析羽注所以精進士卒節子結切長一尺二寸几爲使者持之昈乎古切家貲即移切家財也陵㦸几劇切謂元和十一年盗斷建陵門㦸四十七枝截昨結切斷也撓女巧切撓亂也囊篋上奴當切囊橐也下苦恊切箱篋也擠之祖稽切排也旅拒上力舉切衆也下臼許切捍也謂率衆以相捍拒掊克簿侯切詩曰曽是掊克謂聚歛也屏必逞切去也塞蔽上蘇則切窒塞也下必媚切昏蔽也骨鯁古荇切骨彊四支故君有忠臣謂之骨鯁鯁與鯁同髙枕章荏切楊子奠枕于京狷急古縣切𥚹狹也詈力智切罵也弁皮變切狼狽狼音郎狽音貝生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽絁式攴切繒似布者謂之絁闅郷亡云切邑名屬虢州比鄰晉毗近也紿徒害切欺也杻械上敕九切下胡戒切因具也乘釁許慎切乘間隙也餌仍吏切眄眄匹莧切頋望也弭綿婢切息也旻彌賔切徼倖堅堯切亦作僥瘴癘上之亮切下力制切疾疫也春秋傳大瘠者何癘也衒熒絹切自媒也陳敗真真切故也謂故舊而損敗也恼懼翊拱切又虚容切擾恐也春秋傳曰曹人忷瞿渥於角切優渥惲於粉切釗之遥切遊畋徒年切盤遊獵取禽獸也書不敢盤于遊畋逗遛上音豆下力救切遲留也稹止忍切與古岳切易月易音亦古者三年之喪自天子與庶人共之漢文帝遺詔令天下三日皆釋服宫殿中服大紅十五日小紅十四日纎七日釋服應劭曰紅者中祥大祥以紅爲領縁纎者禫也凡三十六日而釋此以日易月顔師古云紅功也文帝創意爲之三年之喪其實二十七月豈有三十六月之文何爲以日而易月乎邠寧悲巾切二州名乘輿天子以天下爲家不以京師宫室爲常處當乘輿以行天下故群臣託乘輿以言之訝吾駕切疑也沈酣上持林切下胡甘切沈湎酣飲也獶雜讀曰獶雜唯阿上惟癸切下烏何切詭隨也老子曰唯之與阿相去幾何郴丑林切州名常額鄂格切重給利額有常也洶洶許容切又許拱切水皃扈從上侯古切下才用切衛侍天子遊幸故曰扈從晡時卑謨切日加申時傍儉毗浪切依也穆宗睿聖文惠孝皇帝上長慶元年祟息謂切神禍也士玫莫杯切鄜芳無切州名惸葵營切沔彌兖切州名婺亡遇切州名在婺女星分故以名州憺杜覽切又徒濫切衢權俱切惋烏貫切澶市連切州名湛都含切又丈减切涵胡男切瀍直連切頴于軫切州名玘口紀切傾軋乙黠切傾䧟也囉郎佐切又郎何切毗伽求迦切榷茶音角水上横一木以渡人者喻禁民酤釀鹽鐡茶之類官自開置如設木爲榷獨取利也涿竹角切郡也薊嬀薊音計嬀俱爲切二州名桀鷔魚到切桀黠驕鷔也輯音集寧也伉徤口浪切伉狠而徤捷也覉旅居冝切寄也旅寓謂之覊旅假匄上居夏切借也下居大切乞也傳呼火故切傳聲大呼也唐紀五十八通鑑卷二百四十二起重光赤奮若七月盡元􅘬攝提格即辛丑至壬夷凡一年有竒穆宗睿聖文惠孝皇帝中長慶元年昭義澤潞藩滇自劉晤至劉稹傳三丗而㓕有川五曰邢汾晉澤潞號昭義節度倰魯登切𥚹卑善切急也果悍侯旰切果敢猛悍也狡古巧切猾也抉一决切挑也進岌魚及切令將並去聲號令將士努力奴古切方言勉也翦即淺切翦除也訣古穴切訣别也跣先典切足親地也堊室上烏故切白飾也有喪者所居邢濋上音邢下音楚人名淶音來水名出涿郡貿遷莫后切交易也書懋遷有無化居商賈音古行曰商坐曰賈鈆與專切錫屬絲纊苦謗切絮也又細絲也禹貢厥篚纎纊權倖下梗切謂佞倖之弄權者蔚紆勿切州名朋比皮至切朋黨比附也蠹讀曰姦妬謂嫉害也禁闈宇規切宫中門也禁衛所在故謂之禁闈制斷都亂切制事之冝而决斷之也參差上𥘉金切下𥘉冝切又𥘉佳切不齊皃乘傳張戀切乘傳謂依乘符傳而行若今使者之持節爾傳以木爲之長尺五書符其上以爲信覊牽居冝切馬終頭也言牽制之故以取喻勝負上詩證切下房缶切勝敗也贓則郎切納賄曰贓賂洛故切遺賂也泚雌氏切釁許愼切間隙也延崟音吟供饋求位切供給餉饋宵潰胡對切夜皆逃散也募音墓召也府藏徂浪切物所畜也二年不内音納下遽内同諜徒結切反間者遞相大計切逓互也敗衂女六切挫䘐也勁兵居正切勁健也納𣢾若緩切誠𣢾也無憀連條切無憀頼也匱乏上求位切竭乏也凍餒上多貢切凛也下奴罪切飢也奚奚本匈奴之别種唐末居隂凉川在幽州之西南其王曰去諸驕惰徒果切驕悍而怠惰也刮古刹切刮削瘠秦昔切瘦也偃蹇上於幰切下居偃切不振皃屠害同都切謂破取城邑誅殺其人如屠六畜然刺七賜切直傷曰刺旄鉞上莫𫀆切說文幢也下王伐切大斧也行節制者持之書武王左杖黄鉞右秉白旄閉壁卑亦切閉其軍壘陳米直珍切腐米也一勺市君切周禮梓人爲飲器勺一升羸懦上力爲切瘠也下奴禍乃亂二切柔怯也不度待各切如織之翼切掠離灼切劫取也誘脅上與乆切下虚業切以利動之曰誘以威迫之曰脅陵轢上力丞切下郎擊切如車之所踐也將卒上子亮切下則骨切扼腕上於革切持也下烏貫切手節也埇橋尹竦切地名在淮泗一曰道上加土爲埇突圍徒或切衝圍而出也囚縶音執繫也寰音還糶他弔切賣出爲糶殿最上下練切下祖㑹切上功曰最下功曰殿糴亭歴切買入曰糴賖詩遮切貫也騷音搔醝才何切禮云塩曰醎醝說文醎也河内謂之醝逋欠博孤切欠負也鞫居六切窮治也犒苦到切餉也拔跋上他各切下蒲撥切本代北虜姓瑗于願切㝏覊薤切尉氏紆胃切邑名屬汴州疽發七余㓛癰也捶之累也擊也複道方六切重道也驪山吕支切山名在京兆府昭應縣緗音相瘳丑鳩切疾痊愈也唐紀五十九通鑑卷二百四十三起昭陽單閼盡著雍涒灘即癸卯至戊申凡六年穆宗睿聖文惠孝皇帝下長慶三年繆靡㓜切妄也獠魯皓側絞二切西南夷譎古穴切許也揣楚委切揣摩也羇貧居冝切旅寓也餌仍吏切服餌嶼徐與切砦士邁切與寨同複道複音復如淳曰上下有道故謂之複濫賜魯瞰切賞不當功臧否上子郎切下俯乆切善也不也四年疹之忍切疹疾忤五故切逆也亦作悟禆賔彌切接益也雖少少去聲釗之遥切先帥朔律切與率通旱歉下苦簟切食不滿也又詰念切從父從徂用切下從子同誚之才笑切責也亦作譙以語魚據切說也弗内内讀曰納辟易顔師古曰辟易謂開張而易其本處辟音頻亦反爲殺所介切削也篋詰叶切箱篋數遊所角切屢也庭湊千候切僵踣上居良切仆也下蒲北切顚也渤音勃宵衣宵音霄夜也天子憂勤則未明求衣日昊而食鼔吹尺爲切音律管壎之樂令聞上郎定切下文運切聲所至也附麗力異切附依也麗著也莊子附麗不以膠􅃮八關十六子按李逢吉傳鄭注得幸於王守澄逢吉遣從子訓賂注結守澄爲奥援自是肆志無所憚其黨有張又新李續張權輿劉栖楚李虞程昔範姜洽及訓八人而傳㑹者又八人皆任要劇故號八關十六子有所求請先賂關子後逹於逢吉無不得所欲也伺夜伺先自切候也狼狽博蓋切狼屬生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽負上房缶切負戴也榻託合切牀也狼藉狼音郎藉秦昔切狼獸也藉草而卧去則汙亂凢事物之紛穢者謂之狼藉散寮息旱切散寮冗散之官排沮上蒲諧切擯去也下子豫切止壞也掘斷上其月切搰也下徒亂切截也輻湊上方六切車輪轑也下子候切本作輳輻共轂也謂衆輻之所輳鈐制其廉切與鉗通敬宗睿武昭愍孝皇帝寳曆元年鄠胡古切邑名屬京兆府挺逹鼎切杖也捶諸蘂切以杖擊也嬖幸必丗切賤而得幸者橐鞬上姑勞切下居言切所以藏弓矢昵比上女力切下皮至切昵親近也比朋比也書昵比罪人與此昵比羣下同丹扆六箴扆隱豈切户牖間也箴諸深切戒也古者君有闕臣子作箴以戒之如庭燎之詩是也李德𥙿獻丹扆六箴一曰霄衣以諷視朝稀晩二曰正服以諷服御乖異三曰罷獻以諷征求玩好四曰納誨以諷侮弃讜言五曰辨邪以諷信任羣小六曰防微以諷輕出遊幸驁牛刀魚到二切漢成帝名侈汰上赤志切下他蓋切奢也瑱它典切以玉充耳也猖蹶上赤張切下古穴切慢易以豉切侮慢輕易也從容七恭切從容閑語也愍美隕切痛愍也量移量音良量移謂有罪者斥他所遇赦則量徙於近地競渡如字言兩舟爭進艘蘇刀切船緫名汶音問茅彚茅莫交切姓也彚于貴切叶音恊撓女巧切攪也猶豫猶夷周又餘救切玃屬其性多疑一說猶犬子也好先行却住以候人故稱不决者爲猶豫爲之爲去聲二年民間謡余招切徒歌曰謡緋衣小兒者裴字也坦其腹者度也天上有口吴字也被驅逐者謂度甞擒呉元濟也圗讖楚譛切圗河圗也讖符命之書呫囁耳語顔師古曰呫昌渉切囁人渉切耳語附耳小語也灌夫曰何爲效女曹兒呫囁耳語阤丈尓切壞也斃毗祭切通作弊跑哮上蒲交切下虚交切跑蹴而呌哮也跳踉上田聊切下吕唐切跳躍而走也戯酣酣胡丼切酒樂曰酣戯酣言戯之方樂也文溆象吕切絢許縣切左藏木浪切藏四方所獻金玉珠貝玩好之庫也矯稱古了切詐也涵音含蒼猝七没切猝猶暴也詰朝去吉切平旦也文宗元聖昭獻孝皇帝上之上大和元年瑀王舉切債帥上仄界切下所類切逋負曰債言是時方鎮貸錢而得位至鎮而未償鮮矣息淺切少也二年逺于願切離也骨鯁古杏切骨鯁喻正直也說文鯁魚骨也食骨留咽中爲鯁䙝息列切䙝狎操七勞切畫一胡虢切漢書蕭何爲法講若畫一注云畫一言整齊也开五堅切又音堅郃曷合切縝之忍切緄古本切蹙子六切迫也唐紀六十通鑑卷二百四十四起屠維作噩盡昭陽赤奮若即巳酉至癸丑凢五年文宗元聖昭獻孝皇帝上之下大和三年輜重上側飢切下直用切輜載衣車也重載物車也行者之所資故曰輜重侑于救切滋殖上音滋下承職切師古曰滋益也殖生也母得母音母下母得同甞著只略切瑣碎上蘇果切下蘇對切細碎也杼直吕切機之持緯者戍春遇切守邊钞楚交楚教二切亦作抄嵯顚才何切弄㨂節度也郷導許亮切言爲之趍郷引導也安堵董五切墻五板爲堵謂民安之如墻堵之不移軍殿丁練切軍後爲殿埒龍輟切相亞之謂四年排擯上蒲皆切下卑振切擠排而擯斥之也募莫故切廣求怏怏倚兩切志不滿也譟蘇到切羣呼也縋直謂切垂繩而下也互市胡故切藩漢以物更相貿易靴許茄切鞮屬茹羯居竭切奚王名專撗胡孟切不順理也偪筆力切迫也通作逼沈厚上持林切深沈而厚重也釗之遥切所間古莧切間隔以斷徒亂切絶也旰古但切朏敷尾切忷懼上許勇切又許容切擾恐也脆青歳切輕而易斷也曏音向堂案堂案謂政事堂之案也葺堡鄣上七入切中博抱切下之向切謂修葺城堡以爲蔽鄣所以扞宼五年繙孚袁切愕眙上逆各切驚也下丑吏切直視也覈胡革切實包翃胡萌切墮矌上徒禍切下若謗切廢墮而曠職也郾於建切剽匹妙切劫掠也蒙衝上謨蓬切下昌容切戰船所以突敵字或作艨艟慓狡上婢小切輕也下古卯切猾也堅利堅謂甲利謂兵比來比毗至切巂息委切州名六年臠力兖切割肉爲塊也卭崍關崍郎才切卭崍山名在沈黎郡愿虞怨切宿憾胡紺切怨也慊慊苦簟切恨也七年珙居容居勇二切澣户管切而惡烏路切憎也駮北角切乖舛也謚神至切謚者行之迹數言所角切從容上七容切燕閑之謂愀七小切色變也驁五到切桀驁散舎㪚謂分散之散舎謂居舎之舎籍秦昔切簿籍也飃紕招切剷其字未詳鈐鍵上其廉切下巨展切帀作荅切亦作匝土息息謂孳息也殿寄丁練切采菽詩殿天子之邦鄭箋謂辨治連屬之國蒐練上踈鳩切下力甸切皆治兵也魚麗力知切陣名左氏春秋傳云鄭伯使原䌓髙渠彌以中軍奉公爲魚麗之陳先偏後伍伍承彌縫愰駭户廣切豢擾上胡慣切圈養也下音繞馴也能順養得其嗜欲也劃忽麥切澒胡貢切宵旰上音消夜也下古旦切日􅉴也天子焦勞則未明來衣日􅉴而食掉徒弔切摇也麤聦徂切指縱子用切蕭何傳發縱指示獸處者人也顔師古注云發縱謂解紲而放之也指示者以手指示之今俗言放狗燻灼上許雲切下職略切蠖屋郭切說文屈伸虫也諦丁計切審也資治通鑑釋文卷第二十五
