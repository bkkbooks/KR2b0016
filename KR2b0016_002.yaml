body:
  text: 右宣義郎監成都府糧料院史炤漢紀一通鑑卷九起旃蒙恊洽盡柔兆涒灘即乙未至丙申凡二年太祖髙皇帝上之上帝姓劉氏諱邦字季沛豐邑中陽里人秦二丗元年陳渉起蘄沛父老立季爲沛公三年項羽更立爲漢王明年稱漢元年五年即帝位元年璽相氏切印也解見秦紀二顔師古又云古者尊卑通用至秦漢始專爲王者印符節符者契也兩相合也節者操也謂持節者必盡人臣之節操三禮義宗曰長一尺二寸秦漢以下改爲旌幢之形並見唐蘇鶚演義軹道軹音只字書云車輪之穿爲道屬吏之欲切委也招八招音翹舉也殽函上何交切下胡䜛切殽山名函谷名字或作崤崡墮火規切毀也爭走音奏謂趨向之他倣此阨塞上乙革切下悉則切樊噲音快縞工老切白素也苛音何細也灋古法字抵罪丁禮切至也當也案堵音覩應劭曰案按次第也堵如墻堵不遷動也繇餘招切通作傜傜役也至戲許冝切水名在新豐東鴻門地名在新豐東項伯史記索隱云名纒字伯陵顔師古云字伯巵章移切古字作觝應劭曰飲酒禮器也古以角作受四升籍在昔切籍記於簿戮力力竹切并力也或作勠玦古穴切玉佩也項莊羽之從弟擁盾食尹切通作楯所以扞身蔽目撞丈江切擊也下同仆芳遇切頓也瞋目稱人切張目也䀝音漬或作􅗃跽其紀切長跪也參乘上倉含切或作驂下食證切解見秦紀二彘肩直例切彘即豕也㗖以食與人曰㗖徒濫切自食亦曰㗖徒覽切爼壯所切爼机驪山音黎古驪戊國其山在新豐間行居莧切謂間隙處行趣讀如趨嚮之趨桮杓上布回切飲器下尚灼切所以抒挹也字與勺同唉烏來切歎恨發聲之辭塞先代切下塞王音同衣繡衣去聲本傳作衣錦沐猴音侯獼猴也發難乃旦切𬒳堅執銳弋稅切𬒳堅謂甲胄執銳謂利兵暴古暴字將相並去聲上游如字文頴曰居水之上流顔師古曰游即流也郴丑林切桂陽邑惡烏故切櫟陽音藥左馮翊邑獄掾俞絹切官名翟王直格切下陽翟同嬖臣博戾切嬖謂愛幸者卬五剛切冠軍冠去聲六古國臯陶之後髙帝别爲衡山國至武帝爲六安國治六畨君蒲何切呉芮爲畨令故號畨君亦作鄱百越亦作粤百者謂非一種猶言百蠻也邾追殊切古邾子國即邾縣屬江夏共敖共音龔姓也荼大胡切薊音計廣陽國邑環封環音䆠繞也言繞南皮三縣以封之鋗火圎切詘曲勿切通作屈信古伸字鎰夷質切或作溢服䖍曰二十兩爲鎰一說二十四兩戲下虚爲切顔師古云此乃旌麾之麾非新豐戲水也蝕中音力谷名在杜南入漢中道棧道仕諌切棚也架木爲之亦名閤道說說上音恱下式銳切穰如羊切南陽邑無行行去聲漂母匹妙切以水擊絮曰漂袴下苦化切兩股間也一作胯漢書又作跨俛音免本作附讀蒲伏蒲蓬逋切亦作匍手行也伏闢墨切亦作匐伏地也麾下吁爲切夲作戲連敖五髙切楚官名典客者滕公夏侯嬰東郷讀曰嚮曰惟漢書作唯音弋季切然也喑噁上於金切下烏故切懷怒氣也漢書作意烏叱咤上昌栗切下竹駕切或作吒發怒聲漢書作猝嗟嘔嘔凶于切恱言也漢書作姁姁音同印刓五官切訛缺傳檄刑狄切以木簡爲書長尺二寸襲雍席入切春秋釋例云掩其不備曰襲好畤好上聲畤音止右扶風邑薛歐烏垢切王吸音翕陽夏音賈淮陽國邑趣讀曰促二年魏王咎其乆切盡讙與歡同袒徒旱切脫衣䄂爲袒服也臨力禁切衆哭曰臨擅時戰切專也睢水音雖在梁國之睢陽擠祖稽切排也窈㝠烏皎切亦作窅推墮上通囬切下徒果切審食其食音異其音基與酈食其趙食其同音爲質讀如質子之質音寘梟將工堯切梟言勇徤誚在笑切誚責碭音宕又音唐梁國邑未傅音附顔師古曰傅著也言著名籍給公家傜役也下傅之音同京索京索二地名也京即京城索音山客切即索水在河南之滎陽甬道音踊築垣墻爲巷道聮屬河也敖倉牛刀在河山名詩搏獸十敖是也之滎陽秦置倉於此不中去聲下同躶身郎果切赤體也窖工孝切地藏也酈音歷項它徒何切與他同羽從兄之子蒲坂甫逺切在魏爲垣入秦爲蒲阪劉伯莊說漢爲河東邑木罌於耕切以木柙縛罌缶以度罌山謂瓶之大腹小口者閼與上於曷切下音豫上黨之涅氏有閼與聚漢紀二通鑑卷十起彊圉作噩盡著雍閹茂即丁酉至戊戌凡二年太祖髙皇帝上之下三年井陘音刑山名在常山樵蘇在消切樵取薪也蘇取草也一作樵薪間路居棧切徑途也輜重輜載衣車也重載物車也行者之資緫曰輜重輜音莊持切重直用切赤幟昌志切旌旗之屬萆山音蔽依山自覆蔽也禆將頻移切助也將之副者餐古飡字音千安切小飯也佯音陽前行胡郎切走水音奏趣也下並同泜水執夷切又丁計切在常山褕衣史記作䄖漢書作媮顔師古曰媮與偷同苟且也託侯切卒罷讀曰㽻情見胡電切顯露也北首式䆒切所趣向於北斧質職日切鍖也言伏於鍖而斧之版築𥙷綰切版墻版也築所以杵也守徼工鈞切徼謂邊境亭障以徼繞邊陲常守之也乘塞先代切塞垣也乘謂登其垣守之泄先列切漏也傳舎張戀切傳舎者馳傳者之過所傳者以木爲之長尺五書符其上以爲信龍且龍姓也且其名子余切踞牀音據謂伸其兩脚而坐洗足先典切濯足橈女教切弱也其字從木趣刻趣讀曰促箸直庶切匕箸度能度大各切哺蒲故切食在口中者幾巨希切近也昩音抹反間居莧切諜也反者飜所言而間之下同疽千余切癰疽左纛徒到切以旄牛尾爲之在左騑馬首蔡邕說樅公千容切史失其姓但曰樅公輯籍入切與集同又七入切宛葉上於元切古申伯國下式渉切古葉公國皆屬南陽下邳貧悲切屬東海郡本在薛其後徙此有上邳故曰下邳趨降趨讀曰促降胡江切促服之也王逃本作跳顔師古音徒彫切言輕身而忽出也孛歩内切又蒲没切彗孛皆妖星壍七艶切積聚上子賜切下才喻切所畜軍糧蒭藁之屬睢陽音雖梁國邑挑戰徒了切擿嬈敵求戰如古之致師也適卒適讀曰讁謂卒之有罪讁者工女漢書作紅女讀曰工太行胡剛切山名在河内山陽西北蜚古飛字之阪扶板切山坡曰阪華無傷華户化切姓也說音稅蒯徹丘怪切徹避武帝名史作通伏軾音式車前横板隆起者伏憑也掉徒釣切揺也四年汜水汜舊讀作凡顔師古音祀在成臯匈匈許容切諠擾之意數羽所具切一二而責之射中竹仲切下同捫音門摸也創𥘉莊切傷也濰水音維出琅邪陳讀曰陣贏音盈泰山邑梟堅堯切史記秦始皇本紀注垂首於木上曰梟與通說曰倒首也或謂斷首倒垂木上非也豈以字從倒首故誤歟操千髙切持也盱台音吁怡臨淮邑數矣數去聲衣我於記切食我讀曰飤黶一點切北貉莫客切胡名在東北方一說貉即濊也梟騎古堯切梟徤也勇也漢紀三通鑑卷十一起屠維大淵獻盡重光赤奮若即巳亥至辛丑凡三年太祖髙皇帝中五年分地扶問切凡裂地以封諸侯其受封者各有分地捐弋全切棄也城父音甫沛郡之邑垓下音該沛郡洨縣聚名楚歌漢軍而爲楚人之歌故言楚歌猶吴歈越吟也忼慨上口黨切亦作慷下口溉切說文忼慨壯士不得志騅朱惟切馬蒼黒雜色屬者之欲切下屬安同紿蕩亥切欺也或作詒刈一作艾魚肺切芟刈四隊音遂呼火故切叫也披靡普彼切辟易上頻亦切下夷益切謂開張而易其本處烏江在秦東城縣屬九江郡項羽葬東城即此地檥音蟻整船向岸曰檥蹂人九切踐也畮古畒字憞徒對切惡也楊子漢屈羣䇿宋咸注項羽有一范増而不能用其惡羣䇿可知與苦與音預汜水敷劒切在濟隂界媪烏老切婦老者稱閩中音緍春秋七閩地戰國時越人所居爲閩越秦立閩中郡徹侯敕列切通也通者言其上通王室以避武帝諱改爲列侯帷幄上于龜切下乙角切在旁曰帷悉周曰幄餉餽上式亮切通作饟下求位切通作饋說服音恱㠀中丁老切海中有山可依止曰島使使上音史令也下踈吏切將命者他類此乘傳張戀切乘傳者依承符傳而行若使者持節爾傳者以木爲之長尺五書符其上以爲信併肩歩鼎切比肩也更王更平聲王去聲窘巨隕切迫也髠鉗上枯昆切􅚎髪下其炎切以鐡束頸從容從千容切戹乙革切與搤同徇辭俊切行示也徼堅堯切幸也通作僥輓輅音路輅者一木横遮車前二人挽之一人推之所謂輓輅衣羊裘衣於旣切下衣帛衣褐並同音帛見胡電切自下見上曰見下同邰吐材切在右扶風武功縣絫古累字中也竹仲切傷夷讀曰創痍卒然音猝搤與㧖同謂捉持之也亢音岡喉嚨殽澠上河交切殽山下莫踐切澠他沃野烏酷切胡苑於阮切牧馬之所外接胡地故云胡苑委輸委於僞切委猶委積之委輸猶轉輸之輸道引讀曰導閈胡旦切里門曰閈六年亟欺兾切一音急雲夢二澤名在楚地跨江南北連亘千里械下戒切桎梏也執古勢字建瓴建音謇瓴讀曰鈴盛水瓶也鞅鞅於兩切志不滿也剖符普口切破也與其符剖而分之授其半將以合也鄼音賛南陽邑發縱縱謂解細而放之也子用切複道芳目切上下有道故謂之複此屬殊玉切徒屬也下我屬同觖望古穴切睽觖也怨望也單于音蟬匈奴天子之號也漢書音義曰單于者廣大之貌言其象夭單于然也頭曼莫安切單于王名冒頓劉伯莊音墨特或讀如本字頭曼之子閼氏上於連切下音支匈奴皇后號東胡烏元之先後爲鮮卑在匈奴東故曰東胡月氏西域胡國在匈奴北安定郡有月氏道氏音支鳴鏑音嫡髐箭也甌脫上一侯切下土活切境上候望之處若今之伏宿舎也樓煩胡名趙武靈王所伐置樓煩縣因號樓煩胡縣屬鴈門郡白羊白羊王匈奴別國在朔方河之南控弦口弄切控引也句注句音章句之句山名在鴈門綿蕞子恱切立竹及茅索營之習禮儀其中也春秋傳茅蕝與蕞同音肄弋二切七年銅鞮丁奚切上黨邑曼丘臣曼音萬曼丘姓也臣其名顔師古曰曼丘毌丘本一姓也語有緩急耳雨雪雨于具切覘敕艶切窺也羸瘠力追切漢書作羸胔音漬一說胔讀曰瘠沮吾材汝切止也壊也厚遺弋季切贈也傅兩矢外郷傅讀曰附郷讀曰嚮毎一弩而加兩矢外郷者以禦敵也箕倨上音基下音據申兩足踞坐其形如箕孱王鋤連切謂懦弱齧五結切噬也何洿汪胡切又烏故切漢書作汙謂染也郃陽音合詩在郃之陽屬左爲翊漢紀四通鑑卷十二起元黓攝提格盡昭陽赤奮若即壬寅至癸丑凡十二年太祖髙皇帝下八年東垣音轅髙帝十一年更名眞定國賈音古商賈綺去猗切細綾絺丑知切細葛紵音佇織紵爲布罽居例切毛布若今毼音曷操千髙切持也卒罷音疲適長上音嫡下上聲妻之七計切所鮮息善切少也風諭音諷九年轞車户黤切通作檻轞車者車而爲檻形以板四周之無所通見搒脯横切謂揺擊之刺剟丁劣切漢書作爇以鐡刺之又燒灼之箯輿箯音鞭編竹木以爲輿形亢音岡又下郎切頸緫謂之亢喉嚨也十年吃音訖言之難幾巨依切近也豨音喜邯鄲音寒丹趙國邑有邯鄲山羽檄胡歷切檄以木簡爲書長尺二寸有急事則加鳥羽挿之示速疾也十一年紿音殆欺也徼利徼音邀醻時流切通作酬趨湯讀曰趣合從子容切趙佗徒何切南粤通作越南海尉任囂病且死召南海龍川令趙陀行南海尉事漢立佗爲南粤王囂音遨畨禺上普安切下魚容切南越地魋結上音椎下音髻椎一樶之髻其形如椎也屈彊其勿切通作倔不柔服也蹶然音厥驚起之貌﨑嶇上丘冝切下音區遽其庶切史記作渠音詎橐音託有底曰嚢無底曰橐佗送託何切佗猶餘也亦作他夫差上音扶下楚皆切吴王名闥土曷切宫中小門亦曰門屏憊蒲拜切力極也賁赫賁音肥姓也仇怨讀曰冤歸重直用切歸輜重也麗山吕支切本作驪甪里盧谷切妙也剽匹妙切十二年湯沭如字言湯沭者謂以其邑賦稅供湯沭之具復其芳目切除其傜賦所與音豫洮水音兆在淮南番君蒲禾切下番陽同音濞普懿切蚤古早字啖當作淡謂無味之食也大敢切背音倍陿轄夾切隘也槀工老切禾桿扁鵲扁歩典切齊渤海人少戇上始沼切多少之少下竹巷切愚也􅎐音須髙后姊女字也永巷宫中之長巷後曰掖庭赭衣止也切以赤土染衣舂書容切舂擣也孝惠皇帝元年酖飲上音鴆下音於禁切鴆鳥食蝮以其羽畫酒中飲之立死犂明力追切犂明者將明之時一作遲煇耳許云切灼也一作熏以藥熏耳令其聾瘖於今切不能言也二年窋張律切豈少失照切謂年少也朕與音歟較漢書作講音校三年䙝嫚上私列切下古慢字面謾謨官切欺誑也又莫半切閩越君揺閩武巾切越王勾踐之國揺其苗裔姓騶氏甞帥百越之兵助髙祖封東海王都東甌甌水名也在永嘉甌十侯切湔氐湔蜀郡永名氐戎種丁奚切四年數蹕上所角切下壁吉切蹕者擗止行人也誹謗之木尸子云堯立誹謗之木誹音非又音沸仲虺許鬼切奚仲之後爲湯左相凌室力證切藏氷之室漢紀五通鑑卷十三起閼逢攝提格盡昭陽大淵獻即甲寅至癸亥凡十年髙皇后元年啑血所甲切小歠也漢書作唼廷爭側迸切軹音只河内郡之邑風讀曰諷台土來切二年狄道亭歷切其地有狄種故曰狄道隴西邑七年邸郡國朝宿之舎在京師者率名邸邸至也言所歸至也丁禮切穊音兾稠也揣𥘉委切度也易吾戈䜴切隆慮音廬河内邑八年祓敷勿切說文除惡祭橶音㦸史記作據掖夷益切本作腋祟雖遂切召平召讀曰邵廣陵人召平與東陵召平及此召平三人也此召平者其子奴以平功封黎侯見功臣表酈寄音歷酈商之子名寄字况兵屬之欲切下同數産所具切數責之也合從子容切齊楚連兵誅諸吕猶六國爲從以敵秦故言合從紀通張晏曰紀信子也晉灼曰紀信焚死不見其後功臣表云紀成之子以成死事故封侯又劉攽云漢祖以善用人得天下豈當忘紀信之功疑成者即信之一名掲音竭袒徒旱切偏脫衣䄂餔奔謨切申時食見子音晛啑所甲切漢書作喋顔師古曰喋當作蹀謂履渉之耳與啑血同音異義一呼火故切他類此大横如字荀恱云大横龜兆横理也掊音仆說文頓也僵也乘輿天子以天下爲家不以京師宫室爲常處當乘輿以行天下故羣臣託乘輿以言之太宗孝文皇帝上元年收孥孥子也秦法一人有罪并其室家今除此律帑讀與奴同假借字也重直用切増益也觀津工喚切信都國邑振貸吐戴切振起也謂給貸之令存立也振或作賑讀鬻之六切給米使爲糜鬻也屬車之欲切屬者言相連續不絶也古者諸侯貳車九乘秦滅九國兼其車服漢依秦制故大車八十一乘相屬也沾背知兼切一作洽駑下音奴凡下之馬隃與踰同駱役音洛顔師古謂駱役爲駱越西甌即駱越也言西者以別東甌牡莫後切說文父畜也牝婢忍切畜母也二年繇通作傜財足財與纔同傳置張戀切置者置郵也以其居符傳之所故謂之傳置猶傳舎也孟賁音奔衛之勇士潰胡對切水旁決曰潰訢訢與欣同解㢮式爾切放也名聞去聲郷風音嚮盎一浪切擥魯敢切亦作攬㩜必屈其勿切盡也下同將泛孟康音方勇切覆也顔師古曰字本作覂與此通用也靡之音靡蹷音厥傾竭也阽危丁念切欲墜之意穰人常切豐也齩五巧切齧也敺亦驅字著直略切辟彊上必亦切下其良切訞言與妖同漢紀六通鑑卷十四起閼逢困敦盡重光協洽即甲子至辛未凡八年太宗孝文皇帝中三年娠音身漢書身多作娠恚於避切怒恨也扛音江舉也絀敕律切貶下也調徒釣切選也圈求逺切養獸之所簿歩五切簿書也喋喋音牒利口也亟居力切又欺兾切急疾也舉錯千故切置也下所錯同紵直吕切檾屬細者爲絟粗者爲紵檾口穎切斮側略切錮音固說文鑄塞也共承共讀曰㳟一抔歩侯切手掬之也其字從手或讀爲坏非也四年䆳雖遂切深逺也牘背音讀木簡冒絮息據切巴蜀異志謂頭上巾爲冐絮提帝提徒計切擲也五年莢錢音頰如榆莢也鈆余專切青金也贏音盈有餘也犇古奔字䧟阱才性切穿地以䧟獸平稱尺孕切耒耨上盧對切手耕曲木下乃豆切薅器也似鏟以刺地除草怵雪律切說文誘也數所角切六年郵音尤置郵也謂行書之舎輜車音甾衣車也難支匈奴將名樓蘭西域國名在東垂當白龍堆烏孫西域國名狀類獼猴本其種治赤谷城呼揭丘列切西域國名稽粥上音雞下音育匈奴冐頓子名中行胡郎切姓也無仰牛向切湩竹用切乳汁也佔佔勑廉切衣動貌又虽贍切輕薄也米糵魚列切牙米量中竹仲切中猶滿也蹂人九切踐也厝之千故切置也虖古乎切音衛暴曬也墮火規切毀也旤古禍字𦵔醢上臻魚切虀爼也下呼改切䤈醢也輻湊上方六切車輪轑也下子候切本作輳輻共轂也謂衆輻之所輳分地扶問切下出分同瘇止勇切腫足曰瘇脛形定切胻也亦作踁􅏓盭􅏓之石切古蹠字足下曰蹠脚掌是也盭古戾字言足蹠脚戾不可行偪古逼字搏伯各切索持也畜菟土故切通作兎皂綈徒奚切厚繒舛尺兖切舛錯出贅之銳切贅壻耰音憂摩田器也誶語音碎誚責也哺音歩飤也併倨歩鼎切並踞坐也稽工奚切猶計也相與計校也維楫音接維所以繫船楫所以刺船覆芳目切覂也相逺去聲齊肅齊讀曰齊見之胡電切習貫工䆠切下同劓魚器切割鼻也艾讀曰刈草菅音姦茅也譯音澤傳四夷之言者即周禮象胥官蹵其千六切刖魚厥切斷足也傌音罵苴履子余切履中藉也緤先列切系也簠簋上音甫下音軌方曰簠圎曰簋罷軟罷讀曰疲軟人兖切氂纓力之切以氂牛毛作纓盭古戾字盧結切捽抑才兀切持頭髪也仰按之也憙許吏切熹好也好爲志氣七年罘罳上音浮下音絲顔師古曰罘罳連闕曲閣也以覆重刻墻墉之處其形罘罳然一曰屏也唐蘇鴞演義云罘者浮也罳者思也謂織絲之文輕踈虚浮之皃蓋漢時宫殿門闕上有此物也崔豹注云以罘罳爲屏又云罘者復也罳者思也臣朝君至屏外復思所奏之事於其下也師古所云大誤矣八年剡手弋冉切利也靡武皮切碎也剸諸亦作專左傳作鱄設諸漢紀七通鑑卷十五起元黓涒灘盡柔兆閹茂即壬申至丙戌凡十五年太宗孝文皇帝下十一年蕃扞上方煩切屏也下侯旰切衛也廑巨靳切與僅同著面直略切下同睢陽睢音雖梁國邑新郪千移切汝南邑南揵鉅偃切接也鼂錯鼂古朝字繇讀曰由鋋上延切短矛也袒裼上音但下音錫肉袒也鏃千木切矢鋒也仄古側字撓亂火髙切攪也其字從手一說橈曲也女教切其字從木騶側鳩切謂矢之善者春秋左傳作菆字其音同或音驟失之驟革笥息嗣切以皮作如鎧木薦如字以木板作如楯俛仰俛讀曰俯跌徒結切足失據也輯與集同衡讀曰横耐乃代切漢書作能讀曰耐賈人音古取其左左臧可切秦時發讁戍之人取其居里門之左者一切發之應劭說先倡音唱調立徒釣切謂筭度之畜長竹兩切畜長六畜也假士工雅切大也下同還踵還讀曰旋旋種回旋其踵也創𥘉亮切懲艾也陗千笑切與峭同峻也十二年無用傳張戀切信也古者或用棨或用繒帛棨者刻木爲合符傳以木爲之長尺五書符其上以爲信走下音奏半賈讀曰價倍稱尺孕切舉也取一償二爲倍稱商賈音古行賣曰商坐販曰賈竒贏居冝切謂殘餘物也或作夃阡伯阡謂千錢伯謂百錢顔師古音莫白切俗謂百錢爲一陌乘堅乘平聲堅謂車曵縞上以制切牽引也下古老切繒之精白者所渫先列切散也下同辟讀曰闢開也十三年粢盛上音咨黍稷也下音成說文黍稷在器中以祀者緹縈他弟切女名也城旦舂書容切擣也城旦者男子旦起治城舂者婦人不預外傜但春作米皆刑也斬左止止足也與趾同受賕渠尤切以財物枉法相謝也告訐居謁切面相斥罪也十四年遫古速字固要一笑切約也文潁曰要劫也說文以力止去曰劫搏髀上伯各切拊也下蒲弭切股也漢書作拊髀推轂上通囘切進也下古禄切輻所湊也澹林都甘切又音談如淳曰胡也匈奴傳晉北有澹林之胡按傳止云林胡無澹林字又按李牧傳滅䄡襤降林胡此襜與林乃二胡䄡字或作澹史記索隱云澹林一作襜襤乃知如淳遂以林胡併爲澹林蓋澹林胡乃二胡當以李牧傳爲正尺籍伍符籍秦昔切尺籍所以書軍令伍符軍士五五相保之符信也幕府師出無常處所在張幕居之以將帥得稱府故曰幕府釐音僖本字作禧此借用耳釐福也賈誼傳受釐坐宣室十五年新垣平新垣姓也十六年刺六經刺千賜切采取也扐音勒酺音蒲酺之爲言布也布德於天下而聚飲食也酺或作脯音同後元年改正之成切過與音歟醪來髙切汁滓酒也靡音糜散也二年棫陽音域宫名秦昭王所作蹶張音厥凡弩以手張者曰擘張以足張者曰蹶張六年式車設職切車前横木也古者立乘凡言式車者謂俛身俯弍以禮待人蝗胡光切螽也食苗爲災倉庾勇主切在邑曰倉在野曰庾凡倉無屋爲庾七年臨力禁切衆哭曰臨下同無跣先典切足親地也漢書作無踐絰徒結切以苴麻爲之孝景皇帝上元年歐音驅二年孛蒲没切妖星閼一曷切堧垣堧人縁切内垣之外遊地也彗徐醉切妖星睢陽城睢音雖在梁國梁孝王築之鼓倡節杵而後下和之者稱睢陽曲漢紀八通鑑卷十六起彊圉大淵獻盡上章困敦即丁亥至庚子凡十四年孝景皇帝下前三年巵音支飲酒圎器也朝請才性切下同博伯各切博塞提吴徒計切擲也愠於問切怒也踐更更平聲漢律卒更有三踐更居更過更平賈讀曰價謂庸直也公共史記公作訟如淳曰訟猶公也漢書作頌顔師古曰頌讀曰容頌所以形容也狧古􅜻字用舌食也音石爾切矍然居具切矍然無守之貌方洋上音房下音羊猶翶翔也函谷關函音咸在洪農縣衡山嶺西征記曰函谷左右絶岸十丈中容車而巳詳見上不耆讀曰嗜德與音歟胥靡上新於切下母彼切胥靡刑名也晉灼曰胥相也靡隨也顔師古曰聮繫使相隨而服役之故謂之靡猶合役囚徒以鎻聮綴耳雅舂書容切爲木杵而以手舂正身舂之故云雅舂渠率所類切渠大也東越東越者都東甌故號東越其君名揺南粤者都南海故號南粤其君名佗粤通作越猶與與讀曰豫調徒釣切計發也擅適讀曰讁剽輕匹妙切去走音奏疾趨也下同饟古餉字挑戰徒弔切擿嬈敵求戰南陬子侯切又音鄒隅也借人史記漢書皆作藉藉假也候司馬顔師古曰在行伍間或爲候或爲司馬疽千余切漢書作癰利㗖徒濫切以食餧人曰㗖謂以利誘之如㗖之也鏦楚江切以矛㦸撞之趣讀曰促巳罷音疲何處昌汝切玃俱縛切之從子容切跬空累切半歩曰跬橈女教切曲也詿誤上古賣切礙也下五故切謬也四年用傳張戀切信符也文帝十二年除之至此復用六年荼音塗蚡扶粉切嫖匹昭切嗛苦簟切恨也當作慊七年郅之日切姓中元年雨雹雨于具切二年中都竹用切多竒邪竒紀冝切邪音斜周禮有竒袤之人鄭氏云竒袤譎詭非常也盎安浪切議格音閣止也甬道音踊築垣墻如街巷軒丘豹軒姓也索山客切適長讀曰嫡訹雪律切誘也有卑音鼻地名零陵鼻亭是也茅蘭茅姓也伏斧質質職日切椹也㐲斧於椹上五年不厭一瞻切不服也讞魚蹇切議罪也六年五畤渚市切畤者封土積髙之所秦有西畤鄜畤武畤好畤宻畤皆在右扶風所以祭天地五帝說讀曰恱餐古飡字箠止蘂切䇿也所以擊者臋徒門切苑馬於阮切凡養禽獸者通名爲苑故謂牧馬處爲苑後元年大胾側吏切大臠五百𬒳皮義切具也謂具五百甲楯也簿責音簿書之簿言書之於簿一一問之也二年省繇上所領切繇讀曰傜畜與蓄同攘弱人羊切取也三年鈞駟漢書作醇駟斷於丁喚切漢紀九通鑑卷十七起重光赤奮若盡彊圉恊洽即辛丑至丁未凡七年丗宗孝武皇帝上之上建元元年奸音干犯也操千髙切執持也抵冒上丁禮切觸也下莫報切犯也更音庚改也囹圄上盧經切下偶許切囹者令之使聆圄者語之使悟周獄名貪狼盧當切狼似犬銳頭白頰其性好貪故言貪者爲貪狼錯繆上倉各切乖也下靡㓜切戾也訾讀曰貲貿莫候切互易也䁆讀若暗眊莫報切不明也捄古救字繆盭郎計切繆戾也道與音歟下同傳其傅讀曰附囂囂音嗸衆愁怨聲朘音宣縮也羡溢上弋戰切饒也下弋質切滿也放之甫往切依也邪辟上似嗟切不正也下匹歷切僻也莊助漢書作嚴助避明帝諱改莊作嚴他倣此易王易音亦謚法好更改舊曰易推轂上通回切下古禄切言薦舉人如車轂之運轉二年益横胡孟切恣横嫖匹昭切祓祓除也謂上巳祓禊祓音廢禊音系謳一侯切齊歌曰謳衛媪烏告切媪老者之稱時衛媪未應爲媪史家追稱之耳恚於避切恨也求疵才斯切病也三年累欷上力軌切重也下許旣切歔欷也㓜眇上一笑切下音妙精微也葭莩上音加葭蘆也下音孚莩者其筩中白皮至薄者擯卻上必刃切下丘略切謂退斥也詼諧上枯回切譏戲也下户皆切合和也馳騖亡遇切亂馳曰騖鄠杜上侯古切古扈國右扶風邑下徒古切古杜伯國京兆邑後宣帝更名爲杜陵溺耳乃釣切嫗威遇切說文母也五柞在各切宫名也取柞木爲名阿城烏何切本秦阿房宫以其墻壁崇廣故俗呼爲阿城顔師古說盩厔上張流切下竹乙切右扶風邑賈直賈讀曰價霸滻上必駕切下所簡切皆水名在京兆卬足牛向切與仰同秔稻秔音庚有芒之榖緫曰稻秔其不黏者䵷即蛙字似蝦蟆而小長脚者之虚讀曰墟下丘虚同無隄丁奚切限也阿房上烏何切下讀爲房室之房詳見秦紀始皇三十五年烏獲秦武王力上也慶忌呉王僚之子射能捷矢賁育賁音奔孟賁夏育皆古勇猛士卒然蒼没切屬車之欲切車相聮屬也解見上逢蒙皮江切古之喜射者橜鉅月切車鈎心也六年攝然奴恊切安也翦子淺切剃髪也本作鄼不與音預篁音皇竹田曰篁酎直救切三重醇酒也戇陟降切愚也輿轎音橋謂隘道輿今竹輿車言以轎過領拕舟音它曵也蝮敷福切爾雅蛇也郭璞云各自一種蛇歐泄歐一口切泄顔師古音弋制切吐也蕳忌蕳姓也嚴助傳作間淮南王傳作蕳間轉冩誤省耳上滏工含切水名在豫章新淦縣漂匹遥切漂蕩不耐乃代切漢書作能讀曰耐輓車音挽引也癉音旦黄病蠚音壑毒也疢丑刃切病也塡撫塡讀曰塡他類此不頓讀曰鈍壞也尉屠雎屠同都切姓也雎千余切其名爲郡都尉監禄監郡御史也名禄徼工堯切幸也通作僥顔行胡郎切文頴曰猶鴈行在前行故曰顔也之間讀曰間腵之間屋比頻寐切言屋相近也倨居庶切傲也或數所具切責也元光元年驍騎堅堯切說文良馬也刁斗刁丁聊切古者軍有刁斗以銅作鐎受一斗晝炊夕擊鐎音焦省所領切少也斥候上音尺下音后淮南子曰斥度也候望也漢紀十通鑑卷十八起著雍涒灘盡柔兆執徐即戊申至丙辰凡九年丗宗孝武皇帝上之下元光二年五畤音止見上更工衡切下更來同饋遺弋季切饋餉也遺贈也下遺人同竒中竹仲切識職吏切記也安期生如字列仙傳安期生琅邪人賣藥東海邊時人皆言千歳食臣食讀曰飤藥齊才計切藥之分齊槥車音衛小棺墮城火規切毀也從行子容切南北曰從衡行衡或作横東西曰衡梟騎古堯切言其勇健爲閒居莧切諜也輜重上側其切下直用切輜軿車也軿音蒲眠切輜或爲竹菖或爲蒲器所載觕重逗橈逗音豆橈女教切逗謂留止橈謂頋望三年瓠子胡悞切隄名在東郡濮陽汎郡敷劒切水所汎及凡十六郡奉邑房用切下奉禄同鄃音輸清河邑相爲引重爲于僞切重直用切言相引而致於尊重忤五故切說文逆也横胡孟切恣也詆訐上丁禮切毀辱也下居謁切面相斥過也四年墮車吐火切墜也蹇九件切跛也張歐音區五年畨陽音婆或作鄱豫章邑風曉風讀曰諷枸醬音矩枸子如赤椹縁木而生味辛䍧柯江上兹郎切下古何切牂柯者係船㭖也楚伐夜郎至且蘭㭬船於岸因以䍧柯名江畨禺上普安切下魚容切南海郡治也夜郎夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有聲剖之得一兒歸養之及長有才武自立爲夜郎侯以竹爲姓見華陽國志桐師夷名在滇池之西才各切西夷國名其人被髮左衽言語多譬類武帝開之置沈黎郡僰道蒲北切僰侯國在馬胡江武帝使唐蒙鑿石開道以通南中置犍爲郡卭卭都夷其地䧟爲汙澤因名爲卭池南人呼爲卭河武帝開之以爲縣屬越嶲郡冉駹冉駹西南夷二族冉而琰切駹音厖其人依山居上累石爲室至十餘丈武帝開之爲汶山郡斯榆本葉榆澤其君長因以立號其後隨畜移於徙顔師古曰徙音斯又號斯榆沬若沬若二水名沬音昧出蜀廣平徼外若一作瀘出旄牛徼外爲徼工釣切謂以木石水爲界也西南之徼猶北方之塞零關道零一作靈關一作山武帝鑿開靈山爲鑿關道屬越嶲郡孫水水名出臺登縣一名白沙江厭勝一渉切與厭當厭難之厭同鞫鉅六切毬也以韋爲之辟㦸上頻亦切開也下几劇切有枝兵也大蜮兩逼切又音或其狀如鼈含沙射人生南方螟莫經切食苗心蟲分職扶問切聲比頻寐切和也涸胡各切水竭曰涸廷爭與諍同縁飾愈絹切猶衣之純縁元朔元年薉君薉古穢字貉也本朝鮮之地武帝滅之置蒼海郡擯必刃切斥也委積上於僞切下子智切周禮鄭氏注委積謂牢米薪芻也調徒聊切調和靡敞靡音縻散也下並同暴古暴字東腄史記作東腄音縋漢書作黄腄謂黄縣腄縣腄音直瑞切並在東萊故此云東腄紡績上撫兩切網絲也下則歷切緝麻也節族族音奏節止也族准也徼末於堯切要求也燔扶元切燒也龍城龍或作籠匈奴俗歳有三龍祠祭天處棘矜巨巾切棘㦸也矜者㦸之把也時秦銷兵器故但有㦸之把耳大呼火故切叫也二年適嗣適讀曰嫡斗辟斗本作阧峻立也辟僻也以造陽地阧僻故棄之訾讀曰貲軹音只河内邑不中竹用切睚眦上音五懈切下仕懈切瞋目貌也覬覦上音異下音踰覬幸也覦欲也謂幸得其所欲搤腕上音戹捉持也下烏慣切手腕也陳豨許豈切蓼音六邑名屬六安國三年谷蠡上音鹿下盧奚切匈奴王號月氏音支西域國名解見上敦煌音屯皇郡名郷讀曰嚮大宛於元切大宛國在匈奴西南有城郭屋室大小七十餘城康居居音渠與大宛鄰國大夏大夏在大宛西南居嬀水南其都曰藍氏城要領要衣要也領衣領也凡持衣則執要與領故有所操持者以要領爲喻要一遥切並南並歩浪切堂邑氏堂邑亦地名堂邑氏姓也甘父其奴名兒寛兒研奚切姓也讞掾上魚蹇切下俞絹切議獄官屬造請造至也請謁問也造七到切質責職日切正也正責之伉厲上口浪切健也下力制切嚴也資治通鑑釋文卷第二
